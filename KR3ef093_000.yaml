body:
  text: 內容提要傷寒金匱兩書原為一書合十六卷名為傷寒雜病論是漢張機仲景氏所撰是中醫的經典著作之一本書著者將仲景之書為之實驗發揮後而加以詳注全書有三個特點一本書為著者數十年臨床經驗的總結一字一句都出自心得與一般彙集前人注釋不同二本書融會仲景全書本仲景著書之精神詳為分析不標新立異亦不拘泥於一家之偏見三書中注釋各條不但解析病理且博引著者多年治病經驗以為佐證俾讀者知所運用與徒托空言而無實踐者不同為今日研究祖國醫學者及臨床醫工值得重視的一本參考書籍再版前言這次重印曹師遺著傷寒發微金匱發微有三點需要略加說明第一原來的傷寒發微刊本沒有圈點曹師生前曾為其幼女若華圈點了一部這次排印就全部照樣加上了使之和金匱發微的形式相一致第二這兩部書在前次刊行之後曹師曾對原來的文字略有小小的修改在訂正仲景原文之處又逐條加以注明還有幾處對原來的注文作了補充現在全部根據曹師的手筆付排因此目前的版本有少數地方和以前的刊本不同第三以前這兩部著作先後單獨刊行重復的湯方一律依照仲景的原書用正文大字現在既把兩書合刻就沒有再保留重復湯方的必要但是為了保持原來的內容同時對於湯方前後小有異同之處便於相互參考因此就用小字雙行排在仲景原文之下免得在正文中重復出現這是我個人的主張除了這三點之外一切都是原來的樣子我是在曹師門下學習詩文雖然在追隨左右之時曹師亦有時為之講解醫學終以意不在此未加留心所以到今天還是一個門外漢現在重刊曹師這兩部遺著雖則由我來負責但是對於曹師這一方面學問實在不敢妄肆議論不過曹師的主張精神根據平昔知聞頗有需要談的因此就從我的思想所及寫幾句在前面曹師一生提倡經方不論是教導門人或者是臨證處方一以仲景為法因此少數敬仰他的人說他是經方的典型而很多反對他的人都說他是背時好古實際上曹師這樣的主張完全是為當時中醫學術進行一場生死存亡的鬥爭並不是曹師有意喜歡固執派別的成見那時候中國正處於半殖民地的地位帝國主義者挾其科學上的成就用其全力摧殘我國的民族文化以期達到他永遠奴役中國之目的在醫學方面也毫無例外仰承帝國主義者鼻息的國民黨反動政府媚外惟恐不及更說不到對祖國醫學的保護至於當時的西醫好的是認為中醫在學術上的落後不科學主觀的全部加以否定另外一種是爭營業盡力對中醫排擠當時醫學界曾流行著中醫不亡是無天理一句話可見中國醫學被蹂躪的程度在中醫本身當此千鈞一髮之時不思奮起圖存用科學方法研究祖國醫學使幾千年的文化遺産不致滅亡相反的却故步自封視中醫的存亡好像是與己漠不相關臨證處方用藥不出桑葉菊花防風荊芥劑量不出三分五分輕病儼然能夠著手回春重病就束手無策至於麻黃附子那一類能夠愈病的峻藥不但自己不會用不敢用還要以打擊別人的方法來掩護自己的短處說什麼古方不可以治今病這樣片面的抱著一己的成見來對待學術醫學怎樣能夠進一步提高即使沒有外力的壓迫前途已經非常危險根據這樣的情況所以曹師極力主張經方想把中醫從庸俗的敷衍的治療風氣中挽救出來使得治醫的人們除了知道中醫在輕描淡寫的時方而外還知道有一種大方重劑可以挽救沉疴使中醫在那樣的惡劣環境下用有力的事實來挽救滅亡的命運這是曹師不得已而不顧一切堅決主張經方的苦心不但在當時就是直到今天還是很少人能夠理解的就時方來說曹師也不是一概的加以抹殺在同門秦伯未兄的序文中已經指出了這一點從曹師和丁甘仁先生的關係中更加可以充分的說明丁甘仁先生是以時方擅長可是他的運用時方完全因人而施用丁甘仁先生的話來說我之所以用輕劑者彼固未有重病也事實確是如此丁甘仁先生的病號大都是養尊處優之人有的是偶感風寒稍覺不適有的是閨中弱質情感抑鬱這樣的病人藿香桑葉陳皮豆蔻便以足夠奏效曹師也承認這一點但是一遇到危篤的病症丁甘仁先生就又往往以大劑活人曹師對他的用附子理中湯治血症推祟其深明醫理可見丁甘仁先生的運用時方是有他一定的根據的至於去曹師那裏治療的一般都是勞動人民不到病勢危險決不就醫所以所用的全是經方大劑丁甘仁先生不反對曹師用經方曹師也不反對丁甘仁先生用時方兩人在醫學上結成最相知的友誼可見曹師的反對時方並不是反對適當的運用時方而是反對只知時方不知經方的市僧否則曹師就成為泥古而不通今的曹師而不是以保衛中醫為己任的曹師了解放以後辨證唯物論的醫學巴甫洛夫學說開始介紹到中國來不但逐步澄清泛濫在中國西醫中間的唯心論以及機械唯物論二元論生機論活力論等等各式各樣的唯心論同時也為中醫明確了一條研究的方向過去中醫所說的心為君主之官以及營氣衛氣百脈經絡等等雖然有許多是抽象的東西有許多只是從經驗上得到的推論實際上已經接觸到神經系統的作用在治療方法上主要從整體出發不務頭痛醫頭腳痛醫腳這一情況也和巴甫洛夫學說有機體內在和外在環境的統一的基本觀點有其相通之點曹師雖然由於時代的限制沒有接觸到巴甫洛夫的學說但是他研究醫學的方法特別注意人身各部份之間的聯繫從聯繫中進行治療不但闡發陽明譫語一下而愈是明顯的例子其他如用半夏去心下水氣以止嘔遇當利小便之症不用五苓而用麻黃發汗這種例子在書中是多得不可勝舉就是對太陽太陰六經病將愈從某時至某時各條歷來注家不是糾纏於陰陽便是認為無稽曹師也從天時的變化和病情相適應來進行解釋這許多獨特的見解不但辨證的注意於人體的全面而且把內在的主體和外在的客觀環境都結合起來雖然這許多見解都是從中醫原來學說的基礎上立說有待於用科學的方法來加以分析但是這樣從整體看問題的方法將是今後醫學界研究中醫時一個很大的啓發也是引導醫學界把唯物辨證法運用在中國醫學研究上的一個開端用這樣的觀點來分析曹師的治學方法我認為是並不誇大的書中曹師曾提到給他媳婦的妹妹治病的故事那時他住在醫院裏其家人貯藥茶銚僞言開水攜入醫院當時中醫處境的悲慘即此可以概見今天中國人民在共産黨的領導下自己掌握了政權祖國的醫學得以重新恢復其應有的地位不但在醫院裏中西醫一起會診而且西醫也須要學習中醫和中醫一起研究祖國醫學中醫在各方面的治驗亦逐漸為醫學界所承認這說明了無論任何學術只有在人民的政權下才能得到正確的發展但是這一革命勝利的到來距離曹師遇難時已經十幾年了曹師當年為中醫生存進行鬥爭的心願雖然在今天已成為現實但是從作為一個門弟子的心情來說墓門宿草飽歷風霜春夢迷離師門永隔展讀遺文誠不勝羹牆之痛為了本書的再版原來金匱發微的發行人同門錢頌霞兄特地從無錫到上海來進行聯繫秦伯未兄在百忙中寫了一篇序文章次公兄始終關心此事在去北京的前夕特地趕到千頃堂書局詢問情況到北京後還不斷來信這都是出於曹師門弟子關心曹師著述的高度熱情應該在這裏提到的黃漢棟一九五六年二月二十九日曹穎甫先生傳我蘇之江陰昔有南菁講舍大江南北高材之士多肆業其中或深通經術或擅長詞章其為人或篤厚淳謹或風流放誕己未年余與穎甫先後入南菁而余以狂名穎甫以戇名人皆呼為曹戇穎甫曰善亦輒自稱曹戇焉余之初遇穎甫也彼此眼高於頂覿面不語既而在宜興儲南強齊舍中不期而相值南強溫文倜儻同學中皆樂就之與余尤稱莫逆南強指之曰此曹穎甫詩文大家也余曰即曹戇耶穎甫輒應曰是也余斯時因養病習七弦琴略知數引穎甫聞琴大喜每日至余處靜聽之嘗云曹戇向不肯下人今於君乃心折矣穎甫於研求經訓之外肆力於詩文其為文初學桐城更上溯震川盧陵以達晉魏其詩尤超絶有奇氣不為古人所囿別樹一幟壬寅登賢書科舉廢即絶意進取徵選知縣不應常藉詩文以抒胸臆而其傲岸之氣又旁溢為畫梅畫擬冬心而老乾挺立折枝灑落含遒徑於秀逸畢生風骨蓋寓於是焉穎甫之畫梅必系以詩詩主而梅客雖以二者並傳君意則以詩名梅也余於癸卯離南菁赴滬上即與穎甫音問隔絶但聞辛亥革命時穎甫以巾裹髮不肯去辮鄉人有謀用利剪剪之則乘夜遁至滬上久之方歸袁世凱稱帝時各縣士紳列名勸進某太史受袁氏金為江陰縣代表穎甫於某論親則姻叔論誼則業師聞之突詣某所詰之曰叔竟受袁氏之賄而作此無恥之事耶我江陰人之顏面為汝剝盡矣某大驚急曰無此事無此事一九二七年以後余息影滬瀆則穎甫已懸壺市南而託跡於韓康矣蓋穎甫之治學也不深造則不休中年肆力於醫鄉人亦莫知之及其應世凡他醫所謂不治之症穎甫輒著手愈之且於富者有時不肯醫於貧者則不取酬且資其藥穎甫之同門友莊翔聲有妾患盲腸炎穎甫居滬之南莊居滬之北路遠不便穎甫則自雇汽車載其妾以歸為之朝夕診視病已十去八九而患者有嗜好諱而不言致未固其元氣病遂革家人謀歸之穎甫止之曰不可卒歿於其家殯殮既畢穎甫親登莊君之門叩首謝罪其義俠之行類如此孟河丁氏世業醫創醫校於海上延穎甫主講座慮其高傲不可屈也穎甫乃夷然就之其授課也攜水煙筒紙煤一把且吸且講以傷寒金匱深文奧義抉擇隱微啓迪後進學者親炙其緒餘咸心悅誠服而忘其舉動之離奇矣穎甫年七十曾開筵祝壽與余過從之密如在南菁時八一三變作即返里久無音耗數月以後其壻來滬則言穎甫已罵賊死矣先是江陰城破有敵酋入其室穎甫尚與之筆談未有他變及敵兵蜂擁而至辱及婦女穎甫則肆口大罵不止敵舉槍斃之且刳其腹鳴呼烈矣余欲為文傳之以未悉其事狀久而未就今始得其崖略故著於斯篇穎甫姓曹諱家達一字尹孚號鵬南晚署拙巢江陰人著有古文駢文氣聽齊詩集詞集梅花集傷寒發微金匱發微後三種已梓行蔣維喬曰吾鄉常州舊屬有八縣而江陰居其一人民夙以氣節稱明末閰應元戴髮效忠率民兵數萬抗清兵十數萬八十餘日城破皆死無一降者故江陰號稱忠義之邦穎甫之戴髮效忠雖與閰公趨向不同而其忠義殉節則後先一揆彼身居亂世遇威脅利誘而中心漫無所主者聞穎甫之風可以稍愧矣凡例八則一本書一日二日三日為一候二候三候傷寒七日一候中風六日一候以下五六日八九日等均不在此例所以不言四候者以陽明居中土無所復傳凡傳三陰大概為誤治之壞病否則別有感受也二本書訛謬處甚多鄙人不避訕謗輒為更正使學者視病處方有所信從不致自誤人知我罪我聽之而已三內藏解剖當以西說為標準不當堅執舊說西醫所謂胸中有淋巴系統即中醫所謂脾陽及上中二焦之關健所以發抒水穀之氣而成液與汗者皆由於此西醫所謂輸尿管即中醫所謂下焦西醫謂胃底含有膽汁足以證明少陽陽明之同化及消渴厥陰跗陽同病之理故注中間採其說與謬托科學者固自不同四本書有會通前後而其義始見者諸家注文每有顧此失彼之弊致前後意旨差謬鄙注幸免此失願與明眼人共鑒之五著述之家輒有二病一為沿襲舊說一為謬逞新奇鄙人以考驗實用為主要間附治驗一二則以為徵信非以自炫特為表明仲師之法今古咸宜以破古方不治今病之惑閲者諒之六藥性不明不可以治病芍藥苦泄通營分之瘀葛根升提增液能引太陽經輸內陷之邪使之外出意旨俱本張隱庵似較以芍藥為酸寒斂汗以葛根為陽明主藥者為正明者辨之七三陰之病純陰則死回陽則生黃坤載說最為切中凡陽亢而死者皆醫之過也鄙注特申黃說而補其所不及似較原注為勝八霍亂之證濁氣不降清氣不升縱然有熱吐瀉交作之後中氣必屬虛寒故仲師以四逆理中為主方足證近代霍亂新論之謬以上八則不過略舉大端微者闕之以俟閲者自悟倘海內同志有能匡豫不逮正豫訛誤者不勝榮幸傷寒發微太陽篇太陽之為病脈浮頭項強痛而惡寒此節為太陽病總綱故但言脈浮而不備言兼見之脈兼見之脈如中風脈浮而必兼緩傷寒脈浮而必兼緊之類蓋無論所受何等外邪始病必在肌表皆當見此浮脈不惟合本篇太陽病言之並賅痙濕暍篇太陽病之言也外邪束於肌表內部陽氣被遏則上衝頭項於是有頭項強痛之證皮毛肌腠之中皆有未泄之汗液從淋巴管輸泄而出醫家謂之太陽寒水邪犯肌表必阻厄其外出之路此水內停即有惡寒之症無論傷寒惡寒中風亦有時惡寒即溫病之初起亦必微惡寒也太陽病發熱汗出惡風脈緩者名為中風風為陽邪當皮毛開泄之時由毛孔內竄著於肌肉而腠理為之不開肌腠皆孫絡密布之區營氣所主營血熱度最高華氏寒暑表度與風邪抵抗易於發熱故始病即見發熱成無己以為風傷衛者誤也熱勢張於內毛孔不得復合故汗出汗方出而外風又乘毛孔之虛犯肌理而增寒故惡風氣從內泄毛孔不外閉無兩相抵拒之力故脈緩脾為統血之藏風中於肌肉則脾受之故解肌之桂枝湯用甘草生薑大棗以助脾陽桂枝以宣陽氣芍藥以泄營分務使脾陽動於內營鬱發於外血中凝沍之水液得以分泌成汗直透毛孔之外內熱既隨汗泄則毛孔閉而汗自止矣服藥後啜熱粥者亦所以助脾陽也太陽病或已發熱或未發熱必惡寒體痛嘔逆脈陰陽俱緊者名為傷寒寒為陰邪而其中人即病者或由於暴受驚恐心陽不振之時或由向有痰濕之體或由天時暴熱皮毛開泄之後當風而臥夜中露宿或衛陽衰弱寒夜臥起不定寒因襲之所以致病者不同而病情則一蓋寒邪中人皮毛先閉汗液之未泄者一時悉化寒水肌裏之營血並力抗拒血熱戰勝遂生表熱初病時血熱不達或無表熱而要以惡寒為不易之標準此證雖至鼻燥眼中熱唇口焦而惡寒不減甚有當六月盛暑時猶必覆以重衾溫以炭爐者其體痛或如錐刺或如身臥亂石中豫於春夏之交蓋屢見之寒鬱於外陽氣不得外泄膽胃被劫而上衝因病嘔逆間亦有不嘔逆者寒邪外逼血熱內亢兩相抵拒故脈陰陽俱緊寒傷皮毛則肺受之中醫言肺主皮毛西醫謂肺中一呼吸皮毛亦一呼吸其理正相合也故發表之麻黃湯用麻黃杏仁以開肺與皮毛之鬱桂枝以宣陽氣甘草以平嘔逆務使肺氣張於內皮毛張於外陽氣達於中則皮裏膜外之水氣因寒凝沍者一時蒸迫成汗而邪隨汗解矣傷寒一日太陽受之脈若靜者為不傳頗欲吐若躁煩脈數急者為傳也傷寒一日太陽受之二日陽明受之三日少陽受之四日太陰受之五日少陰受之六日厥陰受之此本內經文字仲師祖述內經豈有推翻前人之理內經原係漢人訛托當在仲景之前故發端即曰傷寒一日太陽受之脈若靜者為不傳自來注家不知一日為一候遂致相沿訛謬高士宗明知二日未必遽傳陽明以為正氣相傳不關病氣夫六經營衛晝夜流通豈有既病傷寒一日專主一經之理仲師恐人不明一日二三日之義後文即申之曰太陽病頭痛至七日以上自愈者以行其經盡故也若欲作再經者針足陽明使經不傳則愈此可見本節所謂一日即後文所謂七日傷寒發於太陽以七日為一候猶黃疸病發於太陰以六日為一候也詩豳風七月篇詳言農政以三十日為一候故冬十一月為一之日十二月為二之日正月為三之日二月為四之日也知一日二日為一候二候則未滿三日可汗而愈既滿三日可下而愈可以釋然無疑矣此節憑脈辨證知邪之傳與不傳蓋浮緊為傷寒正脈靜即不變動之謂已滿七日而浮緊之脈絶無變動便可知其為不傳他經此意惟包識生能言之餘子碌碌不足數也至如太陽失表胃中化燥薰灼未泄之汗液致濕痰留於胃之上口胃底膽汁不能相容則抗拒而欲吐蓋濕痰被胃熱蘊蒸若沸湯然上溢而不能止也胃中化熱陽熱上攻則苦躁煩而脈亦為之數急即此可決為邪傳陽明張隱庵乃謂太陽受邪感少陰之氣化者為傳殊失仲師本旨傷寒二三日陽明少陽證不見者為不傳也內經一日二日為一候二候前條既詳言之矣二候在七日以後三候在十四日以後蓋傷寒以七日為一候也惟傳經初無定期發於春夏之交地中陽氣大泄人身之皮毛肌理易開常有一二日即傳陽明者亦有冬令嚴寒二十餘日不傳陽明者仲師言其常不言其變也以傳經常例言八日後當傳陽明十五日後當傳少陽為冬令天地閉塞人身陽氣未外泄為汗故為期較緩若八日後不見潮熱渴飲不惡寒但惡熱譫語小便多大便硬闕上痛等症即為不傳陽明十五日後不見口苦咽乾目眩耳聾吐黃色苦水即為不傳少陽可見傷寒之輕者雖未經療治亦有七日自愈十四日自愈之證也若始病惡寒體痛即投大劑麻黃湯則一汗而病良已寧復有傳經之變證乎太陽病發熱而渴不惡寒者為溫病若發汗已身灼熱者名曰風溫風溫為病脈陰陽俱浮自汗出身重多眠睡息必鼾語言難出若被下者小便不利直視失溲若被火者微發黃色劇則如驚癇時瘈瘲若火熏之一逆尚引日再逆促命期發端便稱太陽病是必有脈浮頭項強痛之見證則溫病不由少陰傳出確無可疑按溫病之輕者其始亦必惡寒近世蜀醫張子培著有春溫三字訣言惡寒之時用麻絨二三錢於桑菊飲中視原方尤妙所以發熱而渴者其人冬不藏精當春氣發生之時內藏失其滋養也所以不惡寒者則以津液素虧裏氣本燥益以外感之溫邪而表裏俱熱也此證宜清營泄熱醫者反發其汗以致津液重傷風乘毛孔之虛而倍益其燥於是遍身灼熱一如熾炭之灼手是為風溫脈左主營而右主衛左右俱浮故曰陰陽俱浮自汗者表疏而陽熱外泄也身重者脾精不濡肌肉肌肉無氣而不能轉側也試觀垂死之人身重如石此非肌肉無氣之明證歟脾陽受困肢體無力故多眠睡且以風引於上熱痰上蒙清竅不能受清陽之氣故白晝一如昏暮也風著腦中咽中痰涎被吸作聲故息必鼾風痰阻塞咽喉故語言難出此風溫挾痰之變起於誤汗者也病溫之人精液本少渴飲不惡寒則有似陽明實症若誤認陽明而下以承氣勢必因津液內亡而小便不利目系不濡因而直視且始因誤下而氣併於腸牽制膀胱氣化而小便不利繼則硝黃藥力一過氣脫於前而為失溲此風溫化燥之變起於攻下者也但溫病之始必微惡寒溫病之成汗多而渴汗下雖誤然猶有說以處之也至如燒針及隔薑而灸隔蒜而灸則庸妄之至矣夫津液充足之人遇火則汗出故冬令圍爐猶不免裏衣沾漬盛夏執爨則更無論矣若皮毛肌腠絶無津液留遺以火攻之迫肌理血液外附皮毛而微見黃色黃色者津液不能作汗而血色代見於外也三陽之絡皆上於頭血受火灼為炎上之勢所挾絡脈之血一時上衝於腦時見牽掣指臂瘈瘲如驚癇狀若火從下熏輕微之毛羽紙片時上時下而不能定則必死無疑矣或汗或下為一逆被火為再逆一逆則尚及救治再逆則朝不保暮此真越人所謂醫殺之也豫謂此症初起即宜人參白虎湯及竹葉石膏湯使其熱勢漸殺或當挽救一二門人劉仲華治安徽林振羽病親見之始由某醫誤汗誤下諸症皆備劉用白虎湯加西洋參生地犀角二劑後始有轉機十餘日方見霍然治法差謬生死攸關是不可以不慎也又按犀角生地能清腦中上衝之熱血惲鐵樵治王鹿萍子腦中熱痛用之奏效亦其一證也病有發熱惡寒者發於陽也無熱惡寒者發於陰也發於陽者六日愈發於陰者七日愈以陽數七陰數六故也此條訂正發於陽者為中風以風為陽邪故也中風之證發熱有汗而惡風然亦間有惡寒者如太陽中風嗇嗇惡寒可證也發於陰者為傷寒以寒為陰邪故也但本節發於陽者七日愈發於陰者六日愈則為傳寫差誤據後文風家表解而不了了者十二日愈十二日為兩候風家病愈在十二日則發於陽者當云六日愈後文又云太陽病至七日以上自愈者以行其經盡故也傷寒以七日為一候則發於陰者當云七日愈但陽病遇陰數而愈陰病遇陽數而愈亦屬術家言有時不甚可據但存其說可也太陽病頭痛至七日以上自愈者以行其經盡故也若欲作再經者針足陽明使經不傳則愈太陽傷寒以七日為一候所謂發於陰者七日愈也蓋風寒束於表血熱抗於裏始則無熱惡寒繼則發熱而仍惡寒使正氣足以勝邪則當一候之期汗出而頭痛可愈夫頭之所以痛者皮毛為表寒所閉陽氣不得外達鬱而上冒也汗泄則表寒去而皮毛自開至於表解汗泄則氣之上冒者平矣設有未解則七日之後當傳陽明故曰作再經言太陽一經病後更傳一經非謂六經傳遍復轉太陽也太陽當傳陽明故瀉趺陽穴以泄其熱使陽明氣衰而不復傳則病亦當愈此真曲突徙薪之計不似近世醫家俟治療期至然後治之焦頭爛額為上客也足陽明為趺陽穴在足背上小兒繫鞋帶處太陽病欲解時從巳至未上人身衛氣行於表表虛則陽氣不能衛外因病傷寒衛氣晝行於陽從巳至未上正日中陽盛無病者進午餐之候陽明正氣當旺此時衛氣若強便當一汗而解蓋病之將退不惟專恃藥力亦賴天時之助也金匱痙濕暍篇云風濕相摶一身盡疼痛法當汗出而愈值天陰雨不止醫云此可發其汗汗之病不愈者但風氣去濕氣在故不愈也由此觀之寒病不得天陽之助庸有濟乎風家表解而不了了者十二日愈風為陽邪故風家之向愈以六日為候就陰數也風家表解謂解肌發汗之後不了了者或頭尚微痛或咳吐風痰仲師不出方治但云十二日愈不欲以藥味傷正氣也如必欲服藥可於陸九芝不謝方中求之病人身大熱反欲得近衣者熱在皮膚寒在骨髓也身大寒反不欲近衣者寒在皮膚熱在骨髓也傷寒之為病外雖壯熱往往擁被而臥雖在盛暑衣必裝綿並欲向火兼有目珠火熱鼻中燥唇口瘡發者要以背如冷水燒灌為病之真相甚者如臥井水中但胸腹之間絶無患苦此即病未入裏之驗所謂標熱本寒也此時用麻黃湯原方當可一汗而愈惟麻黃劑量萬不可輕輕則無濟余常以二三錢為標準重症或用至五六錢章成之亦能用之世言麻黃發汗能亡陽豫治病多年未見有亡陽者時醫但用二三分又加蜜灸故無濟設汗後胃中略燥可用調胃氣以和之得下便無餘事矣若溫熱之為病外雖微寒往往當風而坐雖在冬令猶欲去衣甚至飲冰盥涼猶言畏熱此症有實熱為濕痰所遏不得外出而手足厥逆者有津液素虧而尺中脈微者要以渴欲冷飲為病之真相實熱內伏者宜大承氣湯即厥陰篇厥者當下之例也陰虧陽陷者宜人參白虎湯加涼營解渴之品如麥冬生地玉竹栝蔞根之類皆可應手奏效一或錯誤殺人俄頃學者慎之此條骨髓但作在裏解若以為腎主骨而誤認為熱在少陰則誤矣太陽中風陽浮而陰弱陽浮者熱自發陰弱者汗自出嗇嗇惡寒淅淅惡風翕翕發熱鼻鳴乾嘔者桂枝湯主之桂枝湯方桂枝三兩去皮芍藥三兩甘草二兩炙生薑三兩切大棗十二枚劈上五味㕮咀以水七升微火煮取三升去滓適寒溫服一升服已須臾啜熱稀粥一升餘以助藥力溫覆令一時許遍身漐漐微似有汗者益佳不可令如水流漓病必不除若一服汗出病差停後服不必盡劑若不汗更服依前法又不汗後服小促其間半日許三服盡若病重者一日一夜服周時觀之服一劑盡病症猶在者更作服若汗不出者乃服至二三劑禁生冷粘滑肉麵五辛酒酪臭惡等物中風發於陽故衛陽外浮風著肌理之孫絡閉其外出之路故營陰內弱發熱惡風既惡寒並見者上文所謂發熱惡寒發於陽者是也風襲肺竅鼻中有清涕而氣不通故鼻鳴風沍肌腠脾陽內停水濕不能作汗外達故胃氣不和而乾嘔桂枝湯方用桂枝以通肌理達四肢芍藥以泄孫絡生薑甘草大棗以助脾陽又恐脾陽之不動也更飲熱粥以助之而營陰之弱者振矣營陰弱者振然後汗液由脾而泄於肌腠者乃能直出皮毛與衛氣相接衛始無獨強之弊所謂陰陽和而自愈者也太陽病頭痛發熱汗出惡風者桂枝湯主之邪薄於外正氣不得外泄則上衝於頭故無論傷寒中風皆有頭痛之症兩太陽穴在目外眥旁最為空虛故上衝之氣此最先受初病便發熱者為其發於陽也當皮毛開泄之時風襲汗孔之虛內薄肌腠肌腠為孫絡叢集之區草書絲字近形於孫故內經俱作孫絡即今西醫所謂微絲血管營氣居之營氣隨受隨抗故一病即見發熱皮毛本開故汗自出風從汗孔入犯肌肉故惡風所以用桂枝湯者取其辛甘發散但令脾陽內動營氣自能作汗從肌理泄出皮毛然後肌表通徹風邪即從汗解矣無如近世庸工謬以芍藥為酸寒又不知薑棗甘草為扶脾主藥桂枝甘草所用不過三五分生薑不過三片紅棗不過三枚桂枝湯乃無復愈疾之功可笑亦可歎也太陽病項背強几几反汗出惡風者桂枝加葛根湯主之桂枝加葛根湯方桂枝三兩去皮芍藥三兩甘草二兩炙生薑三兩切大棗十二枚葛根四兩上六味以水七升內諸藥煮取三升去滓溫服一升不須啜粥餘如桂枝將息及禁忌法太陽經脈出腦下項挾脊抵腰中寒邪隨經下陷則項背強几几几几鳥之短羽貌猶詩所謂不能奮飛也邪阻太陽經隧至於拘縶不解坐臥行起無不牽掣一似寒邪傷於表分經脈被束而不舒然果係寒鬱於表即不當見汗出惡風之中風證今乃反見汗出惡風則其為桂枝證無疑但病邪既陷太陽經輸固當加葛根以提而出之其不用葛根湯者有汗則皮毛本開不必再用麻黃也太陽病下之後其氣上衝者可與桂枝湯若不上衝者不得與之太陽之病本無當下之理一經誤下則變證百出魄汗未盡挾表寒內陷則利遂不止而病寒濕此宜用四逆理中者也挾標陽內陷則轉為協熱利此宜用大承氣者也若標陽並寒水因誤下而停蓄膈上則為大小結胸此宜大陷胸湯小陷胸湯者也若表寒因之而留滯心下則結而成痞此宜用瀉心湯者也又其甚者寒濕太重一下而成無陽之藏結是又在不可攻之例矣是故一經下陷而氣不還者則氣不上衝下陷而有所留滯則氣亦不上衝所以不得與桂枝湯者為其已成壞病也惟其雖經誤下而氣仍欲出表不甚則為微喘桂枝湯加厚朴杏子主之甚則利不止而脈促葛根湯主之要其為氣上衝則一也蓋仲師雖言可與桂枝湯一於本方加厚朴杏仁一於本方加麻黃葛根固未嘗不可隨證變通耳太陽病三日已發汗若吐下若溫針仍不解者此為壞病桂枝不中與也觀其脈證知犯何逆隨證治之太陽病汗吐下溫針病仍不解仲師但言桂枝不中與又曰觀其脈證知犯何逆隨證治之然未嘗標明何證何方令人無從揣測此當研求而得其大要以為臨證標準假如發汗溫針亡陽則有脈微身寒之變宜桂枝加附子湯吐傷中氣氣逆脈促者宜生薑半夏湯下之而寒水下陷利遂不止脈濡滑者宜四逆理中輩汗吐下溫針之後陽明生燥脈洪渴飲者宜人參白虎湯發汗燒針陽浮於外吸引少腹之氣上衝欲作奔豚則宜桂枝加桂湯發汗後臍下微有水氣欲作奔豚則宜苓桂甘棗湯散見於傷寒金匱者不勝枚舉略標出之以俟學者類推桂枝本為解肌若其人脈浮緊發熱汗不出者不可與之常須識此勿令誤也桂枝解肌所以別於麻黃之解表而於發熱有汗惡風者宜之若脈浮緊汗不出者邪正方相持於皮毛所賴營氣未虛血熱足與外寒相抵奈何在表之寒邪不驅之外泄而反引之入裏乎不特此也皮毛不開而張發肌理之陽氣外不得泄而鬱於皮毛之內不病喘逆即增煩燥近人不明此理反謂桂枝湯為斂汗之劑陳修園亦不免與後文當以汗解復發其汗諸條顯相抵牾按之解肌二字已不可通推原其故皆由李時珍本草誤人蓋因本方有芍藥李時珍綱目不知何所依據目為酸寒市醫以耳為目於是謬謂芍藥監桂枝之燥及斂肝陰之邪說不知芍藥在本經但言苦平苦者主泄故能通營分之凝結肌理為孫絡滿布風襲肌理營氣凝閉而不解故用芍藥以泄之婦人腹痛及瘡癰腫痛皆用之亦正以解血絡之凝閉也今人內證用白芍外科用赤芍其實則一然則桂枝湯之解肌芍藥實為主要反謂監桂枝之燥烈有是理乎豫嘗親試之白芍甘而微苦赤芍則甚苦而皆無酸味黃坤載長沙藥解亦以為酸寒真是糊塗萬分明乎此仲景立方本旨乃可大白矣若酒客病不可與桂枝湯得之則嘔以酒客不喜甘故也喘家作桂枝湯加厚朴杏子佳凡服桂枝湯吐者其後必吐膿血也酒之為氣標熱而本寒初飲則身熱酒後則形寒標熱傷肺則為喘本寒傷脾則為痰故治酒客病者法當利肺而舒脾肺氣利則標熱泄而喘滿除脾氣舒則本寒化而濕痰解桂枝湯方中加厚朴之苦溫以去脾藏之濕杏仁之苦泄以疏肺藏之熱或可用之否則肺脾二藏多濕熱之人本不喜甘更用大棗以助脾濕而壅肺氣無論服湯必嘔而標熱一盛再盛肺癰既成必吐膿血如不得已而用桂枝湯或加厚朴杏仁而去大棗理亦可通以肺脾多濕熱之人本兼痰喘故也故仲師首節言不可與言其正也次言加厚朴杏子言其權也三節言甘味壅塞必吐膿血極其變也仲師於此不出方治但舉喘家加厚朴杏子使人自悟加減之法於不言中求生活耳不然下之微喘條後文自有方治此處何煩贅說乎蓋特為酒客言耳莫氏謂凡服桂枝湯條當在喘家之前非仲師本旨不可從若夫既嘔膿血仲師自有治法金匱嘔吐篇云不可止嘔膿盡自愈不當止嘔但需排膿則狐惑篇赤小豆當歸散瘡癰篇排膿散並可用也包識生以首節為營實之禁忌桂枝次節為衛實之禁忌桂枝似也三節為營衛俱實之禁忌桂枝則非也服桂枝而吐與上得湯則嘔何異何所見而與首條殊異乎況以傷寒通例論中風一證原係營實衛虛若以為營實當禁桂枝中風一證先當禁用桂枝矣自來注釋家多犯顧此失彼之誤傷寒所以無通才也實為邪實風勝而血弱也慎勿以邪實營弱而誤認虛證太陽病發汗遂漏不止其人惡風小便難四肢微急難以屈伸者桂枝加附子湯主之桂枝加附子湯方桂枝湯加附子一枚炮去皮破八片發汗遂漏不止與下之利遂不止同皆用藥過當之失也蓋發汗則毛孔大開皮毛為衛陽所屬衛陽以發汗而虛毛孔乃欲閉不得風襲毛孔之虛因而惡風汗與小便同源而異趨春夏汗多則小便少秋冬汗少則小便多可為明證汗不能止水液能外而不能內故小便難也津液從皮毛外泄則四肢脈經脈不濡屈伸為之不利夫汗出惡風原屬桂枝湯本證惟表陽不固不得不於本方中加熟附子一枚以固表陽但令表陽能復衛氣之屬於皮毛者自能衛外而為固於是漏汗止而諸恙自愈矣太陽病下之後脈促胸滿者桂枝去芍藥湯主之若微寒者桂枝去芍藥加附子湯主之汗下之後病情未離肌腠則仍宜桂枝湯上節於汗後表陽虛者則加附子以溫之本節則於下後陰虛及陰陽並虛者更示人以加減之法也下後氣上衝則脈促而胸滿氣上衝者陽有餘而陰不足芍藥苦泄傷陰非陰虛者所宜故去之若下後脈微則裏陰虛所以知其為裏陰虛者以脈管中血液不足知之也下後身寒則表陽虛所以知其為表陽虛者以腠理血熱不勝表寒知之也陰虛故去芍藥此與脈促胸滿同陽虛故加熟附子一枚此與發汗後漏遂不止同學者於此可以觀其通矣太陽病得之八九日如瘧狀發熱惡寒熱多寒少其人不嘔清便欲自可一日二三度發脈微緩者為欲愈也脈微而惡寒者此陰陽俱虛不可更發汗更吐更下也面色反有熱色者未欲解也以其不能得小汗出身必癢宜桂枝麻黃各半湯桂枝麻黃各半湯方桂枝一兩十六銖芍藥生薑麻黃去節後倣此甘草各一兩大棗四枚杏仁二十四枚湯浸去皮尖及兩仁者上七味以水五升先煮麻黃一二沸去上沫內諸藥煮取二升去滓溫服一升人一身毛孔為魄汗從出之路衛氣主之衛氣行水故稱寒水所以無汗之太陽病外寒為多人一身肌腠孫絡交互營氣主之營氣行血易於生熱所以有汗之太陽病表熱為甚瘧病由汗液不徹留著毛孔之裏肌理之外發時則先寒後熱固為肌表同病太陽病如瘧狀者亦然得太陽病八九日已在一候之後於法當傳陽明乃更發熱惡寒則不傳陽明可知便是熱多寒少其人嘔大便硬或小便赤痛尤當為少陽陽明同病今則其人不嘔則膽胃無上逆之氣清便自可則腸中及下焦並無燥熱之象且瘧之將愈以發無定候為驗今一日二三度發則太陽之邪當隨汗解此正在必先振栗郤復汗出而愈之例設脈弦者可與小柴胡湯脈不弦而微緩即可決為將愈並小柴胡亦可不用所以然者凡病血分熱度漸高則病加熱度漸低則病退脈微而緩熱度漸低之證也然同是脈微要不可執一而論若脈微而身寒則又為陰陽俱虛不可發汗更吐更下仲師雖不出方治要以四逆理中為宜若面有熱色微頳如鬱冒狀則營熱欲泄為汗而皮毛不達也且營熱內張毛孔外塞則其身必癢故宜桂枝麻黃各半湯以期肌表雙解則一汗而愈矣太陽病初服桂枝湯反煩不解者先刺風池風府却與桂枝湯則愈風池穴在腦後風府在背脊第三節下凡風邪之中人必從腦後及背後輸入乘其虛也故俗稱仙人只怕腦後風太陽中風既服桂枝湯便當蒸發腠理之血液泌汁而成汗然不能直出於表藥力助血熱內張必有反煩不解之見證所以然者則以風邪從入之穴抑塞而不通也故但需刺二穴以瀉之更服桂枝湯便當汗出而愈矣所以然者則以此二穴最空虛為營分熱力所不達故初服桂枝湯而無濟也服桂枝湯大汗出脈不洪大者與桂枝湯如前法若形似瘧日再發者汗出必解宜桂枝二麻黃一湯此條訂正桂枝二麻黃一湯方桂枝一兩十七銖芍藥一兩六銖麻黃十六銖生薑一兩六銖杏仁十六枚甘草一兩二銖大棗五枚上七味以水五升先煮麻黃一二沸去上沫內諸藥煮取二升去滓溫服一升日再服服桂枝湯而大汗出設風邪即從汗解脈當和緩為其風邪去而營氣和也設大汗後不見洪大之脈而病仍不解則陽明未曾化燥故宜與桂枝湯如前法不妨一汗再汗此條與後一條為比例後條脈見洪大故宜白虎本條脈不洪大故仍宜桂枝傳寫者脫去不字耳若既服桂枝湯形似熱多寒少之瘧日再發而無定候但令營氣與衛氣和則一汗可愈然必用桂枝二麻黃一湯者則以營分之血熱勝於衛分之水氣故也服桂枝湯大汗出後大煩渴不解脈洪大者白虎加人參湯主之湯方載陽明篇治病之法愚者察同智者察異服桂枝湯大汗出與上節同而前證與桂枝湯如前法者為其脈不洪大且無煩渴之變證也夫大汗之後營陰苟略無耗損則當外安靜而內潤澤今乃心神煩冤大渴引飲則太陽寒水外盡陽明燥氣內張心營被灼故大煩胃液頓涸故大渴方用石膏知母以除煩生甘草粳米加人參以止渴而煩渴解矣此白虎湯加人參之旨也惟近世用人參多係種參吉林人以硫水溉之使易發生每含溫性似不如西洋參為適用然西醫稱其能補胃液北京産婦多服之則竟用遼參亦未為不合也太陽病發熱惡寒熱多寒少宜桂枝二越婢一湯脈微弱者此無陽也不可發汗此條訂正桂枝二越婢一湯桂枝芍藥麻黃甘草各十八銖大棗四枚生薑一兩二銖石膏二十四銖碎綿裹後倣此上七味以水五升煮麻黃一二沸去上沫內諸藥煮取二升去滓溫服一升此節為風寒兩感治法中風之確證在發熱傷寒之確證在惡寒熱多寒少則風重而寒輕師於是用桂枝二以解肌越婢一以解表便當汗出而愈設令寒多熱少麻黃重於桂枝不可言知越婢之有石膏又當在禁例矣按宜桂枝二越婢一湯句當在熱多寒少下今在節末實為傳寫之誤否則既云不可發汗猶用此發汗之藥有是理乎若夫脈微弱而無陽惡寒甚則宜乾薑附子湯不甚亦宜芍藥甘草附子湯此正可以意會者也服桂枝湯或下之仍頭項強痛翕翕發熱無汗心下滿微痛小便不利桂枝去桂加茯苓白朮湯主之小便利則愈桂枝去桂加茯苓白朮湯方芍藥三兩甘草二兩生薑白朮茯苓各三兩大棗十二枚上六味以水八升煮取三升去滓溫服一升服桂枝湯汗從肌腠外泄便當盡劑而愈或服湯已而汗出不徹或因表汗未泄而反下之則水氣當停心下水鬱於中則陽冒於上而頭項為之強痛翕翕發熱而無汗者停蓄之水不能作汗故也水停心下則心下滿而微痛水氣不行故小便為之不利方用芍藥甘草以舒頭項之強急生薑大棗溫中而散寒白朮茯苓去水而降逆但使水道下通則水之停蓄者得以舒泄而標陽之鬱於頭項及表分者散矣邪不陷於在背之經輸故不用升提之葛根水在心下而不在下焦故不用豬苓澤瀉去桂枝者則以本病當令水氣內消不欲令陽氣外張故也傷寒脈浮自汗出小便數心煩微惡寒腳攣急反與桂枝欲攻其表此誤也得之便厥咽中乾煩躁吐逆者作甘草乾薑湯與之以腹其陽若厥愈足溫者更作芍藥甘草湯與之其腳即伸若胃氣不和譫語者少與調胃承氣湯若重發汗復加燒針者四逆湯主之甘草乾薑湯方甘草四兩乾薑二兩上兩味以水三升煮取一升五合去滓分溫再服芍藥甘草湯方芍藥甘草炙各四兩上兩味以水三升煮取一升五合去滓分溫再服自汗出微惡寒為表陽虛心煩小便數腳攣急為裏陰虛蓋津液耗損不能濡養筋脈之證也表陽本虛更發汗以亡其陽故手足冷而厥裏陰本虛而更以桂枝發汗傷其上潤之液故咽中乾煩燥吐逆者乃陽亡於外中氣虛寒之象也故但需甘草乾薑湯溫胃以復脾陽而手足自溫所以不用附子者以四肢稟氣於脾而不稟氣於腎也其不用龍骨牡蠣以定煩燥吳茱萸湯以止吐逆者為中脘氣和外脫之陽氣自能還入胃中也此誤用桂枝湯後救逆第一方治而以復中陽為急務者也至於腳之攣急則當另治脾為統血之藏而主四肢血中溫度以發汗散亡不能達於上下故手足厥陽氣上逆至於咽乾吐逆則津液不降血不濡於經脈故腳攣急師為作芍藥甘草湯一以達營分一以和脾陽使脾陽動而營氣通則血能養筋而腳伸矣此誤用桂枝湯後救逆第二方治以調達血分為主者也芍藥通血之瘀故婦入腹中疾痛用之外證癰膿脹痛亦用之可以識其效力矣至於胃氣不和譫語重發汗燒針亡陽則於誤發汗外歧出之證治法又當別論夫胃中水穀之液充牣則潤下而入小腸胃中之液為發汗所傷則燥實不行壅而生熱穢熱之氣上衝於腦則心神為之蒙蔽而語言狂亂則稍稍用調胃承氣以和之若以發汗手足冷燒針以助其陽氣陽氣一亡再亡不獨中陽虛並腎陽亦虛乃不得不用四逆湯矣芍藥甘草湯並腸癰之右足不伸者用之亦效甲戌六月於陸家根驗之問曰證象陽旦按法治之而增劇厥逆咽中乾兩經拘急而譫語師言夜半手足當溫兩腳當伸從如師言何以知此答曰寸口脈浮而大浮為風大為虛風則生微熱虛則兩脛攣病形象桂枝因加附子參其間增桂令汗出附子溫經亡陽故也厥逆咽中乾煩燥陽明內結譫語煩亂更飲甘草乾薑湯夜半陽氣還兩足當熱脛尚微拘急重與芍藥甘草湯爾乃脛伸以承氣湯微溏則止其譫語故知病可愈此節申明上節之義示人治病之法當辨緩急也太陽中風發熱汗出惡風為桂枝湯證惟腳攣急不類按寒濕在下則足脛痠疼當用附子以溫腎却不知此證之自汗出為表陽虛心煩腳攣急為裏陰虛更用桂枝發汗則表陽更虛而手足冷汗出則裏陰更虛由是津液不足而咽乾血不養筋而拘急胃中燥而譫語但救逆當先其所急手足厥冷為胃中陽氣亡於發汗不能達於四肢故先用乾薑甘草湯以復中陽而手足乃溫脛拘急為血隨陽鬱不能下濡筋脈故用疏營分瘀滯之芍藥合甘緩之甘草使血得下行而濡筋脈而兩腳乃伸至如胃中燥熱而發譫語則為穢濁上蒙於腦一下而譫語即止故治法最後太陽病項背強几几無汗惡風葛根湯主之葛根湯方葛根四兩麻黃三兩芍藥二兩生薑二兩甘草二兩大棗十二枚桂枝二兩上七味以水一斗先煮麻黃葛根減二升去上沫內諸藥煮取三升溫服一升覆取微似汗太陽與陽明合病者必自下利葛根湯主之太陽與陽明合病不下利但嘔者葛根加半夏湯主之葛根加半夏湯方葛根湯加半夏半升洗太陽之氣衛外之陽氣也合營衛二氣為以為用者也氣之化為水者汗也故稱太陽寒水寒水者裏氣為表寒所化與病邪俱去之大轉機也服麻黃湯後所出之汗多冷此為明證設寒水不能外泄為汗鬱於經輸之內為強為痛陷於足陽明胃下泄而為利上泛而為嘔故必用升提之品將內陷之邪提出然後太陽寒水乃能從肌腠皮毛外泄而為汗此葛根湯之作用也獨怪近世庸工於大熱之陽明府證往往漫投葛根夫清陽明之熱自有白虎承氣二方安用此升提之品乎元人張潔古妄以為陽明仙藥並言邪未入陽明不可輕用不知桂枝加葛根湯及葛根湯二方果為邪入陽明設乎抑邪入陽明之後可更用麻黃桂枝以發皮毛肌腠之汗乎李時珍本草猶采其說真所謂大惑不解矣按次節自下利與首節下陷經輸同故但用葛根湯本方以升提之三節不下利但嘔為水氣上逆故加生半夏以抑之仲師所謂更納半夏以去水是也所謂同中求異也又按太陽陽明合病非太陽表證未罷即見潮熱渴飲不大便譫語之謂以太陽汗液不能暢行於表反入於裏與太陰之濕併居水氣甚則由胃入腸而成下利之證水氣不甚則滲入中脘胃不能受而成不下利而嘔逆之證不曰太陽與太陰合病而曰與陽明合病者一因下利由胃入腸一因水氣入胃胃不能受而病嘔逆病機皆假道陽明故謂與陽明合病也太陽病桂枝證醫反下之利遂不止脈促者表未解也喘而汗出者葛根黃芩黃連湯主之葛根黃芩黃連湯方葛根半斤甘草二兩黃芩三兩黃連三兩上四味以水八升先煮葛根減二升內諸藥煮取二升去滓分溫再服此節醫反下之至表未解也為一證喘而汗出者又一證太陽魄汗未盡誤下者利不止此與內陷之自利略無差別但仲師於此節鄭重分明歷來為注釋家所誤未能分析致仲師立言本旨如墮五里霧中今特為分析言之仲師曰脈促者表未解也表屬皮毛皮毛未解固不宜專用解肌之桂枝湯脈促即浮緊之變文曰表未解則仍為葛根湯證與上自下利證同法不言可知惟喘而汗出則陽熱內盛裏陰外泄乃為葛根芩連湯證其作用正在清熱而升陷注家含糊讀過妄謂喘而汗出即上所謂表未解夫豈有表未解而汗出者乎太陽病頭痛發熱身疼腰痛骨節疼痛惡風無汗而喘者麻黃湯主之麻黃湯方麻黃二兩桂枝二兩甘草一兩杏仁七十枚上四味以水九升先煮麻黃減二升去上沫內諸藥煮取二升半去滓溫服八合覆取微似汗不須啜粥餘如桂枝將息法寒從表鬱則裏熱無所發泄迫而上衝於腦即為頭痛太陽穴最空虛故受之最早血熱與外寒抗拒故發熱表寒甚則周身血液與水氣皆凝故身疼腰痛者太陽寒水不得通於下焦也一身骨節疼痛者水氣不能外散流入關節也表寒故惡風皮毛與肺氣俱閉故無汗而喘但病象雖多要以開泄毛孔使魄汗外達為不二法門但令肺氣外通則諸恙不治自愈此麻黃湯所以為傷寒之聖藥也獨怪近人畏忌麻黃徒以荊芥防風豆豉牛蒡等味敷衍病家病家亦以其平易而樂用之卒之愈疾之功不見鳴呼此醫道之所以常不明也太陽與陽明合病喘而胸滿者不可下宜麻黃湯太陽與陽明合病有寒水陷腸胃而下利者有水氣積於心下胃不能受而嘔逆者前文已詳言之矣惟太陽之表寒未徹陽熱內鬱肺氣不宣則上衝而喘太陽水氣積於心下胃不能受則病胸滿此證表寒為甚不可妄下下之必成結胸但令毛孔開泄胸膈間水氣悉化為汗而泄於皮外則水氣盡而胸滿除肺氣開而喘自定矣此其所以宜麻黃湯也太陽病十日以去脈浮細而嗜臥者外已解也設胸滿脅痛者與小柴胡湯脈但浮者與麻黃湯太陽病十日以去則已經過七日之期診其脈浮而細則標陽已衰嗜臥則表熱已退由躁而靜其為太陽解後不傳陽明可知若水氣留於心下而見胸滿水氣結於腎膀之上而見脅痛則為太陽水氣內陷故同一浮細之脈水氣由少陽三焦牽涉寒水之藏府則外仍未解寒水之藏屬足少陰故脈細此時雖無潮熱而太陽水氣未盡故仍宜小柴胡湯以解外故脈但浮而不細者水氣當在膈上而但見胸滿之證與上節麻湯證同不定牽涉足少陰而並見脅痛故不見少陰微細之脈此當於無字處求之者也太陽中風脈浮緊發熱惡寒身疼痛不汗出而煩燥者大青龍湯主之若脈微弱汗出惡風者不可服服之則厥逆筋惕肉瞤此為逆也大青龍湯方麻黃六兩桂枝二兩甘草二兩杏仁四十枚大棗九枚生薑三兩石膏如雞子大上七味以水九升先煮麻黃減二升去上沫內諸藥煮取三升去滓溫服一升取微似汗出多者溫粉撲之一服汗出者停後服傷寒脈浮緩身不疼但重乍有輕時無少陰證者大青龍湯發之此二節表明大青龍湯證治而並申言其禁忌也蓋此方與桂枝二越婢一湯同意但以杏仁易芍藥耳前以發熱惡寒為發於陽故雖脈浮緊身疼痛不汗出並同傷寒仲師尤以中風名之為其發於陽也惟其風寒兩感故合麻黃桂枝二方以期肌表兩解惟其裏熱為表寒所壓欲泄不得因而煩燥不安故加雞子大之石膏一枚如是則汗液外泄裏熱乘機迸出乃不復內鬱而生煩燥矣蓋表證為發熱惡寒身疼痛裏證為煩燥皆以不汗出為主要一身之毛孔受氣於肺肺在人身譬之發電總機總機停止則千百電機為之牽掣而俱停肺中一呼吸毛孔亦一呼吸今以風寒遏皮毛與肺以致表裏俱病故汗一出而發熱惡寒疼痛煩躁悉愈是何異總電機發而光焰四出也此首節用大青龍湯之義也若夫脈浮緩則其病在肌而不在表氣疏故身不疼寒濕沍於肌理不能作汗外泄故身重乍有輕時者此非外寒漸減實為裏熱之將盛肌裏為營血所居與統血之脾相應人之一身惟血最熱肌理不開裏熱易熾故亦宜大青龍湯發之脾藏之伏寒積濕悉化為汗從皮毛外出而裏熱自清蓋即本論所謂脈浮而緩手足自溫繫在太陰之證病機繫在太陰而發於太陽之肌腠故治法仍以太陽為標準此次節用大青龍湯之義也至如脈微弱則裏陰虛汗出惡風則表陽又虛更以發汗重傷其表陽則為厥逆裏陰虛者水液本不足供發汗之用而更用大青龍湯責汗於血則血不足以養筋濡分肉則裏陰重傷必且筋惕而肉瞤蓋脈微弱與脈微細者相近汗出惡風與惡風踡臥者亦相近此正為太陰將傳少陰之候合觀無少陰證者大青龍湯發之可以知所宜忌矣黃坤載補真武湯為救逆方治確有見地傷寒表不解心下有水氣乾嘔發熱而咳或渴或利或噎或小便不利少腹滿或喘者小青龍湯主之小青龍湯方麻黃桂枝芍藥細辛乾薑甘草各三兩半夏半斤洗五味子半斤上八味以水一斗先煮麻黃減二升去上沫內諸藥煮取三升去滓溫服一升若渴去半夏加栝蔞根三兩若微利去麻黃加蕘花如雞子大熬令赤色若噎去麻黃加附子一枚炮若小便不利少腹滿去麻黃加茯苓四兩若喘去麻黃加杏仁半斤去皮尖傷寒心下有水氣咳而微喘發熱不渴小青龍湯主之服湯已渴者此寒去欲解也此條訂正痰飲之源始於水氣水氣之病則起於傷寒使寒沍皮毛早服麻黃湯一汗之後表氣當從汗孔散出惟其失時不治寒水凝沍不出因與脾藏之濕合併而成飲水氣在胃之上口胃不能受則為乾嘔為咳為喘水氣下陷於十二指腸則為利為少腹滿水氣阻隔液不上承則為渴水合痰涎阻於上膈則食入而噎水和痰涎下走輸尿管中沾滯而不得暢行故小便不利間或水氣上行衝激肺藏而為微喘與咳或營氣為水邪所鬱而生表熱水氣上承喉舌因而不渴失時不治即為痰飲故小青龍湯為痰飲篇咳逆倚息之主方但令太陽水氣得溫藥之助作汗從毛孔外泄則心下水邪既盡津液不能獨存故服湯已而渴者為欲解但此條為不渴者言之耳若陽氣為水邪隔塞不得上至咽喉而渴得小青龍湯溫化必反不渴以水氣作汗外泄胃中津液以無所阻隔而上承也說見金匱苓甘五味薑辛湯條下太陽病外證未解脈浮弱者當以汗解宜桂枝湯發端但言太陽病原不能定其傷寒中風設傷寒發汗以後猶見有汗惡風之象即為外證未解要其為病在肌腠即與中風無別按其脈浮而弱浮為風邪外薄弱則血分熱度太低不能抵抗外邪故亦宜桂枝湯以助營分之熱但令熱度略高足以蒸化汗液則餘邪悉從汗解而病愈矣太陽病下之微喘者表未解故也桂枝加厚朴杏仁湯主之桂枝加厚朴杏仁湯方桂枝三兩甘草二兩生薑三兩芍藥三兩大棗十二枚杏仁五十枚厚朴二兩炙去皮後倣此上七味以水七升微火煮取三升去滓溫服一升覆取微似汗前文喘家用桂枝湯加厚朴杏子佳為酒客病言之也酒客則傷脾與肺固當加厚朴以燥脾藏之濕杏仁以疏肺藏之氣然究非正治特酒客病未曾化熱者宜之耳若已化熱其勢將成肺癰上節云不可與桂枝湯得之則嘔後節又云凡服桂枝湯嘔者其後必吐膿血可見雖加厚朴杏子猶非所宜也若本節太陽病下之微喘此方乃為正治蓋病在太陽原有因誤下而成痞成結胸者若下後不見壞病而但見微喘則病氣猶在肺與皮毛蓋傷寒表不解原有水停心下而喘宜小青龍湯者但微喘而不兼咳心下水氣甚微可決為非小青龍證此正與下後氣上衝可與桂枝湯同例究其所以喘者則以心下微有水氣肺氣不宣之故故於桂枝湯方中加厚朴杏仁以蠲微飲而宣肺鬱則汗一出而微喘定矣此桂枝加厚朴杏子所以為下後微喘之主方也太陽病外證未解不可下也下之為逆欲解外者宜桂枝湯太陽病先發汗不解而復下之脈浮者不愈浮為在外而反下之故令不愈今脈浮故知在外當先解外則愈宜桂枝湯此二節申言外證未解雖有陽明證不可下之之例太陽傷寒始病則在皮毛既而血熱與表寒戰勝熱發汗出便當痊可其不愈者則其病已在肌腠桂枝湯其主方也但病在肌腠至於發熱汗出其病已近陽明間有渴飲汗出而熱不解者設不明其病在肌腠而以承氣下之則肌腠凝沍之濕邪既不能隨下而盡而中氣一虛反以牽掣其外出之路故曰下之為逆若夫先發汗不解而見燥渴惡熱之陽明證於是本先汗後下之例復用承氣湯以下之設外邪已解直當一下而愈無如病者尚見浮脈浮脈在外故傷寒則見浮緊中風則見浮緩所以別於裏證也今病者反見浮脈故不當一下而愈所以然者以其人雖有陽明裏證風邪猶在肌腠裏熱反為外邪所吸雖用硝黃不得下行故曰當先解外則愈此正表解乃可攻裏之旨非謂必無裏證並非謂不可攻下也不然仲師但言解外即愈可矣何必曰先解外乎太陽病脈浮緊無汗發熱身疼痛八九日不解表證仍在此當發其汗麻黃湯主之服藥已微除其人發煩目瞑劇者必衄衄乃解所以然者陽氣重故也此條訂正太陽病脈浮緊發熱身無汗自衄者愈太陽病而脈見浮緊為傷寒本脈無汗身疼痛無論發熱與否俱為傷寒本病雖過經一二日雖發熱而脈證未變其為麻黃湯證確然無可疑者惟太陽傷寒始病則起於皮毛衛陽為表寒所困水氣不能外達因而無汗肌肉中血熱與之相抗血熱戰勝因而發熱但血分之熱度高低不等設令血中熱度僅足與表寒相抵則服麻黃湯後熱當隨汗而解設血中熱度太高雖服麻黃湯後表證略輕然以陽熱太甚之人驟得麻黃升發之力鬱熱必上衝於心而發煩上衝於腦而目為之瞑甚為顱骨為開血從骨縫中溢出從闕上下走鼻孔是為衄衄後其病方解所以然者血熱太勝不能悉從皮毛散故也至如血之熱度最高者雖不服麻黃湯亦能自衄而愈所以然者血與汗同源而異物故奪血者不可發汗瘡家不可發汗有金創者不可發汗以血去液少故也近日醫家以血為紅汗意即本此二陽並病太陽初得病時發其汗汗先出不徹因轉屬陽明續自微汗出不惡寒若太陽病證不罷者不可下下之為逆如此可小發汗設面色緣緣正赤者陽氣拂鬱在表當解之熏之若發汗不徹不足言陽氣拂鬱不得越當汗不汗其人躁煩不知痛處乍在腹中乍在四肢按之不可得其人短氣但坐以汗出不徹故也更發汗則愈何以知汗出不徹以脈澀故知也二陽並病與上太陽陽明合病同源而異證故有太陽水氣未能作汗外泄流入腸胃而成下利者有因汗液不徹水氣鬱於胃之上口而病嘔逆者以水氣不盡牽涉足陽明胃故謂之合病今以汗出不徹轉屬陽明其病亦由水氣內停非胃中有燥屎邪熱上薰腦部心神無所寄託而作譫語之證也亦非大實滿痛陽明支脈從腹下髀走伏兔者牽掣右膝臏而不良於行也雖續自汗出不惡寒時有陽明見象但兼有項背強汗出惡風諸證一經誤下反傷在裏之陽氣不能助之出表即前文所謂外證未解不可下下之為逆也此證當以發汗為正治但仲師言可小發汗而不出方治張隱庵以為桂枝麻黃各半湯似亦未當夫麻黃本為無汗惡寒而設豈有續自微汗出不惡寒而可用麻桂各半湯者其必為桂枝加葛根無疑也此為第一段設太陽標熱欲泄不得則必鬱而上浮視病者之面赤色漸次增加則較之微汗出不惡寒者證情殊異治法正自不同但需荊芥防風紫蘇殭蟲蟬衣等味煎湯薰其頭面陽氣之內鬱者當從汗解此為第二段又其甚者發汗時僅得微汗不足言汗出不徹陽氣以毛孔閉塞而拂鬱於皮毛及顏面者一時未易發泄本應用麻黃湯以發汗濡滯而不敢用藥則肌理營血之熱為表寒所遏熱度漸高即見躁煩太陽水氣與太陰之濕並居陽熱外張而寒濕內鬱至於不知痛處足太陰主腹亦主四肢故寒濕時注腹部時竄四肢而痛處迄無定在按之不可得者以其流走而不見停蓄者也皮毛不開肺氣阻塞故短氣氣短者臥即喘逆故但坐不得眠脾主肌肉亦主血今以水邪混於足太陰脾固當用桂枝湯以助脾陽而增血熱使在裏之濕邪悉從肌理外散則一汗而愈矣所謂更發汗則愈也以其脈澀因知其肌理為濕邪所阻而血熱不充以肌理血熱不充因知其不能解肌而汗出不徹此其所以宜桂枝湯也此為第三段須知汗出不徹而轉屬陽明與胃中燥熱者迥殊皆不當急於攻下此節雖曰二陽並病治法則仍以太陽為主也脈浮數者法當汗出而愈若下之身重心悸者不可發汗當自汗出乃解所以然者尺中脈微此裏虛須表裏實津液自和便汗出愈脈浮數為有熱證屬標陽實即肌腠血熱外抗所謂法當汗而愈已經發汗者即後文所謂脈浮數者可更發汗宜桂枝湯之證也未經發汗者即後文脈浮而數宜麻黃湯之證也若經誤下之後肌肉無陽氣而見身重營血虛而見心悸此正與亡血家不可發汗失精家不可發汗同例此證陽浮而陰弱不可急治當俟其陰氣漸復得與陽和乃能汗出而愈尺中脈微胞中血虛之徵故曰裏虛也此麻黃桂枝二湯證因表實裏虛津液不和而不能發汗者也浮脈緊者法當身疼痛宜以汗解之假令尺中遲者不可發汗何以知之然以營氣不足血少故也古人然字多有作曰字解者宋玉九辨亦用然字並同故有議扁鵲難經多用然字為僞書者則不明古訓之過也脈浮緊為寒束於表而血熱內抗法當身疼痛者則以寒傷肌肉之故此傷寒之脈證宜麻黃湯以汗之者也然尺中脈遲與前條尺中脈微正同尺中主下焦亦為胞中血少而不當發汗此亦在奪血者不可發汗之例此麻黃湯證因營氣不足而不可發汗者也脈浮者病在表可發汗宜麻黃湯脈浮而數者可發汗宜麻黃湯此節為裏氣不虛者言之故一見無汗身疼痛之證無論脈浮及脈浮數者皆可用麻黃湯以發之與下後身重心悸脈浮數而尺中微及未經誤下而尺中遲者固自不同也病嘗自汗出者此為營氣和營氣和者外不諧以衛氣不共營氣和諧故爾以營行脈中衛行脈外復發其汗營衛和則愈宜桂枝湯病人藏無他病時發熱自汗出而不愈者此衛氣不和也先其時發汗則愈宜桂枝湯此二節為病後餘邪不徹營氣弱而不能與衛氣相接言之蓋即金匱百合病見於陰者以陽法救之也自汗出為營氣和和之為言平也血分中熱度不高之說也血分熱度不高而病後餘濕尚凝沍肌理不能達於毛孔之外故力弱而不能與衛氣相接營氣行於肌肉由動脈而外出孫絡故曰營行脈中衛氣由六府淋巴管直達皮毛不在孫絡之內故曰衛行脈外衛氣自強故毛孔開而自汗營氣自弱故腠理凝沍之濕不能直達毛孔與淋巴管中排泄之廢料同出而俱散故汗出而病不愈要惟用辛甘發散之桂枝湯以助肌理之血熱但令血熱與出表之水氣同化則營衛和而病自愈矣此病後但見自汗如寒無寒如熱非熱病見於營陰之弱以陽法救之治也至如病人藏無他病時發熱自汗出而不愈者其病亦由營分之弱曰衛氣不和者為其淋巴管中水液自行排泄於毛孔之外而血分熱度太低不能排泄肌腠留戀之濕邪兩者不相和故營分久鬱而時發表熱但用桂枝湯於未發熱之時則血中熱度增高使肌肉中餘濕一時蒸化成汗與在表之水氣合併而出則營氣與衛氣混合為一而病自愈矣此病後兼見發熱自汗身形如和其脈微數病見於營陰之弱以陽法救之者也向與門人王慎軒論金匱百合病仲師所處七方皆在發於陽者以陰法救之之例而於發於陰者以陽法救之篇中闕而不備慎軒以為此二條足以當之頗為近理仲師所以不列於百合病者或以不用百合之故且欲留其不盡之旨使人於無字處求之也傷寒脈浮緊不發汗因致衄者麻黃湯主之傷寒為病脈浮緊無汗為一定不易之病理麻黃湯一方亦為一定不易之治法但陽氣太重之人有服麻黃湯後以衄解者亦有不待服麻黃湯而以衄解者似不發汗而致衄病當從衄解矣乃自衄之後脈之緊如故發熱惡寒無汗亦如故此麻黃湯證不為衄解而仍宜麻黃湯者與營虛不可發汗之證固未可同日語也傷寒不大便六七日頭痛有熱者與承氣湯其小便清者知不在裏仍在表也當須發汗若頭痛者必衄宜桂枝湯傷寒不大便六七日已及再經之期病邪將傳陽明六七日不大便而見頭痛發熱則已見陽明之證但陽明頭痛與太陽異太陽之頭痛在額旁太陽穴陽明頭痛在闕上兩眉間曰闕屬陽明病傳陽明故闕上痛痛則可與承氣湯惟大腸燥熱必蘊蒸輸尿管及膀胱而小便赤痛若小便清者則腸中無熱病邪尚在皮毛便當用麻黃湯以發皮毛之汗以病在肺與皮毛太陽寒水用事故小便清也若太陽標熱太盛上衝於腦則闕上或連太陽穴痛顱骨之縫以得熱而開必將血流鼻孔而成衄故頭痛者必衄所以然者以腠理不開而鬱熱上冒也用桂枝湯以發肌理之汗則汗一出而衄自止矣傷寒發熱已解半日許復煩脈浮數者可更發汗宜桂枝湯傷寒初病為麻黃湯證發汗已則其病當愈乃半日許忽然煩熱此非邪傳陽明正以肌腠餘邪未能盡隨汗解或由毛孔大開外風襲於肌理故也故宜桂枝湯以發之凡病若發汗若吐若下若亡血亡津液陰陽自和者必自愈此節言誤治亡津液者當俟其自愈以見庸工滋陰伐陽之不可為訓也蓋陰液之生根於陽氣若蒸氣然必俟爐中熾炭釜甑寒水乃得化氣上行設爐中無火僅恃無陽之寒水則生氣索然矣凡病若發汗若吐若下若亡血皆能耗損其津液但此為藥誤而非人體中燥熱所致故必靜以養之但得身有微汗口中不燥即為陰陽自和而病當自愈若急於養陰而妄投生地石斛西洋參麥冬之類陽氣被遏濕痰滋生病乃蔓延而不可治矣大下之後復發汗小便不利者亡津液故也勿治之得小便利必自愈凡病大下後則腸胃中淋巴管中乳糜必少加之以發汗更竭其皮毛肌腠之水液因致小便不利庸工不知病之出於汗下一見小便不利更用五苓散豬苓湯以利之重傷其津液此病之所以不愈也蓋此證當靜俟其小便自利而不當急治意與上節略同所謂以不治治之也下之後復發汗必振寒脈微細所以然者以內外俱虛故也下後則亡其裏陰復發汗則亡其表陽陰陽兩虛則必背毛懍然甚至惡寒而蜷臥按其脈必微細內外俱虛病乃延入少陰此為四逆湯證可於言外領取之下之後復發汗晝日煩躁不得眠夜而安靜不嘔不渴無表證脈沉微身無大熱者乾薑附子湯主之乾薑附子湯方乾薑一兩附子一枚生用去皮破八片後倣此上二味以水三升煮取一升去滓頓服此節為汗下後虛陽外越之證與下婦人傷寒經水適來之證適得其反陰血實則其病在營營氣夜行於陽故晝日明了夜則譫語如見鬼狀陽氣虛則其病在衛衛氣晝行於陽虛陽隨之俱出故晝日煩躁不得眠夜而安靜陰實者泄其熱陽虛者溫其寒但按其證情不嘔不渴則內無實熱可知身無大熱其為虛熱又可知脈沉而微則少陰虛寒孤陽不歸其根也故宜乾薑附子湯以溫寒水之藏但令蒸氣漸復虛陽得所依附乃不至蕩而無歸而煩躁自愈矣發汗後身疼痛脈沉遲者桂枝加芍藥生薑人參新加湯主之桂枝加芍藥生薑人參新加湯方桂枝三兩芍藥四兩甘草二兩人參三兩大棗十二枚生薑四兩上六味以水一斗二升煮取三升去滓溫服一升傷寒身疼痛以寒邪由表及肌傷其孫絡血絡不通之故故但須麻黃湯發汗肌表通徹而疼痛自止至如發汗後之疼痛則其病專屬肌腠汗液發泄血液加少分肉中孫絡乃凝滯而不通所謂不通則痛也試觀癰疽之發見於何部分即痛在何部分此無他血絡不通故也又如趺打損傷傷在何處即痛在何處亦血絡不通故也夫脈尺中遲為營氣不足為血少前於脈浮緊法當身疼痛條下既詳言之今乃脈見沉遲其為汗後營氣不足及血少確為信而有徵但前條既云不可發汗矣今乃用桂枝人參新加湯得毋犯發汗之禁乎不知未發汗時禁其發汗懼傷陰也既發汗而疼痛又不可不稍發汗以和之為業經傷陰而救正之也譬之安靜無事則無寧不生事既生事則當務息事新加湯方惟桂枝甘草大棗劑量同桂枝湯蓋桂枝湯原方本為宣發脾陽而設今加人參以增胃液胃主肌肉脾亦主肌肉但使胃液內生脾陽外散更倍通瘀之芍藥散寒之生薑引在內之津液貫輸孫絡而略無阻礙則肌肉之疼痛可愈矣癰疽疼痛重用赤芍者意與此同蓋必孫絡通而疼痛方止也發汗後不可更行桂枝湯汗出而喘無大熱者可與麻黃杏仁甘草石膏湯主之麻黃杏仁甘草石膏湯方麻黃四兩杏仁五十枚甘草二兩石膏半斤上四味以水七升煮麻黃減二升去上沫內諸藥煮取二升去滓溫服一升發汗後半日許復煩脈浮數者可更與桂枝湯以發汗此為皮毛開而肌理閉塞者言之也今乃云不可更行桂枝湯得毋自相刺謬乎曰否蓋發汗之後汗已中止外證乃在故乃宜桂枝湯以解外若服麻黃湯後汗出而喘豈有更行桂枝湯之理此本無待煩言者仲師言此特欲辨發汗後更見何證耳使汗出而喘壯熱不解則為胃熱上衝肺部而喘病邪已屬陽明直可決為白虎湯證惟其身無大熱而喘仍為肺氣不宣故宜麻杏石甘湯麻黃湯去桂枝以疏達肺氣加石膏以清裏熱則表裏和而喘定矣發汗過多其人叉手自冒心心下悸欲得按者桂枝甘草湯主之桂枝甘草湯方桂枝四兩甘草二兩上二味以水三升煮取一升去滓溫服發汗後其人臍下悸者欲作奔豚茯苓桂枝甘草大棗湯主之茯苓桂枝甘草大棗湯方茯苓半斤桂枝四兩大棗十五枚甘草四兩上四味以甘瀾水一斗先煮茯苓減二升內諸藥煮取三升去滓溫服一升日三服作甘瀾水法取水二斗置大盆內以杓揚之水上有珠子五六千顆相逐取用之水氣淩心為悸傷寒金匱之通例也發汗過多虛其心陽水氣乘虛上僭則心下悸欲得按若於發汗之後虛陽上吸牽引水邪上僭臍下悸欲作奔豚病雖不同其為水邪上僭則一故心下悸欲得按則用桂枝甘草湯臍下悸欲作奔豚則用茯苓桂枝甘草大棗湯皆所以培養脾胃而厚其堤防使水氣不得上竄但此二方皆為汗後正虛救逆之法而非正治是故金匱痰飲篇心下痞膈間有水氣眩悸者則宜小半夏加茯苓湯臍下悸吐涎沫顛眩者為有水則宜五苓散直折其水氣而使之下行病根已拔更無須甘溫補中此虛實之辨也心動悸則用炙甘草湯此證心下悸甘草亦當炙發汗後腹脹滿者厚朴生薑甘草半夏人參湯主之厚朴生薑甘草半夏人參湯方厚朴炙半斤生薑半斤半夏半斤甘草二兩人參一兩上五味以水一斗煮取三升去滓溫服一升日三服發汗之傷血傷津液前文屢言之矣但傷血傷津液其病在標標病而本不病故仲師不出方治而俟其自愈至於發汗後腹脹滿傷及統血之脾藏其病在本此即俗所謂脾虛氣脹也脾虛則生濕故用厚朴生薑半夏以去濕脾虛則氣不和故用甘草以和中脾虛則津液不濡故用人參以滋液西醫謂人參能滋胃液然北京婦人産後多有三朝以後即服吉林參眠食俱安可見胃為生血之源補胃即所以補血也則水濕下去中氣和而血液生汗後之腹脹自愈矣傷寒若吐若下後心下逆滿氣上衝胸起則頭眩茯苓桂枝白朮甘草湯主之脈沉緊發汗則動經身為振振搖者真武湯主之此條訂正茯苓桂枝白朮甘草湯方茯苓四兩桂枝三兩白朮甘草各二兩上四味以水六升煮取三升去滓分溫三服苓桂朮甘為痰飲主方心下逆滿氣上衝胸起則頭眩為水氣淩心此與痰飲篇胸脅支滿目眩苓桂朮甘湯主之者其病正同惟發汗動經身瞤動振振欲劈地者即後文真武湯證蓋發汗陽氣外泄水氣乘虛而上則為頭眩陽氣散亡氣血兩虛故氣微力弱不能自持而振振動搖若欲傾仆者然然則本條茯苓桂枝白朮甘草湯主之當在頭眩之下發汗動經身為振振搖者下當是脫去真武湯主之五字蓋汗出陽亡正須附子以收之也況脈之沉緊正為腎氣虛寒乎此與後兩條用附子同例張隱庵乃謂振振搖為中胃虛微振振欲劈地為心腎兩虛不知何所依據而強分二也發汗病不解反惡寒者虛故也芍藥甘草附子湯主之芍藥甘草附子湯方芍藥甘草各三兩附子一枚炮上三味以水五升煮取一升五合去滓分溫三服發汗病不解未可定為何證也汗大出惡熱則為白虎湯證外證不解汗出惡風則仍宜發汗為桂枝湯證若反惡寒者則為營氣不足血分中熱度太低不能溫分肉而濡皮毛故反惡寒芍藥甘草湯在誤服陽旦湯條下原為血不養筋兩腳攣急疏導營血下行之方治今微絲血管中血熱不充至於不能抵禦外寒故用芍藥甘草以疏達營血使得充滿於微絲血管中更加熟附子一枚以助之使血分中熱度增高而惡寒之證自愈發汗若下之病仍不解煩躁者茯苓四逆湯主之茯苓四逆湯方茯苓四兩人參一兩附子一枚生甘草二兩乾薑兩半上五味以水五升煮取三升去滓溫服七合日三服發汗若下後病仍不解津液之不足要為理所必至使津液不足而胃中燥熱是必渴欲飲冷而為白虎湯證惟胃液燥於中水氣寒於下絶無蒸氣以相濟則胃中燥氣上薄心藏而厭聞人聲畏見生客時怒小兒啼哭或忽喜觀覽書籍不數行輒棄去是之謂煩陽氣在上下焦水液不能與之相接謂之火水未濟水不得陽熱蒸化則不溫不溫則陽熱獨抗於上此時欲臥不得欲坐不得欲行不得反覆顛倒頃刻間屢遷其所而手足不得暫停是之謂躁此時用茯苓人參增胃液以濡上燥合四逆湯以溫下寒而發其蒸氣使蒸氣與胃液相接則水火既濟而煩躁愈矣愚按煩躁不定係少陰陰虛陽氣外浮故煩躁此與上文晝日煩躁夜而安靜者並責之虛但前證陰虛不甚故不用人參而但用乾薑附子湯此證陰虛太甚故用人參為小異耳發汗後惡寒者虛故也不惡寒但熱者實也當和胃氣與調胃承氣湯此節借上乾薑附子桂枝甘草湯證以見調胃承氣湯證惡寒與熱之絶不相類也汗後惡寒為虛惡熱為實虛寒者當溫實熱者當瀉此意最為平近初學者能辨之太陽病發汗後大汗出胃中乾煩躁不得眠欲得飲水者少少與飲之令胃氣和則愈若脈浮小便不利微熱消渴者五苓散主之五苓散方豬苓十八銖澤瀉一兩六銖白朮十八銖茯苓十八銖桂枝半兩上五味搗為末以白飲和服方寸匕日三服多飲暖水汗出愈發汗後大汗出則胃中津液必少故有胃實惡熱而宜調胃承氣湯者若但見煩躁不得眠欲得飲水則僅為胃中乾燥而非胃中之實故但須稍稍飲之以水而胃中自和煩躁自愈若脈浮小便不利微熱消渴則為大汗之後浮陽張發於外輸尿管中水氣被吸不得下行如是則宜五苓散以利小便但使水道下通而陽氣得以還入胃中和其入胃之水飲而消渴自愈此正與痰飲心下有水氣而渴服乾薑細辛而反不消渴者同例方治後多飲暖水汗出愈七字與本證不合或傳寫之誤也發汗已脈浮數煩渴者五苓散主之傷寒汗出而渴者五苓散主之不渴者茯苓甘草湯主之茯苓甘草湯方茯苓二兩桂枝二兩甘草一兩生薑三兩上四味以水四升煮取三升去滓分溫三服發汗汗出淋巴管中水液隨陽氣盡發於外故有脈浮數而煩渴者亦有不待發汗汗出而渴者自非引水下行則在表之水液必不能還入胃中故皆宜五苓散若汗出而不渴則胸中陽氣尚不為水邪所遏而津液猶能還入胃中故但用茯苓甘草湯使肌理中營氣與皮毛之衛氣相接而其汗自止蓋此證汗出亦由營弱衛強與病常自汗出用桂枝湯略同故處方亦略同桂枝湯也中風發熱六七日不解而煩有表裏證渴欲飲水水入則吐者名曰水逆五苓散主之中風證發於陽血分熱度本高故未有不發熱者六七日則已過六日一候之期不解而煩有表裏證則已由太陽而傳陽明故有渴欲飲水之證然水入則吐則水氣內阻津液不生非由胃中燥熱所致故名水逆水逆者下流壅塞也故必利其水然後陽氣始得外散不復如從前鬱熱之不解矣未持脈時病人叉手自冒心因教試令咳而不咳者此必兩耳聾無聞也所以然者以重發汗虛故如此未持脈時病人叉手自冒心其為心下悸不問可知蓋發汗過多原自有虛其心陽水氣淩心心下悸而欲得按者即上所謂桂枝甘草湯證也師因教令咳者蓋欲辨其水氣之虛實假令咳而吐涎沫即為水氣實則直可決為小半夏加茯苓湯證病者置之不答則其為耳聾無疑蓋發汗後虛陽上出於腦兩耳氣閉故聾此非於桂枝甘草本方中重用龍骨牡蠣以降浮陽聾必不治而心下之水氣為虛正可不治自愈矣發汗後飲水多必喘以水灌之亦喘肺中一呼吸皮毛亦一呼吸發汗後肺與皮毛俱為陽熱張發是必有燥渴惡熱之表證使病家不知為標陽而誤為裏熱於是渴而飲冷則陽熱遏入肺藏而為喘惡熱而灌以冷水則陽熱之在皮毛者亦以被遏入肺藏而為喘水氣外加標熱反入於裏是與發汗後汗出而喘同例當與麻黃杏仁甘草石膏湯一以開肺與皮毛一以清內陷之標熱而喘自定矣發汗後水藥不得入口為逆若更發汗必吐不止此條訂正發汗後陽氣外浮不能消水水入則吐要惟大小半夏湯足以降逆而和胃若胃中虛寒則乾薑甘草湯吳茱萸湯皆可用之此證忌更發汗要無庸議發汗則水氣隨陽熱而張發於上吸胃中水液俱上傾吐而不可止此理可通者也若淋巴管中水液既傷於汗又傷於吐陽氣獨張於上而水液內亡豈有反病下利不止之理蓋下利一證必水濕有餘之證也然則此下字必傳寫之誤當訂正之毋以必不可通之說貽仲師纍發汗吐下後虛煩不得眠若劇者必反復顛倒心中懊憹梔子豉湯主之若少氣者梔子甘草豉湯主之若嘔者梔子生薑豉湯主之梔子豉湯方梔子十四枚香豉四合綿裹餘倣此上二味以水四升先煮梔子得二升半內豉煮取升半去滓分溫二服梔子甘草豉湯方梔子十四枚甘草二兩香豉四合上三味以水四升先煮梔子甘草取二升半內豉煮取升半去滓分溫二服梔子生薑豉湯方梔子十四枚生薑五兩香豉四合上三味以水四升先煮梔子生薑取二升半內豉煮取升半去滓分溫二服發汗吐下後津液消耗在表之浮陽不收在裏之餘熱不去則鬱結而生虛煩甚則眠不得安心中懊喪不能自言其所苦然究為病後餘邪故開表發汗不待麻黃桂枝但用香豉已足清裏不待葛根芩連但用梔子已足則表裏餘邪並去而虛煩愈矣若夫無氣則加甘草嘔則加生薑其所以無氣所以嘔者正需研核而始見四肢肌肉俱稟氣於胃胃中少氣則四肢為之無力一身肌肉為之重滯所謂無氣以動也其病皆由汗吐下後胃氣空虛故於解表清裏外佐以補中之甘草胃中膽汁上逆則嘔濕邪入胃胃不能受則亦嘔此證之嘔要以汗吐下後胃中虛寒故於解表清裏外加生薑以散其微寒而其嘔亦止矣發汗若下之而煩熱胸中窒者梔子豉湯主之傷寒五六日大下之後身熱不去心中結痛者未欲解也梔子豉湯主之吐下後而煩熱與大下後身熱不去同皆因液虛之後津液不能外出皮毛標熱留而不去也蓋在外之標陽以汗液和之則散然液虧之人又不能用發散峻劑故但用香豉而已足津液內亡是生裏熱於是氣壅上膈則胸中窒甚則心中熱但病後餘熱與實熱不同故但用生梔子十四枚而已足在表者散而去之在高者引而下之而病後之餘邪自解矣傷寒下後心煩腹滿臥起不安者梔子厚朴湯主之梔子厚朴湯方梔子十四枚厚朴四兩枳實四枚炒水浸去穰後仿此上三味以水三升半煮取一升半去滓分溫二服傷寒醫以丸藥大下之身熱不去微煩者梔子乾薑湯之主梔子乾薑湯方梔子十四枚乾薑二兩上二味以水三升煮取升半去滓分溫二服以上二節皆為病後有表裏證言之也若但有裏證而不兼表證香豉之發散要在必去之例但裏證各有不同借如傷寒下後心煩腹滿臥起不安則為濕熱餘邪留於腸胃鬱熱上薄心藏則心煩濕與熱壅阻於腹部欲下行而不得故臥起不安方用梔子以降之厚朴以燥之枳實以通之則大便通而上煩下滿除又如以丸藥大下後身熱不去而微煩則未下之先原有表熱表熱不為下後而減加之以心煩一似實熱在裏當用涼解者如白虎湯葛根芩連湯竹葉石膏湯之類皆是不知下為大下脾陽必以下陷而虛寒浮熱之在表者既不得脾津以相接而為之和洽故用乾薑蓋所以溫脾而生津若蒸氣四出者然使得和表也虛陽張於上而心為之煩故用生梔子以降之蓋所以定心氣而抑虛煩也此又腸胃無濕熱之治法也凡用梔子湯病人舊微溏者不可與服之梔子味苦而主泄能使脾濕下陷故病人舊微溏者不可與服今人動以梔豉湯為吐劑夫探吐之劑當從口出豈有反能下瀉者其謬一第一節言汗吐下後之餘邪豈有吐後虛煩而更吐之理其謬二況嘔逆者加生薑以止之豈有吐劑而反能止嘔者其謬三蓋舊本方治後有得吐止後服五字此因瓜蒂散中有香豉而誤張隱庵本刪之具見特識為標出之太陽病發汗汗出不解其人仍發熱心下悸頭眩身瞤動振振欲劈地者真武湯主之太陽與少陰為表裏太陽為寒水之經外主皮毛內統上中二焦西醫謂之淋巴管為水液所出少陰為寒水之藏膀胱為寒水之府屬下焦西醫謂之尿管又名淋巴系統為水道所自出發汗不解則少陰腎氣為浮陽所吸水氣淩心故心下悸水在心下故陽不歸根而頭眩身瞤動振振欲劈地者上實下虛故痿弱不支諺所謂頭重腳輕也此為表汗太過少陰上逆之證故非用炮附子一枚溫其腎氣使三焦水液化蒸氣外出皮毛上及頭目不足以收散亡之陽非利水之茯苓白朮不足以遏心下之水非芍藥生薑疏營之瘀而發其汗液不足以殺其水氣此太陽篇用真武湯之義也少陰病情與此相反所以同一方治者詳少陰篇中咽喉乾燥者不可發汗咽喉為肺胃之門戶肺主皮毛而胃主肌肉汗之自內出者一由肺氣外泄出之皮毛一由脾輸胃中水穀之液出之肌理咽喉乾燥則肺胃精液本自虧損一經發汗淋巴管中乳糜盡涸其燥益不可支甚則肺熱葉焦而成痿躄不甚則唇口焦黑而譫語此不可發汗之由於肺胃液虧者也高士宗乃謂心系入肺上挾咽咽乾而燥為心血虛腎脈入肺中循喉嚨喉乾為腎虛心腎精血皆虛故不可發汗吾不信咽喉之滋溉果恃此心腎二脈乎抑猶重恃肺胃之液乎究之愈精微則愈迂遠不切學者誤從其說則終身迷罔矣淋家不可發汗發汗必便血凡津液虧耗之人強責其汗陽氣外張必動其血風溫火劫發汗微發黃色此即津液不足借血液為汗血色外見之明證淋家陰液日損萬難供作汗之用強責其汗必由寒水府藏牽動胞中血海是故全體液虧而責其汗則肌理之血液外泄而發黃下部液虧而責其汗則胞中血傷而見便血要其為液虧不能作汗則一也瘡家雖身疼痛不可發汗汗出則痙傷寒為病甚者寒從皮毛直入凝沍肌肉一身肌肉為之疼痛非用大劑麻黃湯興發血中之熱度則疼痛不止惟瘡家膿血太多不能再行發汗發汗則肌肉中營血不足以資營養筋脈剛燥而為痙故雖身疼痛止宜薰洗而不當發汗蓋薰洗從外治自能得微汗而解薰洗之方可用紫蘇乾薑烏頭紅花桂枝赤芍衄家不可發汗汗出必額旁陷脈緊急目直視不能眴不得眠此條訂正傷寒入於營分始見發熱初犯皮毛固無熱也但皮毛不開血分熱度增高不能從毛孔泄則上衝於腦顱骨受陽熱薰灼則骨縫開而腦中血出由闕上下走鼻孔是為衄此不發汗而致衄者所以發其汗則愈也若夫衄家則未病時已屢見衄不因失表而見與不發汗而致衄者不同故與淋家瘡家並有發汗之戒脈緊急者陽氣以發汗而愈張目直視不能眴津液亡而目系燥也此與溫病誤下直視同惟額上陷三字殊不可通額上顱骨覆冒處不似無骨之處易於下陷豈有病衄之人一汗而陷之理愚按上字為旁字之誤指兩太陽穴嘗見久病勞瘵之人形脫肉削兩太陽穴下陷不起年老之人氣血兩虛者亦然則夫衄家發汗一虛再虛宜其形脫肉削而額旁陷也余治金匱知額字為顴之誤蓋顴上即太陽穴也亡血家不可發汗發汗則寒栗而振人之一身惟血最熱少年血盛則耐寒老年血衰則畏寒孟子言五十非帛不暖者血虛故也婦人血敗雖當盛暑亦必寒戰此其明驗也故無論吐血衄血便血及婦人崩漏其體必屬虛寒至如亡血而身熱則裏陰不能抱陽陽蕩而無歸矣至是更用涼血之藥十不活一所以然者為其陰中之陽氣一戕於亡血再戕於涼藥故也明乎此乃可與言亡血家之不可發汗夫亡血家血中陽熱雖暴經摧抑表陽尤未虛也按華氏寒暑表九十五度謂之血溫若更發汗外則虛其表陽內則重傷其血之溫度有不寒栗而振乎空室無人居炎夏生晝寒由其動氣少而中陽虛也豫嘗治宋姓婦人血崩惡寒蒙被而臥用大熟地四兩生潞參三兩陳皮五錢一劑手足溫二劑血崩止初未當用附桂之屬蓋血分充則陽氣自復意寒栗而振者亦當如是耳豫亡友丁甘仁常用附子理中湯以治血證非深明此理者不足與言亡血之治法也汗家重發汗必恍惚心亂小便已陰疼宜大承氣湯此條訂正汗家非中風有汗之證中風之證當云風家汗家云者以陽明多汗言之也陽明有餘之證復發汗以劫胃中之液則胃中燥氣上薄於腦而心神為之不寧按人之思索事理必仰其首或至出神而呼之不應心神有所專注凝定而不散也若胃中燥熱上薄則心神所寄欲靜而不得於是恍惚心亂遂發譫語則論中恍惚心亂四字直以譫語當之所謂胃中水竭必發譫語也後文又云小便已陰疼蓋汗後重發汗必大腸燥實燥氣薰灼於前陰故小便短赤而陰疼此為大承氣的證豫親驗者屢矣後文宜禹餘糧丸五字實為下利證脫文與本篇利在下焦用赤石脂禹餘糧湯同例不知者誤移於此藥為止澀之藥喻嘉言常用之以治下利歷來注家強作解人不可從病人有寒復發汗胃中冷必吐蛔文曰病人有寒復發汗胃中冷必吐蛔師但言病人有寒而不言寒之所在然即繼之曰復發汗胃中冷必吐蛔可知寒邪即在胃中非用乾薑以溫之反用桂枝湯劫其汗致胃中之胰液饞涎並胃底消穀之膽汁一泄無餘由是胃中虛冷蛔乃不安而上竄金匱所謂藏寒此即證也主治者為烏梅丸雖有黃連黃柏之苦寒方中溫胃之藥居其太半所禁為生冷滑臭其為胃中虛寒灼然無疑獨怪編醫宗金鑒者何所見而必改此非藏寒也又按胃中熱度甚於熾炭水飲入胃即從淋巴細管中化氣四散而出惟熱度漸低乃病留飲濕之所聚蟲病乃作飲家所以多嘔也此為胃中虛冷後蔓延之證學者不可不知本發汗而復下之此為逆也若先發汗治不為逆本先下之而反汗之為逆若先下之治不為逆傷寒成例先解其表而後攻其裏所以然者為其水液未盡而遽下之不病結胸必有利下不止之變也至於溫病有時與傷寒相反太陽未解腸胃已化熱化燥若更先行發汗表裏燥熱甚有燔灼而死者故吳又可溫疫論以大承氣為第一主方吾亡友丁甘仁稱其得仲景遺意即此節言之蓋溫病本當先下而先發其汗為逆先下之反不為逆也此傷寒溫病論治之不同也傷寒醫下之續得下利清穀不止身疼痛者急法救裏後身疼痛清便自調者急當救表救裏宜四逆湯救表宜麻黃湯此條訂正傷寒下後續得下利清穀此本太陽表證誤下本氣之寒陷入腸胃之證也太陽傷寒身必疼痛以寒傷皮毛肌腠津液凝沍血絡不通之故蓋即上節本發汗而醫反下之之證也但既經誤下表證仍在裏證復起法當先救其裏而後救其表所以然者一因裏寒下陷有生命之虞一因水氣在下雖經發汗汗必牽制而不出又恐一汗而陰陽離決將有虛脫之變也若但身疼痛而絶無裏證自當以解表祛寒為急而絶無可疑此皆初學之人不待煩言而自解者惟體痛為傷寒的證他病所無故身疼痛腰痛骨節疼痛麻黃湯主之脈浮緊者法當身疼痛宜以汗解之師雖未出方治其為麻黃湯證決然無疑金匱痙濕暍篇云風濕相摶一身盡疼痛法當汗出而解又云濕家身煩疼可與麻黃加朮湯發其汗又云病者一身盡痛日晡所劇者可與麻黃杏仁薏苡甘草湯則身疼痛之當用麻黃已可類推況本論又云桂枝本為解肌若其人脈浮緊汗不出者不可與之則身疼痛而急當救表之證身必無汗脈必浮緊桂枝湯正在禁例何得反云宜桂枝湯故知仲景原文必云救表宜麻黃湯厥陰篇與此同學者讀仲景書不觀其通一切望文生訓一旦用之失當反令活人方治不能取信於病家此真與於不仁之甚也病發熱頭痛脈反沉若不差腹中疼痛當救其裏宜四逆湯此條訂正病發熱頭痛其病在表則其脈當浮而脈反見沉則表證當減為血分之熱度漸低而表熱當除頭痛當愈也此理之可通也惟後文所云若不差身體疼痛當救其裏宜四逆湯則大誤矣夫身體疼痛為麻黃湯證即上節所謂急當救表者豈有病表而反救其裏之理愚按身體疼痛四字實為腹中疼痛之誤寒邪入腹故脈沉如此乃與宜四逆湯四字密合無間自來注家遇此等大疑竇猶復望文生訓坐令仲師醫學失傳可歎也太陽病先下而不愈因復發汗以此表裏俱虛其人因致冒冒家汗出自愈所以然者汗出表和故也得裏未和然後復下之太陽病本不應下先行誤下裏氣先虛因復發汗表氣再虛然下後之發汗水氣業經下陷有所牽制雖發汗而汗必不暢於是陽氣不得暢行於表而鬱冒於上必待汗液大泄而鬱冒始解所以然者皮毛既開陽氣之鬱冒於上者始得散布而出也故治病之要病在表者當先解表表解後見裏未和然後用承氣湯以下之若清便自調者則一汗可愈無容再議攻下矣太陽病未解脈陰陽俱微必先振栗汗出乃解但陽脈微者先汗出而解但陰脈微者下之而解若欲下之宜調胃承氣湯此條訂正師言太陽病未解初未嘗言欲解也脈陰陽俱停不可通停實微字之誤玩下文但陽脈微但陰脈微兩層其誤自見按脈法云脈微而解者必大汗出又曰脈浮而緊按之反芤此為本虛當戰而汗出也浮緊為太陽本脈芤則為營氣微微則血中熱度不高陽熱為表寒所鬱不能外達必待正與邪爭而見寒戰乃能汗出而愈脈陰陽俱微者氣血俱微即脈法所謂本虛也至如但陽脈微者陰液充足易於蒸化成汗故先汗出而解但陰脈微者津液不足中脘易於化燥故下之而解也張隱庵不知停字為微字之誤漫以均字釋之並謂表裏之氣和平不知正氣內微勉與表寒相抗至於振栗然後發熱汗出而解一似瘧發之狀其表裏之不和平顯然可見則張注不可通也脈法又云脈大而浮數故知不戰汗出而愈所以然者以陽氣本旺表寒不能相遏故能不待寒戰自然汗出而解此正與陰陽俱微相反病之當戰汗出而解與不待戰而自汗解者可以得其標準矣太陽病發熱汗出者此為營弱衛強故使汗出欲救邪風者宜桂枝湯邪風即飲酒當風汗出當風所受之風邪邪乘皮毛之開內襲肌理肌理閉塞而孫絡中血熱與之相抗因而發熱血熱內蒸皮毛不閉故汗常出此即太陽中風之本病此節所謂營弱衛強者即肌理不開皮毛獨疏之謂非於中風之外別有所謂邪風也又按脾為統血之藏外主肌肉肌理為孫絡叢集之處而為裏陰從出之道路故謂之營西醫所謂微絲血管也惟其營弱故裏汗閉而不出惟其衛強故表汗獨泄也傷寒五六日中風往來寒熱胸脅苦滿默默不欲飲食心煩喜嘔或胸中煩而不嘔或渴或腹中痛或脅下痞硬或心下悸小便不利或不渴身有微熱或咳者小柴胡湯主之小柴胡湯方柴胡半斤黃芩人參甘草炙生薑各三兩半夏半升大棗十二枚上七味以水一斗二升煮取六升去滓再煎取三升溫服一升日三服若胸中煩而不嘔者去半夏人參加栝蔞實一枚若渴者去半夏加人參合前成四兩半加栝蔞根四兩若腹中痛者去黃芩加芍藥三兩若脅下痞硬去大棗加牡蠣四兩若心下悸小便不利者去黃芩加茯苓四兩若不渴外有微熱者去人參加桂枝三兩溫覆取微汗愈若咳者去人參大棗生薑加五味子半升乾薑二兩從來治傷寒者凡見小柴胡證莫不以少陽二字了之試問所謂少陽者手少陽乎抑足少陽乎竊恐仲師而後無有能言之者此正中醫不治之痼疾貽笑於外人者也吾謂此當屬手少陽三焦手少陽三焦唐容川概謂之網油非也內經云上焦如霧中焦如漚下焦如瀆如霧者淋巴管中水液排泄而出已化為氣未受鼻竅冷空氣者也如漚者淋巴管中始行排泄之水液含有動氣者也如瀆云者即腎與膀胱之淋巴系統西醫直謂之輸尿管水由腎藏直接膀胱而外泄故內經謂之決瀆之官蓋太陽之脈夾脊抵腰中而三焦直為太陽寒水之徑隧如瀆之下焦即從腰中下泄太陽之府此可見太陽之病關於少陽者三焦為之主也本節所列證象全係夾濕太陽汗液不能透發留著皮裏膜外濕甚則生表寒血熱內亢是生表熱故其病為往來寒熱胸脅苦滿默默不欲飲食心煩喜嘔者氣為濕阻柴胡以散表寒黃芩以清裏熱濕甚生痰則胸脅滿故用生薑生半夏以除之中氣虛則不欲飲食故用人參炙甘草大棗以和之此小柴胡湯之大旨也胸中煩而不嘔是濕已化熱故去半夏人參加栝蔞實以消胃中宿食而濕熱清矣若渴者津液少也故去半夏加人參栝蔞根以潤之腹中痛則寒濕流入太陰而營分鬱故去苦寒之黃芩加疏達血分之芍藥以和之脅下痞硬下焦不通而水逆行也故去滋膩之大棗用牡蠣以降之心下悸小便不利是為水氣淩心故去黃芩加茯苓以泄之不渴外有微熱者內有濕而表陽不達也故去人參加桂枝以汗之咳者濕勝將成留飲也故去人參大棗之培補加五味乾薑以蠲飲血弱氣盡腠理開邪氣因入與正氣相摶結於脅下正邪分爭往來寒熱休作有時默默不欲飲食藏府相連其痛必下邪高痛下故使嘔也小柴胡湯主之服柴胡湯已渴者屬陽明也以法治之太陽部分為肌表兩層表氣統於手太陰肺衛氣所從出也肌腠統於足太陰脾營氣所從出也營衛兩傷不獨表氣不固肌理亦不密病邪直薄太陽陷於脅下脅下者寒水之藏所居也正氣從裏出表與外邪相抗邪氣勝則生表寒正氣勝則生表熱休作有時之由古未有能言其意者蓋病雖起於營衛兩虛惟兩虛之中必有一勝設衛氣差勝則衛氣出與邪爭而作於晝以衛氣晝行於陽也設營氣差勝而衛陽虛則營氣出與邪爭而作於夜以營氣夜行於陽也正氣歷若干時而勝即歷若干時而休此休作有時之確證也嘗見病瘧之人休作日早則易愈日晏則難愈蓋以發於清晨衛陽強盛發於日晡衛陽日消故也所以默默不欲飲食者消水之力氣為主氣盡則肺不能肅降而水之上源渟渟則不渴消穀之力脾為主血弱則脾不能健運而消穀之力微微則不飢水與宿食俱停故不欲飲食至於藏府相連數語尤為解人難索吾直以為藏即腎藏寒水之藏也府即膀胱寒水之府也藏府相連為下焦決瀆之道路即西醫所謂輸尿管內經所謂水道出焉者是也蓋腎與膀胱以二輸尿管相連屬故仲師謂之藏府相連邪正相摶結於脅下適當太陽寒水藏府相連之處下焦決瀆阻而不行於是脅下之痛下連少腹太陽標陽吸於上下焦水道阻於下遂至倒行逆施而成嘔且痛之為義本為邪正相持水擁腎與膀胱而痛連一藏一府究其實則為下焦不通內經所謂不通則痛也至若方之所以用柴胡者柴胡發表寒也黃芩清上熱也此為寒熱往來設也人參所以滋肺陰以其主氣也大棗甘草所以助脾陽以其統血也此為血弱氣盡設也生薑以安胃則不嘔生半夏以去水則一藏一府之痛消而以外無餘事矣惟服小柴胡湯而渴則證屬陽明白虎承氣隨證酌用可也得病六七日脈遲浮弱惡風寒手足溫醫二三下之不能食而脅下滿痛小柴胡湯主之面目及身黃頸項強小便難者與柴胡湯後必下重本渴飲水而嘔者柴胡湯不中與也食穀者噦此條訂正得病六七日當是論列小柴胡湯證兼及不宜小柴胡湯證所恨諸家望文生訓不能補其脫漏令仲師立言本旨前後自相刺謬也夫曰得病六七日脈遲浮弱與上血弱氣盡何異惡風寒手足溫此證屬肌理凝閉與中風同本書所謂傷寒脈浮而緩手足自溫者繫在太陰正以足太陰脾主一身肌肉故也此本桂枝二麻黃一湯證醫家不知病在太陽而反二三下之以致中氣虛而不能食太陽寒水陷於脅下而成滿痛此與上默默不欲飲食邪正相摶結於脅下又何異況太陽病十日以去胸滿脅痛者與小柴胡湯成例具在焉可誣也若以小柴胡湯為禁忌則後此陽明篇胸脅滿而不去小柴胡湯主之脅下滿不大便而嘔舌上白苔者可與小柴胡湯少陽篇脅下硬滿不能食脈沉緊者與小柴胡湯俱不可通矣吾直謂滿痛下遺脫小柴胡湯主之六字面目及身黃以下乃為忌柴胡證夫面目及身黃即陽明篇身目俱黃寒濕在裏不解之證輕則宜麻黃加朮重則桂枝附子白朮附子二湯可知也頸項強小便難此太陽經輸未解而裏陰先竭上文所謂亡津液之證陰陽和必自愈者也若寒濕在裏之證更投黃芩以撤熱則腹痛下利可以立見津液亡而更以柴胡劫其表汗則虛陽吸於外腸胃涸於內必至欲大便而不得雖下節頸項強手足溫而渴者未嘗不用柴胡但彼係未經二三度誤下之證不似此證之亡津液也此所謂與柴胡湯後必下重者也若夫本渴飲水而嘔是名水逆為五苓散證或中有留飲故也於此而不以五苓散利其小便導上逆之衝氣使之下行反與小柴胡湯迫其戰汗致令陽氣外浮胃中虛冷而食入厄逆矣故曰食穀者噦也無如庸工密傳衣鉢動以柴胡湯為和解之劑而不知為發汗之劑何怪液虛者重虛之卒令津枯胃敗致人於死而不自知也傷寒四五日身熱惡風頸項強脅下滿手足溫而渴者小柴胡湯主之上節言太陽病之誤下傷津液者不可用柴胡湯此節言津液未經耗損者仍宜柴胡湯以解外也傷寒四五日則猶未及一候身熱惡風則營血之熱與表寒戰勝皮毛外泄而惡風也頸項強與前證同而不見小便之難則津液之充滿可知水氣停蓄於脅下不能作汗外出故脅下滿脾主肌肉亦主四肢血分中熱度漸高水液流於脅下者不能還入胃中故手足溫而渴此證身熱惡風頸項強皆外未解之明驗脅下滿手足溫則為柴胡湯的證蓋太陽寒水源出於入胃之水飲胃中熱如熾炭不能容涓滴之水一時從淋巴微管發出外泄毛孔則為汗是為中焦其氣上蒸肺藏鼻中吸入空氣化為水液是為上焦水流脅下從淋巴系統輸尿管直達膀胱是為下焦三焦水道古稱手少陽蓋此水自腰以上從無統系之淋巴微管散出肌理皮毛是為太陽之表自腰以下從淋巴系統輸出膀胱是為太陽之裏若外不得汗裏不成溺而壅阻脅下則為太陽之半表半裏半表半裏者不能外內之說也不能外內則水道梗塞而為病此證服柴胡湯後必背毛灑淅頭搖小便出脅下之水氣既去然後陽氣無所阻遏乃能出肌腠皮毛而為汗而表裏之證悉除矣惟方中柴胡為主藥分兩不可過輕半夏亦但宜生用製則不能去水但洗去其泥可也腰以上腫當發汗腰以下腫當利小便其理正在於此傷寒陽脈澀陰脈弦法當腹中急痛先與小建中湯不差者與小柴胡湯小建中湯方芍藥六兩桂枝三兩甘草二兩生薑三兩膠飴一升大棗十二枚以水六升先煮五味取三升去滓內飴更上微火消解溫服一升日三服陽脈澀為氣不足陰脈弦為水有餘氣不足而水有餘則氣與血俱衰弱膽汁由十二指腸下注回腸者並為寒水所遏不得暢行陽微而氣鬱腹中所以急痛也桂枝湯本辛甘發散助脾陽而泄肌理之汗加飴糖以補中氣之虛但令脾陽內動而氣之鬱結於足太陰部分者得以稍緩所謂急則治標也此先豫小建中湯之義也小柴胡湯方腹中痛者去黃芩加芍藥三兩腹中急痛服小建中湯不差則此證不惟扶脾陽而建中抑當疏營瘀而解外脾本統血之藏而外主肌肉肌肉為微絲血管密布之區陽氣外痹則營血內阻小柴胡方用柴胡以資汗液之外泄用芍藥以通血分之瘀塞使血絡無所阻礙汗仍得暢行無阻寒濕之內沍者解矣寒濕解而膽汁之注於腸中者不復鬱結為患矣此不差與小柴胡湯之義也傷寒中風有柴胡證但見一證便是不必悉具傷寒為病由表寒不能作汗水氣流入手少陽三焦而其病為脅下滿痛中風為病由肌理凝閉不能作汗脾濕並膽汁為陷而為腹中急痛此其大較也傷寒中風之柴胡證病狀各有不同師是以有但見一證即是之訓凡柴胡湯病證而下之若柴胡證不罷者復與小柴胡湯必蒸蒸而振郤復發熱汗出而解凡柴胡湯病證不惟以口苦咽乾目眩言之也少陽無正病故方治絶少所謂柴胡湯證皆以太陽病邪內陷言之是無論太陽傷寒由水分內陷者當從汗解即太陽中風從血分內陷者亦當從汗解柴胡出土者為柴在土中如蒜狀為胡其性升發能引內陷之邪而出表故柴胡證雖經誤下而本證不罷者復與小柴胡湯必先寒後熱汗出而解所以然者太陽之氣營衛俱弱不能作汗必藉柴胡升發之力然後得從外解後文云潮熱者實也先宜小柴胡湯以解外夫所謂解外者與上欲解外者宜桂枝湯本同一例桂枝湯解外曰發汗柴胡湯之解外獨非發汗乎不發汗則營衛二氣之內陷者何自而出乎況本篇又云嘔而發熱柴胡湯證悉具而以他藥下之非大柴胡湯柴胡證仍在者復與柴胡湯必蒸蒸而振復發熱汗出而解合之本條不皆明言發汗乎吾故曰柴胡湯為汗劑也傷寒二三日心中悸而煩者小建中湯主之傷寒二三日為二三候之期限二候為十四日三候為二十一日過七日則當傳陽明過十四日則當傳少陽此時脾陽不振血分中熱度漸低太陽水氣與標熱並陷中脘水氣在心下則悸水氣微故顛不眩熱在心下則煩熱不甚故不見燥渴此證但用桂枝湯不能發肌理之汗必加飴糖以補脾藏之虛然後太陽標本內陷者乃能從肌理外達而為汗此用小建中湯之旨也陳修園誤以為補中之劑而以悸為虛悸煩為虛煩殊失本旨不然桂枝湯本發汗之劑豈一加飴糖全失其發汗之作用乎太陽病過經十餘日反二三下之後四五日柴胡證仍在者先與小柴胡湯嘔不止心下急鬱鬱微煩者為未解也與大柴胡湯下之則愈大柴胡湯方柴胡半夏各半斤黃芩芍藥各三兩生薑五兩枳實四兩炙大棗十二枚大黃二兩上八味以水一斗二升煮取六升去滓再煎溫服一升日三服太陽病過經十餘日而不解此證仍宜汗解可知也反二三下之水氣當內陷手少陽三焦而病脅下滿痛或上燥而口苦咽乾此即為柴胡證後四五日柴胡證仍在雖大便不行仍當先與小柴胡湯以解外若胃底膽汁上逆而嘔小半夏湯所不能止於是胃中燥氣迫於心下而心下急鬱鬱微煩則宜於小柴胡湯中加枳實大黃以和其裏裏和而表氣自解矣傷寒十三日不解胸脅滿而嘔日晡所發潮熱已而微利此本柴胡證下之而不得利今反利者知醫以丸藥下之非其治也潮熱者實也先宜小柴胡湯以解外後以柴胡加芒硝湯主之柴胡加芒硝湯方柴胡二兩黃芩甘草人參生薑各一兩半夏二十銖大棗四枚芒硝二兩上八味以水四升煮取二升去滓內芒硝更煮微沸分溫再服不解更作傷寒十三日不解過經譫語者以有熱也當以湯下之若小便利者大便當硬而反下利脈調和者知醫以丸藥下之非其治也若自下利者脈當微厥今反和者此為內實也調胃承氣湯主之傷寒七日為一侯在內經即名一侯為一日本論中間亦有沿襲之者如一日二三日之日皆以一侯言之六日愈七日愈之日即以一日言之是不可以不辨也本論發端云傷寒二三日陽明少陽證不見者為不傳也此二節蓋為傳陽明少陽言之十三日不解已將抵二候之末上節言少陽陽明之傳次節言正陽陽明之傳蓋雖在一候之中傳變固不同也少陽陽明之傳上濕而下燥上濕則胸脅滿而嘔下燥則裏熱挾濕上薰而日晡所發潮熱此本大柴胡湯證見證治證原不當更見微利所以致此者俗工以大柴胡為猛峻巧借輕可去實之名下以丸藥既不能決蕩下燥又不能肅清上濕卒至初服不應漸積而成微利究之潮熱為陽明實證法當排決徒以上濕未祛先宜小柴胡解其外而以柴胡加芒硝終之此邪傳少陽陽明治法宜於先表後裏者也正陽陽明之傳濕去而燥獨留燥熱在腸胃上薰於腦則神昏而譫語小便利者大便必結而證情反見下利自下利者脈必微細手必見厥而反見脈條暢手足溫和者此非自利亦俗工畏承氣猛峻以丸藥下之之失為其內實未除也內實必待調胃承氣而始盡益可信輕可去實之謬矣此邪傳正陽陽明治法急當攻裏者也獨怪近世醫家一見譫語便稱邪犯心包犀角羚羊角紫雪丹任意雜投脫有不諱內實至死不去即或幸免正氣亦日見消亡求如丸藥下之之古代庸醫併如鳳毛麟角之不數數覯也亦可哀已太陽病不解熱結膀胱其人如狂血自結下之愈其外不解者尚未可攻當先解外外解已但少腹急結者乃可攻之宜桃核承氣湯訂正此條桃核承氣湯方桃核五十個取仁大黃四兩甘草二兩桂枝二兩芒硝二兩上五味以水七升煮取二升半去滓內芒硝更上火微沸溫服五合日三服當微利太陽病不解標熱陷手少陽三焦經少陰寒水之藏下結太陽寒水之府直逼胞中血海而血為之凝非下其血其病不愈考其文義當云血自結下之愈若血既以自下而愈矣不特下文尚未可攻乃可攻之俱不可通即本方亦為贅設矣此非仲師原文必傳寫之訛謬也至如如狂之狀非親見者不能道非惟發即不識人也即荏弱少女亦能擊傷壯夫張隱庵以為病屬氣分非若抵當湯之發狂徒臆說耳豈氣分亦可攻耶若進而求如狂所自來更無有能言之者蓋熱鬱在陰者氣發於陽嘗見狐惑陰蝕之人頭必劇痛為毒熱之上衝於腦也熱結膀胱之人雖不若是之甚而蒸氣上蒙於腦即神智不清此即如狂所由來熱傷血分則同氣之肝藏失其柔和之性而轉為剛暴於是有善怒傷人之事所謂銅山西崩洛鐘東應也血之結否不可見而特以如狂為之候如狂之愈期何所定而以醫者用下瘀方治為之候故曰其人如狂血自結下之愈也惟外邪未盡先攻其裏最為太陽證所忌故曰尚未可攻而解外方治仲師未有明言惟此證由手少陽三焦水道下注太陽之府則解外方治其為小柴胡湯萬無可疑惟少腹急結無他證者乃可用桃核承氣湯以攻其瘀此亦先表後裏之義也傷寒八九日下之胸滿煩驚小便不利譫語一身盡重不可轉側者柴胡加龍骨牡蠣湯主之柴胡加龍骨牡蠣湯方柴胡四兩龍骨黃芩生薑人參茯苓鉛丹牡蠣桂枝各兩半半夏二合大棗六枚大黃二兩上十二味以水八升煮取四升內大黃更煮一二沸去滓溫服一升傷寒八九日正二候陽明受之之期本自可下惟下之太早雖不必遽成結胸而浮陽衝激而上水濕凝沍而下勢所必至浮陽上薄於腦則譫語而煩驚水濕內困於脾則胸滿而身重所以小便不利者下既無氣以泄之上冒之浮陽又從而吸之也以太陽寒水下併太陰而為濕也因有胸滿身重小便不利之變故用柴胡湯以發之以陽明浮熱上蒙腦氣而為譫語上犯心臟而致煩驚於是用龍牡鉛丹以鎮之以胃熱之由於內實也更加大黃以利之此小柴胡湯加龍骨牡蠣之大旨也張隱庵妄謂龍骨牡蠣啓水中之生陽其於火逆驚狂起臥不安之證用桂枝去芍加蜀漆龍牡救逆者及燒針煩躁用桂甘龍牡者又將何說以處之要而言之邪熱決蕩神魂也若煙端火焰上出泥丸即飄忽無根於是忽夢山林忽夢城市忽夢大海浮舟而譫語百出矣濕邪之凝閉體魄也若垂死之人肌肉無氣不能反側於是身不得起坐手足不得用力而一身盡重矣是故非降上冒之陽而下泄之則神魂無歸非發下陷之濕而外泄之則體魄將敗是亦陰陽離決之危候也彼泥柴胡為少陽主方者又烏乎識之傷寒少腹滿痛譫語寸口脈沉而緊此肝乘脾也名曰縱刺期門此條訂正傷寒發熱自汗出大渴欲飲水其腹必滿此肝乘肺也名曰橫刺期門小便利其病欲解此條訂正刺期門二節有數疑竇不特無刺期門之確證即本文多不可通腹滿譫語似陽明實證脈應滑大而數不應見浮緊之太陽脈一可疑也即張隱庵引辨脈篇曰脈浮而緊名曰弦不知緊與弦本自無別若即以此為肝脈其何以處麻黃證之浮緊者是使後學無信從之路也二可疑也金匱婦人雜病原自有熱入血室而譫語者然必晝明了而夜譫語即不定為夜分譫語亦必兼見胸脅滿如結胸狀又有下血譫語者又必以但頭汗出為驗今皆無此兼證三可疑也發熱惡寒病情正屬太陽不應即見渴欲飲水之陽明證四可疑也腹滿為病固屬足太陰脾然腹滿而見譫語何以謂之肝乘脾五可疑也且渴飲胃熱也腹滿脾濕也何證屬肝何證屬肺而必謂之肝乘肺六可疑也不知書傳數千年纍經傳寫遺脫訛誤在所不免仍其訛脫之原文奉為金料玉律此亦信古之過也吾謂上節為太陽寒水不行於表分循三焦下陷胞中水與血並結膀胱之證屬血分次節為胃中膽汁鬱熱上薄吸引水道不得下行之證屬氣分故首節當云少腹滿痛譫語寸口脈沉而緊惟少腹滿痛而見譫語者乃可據為膀胱蓄血脈沉緊者責諸有水太陽之水合其標熱下陷寒水之一臟一府乃有蓄血之證蓄血則痛即前文所謂藏府相連其痛必下者是如是方與金匱刺期門條例相合蓋水勝則肝鬱鬱則傷及血分氣閉而為痛小柴胡小建中湯諸方並同此例然則刺期門者正所以宣肝鬱而散其血熱也次節當云發熱汗出渴欲飲水其腹必滿蓋胃中膽汁太多化為陽明浮火發熱自汗者浮火之上炎也浮火在上則吸引水氣而不得下泄故其腹必滿膽火上炎外達肺主之皮毛為發熱為自汗故謂之肝乘肺陽熱在上吸水不行則腹為之滿非刺期門而疏肝鬱則膽火不泄膽火不泄則浮陽上吸而小便不利小便不利即腹滿不去病將何自而解乎水氣直下為縱縱者直也水氣倒行為橫橫者逆也後文太陽少陽並病刺期門者義與此同若夫嗇嗇惡寒四字決為衍文削之可也太陽病二日煩躁反尉其背而大汗出火熱入胃胃中水竭躁煩必發譫語十餘日振栗自下利者此為欲解也故其汗從腰以下不得汗欲小便不得反嘔欲失溲足下惡風大便鞕小便當數而反不數及多大便已頭卓然而痛其人足心必熱穀氣下流故也太陽病二日即起病之二候上所謂十三日不解之證也二候本當傳陽明得陽熱之氣是生煩躁今人動謂陽煩陰躁誤人不淺此時不以白虎清其陽熱而反尉太陽之經劫其胃中之液火邪與陽熱並居胃中於是煩躁益劇燥矢之氣上蒙於腦遂發譫語後十餘日病垂四候陰液漸復陰加於陽是生振栗譬之暑令浴溫水中暴入必振栗所以然者外泄之汗液其氣本寒驟與溫水相接不能遽為融洽故也陰液來復胃中燥氣欲去自下利此即發汗亡津液而小便不利勿治之得小便利必自愈之例也此證津液內耗承氣既不能用實熱異於浮陽龍牡又不能施要惟靜以俟之方為萬全之策陽熱吸於上故腰以下不得汗欲小便不得而反嘔陰隔於下故欲失溲而足下惡風斯二者病皆出於陽明之燥實大便硬者小便必數且多為腸胃津液迫於燥氣而旁出也今既因津液耗損而成燥實豈更有餘液化為小便但病經十餘日津液始還入胃中而自行下利則胃中無根之毒熱必至上衝於腦故其頭卓然而痛卓然者直衝而上也足下本自惡風其人足心熱者足心為湧泉穴屬少陰以驟得大便胃氣下行足心轉熱所謂少陰負趺陽為順也此證仲師不出方治可見不治之治實精於治若在今人麥冬石斛天花粉玉竹之類雜湊成方正恐欲滋陰而陰未能滋反為胃中燥氣蒸化變為痰濕是又不可以不慎也太陽病中風以火劫發汗邪風被火熱血氣流溢失其常度兩陽相熏灼其身發黃陽盛則欲衄陰虛則小便難陰陽俱虛竭身體則枯燥但頭汗出劑頸而還腹滿微喘口乾咽爛或不大便久則譫語甚者至噦手足躁擾捻衣摸床小便利者其人可治太陽中風本桂枝湯證漫用火劫發其汗治法已誤況風本陽邪與火併居迫肺藏衛氣之出於皮毛者脾藏營血之出於肌腠者一時合併外溢於是血氣流溢而作汗液者失其常度矣魄汗逼迫垂竭血中之精液隨之故其身發黃今試以針刺手必有一點血出血過即出黃水是即血中之液發黃色之驗傷寒之發黃大抵熱傷血分使然火劫發汗其較著也陽逆於上則鼻中出血陰竭於下則小便不行營衛二氣竭於皮毛肌腠間則枯燥而不見汗色但頭汗出劑頸而還者厥陽獨行於上而陰虧不能作汗也腹滿微喘者脾陽頓滯於下肺氣不宣於上也口乾咽爛者胃中燥熱也不大便而譫語者燥矢積於腸胃而毒熱上蒙清竅也噦本多寒此獨為熱陽熱內熾清氣從肺竅入者格而不能受也手足秉氣於胃胃熱故躁擾神魂被毒熱上薰搖搖欲出泥丸故神憺蕩而不收捻衣摸床一似有所尋覓者此證自腹滿以下全係承氣湯證特因津液內耗不下必死下之亦死為其津液內耗不勝攻伐也惟小便利者津液尚有來復之機終不難一下而即愈故曰其人可治張隱庵引上陰陽自和者必自愈得小便利者自愈為證猶為未達一間本論云噦而腹滿知其前後何部不利利之而愈可以悟此證之治法矣傷寒脈浮醫以火迫劫之亡陽必驚狂起臥不安者桂枝去芍藥加蜀漆牡蠣龍骨救逆湯主之桂枝去芍藥加蜀漆牡蠣龍骨救逆湯方桂枝三兩甘草二兩大棗十二枚生薑三兩牡蠣熬五兩龍骨四兩蜀漆三兩洗去腥上七味以水一斗二升先煮蜀漆減二升內諸藥取三升去滓溫服一升傷寒脈浮此本麻黃湯證醫者急於奏功以其惡寒也漫令熾炭以薰之因致汗泄而亡陽陽浮於上故神魂飄蕩心氣虛則驚熱痰上竄則狂驚則不寧狂則不靜故起臥為之不安方用龍牡以收散亡之陽蜀漆即常山苗無蜀漆即代以常山以去上竄之痰而驚狂乃定於桂枝湯原方去芍藥者方欲收之不欲其泄之也又按亡陽有二汗出陽虛者宜附子以收之汗出陽浮者宜龍骨牡蠣以收之病情不同故治亦因之而異也形作傷寒其脈不弦緊而弱弱者必渴被火者必譫語弱者發熱脈浮解之當汗出而愈傷寒之為病寒邪暴迫於皮毛營衛之氣未動邪正相持於表分其勢緊張故脈必弦緊若脈不弦緊而弱雖形寒發熱究屬衛陽之虛所謂陽虛生表寒也且脈為血脈脈不緊而弱則營陰亦虛虛者而更以火劫之必胃中液涸而見譫語譫語者胃熱上蒙空竅也但陽虛而見外寒必陽不足以衛外而表邪因之乃見惡寒發熱但令弱而見浮雖陰陽俱虛猶當發汗而解解外而兼顧裏陰則栝蔞桂枝為宜解外而兼清裏熱則麻杏石甘為宜不但如黃坤載所謂桂枝二越婢一湯也張隱庵乃云當自汗出而愈按之解之二字殊為差誤太陽病以火薰之不得汗其人必躁到經不解必圊血名為火邪脈浮熱甚反灸之此為實實以虛治因火而動必咽燥唾血內經有言陽絡傷則唾血陰絡傷則便血數升太陽之病本當從外解漫以火薰使毛孔乾燥汗不得泄陽氣內張皮外固拒則其人必躁以至欲坐不得欲臥不安七日不解陽熱內陷傷其陰絡遂致圊血脈浮固屬太陽熱甚則將傳陽明本屬實熱反誤認為假熱實寒而灸之於是陽熱上熾傷其陽絡遂致咽燥唾血咽為胃管以咽燥故知其將傳陽明也微數之脈慎不可灸因火為邪則為煩逆追虛逐實血散脈中火氣雖微內攻有力焦骨傷筋血難復也灸有隔薑而灸隔蒜而灸之別要必其人寒濕內阻陽氣不達關節酸痛者乃為無弊若其人見微數之脈則虛陽外浮真陰不守陰虛不勝熏灼則心煩而氣逆追本虛之陰氣逐原實之陽熱於是腠理之血受灼流溢經脈之中星星爝火化為燎原行見血不養筋筋不束骨而痿躄成矣內經云血脈者所以利關節濡筋骨今血為火灼而內竄經脈由經脈而關節由關節而筋骨煎熬內攻日就枯槁欲關節之復利手足屈伸如志可復得乎吾故曰成痿躄也此仲師言外之微旨也脈浮宜以汗解用火灸之邪無從出因火而盛病從腰以下必重而痹名火逆也欲自解者必當先煩乃有汗而解何以知之脈浮故知汗出解也太陽寒水標熱而本寒若沸湯然汗之則熱與水俱去而病當立解此麻黃桂枝二方所以奪造化之權也凡病用藥內攻則邪從外散用火外灸則邪反內陷所以然者毛孔受火則汗液凝閉而不得泄標熱反因火而熾由是陽熱在上寒濕在下腰以下身重而痹痹者閉也不惟無汗而又益之枯燥也所以然者陽氣不得下達故也火邪並陽熱併居於上故名火逆然脈仍見浮則仍當自汗而解惟太陽水氣之寒因誤下內陷者必先振栗然後汗出而解太陽標氣之熱因火攻而下陷者必先煩然後汗出而解陰加於陽故振栗陽加於陰故先煩為其誤治之原委固自不同也燒針令其汗針處被寒核起而赤者必發奔豚氣從少腹上衝心者灸其核上各一壯與桂枝加桂湯更加桂二兩桂枝加桂湯方桂枝三兩芍藥三兩生薑三兩甘草二兩大棗十二枚牡桂二兩合桂枝共五兩上六味以水七升煮取三升去滓溫服一升燒針令發汗此本桂枝湯證先服桂枝湯不解針風池風府却與桂枝湯即愈之證也先啓其風邪從入之門戶然後用桂枝湯宣營分之鬱使血熱達於高表迸風邪而外出陽氣外盛針處又何從而被寒乎乃治法不密未能發肌腠之陽熱合衛氣而固表艾火既熄寒氣乘虛閉其針孔夫風池本少陽之穴風池為寒邪遏抑則少陽之氣不受熱勢必抗而上行風府本督脈之穴屬腎之奇經風府被寒邪閉吸則少陰之氣不平亦且鬱而欲動以少陽之升發挾少陰之衝氣此所以一見針處核起而赤即氣從少腹上衝欲作奔豚也譬之陰霾晝晦盛暑鬱蒸地中水氣被吸隨陽上升一時風雨雷電突然交至今少陽之火挾腎氣上僭與天時陽熱吸水氣上行適相等也迅雷疾風息乎雨奔豚之為病息乎汗又相類也故仲師治法先灸核上各一壯與桂枝加桂湯是即先刺風池風府却與桂枝湯之成例蓋必疏泄高表之氣然後可以一汗奏功加牡桂者所以復腎臟之元陽倘亦引火歸原之義乎黃坤載自負今古無雙於灸核上之義徒以散寒二字了之又去原方之牡桂吾笑其目光如豆耳火逆下之因燒針煩躁者桂枝甘草龍骨牡蠣湯主之桂枝甘草龍骨牡蠣湯方桂枝一兩甘草二兩龍骨二兩牡蠣二兩熬上四味以水五升煮取二升半去滓溫服八合火逆為陽盛劫陰陰液本虧而又下之則重傷其陰矣乃不清其陽熱益之以燒針於是太陽陽熱鬱而加熾是生煩躁仲師用桂枝湯中之桂枝甘草以疏太陽之鬱因營虛而去苦泄之芍藥以陽盛而去辛甘之薑棗加龍骨牡蠣以鎮浮陽而煩躁息矣此本節用桂甘龍牡之義也然則太陽中風不汗出而煩躁者何以用大青龍湯曰此陰液未傷陽氣欲達不達故一汗而病已解下後發汗晝煩躁而夜安靜何以用乾薑附子湯發汗若下病仍不解煩躁者何以用茯苓四逆湯蓋一為腎陽無根隨天陽而外浮故用乾薑生附以續之無他陽微故也一為陽氣傷於汗下不能外達故用茯苓四逆以助之亦陽微故也故但以汗下不解之因於濕阻而加茯苓以汗下不解之由於傷陰而加人參要無取鎮逆之龍牡煩躁同而所以為煩躁者異也若後節所謂太陽傷寒加溫針必驚者證情與火劫亡陽同為龍牡的證方治見上故本條不贅太陽傷寒者加溫針必驚也此證為浮陽遇火劫而暴升與上脈浮節意旨略同為桂枝去芍藥加龍骨牡蠣證前條已詳茲特舉其所以必驚者之言蓋太陽傷寒病由實為毛孔水液被外寒凝沍在氣分而不在血分故但須麻黃湯開泄皮毛若加溫針以助血熱毛孔方為重寒所錮陽氣不得外泄為汗血熱重發於內必至上衝於腦而心神為之不寧譬之關門捕盜必至反鬪傷人不止也太陽病當惡寒發熱今自汗出反不惡寒發熱關上脈細數者以醫吐之過也一二日吐之者腹中飢口不能食三四日吐之者不喜糜粥欲食冷食朝食暮吐以醫吐之所致也此為小逆世之治傷寒者動稱汗吐下三法此大謬也三陽之證惟汗下為常法然汗之太過下之太早尚不免於流弊至於吐則在禁例與火劫發汗相等即如太陽傷寒惡寒發熱其常也此麻黃湯證也即自汗出而見發熱亦其常也此中風主桂枝湯證也今自汗出反不惡寒發熱關上脈見細數細則為虛數則為熱關上則為脾胃胃中原有膽汁及肝脾之液為之消穀惟吐之太過膽汁傾泄則黃而苦肝液傾泄則清而酸脾液傾泄則膩而甜脾西醫謂之脺亦稱甜肉吐之太過則胃中虛寒不能消磨水穀細數之脈真寒而假熱脈數者當消穀今不能食此與後文發汗令陽氣微膈氣虛之脈數正復相等仲師言一二日吐之腹中飢口不能食者一候至二候為八九日之期八九日則太陽氣將傳陽明用藥吐之則傷胃氣胃傷不受水穀故腹中飢而口不能食其所以不能食者膈上之虛陽阻之也此條宜附子理中冷服方受或於溫藥中略增川連以導之言三四日吐之不喜糜粥欲食冷食朝食暮吐者三候至四候為二十二三日之期二十二三日病氣將傳太陰此時用藥吐之傷其脾精脾液不能合膽汁肝液還入胃中而消穀氣逆於膈上則生虛熱陽微於中脘則生實寒虛熱在上不能受糜粥之熱故反喜冷食胃中本寒熱食尚不能消況於冷食故朝食而暮吐此證名反胃宜大半夏湯半夏宜生用甚則吳茱萸湯謂之小逆者此雖吐之內煩不比汗下亡陽之變一經溫中虛煩立止故稱小逆太陽病吐之但太陽當惡寒今反不惡寒不欲近衣此為吐之內煩也太陽病當惡寒以吐之之故反不惡寒此與前條同惟不欲近衣則與前條異熱在骨髓乃不欲近衣吐之內煩何以見此證情仲師又不出方治此正所當研核者也蓋太陽之氣標熱而本寒太陽寒水不能作汗反隨湧吐而告竭標熱乃獨張於外此證若渴飲而脈洪大則為人參白虎湯證為其入陽明也若但熱不渴者則為桂枝白虎湯證為其入陽明而未離太陽也學者能於此而推擴之則思過半矣病人脈數數為熱當消穀飲食而反吐者此以發汗令陽氣微膈氣虛脈乃數也數為客熱不能消穀以胃中虛冷故吐也脈數為熱庸工之所知也數為客熱不能消穀則非庸工之所知矣仲師不嫌苦口以啓迪後學而舉世夢夢直至今日此醫道之所以常不明也夫脈數果為實熱則當消穀今乃飲食入而反吐以發汗太過損其胃中之陽膈上承受胃氣氣乃不虛今胃陽微而膈氣虛由是虛陽上浮而脈反動數究其實則為胃中虛冷故食入反吐按此即甘草乾薑湯證上節所謂燥煩吐逆作甘草乾薑湯與之以復其陽者此證是也太陽病過經十餘日心下溫溫欲吐而胸中痛大便反溏腹微滿鬱鬱微煩先其時自極吐下者與調胃承氣湯若不爾者不可與但欲吐胸中痛微溏者此非柴胡證以吐故知極吐下也此條訂正太陽病過經十餘日已在三候之期病機當傳陽明心下溫溫欲吐者溫溫如水將沸水中時有一漚續續上泛喻不急也胸為陽位胸中陽氣不宣故胸痛但上閉者下必不達而大便反溏腹微滿而見溏正繫在太陰腐穢當去之象鬱鬱微煩者此即太陽病若吐若下若發汗微煩與小承氣湯和之之例也然必審其先時自極吐下傷其津液者乃可與調胃承氣湯若未經吐下即不可與所以然者慮其濕熱太甚下之利遂不止也惟但欲嘔胸中痛微溏何以決其非柴胡證但欲嘔何以知其極吐下意旨殊不了了按傷寒十三日不解條下云胸脅滿而嘔日晡所發潮熱已而微利此本柴胡證今但欲嘔而胸中痛與胸脅滿而嘔相似微溏則又與微利相似況柴胡證多嘔今反因嘔而決其為極吐下意旨尤不可通不知嘔字即上溫溫欲吐之吐傳寫者誤作嘔字耳但欲吐者緣吐下傷其中氣中陽虛寒而氣上泛也惟既極吐下胃津告竭不無燥矢故可與調胃承氣湯此條正以當傳陽明之期證明調胃承氣證張隱庵反謂非承氣證已屬謬誤又以自極吐下釋為自欲極吐下按之文義尤屬不通此不過考其未至十餘日時曾經吐下否耳張隱庵惟不知嘔字為吐之誤故說解支絀如此太陽病六七日表證仍在脈微而沉反不結胸其人發狂者以熱在下焦少腹當鞕滿小便自利者下血乃愈所以然者以太陽隨經瘀熱在裏故也抵當湯主之抵當湯方水蛭熬虻蟲去翅足熬各三十個大黃三兩酒洗桃仁三十個上四味以水五升煮取三升去滓溫服一升不下再服太陽病六七日已滿一候仍見惡寒發熱之表證則其病為不傳但不傳者脈必浮緊及浮緩乃反見沉微之脈考結胸一證關上脈沉以其結在心下也今見沉微之脈反不結胸其人發狂者因太陽陽熱陷於下焦致少腹硬滿夫下焦者決瀆之官上出於腎下屬膀胱西醫謂之輸尿管亦稱腎膀管中醫以為腎與膀胱相表裏者以此以少陰為寒水之藏者未嘗不以此也血海附麗於膀胱太陽陽熱隨經而結於府傷及胞中血海因病蓄血然必驗其小便之利乃可定為血證抵當湯一下而即愈矣太陽病身黃脈沉結少腹硬小便不利者為無血也小便自利其人如狂者血證諦也抵當湯主之太陽病身黃血液之色外見已可定為血證加以脈沉結少腹硬則太陽標熱已由寒水之藏循下焦而入寒水之府然小便不利者尚恐其為水結抵當湯不中與也要惟小便利而其人如狂者乃可斷為胞中血結然後下以抵當湯方為萬全無弊蓋小便通則少腹不當硬今少腹硬故知其為熱瘀血海也傷寒有熱少腹滿應小便不利今反利者為有血也當下之不可餘藥宜抵當丸抵當丸方虻蟲去翅足水蛭熬各二十個桃仁二十五個大黃三兩上四味搗分為四丸以水一升煮一丸取七合服之晬時當下血若不下者更服傷寒不從外解太陽標熱循三焦水道貫腎藏而下膀胱因有蓄水之證而少腹滿但蓄水者小便必不利五苓散主之豬苓湯亦主之今小便反利證情實為蓄血蓄血者於法當下為其熱結膀胱延及胞中血海所謂城門失火殃及池魚也不可餘藥云者謂抵當丸外不當復進他藥丸之力緩故晬時方下血亦以其無發狂如狂之惡候故改湯為丸耳太陽病小便利者以飲水多必心下悸小便少者必苦裏急也太陽標熱太甚則飲水必多惟太陽之熱不能消水雖其初小便自利而水氣淩心心下必悸以心之悸即可知其非蓄血若小便不利而膀胱急結其為蓄水益信矣問曰病結胸有藏結其狀何如答曰按之痛寸脈浮關脈沉名曰結胸也何為藏結答曰如結胸狀飲食如故時時下利寸脈浮關脈小細沉緊名曰藏結舌上白苔滑者難治結胸藏結二證豫未之見大率近代醫家以硝黃為禁劑既無下之太早之變豫所治太陽證無不以發汗為先務故亦無此變證然其理則可知也大抵太陽標熱挾實者易治太陽本寒挾虛者難治結胸之證陰盛格陽者難治藏結之證獨陰無陽者不治黃坤載云本異日之陽明證早下而成結胸本異日之太陰證誤下即為藏結此數語最為深切著明張隱庵乃以為病發太陽而結於胸病發少陰而結於藏無論此二證為誤治之壞病不當言發於某經結於某處即太陽壞病而強認為少陰究何異於瞽者之論五色乎蓋論病不經實地試驗即言之成理終為誕妄太陽之將傳陽明也上濕而下燥魄汗未盡留於上隔則為痰涎燥氣獨發於腸胃則為便難燥熱蒸迫上膈乃見潮熱熱邪合穢之氣上衝巔頂則為頭痛濁氣上蒙於腦則為譫語此不難一下即愈者也若夫下燥而上濕則胃中之火不盛濕邪上泛則嘔多濕邪停於上膈則心下硬滿設攻之太早燥矢雖略通而痰涎內結必不能一下而盡於是下後濕注大腸則利下不止而死濕留上膈而不去則為結胸此即陽明未經燥實早下而病結胸之明證也太陽寒水之併入太陰也上寒而下濕上寒則吐下濕則腹滿中陽不運則食不下水與濕混而為一則自利甚寒併太陰部分則腹痛此不難一溫而即愈者也若夫太陽寒水閉於皮毛腠理者未經化汗太陰濕藏沾漬不解者未經陽熱蒸迫化燥設謬以為可攻而在表之寒在裏之濕凝固而不去於是濕痰下注入腸無陽氣為之蒸化則其病為痼瘕痼瘕色白而粘膩設見渴飲諸證則中含陽明燥氣下之可愈濕痰併居中脘無陽熱與之相抗則其病為胸下結硬是謂藏結藏結者結在太陰之藏也此即太陽之病繫在太陰誤下而成藏結之明證也凡病中有所不通則痛痰涎凝結於胸中故按胸而痛寸脈浮者表未解也關脈沉者以邪結胸膈而中氣不通也然則藏結何以如結胸狀明其為太陰之病胸下結硬之證也此證食本不下因誤下之故而反飲食如故本自利而自利未減者此正與厥陰證之除中相類除中者陰寒內據胃氣中絶上無所拒而下不能留也寸脈浮關脈細小沉緊者則以太陽之氣浮於外胸以下固獨陰無陽也舌上白苔滑難治云者蓋胃中有熱併濕上蒸則苔黃膩胃有燥熱乃見焦黑若但見白苔而兼潤滑則中陽已敗乾薑甘草不足以復之附子理中不足以溫之而扁鵲驚走矣藏結無陽證不往來寒熱其人反靜舌上胎滑者不可攻也病機陷於半表半裏者邪正相爭則往來寒熱故太陽病有發熱惡寒之桂枝麻黃各半湯有形似瘧日再發之桂枝二麻黃一湯有發熱惡寒之桂枝二越婢一湯又有傷寒中風五六日往來寒熱之柴胡湯若不往來寒熱則正氣不能與邪爭惟其為獨陰無陽故其人反靜舌上苔滑者脾腎虛寒而不復溫升也譬之土潤潯暑則地生莓苔可見舌上有苔實由脾陽挾水氣上行鬱蒸而始見今藏結之證中陽垂絶寧復有生氣發見於舌本故但見寒濕之苔滑而絶無一線生機此證不攻必死攻之亦死曰不可攻者冀其陽氣漸復或當挽救於萬一也病發於陽而反下之熱入因作結胸病發於陰而反下之因作痞也所以成結胸者以下之太早故也結胸者體亦強如柔痙狀下之則和宜大陷胸丸此條訂正大陷胸丸方大黃半斤葶藶子半升熬芒硝半升杏仁半升去尖熬黑上四味搗篩二味內杏仁芒硝合研如脂和散取如彈丸一枚別搗甘遂一錢匕白蜜二合水二升煮取一升溫頓服之一宿乃下如不下更服取下為效禁如藥法此條病發於陽病發於陰自當以太陽言之與上發於陽發於陰一例黃坤載懸解最為諦當張隱庵以陰為少陰其謬誤要無可諱陳修園因之此又應聲之過也風為陽邪則病發於陽為中風當以桂枝湯發腠理之汗而反下之熱入因作結胸曰熱入者因中風有熱故也寒為陰邪則病發於陰為傷寒當以麻黃湯發皮毛之汗而反下之寒入因而作痞仲師不言寒入者省文耳中風有汗發熱易於傳化陽明俟其傳陽明而下之原無結胸之變惟下之太早汗未透達於肌表因合標陽內壅寖成熱痰阻遏肺氣肺氣塞於上則腸胃閉於下其證略同懸飲之內痛所以然者以濕痰膠固於陽位故也濕痰凝於膈上燥氣留於中脘故其為病體強如柔痙金匱痙濕暍篇所謂身體強几几然者即是由體強几几而進之即為臥不著席之大承氣證今本條却言項強傳寫者誤體為項耳仲師言下之則和宜大陷胸丸者葶藶杏仁甘遂以去上膈之痰硝黃以導中脘之滯燥氣既去經脈乃伸其所以用丸不用湯者此正如油垢粘滯非一過之水所能蕩滌也結胸證其脈浮大者不可下下之則死結胸證悉具煩躁者亦死易否之彖傳曰內陰而外陽內柔而外剛外君子而內小人小人道長君子道消也明乎此乃可與言結胸之危候仲師之言曰結胸證其脈浮大者不可下下之則死又曰結胸證悉具煩躁者亦死夫群邪在位賢人在野則其國必亡虛陽外脫陰寒內據則其病必死其所以必死者結胸而見沉緊之脈雖陰寒在裏遏其真陽邪正交爭脈因沉緊但令真陽戰勝則一下而陰寒消歇其病決不致死若反見浮大之脈譬之明季阮馬持權於內史閣部併命於外必至君子與小人同敗以沉涸之陰寒格垂脫之真陽苟不顧其本原而攻下之不根之陽方且因之而滅息此結胸見浮大之脈所謂下之而必死者也其所以煩躁亦死者結胸之為病本痰涎併居胸膈之證其脈沉而緊心下痛而硬不大便舌燥而渴日晡潮熱心下至少腹俱硬滿而痛或體強如柔痙或心中懊憹脈之所以沉緊者病氣凝聚而中有所著也心下痛而硬者痰濁與水氣併居陽位格拒而不下也不大便舌燥而渴日晡潮熱心下至少腹硬滿而痛者太陽寒水凝於上陽明燥氣動於下也體強如痙者陽熱內陷而燥氣傷筋也心中懊憹者心陽為濕痰所鬱而氣不舒也夫所謂結胸證悉具者在外則狀如柔痙在裏則膈內拒痛陰寒內乘陽熱外灼此證已屬大難若更加以煩躁則證情益劇蓋陽氣欲發格於外寒則煩躁孤陽無歸格於裏陰則亦煩躁煩躁同而格於裏陰者為甚譬之漢唐明之末群奸擅威福於朝黨錮清流東林之獄流毒海內士氣消磨殆盡而三社屋矣夫群奸肆虐稍有人心者不能不併力而爭此亦一煩躁之象也結胸一證苟中脘陽氣未亡無論湯蕩丸緩皆當下之而即愈若濁陰內閉孤陽不歸脾腎虛則裏寒益劇裏寒劇則標熱益熾譬之油燈將滅必反大明此結胸證悉具所為煩躁而亦死者也張隱庵乃謂太陽正氣內結而不能外出並謂今之患結胸而死者皆由正結見理之悠謬明眼人當自辨之陳修園謂邪實固結於內正虛反格於外極有見地黃坤載說尤精太陽病脈浮而動數浮則為風數則為熱動則為痛數則為虛頭痛發熱微盜汗出而反惡寒者表未解也醫反下之動數變遲膈內拒痛胃中空虛客氣動膈短氣躁煩心中懊憹陽氣內陷心中因硬則為結胸大陷胸湯主之若不結胸但頭汗出餘處無汗劑頸而還小便不利身必發黃也此黃宜茵陳蒿湯為是大陷胸湯方大黃六兩芒硝一升甘遂一錢匕上三味以水六升先煮大黃取二升去滓內芒硝煮一兩沸內甘遂末溫服一升得快利止後服太陽病無問傷寒中風其脈必浮浮而見數則為中風發熱動者不靜之謂風中肌腠則上冒太陽之穴而頭痛數為營氣之熱肌腠閉而營虛不能作汗風熱上鬱故頭痛而脈數醫者苟遇此證一見頭痛發熱汗出惡寒者不特腠理未解既皮毛亦未解桂枝二越婢一湯其正治也醫反下之則表陽隨之下陷而營氣益虛動數之脈因變為遲此證太陽魄汗未經外泄則以誤下而成上濕太陽陽熱不從汗解則以誤下而成下燥上濕不盡則痰涎凝結而膈內拒痛下後胃中空虛中無所阻下陷之陽熱上衝客氣動膈而又上阻於痰濕則短氣而躁煩於是心中懊憹懊憹者濕盛陽鬱而氣機不利也陽氣迫於下濕邪停於上壅阻膈下心下因硬此為結胸所由成內陷之陽氣欲出而不得故躁煩可以不死非似孤陽外浮陰寒內阻之煩躁為陰陽離決而必死也是故大陷胸湯用大黃芒硝以除內陷之陽熱用甘遂以祛膈下之濁痰而結胸自愈矣設因誤下之後不病結胸則寒濕內陷而上無津液證情與火劫發汗但頭汗出劑頸而還相似惟火劫發汗者津液已涸故陰虛不能作汗此證為陰液內陷故亦見但頭汗出劑頸而還之證陰液與濕熱並居故小便不利而身發黃但令小便一利則身黃自退太陽府氣通陰液得隨陽上升而汗液自暢此又為五苓散證而無取大陷湯者也不由誤下之結胸豫屢見之傷寒六七日結胸熱實脈沉而緊心下痛按之石硬者大陷胸湯主之傷寒六七日甫及一候所謂傷寒一日太陽受之也本寒鬱於上標熱實於下因病結胸關上脈沉緊者寒與熱並居於中脘也中脘氣阻故心以下痛水氣與熱結而成痰故按之石硬但用硝芒以去實熱甘遂以下濕痰而結胸自愈此證不由誤下而成治法與之相等學者於此可以悟參變矣傷寒十餘日熱結在裏復往來寒熱者與大柴胡湯但結胸無大熱者此為水結在胸脅也但頭微汗出者大陷胸湯主之傷寒十餘日當兩候之期設傳陽明必發潮熱乃熱結於腸胃而又往來寒熱則陽明之證垂成太陽之邪未解如是即當與大柴胡湯使之表裏雙解但胸中痛而表無大熱則陽明之火不實而太陽之水內壅上積於胸下及兩脅三焦水道不能下達膀胱大黃芒硝皆在禁例但須與懸飲內痛同治投之以十棗湯而胸脅之水邪已破要惟頭有微汗出者陽氣既不能外泄而成汗寒水又不能化溺而下行不得已而用大陷胸湯此亦從頭上之微汗察其中有陽熱格於中脘痰濕而攻之設頭上並無微汗則仍為十棗湯證不當更用大陷胸湯矣太陽病重發汗而復下之不大便五六日舌上燥而渴日晡所小有潮熱從心下至小腹硬滿而痛不可近者大陷胸湯主之太陽之病重發汗而復下之津液屢傷則陽明之府氣將燥故不大便五六日舌上燥而渴日晡所有潮熱此皆大承氣湯證惟心下至少腹硬滿而痛手不可觸者可決為水氣痰涎凝沍不解而非承氣湯所能奏效特於大黃芒硝外加甘遂以攻之如是則不特去陽明之燥併水氣痰涎一時劖削此亦雙解之法也小結胸病正在心下按之則痛脈浮滑者小陷胸湯主之小陷胸方黃連一兩半夏半斤栝蔞實大者一枚上三味以水六升先煮栝蔞取三升去滓內諸藥煎取二升去滓分溫三服病在心下故稱結胸小結胸與大結胸同此部位之不可改易者也但按之痛則與不按亦痛之大結胸異脈浮滑則與大結胸之沉緊異所結不實故無沉緊之脈必待按之而始痛太陽標熱並於上故脈浮水氣濕熱結於心下故脈滑小陷胸湯黃連苦降以抑在上之標熱半夏生用以泄水而滌痰栝蔞實以泄中脘之濁按此即瀉心湯之變方後文半夏瀉心湯生薑瀉心湯甘草瀉心湯皆黃連半夏同用是其明證也意此證裏實不如大結胸而略同虛氣之結而成痞方中用黃連以降上冒之熱邪用栝蔞實以通胃中之積垢與後文治痞之大黃黃連瀉心湯相類但此證為標熱陷於心下吸引痰涎水氣而腑滯稍輕故以黃連半夏為主而以栝蔞實易大黃後文所列之痞證關上脈浮者腑滯較甚而又為標熱吸引故以大黃為主而黃連副之不更納去水之半夏也太陽病二三日不能臥但欲起心下必結脈微弱者此本有寒分也反下之若利止必作結胸未止者四日復下之此作協熱利也古者庸工之誤治必有誤治之因所患一間未達耳非似今日之名醫不論何證既以不能生人不能殺人之藥為標準置人於不生不死之間也太陽病二三候正當傳陽明少陽之期不能臥但欲起心下結此正與胃家實相似蓋胃不和固寐不安也誤下之因實出於此由是以微弱之脈本有寒分者置之不辨反與滑大之脈同治若一下而即止標熱與本寒停蓄心下因作結胸若一下不止則標熱與本寒並趨大腸因作協熱利寒即因利而消寒從水盡也按後文協熱利者脈沉滑金匱下利脈滑者當有所去則當及四候之期更進大承氣湯乃一下而更無餘事矣少陰篇下利色純青與此同例故知用大承氣也太陽病下之其脈促不結胸者此為欲解也脈浮者必結胸脈緊者必咽痛脈弦者必兩脅拘急脈細數者頭痛未止脈沉緊者必欲嘔脈沉滑者協熱利脈浮滑者必下血太陽病下之後其脈促則太陽表氣不因誤下而陷而反欲上衝氣上衝者雖不結胸其胸必滿無他為其營氣欲出衛不與之和也故其證當從汗解上節桂枝去芍藥湯主之者即係此證若喘而汗出則又為葛根芩連證揆之本條欲解之義未能強合結胸之脈寸口必浮若關上見沉緊即為大結胸證設但見浮脈標熱在上將成小結胸證脈緊固傷寒之本脈下後脈緊咽痛者表氣因下驟虛外寒閉其皮毛阻遏陽氣因病咽痛按此為麻杏石甘湯證蓋咽為胃之門戶寒遏於肺麻杏以散之熱鬱於胃石甘以清之而非少陰咽痛用半夏散之證也脈弦必兩脅拘急云者蓋弦為陰寒之脈而主痛金匱腹滿疝宿食篇云趺陽脈微弦法當腹滿不滿者必便難兩胠疼痛此虛寒從下上也當以溫藥服之寸口脈弦者即脅下拘急而痛其人嗇嗇惡寒蓋兩脅居兩腎之上為三焦水道之衝太陽寒水從三焦下行由腎出膀胱者內經認之下焦即輸尿管太陽寒水不能化汗而出皮毛則寒濕阻於兩脅故其證惡寒惡寒者表寒未解而水氣內積今人一見弦脈便言肝膽為病曾亦知為手少陽三焦之病乎所以謂脈細數頭痛未止者頭痛為太陽本病云未止者表未解也細數雖非太陽本脈然標熱上鬱終異陽明實熱故脈來細數前文云脈浮數者可發汗亦表未解也本太陽病不解而轉入少陽者必乾嘔而脈沉緊沉則寒水著於裏緊則標熱拒於表少陽篇主以小柴胡湯柴胡以散表寒黃芩以清裏熱使內陷之邪仍從太陽外解而為汗則沉緊和而嘔亦止矣脈沉滑所以成協熱利者沉則在裏滑則停瘀此即上四日復下之之證也脈浮滑必下血者太陽標熱繫於表則浮入於府則滑太陽之府與胞中血海相附麗故必傷及血分苟其蓄而不下則為抵當湯證若血既自下其勢無可再攻求之金匱惟赤小豆當歸散最為允當此無他以胞中之血部位甚下直可決其為近血故也病在陽應以汗解之反以冷水潠之若灌之其熱被劫不得去彌更益煩肉上粟起意欲飲水反不渴者服文蛤散若不差者與五苓散寒實結胸無熱證者與三物小陷胸湯白散亦可服文蛤散方文蛤五兩上一味為散以沸湯和一方寸匕服白散方桔梗貝母各三分巴豆一分去皮心熬黑研如脂上三味為散內巴豆更於臼中杵之以白飲和服強人半錢匕羸者減之太陽標熱其氣外張發於皮毛者無汗發於肌腠者多汗設用麻黃湯以解表桂枝以解肌皆當一汗而愈要之太陽標熱異於陽明實熱者不無憑證浮熱外張其口必燥故意欲飲水胃中無熱故不渴太陽本氣不從汗解反因淒滄之水逼而入裏心下有水氣故津不上承而欲飲水文蛤當是蛤殼性味鹹寒而泄水但令水氣下泄則津液得以上承而口不燥矣服文蛤散而不差或以文蛤泄水力薄之故改用五苓以利小便則水氣盡而津液得以上行矣此冷水迫太陽水氣入裏脾精為水氣阻隔不達舌本真寒假渴之方治也若太陽本寒之氣以冷水外迫內據心下而成寒實之結胸則當用黃連以降逆生半夏以泄水栝蔞實以通腑滯非以其有宿食也不如是不能導水下行也至如白散則尤為猛峻桔梗貝母以開肺巴豆能破陰寒水結導之從大腸而出夏令多飲寒水心下及少腹痛諸藥不效者皆能勝之此冷水迫陰寒入裏寖成水結之方治也太陽與少陽併病頭項強痛或眩冒時如結胸心下痞硬者當刺大椎第一間肺俞肝俞慎不可發汗發汗則譫語脈弦五日譫語不止當刺期門太陽與少陽併病其原有二一為太陽水氣不能作汗外解循三焦水道內壅水結寒水之藏則脅下痛水結寒水之府則少腹滿而小便不行此併手少陽三焦為病者也一為太陽水氣垂盡胃中消食之膽汁生燥此證津液先虧設治之不慎使膽火熾於胃底胃中津液耗損殆盡由是胃熱上薰於腦神識被蒙發為譫語此合足少陽為病者也無如近世醫家妄稱半表半裏甲木乙木而不求病原之同異一遇此證無不以大小柴胡為圭臬此真相之所以常不明也考頭項本太陽經脈由腦後下項之道路水氣不能作汗則強痛水氣少而經脈拘急則亦強痛水氣鬱而欲達則病眩冒此眩冒當從汗解者也水氣虛而標熱上行則亦眩冒此眩冒之不當從汗解者也水氣結於心下則心下痞硬而成結胸水液不足則虛氣上衝心下痞硬而時如結胸時如結胸云者明其有時而軟可斷其非水結也故治法當刺大椎第一間間去聲隙也瀉其肺俞肝俞令肺氣不鬱於上則上源足資津液之虛肝臟不鬱於中則肝液亦能滋胃中之燥設不明其為津液之虛泥於頭項強痛誤用麻黃發汗則胃中膽火益無所制將胃中宿食盡化燥屎毒熱穢氣上熏於腦而譫語作矣曰脈弦五日譫語不止當刺期門者此亦開肝臟之鬱借肝藏餘液以息胃中膽火使不至燥熱而生變蓋因膽寄肝葉之內惟肝液能制其焰故也若過此以往直可決為大承氣證矣不然少陰篇之下利色純青此正膽汁為病也何以急下而宜大承氣湯乎厥陰之厥深熱深厥微熱微此亦膽火內熾也何以應下誤汗而口傷爛赤乎近人因此條譫語刺期門與後二節同謬指為熱入血室夫婦人有經水適來經水適斷憑證故其譫語可定為熱入血室此證為液虧胃燥之證不知何所據而指為熱入血室也婦人中風發熱惡寒經水適來得之七八日熱除而脈遲身涼胸脅下滿如結胸狀譫語者此為熱入血室也當刺期門隨其實而取之婦人中風當內熱已盛表寒未罷經水適逢其會而至此未可定為熱入血室否也得病七八日正發於陰而惡寒之證當熱除身涼之候乃果應七日當愈之期熱退而脈遲不數且緊之謂遲身涼證情當霍然矣乃又胸脅下滿如結胸狀設為太陽標熱並水氣結心下脅下要惟硬滿而痛不當譫語譫語者鬱熱上蒙空竅神識模糊為如狂發狂之漸以前此經水適來故知為熱入血室然則何以不用抵當湯丸及桃核承氣而但泄肝之期門穴曰此證雖熱入血室而胞中血海尚無瘀血故先刺期門以瀉肝膽之熱此曲突徒薪之計隨其熱之實而先時以取之不待血之既結後時而救之也婦人中風七八日經水適斷者續得寒熱發作有時此為熱入血室其血必結故使如瘧狀發作有時小柴胡湯主之此條訂正此節經水適斷四字張隱庵謂當在七八日下此說良是中風七八日以向愈之期經水適然中斷設中風本證未罷病之無關於經水更何待言若本證已解續得發作有時之寒熱愈而復病曰續新而非故曰得中風之熱無間昏旦此獨休作有時可見經水適斷之即為病因矣經水既來即血室空虛太陽餘熱乘虛而入阻其下行之路以致血結胞中但寒熱發作之時仲師未有明文吾以為當在暮夜營氣夜行於陽熱之鬱伏血室者乃隨之而俱發此證得自經後血雖結而不實究以氣分為多故但需小柴胡湯以解外寒熱去而血結自解設或不解然後再用抵當湯攻之熱邪之內陷者去瘀血無所吸引則固易為力也婦人傷寒發熱經水適來晝日明了暮則譫語如見鬼狀者此為熱入血室無犯胃氣及上二焦必自愈婦人傷寒業經發熱則全身腠理孫絡一時迸出至高之熱度與表寒戰勝此時病氣固已在營而不在衛若當經水適來營分之標熱乃因類而乘其虛營氣晝行於陰不與天陽相接故晝日明了及其夜行於陽血中邪熱隨陰氣而動者乃至上塞心竅而昏腦氣故暮則譫語如見鬼狀此證血熱在下故但需攻瘀泄熱病當自愈若發其汗損中脘之胃液竭上中二焦之水分血熱乃益無可制矣此則仲師言外之意也此證當用大柴胡湯傷寒六七日發熱微惡寒支節煩疼微嘔心下支結外證未去者柴胡桂枝湯主之柴胡桂枝湯方柴胡二兩黃芩人參各一兩半半夏二合半甘草一兩桂枝芍藥生薑各一兩半大棗六枚上九味以水七升煮取三升去滓溫服一升傷寒六七日已盡一候之期太陽本病為發熱惡寒為骨節疼痛今發熱微惡寒肢節煩疼特標熱較甚耳太陽外證固未去也微嘔而心下支結者胃中濕熱閉阻太陽陽熱欲達不得之狀此即太陽病機繫在太陰之證發在裏之濕邪作在表之汗液柴胡桂枝湯其主方也然則病本傷寒何不用麻黃而用桂枝曰傷寒化熱則病阻於肌故傷寒亦用桂枝本書傷寒五六日發汗復下之變證用柴胡桂枝乾薑湯其明證也設中風未化熱則病猶在表故中風亦間用麻黃本書大青龍湯及金匱風濕用麻黃加朮用麻黃杏仁甘草薏苡其明證也蓋必具此通識然後可與讀仲景書傷寒五六日已發汗而復下之胸脅滿微結小便不利渴而不嘔但頭汗出往來寒熱心煩者此為未解也柴胡桂枝乾薑湯主之柴胡桂枝乾薑湯方柴胡半斤桂枝三兩乾薑二兩黃芩三兩牡蠣二兩甘草二兩栝蔞根四兩上七味以水一斗二升煮取六升去滓再煎取三升溫服一升日三服初服微煩復服汗出便愈傷寒五六日未及作再經之期汗之可也已發汗而復下之則非也苟令汗之而當則病機悉從肌表外散上自胸脅下及三焦膀胱當可全體舒暢寧有停蓄之標熱本寒鬱於中而不達惟其當可汗之期早用芒硝大黃以牽掣其外出之路於是未盡之汗液留於胸脅而胸脅為滿並見蘊結不宣之象標熱吸於上故小便不利先經發汗胃中留濕較輕故渴而不嘔標熱吸於外本寒滯於裏表裏不融故往來寒熱陽浮於上內陷之陰氣不從故但頭汗出陽上越故心煩此正與傷寒八九日下之胸滿煩驚同例非似病後之虛煩以曾經發汗故早下而不成結胸也方用柴胡桂枝乾薑溫中達表以除微結之邪用黃芩生草栝蔞牡蠣清熱解渴降逆以收外浮之陽於是表裏通徹汗出而愈矣按此證與前證略同以其無支節煩疼而去芍藥以其渴而不嘔加栝蔞根而去半夏以其胸脅滿兼有但頭汗之標陽去人參而加牡蠣不難比較而得也傷寒五六日頭汗出微惡寒手足冷心下滿口不欲食大便硬脈細者此為陽微結必有表復有裏也脈沉亦在裏也汗出為陽微假令純陰結不得復有外證悉入在裏此為半在裏半在外也脈雖沉緊不得為少陰病所以然者陰不得有汗今頭汗出故知非少陰也可與小柴胡湯設不了了者得屎而解太陽標陽盛則表證多汗而傳陽明本寒勝則水結心下由三焦連屬脅下而病延少陰之藏脅下為腎藏所居此標陽外絶所以有藏結無陽之證也今傷寒五六日已將一候苟其陽盛則必外有潮熱而轉陽明今頭汗出微惡寒手足冷心下滿口不欲飲食大便硬陰寒之象見於外寒濕之氣凝於裏大便雖硬其不為陽明承氣湯證要無可疑頭汗出則標熱尚存微惡寒手足冷心下滿則水氣結於心下似與寒實結胸相類結胸證原有五六日不大便者於大便硬一層要可存而不論且此證脈細沉緊與少陰藏結證之小細沉緊略無差別然以證情論不惟藏結無汗即結胸亦不當有汗則此證所當注意者獨有頭汗出耳但頭汗出而心不煩故仲師謂之陽微結陽微結者標陽微而水氣結也標陽微於外故但頭汗出本寒結於裏故微惡寒手足冷而心下滿口不欲食大便硬者上濕而下燥也但頭汗出而不及遍體故曰陽微心下滿故知為水結設但為寒結外必無汗今有頭汗故知非純陰之藏結且無陽之藏結不特外無汗液水氣由三焦下陷必且悉數入裏而痛引少腹此由寒水之藏入寒水之府而病屬足少陰者也今但見為心下滿而復有頭汗故知其非少陰證可用小柴胡湯達心下水氣還出太陽而為汗而病自愈矣若不了了則下燥未化也故曰得屎而解門人丁濟華以為不若與大柴胡湯較為直捷不知此證緊要只在去心下之滿原不急乎消大便之硬上濕既散津液自當下行不待硝黃攻下自能得屎而解也傷寒五六日嘔而發熱者柴胡湯證具而以他藥下之柴胡證仍在者復與柴胡湯此雖已下之不為逆必蒸蒸而振却發熱汗出而解若心下滿而硬痛者此為結胸也大陷胸湯主之但滿而不痛者此為痞柴胡不中與之宜半夏瀉心湯半夏瀉心湯方半夏半斤黃芩乾薑甘草人參各二兩黃連一兩大棗十二枚上七味以水一斗二升煮取六升去滓再煎取三升溫服一升日三服此承上凡柴胡湯病證節引起誤下成結胸誤下成痞之變證水氣入裏胃不能受故嘔太陽表證仍在故發熱有表復有裏故曰柴胡湯證具非必兼往來寒熱胸脅苦滿脅下痞硬小便不利諸證也誤下不見變證語詳柴胡湯為汗劑條茲不贅述若下後變證見心下滿而硬痛則痰涎停蓄中脘為宿食阻格而不下故用甘遂硝黃以通之設見上傷寒六七日結胸條下設病滿而不痛不因誤下而始見則胸脅苦滿及頭汗出而心下滿何嘗非小柴胡證今出於誤下之後是當與結胸同例而為水氣之成痞故宜以半夏瀉心湯生半夏以去水納半夏以去其水見金匱黃芩以清肺黃連以降逆乾薑以溫胃甘草人參大棗以和中氣脾陽一振心下之痞自消矣以其有裏無表故曰柴胡不中與之太陽少陽併病而反下之成結胸心下硬下利不止水漿不下其人心煩太陽寒水之氣循手少陽三焦上行外出皮毛則為汗由手少陽三焦下行輸泄膀胱則為溺若夫二陽併病則上行之氣機不利而汗出不徹下行之氣機不利而小便難水道不通正宜五苓散達之而反用承氣以下之於是水結心下遂成結胸水滲大腸下利不止水結上焦故水漿不下水氣遏抑陽氣不宣故心煩按此證上濕下寒即上三物小陷胸湯證以寒實結胸而無熱證與病在陽節略同故知之脈浮而緊而復下之緊反入裏則作痞按之自濡但氣痞耳浮緊之脈屬太陽傷寒寒邪迫於衛營熱抗於裏故兩脈浮緊此本麻黃湯證一汗可愈者也而反下之脈因沉緊心下結而成痞寒本陰邪傷寒誤下成痞即上所謂發於陰而反下之因作痞也浮緊者陽氣外張與表寒相持不下誤下裏虛陽氣反陷於裏仍見相持不下之沉緊此時陽氣內陷太陽寒水之氣未嘗隨之俱陷故按之而濡則舍氣痞而外初無所結其證為但熱不寒仲師於此條雖不出方治要即為後文大黃黃連瀉心湯證本浮緊之脈緊反入裏則浮仍在外可知張隱庵注反以是為虛寒之象真是誤人不淺使其果屬虛寒則後文心下痞按之濡何能用大黃黃連瀉心湯乎太陽中風下利嘔逆表解者乃可攻之其人漐漐汗出發作有時頭痛心下痞硬滿引脅下痛乾嘔短氣汗出不惡寒者此表解裏未和也十棗湯主之十棗湯方芫花熬甘遂大戟上三味等分各別搗為散以水一升半先煮大棗肥者十枚取八合去滓內藥末強人服一錢匕羸人服半錢匕得快下利後糜粥自養發熱惡風有汗脈浮緩者為中風寒水陷於大腸則濕滲陽明而病下利寒水陷於胃則少陽膽汁從胃中抗拒而為嘔雖病情兼見少陽似在禁下之例而部分已屬陽明陽明標熱本燥而中氣則為濕陽明不從標本而從中氣則證屬濕痰痰濕係於陽明例得攻下然惟發熱惡風之證罷乃可攻之故其人汗出如潮熱狀陽氣上盛故頭痛此頭痛與不大便五六日之頭痛同在闕上之數者皆可決為太陽合陽明為病心下氣阻按之硬滿引脅下而痛皆可決為太陽水氣合三焦水道為病而攻下必以汗出不惡寒為驗按此證與金匱懸飲內痛略同太陽之邪出於寒水水氣積則吸入之氣無所容而氣為之短太陽之標為熱水氣得熱蒸久成痰欲嘔而不能傾吐則為乾嘔汗出不惡寒則外自皮毛內達肌理絶無外邪留戀即此可定為表解可見心下痞按之硬滿痛引脅下直裏未和耳然後用十棗湯以下其水此亦先解其表後攻其裏之通例也太陽病醫發汗遂發熱不惡寒因復下之心下痞表裏俱虛陰陽氣並竭無陽則陰獨復加燒針因胸煩面色青黃膚瞤者難治今色微黃手足溫者易愈此條訂正太陽病發其汗猶曰太陽病當以汗解也無問在表之用麻黃在肌之用桂枝一也所難解者遂發熱惡寒耳豈未經發汗之前本不發熱本不惡寒因發汗之故遂致發熱惡寒乎若初不見發熱惡寒何以知為太陽病乎此不可通者一醫雖至愚誰不知發熱惡寒之當發其汗何至誤用硝黃則因復下之句因字全無著落不可通者二今細玩本文特於惡寒上遺脫不字耳如此則因字方有著落蓋太陽發熱惡寒之病一汗之後遂致發熱不惡寒此時頗類傳入陽明因其似陽明而下之太陽水氣已由一汗而衰不能再作結胸於是虛氣無所附麗因結於心下而成痞蓋發汗則衛氣虛陰液傷於上也下則營氣虛脾陽陷於下也陰陽氣正並竭更以燒針損其已傷之陽氣耗其已傷之陰血遂致胸中煩熱血凝則面色青濕聚則面色黃跌打損傷俱見青色傷血故也瘕疝之證面見黃色聚濕故也燒針動經故膚瞤血凝濕聚周身皮膚跳動皆正氣不支之象故曰難治但見面色微黃手足溫者初不過脾虛濕勝故曰易愈於太陰中求之足矣愚按陰陽氣並竭下忽著無陽則陰獨五字殊難解說前既云陰陽氣並竭矣何所見而指為陰獨乎自來注釋家往往囫圇讀過故所言並如夢囈仲師何以不言陰陽並竭而言陰陽氣並竭蓋氣為陽汗後肺陰外泄而衛氣一傷下後脾陽下陷而營氣再傷營衛之陽氣兩耗而痰濕結痞於心下者乃獨存無氣之濁陰故曰無陽無陽者無氣也試觀膠粘成塊之白痰如結晶體者方在咯出之時咽喉中已覺冰冷此即濁陰無陽氣之明證心下之痞正如是耳心下痞按之濡其脈關上浮者大黃黃連瀉心湯主之大黃黃連瀉心湯方大黃二兩黃連一兩上以麻沸湯二升漬之須臾絞去滓分溫再服大黃黃連氣味苦寒其性善泄生則易行熱則遲緩故麻沸湯漬之心下痞而復惡寒汗出者附子瀉心湯主之附子瀉心湯方大黃二兩黃連黃芩各一兩附子一枚炮去皮破開煮取汁上四味切三味以麻沸湯二升漬之須臾絞去滓內附子汁分溫再服此二節發端便言心下痞而不言其所以然蓋承上脈浮緊節言之太陽標熱誤下內陷因成氣痞氣與水合則按之硬痛有氣無水則按之而濡但為氣痞故關上脈浮而不見弦緊標熱陷則與陽明燥氣相合而大便不行故宜大黃黃連瀉心湯以泄之俾陽明之火下降而心氣不足者自紓金匱十六心氣不足吐血衄血瀉心湯主之按金匱有黃芩此則傳寫遺脫也若夫標熱熾於裏而上見心氣之抑塞表陽復虛於外而見惡寒汗出是又當於芩連大黃引火下泄外加炮附子一枚以收外亡之陽則一經微利結熱消而亡陽收矣此仲師示人以隨證用藥之法學者能於此悟隨證加減庶無膠柱鼓瑟之弊乎本以下之故心下痞與瀉心湯痞不解其人渴而口燥煩小便不利者五苓散主之本以誤下成痞而用瀉心湯設為標熱結於心下太陽寒水初不與俱陷則但用大黃黃連瀉心湯一下而痞解矣或同為標熱成痞而微見惡寒汗出之真陽外脫則加附子一枚兼收外脫之陽而痞亦解矣然卒不解者此時論治正需詳辨其本原若便以渴而口燥誤認為陽明實熱正恐硝黃朴枳傷無病之腸胃而正氣益虛即明知非陽明內實而漫投入人參白虎以解渴而止燥要惟小便自利者方可決為下後液虧而用之無疚設其人小便不利則為太陽本氣鬱陷標熱上結本寒下阻不去其水則陰液不升陰液不升則陽熱之結於心下者不降然則仲師方以五苓散實為探本窮原之治所謂牽一髮而全身俱動也不然五苓散利小溲之藥耳即多飲暖水發汗亦為發汗之藥耳安在其能消痞乎五苓散消痞功用如此歷來注家多不解傷寒汗出解之後胃中不和心下痞硬乾噫食臭脅下有水氣腹中雷鳴下利者生薑瀉心湯主之生薑瀉心湯方生薑四兩甘草人參各三兩乾薑一兩黃芩三兩半夏半斤大棗十二枚黃連一兩上八味以水一斗煮取六升去滓取三升溫服一升日三服傷寒一證惡寒無汗者自以汗出表解為向愈之期但汗發太過胃中津液耗損亦時見調胃承氣之證胃中不和心下痞硬乾噫食臭皆似之但令發汗透暢太陽水氣悉由皮毛外泄則必無未盡之水液從三焦水道流注脅下而為脹滿亦必不至水氣混雜太陰寒濕致腹中雷鳴而下利夫胃中膽汁生燥故不和膽胃上逆則乾噫食臭太陽標熱合水氣結於胃之上口故心中痞硬水氣吸於標陽乃不能由腎下出膀胱以至凝結於脅下脅下固腎藏所居輸尿之關鍵也水道不通則溢入大腸雷鳴而下利痰飲之水流脅下及水走腸間瀝瀝有聲其證情正相類也然則仲師何以不用豬苓湯五苓散曰此必無濟也陽熱吸於上則水氣必難下達不去其上熱則水道不行故用生薑瀉心湯生薑半夏以泄上源之水黃芩黃連以清上焦之熱炙草人參乾薑大棗以扶脾而溫中則上熱去下寒消而水道自通矣按此證與後文腹中痛欲嘔吐者略同故黃連湯方治即為生薑瀉心湯之變方但以桂枝易生薑黃芩耳究其所以不同者則以非芩連並用以肅降心肺兩藏之熱而痞將不去也附子瀉心湯生薑瀉心湯大黃瀉心湯甘草瀉心湯並同可見立方本旨矣傷寒中風醫反下之其人下利日數十行穀不化腹中雷鳴心下痞硬而滿乾嘔心煩不得安醫見心下痞謂病不盡復下之其痞益甚此非結熱但以胃中虛客氣上逆故使硬也甘草瀉心湯主之甘草瀉心湯方甘草四兩黃芩乾薑各三兩半夏半升黃連一兩大棗十二枚上六味以水一斗煮取六升去滓再煎取三升溫服一升日三服傷寒無表汗則汗之以麻黃中風表汗泄而肌理無汗則汗之以桂枝此仲師定法不可變易者也若醫反下則太陽寒水不能外達為汗反乘下後裏虛內陷於腸胃而下利日數十行致有完穀不化腹中雷鳴諸變要知猝發之變證為水氣暴迫所致但用五苓散以利小便而更無餘病不似病久太陰寒濕腸胃俱虛必待四逆理中也若並見心下痞結硬滿乾嘔心煩不得安諸證則決非五苓散證可知內經云暴迫下注皆屬於熱此時下利日數十行甚至完穀不化腹中雷鳴可知太陽標熱已隨寒水下陷心下硬滿之痞不惟與結胸之標熱寒水並停心下者不同與太陽標熱獨陷心下但氣痞者亦異夫陽熱結於心下與胃中膽汁兩陽相薄則陽明之火當挾胃實而益熾以大黃黃連黃芩湯復下之可也至下後寒水合標熱衝迫至胃中不留完穀則與標熱結心下成痞挾胃實為病者絶然相反以大黃芩連湯復下之不可也乃醫者誤以為標熱內結之氣痞誤用大黃瀉心湯遂致其痞益甚不知藏府之中惟胃至熱若熾炭然不能容涓滴之水水入於胃則悉化為氣西醫飲牛以盆水隨殺而驗之胃中固無水也此雖胃中不能容水初步之試驗而其理確不可易若胃中留水即病痰飲所以然者則以膽汁不足而消水之力弱也今以誤下致胃虛而膽火挾客氣上結心下而成痞與太陽標熱挾胃實成痞者雖氣痞同而所以成氣痞者不同彼為標熱內結此則不由標熱也乾嘔者胃中膽汁因下後生燥無所依據而上逆也心煩不得安者膽火由胃底衝迫胸膈而坐立不安也非太陽標熱故謂之客氣仲師主以甘草瀉心湯者重用生甘草以清胃中之虛熱大棗十二枚以補胃虛乾薑半夏以滌痰而泄水芩連以抑心肺兩藏之熱使上熱下行水與痰俱去則痞消於上而乾嘔心煩已濕泄於下而利亦止矣但方治更有未易明者痞在心下但用黃連以抑心陽導之下行足矣而諸瀉心湯方治何以並用清肺之黃芩蓋肺為水之上源肺藏熱則水之上源不清上源不清則下游之水氣不泄此其所以芩連並用也傷寒服湯藥下利不止心下痞硬服瀉心湯已復以他藥下之利不止醫以理中與之利益甚理中者理中焦此利在下焦赤石脂禹餘糧湯主之復利不止者當利其小便赤石脂禹餘糧湯方赤石脂太乙餘禹糧各一斤上以水六升煮取二升去滓分溫三服傷寒不解其表先攻其裏以致太陽水氣與太陰之濕混合下利不止下後胃虛客氣上逆以致心下結痞硬滿此時服甘草瀉心湯是也乃服瀉心湯已痞去而利依然觀下文但言治利不更言痞可見其痞已愈醫以為協熱利也協熱利本有四日復下之例復以他藥下之利仍不止醫又以為太陰寒濕也而以理中與之果其證屬寒濕不難得溫便愈然竟利益甚者蓋理中作用在升清而降濁向以虛氣膨脹於胃中阻其降濁之力中氣得溫而升胃中積垢自當從大腸下泄而無餘若下焦水氣不從腎關而出為溺以至溢入大腸則病不在中而在下中氣升即下無所吸此其所以利益甚也大腸為水衝激至於滑疾而不收是當以收攝為主赤石脂禹餘糧湯既能泄濕又復斂腸若腸中水氣無多利當自愈其不愈者必腸中水氣甚盛非用五苓散開其決瀆必不能殺其衝激之力也傷寒吐下後發汗虛煩脈甚微八九日心下痞鞕脅下痛氣上衝咽喉眩冒經脈動惕者久而成痿傷寒吐下之後津液已虛更發其汗津液更虛血與汗同體而異用故奪血者不可發汗液與精異物而同源故失精家亦不可發汗今津液傷於吐下復發其汗則其血必虛血虛則心煩而脈微病延八九日已在兩候當傳陽明之期胃液以汗而生燥肝膽與胃同居中部而掩覆於胃之右側時出餘液入胃為消融水穀之助胃燥則肝膽俱燥膽火上逆則心下痞硬但此證心下無水虛氣成痞按之當濡而轉見硬者標熱自上而下其氣衰客氣自下上攻其氣盛方盛之氣不可屈抑故硬也脅下為下焦水道之衝自腎而下即由下焦輸出膀胱以吐下後之發汗致太陽腑氣上逆而中焦水道為虛氣所格不能由腎下走膀胱故脅下痛陰竭而陽亢噫氣仍上衝咽喉此氣即心下結痞胃中濁熱之氣此證與後文胸有寒之瓜蒂散證相似其不同者眩冒耳寒水結為痰涎故阻厄肺氣噫氣反上衝咽喉而鼻竅不通陰傷而陽越故噫氣亦上衝咽喉以致顛眩而鬱冒設令陰虛陽亢未見經脈動惕此往尚無遺患若浮陽暴衝於上一身脈絡為之跳蕩不寧則血分既耗折殆盡終以不能養筋久而成痿痿者枯萎而不榮也張注謂委棄不為我用迂曲不通不可為訓究病原所自出蓋不出於吐下而出於吐下後之發汗津液既損於前而又重發其汗竭之故虛陽益張而不可遏愚謂此證惟柴胡加龍骨牡蠣湯最為近似柴胡湯以散心下之痞通脅下之痛龍骨牡蠣以收暴發之浮陽然後養陰補血以善其後或亦千慮之一得也傷寒發汗若吐若下解後心下痞硬噫氣不除者旋覆代赭石湯主之旋覆代赭石湯方旋覆花三兩代赭石一兩人參二兩甘草三兩生半夏半升生薑五兩大棗十二枚上七味以水一斗煮取六升去滓再煎取三升溫服一升傷寒惡寒無汗頭項強痛者以發汗而解胸痞氣衝胃中有濕痰吐之而解病傳陽明潮熱而渴者下之而解解後當無餘病矣然卒心下痞硬噫氣不除者此正與汗出解後胃中不和心下痞硬乾噫食臭略相似但彼為表解之後裏水未盡下滲大腸而見腹中雷鳴下利故宜生薑瀉心湯以消痞而止利此證但見胃氣不和絶無水濕下滲之弊然則噫氣不除其為濕痰壅阻無疑方用旋覆代赭以降逆半夏生薑以去痰人參甘草大棗以補虛而和中則濕痰去而痞自消中脘和而噫氣不作矣惟其證情相似故方治略同有虛氣而無實熱故但用旋覆代赭以降逆無需泄熱之芩連也下後不可更行桂枝湯若汗出而喘無大熱者可與麻黃杏子甘草石膏湯傷寒未經下後則脾實而胃濡既下則脾虛而胃燥桂枝湯所以發脾藏之氣出肌肉而為汗者也脾虛不能作汗故桂枝湯為禁例此即上節下後氣不上衝不得與之之說也氣上衝則為喘前此云太陽病下之微喘者表未解故也桂枝加厚朴杏仁湯主之加厚朴以舒胸膈加杏仁以宣肺氣以肺為主氣之藏喘家為表未開而肺氣鬱也此可知氣上衝之可與桂枝湯初未嘗專指本方也但喘之為病究係麻黃本證桂枝加厚朴杏子猶非主治之證方觀於無汗而喘之用麻黃湯咳而微喘之用小青龍湯其餘已可概見表氣不因下後而陷故汗出而喘下後胃家不實故無大熱麻黃杏子甘草石膏湯用麻黃杏仁開肺而通皮毛石膏甘草助脾而泄肌理則表寒裏熱並散喘定而熱解矣太陽病外證未除而數下之遂協熱而利利下不止心下痞硬表裏不解者桂枝人參湯主之桂枝人參湯方桂枝四兩甘草四兩炙白朮三兩人參三兩乾薑三兩上五味以水九升先煮四味取五升內桂枝煮取三升日再服夜一服太陽病外證未除而誤下之水氣與標陽俱陷心下則為結胸標熱獨陷心下則為氣痞下後胃虛客氣上逆則亦為氣痞但與標陽獨陷心下之痞有濡硬之別耳若外證未除而數下之水氣合標熱同陷遂至利下不止寒水之氣結於胃之上口而心下痞硬仍見發熱惡風之外證仲師特以桂枝人參湯主之炙草白朮人參乾薑以溫胃而祛寒桂枝助脾以發汗而外證及裏痞俱解矣所以後納桂枝者以裏寒重於外證恐過煎氣薄失其發汗功用也所以日夜三服者則以數下之後陽氣內陷非一劑所能開泄也傷寒大下後復發汗心下痞惡寒者表未解也不可攻痞當先解表表解乃可攻痞解表宜麻黃湯攻痞宜大黃黃連瀉心湯此條訂正傷寒大下後標陽鬱陷心下已足成痞復發汗以傷胃液則胃液虛而客氣益逆標陽客氣並居心下因而成痞虛氣成痞則按之濡加以客氣上逆則按之硬若表證已解更不虞水氣之內陷要不妨直行攻痞惟病者惡寒則衛氣束於表寒其脈必見浮緊正需麻黃湯以解皮毛俾水氣悉從汗解然後可徐圖攻痞此亦先解其表後攻其裏之例也然則本條言解表宜桂枝湯者直傳寫之誤也桂枝本為解肌惡寒則病在皮毛不在肌肉不可訛誤至於痞成於大下之後表寒不與標陽俱陷原屬大黃黃連瀉心湯證加以發汗胃中津液益涸而大便不行胃中燥氣上逆則肺與心並受灼爍故用黃芩黃連以清心肺大黃以除胃實痞乃隨胃實而俱消矣心下痞按之濡條下方治無黃芩傳寫脫誤傷寒發熱汗出不解心中痞硬嘔吐而下利者大柴胡湯主之傷寒發熱汗出不解者病機已屬陽明心臟本實雖胃繫脈道所屬為營氣出納之所但容積甚隘心中正不當有痞可知所謂心中痞者特虛氣為胃中實熱所迫阻遏於心之部位而不能散故轉似心中痞硬實即後文胸中痞耳胃中膽火上僭故嘔吐太陽傳陽明頗欲吐胃氣逆故也胃中膽汁善泄不能容留水液故下利此與少陰篇下利色純青同例此證不去陽明之燥則痞必不除於柴胡湯解外降逆藥中加攻下之枳實大黃一本無大黃使熱從下泄即氣從上解而痞已無形消滅矣愚按此方當用大黃陳修園乃阿附張隱庵以為宜用大柴胡湯之無大黃者吾正不知其何所取義也今更以處方大法言之柴胡發太陽鬱陷之氣而使之外出是為君黃芩苦降以清內熱之上僭芍藥苦泄以疏心營之瘀結是為臣生半夏生薑以去水而滌痰大棗和中而補虛是為佐枳實大黃排胃中濁熱而泄之在上之鬱結自開是為使此則用大柴胡湯之義也病如桂枝證頭不痛項不強寸脈微浮胸中痞硬氣上衝咽喉不得息者此為胸有寒也當吐之宜瓜蒂散瓜蒂散方瓜蒂一分熬黃赤小豆一分分音問上二味各別搗篩為散已合治之取一錢匕以香豉一合用熱湯七合煮作稀糜去滓取汁和散溫頓服之不吐者少少加得吐乃止諸亡血虛家不可與之桂枝證發熱惡風有汗但頭不痛項不強可知非衛強營弱之證非開泄肌理之汗所能奏效惟寸脈微浮則病氣猶屬太陽太陽之表氣內應於肺肺主皮毛表寒內陷胸中則寒痰凝結而為痞硬痰涎阻遏陽氣欲達乃衝激於咽喉喘促不得息此與小青龍湯證略相似而未嘗咳吐痰涎有欲出不得之勢故曰胸中有寒有寒者有寒痰也寒痰阻塞胸膈非急為之傾吐則喘息不平故特用瓜蒂之苦泄以湧其寒痰香豉以散寒赤小豆以泄濕一吐而衝逆止矣惟亡血家及體虛之人則為禁例蓋恐亡血家一吐之後引動咯血舊疾復發虛羸者不勝震蕩正氣將益不支也須知吐法在傷寒論中惟此一條仲師不得已而用之故方治後又垂戒如此病脅下素有痞連在臍旁痛引少腹入陰筋者此名藏結死此痞由腰下斜入少腹粗細類竹竿約長數寸色青而堅痛不可忍病者大小便不通豫向者親見之此節仲師發明太陽腑氣陰寒凝沍之死證惟黃坤載謂藏結之證陰盛則寒陽復則熱陰為死機陽則生兆尚為近是餘說俱不可通張隱庵注此條牽涉三陰糾纏不清值盲人評黑白耳惟解素字為現在如中庸素富貴之素則確不可易謂驟起之急證也脅下為少陰腎臟腎與太陽膀胱為表裏所謂藏結者寒結少陰之藏與肝脾固無關也臍之兩旁為輸尿管由腎下達膀胱之道路內經謂之下焦靈樞云下焦別回腸注於膀胱太陽寒水下輸之路由脅下穿腎關從臍之兩旁直走少腹下出陰筋是為溺太陽之氣由膀胱而上出臍旁輸尿管穿腎藏至脅下抵中焦出皮毛是為汗寒凝腎藏則小便不通寒結膀胱則表汗不徹今以腎藏暴感陰寒而痞在脅下使膀胱陽氣猶存蒸氣漸漬腎藏表汗時出小便時通則臍旁之輸尿管尚不至痛引少腹而入陰筋惟其少陰之藏陰寒凝固於是由臍旁輸尿管走竄太陽之府而痛入陰筋此為太陽陽氣下絶而寒水之府與寒水之藏直如冬令之水澤腹堅絶無一線生機仲師蓋深明內藏關係故特於太陽篇發明此條竊意此證重用附桂至一二斤或當於十百中挽救一二仲師可作或不以豫言為罪謫也俗工泥於內經肝小則藏安無脅下之病遂誤認脅下之病為肝病而不知肝膽主疏泄而性條達三焦受氣於膽而行水道有所拂鬱則失其疏泄之能而水道為之不通可見脅下之病為腎與三焦膀胱之病而非肝之本病矣四明門人張永年向不知醫以為此證即近世所謂夾陰傷寒病出於房後冒寒飲冷頗為真切因附存之以備參考昔在甲辰年六月豫弟振甫曾患此宿於娼家房後飲冷所致豫用時俗驗方白朮三兩肉桂三銖吳萸公丁香各三銖一服而大小便俱通惟通後不曾以溫藥調理下利二十餘日方愈按此證可用大劑四逆湯傷寒若吐若下後七八日不解熱結在裏表裏俱熱時時惡風大渴舌上乾燥而煩欲飲水數升者白虎加人參湯主之傷寒吐下後陰液傷耗七八日不解已踰一候病氣當傳陽明太陽標熱結在中脘而表熱依然不解此為太陽陽明合病時時惡風者表熱甚而皮毛開泄外風乘之而不能受也此為太陽未解之明證大渴舌上乾燥而煩欲飲水數升者中脘之陽熱因津液少而益熾此為病傳陽明之明證惟仲師主以人參白虎湯有似專治裏熱而不關太陽者不知石膏之質中含硫養涼而能散有透表解肌之力外感有實熱者用之近人張錫純之言可信也但石膏性本微寒欲徹表裏之熱者最少亦需雞子大一枚否則無濟若煅而用之則尤為謬妄傷寒金匱用石膏方治並屬生用多至雞子大小六枚甚有用至二十四枚至半斤者非以其微寒力薄乎惟漆匠膠入殮後之棺蓋則用煅石膏取其凝固收澀也然則白虎湯所以徹表裏之熱者取其清涼透肌乎抑取其凝固收澀乎此又不辨自明也更以豆腐驗之投煅石膏於煮沸之豆漿則凝而成腐矣去其清涼透肌之性一變為凝固收澀之敗質致胸膈間熱痰結而成痞吾不知其何以謝病家也蓋白虎湯方治要為偏於陽熱而設且以吐下傷津液之後始用人參故同為太陽陽明合病太陽表病重於裏熱者則宜桂枝加葛根湯陽明裏熱重於太陽者則宜白虎加人參湯夫各有所當也傷寒無大熱口燥渴心煩背微惡寒者白虎加人參湯主之傷寒無大熱胃家未實潮熱不甚可知口燥渴心煩則陽明裏熱而兼液虧之證背微惡寒則太陽未罷之兼證也惟其裏熱甚而表寒微故清裏即所以透表更無需解肌之桂枝此與上一條略相似而微有不同蓋津液有因吐下而虛者有不待吐下而津液本虛者治法固然不同也傷寒脈浮發熱無汗其表不解不可與白虎湯渴欲飲水無表證者白虎加人參湯主之脈浮為太陽肌表證傷寒中風之所同也若發熱無汗其表不解直可決為太陽傷寒矣此時急以麻黃湯發汗劑量太輕猶恐不逮溫散肌理之桂枝湯且在禁例而況辛涼透肌之白虎湯乎一經誤用不惟遏寒邪外出之路抑且表裏俱寒此其所以不可與也故惟渴欲飲水無表證者乃可與人參白虎湯所以然者為其熱鬱於胃使得從所主之肌理而外泄也獨怪近人動稱清涼解表烏知夫表不解者原不可以輕用涼劑乎太陽少陽併病心下鞕頸項強而眩者當刺大椎肺俞肝俞慎勿下之此節大旨於上不可發汗條論之已詳仲師蓋惟恐人誤認不可汗為可下特為鄭重申言之蓋太陽寒水將盡則胃中燥而膽火上逆心上之硬實由於此頸項為太陽經脈絡腦還出別下項之處太陽之氣不濡故強太陽標陽挾膽火上薰於腦故眩仲師立法因瀉大椎第一間之大杼瀉三椎之肺俞借水之上源柔經脈而濡中脘瀉第九椎之肝俞資肝液以涵膽火於是浮陽息而諸恙可愈矣若誤以為陽明實熱而妄下之其能免於小便不利直視失溲變乎太陽與少陽合病自下利者與黃芩湯若嘔者黃芩加半夏生薑湯方主之黃芩湯方黃芩三兩甘草芍藥各二兩大棗十二枚上四味以水一斗煮取三升去滓溫服一升日再夜一服黃芩加半夏生薑湯方於前方加半夏半升生薑三兩太陽寒水合手少陽三焦下從少陰寒水之藏輸泄入太陽之府寒水混合脾藏之濕至中下焦水道不通而溢入大腸則為自利此太陽之病合於手少陽者也太陽標熱並水氣內陷胃底膽汁而與之相抗則為嘔逆此太陽之病合於足少陽者也蓋太陽水氣因少陽陽氣不足內陷即入太陰太陰之濕受化於少陽陽氣外出即仍繫太陽按太陽標熱與水氣同陷心下則為結胸標熱獨陷心下則為氣痞二證皆不下利者一因水氣為標熱所吸一則陽熱獨陷併無水氣故也要惟寒水偏勝離標陽而下趨乃有自利之證此時不疏脾藏之鬱而補其虛則利將不止不抑在上之標陽使與裏寒相協必不能載水氣而俱升黃芩湯方治黃芩苦降以抑標陽芍藥苦泄以疏營鬱甘草大棗甘平以補脾胃則中氣健運而自利可止不用四逆理中以祛寒不用五苓以利水此不治利而精於治利者也寒水不足胃燥而膽火上逆是為心下硬寒水內薄胃中膽汁不能相容是為嘔嘔者水氣內陷與下利同脾胃不和亦與下利同其不同者特上逆與下泄耳故仲師特於前方加半夏生薑為之平胃而降逆蓋小半夏湯在金匱原為嘔逆主方合黃芩以清膽火甘草大棗以和胃芍藥以達鬱而嘔將自定抑仲師之言曰更納半夏以去其水此以去水止嘔者也傷寒胸中有熱胃中有邪氣腹中痛欲嘔吐者黃連湯主之黃連湯方黃連甘草乾薑桂枝各三兩人參三兩半夏半升大棗十二枚上七味以水一斗煮取六升去滓溫服一升日三夜三服此節歷來注家惟黃坤載以胃中有邪氣認為肝膽之病以欲嘔吐為膽邪乘胃以腹中痛為肝邪乘脾按之病情頗為近似但彼猶泥於五行生尅而真相尚有未明蓋胃中原有肝膽餘液以消融水穀胸中有熱則肺陰失降而化為濕痰水之上源不清濕痰入胃胃中膽汁不受因病嘔逆可見胸中有熱所以欲嘔吐者膽火之抗拒濕痰為之也胃中肝液原以濟消穀之用其氣徹上徹下足以調達其抑塞是故中有所拂鬱氣之由胃上出於口者為噯由胃下出大腸為轉矢氣中脘之脹悶乃舒凡此皆肝液之疏達為之若濕痰阻於上膈氣機乃不能宣達而反鬱於中脘而下及腹部可見胃中邪氣為脾陽不振肝藏抑塞所致肝乘脾藏之虛故腹中痛也黃連湯方治用黃連以止嘔必用乾薑半夏以滌痰者嘔因於痰也甘草人參大棗以扶脾而緩痛必用桂枝以達鬱者痛因於鬱也此黃芩湯之大旨也然則仲師此條何以不列於太陰少陽二篇而列入太陽曰此病源出於太陽也標熱內陷胸中水氣蒸為濕痰而肝膽始鬱肝膽與胃同部餘液皆入於胃故病發於胃皆不過相因而致病黃坤載移此條於太陰篇中亦祗見其不達耳傷寒八九日風濕相摶身體疼煩不能自轉側不嘔脈浮虛而澀者桂枝附子湯主之若其人大便硬小便自利者去桂枝加白朮湯主之桂枝附子湯方桂枝四兩附子三枚炮大棗十二枚生薑三兩甘草二兩上五味以水六升煮取二升去滓分溫二服桂枝附子加白朮湯方白朮四兩甘草二兩附子三枚炮生薑三兩大棗十二枚上五味以水七升煮取三升去滓分溫三服初服其人身如痹半日許復服之三服盡其人如冒狀勿怪此以附子朮並走皮肉逐水氣未得除故使之爾法當加桂四兩此本方二法也一法去桂加朮一法加朮更加桂四兩傷寒八九日已過一候或病從表解或傳陽明其常也若表汗不徹水氣留著肌肉而為濕風乘皮毛之虛入犯肌肉而凝閉其腠理則有風濕相摶之變寒濕傷其肌肉而腠理不通故身疼風濕困於外血熱抗於內故身煩凡人以陽氣通徹為生機陰寒凝沍為死兆無病之人身輕者為其近陽也垂死之人身重者為其無陽也風濕相摶至於不能自轉側身之無陽而重可知矣是故不嘔不渴外既不達少陽之陽樞內更不得陽明之燥化其證為獨陰無陽脈必浮虛而澀不惟不見邪正交爭之浮緊並不見邪正並居之浮緩為其正氣衰也病情至此非重用透發肌理之桂枝不足以疏外風非重用善走之附子不足以行裏濕或謂桂枝四兩每兩當今一錢六分不過一兩零四分然附子三枚至小每枚八錢亦得二兩四錢此證裏濕固重外風亦復不輕似當以經方原定為正外加生薑甘草大棗以扶脾而暢中使之由裏達表而風濕解矣顧同為風濕相摶之證惟大便堅小便自利者最難辨識合之身體疼煩不能自轉側似當在先解其表後攻其裏之例但寒濕留著肌肉外風束之既非若傷寒中風之始病發表解肌可一汗而見功設汗之而不得汗而妄行攻下濕邪且乘虛以下利不止而死究其所以大便堅小便自利者與陽明實證正自有別陽明證小溲當赤此則獨清一也外無潮熱二也不譫語三也脈不見實大而滑四也不渴飲五也闕上不痛右膝下經絡不牽髀肉而痛六也痛在周身肌肉而中脘未嘗拒按七也有此七端則此證不當攻下明矣然則大便之所以堅者可知矣濕困脾藏則脾陽停而胃納沮水穀既失運輸之路則腸中穀氣愈少而日漸乾涸反胃證糞如羊矢者實與此同加以太陽寒水以表氣不通獨有下行之路正如潦水赴谷一去不還不似發汗太過陽氣行於肌表津液自外而內尚得還入胃中也白朮附子湯用白朮四兩取其化燥以祛肌表之濕用附子三枚取其善走以收逐濕之功仍用甘草生薑大棗以助脾陽使得從皮中而運行於肌表一服覺身痹者附子使人麻也半日許再服者懼正氣之不支也三服後其人如冒狀者陽氣欲達而不得也故必於加朮外更加桂四兩然後陽氣迸肌表而出寒濕得從汗解表陽既通脾氣自暢新穀既入陳氣自除大便之堅正不需治耳風濕相摶骨節疼煩掣痛不得屈伸近之則痛劇汗出短氣小便不利惡風不欲去衣或身微腫者甘草附子湯主之甘草附子湯方甘草白朮各二兩桂枝四兩附子二枚炮上四味以水七升煮取三升去滓溫服一升日三初服得微汗則解能食汗止復煩者服五合風濕一證起於皮毛失治則入肌理肌理失治則流關節關節失治則久成歷節故風濕之始病起於中風故第一方治即用中風之桂枝湯去芍藥而加附子所以加附子者以其善走停蓄不流之濕得附子陽熱之氣將挾之而俱動也過此則由肌肉濕痹脾胃之外主肌肉者亦以陽氣不通日見停頓脾不升清胃不降濁以致大便日堅不動則津液日消若陰乾者然譬之溝渠不流則腐穢積也故第二方用中風之桂枝湯於原方去芍藥外去桂枝加附子白朮以補中而逐水使中氣得溫而運行則大便之堅者易去濕之漬於肌理者亦得從汗外解其有不得汗而見鬱冒者則以營氣太弱不能與衛氣並達皮毛之故於是更加桂以濟之失此不治乃由肌肉流入關節於是有骨節疼煩掣痛不得屈伸近之則痛劇之證風中於表故汗出此即中風有汗之例濕阻於裏故短氣歷節之短氣視此水濕不入腸胃則腸胃涸而小便自利水濕混入腸胃則腸胃滋而小便不利不利者濕邪壅成垢膩若穢濁之水積於汗下者然有停蓄而無旁流也惡風不欲去衣者風勝於表也或身微腫者濕勝則腫也故風濕第三方用中風之桂枝湯去芍藥薑棗而加朮附使在裏之濕悉從腠理外泄而病已解矣此證病篤於前而愈病則易於前所以然者以其證情偏勝於表不比身煩痛而重小便自利者如流寇之散而不聚未易一鼓成擒也要知濕為獨陰無陽之類凝澀而不動一如懶惰之人未易驅使非重用善走之附子必不能挾其所必不動者而動之失此不治則寖成歷節矣歷節之疼痛如掣汗出短氣不可屈伸並與風濕同故桂枝芍藥知母湯即本甘草附子湯而增益之以不得屈伸為積久成痹異於濕之暴病而加芍藥芍藥甘草湯治腳攣急同此例即以通營血之痹以毛孔之痹閉而加麻黃即以開衛陽之痹以外風不去而加防風以胸中有熱溫溫欲吐而加知母以胃中有寒而加生薑要其立方本旨實亦從桂枝湯加減而以朮附盡逐濕之能事蓋病雖久暫不同而其病源則一也傷寒脈浮滑此表有寒裏有熱白虎湯主之此條訂正脈浮為表邪未盡滑則為濕與熱以證情準之當云表有寒裏有熱本條言表有熱裏有寒則傳寫之誤也惟白虎湯方治裏熱甚於表寒者宜之若表寒甚而裏熱微者要以越婢及大青龍麻杏石甘諸方為主石膏知母不當妄用此即發熱無汗其表不解不可與白虎湯之例也若夫表寒垂盡裏熱已熾乃能用清涼透肌之石膏驅裏熱由肌出表其病遂解此正燥渴心煩背微惡寒白虎加人參湯主之之例也豫向者疑裏有寒為衍文猶為未達一間又按表有微熱裏有實寒為四逆湯證與白虎正相反詳少陰厥陰篇傷寒脈結代心動悸炙甘草湯主之炙甘草湯方甘草四兩桂枝生薑各三兩人參阿膠各二兩大棗三十枚麻仁麥冬各半斤生地黃一斤上九味以清酒七升水八升先煮八味取三升去滓內膠煬消盡溫服一升日三又名復脈湯此久病血虛者心陽不振之病也夫血統於脾而出於胃中之水穀胃虛則無以濟生血之源生血之源不繼則營氣不足脈見結代者心陽不振而脈中之血沾滯不得暢行也故炙甘草湯用炙草生薑人參大棗和胃以助生血之源麥冬潤肺以溉心藏之燥阿膠生地黃以補血桂枝以達心陽麻仁潤大腸引中脘燥氣下行不復薰灼心藏與麥冬為一表一裏和胃養血則脈之結代舒潤肺與大腸而心之動悸安更加桂枝以扶心陽而脈之失調者順矣此證或緣於久病或得之病後往往不能起坐坐則頭汗出或三至一代或五六至一代大便纍日不行豫於己巳四月二十一日治古拔路葉氏女孩親見之蓋陰傷於內陽氣外浮陽氣浮而陰液不與俱升故脈見結代心動悸者心營虛而上不受肺陰之溉下更受腸燥之逼以致此也三月中章次公亦遇此證惟大便溏泄為特異用原方去麻仁一劑後病良已但當其定方之時鄉人某見而笑之以為古方必不可治今病夫古人治傷寒雜證之方不可以治今日之廣瘡麻瘋中蠱是已以為不可治今日之傷寒雜證有是理乎敬告同人幸弗與鄉愚一轍同類而共笑也結代之脈向者於姚建律師見之用本方三五劑而結脈除又於引線弄陸勛伯見之陸方下利甚劇乃用本方合附子理中大劑五日而結脈止利亦尋愈按脈之來緩時一止復來者名曰結又脈來動而中止更來小數中有還者反動名曰結陽也脈來動而中止不能自還因而復動者名曰代陰也得此脈者必難治此條訂正此承上節申言結代之脈也然必先明結代之義然後可與明仲師之言結者如抽長繩忽遇繩之有結處則梗塞而不條代猶代謝譬之水中浮漚一漚方滅一漚才起雨後檐溜一滴既墜一滴懸空離而不相續也蓋氣未脫而停頓者曰結氣中絶而更至者曰代心寄肺藏之中資脾胃中氣而生血液胃中燥實脾陽內停則陽熱上薄肺藏而肺藏亦燥上下俱燥則心營不濡脈道因而不調本藏發為動悸脈之來緩至於時一止復來譬之逐隊偕行中途忽有阻礙而權時落後此非不相續也阻礙者為之也脈來動而中止更來小數中有還者反動譬之潮入斷港為淤泥所折及越之而過其來倍捷而其力較猛此非不相續也有折之者也此二脈皆名曰結故得此脈者務清陽明之燥以滋生血之源而脈之結者調矣若夫動而中止不能自還因而復動正如孤雲遠逝流水不歸卒然繼至者其氣實不相續故名之曰代代者甲去而乙承之也夫氣結復續是為生陽氣出不續是為死陰然則結當為陽代實為陰名曰結下陰也二字實為傳寫之誤得此脈者必難治乃專指代脈言之非統指結脈言之也陽明篇問曰病有太陽陽明有正陽陽明有少陽陽明何謂也答曰太陽陽明者脾約是也正陽陽明者胃家實是也少陽陽明者發汗利小便已胃中燥實大便難是也不識三陽之名義不可與知病不識三陽之病情不足與論治惲鐵樵以最外一層釋太陽豫常非笑之夫太陽為最外一層豈太陰為最裏一層乎脾為統血之藏外主肌肉及四肢而部分亦主腹以腹為最裏似矣然肌肉四肢並為血脈經絡所繫恐不得概以最裏名之無怪自陽明以下其名義俱不可通矣蓋太者太初太始之謂陽則以發熱言之太陽之病風寒襲於表血液之溫度抗於裏血熱戰勝始發表熱故名太陽猶太陰之病寒濕由表內陷血液之溫度不能外抗而轉少陽血分不充始生裏寒故名太陰也何謂陽明明之言盛也太陽表氣不由汗竭則腸胃不燥當是時表熱雖發猶為未盛也及肺藏之衛氣脾藏之營氣悉化為汗胃中始病燥實表熱與裏熱一氣而熱乃熾矣故知陽明者實壯熱之變文亦猶厥陰因手足厥冷而名為厥陰也少陽者寒熱往來雖病從燥化熱尚有時而解其熱固未甚也從太陽水氣則寒從陽明燥氣則熱不似陽明之獨陽無陰此正如少陰之陰盛則宜四逆陽復則宜承氣不類厥陰之獨陰無陽也故名少陽三陽之名義既悉病之異同乃可得而辨焉太陽陽明所以為脾約者太陽部分外則為表內則為肌脾主肌肉肌腠汗泄太過則脾氣不濡而約脾氣不濡則潤澤不及於下而腸胃燥此其所以為太陽陽明也胃中陽熱直透肌肉潮熱日發則胃中益燥而胃家始實此其所以為正陽陽明也少陽之府為膽為三焦三焦水道外散為汗下行為溺發汗利小便傷其胃與大小腸之液胃中消食之膽汁以涸而增益燥煩於是燥屎結而大便難矣此其所以為少陽陽明也陽明之為病胃家實是也正陽陽明為胃家實前條已詳言之蓋寒沍於表風襲於肌則脾陽頓滯而不能食新食不進宿食不去加以潮熱日作胃中之液悉為潮熱所奪遂成燥屎由是舌苔黃燥大渴飲冷中脘痛而拒按闕上痛內經以闕上屬喉間病此以氣色言之也若陽明燥氣隨經上入於腦則闕上必痛此豫門人王慎軒親驗之右髀有筋牽掣右膝外廉痛此為豫親驗得之皆胃家實之明證也問曰何緣得陽明病答曰太陽病若發汗若下若利小便此亡津液胃中乾燥因轉屬陽明不更衣內實大便難者此名陽明也太陽病之傳陽明厥有三因曰發汗曰下曰利小便夫發汗則肌表病氣當從汗去不當反因汗而劇或其人陰液本虧不勝劫奪或其人陽氣本盛易於化燥則胃中津液衰耗於汗後渴飲而轉陽明亦或於一汗之後潮熱不已而轉陽明此因汗而傳者也太陽下證極少設不當下而下標陽本寒同陷心下則為結胸或標陽獨陷或表寒獨陷則為痞甚或衛分陽氣先傷於汗營分陰氣繼傷於下而心下所結獨存無氣之濕痰間亦有下利不止者惟下後潮熱為實故有先用丸藥下之至自利後而仍宜大柴胡湯者過經譫語為熱為內實故又有先用丸藥下之至自利後而仍宜調胃承氣湯者此本在當下之例以下非其法而病氣仍留陽明者也三焦水道與太陽相出入隨陽上升則為汗水寒下降則為溺惟上出者有時復降下行者不能自還故有汗後胃中燥竭津液當還入胃中汗後液少不得小便得小便利必自愈此汗後津液當還之明證也若利小便太過雖膀胱之水易去身之發黃易消而津液既涸胃必因燥增熱宿食不下小腸大腸無所衝激大便格而不下此因利小便而轉陽明者也此太陽轉屬陽明所以不離乎三因也問曰陽明病外證云何答曰身熱汗自出不惡寒反惡熱也豫前既言陽之為熱明之為盛矣此節仲師答詞固即當解陽明為熱盛之碻據身熱與太陽之標熱同身熱而汗自出如逢炎暑如近熾炭則與太陽之標熱異人非腸胃中有實熱雖當暑令遇冰及井水毛髮為之凜然無他心有所畏忌也至遇之輒喜絶然無所違忤甚至好風雨而畏晴日飲寒泉而拒沸湯則身中陽熱無可復加矣蓋必如是乃謂之陽明矣問曰病有得之一日不發熱而惡寒者何也答曰雖得之一日惡寒將自罷即自汗出而惡熱也問曰惡寒何故自罷答曰始雖惡寒二日自止此為陽明病也此條訂正此二節申內經一日太陽二日陽明之義篇中一日二日皆以一候言之謂七日也太陽傷寒本無熱而惡寒既而血熱與外邪相拒血熱漸勝因而發熱發熱不已因而汗出奪其胃液胃中燥實因而惡熱二日惡寒自止者言七日以上當傳陽明也按此二節意味不深合太陽篇二三日陽明少陽證不見者為不傳也觀之理解方為充足不然太陽之病原自有從汗解後不更傳陽明者何所見病至兩候惡寒自止而必傳陽明乎至如陽明居中三語既與所問不符又與下答詞不接即非後人訛撰亦必他節脫文於辨證無甚關係當刪剃之知我罪我聽之而已本太陽病初得時發其汗汗先出不徹因轉屬陽明也傷寒發熱無汗嘔不能食而反汗出濈濈然者是轉屬陽明也此節為不敢用麻桂者痛下針砭以見畏葸太甚者之必遺後患也豫遇惡寒甚者輕者二三錢重者四五錢甚或一劑不愈連服二劑者一年中類此者常百數十證迄未見亡陽之變蓋發汗必期透暢然後肺與皮毛乃不至留鬱戀餘邪若汗出不徹時時發熱久乃有汗不解津液日損因而轉屬陽明且其證嘔不能食與寒邪初犯太陽者同發熱亦同惟汗出濈濈然者為獨異知邪傳陽明之必有潮熱矣豫嘗由仲師所未言推闡之傷寒心下有水氣則為乾嘔寒鬱肌表脾陽內停則不能食若病傳陽明則下燥上濕津液被胃熱蒸迫悉化痰涎胃熱與濕邪抗拒因而病嘔不能食者胃中本有宿食胃液因汗而耗燥結不復下行胃中壅阻因不能食由此觀之嘔不能食同所以嘔不能食者異也太陽標熱雖盛常欲擁被而臥至一傳陽明則不欲近衣發熱同而所以發熱者異也此條不過示初學以同中求異之法使不誤於疑似耳若不於病理求之則大謬矣傷寒二日陽明脈大此條訂正此亦申內經二日陽明受之之義也二日即七日以上與上節惡寒二日自止同例此云三日傳寫之誤耳此與上二日自止同故知三字為二字之僞脈為血管中含有動氣者裏寒則見縮故少陰寒證脈見微細裏熱則擴張故證傳陽明脈見洪大不獨在足之趺陽喉旁之人迎見大即手太陰六部之脈亦大計其時日皆當在七日以上雖然此亦指冬令傷寒言之耳若春日皮毛漸開傳熱較易則為日亦少至於夏秋間溫病更有朝見太陽而日中即傳陽明者尤不可以常例論之自來注家不明一日之為七日以上反謂內經傳經期日為不足據張隱庵又強為之說以為正氣相傳而不關病氣夫正氣之不受病者一日之中何經不達不知何者為傳皆夢囈也傷寒脈浮而緩手足自溫者是謂繫在太陰太陰者身當發黃若小便自利者不能發黃至七八日大便硬者為陽明病也傷寒轉繫陽明者其人濈然微汗出也太陽表解未徹留著肌理即見浮緩浮為風緩屬足太陰脾此與中風之證脈見浮緩正同手足自溫即發熱有汗惡風之證也肌肉內應於脾故曰繫在太陰風與濕交阻於肌理則身當發黃金匱云濕家身色如薰黃是其明證惟小便自利則濕從下泄故不能發黃按內經陽明標陽而本熱標陽者即太陽之標熱本熱者乃胃底之膽汁膽汁不能容涓滴之水惟賴肝液以濡之若汗泄太過胃乃生燥然陽明中氣實為太陰陽明不從標本而從中氣中氣化燥則大便硬而轉屬陽明不化燥則脾家實而腐穢當去故此條亦見太陰篇中但轉繫陽明亦必待濈然汗出否則七八日當傳陽明之期不惟大便不硬抑且暴煩下利而見太陰濕證惟此下利與汗出同一泄之後即無餘病故雖日十餘行而必止也陽明中風口苦咽乾腹滿微喘發熱惡寒脈浮而緊若下之則小便難也此條訂正此節上下兩腹滿字必有一衍文玩則腹滿則字之義似腹滿見於誤下之後未下時不應腹滿然非腹滿醫者何因而誤下此必後之腹滿字當衍也所以為陽明中風者太陽初轉陽明必有潮熱邪風閉遏皮毛肺氣不舒因而微喘肌表同病故發熱惡寒濕熱不從汗解流入太陰部分因而腹滿陽明燥熱迫胃中膽汁上抗因而口苦咽乾皮毛不開故脈浮緊若以腹滿之故疑為陽明內實妄行攻下水液一下而盡小便遂難況濕邪粘膩滲入膀胱尤難疏泄蓋此證宜桂枝麻黃各半湯或大青龍湯之表裏雙解俾風濕由汗而解設中脘不運更為斟酌下法以去內實此亦先解其表後攻其裏之意也陽明病若能食名中風不能食名中寒陽明之為病以潮熱為驗潮熱若汗出而肌表虛風固能中之寒亦能中之但風氣散散則脾陽不受阻厄胃中能磨水穀所以能食者胃中暖故也寒氣凝凝則脾陽內停胃底肝膽之液不能消穀及水所以不能食者胃中冷故也張隱庵注中寒之中讀平聲謂陽明中見之氣虛寒殊不必陽明病若中寒者不能食小便不利手足濈然汗出此欲作固瘕必大便初硬後溏所以然者以胃中冷水穀不別故也陽明者熱盛之變文至於中寒則外陽而內陰表熱而裏濕陰寒凝沍則機發內停不能食者脾不引胃不磨也寒濕下注則水道腐穢小便不利者上汙濁下粘滯也寒濕在裏逼浮陽而外泄故手足濈然汗出濈然者微出沾漬而不挾蒸氣也寒濕滲入腸胃由臍下痛引少腹因作固瘕固瘕即俗白痢粘膩凝結如膠痰狀設令外見潮熱渴飲闕上痛夜不安寐不大便諸證亦當以大承氣湯下之然所下之物有時初不見糞但見粘膩之白物甚有下至二三次而始見糞者豫嘗治四明胡姓親見之若但見腹痛下重而時出白物一滴直四逆湯證耳但以上二證皆已成固瘕之候若欲作固瘕而未成者大便必初硬後溏大腸稟陽明之燥中脘受太陰之濕設攻其下燥中脘之濕必且隨之俱下不急溫之恐寖成寒濕下利矣陽明病初欲食小便反不利大便自調其人骨節痛翕翕如有熱狀奄然發熱濈然汗出而解者此水不勝穀氣與汗共併脈緊則愈陽明病初欲飲既非胃中水穀不別斷無粘膩之濕邪滲入膀胱則小便當利大便當燥其人骨節反痛此風濕相摶之證也夫濕痹之證關節疼煩而痛小便不利大便反快者則但當利其小便若風濕相摶骨節疼煩掣痛不得屈伸近之則痛劇汗出短氣小便不利惡風不欲去衣者則當用甘草附子湯以發其微汗小便不利大便反快者濕越於下故宜從膀胱以泄之同一小便不利而濕流於關節故宜從腠理以泄之此證小便不利大便自調骨節痛與小便不利大便反快之證略相似然則仲師何不言當利小便曰此可以片言而決也反快云者水濕有直趨下游之勢自調不過潤下而已非有暴迫下注之狀也水氣不下陷其勢猶能外泄故當有熱狀翕翕外浮奄忽之間發熱汗出而解者但仲師所謂此水不勝穀氣與汗共併脈緊則愈三言向來注家多未瞭解不得不略為分析蓋水氣屬衛行脈外而達皮毛穀氣屬營行脈中而發腠理營氣勝於衛氣則脾陽內動汗當由肌出表營氣勝故內外相持而脈緊此正如太陽病之脈浮緊營氣方盛病邪在表不難一汗而愈也陽明病欲解時從申至戌上日昃而陽衰陰氣乘之地中水氣為天陽蒸迫陽盛之時不能升越必待陽衰而始見觀夏令暑雨多在日斜之候即晴日村落霧靄之氣亦多在傍晚此可見申至戌上乃太陰濕土當旺之時張隱庵以為陽明所主此真為古人所愚殆不啻桃梗土偶之冥頑不靈矣蓋熱盛之證遇陰氣而始解故陽明欲解時從申至戌上其有熱發於申至戌上者皆太陰病也金匱云病者一身盡痛發熱日晡所劇者此名風濕是為明證或言日晡所本篇兩見一為吐下後五六日至十餘日不大便日晡所發潮熱一為病人煩熱汗出則解又如瘧狀日晡所發熱者屬陽明似申至戌上實為陽明主氣不知陽明熱證得日晡所陰氣當解而反劇者自非本有寒濕得微陰而增重必腸胃燥實而反抗之力強也然則陽明主氣其在巳至未上乎大凡陽明證日中必劇其反見形寒者並宜溫藥歷來注家泥於干支生克而不明天人相感之理故特表而出之夏令稻葉上露日未暝而已成珠顆遠望之如煙氣上騰此亦陽降陰升之證也陽明病不能食攻其熱必穢所以然者胃中虛冷故也此條訂正陽明胃府受病於寒濕以致脾胃不磨水穀不化此時陰盛則病進而為寒濕下利之四逆證陽回則病退而為潮熱便溏胸脅滿之小柴胡證若以汗出熱重而漫投白虎或葛根芩連以攻其熱則胃中微陽為陰寒所錮必且格拒上出遂病厄逆蓋不能食者胃中本自虛冷今更迫之以寒藥故也夫胃中虛冷者飲水猶病厄逆豈能更容寒藥若得此證非用大劑四逆理中合吳茱萸湯以驅寒而止厄致胃中寒濕宿垢下陷太陰甚或一轉而成腹滿加噦之死證此其不可不慎也以其人本虛二句似屬編纂者注文當刪去之陽明病脈遲食難用飽飽則微煩頭眩必小便難此欲作穀疸雖下之腹滿如故所以然者脈遲故也胃底肝膽之液並能消穀若胃中虛寒肝膽之液不足則其脈必遲遲者虛寒之脈也太陽篇云脈數者當消穀為其稟肝膽之氣也夫數為客熱尚然不能消穀何況乎遲以故食難過飽飽即氣壅濕聚而生內熱氣逆於上則為頭眩濕壅於下則小便難此寒熱不食食即頭眩心胸不安所以久久發為穀疸也加以小便既難其腹必滿此證非去其寒而行其濕雖下以茵陳蒿湯其腹滿當然不減竊意當於茵陳蒿湯內重加生朮生附以行之所以然者則以胃虛脈遲中陽不運非如胃實之穀疸脈見滑大者可以一下而即愈也此條並見金匱豫亡友丁甘仁遇此證每用茵陳蒿湯加附子曾於治金子久病見之陽明病法多汗反無汗其身如蟲行皮中狀者此久虛故也病至熱盛迫胃中津液由肌理外泄法當多汗故陽明為病常以潮熱為外候而反無汗者裏虛故也無汗而如蟲行於皮中汗欲出而不得者裏虛而表亦虛也風濕證服防己黃耆湯亦然表虛故汗不易出也蓋陽明多氣多血者皆由水穀入胃蒸化血多則汗自出虛則分肉不熱衛陽不達故汗欲出而不得如蟲行皮中也此證宜於防己黃耆湯中略加麻黃使汗從皮中外泄則愈陽明病反無汗而小便利二三日嘔而咳手足厥者必苦頭痛若不咳不嘔手足不厥者頭不痛陽明病但頭眩不惡寒故能食而咳其人咽必痛若不咳者咽不痛陽明胃府含厥陰肝液少陽膽液以為消融水穀之助此說發於近代西醫然仲師傷寒金匱中往往含有此意惜注家未有發明耳夫陽明之病反無汗而小便利則濕消於下而熱鬱於胃肝與胃同部胃中有熱則肝陰傷而膽火盛肝陰傷則手足厥膽火盛則上逆而病嘔與咳膽火上逆竄於腦部則病頭痛此柴胡龍骨牡蠣湯證也俗名肝陽頭痛蓋厥而嘔者火上逆則為頭痛火下行則便膿血其證異其理同也若但頭眩不惡寒為胃中有熱而膽火獨盛膽汁能消水穀故無水穀不別之變而知飢能食膽火上逆衝激肺部故其人咽痛但欲清炎上之火必當引熱下行此大黃黃連黃芩湯證也俗名木火刑金若失時不治則其喉必痹俗名喉癰否則亦必待便膿血而後愈厥陰篇咽中痛者其喉為痹便膿血者其喉不痹所以然者陽明熱甚則肝陰傷肝為藏血之藏肝虛於上而膿血便於下所謂銅山西崩洛鐘東應也陽明病無汗小便不利心中懊憹者身必發黃陽明病被火額上微汗出而小便不利者必發黃發黃有數證一為發汗太過劫血液外泄皮中隱隱見黃色一為風濕內阻身如薰黃一為陽明之燥已成太陰之濕未化而為濕熱內實之發黃一為膽汁外溢鬱於皮裏膜外而成陽熱無實之發黃若汗不外泄小便不利者則為水鬱之發黃即因火薰而額上微汗而餘證依然不減其為水鬱之發黃如故也夫注涼水於杯中雖纍月而瑩潔如故易之以沸湯數日已變黃色矣所以然者為其曾受陽熱蒸化也是故發熱之人小便必黃濕鬱於表身疼發熱其面亦黃今太陽水氣既不能外泄於皮毛又不能下出於腎膀復為陽明之熱上下交迫則水濕之變為黃色者留著於皮毛之內而一身發黃但表裏不通陽明胃熱鬱結心下而心中為之懊憹得此證者惟梔子豉湯足以清裏而達表若不解則宜梔子厚朴枳實湯使熱從下泄而黃自退要未可以發汗利小便之治治之也陽明病脈浮而緊者必潮熱發作有時但浮者必盜汗出此節以近似之脈示人以虛實之辨也陽明之脈滑大為正而浮緊者少滑大而實者為正但浮者則尤少此太陽陽明合病之脈證也夫寒邪初犯太陽則其脈浮緊此時營氣方盛足以拒外邪而不納故浮而見緊即可為營血未衰之證故同一太陽陽明合病正有水不勝穀氣一見脈緊即奄然發熱濈然汗出而解者以浮緊為營氣出表之脈故也夫營氣強而脈緊雖不能汗出而解必有潮熱而發作必在日晡所足太陰脾當旺之時所以然者以脾主肌肉當旺時而腠理始開也至如但浮而不緊則營氣弱矣營氣弱者不能作潮熱故當臥寐之時營氣適行於陽即為盜汗潮熱者桂枝湯主之此衛不與營和先其時發汗之例也盜汗者桂枝加龍骨牡蠣湯主之此金匱虛勞篇治亡血失精之例也陽明病口燥但欲嗽水不欲咽者必衄陽明之熱結於中脘則為燥屎結於大腸則右髀筋縮牽掣右膝外廉而不良於行由中脘上薰於腦則闕上痛甚則滿頭皆痛凡此皆實熱為病宜大承氣湯急下之證也若內無實熱陽熱獨盛於上則其氣隨經而入腦腦中熱則氣由上腭下迫而口為之燥燥氣不涉中脘故但欲嗽水而不欲咽腦中熱則顱骨縫開血從闕上下注鼻孔而為衄今人於鼻衄之時額上沃以涼水其血立止此即額上骨縫遇涼即合遇熱則開之明證惟暴病見此證與汗出同熱隨血泄當可一衄而愈不似久病之人兼見胸滿唇痿脈微大來遲者為有瘀血之桃核承氣證也陽明病本自汗出醫更重發汗病已差尚微煩不了了者此必大便硬故也以亡津液胃中乾燥故令大便硬當問其小便日幾行若本小便日三四行今日再行故知大便不久出今為小便數少以津液當還入胃中故知不久必大便也此節當屬太陽證發端便言陽明病者實編纂者以此條在陽明篇而改竄之也太陽之為病除太陽傷寒外往往見發熱汗出之證則自汗出原不定屬陽明況既屬陽明熱證重發其汗必且昏不知人豈有發汗而病反差之理曰重發其汗已差者明其為太陽病也曰尚微煩不了了者明其為太陽之表已解而尚有餘邪未徹也夫既為太陽病後餘邪則當仍於太陽求之蓋太陽寒水發於皮毛肌腠者為汗而出於腎膀者為溺之二者皆取資於胃中水液水液散之則易耗養之則易復故太陽篇云凡病若發汗若吐若下若亡血亡津液陰陽和者必自愈又云大下後復發汗小便不利者亡津液故也勿治之得小便利必自愈今以自汗之證而重發其汗則胃中津液既少必不能由小腸下潤大腸而大便因燥設遇此證當以小便多少為驗若小便本多而今少則水飲所入當由胃輸入小腸大腸大便雖硬不久亦能自下此證無潮熱無譫語無滿頭痛不見陽明證象雖不大便亦無所苦蓋亦勿治之必自愈之例也愚按列此條於陽明篇中實為上三不可攻起例本條要非正文讀者勿誤認為陽明可也傷寒嘔多雖有陽明證不可攻之此上濕下燥之證必當先治其嘔而後可行攻下蓋即金匱病人欲吐不可下之之說也胃中鬱熱上泛濕痰壅於上膈便當用瓜蒂散以吐之胃中虛氣上逆而胸滿者則吳茱萸湯以降之否則無論何藥入咽即吐雖欲攻之烏得而攻之故必先殺其上逆之勢然後可行攻下豫每遇此證或先用一味吳萸湯間亦有肝膽鬱熱而用萸連湯者嘔吐既止然後以大承氣湯繼之陽明實熱乃得一下而盡須知有陽明證四字即隱示人以可攻若不於無字處求之但狃於胃氣之虛視芒硝大黃如蛇蠍真磕睡漢耳陽明病心下鞕滿者不可攻之攻之利遂不止者死利止者愈此證有虛實寒熱之不同必詳辨脈證而後定可攻與否蓋即太陽篇結胸臟結之證也太陽篇云藏結無陽證不往來寒熱其人反靜舌上苔滑者不可攻也蓋藏結之心下硬滿與結胸同而結胸一證則由中風誤下風為陽邪陽邪內陷易於化燥水從燥化則為痰涎故宜芒硝大黃以通腸胃甘遂以達痰於是有大陷胸湯之攻下法甚者燥熱挾痰上阻肺氣於是並有加葶藶杏仁於大陷胸湯內而為大陷胸丸之攻下法然惟熱結在裏往來寒熱者乃可攻之是故陽浮於外脈見浮大者不可攻結胸證悉具外見煩燥者不可攻為其孤陽外浮如油燈之垂滅非漸加膏油浮陽將不歸其根此時用大劑熟附以收之尚恐不及奈何更行攻下乎蓋心下硬滿之不可攻原不獨為藏結無陽證也但藏結異於結胸者一為不往來寒熱一為不煩燥而其人反靜結胸證雖不言舌苔何狀但以藏結證舌上苔滑求之則結胸證陽熱在裏舌上之苔亦必黃厚而燥然則本節所謂攻之利遂不止而死者自非陽浮於外之結胸證必陰寒在裏其人反靜之藏結證也陽浮於外則一下而裏寒益甚陰寒在裏則一下而清陽不升利將何自而止乎惟此節亦當於言外領悟觀利止者愈四字即隱示人以心下硬滿之證實亦有可攻者向使心下硬滿必不可攻不獨大陷胸湯丸並為贅設而寒實結胸之白散心下痞硬滿乾嘔短氣之十棗湯概無可用矣此豈仲師之意哉陽明病面合赤色不可攻之必發熱色黃小便不利也此節太陽篇二陽並病之證也太陽篇云汗先出不徹因轉屬陽明續自微汗出不惡寒若太陽病證不罷者不可下下之為逆如此可小發汗設面色緣緣正赤者陽氣拂鬱在表當解之薰之蓋此證不惟表熱無汗兩太陽穴必痛或用麻杏石甘湯表裏雙解或並用藥汁燒沸取下俯首藥甑之上蒙衣物而薰之則表汗出而頭痛愈矣若陽鬱於表而反攻其裏於是汗液欲從外泄者反挾表陽內陷而成濕熱夫水以清潔而流流則小便利小便利者不能發黃濕以膠粘而滯滯則小便不利小便不利者故熱鬱而發黃設因誤攻而見此證欲救其失惟茵陳五苓散差為近之若濕熱太甚梔子柏皮湯亦當可用也陽明病不吐不下心煩者可與調胃承氣湯調胃承氣湯方芒硝半斤甘草二兩炙大黃四兩去皮清酒洗上以水三升煮大黃甘草取一升去滓內芒硝更上微火煮令沸少少溫服之不吐不下似胃氣尚和然不吐不下而見不惡寒反惡熱濈然汗出之陽明病則胃中已燥胃系上通於心胃中燥熱故心煩惡人多言不耐久視書籍不欲見生客似慍非慍似怒非怒煩出於心而所以致煩者則本於胃中燥熱故見此證者譬猶釜中沸水釜底之薪不去則沸必不停此其所以宜調胃承氣湯也獨怪近人遇此證動稱邪犯心包犀角羚角至寶丹等任意雜投卒至胃中燥熱日甚一日以至枯槁而死可哀也已陽明病脈遲雖汗出不惡寒者其身必重短氣腹滿而喘有潮熱者此外欲解可攻裏也手足濈然汗出者此大便已硬也大承氣湯主之若汗多微發熱惡寒者外未解也其熱不潮未可與承氣湯若腹大滿不通者可與小承氣湯微和胃氣勿令大泄下大承氣湯方芒硝半斤大黃四兩酒洗枳實五枚炙厚朴半斤炙去皮上四味以水一斗先煮枳朴取五升去滓內大黃煮取二升去滓內芒硝更上微火一兩沸分溫再服得下餘勿服小承氣湯方大黃四兩厚朴二兩枳實三枚上三味以水四升煮取一升二合去滓分溫二服初服湯當更衣不爾者盡飲之若更衣勿服脈遲為胃中虛寒前於食難用飽條內已略言之特其義尚有未盡不得不更申前說蓋胃中穀氣實為生血之原胃所以能消穀者膽汁實為主要膽火隨衛氣而動衛氣晝行於陽自下而上由三焦還入於胃則能食由心而入腦則思慮強夜則行於陰自腦漸降則思慮少由胃而下入於腎故不飢不渴由腎而入膀胱故小便多黎明則達於宗筋故宗筋張浹晨而起小便一泄其熱乃又隨衛陽而上出少年多欲之人往往飲食鋭減思慮恍惚者皆由夜行於陰之時傷其膽火故也脈中營氣視血為強弱膽火盛而納穀多富其生血之原故脈數膽火虛而納穀少生血之原不足故脈遲人之一身血為最熱血分充故裏溫迫水氣外泄而其體輕能食壯盛之少年往往多汗能日行數十里而無倦容血液虛故裏溫不勝水氣水氣留著肌理而其體重老年食少肌肉枯燥無汗故好眠睡少年虛羸者面無血色皮毛不澤故亦不能動作垂死之人分肉不溫而生陽絶故重如鐵石故病者因膽汁不能消穀損其生血之原於是因血虛而脈遲雖汗出不惡寒病機漸入陽明而汗出不徹其身必重此證若惡風而見浮脈即為防己黃耆湯證但見短氣腹滿而喘外有潮熱即陽氣有外達之機可用桂枝加厚朴杏仁以助之所謂喘家用桂枝湯加厚朴杏子佳也惟外已解者乃可攻裏但令手足濈然汗出則胃液悉化為汗不復下行滋溉腸中大便已燥乃可以大承氣湯攻之若汗多而微見發熱惡寒其外未解猶為麻杏石甘湯證承氣湯不中與也若腹大滿不通不得已而用下法亦不過用小承氣湯而止言外可見大便略通並小承氣湯亦可不用近人於此證不識為太陰陽明合病名之曰濕溫舍蒼朮白虎湯一方外更無餘事曾亦知表氣不達濕留肌腠者有時當從汗解乎又其下者反用生地石斛等滋陰之品錮其表汗汗液結成細菌名之曰白㾦雖未必致人於死亦太多事矣豫治病雖少然二十餘年未見有發白㾦者亦可信醫家製造之別有專長也陽明病潮熱大便微硬者可與大承氣湯不硬者不可與之若不大便六七日恐有燥屎欲知之法少與小承氣湯湯入腹中轉矢氣者此有燥屎也乃可攻之若不轉矢氣者此但初頭硬後必溏不可攻之攻之必脹滿不能食也欲飲水者飲水則噦其後發熱者必大便復硬而少也以小承氣湯和之不轉矢氣者慎不可攻也俗語有之肺腑而能語醫師面如土言內藏之未易臆斷也故近代醫家每有試藥之法審斷不確先用輕劑以嘗之辨證既精然後改用重劑雖未免徘徊觀望然亦慎重生命之道也此節實即試藥之法蓋陽明為病惟熱發而汗泄者方可與論大便燥實與否而後攻之以大承氣若但有潮熱而大便不堅未足言攻下也不大便六七日似可以攻下矣然腸中燥實與否尚未可定而必先用小承氣以嘗之服藥後腸中苟已燥結大便當下不下而但轉矢氣則燥實顯然然後用大承氣湯可以一下而愈若不轉矢氣而大便初硬後溏雖外見陽明之燥中實含太陰之濕以裏濕之證又經妄下甚之以虛寒則濕之所聚腹必脹滿胃氣虛寒食入則吐下濕上燥渴欲飲冷入咽即病噦逆後文所謂胃中虛冷不能食者飲水則噦即此證也得此證者吳茱萸湯主之用吳萸以溫厥陰肝藏即所以和滲入胃底之膽汁兼用人參薑棗以救胃氣虛寒則胃寒去而噦逆平矣設嗣後仍見潮熱必其大便當燥仍宜用小承氣湯試之以觀其轉矢氣與否若轉矢氣方可用大承氣湯以攻之否則胃寒噦逆之證不免復作此亦前車之覆後車之鑒也須知和之者為小承氣攻之者為大承氣張隱庵以慎不可攻屬小承氣說直譫語耳夫實則譫語虛則鄭聲鄭聲者重語也直視譫語喘滿者死下利者亦死語言之發必經思慮而後出心之元神藏於腦凡有思慮心為主而腦為役是故事關探討則仰首而神凝暴受驚恐則顛眩而神昏明乎此然後可與言鄭聲譫語之理本條云夫實則譫語虛則鄭聲鄭聲者重語也直視譫語喘滿者死下利者亦死張隱庵以為因虛而致譫語即鄭聲並謂此下十二節皆論譫語而不言鄭聲當知鄭聲即譫語之重復此特就本書推測言之其理固未明也夫熱鬱則邪實病久則正虛固當有一病而兼見譫語鄭聲者固不得謂何證當見譫語何證當見鄭聲也故下文但舉譫語而不言鄭聲蓋腦為清竅胃中鬱熱穢氣上蒙則聞見多妄腦為神舍久病虛羸精氣耗散則遊魂不歸故臥榻之旁忽見有鬼出入或驟見刀兵水火或途遇蛇虎相逼似夢似醉驚呼叫號是為譫語或忽在通衢忽浮大海恍惚遷變一時欲歸不得口中呶呶不休是謂鄭聲要知陽明化燥惟精氣壯實者或但見譫語而不見鄭聲然至病延八九日外神氣外浮恐亦有魂遊墟莽之象若不急下往往枯槁而死甚可痛也惟見此證者要亦不能無辨均之虛也生死之間若死與夢人方臥寐神魂從泥丸出日有所思而夢見之即日無所思而夢亦見之然稍有驚覺即神返其舍生氣存焉耳人之將死也神魂亦從泥丸出營營而上浮忽忽乎遠逝如葉之脫如煙之散則一去而無歸矣故同一神不守舍不自約束之譫語鄭聲關於陽熱上薰者是之謂逼去其所逼而反本有餘關於精氣內奪者是之謂脫固其所脫而猶恐不及是故陽將上脫則直視譫語而喘滿陰液內亡則直視譫語而下利之二者不下亦死況經妄下臨證者不可不慎也陽明鬱熱上薰於腦腦中燥熱目系強直神經瞀亂則直視而譫語但見此證而並見喘滿或下利者何以知其為必死蓋直視譫語原為胃中燥實之證直視譫語而一時並見喘滿則胃中阻隔吸入之氣至中脘而止不能下達丹田吸入之氣與呼出之氣併居肺不能容是為喘滿其為當下較然無可疑者然金匱有言吸而微數其病在中焦實也下之則愈虛者不治又曰在上焦者其吸促在下焦者其吸遠此皆難治呼吸動搖振振者不治夫在上焦者其吸促為肺虛氣弱在下焦者其吸遠為腎虛不能納氣皆因中焦正氣之虛而推廣言之惟呼吸動搖振振為氣虛形脫之實證而為三證所同然則喘滿之所以必死者亦當有此虛象按暴病之人胃有宿食妨其呼吸一下而其氣即調至於久病虛羸呼吸之間肩背俱動形氣不能相保不下固不免於死然驟然攻下胃中有宿食方動而氣已上脫矣此直視譫語而兼喘滿者所以為必死之證也金匱云下利譫語者有燥屎也小承氣湯主之蓋非胃中燥實胃熱不上攻腦部斷不至神識昏迷而發譫語雖在下利其為當下無疑然何以同一譫語加之以直視即為死證蓋直視在太陽溫病條內為誤下液虧火逆上盛目系強急之證今乃未經攻下陽明燥氣業將內藏津液薰灼殆盡並腦中目系俱燥加以協熱而利迫水下泄則腸胃必無餘潤雖於攻下藥中加入生地石斛麥冬玉竹潤燥之品正恐一杯之水不救車薪明知不下必死其如下之不動何此直視譫語而兼下利者所以為必死之證也發汗多若重發汗者亡其陽譫語脈短者死脈自和者不死太陽篇云發汗後重發汗必恍惚心亂又云傷寒脈浮以火迫劫亡其陽必驚狂所以然者汗大出而陽氣暴張心神不能自持腦部一時昏眩不甚則恍惚心亂甚則發為驚狂恍惚心亂即譫語所由來驚狂又不止譫語矣但同是發汗亡陽譫語何以脈短即死脈自和者不死且因發汗而亡陽譫語者脈何以有短與自和之別此不可不深究者也蓋汗與血同源而異致故亡血者不可發汗衄家不可發汗發汗則其血益虛脈短者血虛之明證也陽浮於外惟裏陰充足者陰氣外接猶得漸歸其根若陽越於外陰竭於內陰陽兩竭能久存乎此脈自和者所以不死脈短者所以不免於死也傷寒若吐若下後不解不大便五六日上至十餘日日晡所發潮熱不惡寒獨語如見鬼狀若劇者發則不識人循衣摸床惕而不安微喘直視脈弦者生澀者死微者但發熱譫語者大承氣湯主之若一服利止後服發端但言傷寒以太陽病惡寒無汗言之也傷寒將傳陽明則上濕而下燥是故寒濕壅成痰涎胸中痞硬氣衝咽喉而不得息則有瓜蒂赤小豆散以吐之內實者調胃承氣湯以下之此條言太陽正病凡大柴胡桃核承氣瀉心陷胸諸湯皆不在此例而太陽病依然不解不大便五六日上至十餘日則業經二候日晡所發潮熱不惡寒病狀已轉陽明加以獨語如見鬼狀其為譫語無疑俗所稱熱病似祟也但病有微甚輕則譫語劇則發狂即不見狂而熱邪暴張充塞腦部蒙蔽清竅一發即不識人心氣恍惚則循衣摸床惕而不安陽熱上逼於肺則為微喘上逼於腦則為直視但直視有二一為枯燥之直視譬之卉木枝條榮茂則柔一經枯槁則挺而不屈一為暴壓之直視譬之草上青蟲任其遊行則曲折蜿蜒執其一端則一端不能屈矣目系為腦部神經之一脈之所屬固當按脈以決死生弦與緊相類以有所逼迫而營氣外出之象如衄家發汗脈緊急直視不能瞤可證也陽氣暴菀於上脈中血液隨陽而上菀則內臟陰液尚存一經去其胃實便當引陽氣下行血之菀於上者亦且隨之而降故脈弦者生潤澤為滑枯燥為澀澀為裏虛本篇譫語潮熱脈滑而疾服小承氣湯明日不大便脈反微澀為難治可證也內藏陰液已竭則暴出之熱邪循陽絡上迫於腦者為厥陽獨行而目系之不轉為槁燥此時雖欲下之譬之枯港行舟風帆雖利其如不動何哉故脈澀者死設不大便十餘日但見潮熱譫語而無不識人循衣摸床諸危證則內實顯然陰液無損直可決為大承氣湯一下即愈之證不必更盡三劑此非慎於藥良由病輕故耳陽明病其人多汗以津液外出胃中燥大便必鞕鞕則譫語小承氣湯主之若一服譫語止者更莫復服陽明為病法當多汗為其熱盛也水氣外泄則胃液內燥不能由小腸滲入大腸而大便因硬燥氣上蒸則腦中清竅蒙翳發為譫語此證不因吐而起內臟精氣未傷故攻下較易更不需大承氣湯即改用小承氣一服而譫語止即不妨棄其餘藥蓋以視前證為尤輕故也張隱庵概以誡慎目之愚哉陽明病譫語發潮熱脈滑而疾者小承氣湯主之因與承湯一升腹中轉矢氣者更服一升若不轉矢氣勿更與之明日不大便脈反微澀者裏虛也為難治不可更與承氣湯內臟有所停蓄則其脈滑是故上膈有濕痰者滑婦人妊娠者滑腸胃宿食不去者滑金匱宿食篇云下利脈滑者當有所去大承氣湯主之即此例以推之則脈滑之可攻決然無可疑者然則陽明病譫語發潮熱脈滑疾者何以但言小承氣湯主之蓋譫語為大便心硬之證大便之硬為小承氣湯之證然猶必稍稍豫之以驗轉矢氣與否若轉矢氣續進一升大便即當自下若不轉矢氣而脈反微澀則腸內津液本虛此即上脈澀則死之證雖欲攻之而不為動也愚按大便欲行則脈當跳動上出魚際斷無大便欲行而脈反見澀之理脈反微澀者腸內絶無餘潤燥矢結如羊矢馬糞者一如頑石之不轉曰不可更與承氣湯者言無濟也治之者用皂礬半斤開水泡傾入淨桶乘熱坐於其上其氣由肛門薰入腸內燥矢必化水而下嘗見鄉人忌臨家肥田之糞投皂礬於糞池一夕悉化為水苟能依法用之或能於不治之證救活一二蓋亦莫大功德也陽明病譫語有潮熱反不能食者胃中必有燥屎五六枚也宜大承氣湯若能食者但硬耳此條訂正陽明病而見譫語潮熱其大便必硬斷未有腑氣不通而能食之理然則仲師何以言反不能食曰此仲師失辭不可為訓者也原其意旨不過謂潮熱之時胃中宿食或乘未經燥實而下行則腸胃虛當不至惡聞食臭今反見食而飽悶或稍稍納穀而脹痛則胃中宿食必因津液外泄化為臭穢堅實之燥屎欲下入小腸而不得自非用大承氣湯以攻之病必不除若稍稍進糜粥亦無所苦此即謂之能食雖潮熱譫語不過腸中便硬胃氣固無損也此蓋為小承氣湯的證故豫謂宜大承氣湯五字當在五六枚也下今在但硬耳下實為傳寫之誤張隱庵乃於有燥屎者反謂不可下能食而但有便硬之證者反謂宜大承氣湯顛倒謬誤貽害不淺特訂正之玩但字耳字語氣極輕必字也字語氣極為鄭重宜大承氣湯究竟當屬何證通人皆當辨之獨怪陳修園每作張氏應聲蟲並謂不敢妄言錯簡愚哉陽明病下血譫語者此為熱入血室但頭汗出者刺期門隨其實而泄之濈然汗出則愈厥陰少陽與陽明合病病發於厥陰之燥肝液不能養膽致膽火消水與食留為胃病豫於金匱消渴見之病發於陽明之燥傷及厥陰膽火內動迫血妄行纍及肝經豫於厥陰便膿血及本條譫語下血見之蓋肝膽與胃同居中部故肝膽餘液為胃中消水穀之助陽明邪熱上逼則肝陰虛而膽火盛膽火盛則挾胃中燥熱上迫於腦部因而譫語血室即胞中血海血得溫則行遇寒則凝肝陰虛而膽火盛膽胃陽熱竄入血室逼血橫行因而下血但頭汗出者膽胃之熱獨行腦部故也期門為肝穴在乳旁一寸刺期門實所以瀉膽火但令膽火微泄殺其橫出之勢其氣乃還歸中部與胃中津液併居於是胃中津液外泄濈然汗出還見陽明本象而下血譫語止矣汗出譫語者以有燥糞在胃中此為風也須下之下之則愈宜大承氣湯過經乃可下之下之若早語言必亂以表虛裏實故也此條訂正陽明為病法當多汗津液泄而胃中燥胃中宿食薰灼而成堅癖不化之糞穢濁亢熱上淩腦部腦氣昏暈遂發譫語此證當用大承氣湯無可疑者惟此為風也及過經乃可下之數語正需研究夫汗出譫語宜大承氣湯者為陽明習見之證何以知其為風何謂過經乃可下且所過為何經其言固大可疑也蓋此為太陽中風傳入陽明之證中風本發熱有汗其表自疏汗液外泄不待一候之期胃中即能化燥過經為太陽證罷不惡風之謂也惟下接下之太早語言必亂以表虛裏實故也三句至為難解汗出原屬表虛胃燥本為裏實若謂表虛裏實為不當早下豈一候已過而作再經即不為表虛裏實乎何謂過經乃可下乎且未下已發譫語又何謂下之太早語言必亂乎蓋仲師所謂表虛特以太陽風邪未解言之風主疏泄故汗常出而表之為虛若風邪外解即表汗當止但存裏實肌腠之間即不為風邪留戀乃不至隨下後虛氣上攻神經卒然瞀亂故前此之譫語出於胃中燥熱後此語言之亂由於風邪未解並下後燥氣而上攻譫語者不死語言之亂為腦受衝激或不免於死微甚之間判若天淵早下之為禁例實由於此此即表解乃可攻裏之義也愚按下之則愈二句當與須下之直接不當隸於節末特訂正之傷寒四五日脈沉而喘滿沉為在裏而反發其汗津夜越出大便為難表虛裏實久則譫語傷寒四五日猶在太陽七日期內脈當浮緊而反見脈沉喘滿此為何氣變證治傷寒者不可不知也人當飲食於胃其氣散布為衛故水氣在皮毛食入於胃其精內蘊為營故穀氣在脈穀氣勝則營氣抗拒外邪而脈見浮緊穀氣弱而水氣勝則營虛不能外達水濕內陷則喘其責在肺穀氣不行則滿其責在脾病不在皮毛肌腠脈乃轉浮而沉金匱水氣病其脈多沉者脈中穀氣少也傷寒本不能食胃中生血之原一時不續則血熱漸減不能充溢孫絡因而脈沉沉為在裏者即金匱所言沉為絡脈虛也胃中穀氣本虛靜而養之猶恐不濟而反援太陽陽明合病喘而胸滿之例用麻黃湯以發其汗劫胃中津液外出以致津液不能由小腸下滲大腸而大便為難表虛裏實則陰液不足不能制陽明燥氣於是濁熱上衝腦部心神恍惚發為譫語愚按此證宜厚朴杏仁以定喘小承氣湯以祛滿使胃中微和而穀氣自行喘滿既定即脈之沉者亦起矣陽明病腹滿身重難以轉側口不仁面垢遺尿發汗則譫語下之則頞頭上生汗手足厥冷若自汗出者白虎湯主之此條訂正白虎湯方知母六兩石膏一斤甘草二兩粳米六合上四味以水一斗煮米熟湯成去滓溫服一升日三服此條為陽明經證發端三陽合病四字當在後文脈浮而緊條傳寫之倒誤也夫脈浮緊屬太陽咽燥口苦屬少陽不惡寒反惡熱屬陽明此三者皆三陽篇提綱固當為三陽合病本條則無之可知歷來注釋家望文生訓皆瞽說也夫陽明之中氣為太陰太陽將傳陽明必上濕而下燥故有脈遲汗出不惡寒者亦必有身重短氣腹滿而喘諸證為其太陽表汗未盡內併太陰之濕而未易化燥也濕熱內蘊上冒咽喉而出則口中糜碎舌苔乾膩而厚至不能辨五味下逼於腎膀則小溲不禁此時若發其汗則胃中燥熱上攻腦部必至心神恍惚發為譫語若用硝黃以下之則浮熱上冒陽明經脈入腦之處而頞上生汗頞上者闕上也兩眉間為闕為愁苦者見顰蹙之處孟子所謂蹙頞即兩眉間也陽明胃中燥實則闕上痛故誤下後浮熱上冒則闕上生汗脾主四肢胃亦主四肢誤下後脾胃陽虛故手足逆冷故欲救譫語之逆宜小承氣欲救四肢逆冷宜四逆理中蓋此證不當急治必待自汗出然後可用白虎湯泄肌理之濕熱俾從汗解此亦有潮熱乃可攻裏之例也愚按面垢下譫語字亦為衍文若本有譫語下文發汗則譫語當作何解乎陽明病太陽證罷但發潮熱手足漐漐汗出大便難而譫語者下之則愈宜大承氣湯此條訂正此節全係正陽陽明內實之證發端言二陽併病此必非仲師原文淺人因三陽合病而妄加之也夫既曰太陽證罷無頭痛惡寒惡風諸證可知安得更謂之併病但發潮熱手足汗出則胃中津必少少則不能下潤大腸而大便難胃中燥熱上衝心神所寄之腦部一時昏暗而心神為之恍惚遂發譫語譬之膽怯者夜行見寢石以為伏虎見植木以為立人安在所見之非妄又如敗軍之將草木皆兵聞風聲鶴唳則惕息而伏此無他皆因暴受激觸腦中震動心神失所依據故也陽明病之譫語何以異此要惟大承氣湯以下之一泄腸胃之燥熱而諸恙可愈然則此證為正陽陽明而非二陽併病較然無可疑者張隱庵明知併病之非猶言太陽病氣併入陽明則盡信書之過也三陽合病脈浮而緊咽燥口苦腹滿而喘發熱汗出不惡寒反惡熱身重若發汗則燥心憒憒反譫語若加溫針必怵惕煩燥不得眠若下之則胃中空虛客氣動膈心中懊憹舌上胎者梔子豉湯主之此條訂正此節為三陽合病前條已訂正之此云陽明病者誤也夫太陽傷寒提綱曰脈浮緊此當用麻黃湯以汗者也少陽提綱曰口苦咽乾目眩設兼見脅下硬滿乾嘔不能食往來寒熱諸證此猶當用小柴胡湯以汗之者也說詳太陽篇陽明提綱為不惡寒反惡熱陽明從中氣化故胃中未經化燥有身重喘滿之太陰證若見潮熱手足汗出則胃中已經化燥此當用三承氣以下之者也惟溫針則三陽並忌之陽明一證但熱不寒醫雖至愚斷不至誤用溫針故仲師於陽明篇中未垂明誡若太陽篇太陽傷寒加溫針必驚少陽篇吐下發汗溫針譫語則固言之詳矣若此證既為三陽合病無論驟加溫針火邪內攻血脈迫陽氣外張有怵惕煩燥不眠之變即以脈之浮緊而發汗而胃液既從外泄膽火因熾於是手足不得寧靜坐臥不知所安膽胃之熱上蒙心神所寄之腦部亦且恍惚而時發譫語即以不惡寒但惡熱而下之胃中津液下泄胃底膽汁既虛少陽浮火亦必衝動膈上而心中為之懊憹似慍似怒似憎似悔所以然者藥宜於太陽者或轉為陽明少陽所忌藥宜於陽明者或不免為少陽所忌故也要之此證為濕熱內蘊試觀土潤溽者則地生苔蘚故驗其舌生黃膩之苔即為濕熱之明證但須梔豉湯輕劑以清裏疏表而濕熱已解蓋此證全屬氣分雖曰三陽合病究非實熱可比葛仙翁肘後方淡豆鼓治傷寒主能發汗雖不盡然然必非吐劑太陽篇云發汗吐下後虛煩不得眠劇者必反覆顛倒心中懊憹梔子豉湯主之救逆之法與此條正相類也若渴欲飲水口乾舌燥者白虎加人參湯主之白虎加人參湯方知母六兩石膏一斤甘草二兩粳米六合人參二兩上五味以水一斗煮米熟湯成去滓溫服一升日三服若脈浮發熱渴欲飲水小便不利者豬苓湯主之豬苓湯方豬苓茯苓澤瀉滑石阿膠各一兩上五味以水四升先煮四味取二升去滓內阿膠煬消溫服七合日三服此承上節汗下溫針而為救逆之方治也上節為濕熱內蘊浮陽外越之證若陽不外越而津液內傷則有渴飲口乾舌燥之變若浮熱在表水濕內蘊則有渴欲飲水小便不利之變此二證並較前證為輕津液內傷則以清胃熱生津液主治故宜白虎加人參湯用人參者為燥氣留於氣分也熱浮於外水鬱於裏則以導水邪清血熱主治故宜豬苓湯用阿膠者為濕熱留於營分也陽明病汗出多而渴者不可與豬苓湯以汗多胃中燥豬苓湯復利其小便故也陽明為病法本多汗汗多而渴胃中津液已傷此本白虎加人參湯證一以清其胃熱一以養其津液其病當已不似小便不利者可與豬苓湯也若汗多胃燥之證更與豬苓湯利其小便輕則大便必硬重則胃中燥實發為譫語此不可以不慎也脈浮而遲表熱裏寒下利清穀者四逆湯主之胃中穀氣為生血之源血熱充則脈數血熱減則脈遲前於食難用飽汗出不惡寒條下已詳釋其旨茲復略而言之夫脈浮為表熱遲為裏寒裏寒者胃中虛也胃虛則脾濕聚之脾濕重滯由小腸下陷太腸乃並胃中未化之穀食傾泄而出此時手足厥逆冷汗出胃中陽氣垂絶若不急溫之危在旦夕故必用大劑四逆湯以回中陽乃得轉危為安慎不可以生附子一枚為太重而減其劑量也若胃中虛冷不能食者飲水則噦陽明中氣為足太陰故太陽初傳陽明往往上濕而下燥故有攻下太早損其中陽致胃寒脾虛腹中腹滿不能食者此時下濕上燥渴欲飲冷一入於胃即不能受而發為噦逆前於潮熱條下已略舉大概然亦有不待攻下而胃中虛冷不能食者則中陽自敗胃底消融水穀之膽汁視前證更為微薄所以飲水即噦也此時急需半夏乾薑散以溫之如獨陰上僭將成反胃者尤當用吳茱萸湯以抑之附子理中以和之當知胃中虛冷為主病噦為因病要非尋常治噦之橘皮生薑湯橘皮竹茹湯所能奏功也脈浮發熱口乾鼻燥能食者則衄脈浮發熱太陽之病多有之未可決為陽明病也陽明為病要以大渴引飲為候胃中燥熱勢不得不借助於外於是有口乾引飲之證陽明之脈起於鼻交頞中陽明之熱由腸胃上逆則闕上痛闕上者頞上也故誤下胃虛浮熱上冒頞上生汗熱在於經鬱而不達於是有鼻燥之證然猶恐客熱不能消穀也必驗其能食與否若能食者則胃中穀氣不虛而初非客熱但此證大便不硬胃中無燥實之證承氣湯既不當用熱上於頭無熱結在裏之變白虎湯又不宜用陽熱之上浮者無所發泄必至上薄於腦顱骨受蒸合縫處當有微隙血之溢出者乃由鼻交頞中下注鼻孔於是熱隨衄解凡遇此證頞上不可早拍涼水誠恐熱泄未盡轉為他證近世醫家以衄為紅汗者正以其泄鬱熱故也陽明病下之其外有熱手足溫不結胸心中懊憹飢不能食但頭汗出者梔子豉湯主之陽明為病胃熱上薰腦部心神恍惚則為譫語悍熱上衝闕上則為頭痛胃中熱甚灼咽與舌則為渴飲胃中燥急傷足陽明脈絡其自胃口下循腹裏抵氣街下髀關抵伏兔下膝臏者一時短縮掣痛而右足不良於行濁陰從右降故足陽明支脈獨病於右大腸與小腸交會處之盲腸居臍右旁下一寸此時急下以大承氣湯猶恐藥力不峻下後不能了了惟太陽之傳陽明中下化燥而上膈猶濕故仲師於陽明一證往往以慎下為主要反不似下利脈滑者可以見證而急攻設燥熱不甚而下之太早則上濕下陷燥去寒生即有身寒肢冷之變救逆之法為四逆理中設太陽標陽未盡下後與上膈濕痰併居心下則有結胸之變救逆之法為大陷胸湯丸及小陷胸白散諸方今皆無之而但見心中懊憹飢不欲食但頭汗出直是氣分之餘邪初非實證可比胃中肝膽之液因下後見損陽明浮火由胃絡上衝於心則心中懊憹太陽篇汗吐下後虛煩不得眠心中懊憹與此正同胃因下後空虛則易飢消磨水穀之胃液因下後見少中氣痞悶上不得噫噯呵缺下不得轉矢氣故飢不能食太陽篇胸即此中空證但頭汗出者下後虛陽上僭膽胃之熱獨行腦部故也太陽篇火劫發汗營衛兩虛厥陽獨行則但頭汗出陽微結於心下則頭汗出發汗復下胸脅滿微結小便不利渴而不嘔中氣不能外達則但頭汗出本篇肝陰虛而膽火盛膽胃陽熱侵入血室逼血妄行則但頭汗出此證下後陰陽兩虛膽胃之火隨浮陽上行腦部與以上各證相出入以其餘邪獨留氣分故但需梔子以清裏豆鼓以疏表而諸恙可愈故知病後餘熱因正氣未復逗留中脘外及肌表者正不需白虎瀉心諸湯即輕劑亦當奏效也陽明病發潮熱大便溏小便自可胸脅滿而不去者小柴胡湯主之陽明為病每當日哺所發潮熱一似江潮之有信所以然者日晡陽衰地中水氣被日中時陽氣蒸薄至陽衰時始得上騰陽明燥熱之氣往往格拒不受發潮熱多見於此時者病氣為之反抗也故發潮熱為陽明必有之證大便溏則腸胃不燥小便自可則下焦腎膀自通腸胃不燥則濕從下泄而胸滿者當去腎膀通暢則水道不淤而脅滿亦當去脅下為腎而卒不去者此非水濕停蓄乃太陽標熱之氣鬱於胸脅而不能外達也故必用小柴胡湯以解其外不惟標熱之鬱陷者可解即下陷之水濕亦且從汗解矣陽明病脅下硬滿不大便而嘔舌上白胎者可與小柴胡湯上焦得通津液得下胃氣因和身濈然汗出而解也脅下為腎腎與膀胱為表裏者有輸尿管為之相接也內經即謂之下焦太陽寒水之氣格於腎膀而不得下行則脅下為之硬滿水氣結於下焦不能滋溉腸胃故不大便胃以燥而不和膽火從而上逆故嘔舌上白苔則為陽氣虛微故雖不大便斷無可攻之理要惟有小柴胡湯發內陷之水氣以達於上焦俾津液之上出者還入胃中胃氣得和則膽火平而嘔吐當止大便之不通者亦將緣滋溉而暢行由是中無所結陽氣外散乃濈然汗出而愈矣陽明中風脈弦浮大而短氣腹都滿脅下及心痛久按之氣不通鼻乾不得汗嗜臥一身及面目悉黃小便難有潮熱時時噦耳前後腫刺之小差外不解病過十日脈續浮者與小柴胡湯脈但浮無餘證者與麻黃湯若不尿腹滿加噦者不治此為風陽外吸濕熱內阻膈塞不通之證此證病機外出太陽則生內陷太陰則死可以兩言而決脈浮弦則為風脈浮弦而兼大則為陽明中風中風為病本屬肌腠不開脾陽不能外達觀於桂枝湯一方辛甘發散皆所以開發脾陽此可見不獨陽明中氣繫在太陰即風陽內乘而肌腠不開未嘗不繫在太陰也張隱庵黃坤載均此節為三陽合病則固不然濕熱傷氣故短氣濕阻太陰部分故腹都滿太陽寒水不能作汗外泄流於脅下則脅下痛壅於心下則心痛久按之氣不通者氣為濕阻故也氣閉於上故鼻乾不得汗嗜臥者濕困脾陽肌肉重滯故也汗液不外泄濕邪不從外解小便難濕邪不從裏解表裏壅塞故一身面目悉黃此證有潮熱必在日晡時以地中蒸氣乘陽衰而上出與身內之濕熱併居而益劇也胃中濕熱淤阻不能受吸入之清氣故時時厄逆愚按以上諸證若見譫語即為易治以太陰之濕已從燥化便當用茵陳蒿合大承氣下之若不見譫語則猶未可攻也手足少陽之脈由耳前後入耳濕邪鬱其少陽之氣故耳前後腫刺之小差者有以泄其鬱陷之氣也若潮熱不解病過十日在兩候以往當傳少陽之期其脈續見浮弦則當用小柴胡湯以汗之脈但浮而不見弦大者則當用麻黃湯以汗之但令太陰濕邪從太陽外解而已無餘事豫所謂病機外出太陽則生者此也若夫太陽陽氣不泄於膀胱太陰濕邪併居於腹部陰霾四塞真陽外脫遂至厄逆不止此時雖用四逆以治滿五苓以導水吳萸以止厄亦必無濟豫所謂內陷太陰必死者此也陽明病自汗出若發汗小便自利者此為津液內竭雖硬不可攻之當須自欲大便宜蜜煎導而通之若土瓜根及大豬膽汁皆可為導蜜煎土瓜根豬膽汁導方蜜七合上一味於銅器內微火煎凝如飴狀攪之勿令焦著欲可丸並手捻作挺令頭鋭大如指長二寸許當熱時急作冷則硬內穀道中欲大便須緩去之或用土瓜根搗汁竹管灌入穀道如無土瓜膽汁和醋導之自汗出則不由潮熱而出可知或發汗及小便自利者藏府固無實熱也夫內有實熱而大便燥結者宜承氣以攻之此固無可疑者此證則為津液內竭大便雖硬不可遽投承氣惟仲師但有此說所以不可攻之理未有明言蓋腸壁間淋巴微管含有消化食物之乳糜原所以排泄廢料承氣入腸芒硝鹹寒善走能借淋巴微管中乳糜及將出未出之廢料水液潤燥屎而驅之外出今腸內津液既竭雖有芒硝之力而腸中無可借助故雖攻而不能動必待其乳糜漸復自欲大便然後用法以導之門人張永年述其戚陳姓一證四明醫家周某用豬膽汁導法奏效可備參研略謂陳姓始病咯血其色紫黑經西醫用止血針血遂中止翊日病者腹滿困頓日甚延至半月大便不行始而用蜜導不行用灌腸法又不行復用一切通大便之西藥終不行於告陳曰同鄉周某良醫也陳喜使人延周時不大便已一月矣周至察其脈無他病病獨在腸乃令病家覓得豬膽傾於盂調以醋借西醫灌腸器以灌之甫灌入轉矢氣不絶不踰時大便出凡三寸許擲於地有聲擊以石不稍損乃浸以清水半日許盂水皆赤乃知向日所吐之血本為瘀血因西醫用針止住反下結大腸而為病也越七日又不大便復用前法下燥矢二枚皆三寸許病乃告痊豫於此悟密煎導法惟證情較輕者宜之土瓜根又不易得惟豬膽汁隨地隨時皆有近世醫家棄良方而不用為可惜也豬膽並腸液西醫通稱消化液蓋膽汁最苦能泄而降人固如此豬亦宜然況豬之所食至為穢濁則豬之膽汁疏泄穢濁之力必巨故借之以助排泄糞穢最為合用而況膽汁含有鹼性鹼與醋化合最易發酵腸中燥屎遇之亦以收縮脹力而易為活動也陽明病脈遲汗出多微惡寒者表未解也可發汗宜桂枝湯陽明病脈浮無汗而喘者發汗則愈宜麻黃湯陽明之病有自中風傳來者則營氣先傷以其所痹在肌肉為孫絡密布之區故也中風之證衛強而營弱衛強則表汗自出營弱則裏氣不達脈遲者營氣不足之徵也此證肌腠未解風從汗孔襲肌必微惡風可仍從太陽中風例用桂枝湯發肌理之汗使之由肌出表然後營氣與衛氣相接一汗而表熱解浮汗止矣此證當云微惡風者肌未解也今云微惡寒者表未解也實為仲師失檢處有自傷寒傳來者則衛氣先傷以其所閉在皮毛為衛陽疏泄汗液之區也傷寒之證衛病而營不病衛病者汗液不通於外營不病者血熱抗拒於裏脈浮者衛氣受病之徵也此證皮毛未解寒邪阻其肺氣之呼吸必無汗而喘可仍從太陽傷寒例用麻黃湯發皮毛之汗使寒邪由肺出表一汗而表疏喘定矣愚按以上二證皆推原其始病以為治與柔痙之用栝蔞桂枝湯剛痙之用葛根湯同例皆不欲其因魄汗未盡而轉屬陽明也陽明病發熱汗出者此為熱越不能發黃也但頭汗出身無汗劑頸而還小便不利渴飲水漿者此為瘀熱在裏身必發黃茵陳蒿湯主之茵陳蒿湯方茵陳蒿六兩梔子十四枚大黃二兩上三味以水一斗先煮茵陳減六升內二味煮取三升去滓分溫三服小便當利尿如皂角汁狀色正赤一宿腹減黃從小便出也陽明病發潮熱而多汗則濕隨汗去肌肉皮毛略無壅阻斷然不能發黃此正與小便利者不能發黃證情相似濕邪解於太陽之表與解於太陽之府一也若但頭汗出身無汗劑頸而還則濕邪內壅而不泄加以小便不利渴飲水漿濕熱瘀積於三焦外溢於皮毛肌肉而周身發黃茵陳蒿湯茵陳蒿以去濕生梔子以清熱生大黃以通瘀而濕熱乃從小溲外泄而諸恙除矣此證與太陽篇陽微結於心下小便不利渴而不嘔者略同故皆有但頭汗出之證也陽明證其人喜妄者必有畜血所以然者本有久瘀血故令喜妄屎雖硬大便反易其色必黑抵當湯下之此條訂正吳江徐鹿萍有言忘當為妄字之誤喜為有意忘為無心以有意作無心事此為理之所必無則喜忘二字正不可通是也然豫猶嫌其證佐之不足也凡病蓄血者必發狂太陽篇太陽病不解熱結膀胱其人如狂血自下下者愈又云太陽病表證仍在脈微而沉反不結胸其人發狂者以熱在下焦少腹當硬滿小便自利者下血乃愈一為桃核承氣證一為抵當湯證皆明言發狂然則喜妄者即發狂之變文今人於妄自尊大無故怒詈者謂之狂妄足為旁證獨怪張隱庵本改上喜忘為善忘陳修園淺注並改之真誤人不淺也豫每見老人血衰或刻意讀書心營虛耗則必有善忘之病蓄血證不在此例又況太陽蓄血尚有發狂之變豈有陽明燥熱而反安靜者乎蓋即靈樞本神篇所謂狂妄不精也靈樞亦作妄蓋漢人假借字血結於下則腦部神魂不清故言語動作多狂妄此正與夜則譫語之蓄血證同例但驗其大便色黑硬者即當用抵當湯以下之但令濁瘀速去則神魂清而狂妄止矣陽明病下之心中懊憹而煩胃中有燥屎者可攻腹微滿初頭硬後必溏不可攻之若有燥屎者宜大承氣湯吳又可溫疫論每言溫病下後不妨再下此深明仲師之旨而高出於吳鞠通王孟英者也夫下後心中懊憹而煩果屬虛煩直梔子鼓湯證耳設胃中燥屎未盡其脈必實且日久必發譫語此當仍用大承氣湯以攻之但腹見微滿雖大便不行不過燥屎結於直腸之內以上仍屬溏薄要不過脾約麻仁丸證若辨證不精正恐一下之後溏泄不已浸成寒濕之變故仲師於下後再下必詳加審辨而吳又可之說抑又未為通論矣病人不大便五六日繞臍痛煩躁發作有時者此有燥屎故使不大便也不大便五六日有因津液內竭者有因水濕內壅者未可定為燥屎也大腸自右至左環出小腸之上而適當臍之部分故繞臍痛為病在大腸煩者心煩即上所謂心中懊憹而煩也燥者口燥即上所謂口乾舌燥也斯二者皆陽明病的證然必以發作有時為驗者一為日中陽氣極盛之時一為日晡所陽衰之時但陽盛之時而煩燥始劇則胃中陽熱猶輕惟日晡陽衰之時而陽熱與陰氣相抗胃中陽熱乃熾故仲師以日晡所劇者屬陽明此與寒證日中而劇者可為對照豫嘗治崇明黃生元龍寒飲日中形寒吐酸用重劑小青龍湯而愈可以證明病氣與天時之反抗故日哺所而煩燥加劇胃中必無津液不能由小腸滋溉大腸而腸中必有燥屎此即五六日不大便之由愚按上節若有燥屎者宜大承氣湯二語即為此節說法蓋上節不過辨其可攻與否原不必另出方治也病人煩熱汗出則解又如瘧狀日晡所發熱者屬陽明也脈實者宜下之脈虛浮者宜發汗下之與大承氣湯發汗宜桂枝湯病人煩熱汗出即解如瘧狀者太陽陽明並有之太陽篇云太陽病得之八九日發熱惡寒熱多寒少一日二三度發面有熱色無汗而身癢者桂枝麻黃各半湯證也又云服桂枝湯大汗出形似瘧日再發者汗出必解此桂枝二麻黃一湯證也若日晡所發熱則屬陽明陽明之病日晡所發熱有二因一由陽衰陰盛地中水蒸氣上出之時病氣與之反抗一由日暮之時草木發出炭氣病氣與之化合惟與水蒸氣反抗者不必見譫語與草木炭氣化合者必有譫語為其昏氣重也故同一日哺所潮熱而有胃中燥實與不燥實之別見證同而治法不同皆當決之於脈脈滑大而堅實則為大承氣證若脈但緩而不實則為桂枝湯證仲師言浮虛者不過對上脈實言之非虛弱之虛也獨怪近人遇時以汗解時復發熱之證不問太陽陽明通謂之濕溫日進桑葉菊花銀花連翹石斛生地等藥即稍近高明者亦不過能用蒼朮白虎藥不對病庸有濟乎大下後六七日不大便煩不解腹滿痛者此有燥屎也所以然者本有宿食故也宜大承氣湯此即吳又可所謂溫病下後不妨再下之證也大下後六七日不大便設中無所苦但得小便減少即大便當下惟煩熱不解腹滿痛者乃可決為陽明燥實之證蓋以本有宿食下後未盡與陽明燥氣併居鬱久而復熾故也此惟大承氣湯足以徹其餘邪而不嫌猛峻設畏承氣猛峻而漫用焦穀麥芽炒萊蔔子焦六麴及瓜蔞麻仁等味則陽明伏熱既不能除腸中燥屎又不能盡有精氣日漸消耗而至死者為可恨也病人小便不利大便乍難乍易時有微熱喘冒不能臥者有燥屎宜大承氣湯張隱庵謂此承上文大下後亡津液而言是也津液經硝黃攻下水液從大便而出故小便不利津液既涸腸中淋巴微管中乳糜不足故大便乍難小溲不利上焦津液當還入胃中下溉大小腸故大便有時而乍易設有時微熱而不見喘冒不能臥諸證則下後虛煩心中懊憹者不過梔子豆豉湯證腸中決無燥屎惟中脘停滯吸入之氣必促空氣與裏熱相薄則病喘冒陽明者熱甚而目不交睫之謂陽熱鬱於中脘而氣衝於腦部故目張而不得眠與少陰證但欲寐相反水幽而火明也此正不待腹中滿痛已可決為當下之證故亦宜大承氣湯食穀欲嘔者屬陽明也吳茱萸湯主之得湯反劇者屬上焦也太陽水氣不能隨陽外達流入胃中即為寒飲胃中陽熱本盛不能容涓滴之水飲入於胃隨時化氣從淋巴細管散出故胃中但有膽汁胰汁胰亦名脺西醫稱為甜肉在胃之下與脾連屬中醫則通謂之脾肝液味酸者即是而不能留積外來之水其所以寖成寒飲者膽汁少而胃中虛寒也故食穀欲嘔一證不當據頗欲吐之例指為陽明之熱亦有屬吳茱萸湯證者金匱云嘔而胸滿者吳茱萸湯主之乾嘔吐涎沫頭痛者吳茱萸湯主之可為明證惟得湯反劇則是陽明悍熱之氣衝激於上張隱庵謂火熱在上必水氣承之而病可愈雖不出方可以意會則舍大承氣湯而外寧有治法乎太陽病寸緩關浮尺弱其人發熱汗出復惡寒不嘔但心下痞者此以醫下之也如其不下者病人不惡寒而渴此轉屬陽明也小便數者大便必鞕不更衣十日無所苦也渴欲飲水者少少與之水停心下但以法救之渴者宜五苓散此條訂正太陽之病誤下成痞者則太陽標熱陷於心下而關上之脈獨浮是為大黃黃連瀉心湯證關上浮者陽熱在胸中故也今寸緩關浮尺弱發熱汗出而復惡寒病不在膈上故寸緩腎陽虛故尺弱雖關上見浮胸中陽熱獨盛而太陽之表寒未解夫心下痞而復惡寒汗出者則又為附子瀉心湯證瀉心湯加附子以救表陽不嘔而但痞則心下本無水氣可知故證情與乾嘔之甘草瀉心湯殊異但太陽誤下成痞雖部位當胃之上口要不為轉屬陽明如未經誤下病人不惡寒反惡熱大渴引飲表裏俱熱乃真為轉屬陽明也陽明病法當多汗然又有腸胃無實熱不能蒸水液成汗而小便數者其大便必硬不更衣十日無所苦雖硬不可攻之此時津液不能上承亦當渴欲飲水但須少少與之而不宜過多所以然者陽熱少而蒸化難也惟節末但以法救之渴者宜五苓散二語則殊有未妥蓋此節所論為小便數而陽熱不甚之證設令為水濕中阻津液不得上承則以五苓散利其小便中氣既通內藏津液自當隨陽上達今小便既數大便復硬則其渴為津液內竭豈有津液內竭之證而反用五苓散者乎愚按少少與之下當脫水停心下四字蓋津液內竭而渴欲飲水原不同陽明熱盛者易從汗泄必有水停心下之弊設水停心下津不上承而渴但用五苓驅水下行然後中氣通而津液上達不治渴而渴自止矣太陽篇云渴欲飲水水入則吐者名曰水逆五苓散主之所謂法也脈陽微而汗出少者為自和也汗出多者為太過陽脈實因發其汗出多者亦為太過太過為陽絶於裏亡津液大便因硬也脈浮而芤浮為陽芤為陰浮芤相摶胃氣生熱其陽則絶趺陽脈浮而澀浮則胃氣強澀則小便數浮澀相摶大便則難其脾為約麻仁丸主之麻仁丸方麻仁二升芍藥半斤枳實半斤大黃一斤厚朴一斤杏仁一斤去皮尖別研作脂上六味為末煉蜜為丸如梧桐子大飲服十丸漸加以知為度太陽之傳陽明也曰脈大曰脈數急此由太陽浮脈一變而成內實之脈也陽明之證大便固硬然大便硬者要不盡為大承氣證此不可以不辨也夫太陽之氣由衛而達於皮毛為水分蒸化之汗由營而達於肌腠為血分泌出之汗由三焦而下出膀胱為水分未經化汗之液之三者雖半屬人體中廢料其中亦含有陰液與體中陽氣化合足以排泄外來之風寒然泄之太過皆能耗胃中津液不能溉潤大腸而大腸為之燥結故三因不同而同歸於大便之難均之與正陽陽明潮熱譫語者相去懸絶故仲師分條辨脈使來學知所抉擇脈陽微則平陽實則滑大夫太陽之病無論傷寒中風服麻桂湯後皆當取其微似汗者病乃隨汗而解故脈陽微而自汗汗出少者為自和自和者肌表通徹而營衛和也至於脈微自汗汗出太多則陰液必損因發汗太多脈陽實而見滑大者亦為陰液受損故仲師皆謂太過陰液外散則胃中陽熱與陰氣隔絶而成燥實大便因硬此大便之難由於發泄肺與皮毛汗傷衛氣肺陰虛而水之上源竭也太陽之病其脈本浮夫中風之證皮毛本開風從毛孔而入直入肌腠肌腠皆孫絡密布之區故其病在營而不在衛即傷寒為病表解腠理未和者其病亦在營而不在衛故病有隨經入裏而熱入血室者亦有隨陽上出而為衄者亦有發肌理之汗取資於血液之分泌者設因發肌腠之汗過傷其血液之分泌或因衄血或因血結胞中用抵當湯下後表病未解血分既傷其脈必浮芤相摶血液愈少胃中益生燥熱而在裏之陽熱亦與陰氣隔絶而腸胃燥結此大便之難由於開泄脾與肌肉及衄血蓄血傷其營氣而統血之藏虛也足陽明胃氣以趺陽為驗浮則為胃氣上盛澀則陰液下消胃熱盛於上小便數於下則見浮澀相摶之脈胃中津液日少遂成脾約此大便之難由於胃火太盛太陽水氣以不勝煎迫而從腎膀泄也此三證一由水分傷於皮毛之多汗一由血分傷於肌理之多汗及衄與蓄血一由胃火太甚自傷未曾化汗之水分而胃中亡其津液仲師特於第三證出脾約麻仁丸方治者蓋以上二證治之得宜必不致大傷水分血分不似穀勝水負必待善後之方治也須知陽絶於裏為厥陽獨行不獨表汗太過血液內虧為陽絶於裏即胃氣獨盛小便數而胃中不留水液者亦為陽絶於裏譬猶狂夫逐婦恩絶中道者然故謂之絶張隱庵乃謂表陽內陷如絶於裏而不行於外者然所謂以其昏昏使人昏昏也太陽病二日發汗不解蒸蒸發熱者屬胃也調胃承氣湯主之此條訂正太陽病三日當為二日謂七日以後也發汗不解郤復蒸蒸發熱則病不在表而在裏胃中熱而蒸逼於外也故但需調胃承氣已足消融其裏熱不似有燥屎者必需攻堅之枳實也傷寒吐後腹脹滿者與調胃承氣湯太陽將傳陽明必上濕而下燥中氣不通上焦水液蒸化而成痰涎胃底膽汁不能相容乃上逆而為吐吐後腹脹滿者濕去而燥實未減也故亦宜調胃承氣以下之設腸胃初無宿垢則上膈陽氣既通中氣自能下達不當見脹滿之證矣太陽病若吐若下若發汗後微煩小便數大便因硬者與小承氣湯和之則愈太陽之病所以轉為陽明者必有其因其不傳陽明者亦必有其因借如陽脈微者為陰陽自和當自汗而解但陰脈微而陽脈實者為汗多胃燥當下之而解寸微浮胸痞硬氣上衝咽喉不得息者為胸有寒飲當吐之而解此太陽之病可吐下發汗而解也惟吐下與汗皆傷陰液心營不足或不免於內煩使小便不數雖至懊憹梔豉湯足以解之惟小便數而大便因硬積久將成內實但因小便數而大便難者究與陽明壯熱而致小便數者有別故但用小承氣湯和之即愈不待芒硝之鹹寒也得病二三日脈弱無太陽柴胡證煩躁心下硬至四五日雖能食以小承氣湯少少與微和之令小安至六日與承氣湯一升若不大便六七日小便數少者雖不能食但初頭硬後必溏未定成硬攻之必溏須小便利屎定硬乃可攻之宜大承氣湯此節補太陽篇血弱氣盡節未備之義特於陽明篇發之也血弱則腠理開而營氣微氣盡則皮毛開而衛氣微血弱氣盡為肌表虛肌表虛則其脈當弱血弱氣盡固當有邪乘肌表之虛與正氣相摶結於脅下往來寒熱者此所謂太陽柴胡證也夫營衛兩虛之證水氣盛則以不得標陽之化而結於脅下水氣不盛則以胃熱內熾而病煩燥得病二三日未過七日之期限又未經汗吐下必不致陰液大傷此證初傳陽明猶當為中氣用事此時胃熱上蒸脾濕乘之濕熱交阻氣機痞塞故心下硬滿但此心下硬滿原不同誤下成痞大小陷胸及瀉心諸湯俱不可用正恐下後陰液既虧上膈之濕熱留積胸中而不去故必至遲四五日俟中脘濕邪漸及化燥然後得用小承氣湯以微和胃氣而止其煩躁六日復與小承氣以行其大便設大便不行濕邪猶未化也蓋濕之鬱於腸胃若膠痰然粘膩阻滯衝激不去必俟其與燥屎連結成片乃能一攻而盡若攻之太早燥屎去而濕邪獨留有內熱不清久延而不易愈者所謂欲速不達也病至六七日太陽之期已滿而陽明當燥然小便既少猶恐濕邪滲入大腸雖久不大便脹滿而不能食直腸雖燥回腸中宿垢猶不免與濕邪併居設經誤下則濕邪終不了了故待小便既利然後可用大承氣以攻之則濕經化燥乃不至下後更有餘弊按此節本文原係煩躁張隱庵解為煩燥致與全節大旨顯相背馳不然二三日已口中生燥何至六七日用承氣湯猶先硬後溏者乎傷寒六七日目中不了了睛不和無表裏證大便難身微熱者此為實也急下之宜大承氣湯張隱庵曰此為悍熱之氣循空竅而上炎者靈樞動輸曰胃氣上注於肺其悍氣上衝頭者循咽上走空竅循眼系入絡腦出顑下客主人循牙車合陽明並下人迎此胃氣別走於陽明故陰陽上下其動若一目中不了了者乃悍熱之氣循眼系而上走空竅睛不和者腦為精髓之海而髓之精為瞳子悍熱之氣循眼系而入腦故睛不和大便難而無燥屎身微熱而非壯熱故曰無表裏證實熱在裏而悍氣獨行於上故謂之實設下之不早有腦膜爆裂而死者故當急下豫於張隱庵集注往往嫌其望文生訓獨此節能於陽明篇中發明腦部為中醫改進之先聲其功為不可沒也此證輕則闕上痛重者滿頭皆痛西醫謂之腦膜炎陽明病發熱汗多者急下之宜大承氣湯陽明為病法當多汗發熱故有發熱而渴欲飲水者有汗出多而渴者胃中之燥不言可知蓋發熱為營血熱熾汗多為衛氣外張此證陰虛陽亢營血熱甚則脾精槁衛陽張甚則肺液枯須知此發熱汗出為腸胃燥熱蒸逼所致譬之釜底燃薪則釜中之水鬱熱沸騰而蒸氣四出熄其薪火則沸止而氣定矣此則急下之義也張隱庵乃謂無腸胃之府證止發熱汗出多者病陽明之別氣非陽明之本氣說解殊謬發汗不解腹滿痛者急下之宜大承氣湯發汗不解腹滿痛為太陽急傳陽明之證夫太陽陽明合病原自有胃氣不和脅下硬滿不大便而嘔服小柴胡湯濈然汗出而愈者亦有汗出多而惡寒宜桂枝湯發其汗者又有無汗而喘以麻黃湯發汗而愈者若發汗不解而驟見腹滿痛之證則太陽表病未去陽明燥實已成腹滿痛為大小腸俱隔塞不通若不急下燥氣將由大腸蒸逼小腸有攻之而不能動者為小腸容積甚隘而疏導益難為力也按臍右斜下一寸大小腸交接處小腸之末多一空管名曰盲腸設有化物注入久必潰爛名盲腸炎中醫謂之腸癰有大黃牡丹湯敗醬散二方腹滿不減減不足言當下之宜大承氣湯腹滿一證寒與宿食之辨耳腹滿不關宿食則按之不痛證屬虛寒且寒甚則滿得溫必減故腹滿時減者當與溫藥四逆湯其主方也惟腹滿不減則為實按之必劇痛即或大小溲時通有時略減特減亦甚微不足言減宿食之停貯大小腸者則固依然不去故宜大承氣以下之而病根始拔按此條並見金匱腹滿篇參考之其義自見陽明少陽合病必下利其脈不負者為順也負者失也互相克賊名曰負也脈滑而數者有宿食也當下之宜大承氣湯少陽一經所以主疏泄者有二一係手少陽三焦上中二焦屬淋巴管所以排泄汗液下焦屬腎與膀胱所以通調水道故古稱少陰為寒水之藏一係足少陽膽寄肝葉中與胃為同部居胃之右而膽管注於十二指腸之端與胃底連屬膽汁助消融水穀實從胃底幽門滲入而十二指腸必先受之陽明少陽合病必自下利者胃底膽汁合胃中宿垢而下陷也少陰篇少陰病自利清水色純青者即此證色純青為膽汁膽主疏泄故必自利其脈不負者為順蓋惟見弦急滑數而不見少陰微細之脈猶為少陽陽明正脈夫少陰負趺陽為順即趺陽負少陰為逆為其水寒而中陽敗也且少陽負趺陽為順即趺陽負少陽為逆為其中氣不和而膽火上逆也惟脈滑而數乃為陽明正脈而不見少陽之弦急並不見少陰之微細乃為有宿食之脈金匱云下利脈滑者當有所去大承氣湯主之此即其脈不負之說也病人無表裏證發熱七八日雖脈浮數者可下之假令已下脈數不解合熱則消穀善飢至六七日不大便者有瘀血也宜抵當湯發熱汗多為陽明表證腹滿痛為陽明裏證此其易知者也惟不見表裏證者最難辨別前於三急下之第一證已明舉其例發熱七八日已在太陽傳陽明期內脈雖浮數法在可下所以然者熱在腸胃其勢反緩熱在氣分其勢反急急下證之熱衝腦部致目中不了了者皆氣分之上逆為之也惟脈之脈數本屬表熱今以下後浮去而數不解陽熱併居於中脘即有消穀善飢六七日不大便者設令兩足無力則為肺熱葉焦之痿躄仍宜大承氣湯此證豫屢見之若能食知飢不大便而但見少腹滿按之硬脈滑而數者乃為蓄血豫在斜橋治汪姓一證親見之豫始用桃核承氣下之大便紫黑少腹軟而滿尚未減後用大黃蟅蟲丸久久方愈乃知仲師抵當湯方治為不可易也世有畏方劑猛峻而改用輕劑者請以是為前車之鑒若脈數不解而下不止必協熱而便膿血也此承上節推言脈數不解之變證也脈數為有熱金匱云下利脈數數而渴者令自愈設不差必圊膿血所以然者熱鬱在裏必傷其血設不下利則傷及胞中血海而為少腹硬滿之蓄血證若下利不止則久久必圊膿血近人謂之赤白痢此下利亦為熱證豫治赤白利下按其腹痛益劇者多以大承氣湯取效間亦有轉為寒證而用四逆理中取效者往往附子乾薑至四五錢惟此證喜按按之則不痛其脈必沉遲而不見浮數用白頭翁湯多死蓋病之轉移攸忽萬變殆未可以膠柱而豉瑟也金匱原有桃花湯方治以去濕和中又按西醫以傷寒第一期為腸窒扶斯為太陽失表內傳陽明之燥矢證即大承氣證甚則為腸出血即下利赤色者熱則為承氣證寒則為四逆證並謂傷寒桿菌喜宿於腸內此為大誤中醫向無病菌之說而治療法常於病氣在肌表先行發汗一汗之後病機已去可見其初即有病菌決不宿於腸間而宿於汗孔故能於開泄肌表之時一汗而排泄殆盡惟其失表桿菌之在汗孔者漸入血絡由血絡漸入腸中乃有腸出血之證張隱庵以此條協熱為協經脈之熱便膿血為經脈之血化而為膿雖由憑虛推測於病理要為不謬也傷寒發汗已身目俱黃所以然者以寒濕在裏不解故也以為不可下也於寒濕中求之傷寒為病有火劫發汗傷其血液血色見於皮外而其身發黃者有陽明之燥已成太陰之濕未化濕熱內蘊而發黃者有膽汁外溢鬱於皮裏膜外而病陽熱無實之發黃者有無汗小便不利而成水濕內蘊之發黃者要未有發汗之後反見身目俱黃者蓋陽明之病未成必由胃中陽熱迫水液成汗然後胃中化燥故發熱汗多屬陽明其上膈津液未曾化汗者則為痰涎故頗欲吐亦屬陽明先濕而後燥故陽明中氣反為太陰寒濕發汗之後不能發黃其所以發黃者必由發汗之後小便不利太陰篇云脈浮而緩手足自溫者繫在太陰若小便自利者不能發黃然則仲師於本條所謂以寒濕在裏不解者即小便不利之說也寒濕在裏未曾化燥無論三承氣湯皆不可用即麻仁丸亦在禁例脈浮者宜麻黃加朮湯脈浮身重者宜防己黃耆湯水氣在皮中宜白朮附子湯所謂於寒濕中求之也傷寒七八日身黃如橘子色小便不利腹微滿者茵陳蒿湯主之傷寒七八日為太陽初傳陽明之期身黃如橘子色則非濕家如薰黃之比然陽明之中氣未盡化燥必有小便不利而腹微滿者雖黃色鮮明似乎陽熱用事而濕與熱併居於腹部故亦宜茵陳蒿湯使濕熱從小溲而出則濕減熱除而黃亦自退矣傷寒身黃發熱者梔子柏皮湯主之梔子柏皮湯方梔子十五枚甘草一兩黃柏二兩上三味以水四升煮取一升半去滓分溫再服傷寒化熱惟陽明腑證為多其有不即化熱者則為太陰寒濕以陽明中氣為太陰故也間有熱勝於裏與濕併居者則為陽明濕熱以胃熱未遽化燥猶未離乎中氣之濕也獨有身黃發熱者陽氣獨行於表而初無裏濕之牽掣則為太陽陽明合病於肌裏而為獨陽無陰之證故但用生梔子以清上生甘草以清中黃柏以清下則表熱清而身黃去矣傷寒瘀熱在裏身必發黃麻黃連軺赤小豆湯主之麻黃連軺赤小豆湯方麻黃二兩連軺二兩赤小豆一升生梓白皮一斤杏仁四十枚大棗二十枚生薑二兩甘草二兩上八味以潦水一斗先煮麻黃再沸去上沫內諸藥煮取三升去滓分溫三服半日服盡傷寒為病起於表寒血熱內抗因生表熱血為脾所統散在孫絡而密布於分肉之中表熱不從汗解與太陰之濕併居乃為瘀熱在裏肌表為之發黃麻黃連軺赤小豆湯連軺以清上熱生梓白皮以清相火赤小豆以去裏濕加麻黃杏仁以疏肺與皮毛大棗生薑甘草以助脾陽使裏氣與表氣相接則濕隨汗解而裏熱不瘀矣按此方連軺赤小豆生梓白皮合桂枝麻黃各半湯而去桂枝芍藥以衛氣之阻表汗不出而君麻黃以營氣虛而生熱而去桂芍以一身上下皆熱而用連軺生梓白皮以瘀濕成熱毒留血分而用赤小豆金匱下血用之癰膿亦用之可證也又非以上三證之發黃所可混同施治矣少陽篇少陽為病口苦咽乾目眩也少陽一經不能獨病而其端常合於陽明蓋胃底原有膽汁胃氣逆則胃底膽汁上冒而口苦膽火上灼胃管故咽乾胃熱合膽火上薰於腦故腦氣一時昏暗因而目眩但口苦咽乾盡人能辨之惟目眩則向無確解張隱庵據六元正紀論云少陽所至為飄風燔燎以為風火相煽似也但病理雖明病狀未晰豫前十年治同鄉季仲文病親見之雖少陽病之目眩未必一端要不可謂非目眩之確證豫於上午診視即知其為口苦咽乾至日晡所病者在臥榻見入視其疾者皆若有駭怪之狀問其故則曰來者面目悉如垂死之狀何也蓋此即所謂目眩也抵暮豫至其寓審其狀少陽證具因用小柴胡湯是夜吐出膽汁數口而愈夫病以汗下解者為多以衄解者已不多覯不意少陽之證竟有吐膽汁而解者是亦足以補仲師之缺也少陽中風兩耳無所聞目赤胸中滿而煩者不可吐下吐下則悸而驚足少陽之脈起於目鋭眥支脈從耳後入於耳手少陽從耳後入耳中出耳前過客主人前交頰至目鋭眥風邪中於上故頭先受之風陽隨經入耳故兩耳無所聞風陽由目眥入目故目赤膽火上逆故胸中滿而煩胸中滿非太陽失表水氣溜於膈上故不可吐煩非胃中燥實故不可下誤吐誤下虛其津液於是心營傷於吐脈必代而心必悸膽汁虛於下則怯弱多恐神魂驚惕而不寧悸則怔忡不定驚則夢寐叫呼悸為炙甘草湯證以心營虛也驚為柴胡龍骨牡蠣證以膽氣弱也救逆之方已詳太陽篇中故仲師於本篇不出方治善讀者當自悟之火邪之桂枝去芍加蜀漆龍牡救逆湯水飲之半夏麻黃丸不在此例傷寒脈弦細頭痛發熱者屬少陽少陽不可發汗發汗則譫語此屬胃胃和則愈胃不和則煩而悸醫道之失墜固由於傳授之不精而誤於認脈者亦復不少即以弦脈論之今人皆知弦為肝膽之脈矣肝為藏血之藏稟少陽膽火以上交於心肺下達於腎臟而養一身之筋故其氣專主條達其應於脈也以條暢柔和為無病之脈而非病脈也故按之如循長竿梢若弦脈之屬於少陽者為瘧為飲邪為水氣為脅下偏痛夫瘧脈自弦以汗液積於皮裏膜外而太陽寒水非一汗所能盡也痰飲脈弦者以寒水留於上膈久久化為痰涎也水氣所以脈弦者以衛氣不行於外而水走腸間也脅下偏痛所以脈弦者以水氣阻於腎關而不達下焦也況寒疝脈沉弦者當下其寒合諸證觀之則弦脈屬於少陽手少陽三焦為多蓋手少陽三焦與足太陽相合上中二焦屬淋巴管分析而不歸系統水氣化液外出於皮毛自腎以下始有系統為腎膀管水由腎藏下泄於膀胱金匱言腫在腰以上當發其汗腫在腰以下當利小便職此之由獨至少陽自病之傷寒脈見弦細而頭痛發熱者則病不在三焦而在膽不似沉弦之為寒弦滑之為飲為瘧弦緊之為水繫在太陽三焦也弦而細則為無水氣之脈蓋太陽寒水氣盛則從寒化寒水氣衰則從燥化故太陽與少陽合病常有脅下偏痛者獨少陽自病往往與陽明相繫為其從燥化也蓋水液充牣於皮毛肌腠則病太陽寒水惡寒而體痛水液不充則寒從表受熱從裏抗則病少陽相火而頭痛發熱所以然者寒氣以肌表液虛外不能固而直犯中脘膽汁由十二指腸之端溢入胃中者其亢熱之氣乃以有所壓迫而上衝腦部是為頭痛而其痛必在闕上太陽病之發於陽者亦當發熱但其證必兼惡寒發熱而不惡寒其不為太陽可知且陽明發熱法在多汗今則陽熱未甚而不見汗出其不為陽明又可知參核於二者之間則其為少陽無疑膽火本以津液不充之故鬱而上冒以至頭痛發熱若更以發汗損其胃液則胃底膽汁挾胃中濁熱上衝腦部而心神不能守舍因發譫語但此證究非胃家實不同潮熱滿痛故津液還入胃中則胃氣和而愈津液不還則燥氣薰於膈上心營耗損煩熱而動悸此證脈結代則炙甘草湯主之否則小建中湯亦主之救逆之法已詳太陽篇中故仲師於本條不贅獨怪近人一見弦脈便稱肝陽蒺藜滁菊金鈴子延胡索沉香片廣鬱金金石斛石決明羚羊角左牡蠣青龍齒柴胡白芍等雜湊成方吾正不解其所治何病也本太陽病不解轉入少陽者脅下硬滿乾嘔不能食往來寒熱尚未吐下脈沉緊者與小柴胡湯太陽之病脈本浮緊太陽失表汗液不泄水氣從淋巴管薈聚脅下腎臟寒濕停阻不得從輸尿管下泄膀胱因病硬滿水氣入胃膽汁不相容納則為乾嘔胃氣不和故不能食水邪注於脅下陽熱抗於胃底故往來寒熱此證若經吐傷中氣氣逆脈促則宜生薑半夏湯以和中氣若經誤下水氣與標熱結於心下則為痞痞當從下解故以瀉心湯下之其未經吐下而脅下硬滿則所病猶為太陽水氣故宜小柴胡湯以汗之要其脈之沉緊為緊反入裏則一也少陽忌吐下此條為未經吐下而設本篇缺吐下後兩證治特補出之若已吐下發汗溫針譫語柴胡證罷此為壞病知犯何逆以法治之譫語有二一為胃家燥實之譫語一為熱入血室之譫語蓋汗吐下溫針皆能坐耗水液水液耗則胃中與血分並生燥熱陽熱上衝於腦腦為心神所寄一有感觸則心神外亡於是輕則為譫語甚則為驚狂故有先時極吐下膽胃上逆腦部而發譫語者則刺期門以瀉之有火劫發汗而發譫語小便利者宜大承氣以下之仲師未出方治總之誤用汗吐下溫針非病胃燥即為血熱治法俱在太陽篇中故曰以法治之胃燥之證輕則小承氣略重則調胃承氣最重則為大承氣血熱之證輕者刺期門重者桃核承氣尤重者抵當湯隨證施治可也三陽合病脈浮大上關上但欲眠睡目合則汗三陽合病太陽之病轉入少陽陽明也陽明之脈本大太陽未罷故浮上關上者左關屬膽右關屬胃胃底膽汁合胃濁並生燥熱故浮大之脈獨甚於關上濕熱盛於肌腠故但欲眠睡肌腠為孫絡密布之區屬營分濕熱在營分故目合則汗營氣夜行於陰以夜則為臥寐之時衛陽內斂營氣外浮也汗隨營氣外泄故目合即汗此證若胃中燥實則汗為實熱所致宜大柴胡湯若無胃實則汗為膽中虛熱宜柴胡龍骨牡蠣湯傷寒六七日無大熱其人燥煩者此為陽去入陰故也少陽病至六七日已經一候為當傳三陰之期但少陽一證傳太陰者絶少蓋太陽一證寒水當從汗解汗出不徹陽熱轉入陽明汗液未泄者遂併入太陰之濕陽明之燥氣上薰膈上痰涎乃鬱而欲吐故太陽篇以頗欲吐者為傳設陽明陽熱不盛亦有太陽之後即傳太陰者所謂於寒濕中求之也少陽之傳不入少陰即入厥陰所以入少陰者則由手少陽三焦傳入腰以上為淋巴管腰以下為輸尿管三焦主水道外散為汗下泄為溺皆恃相火為之排泄相火日消則水藏不溫由是水藏固有之元陽遏於寒水而不能外達故有吐利手足逆冷煩燥欲死之吳茱萸湯證所以入厥陰者則由足少陽膽傳入膽管下注十二指腸之端正當胃底幽門故胃底有膽汁膽汁取資於肝藏之血液助胃中消化為生血之源血之溫度最高者為其中含膽火也膽火虛則其血不溫肝脾俱寒而生陽垂絶故有脈微手足厥冷而煩燥灸厥陰而脈不還之死證蓋此二證陽回則生陽絶則死較浮陽暴越之煩燥用乾薑附子湯茯苓四逆湯者尤為危篤本節無大熱而煩燥實為少陰厥陰兩證之漸故仲師以為陽去入陰蓋其始則為無大熱其機即有逆冷厥冷之變易曰履霜堅冰至蓋言漸也太陰為純陰無陽不當有煩燥之證故不在此例傷寒三日三陽為盡三陰當受邪其人反能食而不嘔此為三陰不受邪傷寒以二十一日為三候三候相傳則三陽經盡而當入三陰此以最甚者言之耳太陽篇云七日以上自愈者為不傳則太陽之病原不必傳陽明少陽則二十一日以後三經盡而不傳三陰者亦為傷寒通例但必胃中膽汁與胰液肝液相和乃為能食而不嘔是亦太陽傷寒七日以上自愈之例也傷寒三日少陽脈小者欲已也此節承上不傳三陰而更言其脈也傷寒第三候屬少陽少陽二字自成一句與脈小者三字不相連屬按少陽自病則其脈弦細細非小也但弦急之中脈細如絲耳太陽轉少陽則脈沉緊沉非小也但太陽內陷浮緊者轉為沉緊耳二脈皆實而有力至三陽合病則脈浮大浮大者陽熱熾盛也凡病熱度增高則病進而血熱益張其脈益大至於病勢漸減則熱度漸低脈亦較和故脈小為欲已此蓋統三陽言之特於少陽篇舉其例耳非專指少陽言之也少陽病欲解時從寅至辰上寅至辰上為夜氣清寒至晨光微露之候此時群動皆息人於此時亦志氣清明而坦白孟子所謂夜氣及平旦之氣也清露既降草木養氣漸次萌動少陽為病為鬱勃不宣之氣得此時清平和緩之氣以調之而鬱勃之氣當解此少陽之欲解所以從寅至辰上也諸家牽涉五行衰旺不可通太陰篇太陰之為病腹滿而吐食不下自利益甚時腹自痛若下之必胸下結硬太陰為濕土之藏屬脾濕注太陰所主之腹部則腹為之滿濕流於胃胃不能受則吐濕停中脘則食不下濕滲大腸則自利益甚寒濕在下故腹時痛濕為粘滯之物固非如燥矢之一下即去若濕邪猶在上膈下之轉病結胸此證腹滿自利腹痛皆四逆湯證惟下後胸結硬者宜大陷胸湯為其痰濕在上非得甘遂硝黃不足以破其堅壁也太陰中風四肢煩疼陽微陰澀而長者為欲愈中風一證病由雖出於太陽而其病氣則常合於太陰所以然者則以風邪沍於肌肉即內應於脾也但此證陰寒則死陽回則生脾主四肢陽回故四肢煩痛脈右三部為陽屬氣與水陽脈微則水氣漸減左三部為陰屬液與血陰脈澀則津液不濡設陽微陰澀而見短促則為血分枯燥為陽熱太過若陽微而不大陰澀而不滑中見條達之脈則濕邪去而正氣漸復之象也故為欲愈太陰病欲解時從亥至丑上太陰為病當以地中蒸氣為驗日晡所為陽微陰長之候地中蒸氣上升病濕者每感此氣而加劇若亥至丑上為陰中之陰風靜露涼地中蒸氣至此既行消歇故太陰之病欲解常以此時為驗也張隱庵乃謂太陰為陰中至陰而主開亥者陰之極丑者地氣開關直似陽明譫語令人無從索解太陰病脈浮者可發汗宜桂枝湯脈浮緩可發汗宜桂枝湯此太陽中風方治也此何以決其為太陰病以曾見腹滿而吐食不下自利腹痛之證言之也脾主肌肉太陽中風風著肌肉而內應於脾故用助脾陽之薑棗甘草以發之語詳太陽當篇中以太陰病而見浮脈則濕邪正當從太陽外泄客從大門入還當送之使出也自利不渴者屬太陰以其藏有寒故也當溫之宜服四逆輩濕邪滲入大腸則為自利使濕邪漸減胃中必生燥熱於是有自利之後而轉為燥渴者至於不渴則其為寒濕下利無疑曰藏有寒者實為寒濕下陷大腸初非指脾藏言之蓋此證必兼腹痛按之稍愈用大劑四逆湯可以一劑而愈不待再計而決蓋寒阻而腹痛者其氣凝滯而不化必待溫藥和之而氣機始通也傷寒脈浮而緩手足自溫者繫在太陰太陰身當發黃若小便自利者不能發黃至七八日雖暴煩下利日十餘行必自止以脾家實腐穢當去故也傷寒脈浮緩本為太陽中風證其病起於風中肌理汗液不得外泄汗出不徹則太陽之水與太陰之濕併居故曰繫在太陰按太陽之傳陽明必先病濕七八日化燥乃為陽明承氣湯證或七八日暴煩下利日十餘行則仍為太陰將自愈之證但病之傳變以小便之利不利為驗使小便不利則身必發黃而為茵陳蒿湯證惟小便利者雖同一不能發黃不傳陽明必從太陰自利而解蓋脾家實而腐穢當去與服調胃承氣湯微溏其義正同但使濕與熱從大腸下泄而已無餘病此太陰之病所以同於陽明而兩存其說也今人但知三陽之後始傳太陰皆非能讀仲景之書者仲師云陽明為中土萬物至此無所復傳可見陽病傳陰皆為藥所誤耳本太陽病醫反下之因爾腹滿時痛者屬太陰也桂枝加芍藥湯主之大實痛者桂枝加大黃湯主之桂枝加芍藥湯方桂枝三兩芍藥六兩甘草二兩生薑三兩大棗十二枚上五味以水七升煮取三升去滓分溫三服桂枝加大黃湯方即前方加大黃二兩太陽桂枝湯證本應發肌理之汗所謂發熱有汗解外則愈者也設不解其外而反攻其裏肌理中未盡之汗液盡陷為太陰寒濕由是腹滿時痛設驗其病體按之而不痛者桂枝倍芍藥以止痛使其仍從肌理而解若按之而實痛者則其腸中兼有宿食於前方加大黃以利之使之表裏兩解然後病之從太陽內陷者仍從太陽而解益可信太陰之病由直接太陽不在三陽傳遍之後矣太陰為病脈弱其人續自便利設當行大黃芍藥者宜減之以其人胃氣弱易動故也病至脈弱則血分中熱度已低芍藥苦泄能達血分之瘀若脈道不充按之而見虛弱則血分不能勝芍藥之疏泄故於當用桂枝湯之證芍藥當減其分兩設其人續自便利則太陰之濕便當從自利而解間亦有宿食未盡腹中滿痛當用大黃者分劑亦當從減所以然者以腸中本自通利不似大實滿者之難於見功必得重用大黃仲師言胃氣弱易動亦謂腸中通而宿食易去原非有深意存乎其間指桂枝加大黃證言之非指倍芍藥證言之也少陰篇少陰之為病脈微細但欲寐也陰寒之證血為水氣所敗而熱度低弱故脈微細陽熱主動而陰寒則主靜故但欲寐黃坤載謂脈微細必兼沉說殊有理蓋沉為裏寒如井水之無波如堅冰之無氣故於法當溫而不當發汗少陰無表熱惟脈沉反發熱者為太陽少陰表裏同病太陽寒水屬三焦自腰以上有淋巴微管自腰以下直達膀胱乃有淋巴系統腰中即足少陰藏太陽標熱本寒寒水下陷少陰之藏標熱外出皮毛故表裏同病有麻黃附子細辛湯一方得之二三日無裏證者有麻黃附子甘草湯一方所謂無裏證少陰雖見虛寒而太陽水氣尚未化為痰濕也故但用開表之麻黃溫藏之附子而無俟細辛以除飲外此則脈沉者宜四逆湯身體痛手足寒骨節痛脈沉者宜附子湯下利脈微者與白通湯利不止厥逆無脈乾嘔而煩者白通加人尿豬膽汁湯腹痛小便不利四肢沉重疼痛自下利者宜真武湯亦有寒飲乾嘔者宜四逆湯蓋溫裏方治為多焉大抵少陰一證寒極則死陽回則生是故同一惡寒踡臥手足溫者可治而逆冷者不治但舉一端可以得其要領矣少陰病欲吐不吐心煩但欲寐五六日自利而渴者屬少陰也虛故引水自救若小便色白者少陰病形悉具小便白者以下焦虛有寒不能制水故令色白也少陰病欲吐不吐三焦水道因寒停止蒸氣不得上行也水氣不得上行則上膈燥而不潤心營因燥而煩也但欲寐者陰寒在下而陽氣不宣也寒水在下故自利下寒則蒸氣不得上行故口燥渴膈上下津液皆虛所為引水自救也考久病之人小便必黃者陽氣未絶於內也至下焦虛寒不能制陰寒之水則腎陽已絶故不受陽熱蒸化而小便反白固知久病而小便色白者皆危證也脈微細而沉利不止厥逆乾嘔而煩故曰少陰病形悉具上有虛熱下有實寒遽投熱藥必將傾吐而出非用苦寒之豬膽汁及鹹寒之人尿引之下行恐不能受夫惟曲以調之乃能盡白通湯之力而收其效但令腎水得從溫化蒸氣上行則心煩燥渴愈下行之小便亦將色變矣病人脈陰陽俱緊反汗出者亡陽也此屬少陰法當咽痛而復吐利脈右三部主水與氣屬陽左三部主精與血屬陰脈之陰陽俱緊者惟太陽傷寒無汗者有之以其寒邪薄於外血熱抗於裏相持而不相下也若見此脈而反汗出則非表寒外束而實為孤陽外越孤陽外越者陰寒內據陽氣外脫而不歸其根也是故不在太陽而屬少陰虛陽在上故咽痛陰寒在下故吐利此與上節略同為假熱實寒證蓋亦白通湯加人尿豬膽汁之證也少陰病下利咳而譫語者被火氣劫故也小便必難以強實少陰汗也太陽寒水以少陰腎臟為關鍵寒水不能不作汗外泄乃下陷於寒水之藏由下焦直泄膀胱夫惟寒水壅阻一時腎膀胱管中不能容納乃溢入回腸而為自利此下利所以為少陰之本病也惟咳而譫語則為少陰證所本無揆其所以至此變證者則以火劫發汗之故火劫發汗則陽氣張燥熱上薄於肺則咳燥熱迫胃中津液外泄則胃熱上蒙腦氣昏暗而為譫語陽熱張於上吸其下行之水道故小便難譬之打火管者細微之火氣在管中能吸住人體令毛孔中寒濕出於皮外此證浮陽因火上浮吸其下行之水亦猶此也愚按下利者決不譫語已見譫語當不復下利此節當云少陰病下利咳而譫語者被火氣劫故也則本病變病較然分晰竊意咳而譫語當用調胃承氣湯使腑滯下行則燥熱之氣除而咳與譫語可止如是則火氣不吸引於上而小便通矣少陰病脈細沉數病為在裏不可發汗少陰為病由太陽寒水下陷三焦此時腰以上淋巴微管陽氣漸減不與肌理毛孔相接泄為汗液故脈細而沉數者寒水下陷孤陽將脫之象也若更以表寒之故誤認為表陽不足誤用麻桂而強責汗液外泄勢必陽氣散亡而不歸其根而惡寒益勝仲師所以有不可發汗之戒也少陰病脈微不可發汗亡陽故也陽已虛尺脈弱澀者復不可下之少陰一證血分中熱度既低不能外達肌理水分中陰寒凝沍不能外達皮毛脈微則無陽於無陽之證而發其汗則陽氣以外散而益薄如煙之散如火之減其人固已死矣脈澀則血少而陰竭於血少陰竭之證而下之則陰血以下而益燥如木之枯如草之萎而其人又死矣此陽微所以不可發汗陰虛所以不可下也按太陽篇尺中脈微此裏虛須表裏實津液自和便自汗出愈脈澀為汗出不徹更發汗則愈脈象與此二證略相似特此為太陽證言之耳若已傳少陰則不惟脈微者當溫脈澀者亦當溫蓋溫則有氣氣發則陰生滋陰則無氣無氣則陰不生內經言勞者溫之正此意也少陰病脈緊至七八日自下利脈暴微手足反溫脈緊反去者為欲解也雖煩下利必自愈淋巴系統水液壅阻不得陽氣以和之則陰寒隔塞不通如堅冰積雪久而益硬故其脈沉弦而搏指名之曰緊脈之所以緊者與寒犯太陽之浮緊同陰邪外迫而陽氣內抗也少陰病脈緊至七八日已過一候使一候之中陽氣當回借如嚴冬暴寒三五日必漸回暖此證寒去利下腸胃中凝沍積垢與寒水俱從大便宣泄如冰之解如雪之消而川谷潺湲矣陰寒不見壓迫即裏陽不復抵抗脈因暴微陰寒內解裏陽外達故手足反溫脈緊反緩雖至發煩下利必不至死此少陰一證所以陽回即生也益可證前條脈微脈澀者皆非溫藥不治矣少陰病下利若利自止惡寒而踡臥手足溫者可治少陰病惡寒而踡時自煩欲去衣被者可治少陰為病獨陰無陽為必死之證下利而利自止則寒水已去而微陽當復惡寒踡臥為少陰本病設惡寒踡臥而手足逆冷利雖自止此證尚不可恃所以然者脾胃主四肢脾胃絶故四肢冷內經所謂無胃則死也惟手足溫則中陽未絶投以四逆湯大劑可以尅日奏功故云可治但亦有惡寒踡臥而不下利者譬之冬令雨雪不甚雖當陽回冰泮之期絶無潦水流溢時自煩者陽回之漸欲去衣被則陽氣勃發之象也蓋人之一身動作奮發則毗乎陽幽昧則毗乎陰方其惡寒踡臥一幽昧純陰之象也時自煩則鬱而欲動矣煩而欲去衣被則心氣勃發皮毛肌腠陽氣充溢矣此證水氣不從下消當從汗解但用桂枝加附子湯便當一汗而愈故亦云可治也少陰中風脈陽微陰浮者為欲愈中風之證由太陽而繫在太陰故病發於肌理內應於脾藏肌理不解太陽水氣乃由手少陽三焦即淋巴輸尿管之原名而陷少陰之藏此證脈本浮緩及水氣下降脈必沉而緊若右三部陽脈見微則水氣不甚可知左三部陰脈見浮則在裏風寒不甚又可知故知其欲愈也少陰病欲解時從子至寅上天將大明必極昏暗星芒炯炯猶未也氣將轉陽必極陰寒霧露不收猶未也自子至寅上天光漸極昏黑俗稱寅卯不通光陽氣益復斂束俗名五更寒乃晦極將明陰極轉陽之大機也少陰病之但欲寐踡臥一昏暗之象也惡寒脈微細一獨陰之象也乃踡臥者忽然欲去衣被惡寒者忽然發熱內煩是即少陰病之轉機今以晦極將明寒極將回之證必於晦極將明寒極將回時驗之故必從子至寅上不見昏暗陰寒之象方可信為欲解否則日之方中陽氣甚隆寒病遇此何常不稍稍和暖然天陽一過而證情如故矣豈可恃為欲解乎少陰病吐利手足不逆冷反發熱者不死脈不至者灸少陰七壯太陰少陰為病多由太陽寒水內陷陷於脾則併胃中宿食下走大腸而為自利其狀如塗泥證屬太陰陷於腎則併手少陽三焦而為病上中二焦屬淋巴微管淋巴微管中水液泛溢四出胃不能受則上逆而為吐下焦屬淋巴系統即輸尿管淋巴系統水道橫流不及輸泄則混入大腸為利其狀如河決堤證屬少陰一則為溏泄一則為洞泄此太陰少陰之辨也惟人一身之陽熱內藏於血水受血熱蘊蒸乃化為氣為汗為津液為溺為白血球血中熱度漸低不足華氏九十五度水乃漸寒寒則泛濫於是上吐而下利手足及全身肌肉皆受氣於統血之脾藏血中熱度愈低則手足俱冷而一身肌肉俱寒所以然者為其一身之水液一如嚴冬溪澗生氣滅絶也惟手足不逆冷反熱者為不死之證雖脈不至但須灸足少陰太溪穴七壯太溪在外踝後跟骨上切薑成片燒艾絨以灸艾一團為一壯使隔絶之裏陽與表陽相接病必無害蓋火氣雖微使血行脈中則甚有力觀太陽篇微數之脈節當自悟之少陰病八九日一身手足盡熱者以熱在膀胱必便血也桃核承氣湯主之此條訂正此證與小便色白者相反寒水太盛則表證為手足逆冷為惡寒踡臥裏證為下利不止為小便色白所以然者以一身之血分熱度低弱不能蒸化水液故也若少陰無陽之證延至八九日忽然一身及手足盡熱此即上節謂手足不逆冷反發熱不死之證也然後文突接以熱在膀胱必便血也二語殊難解說夫一身肌肉及手足皆微絲血管及經脈流行之處皆為脾藏所主則一身手足盡熱似與膀胱絶無干涉不知血分熱度增高水液必受灼爍故久病發熱之人小便必黃赤而短今以寒盡陽回之證水氣漸微一身陽熱蘊蒸始而小便短赤繼而大便堅而色黑熱乃由腎及膀胱胞中血海遇濕熱鬱蒸之氣勢必化為衃血外見少腹脹滿硬痛之證此與本篇三急下證大同小異皆寒盡陽回之證當下以桃核承氣湯使瘀血從大便而出其病乃愈然則本文必便血也下當是脫去桃核承氣湯主之七字如此則本文以字文義方有著落以之為言因也蓋因蓄血之證原不能自行便血其中自有治法在若以為桃花湯證則大誤矣少陰病但厥無汗而強發之必動其血未知從何道出或從口鼻或從目出者是名下厥上竭為難治少陰為病但厥無汗為陰寒在裏陽氣不能外達此本四逆湯證但溫其裏寒水得溫自能作汗若強發其汗三焦水液既少不能供發汗之用陽熱隨藥力暴發必牽動全身陽絡血隨陽升一時暴決而出於上竅如黃河之潰堤平吾山而溢巨野不能限其所之故或從口鼻出或從目出卒然難以預定氣脫於下血冒於上脫如垂死之離魂冒如大辟之去首脫者不還故曰厥冒者立罄故曰竭陰陽並脫故稱難治此與婦人倒經敗血出於口鼻者固自不同鄙意當用大劑炙甘草湯以復既亡之陰復重用龍牡薑附以收散之陽或能於十百之中挽救一二此亦仲師言外之微旨也少陰病惡寒身踡而利手足逆冷者不治少陰病惡寒表陽虛也身踡而利裏陽虛也手足逆冷中陽不達四肢也蓋人一身之衛氣為水液所蒸化而衛氣之強弱實視血中熱度高下為標準血中熱度漸低皮毛中水液不能不化氣衛陽因見微弱而病表寒人一身之肌肉皆為孫絡所密布血熱與外寒相抗是生表熱因有一時暴煩欲去衣被者若一身肌肉血熱不充則血中黃色之餘液盡成寒水而踡臥不起寒水下陷腸胃因而下利中陽既敗陽氣不達四肢手足因而逆冷此證為獨陰無陽故云不治蓋人之將死其血先寒血不溫則水不化氣營氣亡於內而後衛氣亡於外於無治法中求一線生路惟有大劑四逆湯或能救什一於千百也少陰病吐利躁煩四逆者死少陰為病水氣在心下滲入於胃胃不能受因而吐逆水氣從三焦下注輸尿管容量太窄不能不相受泛濫而入大腸因而自利陰寒內據真陽外浮是生躁煩目欲瞑而寐不安口欲言而心不耐精氣將脫之象也脾胃內絶穀氣不達四肢因而手足逆冷試觀無病之人飢則身寒飽食之後即一身手足皆熱此即脾胃陽氣外達四肢之明證今絶粒多日故冷至肘膝此即內經所謂無胃則死之證也少陰病下利止而頭眩時時自冒者死少陰為病寒水太甚則為自利若下利已止便當寒盡陽回此利止手足溫者所以可治也然必身和脈微時見微汗乃為陰陽自和若陰竭於下而陽脫於上則必有眩冒之變蓋血虛之人往往頭眩下寒愈甚必見戴陽竊意此證當重用龍骨牡蠣以潛陽四逆湯以溫腎用大補氣血之熟地潞參以固脫譬之油燈欲滅火必忽然大明或煙飛於上益以膏油則火歸其原矣或亦愚者之千慮也少陰病四逆惡寒而身踡脈不至不煩而躁者死少陰病四逆惡寒而身踡此四逆湯證也加以脈不至則通脈四逆湯證也此證以陽回而生以寒極而死故時自煩欲去衣被者可治若不煩而躁則心陽絶而腎陰獨張所謂陰凝於陽也夫少陰一證但令有一線微陽即屬再生之機醫者志在救危寧不效而受謗毋有方而不用張隱庵謂知死之所去即知生之所從來得一線生機而挽回之功德莫大真至言也少陰病六七日息高者死此俗所謂腎不納氣也六七日已盡一候一侯已過寒水之藏當得寒盡陽回此時三焦水道當漸化氣裏氣既和血分不受陰寒逼迫而脈之沉緊者當去吸入之氣當靜蓋水與氣本是一源無病之人吸入之氣由鼻直抵丹田呼出之氣由丹田直出肺竅此無他氣之下行為水腎因收攝於下水之上行為氣肺乃通調於上也腎氣下絶肺氣上脫其息乃高金匱云在下焦者其吸遠難治高則易出遠則不至同一例也少陰病脈微細沉但欲臥汗出不煩自欲吐至五六日自利復煩躁不得臥寐者死少陰為病大率寒水太勝水氣愈寒則血中熱度愈低其脈因微細而沉重陰之人不能受清陽之氣故終日昏昏欲睡此為少陰本證汗出不煩則心陽大衰自欲吐者陰寒迫於下胃中陽氣垂絶也蓋少陰之病以中陽為生化之本故惡寒踡臥手足溫者可治以胃中陽氣尚能旁達四肢也時自煩欲去衣被者可治以心陽鬱而欲動終不為陰寒所陷譬之久悶思嚏久臥思起雖不遽達所願其中尚有動機存焉若夫汗出不煩則心陽將絶自欲吐則胃陽將絶此時若早用厥陰篇通脈四逆加吳茱萸生薑湯或可挽救一二若以為病者安靜不足慮五六日後自利煩躁不得臥寐真陽外脫已無救矣此仲師言外之微旨向來注家無人道及為可恨也少陰病始得之反發熱脈沉者麻黃附子細辛湯主之麻黃附子細辛湯方麻黃細辛各二兩附子一枚炮上三味以水一斗先煮麻黃減二升去上沫內諸藥煮取三升去滓服一升日三服少陰病得之二三日麻黃附子甘草湯微發汗以二三日無裏證故微發汗也麻黃附子甘草湯方麻黃甘草炙各二兩附子一枚炮上三味以水七升先煮麻黃一兩沸去上沫內諸藥煮取三升去滓溫服一升日三服此二節為少陰初病及其未見吐利逆冷諸裏證先行發汗預防裏證之治法後節無裏證二語原自賅上節言之後節得之二三日即為申明前節始得之義要其為有表熱無裏證可以發汗而愈則一也且前節之脈沉實賅後節言之金匱水氣篇云水氣病其脈沉小屬少陰虛脹者屬氣水發其汗即已脈沉者宜麻黃附子湯所列方治實為麻黃附子甘草湯此即始得少陰病必見沉脈之明證初非見沉脈者但宜麻黃附子細辛湯不見沉脈者方可用麻黃附子甘草湯也蓋太陽傷寒未經發汗水氣由手少陽三焦即西醫所謂淋巴系統併注寒水之藏即為少陰始病水氣下注故其脈沉少陰始病太陽標陽不隨寒水下陷故反發熱水壅寒水之藏輸尿管太窄不能容納始溢入回腸而病自利少陰始病水氣未經泛濫故不見裏證反發熱者水藏之寒不與表氣相接故於麻黃附子湯中用氣辛味烈之細辛溫水藏而散其寒使水氣與表熱相和而作汗但無裏證者水氣雖陷與太陽標陽未曾隔絶寒水之下陷實由中陽之虛故於麻黃附子湯也用炙甘草以益中氣使中氣略舒便當合淋巴微管乳糜外達皮毛而為汗張隱庵乃獨認麻黃附子甘草湯為發汗之劑於麻黃附子細辛湯則否要其謬誤特因前一節無發汗字後節有微發汗句強作解人獨不見金匱水氣篇心下堅大如盤證桂甘薑棗麻辛附子湯下有分溫三服汗出如蟲行皮中即愈之訓乎豈加桂甘薑棗才能發汗去桂甘薑棗即不能發汗乎況麻黃附子加炙甘草尚能發汗易以辛溫散寒之細辛反謂不能發汗有是理乎是所謂以其昏昏使人昏昏也少陰病得之二三日以上心中煩不得臥黃連阿膠湯主之黃連阿膠湯方黃連四兩阿膠三兩黃芩芍藥各二兩雞子黃二枚上五味以水六升先煮三物取三升去滓內阿膠煬盡小冷內雞子黃攪令相得溫服七合日三服少陰為病多由寒水下陷陰寒內據陽氣格於四肢故手足逆冷裏寒既勝表陽復虛故惡寒踡臥水氣溢入大腸故自利究其陰盡陽回亦當在七日經盡之後要未有二三日以上即病陽熱者黃坤載云水藏在陽明為不足在少陰為有餘有餘則但欲寐本篇之首章是也不足則不得臥陽明篇時有微熱喘冒不得臥是也陽動陰靜相去天淵斷無二三日前方病濕寒二三日後遽變燥熱之理此蓋陽明府熱之傷及少陰非少陰之自病其說頗為近理為向來注家未能見及胃中燥熱上薰故心中煩陽熱張於上故不得臥考其病原實為血虧液耗故不為白虎承氣證而為黃連阿膠湯證按人一身之生血之原起於入胃之穀食穀食多膠粘之性其津液所化即為白血球既而隨營氣上升達於心肺二藏乃一變而紅血球今以胃中燥熱阻其血生之原則心肺無所承受不特心臟血少而生煩肺營不得承胃中水穀之液而水之上源垂絶方用苦降之芩連以清上熱阿膠芍藥補血而行瘀加生雞子黃二枚培養中氣而滋生血生津之原按西說雞子含有發揮油以助消化力中有硫磺磷質按磷質為骨與髓之未成者雞骨本小今在卵中當以出卵之雞推算為數甚微惟硫質為雞子黃全部分熱力硫磺在中醫原係增長胃中消化力之品大致含於發揮油中資人體內細胞之基質愚按此即白血球之原質又言雞卵含有甲種維生素能防止結膜乾燥症卵黃更含有乙種維生素能防腳氣病豫按所謂維生素者為精血環周之原料足以滋燥除煩心腎之交實有賴乎此但使津血漸復心氣得下交於腎腎氣得上交於心乃得高枕而臥焉少陰病得之一二日口中和其背惡寒者當灸之附子湯主之附子湯方附子二枚炮白朮四兩人參二兩茯苓芍藥各三兩上五味以水八升煮取三升去滓溫服一升日三服少陰病得之一二日正陰寒方盛之時不應便知五味隱庵以五味釋口中和是不然口中和當是不燥不吐不燥則水氣在上不吐則胃中無熱不能與水氣相抗惟胃中無熱而水氣獨盛其證當下利而手足逆冷不當獨見背寒其背惡寒則太陽之表證也以少陰病而兼太陽表寒是宜先灸風池風府以泄其表然後用附子湯以溫其表按六氣之病惟溫病不當被火以其津液先耗也少陰證而見表寒則在裏之寒濕必甚與溫病之不當被火者適得其反故不妨先用灸法以微除其表寒而通陽氣繼乃用生附子白朮祛皮中水氣且水寒則中氣不達於是用人參以和之茯苓以降之水寒則血凝更用芍藥以泄之而表裏通徹矣此亦先解其表後溫其裏之意也少陰病身體疼手足寒骨節痛脈沉者附子湯主之脾主肌肉及四肢惟腎主骨少陰為病水勝而血寒血中熱度既低陽氣不能外達於肌肉故身體疼四肢為諸陽之本陰寒內據則中陽不達四肢而手足寒水寒則濕凝濕流關節則骨節痛水寒血凝裏陽不達故其脈沉而治法特主附子湯以溫裏水得溫則衛陽復而滲入骨節之寒濕足以化氣外出而內痛止血得溫則營氣達而肌肉手足之熱度高不復以脈絡凝瘀而見逆冷痠疼諸證所以獨不用灸者為其無太陽之表寒也少陰病下利便膿血者桃花湯主之桃花湯方赤石脂一斤一半整用一半篩末乾薑一兩粳米一升上三味以水七升煮米令熟去滓內赤石脂方寸匕溫服七合日三服若一服愈餘勿服少陰為病水凝而血敗寒水過多不及注腎膀而為溺乃溢入回腸而下利水寒血凝浸成朽腐乃便膿血非溫化其寒而填止其濕不惟下利不止而膿血又將加劇此證先下利而見膿血與金匱先便後血正同故桃花湯方治亦與金匱黃土湯略相似方中用赤石脂與用竈中黃土同用乾薑與用附子同用粳米與用甘草同惟下血為濕熱傷血而下注與水寒傷血不同故彼方有黃芩而本方無之下血為鮮血與腐敗而成膿血者又不同故彼方有養血之阿膠地黃而本方無之此則二證之不可通治者也試觀癰疽之成有濕熱壅阻血絡腐敗而成膿血者有寒濕壅阻血絡腐敗而成膿血者若夫少陰之下利而見膿血表熱不生而脈微細其為水寒血敗何疑婦人多淋帶者其經水必淡血先腐也夫脾為統血之藏而主一身之孫絡血之熱度以陰寒而益低血之形質以浸灌而始敗自經滲漏不止脾藏生血之膏液益復空虛故仲師立法但令寒濕並去脾精得所滋養即下利膿血當愈蓋此證寒濕為第一因由寒濕浸灌致內臟血絡腐敗為第二因由下利而脾精耗損為第三因方治所以用赤石脂為主藥乾薑次之而粳米又次之也譬之蘆灰止水黍谷回春土膏發而百物生矣少陰病二三日至四五日腹痛小便不利下利不止便膿血者桃花湯主之少陰為病水盛於裏故惡寒水寒而奪其血之溫度故無表熱二三日至四五日已將及一候設令陽氣漸復在裏之寒水當從陽化氣從肌表外泄為汗惟水寒內據血絡凝瘀乃病腹痛譬之冬令手足寒鬱而血凝因病凍瘃始則結而成塊久則癢痛潰爛少陰病之腹痛便膿血何以異此假令當未下利未便膿血之時一見腹痛急用四逆湯以溫之陰寒內解水氣四出則小便當利小便利則水道得所輸泄決不至溢入大腸而下利不止且陰寒一解肌肉得溫脈絡漸和即不當更便膿血所謂曲突徒薪也惟其失此不治水道壅塞因見小便不利水溢後陰則下利不止水寒血腐因便膿血證情與前證同故治法亦同桃花湯命意說已見前茲不贅少陰病下利便膿血者可刺師但言下利便膿血者可刺而不言所刺何穴張隱庵舉可刺之由為膿血之在經脈此說良是柯音伯直以為當刺期門不知同一下血不能不研求虛實而辨其所從來金匱云婦人中風如結胸狀譫語者此為熱入血室當刺期門隨其實而瀉之陽明病下血譫語者此為熱入血室但頭汗出當刺期門隨其實而瀉之濈然汗出者愈今謂水寒血腐之少陰證可與陽熱血實者同治此正與醉餘夢囈略無差別然則謂當刺期門者妄也按此證孫梓材言當刺臍下一寸關元此穴為任脈上行經穴下通胞中血海上承脾之大絡刺之以泄寒毒外覆以附子或薑片灼艾而灸之使寒濕得溫化氣下利膿血乃愈蓋火氣雖微散入脈絡中而力甚巨也又云此證若兼小便不利當得兼刺合谷不應則更刺氣海而水道自通陳藏器之所指幽門二穴交信二穴雖不若柯韻伯之迂遠然究不若刺關元之信而有徵耳少陰病吐利手足逆冷煩燥欲死者吳茱萸湯主之吳茱萸湯方吳茱萸一升洗人參三兩生薑六兩大棗十二枚上四味以水七升煮取二升去滓溫服七合日三服少陰為病設但見吐利手足逆冷此外絶無兼證則方治當用四逆理中要無可疑其所以四肢逆冷者則因上吐下利中脘陽氣微弱不能旁達四肢故也顧同一吐利手足逆冷之證而見煩躁欲死即不當妄投四逆理中所以然者中陽既虛則上下隔塞不通浮陽上擾因病煩燥薑附熱藥即以中脘隔塞之故不能下達反以助上膈浮熱而增其嘔吐故但宜緩以調之方中但用溫中下氣之吳茱萸以降嘔逆餘則如人參薑棗皆所以增胃汁而扶脾陽但使中氣漸和津液得通調上下四傍而嘔吐煩躁當止水氣微者下利將隨之而止設嘔吐煩燥止而下利未止更用四逆理中以善其後證乃無不愈矣此可於言外體會而得之少陰病下利咽痛胸滿心煩者豬膚湯主之豬膚湯方豬膚一斤上一味以水一斗煮取五升去滓加白蜜一升白粉五合熬香和令相得溫分六服病至三陰大抵水寒濕勝故下利一證見於太陰者固多見於少陰者亦復不少惟少陰之下利常與手足厥逆惡寒踡臥相因寒水盛而中陽敗也至於陰寒下注胃液少而陽熱上浮乃有咽痛胸滿心煩之證胃液虛則胃底膽汁化燥燥氣上炎於食管因病咽痛腸胃中穢濁下行暢遂上氣始通故有大便行後因得噫噯而胸悶始解者有大便後得缺伸而胸膈始寬者惟腸胃中淋巴微管乳糜以下利而日減大便即不得暢行而見後重由是上氣不通而病胸滿胃居膈下而心居膈上胃熱上薰心乃煩亂之三證病氣皆見於上而病根實起於下利因下利而胃中胰液脺液饞涎一時並涸大便因是不得暢行仲師因立豬膚湯一方用豬膚以補胰液白蜜以補脺液加炒香之米粉以助胃中消化力若飯灰然引胃濁下行但令回腸因潤澤而通暢則腐穢可一泄而盡下氣通則上氣疏咽痛胸滿心煩且一時並愈矣近世驗方用豬油二斤熬去滓加入白蜜一斤煉熟治肺熱聲啞意即本此少陰病二三日咽痛者可與甘草湯不差與桔梗湯甘草湯方甘草二兩生用上一味以水三升煮取升半去滓分溫再服桔梗湯方即前方加桔梗一兩煎法同前何以知為少陰病以脈微細但欲寐也脈微細則營熱日消但欲寐則衛陽日損二三日咽痛則已寒盡陽回而病在食管胃熱勝而燥氣上逆治之者當以清胃熱為主此固盡人而知之然何以不用白虎湯而用生甘草一味蓋生甘草能清熱而解毒胃熱上蒸血分鬱久成毒若瘡瘍然痛久則潰爛隨之矣仲師用甘草湯蓋先於未成咽瘡時預防之治法也然則不差何以用桔梗湯蓋胃中燥熱上僭肺葉受灼則熱痰膠固而氣機不得宣達非開泄肺氣則胃中鬱熱不得外泄故加開泄肺氣兼有鹼性之桔梗以破咽中熱痰使熱痰以潤滑而易出胃中熱邪且隨之俱泄而咽痛可以立止豫常見道士宋左丞治咽喉證常用青梅去核中包明蠜置瓦上煅灰吹入病人咽中熱痰傾吐而出雖瘡已成者猶為易愈此亦仲師用桔梗湯之遺意也少陰病咽中傷生瘡不能語言聲不出者苦酒湯主之苦酒湯方半夏十四枚七乃水之生成數十四乃偶七而成偶中之奇也雞子一枚去黃上二味內半夏著苦酒中以雞子殼置刀環中安火上令三沸去滓少少含咽之不差更作三劑此節病證治法歷來注家多缺分曉先言咽中傷而後言生瘡則因傷而成瘡可知然咽中何以傷此不可不辨也不能語言為瘡痛與不能飲食同此言略無深意但聲不出又屬何因曰聲不出者非無聲也有所阻礙故也蓋此證始因咽痛醫家刺以刀針咽中遂傷久不收口因而生瘡至於不能語言風痰阻塞聲乃不出苦酒湯方治以止痛潤燥為主生半夏入口麻木有止痛之能而下達風痰猶恐其失之燥也漬之以苦酒則燥氣化所以止痛滌痰而發其聲也雞蛋白以潤燥西醫謂有甲種維生素能防止結膜乾燥證而又恐其凝滯也合以能消雞蛋質之苦酒則凝質化所以潤咽中瘡痛而滋養以補其傷也近世相傳喉中戮傷飲食不下驗方用雞蛋一枚鑽孔去黃留白入生半夏一枚用微火煨熟將蛋白服之傷處隨愈亦可證咽中傷為刀針之誤生半夏蛋白之能補瘡痛矣曰咽之不差更作三劑者宜緩治不宜峻攻也少陰病咽中痛半夏散及湯主之半夏散及湯方半夏洗桂枝甘草上三味等分各別搗節已合治之白飲和服方寸匕日三服不能散服者以水一升煎七沸內散兩方寸匕更煎三沸下火令小冷少少咽之少陰病咽痛前既有甘草桔梗湯矣此更列半夏散及半夏湯方治既不言脈象之異又無兼證可辨則仲師同病異治究屬何因然前條但言咽痛本條獨言咽中痛此其可知者也方中用生半夏取其有麻醉性以止痛並取其降逆去水以達痰下行意當與咽中傷節同用生甘草以清熱而解毒意當與甘草湯方同惟桂枝一味不得其解按近世吳氏咽喉祕集中有寒伏喉痹一證略言此證肺經脈緩寒重色紫不甚腫若誤用涼藥久必爛其方治有用細辛桂枝麻黃者甚至有嗆食音啞六脈遲細之陰證用麻黃三錢桂枝一錢細辛二錢者然則此咽中痛證脈必遲細而緩其色當紫其腫亦必不甚然則仲師之用桂枝亦所以宣通陽氣耳以其寒在血分故用桂枝而不用麻黃且緣少陰不宜強責其汗故也咽痛用桂枝近世無人能解少陰病下利白通湯主之白通湯方蔥白四莖乾薑一兩附子一枚生用去皮破八片上三味以水三升煮取一升去滓分溫再服少陰病下利脈微者與白通湯利不止厥逆無脈乾嘔煩者白通加豬膽汁湯主之服湯脈暴出者死微續者生白通加豬膽汁湯方即白通湯加人尿五合豬膽汁一合上五味以水三升煮取一升去滓內膽汁人尿和令相得分溫再服無膽汁亦可少陰為病原以水盛血寒為的證水盛則溢入回腸而下利血寒則肢冷而脈微血寒則水不化氣真陽不能上達白通湯用蔥白以升陽乾薑附子以溫中下但使血分漸溫寒水化氣上達則下利當止若服湯後利仍不止水之盛者益盛血之寒者益寒而見厥逆無脈甚至浮陽冒於膈上而見乾嘔心煩熱藥入口正恐格而不受故於白通湯中加鹹寒之人尿苦寒之豬膽汁引之下行逮服藥竟熱藥之性內發陽氣當行脈即當出但脈暴出為陽脫譬之油燈垂滅忽然大明微續者為陽回譬之爐炭將燃起於星火此為生死之大機診病者不可不知也少陰病二三日不已至四五日腹痛小便不利四肢沉重疼痛者此為有水氣其人或咳或小便利或下利或嘔者真武湯主之此條訂正真武湯方茯苓芍藥生薑各三兩白朮二兩附子一枚炮上五味以水八升煮取三升去滓溫服七合日三服若咳者加五味子半斤細辛一兩乾薑一兩若小便利者去茯苓若下利者去芍藥加乾薑二兩若嘔者去附子加生薑足前成半斤腎臟下接膀胱原屬一身溝渠而晝夜輸泄其小便然必血分充足陽熱無損水道乃行若陰寒在下溝渠為之不通譬之冬令池沼雖不遇堅冰潦水不降水道猶為壅塞故少陰陰寒之證二三日至四五日寒水泛濫併入太陰而成寒濕腹與四肢為太陰部分寒濕入腹則腹痛濕與水不同水則傾泄濕則粘滯小便所以不利也寒濕停蓄腹部中陽不達於四肢故四肢沉重寒濕凝沍阻其血絡因而疼痛故真武湯方用芍藥以定痛茯苓生薑朮附以散寒而行水此固少陰病水氣在裏之治法也惟疼痛下自下利三字直可據後文或下利三字而斷為衍文其人或咳下為本方加減治法咳者加五味薑辛所以蠲飲小便利者去茯苓不欲其利水太過下利去芍藥加乾薑欲其溫脾不欲其若泄嘔者去附子加生薑以水在中脘不在下焦故但發中脘之陽而不欲其溫腎此又少陰病水氣外泄之治法也少陰病下利清穀裏寒外熱手足厥逆脈微欲絶身反不惡寒其人面色赤或腹痛或乾嘔或咽痛或利止脈不出者通脈四逆湯主之通脈四逆湯方甘草三兩乾薑三兩強人四兩附子一枚生上三味以水三升煮取一升二合去滓分溫再服其脈即出者愈面色赤者加蔥九莖腹中痛者去蔥加芍藥一兩嘔者加生薑二兩咽痛者去芍藥加桔梗一兩利止脈不出者去桔梗加人參二兩少陰為病水寒而血敗水滲腸胃則中脘陽衰不能消融入胃之飲食而完穀不化陰寒內據而虛陽外浮故裏寒而外熱血中熱度低弱溫度不達四肢故四肢厥冷血為寒水浸灌不能流通脈道故脈微欲絶內真寒而外假熱故身反不惡寒而面色赤寒濕內陷故腹痛水氣留於心下胃中虛寒故乾嘔濕痰阻塞肺管故咽痛陰氣以下利而日損故利止而脈不出通脈四逆湯用甘草乾薑以溫中焦生附子以溫下焦蓋水盛血寒為少陰本病故以下利清穀手足厥逆為總綱惟兼見脈微欲絶乃為通脈四逆湯本證蓋胃為生血之原胃中寒則脈微按太陽篇脈結代用炙甘草則本方之甘草亦當用炙惟裏寒外熱外內不通因病戴陽面色乃赤故加蔥以通之血絡因寒而瘀腹中為痛故加苦平之芍藥以泄之嘔者為胃中有水氣故加生薑以散之咽痛為濕痰阻滯故加有鹼性之桔梗以開之利止脈不出為裏陰虛故加人參以益之此又通脈四逆湯因證加減之治法也少陰病四逆其人或咳或悸或小便不利或腹中痛或泄利下重者四逆散主之四逆散方甘草枳實柴胡芍藥上四味各十分搗篩白飲和服方寸匕日三服咳者加五味子乾薑各五分並主下利悸者加桂枝五分小便不利者加茯苓五分分俱去聲腹中痛者加附子一枚炮令坼泄利下重者先以水五升煮薤白三升煮取三升去滓以散方寸匕內湯中煮取一升半分溫再服少陰病手足厥逆原屬水寒血敗之證故有惡寒踡臥腹痛下利諸兼證若四逆而不見惡寒踡臥腹痛下利其不為水寒血敗要無可疑故不宜四逆湯之辛溫而宜四逆散之疏泄所以然者陽氣不達四肢同所以不達於四肢者異也胃為生血之源而主四肢水寒血腐故血中溫度不達於四肢而手足厥逆濕痰與食滯交阻中脘故血中溫度不達於四肢而手足亦見厥逆但觀四逆散方治惟用甘草則與四逆湯同餘則用枳實以去濕痰宿食之互阻用柴胡以解外用芍藥以通瘀但使內無停阻之氣外無不達之血熱而手足自和矣此四逆散所以為導滯和營之正方也惟兼咳者加五味乾薑與治痰飲用苓甘五味薑辛同小便不利加茯苓與用五苓散同惟下利而悸則加桂枝所以通心陽也腹中痛加熟附子一枚所以溫裏陽也肺與大腸為表裏肺氣阻塞於上則大腸壅滯於下而見泄利下重譬猶置中通之管於水盂以一指捺其上則滴水不出去其指則水自泄矣泄利下重於四逆散中重用薤白與胸痹用栝蔞薤白湯同意皆所以通陽而達肺氣肺氣開於上則大腸通於下若誤認為寒濕下利而用四逆湯誤認濕熱下利而用白頭翁湯誤認為宿食而用承氣湯則下重益不可治矣少陰病下利六七日咳而嘔渴心煩不得眠者豬苓湯主之少陰病下利至六七日正陰盡陽回之候陽回則病機當見陽明所謂少陰負趺陽為順也按陽明篇浮熱在表水濕內蘊則有渴欲飲水小便不利之證故有豬苓湯方治導水邪而清血熱今下利未止而見咳與嘔之兼證則為水濕內蘊與陽明篇小便不利同渴心煩不得眠則為熱在血分與陽明篇渴欲飲水同飲水為飲寒水況心煩不眠尤為濕熱留戀營分之顯據此所以宜豬苓湯豬苓湯方中所以重用阿膠也少陰病得之二三日口燥咽乾者急下之宜大承氣湯少陰病自利清水色純青心下必痛口乾燥者急下之宜大承氣湯少陰病六七日腹脹不大便者急下之宜大承氣湯少陰之證多死於陰寒不死於陽熱故黃坤載以少陰負趺陽為順釋全篇大旨見地特高三急下證雖亦為亢陽之過然終異於獨陰無陽之證令人無所措手故豫即從關於陽明者以申黃氏未盡之義口燥咽乾當急下者口與咽為飲食入胃之門戶胃中燥實悍熱之氣上衝咽喉則水之上源先竭而下游將涸口燥咽乾所當急下者此也自利清水色純青心下痛口乾燥病機亦出於胃胃中陽熱協胃底膽汁下陷則胃液涸而胃之上口燥故心下必痛口乾燥者舌苔或黃燥或焦黃而上下津液將竭此下利純青由於膽汁與胃液同涸所當急下者此也六七日腹脹不大便不惟胃燥並大腸亦燥嘗見不大便者小溲或短赤而痛腎陰以腸燥而竭腹脹不大便所當急下者此也獨怪今之醫家遇口燥咽乾者則用生地石斛瓜蔞根腹脹不大便者則用五仁蓯蓉白蜜期在清熱養陰卒之陰液告竭終於不救為可痛也少陰病脈沉者急溫之宜四逆湯四逆湯方甘草二兩乾薑兩半附子一枚生上三味以水三升煮取一升二合去滓分溫再服少陰為病水寒血敗前已屢言之矣脈沉則為血寒血寒於裏則皮毛肌腠間水液浸灌愈不得化氣外出而表裏皆寒垂死之人所以遍身青紫者溫氣先絶而熱血先死也今人動稱發斑傷寒危證不知早用溫藥原不必有此現象玩急溫之三字便可知生死之機間不容髮四逆湯用生附子一枚若畏生者猛峻而改用熟附子畏乾薑辛熱而改用炮薑則無濟矣少陰病飲食入口則吐心中溫溫欲吐復不能吐始得之手足寒脈弦遲者此胸中實不可下也當吐之若膈上有寒飲乾嘔者不可吐也當溫之宜四逆湯飲食入口即吐有腸胃隔塞不通而熱痰上竄者於法當下此金匱大黃甘草湯證也惟腸胃不實而氣逆上膈者不在當下之例所謂心中溫溫欲吐者譬如水之將沸甑底時泛一漚氣之上逆者不甚故欲吐而復不能吐今人謂之泛惡始得之手足寒則中陽不達可知脈弦為有水遲則為寒寒水留於心下故曰胸中實此與太陽篇氣上衝咽喉不得息者同例彼言胸有寒為水氣在心下故宜瓜蒂散以吐之此言胸中實亦心下有水氣故亦宜瓜蒂散以吐之仲師所以不列方治者此節特為少陰寒證不可吐而當溫者說法特借不可下而當吐者以明其例耳惟膈上有寒飲乾嘔其方治似當為半夏乾薑散輕則小半夏加茯苓湯仲師乃謂四逆湯者按金匱云嘔而脈弱小便復利身有微熱見厥者難治四逆湯主之少陰本證脈必微細四肢必厥逆水寒血冷與金匱脈弱見厥相似而為陰邪上逆之危候故亦宜四逆湯也少陰病下利脈微澀嘔而汗出必數更衣反少者當溫其下灸之此條訂正少陰病下利脈微澀此為水分太多血之熱度受寒水壓迫而益見低弱此本四逆湯證若嘔而汗出肺胃氣疏於上而小腸大腸之積垢必將以上部開泄而脫然下墜故知必數更衣蓋一嘔即汗出汗一泄則更衣一次汗再出則更衣二次故云必數更衣反少者則為浮陽在上吸引大腸水液而不得泄然則當溫其上之上字當為下字之誤所灸必在足少陰太溪三陰交諸穴蓋溫下以收散亡之陽氣兼以溫在裏之虛寒否則嘔而汗出方苦浮陽在上而又溫其上以張其焰稍知醫理者尚不肯為奈何誣仲師乎厥陰篇厥陰之為病消渴氣上撞心心中疼熱飢而不欲食食則吐蛔下之利不止足厥陰肝臟居胃之右而覆冒其半體若醉人側辨者然而其脈絡則下注兩脅更下則扺於少腹與足少陰水臟相出入肝葉中為膽所寄膽汁由膽管滲於十二指腸適當胃之下游膽汁轉輸胃底故胃中亦有膽汁與胰脺液肝液饞涎合併為消融水穀之助惟胃中熱則膽火熾故有消渴一證陽明病所以渴而飲水者由於胃中熱甚兼之膽汗苦燥故爾金匱論消渴首列厥陰為病次節兼論趺陽之浮數正以胃中含有膽汁生血之原不足而苦燥之膽汁用事然後見消渴之證也更即金匱男子消渴節以證之金匱云消渴小便反多以飲一斗小便亦一斗腎氣丸主之蓋手少陽三焦通行水道中含膽火下走腎與膀胱出而為溺晝隨行陽之衛氣外出皮毛而為汗夜則隨行陰之衛氣下走注於宗筋天之將明宗筋特強者中有膽火故也晨起而小便則膽火泄矣少年失慎緣是精液日削膽火之趨於下游者反成捷徑膽火主泄小便乃日見其多而上膈津液遂以不得渟蓄而日損於是引水以自救故小便愈多口中愈渴胃中消化力亦愈大豫嘗見病房勞之人貪味飽食至死不改則以膽汁之在胃中者最能消食故也此厥陰之病消渴由於肝葉中泌出之膽汁合胃中亢熱使然也胃中本熱不能容水膽汁少而他種液多乃病痰飲俗工強分上消中消下消抑末也肝為藏血之臟而其變為善怒少年體壯之人夜多眠睡而不輕怒者血分充足得以涵養膽汁而柔其剛燥之性也老年夜少眠睡而易怒者血分不足不能涵濡膽汁而剛暴之性易發也人心有所怫鬱一時含怒未發心中猝然刺痛俗謂之氣撞心亦曰衝心氣血虛風燥胃底膽火熾逆由胃絡上衝於心故心中熱疼此與七情鬱怒傷肝之病似異而實同此厥陰之病氣上撞心心中疼熱亦由膽胃上逆而發之特暴不似消渴之由於積漸也若夫水盛血寒胃中凝積濕痰而膽火不煬乃生蛔蟲濕痰充實於胃食入則上泛故飢不能食胃中膽汁無消穀之力因而納減蛔以久飢難忍上出於膈故聞食臭而出於口此厥陰證之病飢不能食食即吐蛔實由胃中寒濕膽火不能消穀腐穢積而蟲生也語云流水不腐動氣存焉耳汙池積穢鰍鱓生焉有積穢為之窟宅也故烏梅丸一方乾薑細辛以去痰而和胃烏梅以止吐川椒以殺蟲黃連黃柏以降逆而去濕當歸以補血人參以益氣附子桂枝以散寒而溫裏故服後蛔蟲從大便挾濕痰而俱去方中殺蟲之藥僅有川椒一味餘多除痰去濕溫中散寒之藥可以識立方之旨矣須知濕痰之生由於膽汁不能消水而胃中先寒胃中既寒蛔蟲乃得滋生濕痰即蛔蟲之巢穴以上三證大要厥陰從中見少陽之盛衰致成燥熱寒濕諸變惟下之利遂不止則承上飢不能食言之蓋此證水盛血寒飢不能食原係胃中濕痰阻塞若有宿食便不當飢倘疑為宿食而誤下之利必不止所以然者以其人血分熱度低弱不能化水為氣泄出肌表加以胃底膽汁為濕痰所遏不能不消水而腸胃中淋巴管因亦被濕痰淤塞失其排泄水液之權故一經誤下水勢乃直趨小腸大腸而不可止也本條自消渴下為膽火太甚之證飢不欲食下為膽火不足之證鄙人恐學者惑於俗工寒熱錯雜之謬論故特分晰言之厥陰中風脈微浮為欲愈不浮為未愈凡藏之主血者皆謂之陰肝為藏血之藏故稱厥陰人之一身水以寒而主泄水之所以能泄者血熱為之蒸化也血以溫而主藏血之所以常溫者水借血熱而散為氣陰寒不加陵逼之病故厥陰之病與太陰少陰同陽回則生寒極則死血寒則死故死後有口及遍身青黑者向者醫家固稱厥陰為風木以肝主筋當如木之條達而不當鬱結也此喻亦為近理借如春風始生草木萌芽山谷啓秀郊野繁花當是時天氣溫和厥陰之藏宜必無病若夫寒風蕭條曠野寂寥素雪晨飛玄霜夕飄木始病矣吾意厥陰之病中風手足必厥逆脈必沉弦風入腠理營血暴陰脾陽阻遏故脈沉而手足當寒脈微浮為欲愈者以血分之熱度漸高營氣有外達之機風將從肌腠解也此證宜桂枝加附子湯張隱庵乃曰風為陽邪脈主陰血得陰血之微浮而熱病當愈豈知厥陰中風原不為熱病乎若夫脈不浮而見沉弦在裏而不能出表風將何自而解故曰不浮為未愈也厥陰病欲解時從丑至於卯上厥陰為病不從標本而從中見之少陽故有膽火合胃中燥熱而病消渴及心中熱痛者亦有濕痰在胃遏其相火水盛血寒而病吐蛔者然則厥陰之欲解其為熱證乎其為寒證乎舍此而不辨何以知丑至卯上之欲解也吾即據本篇通例釋之仲師言厥少熱多其病當愈寒多熱少其病為進熱不除便膿血者不必死下利厥不止者必死則本條所謂欲解其為寒盡陽回之證要無可疑考卯上屬黎明為天光初發之候每歲之中惟夏至節令屬卯正冬至節令屬寅末卯初餘則自穀雨至處暑皆在卯之上半時自白露至來歲清明皆在卯之下半時然則卯上固陰盡陽回之定候而不可更變者也然必曰自丑至卯上者丑在夜半當陽回半子之後屬陰中之陽嗣是由寅而卯雖日未見光而陽氣已動設厥陰寒證當此微陽漸轉之時手足之厥者漸和脈之沉弦者漸浮或有微熱而渴其脈反弱或脈來轉數有微熱而汗出皆為向愈之徵為其病氣漸微正氣隨天光而外出也是故病者夜半或黎明神色清湛即去愈期不遠若獨語如見鬼狀則猶為厥陰血熱而非正氣之復為其腦氣昏也惟神色漸清乃真為向愈若必待日中陽盛陰寒略減不踰時而厥逆惡寒如故矣豈可恃為欲解乎按此條大旨與少陰略同厥陰病渴欲飲水者少少與之愈厥陰之病最忌寒濕寒濕太盛則少陽陽熱為水邪所遏故常有下利不渴之證惟其寒盡陽回胃中陽氣合膽汁而化燥然後渴欲冷飲但微陽初復不能多飲故曰少少與之所以不用人參白虎湯者則以厥陰之渴若死灰復燃涓滴可滅不似陽明之渴勢若燎原非一勺所能奏功故厥陰之渴無人參白虎證又按此證必出於下利之後與太陽證汗後之渴略同皆為胃中液虛生燥故欲飲水者皆當少少與之以和胃氣但使胃氣一和已無餘病惟厥陰一證下利止後三焦水邪盡泄不似太陽汗後尚有寒水留阻膈上使津液不得上行故厥陰之渴亦必無五苓散證也諸四逆厥者不可下之虛家亦然張隱庵曰四逆而厥溫之猶難豈有下之之理今曰不可下所以申上文下之利不止之意此說良是然所以為是說者正為後文當下者致辨蓋不可下者其常可下者其變也按後文云厥深者熱亦深厥微者熱亦微厥應下之而反發汗必口傷爛赤蓋四肢兼氣於胃胃中寒而見厥固當用四逆以溫之若胃中有濕痰遏其中陽不得達於四肢或胃中有宿食熱邪內鬱則陽氣亦不達於四肢而手足厥此與太陽初病不發熱數日後始見表熱者正同故先厥而後熱此厥之所以當下也惟厥但手足冷逆則冷過肘膝冷過肘膝者必無熱證故不第曰厥而曰諸四逆厥此即不可下之確證但手足冷者則固有熱證也設非手足見厥之證實有當下者何待仲師之贅說乎至如虛家之不可下特連類及之耳傷寒先厥後發熱而利者必自止見厥復利厥逆為中陽不達四肢以為風起四末者妄也中陽不運則淋巴幹中水液不得外泄淋巴幹在胸中為水液入胃氣水外泄之總區脾濕內停因而下利此本四逆湯證不待再計者也本節云先厥後發熱而利者必自止此寒盡陽回之候不煩顧慮者也曰見厥復利此寒濕未盡由陽入陰之候所當急溫者也是故大汗大下利而厥冷者四逆湯主之大汗出熱不去內拘急四肢疼又下利厥逆惡寒者四逆湯主之何嘗寒熱錯雜耶若夫不可下條所云虛家亦然則以亡血而厥為血分熱度愈低故身熱減而脈道虛也傷寒始發熱六日厥反九日而利凡厥利者當不能食今反能食者恐為除中食以素餅發熱者知胃氣尚在必愈恐暴熱來而復去也後三日脈之其熱續在者期之旦日夜半愈所以然者本發熱六日厥反九日復發熱三日並前六日亦為九日與厥相應故期之旦日夜半愈後三日脈之而脈數其熱不罷者此為熱氣有餘必發癰膿也此條訂正厥陰之證先厥後熱者其病當愈厥不還者其病必死究其所以發熱者則與太陽傷寒略同太陽傷寒其始水液在皮毛為表寒所遏故無熱其繼血熱抗於肌理水液由寒化溫故發熱厥陰之手足冷亦由寒濕太甚血中溫度不得外達之故惟其病由寒濕故必兼下利惟其血中熱度與寒濕戰勝故先厥後熱蓋先厥者病也後熱者正氣復也明乎此然後可以辨厥陰之生死而本條傳寫訛誤亦可藉以訂正不至為張隱庵注文所誤蓋本條所舉病證為先熱後厥厥為病氣勝始發熱六日六日之後旋復見厥延至九日未已而加之以下利此正屬寒濕過重急當回陽之證但得發熱即可不死厥而利者其脾陽本虛當不能食若反欲食恐係寒濕下趨太急自胃以下直達肛門而絶然不守故有久利之人醒時思食食已稍稍思睡即已遺矢每食皆然俗名肚腸直凡下利見此證者十不活一名曰除中張隱庵注云中土之氣外除也不可通蓋幽門至闌門無所阻也所以然者為其胃氣先絶也惟食之以麥餅食已發熱因知其胃氣尚在金匱云病人素不喜食者忽暴思之必發熱也試觀飢者身常惡寒至飽食之後手足忽然轉熱此即胃氣尚存之明證故厥者食後發熱直可決其必愈然猶恐浮陽之暴出旋滅於是俟三日之後診其脈而見浮數乃可決為寒盡陽回而向愈之期即在旦日夜半旦日為平旦夜半者天陽微動之時正上所言丑至卯上也惟血分熱度亦不可以太過以六日之發熱九日之厥續行三日之熱兩兩相較為日適相當也若更後三日熱仍未解則為血熱太過血熱太過者必溷膿血故曰必發癰膿非謂發生外證及一切內壅也然則食以素餅下不發熱之不字實為衍文否則下文恐暴熱來出而復去云云俱不可通矣傷寒脈遲六七日而反與黃芩湯徹其熱脈遲為寒今與黃芩湯復除其熱腹中應冷當不能食今反能食此名除中必死傷寒脈遲為寒濕太甚血分虛耗之證胃為生血之原胃氣虛寒則穀氣不能生血脈道因遲前於陽明篇食難用飽條已略見一斑蓋脈遲者胃必虛冷也設遇此虛冷之脈證不用理中以溫之反用黃芩湯以消其僅存之陽氣則向之食難用飽飽則微煩者至此並不能食嘗見有寒濕下利之證服芩芍湯後腹中痛而利益甚者按太陽傷寒於梔子湯條內尚有病人舊微溏者不可與之之戒而況黃芩之寒甚於梔子虛寒者誤服之有不腹痛下利者乎若下利之後反能納穀亦必上納下泄自胃中下十二指腸小腸大腸直抵肛門者中間絶無阻凝一如關門之不守故曰除中蓋不待完穀不化之變而已知其必死矣傷寒先厥後發熱下利必自止而反汗出咽中痛者其喉為痹發熱無汗而利必自止若不止必便膿血便膿血者其喉不痹肺與大腸為表裏先厥後熱下利當止原係厥陰順證蓋寒濕將盡而陽氣復也惟血分熱度太高上迫胸中淋巴幹水液外泄為汗肺胃燥熱因致咽痛喉痹所謂大腸移熱於肺也若先厥後發熱而無汗利以當止而不止血分之熱直與腸中濕邪混雜而便膿血大腸之熱不移於肺故其喉不痹豫按咽痛為燥氣上淫肺胃厥陰之證與少陰略同要其便膿血則大相違異少陰之便膿血為水寒血敗故方治宜桃花湯厥陰之便膿血為陽回血熱故獨宜白頭翁湯不惟脈之微細滑數大有徑庭而少陰之昏昏欲睡厥陰之多言善怒情形正自不同也傷寒一二日至四五日厥者必發熱前熱者後必厥厥深者熱亦深厥微者熱亦微厥應下之而反發汗者必口傷爛赤冬令暴寒四五日必漸回陽厥陰證一二日至四五日厥者後必發熱寒盡陽回之理宜亦與之相等或始病發熱者後必見厥但血熱被寒濕鬱伏者久必反抗夫所謂厥深熱亦深厥微熱亦微者譬如冬令雨雪連綿堅冰凝沍陽氣伏藏天氣轉陽其發益烈此天時之可證者也又如以手入冰雪中凍僵之後至於指不能屈久而血熱內發熾炭不敵其熱此人體之可證者也須知厥陰之證重寒則死陽回則生雖血熱反抗太甚有時便血及癰膿以視一厥不還則大有間矣夫厥陰寒濕之證原不當下上文下之利不止諸四逆厥者不可下之言之已詳此又何煩贅說惟寒鬱於外熱伏於裏則其證當俟陽熱漸回而下之俾熱邪從下部宣泄而病已愈矣若發其汗則胃中液涸膽火生燥乃一轉為陽明熱證為口傷爛赤所由來此正與反汗出而咽痛痹者同例由其發之太過而陽氣上盛也此證向豫在四明醫院親見之其始病豫未之見及豫往診已滿口爛赤檢其前方則為最輕分量之桂枝湯案中則言惡寒夫病在太陽而用桂枝雖不能定其確當與否然猶相去不遠既而病轉陽明連服白虎湯五劑前醫以為不治老友周肖彭屬豫同診問其狀晝則明瞭暮則壯熱徹夜不得眠夫營氣夜行於陽日暮發熱屬血分晝明夜昏與婦人熱入血室同熱入血室用桃核承氣則此證實以厥陰而兼陽明燥化病者言經西醫用瀉鹽下大便一次則中夜略能安睡診其脈沉滑有力豫因用大承氣湯日一劑五日而熱退肖彭以酸棗仁湯善其後七日而瘥傷寒病厥五日熱亦五日設六日當復厥不厥者自愈厥終不過五日以熱五日故知自愈凡厥者陰陽氣不相順接便為厥厥者手足逆冷者是也冬令暴寒五日之後天氣必轉溫和若轉陽之後嚴寒復作必較前為甚所以然者以地中鬱伏之陽氣不復能反抗故也傷寒厥陰證之手足見厥殆與冬令天時相等仲師云傷寒病厥五日熱亦五日近世醫家多以未經寓目不能深信然其理要可憑也蓋傷寒水分太多血熱不能相抗則手足見厥厥盡陽回則血分熱度漸高水被蒸化為氣陰陽乃相順接而不復見獨陰無陽之變然猶恐浮陽之出而復去也故必五日熱後不見厥乃可決為向愈否則血分熱度愈低必將復厥向愈之期猶未可恃也夫所謂陰陽氣相順接者血為陰氣為陽血分熱度合華氏寒暑表九十五度今則病表九十八度半太陽寒水被蒸成熱然後化氣外泄或含於皮毛之裏而不大泄陽之所以衛外為固者實由營陰熱度與之俱化所謂相順接也若營熱不及九十五度則水分不受蒸化譬之釜底薪火微細釜中滿貯寒水焉能成沸湯而氣上出哉是不為水火既濟而為火水之未濟也所謂不相順接也若營熱以漸而減則裏陽不達四肢而肘足逆冷矣凡但手足冷者為厥冷過肘膝者為逆厥陰篇之厥實賅冷過肘膝者言之仲師恐人誤會故特舉逆冷而申明之而全篇言厥者準此矣傷寒脈微而厥至七八日膚冷其人躁無暫安時者此為藏厥非蛔厥也蛔厥者其人當吐蛔今病者靜而復時煩者此為藏寒蛔上入其膈故煩須臾復止得食而嘔又煩者蛔聞食臭出其人常自吐蛔蛔厥者烏梅丸主之又主久利烏梅丸方烏梅三百枚細辛六兩乾薑十兩黃連一斤蜀椒去汗當歸各四兩桂枝附子炮人參黃柏各六兩上十味異搗篩合治之以苦酒浸烏梅一宿去核蒸之五升米下飯熟搗成泥和藥令相得內臼中與密杵二千下圓如梧桐子大先食後服十圓日二服稍加至二十圓禁生冷滑物臭食等傷寒為病血熱盛則與表寒相拒而脈緊更盛則表裏皆熱而脈大脈微而厥則血分熱度低弱不言可知至七八日膚冷則已踰一候而不見回陽是為獨陰無陽之的證且其人躁急坐臥不安並無暫時之休息則陰寒內據孤陽外越一出而不還矣謂之藏厥所謂藏厥者別於蛔厥言之也然概名之曰藏厥其病究在何藏此不可辨也若第以肝臟言之而脈固心所主也四肢及膚固脾所主也躁又腎寒陽越之證也概以厥陰證名之可乎大抵藏厥一證由於水勝血寒血中熱度太弱則主血之心藏寒而脈道微統血之脾藏寒而四肢及膚冷水臟寒則一身陽熱脫根外出而躁無暫安之時是宜白通豬膽汁湯蓋合三陰而俱病不當專以厥陰論治藏厥者因寒而厥不同蛔厥之因痛而厥也蛔厥為病蟲不動則安靜若無病之人蟲動則痛則號叫反側而見煩此證因寒濕內壅積為痰涎蛔即從此滋生譬之塵穢蘊濕則生鼠婦濁水成淖乃生孑孓藏寒而蛔生其情形適相等也病蛔之人胃中為濕痰所據納穀常少蛔飢而上竄於膈則痛痛即號叫少定得食而嘔即又號叫不已所以然者蛔爭食而吐涎蛔中多痰涎其質略蝸牛咽中不能受隨時泛出甚則蛔隨方嘔之時傾吐而出因其病為寒濕痰涎故特用溫中散寒除痰去濕之烏梅丸以破蛔蟲之巢穴巢穴破蛔乃無所容身不得不從大便出矣多則五十餘條少亦二三十條亦主久利者正以能去寒濕故也傷寒熱少厥微指頭寒默默不欲食煩躁數日小便利色白者此熱除也欲得食其病為愈若厥而嘔胸脅煩滿者其後必便膿血陰寒與陽熱相等則其病當愈所謂陰陽和者必自愈也此證熱少厥微指頭尚見微寒蓋即上熱微厥亦微之證默默不欲食則中氣猶為未復煩躁數日則為浮陽上冒若小便利而色白則外有浮陽裏無餘熱按少陰篇小便色白為下焦虛寒厥陰之小便色白則為病後熱除厥陰所以貴熱除者蓋陽回之後太過恐有膿血之變證也但必裏熱除而欲得食者方是中氣已復為病愈之確證能食則中氣達於四肢而手足當溫胃氣和而不嘔所謂有胃則生也若厥而嘔則胃氣不和而中陽不達胸中淋巴幹及腰下輸尿管重為濕邪所阻陽氣不通而見煩滿煩滿者氣機否塞鬱而不紓之象也夫浮陽無所依附則不傷血分惟濕與血熱化合乃致蘊蒸陰絡久久腐敗故其後必便膿血此證與少陰便膿血者寒熱懸殊治法違異一或差誤皆足殺人說詳先厥後發熱條茲不贅病者手足厥冷言我不結胸小腹滿按之痛者此冷結在膀胱關元也此承上節胸脅滿言之凡見厥者中陽不能外達胸中必見抑鬱若病者自言胸中舒泰如常則手足之冷不起於脾胃虛寒可知但手足之厥冷究屬何因此正不可以無辨厥逆之原有二不在中脘即在下焦但驗其少腹滿痛拒按即可決為冷結膀胱關元關元在臍下一寸而為寒傷血海按少陰篇云少陰病八九日一身手足盡熱者以熱在膀胱必便血也蓋血得熱則行故知其必便血得寒則凝故可斷為血結正不難比例而得之也傷寒發熱四日厥反三日復熱四日厥少熱多者其病當愈四至七日熱不除者必便膿血傷寒厥四日熱反三日復厥五日其病為進寒多熱少陽氣退故為進也厥陰之名義原以陰寒過甚手足逆冷為標準為其水寒血敗膽胃之陽熱有時而不繼也病愈之期當以寒盡陽回為驗是故厥少熱多則為將愈寒多熱少則為病進師言傷寒發熱四日厥反三日復熱四日又言厥四日熱反三日復厥五日皆假設之辭耳其實厥一日復熱二日亦為當愈熱二日厥反三日亦為病進原不必拘於日數也惟七日熱不除者則為陽熱太過故必便膿血說詳熱少厥微條不贅傷寒六七日脈微手足厥冷煩躁灸厥陰厥不還者死厥陰為病常例厥不過五日至過一候之期而脈微手足厥冷血分熱度之弱已不可支然使裏陽伏而不出尚有回陽之望若夫心煩冤而不舒手足躁動而不息則為陰血寒於裏而微陽脫於外法當灸足厥陰穴若大敦太衝膝關五里等引上出之浮陽使之下行則其厥當還若其不還則如夕陽欲沒草際微曛香炭成灰爐餘星火雖曰一息尚存固已不可久恃矣傷寒發熱下利厥逆躁不得臥者死傷寒厥陰證以先厥後發熱下利者為順以發熱下利而併見厥逆者為逆厥逆為水盛血寒中陽不達於四肢陰盡陽回乃見發熱雖下利未止一見陽回發熱後必自愈若發熱下利一時並見厥逆固已陰寒內據而孤陽不歸其根設其人暫得安靜夜中臥寐尚有酣適之時元氣猶未散也至於躁不得臥則陰極似陽柔和之氣盡矣少陰篇云自利復煩躁不得臥寐者死脈不至不煩而躁者死厥陰之病亦正同此例也傷寒發熱下利至甚厥不止者死此亦先見發熱後見厥利之惡候也此證如火著杯中汾酒上火而下水遇風即滅雖標陽暫存不能持久又如燈盞之中膏油垂盡火離其根熛焰反出於煙氣之末蓋陰陽離決之象也竊意此證雖云必死急用理中加生附以收外散之陽加赤石脂禹餘糧以固下脫之陰尚能十活一二或亦仁人之用心也傷寒六七日下利便發熱其人汗出不止者死有陰無陽故也此條訂正厥陰一證雖曰陽回則生而陽氣暴出者亦在必死之例六七日下利在後節本係不治之證蓋本節不利之不為下字之誤而利兩字實為衍文當云六七日下利便發熱其人汗出不止者死以六七日之厥七日後忽然下利正在下利便見發熱汗出不止之陽脫證故云必死如此則便字方有著落謂其與下利一時並見也如此則與末句有陰無陽亦為密合無間發熱在六七日後則六七日之厥不待言而可知下利在六七日後則六七日之不利反為贅說故知不字當為下字也按少陰篇下利厥逆無脈服白通加豬膽汁湯脈暴出者死微續者生汗出不止與脈暴出同正如煙氣上離薪之熛火立見滅熄欲其復燃豈可得乎故曰有陰無陽也傷寒五六日不結胸腹濡脈虛復厥者不可下此為亡血下之死傷寒五六日正厥陰證寒盡陽回之候所謂厥終不過五日也結胸乃胸膈不寬舒之謂非如太陽之證有誤下成結胸之一證也所謂不結胸者蓋胸中淋巴幹中醫謂之上焦寒盡陽回其中水液當隨陽外散故上膈無痞悶之變水濕不流入回腸無下利腹脹之變故腹濡惟血分不充動脈管中不能十分流動故脈虛血分熱度愈低勢當復厥此與上厥應下之條適得其反此證或因水寒血敗或因陽熱太甚傷及血分致下利而便膿血要之為亡血則一此時血之溫度急用四逆湯以助之尚恐不及若經誤下焉有不死者乎愚按此節正申明諸四逆厥不可下條虛家亦然之義上條未明言虛家之為氣與血此更指血以實之發熱而厥七日下利者為難治厥陰之證以先厥後發熱者為順為其陰寒去而真陽復也若外有表熱依然四肢逆冷則表熱已屬虛陽若已經一候而厥不還更加之以下利則寒濕太甚將恐下利不止不免虛陽上脫此其所以難治也傷寒脈促手足厥者可灸之傷寒厥陰證最忌血熱消亡脈促與太陽篇之脈緊同在藏之血熱與寒濕相抗脈因見促血熱為寒濕阻厄不能外達四肢手足因厥故必灸厥陰之穴以助陽氣但令血熱戰勝陽氣外達而手足自溫矣傷寒脈滑而厥者裏有熱也白虎湯主之脈滑屬陽明金匱腹滿寒疝宿食篇云脈數而滑者此有宿食下之愈宜大承氣湯嘔吐穢下利篇云下利脈遲而滑者實也利未欲止急下之宜大承氣湯下利脈反滑者當有所去下乃愈宜大承氣湯此可證脈滑之屬陽明矣厥陰證之脈滑而厥胃底膽汁合胃中燥火生熱異於宿食不化而手足之厥實為陽盛格陰故宜陽明證之白虎湯以清裏熱但使中陽外達四肢而厥逆自和矣手足厥寒脈細欲絶者當歸四逆湯主之若其人內有久寒者宜當歸四逆加吳茱萸生薑湯當歸四逆湯方當歸桂枝芍藥細辛各三兩大棗二十五枚甘草通草各二兩上七味以水八升煮取三升去滓溫服一升日三服當歸四逆加吳茱萸湯方即前方加生薑半斤吳茱萸二升上以水六升清酒六升煮取五升溫分五服脾主四肢亦主肌肉心主血亦主脈水氣勝則血寒血之溫度不達四肢故手足逆冷血熱不充分肉故身寒水氣留結心下寒傷動脈之血脈管中營分不充故脈細欲絶要知此證為水分太過血分不足故方用當歸以補血細辛通草以散寒而行水所以助心營而起欲絶之脈也合桂枝湯去生薑而倍大棗所以扶脾陽而溫手足之厥及肌肉之寒也若其人內有久寒心下水氣不免滲入於胃胃底膽汁不能相容又必抗拒而見嘔逆故於本方中加吳茱萸以止嘔生薑以和胃仲師雖未明言要可於無字處求之諸家解說泥於本文失之未核大汗出熱不去內拘急四肢疼又下利厥逆而惡寒者四逆湯主之大汗出而熱不去病情似轉陽明然何以內拘急而四肢疼此不可不辨也凡筋脈拘急之痙證則四肢及項背拘急但拘急在表面不在內蓋人之內藏遇溫則舒遇寒則縮故常有病痰飲而腰腹部分如帶緊縛者此即內拘急之明證也疼與痛微有不同疼即俗名痠痛濕流關節之病往往有之即此二證已可決為寒濕在裏之病而不去之表熱為浮陽而非轉屬陽明矣於是寒濕下陷回腸則病下利寒濕傷及血分血熱不能外達四肢肌肉則兼見厥逆而惡寒此其所以宜四逆湯也大汗若大下利而厥冷者四逆湯主之大汗泄於肌表則胸中淋巴幹發泄太甚而膈上當病乾燥若大下利則十二指腸以下淋巴微管乳糜亦當以宣泄太過而病乾燥若其人血熱尚存當必以水液既盡而一身手足皆熱而反見厥冷者則不惟內藏及大絡之血一時並見虛寒而膽胃之中絶無陽氣足以外達是其一身手足肌肉但有死陰而無生陽危在旦夕矣嘗見下利之人日數十次一身手足俱冷如冰按之粘膩似有汗液所異於死人者僅有一絲鼻息耳非急用大劑生附子乾薑以溫之甘草以和之病必不愈蓋視前證為尤危所當急溫者也病人手足厥冷脈乍緊者邪結在胸中心中滿而煩飢不能食者病在胸中當須吐之宜瓜蒂散病人手足厥冷陽氣不達於四肢此正無可疑者然陽氣何以不達此不可以不辨也夫陽氣之不達大致阻於水濕但有水分過多充溢內藏陽氣消亡而手足厥冷者亦有水分不多濕痰阻於上膈陽氣內伏而手足厥冷者陽氣消亡則獨存不化氣之寒水故其脈沉弦或微細陽氣內伏者陽氣與濕痰相持不下故其脈乍緊故其為病屬邪結胸中陽氣鬱於上膈故心中滿而煩濕痰滲入胃中故肌不能食此與太陽篇氣上衝咽喉不得息似異而實同惟其濕痰阻於胸中故吸氣不得入亦惟濕痰阻於胸中故陽氣不得出此其所以並宜吐之且並宜瓜蒂散也傷寒厥而心下悸者宜先治水當服桂枝甘草湯却治其厥不爾水漬入胃必作利也此條訂正凡水氣在膈上者宜散之此即金匱水在腰以上當發其汗之義也厥陰證厥而心下悸此時水在膈間阻塞中脘陽氣不得外達四肢水氣在上焦者不當參用下焦藥故太陽篇心下有水氣已成留飲者則為小青龍湯證此即散之之義也其有發汗過多陽氣上盛吸水氣上衝而心下悸者則為桂枝甘草湯證桂枝以助陽氣使之散入肌理而外泄甘草和中而健脾能助桂枝外散之力此即桂枝湯發肌理之汗用甘草之義也又能止上淩之水氣以定心悸此即脈結代心動悸用炙甘草湯之義也然則厥陰篇之厥而心下悸者與太陽發汗過多水氣淩心者同為上焦之證水在上焦不當用利水之茯苓然則恐其水漬入胃作利而先治其水亦當用桂枝甘草湯此云當服茯苓甘草湯則傳寫之誤也師云郤治其厥不出方治蓋即白通四逆諸方可知使學者於言外領取之傷寒六七日大下後寸脈沉而遲手足厥冷下部脈不至咽喉不利吐膿血泄利不止者為難治麻黃升麻湯主之麻黃升麻湯方麻黃二兩半升麻一兩一分當歸一兩一分知母黃芩芍藥萎蕤各十八銖石膏白朮乾薑桂枝茯苓甘草天門冬去心各六銖上十四味以水一斗先煮麻黃一兩沸去上沫內諸藥煮取三升去滓分溫三服相去如炊三斗米頃令盡汗出愈厥陰傷寒原有表寒裏熱當下之證所謂厥應下之者是也若大下之後熱除脈和則其病當愈若夫寒濕因大下而陷陽氣不達手太陰動脈沉遲至於手足厥冷寒濕在下血分之熱度益低甚至下部趺陽太衝脈不至寒濕甚矣然全係寒濕而不見他證其病猶易治也乃按其病情亦既水寒血敗又因肝藏陰虛而膽火上逆胃底膽汁生燥上衝肺部以至咽喉不利而吐膿血加以在下寒濕為病而泄利不止是為上熱下寒此時欲清上熱則增下寒欲溫下寒則增上熱故曰難治麻黃升麻湯君麻黃升麻以升提下陷之寒濕而外散之所以止下利也當歸以補血黃芩以清膽火知母石膏以清胃熱所以止吐膿血也萎蕤天冬以潤肺所以利咽喉不利也白朮乾薑芍藥桂枝茯苓甘草所以解水分之寒濕增營分之熱度而通利血脈也但令水寒去而營熱增手足之厥冷自解矣傷寒四五日腹中痛若轉氣下趨少腹者此欲自利也此一節見寒濕下利之證同於太陰少陰者也厥陰病厥不過五日則當四五日間正寒盡陽回之候若寒濕趨於足太陰部分而見腹中痛此時不遽下利或將水寒血敗而見下膿血之桃花湯證設或腹中否塞之氣忽然衝動漉漉有聲直下而痛及少腹必將轉為寒濕自利之四逆湯證試觀病懸飲內痛者服十棗湯後始而痛在中脘繼而痛及腹部逮後痛至少腹乃不逾時而大下之矣又如病陽明證者服大承氣湯後亦必氣走少腹而後下此大便欲行氣必下趨少腹之明證也非用下藥而轉氣自趨少腹故知其欲自利也傷寒本自寒下醫復下之寒格更逆吐若食入口即吐乾薑黃連黃芩人參湯主之此條訂正乾薑黃連黃芩人參湯方乾薑黃連黃芩人參各三兩上四味以水六升煮取二升去滓分溫再服傷寒本自寒下此厥陰證之寒濕下利同於太陰少陰之證也於法當溫乃醫以為協熱利循內經通因通用之例而更以承氣湯下之於是腸胃虛寒阻格膈上之陽氣夫胃氣寒者多病吐逆伏寒在內格陽於上謂之寒格寒結於腸胃則十二指腸不能容膽汁之灌輸少陽上逆必病嘔吐故有食入口中即吐之變則其證為胸中有熱腸胃有寒邪然則醫復吐下之當云醫復下之寒格更逆吐下當云寒格更逆吐前句吐字後句下字皆衍文耳蓋此證與太陽篇嘔而腹痛之黃連湯證略同故乾薑黃連黃芩人參湯方治亦與黃連湯相似所不同者惟彼方多甘草桂枝半夏大棗而無黃芩耳按金匱下利脈滑者當有所去大承氣湯主之是知熱利原有當用下法者醫乃誤寒利為熱利而復下之耳治法無下利而使之吐者故知吐字當衍也太陽篇嘔而腹痛為上熱下寒其為寒格逆吐之證與此正同而方治之並用黃連乾薑亦與此同故知當云寒格逆吐而下字當衍也下利有微熱而渴脈弱者令自愈下利脈緩有微熱汗出令自愈設復緊為未解此條訂正厥陰下利證屬寒濕陷大腸其脈當見沉緊而其外證必兼厥逆惡寒而口不渴無表汗又不待言矣夫下利一證寒極則死陽回則生陽氣之回又必以有微熱為候所以然者正恐亢熱暴出反有便膿血之變也但微熱為寒盡陽回之第一步又當參驗其表裏或裏濕盡而見渴或利下後上膈未盡之水氣從肌表外泄為汗其證皆當自愈故仲師並云令自愈也豫按上節言脈弱與微熱相合是也下節言脈數與微熱不合則傳寫之誤也脈數當見壯熱然則數字當為何字之誤曰觀於下文復緊為未解即可知為緩字之誤矣蓋寒濕利脈必沉緊故必轉為中風有汗之浮緩脈然後汗出而利止故脈復見沉緊即可斷為利未欲止也下利手足厥冷無脈者灸之不溫若脈不還反微喘者死此寒極則死之證也下利而手足厥冷則中陽不達於四肢水寒傷血至血分中熱度消歇而脈伏不鼓是當通灸三陰諸穴使陽氣四達而手足當溫若既灸之後手足依然逆冷脈之伏者依然不還而上膈反見微喘則是血寒於裏氣脫於外雖有盧扁無能為力矣按此條之末少陰負趺陽為順句當是少陰篇脫簡與上文義不相連屬另條附釋於後少陰負趺陽者為順也少陰之證重陰則死回陽則生雖厥陰之病大略與少陰相似但此語明指少陰故黃坤載懸解移置少陰篇中以為雖三急下證治之得法皆可不死故少陰見陽明證者無死法此即手足溫者可治欲去衣被可治之例也下利寸脈反浮數尺中自澀者必圊膿血下利則寒水陷於回腸其脈必見沉遲而反見浮數者即為寒盡陽回之驗若浮數之脈但見於寸口而尺中自澀尺中澀為血少陰竭前於少陰尺脈弱澀不可下之條下已略申其旨但澀為凝定不流之脈故在太陽為汗液凝澀不徹則當重發其汗而流通之少陰陽虛而尺脈弱澀為陽虛之後陰液不能作汗則當溫藥以助之獨至厥陰之尺中脈澀為胞中血海上連衝任凝澀不通其證必兼腹痛上有熱下有瘀故必圊膿血也此非桃花湯證亦非白頭翁湯證膿血盡則脈澀自愈此即嘔癰膿者膿盡自愈之例也下利清穀不可攻表汗出必脹滿下利清穀之證前於陽明少陰篇中兩見而皆為四逆湯證溫之尚恐不及豈有攻表之理按此條當為太陰篇錯簡蓋太陽寒水不能不作汗下併太陰寒濕衝激腸胃始有下利清穀之變少陰為寒水之藏寒水泛濫迸入腸胃故不惟病情與太陽同即治法亦同此證表熱裏寒前於陽明少陰二篇已舉其例則此證亦當為表熱裏寒本太陽證而內陷太陰表證仍在故有不可攻表之誡編纂者誤列厥陰耳脹滿原屬太陰寒證下利清穀中陽已不可支更誤發其汗致一線微陽外散陰寒乃獨據中宮譬猶甕中貯水遇寒成冰甕且因之暴裂若經誤治而成此變證要惟有大劑回陽尚當於什佰之中挽救一二獨怪近世庸工遇此惡候謬稱肝鬱日服金鈴子散以至於不救是真不知死活者也下利脈沉弦者下重也脈大者為未止脈微弱數者為欲自止雖發熱不死脈之沉弦為水下利而見沉弦則寒水直趨回腸而見下重此本四逆湯證必俟陽氣恢復其病方愈然脈之沉弦一轉而為滑大則寒去而水未去一變而為熱利下重之白頭翁湯證此所以診其脈大不待問而決其為未止也惟按其脈於微弱之中略見數脈乃為陽氣漸回而利當自止內經云腸癖身熱則死寒則生為其濕與熱併居腸胃欲清其熱轉滋其濕欲燥其濕轉增其熱古未有白頭翁方治故曰死其實非死證也惟陽氣漸回脈不見滑大者雖當發熱要為寒盡陽回之驗此其所以不死也下利脈沉而遲其人面少赤身有微熱必鬱冒汗出而解下利清穀者病人必微厥所以然者下虛故也此條訂正此節文義下利清穀當在汗出而解下其面戴陽為衍文蓋下利脈沉而遲證情原屬寒濕其其人面少赤身有微熱即血分熱度猶存可斷為陽回之漸陽熱蘊蒸乃見鬱冒鬱冒不已外達皮毛肌腠乃能汗出而解此寒去陽回所以為向愈之徵也若夫下利清穀水盛血寒其人必脈微而肢厥所以然者為其陰寒下注腸胃中陽氣垂絶急溫之尚恐不及豈復能鬱冒而解此可知下利清穀者為另一證當列病人必微厥上今本列必鬱冒上實為傳寫倒誤然則仲師所謂下虛正以久利虛寒言之蓋以見陽熱不回者之未欲愈也其面戴陽似係面少赤注文傳寫者誤列正文耳此條金匱亦僞誤下利脈數而渴者令自愈設不差必圊膿血以有熱故也下利一證最忌寒濕內蘊血分中熱度低弱寒濕內蘊則不渴血熱消沮則脈虛微此本四逆湯證今見脈數而渴則濕邪將盡而血熱漸復此不治自愈之證也間亦有不即愈者則一變而圊膿血蓋即白頭翁湯證所謂熱利下重也此又陽氣回復失之太過者然究為不死之證慎毋嫌前後違異而狃於四逆之方治也下利後脈絶手足厥冷晬時脈還手足溫者生脈不還者死下利脈絶則心房血寒欲強心房莫如附子手足厥冷則脾藏血寒欲溫脾藏莫如乾薑炙草服藥後晬時心房得溫而脈還脾藏得溫而手足之厥冷轉熱則其病可以不死蓋此證不惟手足之厥冷而肢體常有冷汗粘膩如膏油按之冷如井底石病者魂營營飛越帳頂身搖搖如墮萬丈之深坑直待陽回之後膏汗始斂神魂方定蓋去死不遠矣若服藥後脈絶不還則一身精血俱寒殫祝融全力不能燃即死之灰罄橐駝平生未便活已枯之樹有惜其施治之太晚而已傷寒下利日十餘行脈反實者死傷寒下利日十餘行似猶未為甚也據病情論則脈當浮弱而反實者蓋腹中有物下行太急則血氣衝於上故婦人之將産則其脈洪大而搏指大便時用力太猛則其脈亦搏指搏指者氣下墜而脈上實也下利日十餘行脈不應實今反實者則是血氣膠固成痞壅阻回腸之內雖下而不得通也此證攻之不行溫之則生燥故多有致死者竊意當借用大黃牡丹湯以下之兼通血分之瘀倘能挽救一二此亦仁人之用心也張隱庵乃以日十餘行為三陰三陽皆虛故主死世固有日夜八九十行服大黃附子湯而愈者豈三陰三陽反不虛耶下利清穀裏寒外熱脈微欲絶汗出而厥者通脈四逆湯主之此條訂正下利清穀為完穀不化胃中無火可知胃底無膽汁則不能消水水挾穀食未消者下走十二指腸由回腸直趨而下是為裏寒寒據中宮陽浮於外乃病外熱外熱則汗出裏寒則手足見厥按汗出而厥上當脫脈微欲絶四字故用通脈四逆湯以強心陽而助血熱但使陽熱漸回其脈當出手足當溫且溫裏則水化為氣在表之浮陽亦以無所抵拒而歸其根而諸恙除矣熱利下重者白頭翁湯主之白頭翁湯方白頭翁二兩黃連黃柏秦皮各三兩上四味以水七升煮取二升去滓溫服一升何以知為熱利手足不寒而脈數穢氣逼人者是下重者濕與熱併而下氣不通也氣不通則穢物不得宣泄白頭翁湯方治白頭翁秦皮以清涼破血分之熱黃連黃柏以苦燥除下焦之濕然後熱濕並去而熱利當止蓋下重之由出於氣阻氣阻之由根於濕熱不更用疏氣藥者所謂伏其所主也下利腹脹滿身體疼痛者先溫其裏乃攻其表溫裏宜四逆湯攻表宜桂枝湯此節原文當列太陽篇醫下之條上編篡者誤列厥陰也蓋太陽失表則內陷太陰而病下利脹滿醫者誤與陽明吐後脹滿同治下以調胃承氣遂至下利清穀不止此病情之次第可以意會者也故未經誤下因下利而脹滿與因脹滿而誤下至於下利清穀均為四逆湯證利止而表未解至於身體疼痛均之為麻黃湯證若夫桂枝訛誤已詳論太陽篇中茲不贅又按前後兩條皆白頭翁湯證中間此條亦夾雜不論下利欲飲水者以有熱故也白頭翁湯主之厥陰下利陽回之後其利當止陽回而利不止即有便膿血之變以陽熱太重故也但未便膿血之時早有見端當以欲飲水為之驗蓋胃中生燥則渴欲飲水而下利未止則腸中濕熱未盡而絡脈受其蘊蒸故方治亦以清涼養血之白頭翁為主而佐之以秦皮清熱之黃連為輔濟之以燥濕之黃柏此又將見下重未及便膿血之期而先發制病之治法也下利譫語者有燥屎也宜小承氣湯不大便之譫語下利色純青皆當用大承氣湯盡人而知之矣但有燥屎而下利既無腸胃枯燥之變亦無膽汁下泄之危所以譫語者燥屎不能隨水液下行穢濁之氣上薰於腦而腦氣昏也裏熱不甚故不需鹹寒之芒硝且以腸中惡物膠固而堅利用浸潤而後下若一過之水所能去下利時宜早去矣何待藥乎按此條為陽明病非厥陰本證緣下利腹脹滿及欲飲水條比例及之下利後更煩按之心下濡者為虛煩也宜梔子豉湯下利耗其津液則在表浮陽不收而在裏餘熱不去因病虛煩此在太陽篇中原屬梔豉湯證厥陰篇中何庸更列此條蓋亦為下利腹脹滿及欲飲水條比例言之也下利後更煩當以心下為驗若按之石硬或痛則有痰涎與宿食膠結胃中而為大小陷胸湯證惟按之而濡乃可決為虛煩但清其餘邪足矣又按太陽篇心下痞按之濡為大黃黃連瀉心湯證此但云按之心下濡其為無痞可知有痞則為實無痞則為虛實則裏有實熱虛則裏為虛熱此瀉心梔豉之辨也嘔家有癰膿者不可治嘔膿盡自愈厥陰一證常以中見之少陽為病少陽之證善嘔故嘔亦為厥陰之正病厥陰寒盡陽回之後陽熱太甚傷及血分下行則便膿血上出則嘔癰膿所以病延血分者以膽火傷及血絡故也豫按厥陰篇中便膿血與嘔癰膿皆無方治以鄙意測之便膿血者當用排膿散以攻而去之嘔癰膿者當用排膿湯以開而泄之按此證蓄血而成膿病出於肝臟之熱而表證當見於目以肝開竅於目故也百合狐惑陰陽毒篇云病者脈數無熱微煩默默但欲臥汗出初得三四日目赤如鳩眼七八日目四眥黑若能食者膿已成也赤小豆當歸散主之疑即此證也但此證不當止嘔當令毒從口出膿盡而血自和否則強欲止嘔毒留於中有內潰而死耳嘔而脈弱小便復利身有微熱見厥者難治四逆湯主之胃中虛寒則嘔而脈弱下焦虛寒故小便自利陽氣浮於外故身有微熱陰寒據於裏故手足見厥外陽而內陰其象為否為陰長陽消故曰難治張隱庵獨指身有微熱為陰陽之氣通調殊不可通四逆湯溫腎而暖胃故以為主治之方也乾嘔吐涎沫頭痛者吳茱萸湯主之寒濕留於上膈脾胃因虛寒而不和則乾嘔而吐涎沫清陽不升濁陰上逆則為頭痛俗以為肝陽上升者謬也吳茱萸湯吳茱萸以祛寒而降逆人參薑棗以補虛而和胃即其病當愈蓋其所以頭痛者起於乾嘔氣逆而上衝也其所以吐涎沫者起於脾胃虛寒脾虛則生濕胃寒則易泛也考吳茱萸辛溫主溫中下氣最能散肝藏風寒故於厥陰寒證為宜也嘔而發熱者小柴胡湯主之肝藏陰虛則膽胃上逆因有嘔而發熱之證蓋太陽水氣不能作汗因成濕痰留積上膈至少陽膽火鬱而不達則上泛而為嘔寒濕在皮毛之裏正氣與之相抗是生表熱此證必先形寒或兼頭痛若發有定候即當為瘧且其脈必弦為其內有濕痰也其口必苦為其膽汁上泛也小柴胡湯柴胡以疏表黃芩以清裏半夏以降逆人參炙草薑棗以和中則嘔止而熱清矣按此方治瘧最為神效今人廢棄不用是可惜也豫謂此證若但熱不寒當從桂枝白虎湯例於本方中加石膏知母若寒重熱輕當從太陽傷寒例加桂枝乾薑明者辨之傷寒大吐大下之極虛復極汗者其人外氣怫鬱復與之水因得噦所以然者胃中寒冷故也此條訂正傷寒大吐大下則津液內損極虛而復極汗則津液外損外氣怫鬱者陽氣因極汗外浮而表熱不徹也津液內損則渴若以發熱而渴之故而誤為實熱復以冷水與之即病寒厄此無他汗吐下之後胃本虛寒復與之水以益胃中之寒必且厄而愈逆蓋以發其汗四字實為衍文遍考古方未聞有以水發汗者即服五苓散後有多服暖水發汗之條要其所以發汗者在五苓散而不在水況按之本文初未嘗言暖水乎向來注家含糊讀過可笑亦可歎也傷寒噦而腹滿視其前後知何部不利利之即愈傷寒厄逆之證有宜橘皮生薑湯者有橘皮生薑竹茹湯者此其常也然豫曾見毗陵蔣姓傷寒發黃證不大便而厄四日矣豫以大承氣加茵陳蒿下之黃去而厄亦止然後知仲師所謂視其前後知何部不利利之即愈為信而有徵也至小溲不利之厄逆豫未之見但以理測之當與不大便同蓋必下部無所阻礙然後吸入之氣與呼出之氣流動而沖和雖間有噫噯而其氣自順一有阻礙則入既不順出乃愈激故前部不利則用五苓後部不利則用承氣不煩疑慮者也霍亂篇問曰病有霍亂者何答曰嘔吐而利是名霍亂病之有霍亂也始見於漢書嚴助傳所謂夏月暑時嘔泄霍亂之病相隨屬者是也其病南方為甚西北高燥之地實所罕見蓋地氣卑濕遇天時陽氣外張蒸氣之逼人益熾汗泄太甚則營熱而燥渴渴則冷飲設飽食之後繼以冷食譬之冷茶與熱茶攙和冷羹與熱羹攙和不旋踵即泛漚上下動搖已成臭惡之物此無他熱者有氣冷者無氣冷加於熱則氣不行而濕蘊於內濕蘊則宿食朽腐糟粕冒於上水濕漬於下中氣忽然倒亂濁氣反升清氣反降上嘔而下泄矣故知霍亂之名專以吐利交作言之近世醫家遇不吐不利之證漫以乾霍亂為名不可解也問曰病發熱頭痛身疼惡寒吐利者此屬何病答曰此名霍亂霍亂自吐下又利止復更發熱也前節既以嘔吐而利為霍亂之定名此為不兼他證者言之猶易辨也若見發熱頭痛身疼惡寒而仍兼吐利者則易與太陽傷寒相混仲師恐人不辨其為霍亂而漫以麻黃葛根二湯為治故設問答以明之使人知施治之緩急此亦太陽篇先救其裏後身疼痛之例也故無論表裏同病及吐利止而表證仍在者皆當後救其表此傷寒霍亂之所同不可以混治者也所謂利止更復發熱者謂先治其裏吐利止而表證仍在也此即先本後標之例也謹按五月陰氣生於黃泉之下至六月則為二陰七月則為三陰雖天時甚熱則人身胸腹按之常冷與井水相應是為伏陰加以長夏濕土司令瓜果冷飲混投伏陰部分皆足以傷中氣況大汗旁泄之期皮毛大開晝苦炎熱夜中貪涼風露必乘其虛而閉遏汗孔由是三焦水氣與未盡之魄汗混雜為一表氣不通則兼病傷寒中氣不通則吐利交作治以四逆理中藥劑太輕尚恐不及以致四肢逆冷無脈而死豫友丁甘仁每論及此為之痛恨無如近世市醫不知天時不通易理創為霍亂新論多用芩連苦寒之品中氣已敗而醫更敗之則是不死於天時不死於病而死於醫也往年章次公治楊志一病曾論及此因附存之間亦有浮陽在上陰寒在下須熱藥冷服而始受者又有浮熱上衝必先投萸連逆折其氣始能受熱藥者要其為裏寒則一是在臨證時明辨之耳傷寒其脈微澀者本是霍亂今是傷寒却四五日至陰經陽轉入陰必利本嘔下利者不可治也欲似大便而反矢氣仍不利者此屬陽明也便必鞕十三日愈所以然者經盡故也此條訂正傷寒其脈微澀此在三陰篇中原為四逆湯證所以然者體溫弱而結液不能化氣水盛而血寒也本是霍亂今是傷寒即承上節利止更復發熱言之謂霍亂止而表證仍在也設當其發熱惡寒頭痛身疼病在太陽之時即用麻黃加朮湯以救其表則不難一汗而愈惟其失此不治四五日後太陽水氣合併太陰轉病寒濕下利然則上轉入陰當為陽轉入陰之誤謂其由太陽失表轉入太陰蓋即陽去入陰之說也曰本嘔下利者不可治非謂其必死也謂其上熱下寒不可專治下利也此證欲治下利必用熱藥格於上熱而入口即吐當奈何故上熱輕者有熱藥冷服之治或用黃連湯溫涼並進或於白通湯中加入人尿豬膽汁降嘔逆而兼溫裏寒此皆不可治之治法也惟三陰之證獨陰則死回陽則生故必轉屬陽明濕盡便硬然後當愈曰欲似大便反矢氣仍不利者濕盡之明證也霍亂之證起於暑令與中風同以六日為一候十三日為陽明經過之一日故曰十三日愈下文所謂過之一日當愈也下利後當便鞕鞕則能食者愈今反不能食到後經中頗能食復過一經能食過之一日當愈不愈者不屬陽明也霍亂一證本屬吐利則便硬為難若大便轉燥則寒濕除而中陽當復故能食以便硬為期曰今反不能食到後經中頗能食謂三候之少陽十八期內也當傳少陽而胃底消食之膽汁當盛故偏能食惟愈期屬陽明者愈期在陽明期後一日即上文所謂十三日十三日不愈或至過經四五日而愈者陽氣之回復當兼係少陽陽明也利止惡寒脈微而復利亡血也四逆加人參湯主之此條訂正四逆加人參湯方於四逆湯內加人參一兩餘依四逆湯服法霍亂本吐利若利止之後惡寒脈微而復利此為統血之脾藏不得血中溫和之氣發脾陽而消水故使復利蓋血之本氣至熱血不足則熱減而寒勝此蓋申上文脈微澀條而補其方治利止字當在惡寒上亡血也三字直謂統血之脾陽以久利而虛耳非吐衄便血之謂故方劑但用四逆加人參而絶無當歸生地阿膠之屬為其立方本旨原為增長血中溫度而設非謂亡有形之血也霍亂頭痛發熱身疼痛熱多欲飲水者五苓散主之寒多不用水者理中丸主之理中丸方人參甘草白朮乾薑各三兩上四味搗篩為末蜜和為丸如雞子黃大以沸湯數合和一丸研碎溫服之日三四服夜一服腹中未熱益至三四丸然不及湯湯法以四物依兩數切用水八升煮取三升去滓溫服一升日三服若臍上築者腎氣動也去朮加桂四兩吐多者去朮加生薑三兩下多者還用朮悸者加茯苓二兩渴欲得水者加朮足前成四兩半腹中痛者加人參足前成四兩半寒者加乾薑足前成四兩半腹滿者去朮加附子一攻服湯後如食頃飲熱粥一升許微自溫勿揭衣被凡物冷熱相攙則味變而質敗近人於飽食之後飲冰凍汽水或冰淇淋往往發霍亂之證所以然者冷與熱參雜腹中中氣淆亂而吐利作也氣上衝則頭痛而發熱表有寒則身疼痛惟霍亂當先治裏前於發熱頭痛條下已詳言之治裏有熱多寒多之辨熱多則標陽在上而渴欲飲水寒多則寒濕在下而不用水飲水者患其停水故用五苓散以泄之不用水者患其裏寒故用理中丸湯以溫之而表證從緩焉吐利止而身痛不休者當消息和解其外宜桂枝湯小和之此節申明後治其表之例夫吐利止而身痛不休原有二因一為太陽水氣凝沍皮毛則必兼惡寒一為太陽水氣凝沍肌腠則不兼惡寒兼惡寒便當用麻黃湯以達之所以解表也不兼惡寒者但須桂枝湯以和之所以解肌也此小大輕重之辨也吐利汗出發熱惡寒四肢拘急手足厥冷者四逆湯主之既吐且利小便復利而大汗出下利清穀內寒外熱脈微欲絶者四逆湯主之浮陽上衝則吐而發熱汗出陰寒內據則下利而惡寒水氣勝而血熱不達則四肢拘急而手足逆冷寒水太甚則三焦無火而小便自利溢入腸胃者為下利清穀水盛血寒則脈欲絶凡見以上諸證皆當與三陰寒濕下利同治故均以四逆湯為主治之方也吐已下斷汗出而厥四肢拘急不解脈微欲絶者通脈四逆加豬膽汁湯主之通脈四逆湯加豬膽汁方甘草二兩炙乾薑三兩強人可四兩附子大者一枚生用去皮破八片豬膽汁半合上四味以水三升煮取一升二合去滓內豬膽汁分溫再服其脈即來無豬膽以羊膽代之吐已下斷張隱庵謂吐無所吐下無所下津液內竭此說是也然何以有汗出而厥諸證汗出者浮陽亡於外也陽浮於外則裏氣已虛而四肢厥逆陰液內耗關節不濡故四肢拘急不解寒凝血敗故脈微欲絶然何以不用四逆湯而用通脈四逆湯加人尿豬膽汁蓋血寒於下於法當溫故用乾薑附子以溫之然溫其中下恐猶不能載陽氣而上出故加蔥白但此津液內竭之證吐下雖止猶不免乾嘔而內煩非加鹹寒之人尿苦寒之豬膽汁導之下行必將為浮陽所格下咽即吐此即熱藥冷服之意而又加周密者也吐利發汗脈平小煩者以新虛不勝穀氣故也此節為病後正氣復者言之服四逆湯而吐利止服桂枝湯而發汗已其脈已平可無他慮矣然於食後往往煩悶氣短究其所以然則以吐後而胃氣一虛下後而胃氣再虛發汗而胃氣三虛胃虛則胰液膽汁並耗不能消穀故不勝穀氣減其食則愈故不另立方治陰陽易差後勞復篇傷寒陰陽易之為病其人身體重少氣少腹裏急或引陰中拘攣熱上衝胸頭重不欲舉眼中生花膝脛急者燒裩散主之燒裩散方上取婦人中裩近隱處剪燒灰以水和服方寸匕日三服小便即利陰頭微腫則愈婦人病取男子中裩燒灰婦人傷寒新差男子與之交餘邪從廷孔吸入宗筋謂之陰易男子病後與婦人交餘邪由宗筋貫輸廷孔謂之陽易如俗所傳過癩者然即云傷寒新差即當證明所病者為何經自來注家多缺分曉蓋三陽無寒濕三陰多寒濕而三陰證之新差又必在寒盡陽回之期未盡之濕邪乃一變而成濕熱苟令化熱之濕濁滲入前陰輕則為淋濁重則腐爛而內潰身體重者太陰之濕象也少氣者濕傷氣也少腹裏急或引陰中筋攣膝脛拘急者寒濕在下也熱上衝胸頭重不欲舉眼中生花者濁熱上僭清陽為之蒙翳也取中裩近陰處燒灰和服以濁引濁使病從何處受即從何處出夫磁石引針珀引燈芯同氣相感也故食瓜而病者治以瓜皮湯食穀而病者治以飯灰其理同也近世醫家既不識病原之為濕濁又不明同氣相感之理無怪論及燒裩散反憎其穢褻無理也大病差後勞復者枳實梔子豉湯主之枳實梔子豉湯方枳實三枚炙梔子十四枚香豉一升綿裹上三味以清漿水七升空煮取四升內枳實梔子煮取二升下豉更煮五六沸去滓溫分再服覆令微似汗若有宿食者內大黃如博碁子大五六枚服之愈大病差後精氣消歇靜以養之猶恐本原之難復若夫病後勞力則百脈張而內熱易生汗液泄而表陽不固內熱生則不思飲食表陽虛則易感風寒煩熱在裏則中氣易塞風邪外襲則表氣不濡枳實以降之梔子以清之香豉以散之而表裏自和矣若以病後中虛食入易停便當從宿食治但加大黃如博碁子大五六枚不煩用大小承氣者則以病後胃虛不勝重劑故也傷寒脈浮者以汗解之脈沉實者以下解之差已後更發熱小柴胡湯主之此條訂正傷寒差已非謂病之自差也大法脈浮者以汗解之脈沉實者以下解之可知脈浮者數語當在差已上傳寫倒誤也若差已後更復發熱表無太陽實寒裏無陽明實熱或由差後乏力多臥表氣不張脾藏留濕不能不外達皮毛耳故祗需小柴胡湯以解外使濕去表和其熱自退此特為病後不勝重劑言之不然服枳實梔子湯覆令微似汗有宿食加大黃前條已詳言之脈浮者數語不幾成贅說乎大病差後從腰以下有水氣者牡蠣澤瀉散主之牡蠣澤瀉散方牡蠣澤瀉蜀漆洗去腥海藻洗去堿栝蔞根商陸根葶藶子以上各等分上七味異搗下篩為散更入臼中治之白飲和服方寸匕小便利止後服凡人久臥生濕積濕則生痰濕痰凝沍則水道為之不通若陰溝日久瘀塞者然人之一身水氣至腰以下而大泄腎與膀胱左右並有管相接以出小便內經所謂決瀆之官水道出焉者是也然則腰以下正為水道宣泄之衝不當留積水氣自大病久臥百脈停頓必有敗津留滯其中水與敗津化合則膠固而成痰濁併居血絡阻下行之路水道為之不通故必用蜀漆葶藶以瀉痰商陸以通瘀海藻以破血絡之凝結海藻含有碘質能清血毒故瘡癰多用之而病根始拔君牡蠣澤瀉者欲其降而泄也用栝蔞根者所以增益水津欲其順水而行舟也此利小便之大法異於五苓散之不兼痰濕者也大病差後喜唾久不了了胃上有寒當以丸藥溫之宜理中丸胃中有熱則吐黃濁之痰金匱但坐不臥之十棗湯證也胃中有寒則吐涎沫金匱痰飲篇之小青龍湯證也若大病差後之喜唾則胃中本無上泛之涎沫咽中常覺梗塞所出但有清唾此與吐涎沫者略同而證情極輕緩痰飲之吐涎沫以吐黃濁膠痰為向愈之期喜唾者亦當如是為其寒去而陽回也至於久不了了則胃中微寒非用溫藥斷難聽其自愈然湯劑過而不留尚恐無濟故必用理中丸以溫之使得久留胃中且日三四服以漸而化之則宿寒去而水氣消矣傷寒解後虛羸少氣氣逆欲吐竹葉石膏湯主之竹葉石膏湯方竹葉二把石膏一升半夏半斤人參三兩甘草二兩粳米半斤麥門冬一升上七味以水一斗煮取六升去滓內粳米煮米熟湯成去米溫服一升日三服傷寒解後無論從汗解與從下解其為傷胃陰則一中氣虛而胃納減故虛羸少氣陰傷則胃熱易生胃熱上升而不得津液以濟之故氣逆欲吐師用竹葉石膏以清熱人參甘草以和胃生半夏以止吐粳米麥冬以生津但得津液漸復則胃熱去而中氣和矣病人脈已解而日暮微煩以病新差人強與穀脾胃氣尚弱不能消穀故令微煩損穀則愈病已脈和當可免餘邪之留戀矣間亦有日暮微煩者非病也蓋其病新差脾胃尚虛不能不遽勝穀食穀食停而濕熱內蘊也然何以必在日暮蓋日暮為地中蒸氣上升草木炭氣張發之候胃中新食壅阻成濕與此升發之氣相感驟然上蒙因見煩熱則但損穀其煩當止更不須大黃五六枚也痙濕暍篇傷寒所致太陽病痙濕暍三種宜應別論以為與傷寒相似故此見之痙證有太陽有陽明濕證有太陰有太陽中熱中暍雖初病惡寒而實與傷寒有別仲師列三證於傷寒之後正欲使人致辨於疑似之間耳太陽病發熱無汗惡寒者名曰剛痙此條訂正太陽病發熱汗出不惡寒者名曰柔痙痙原作痓陳修園金匱淺注以為痙之誤是也然何以有剛柔痙之別蓋人之一身血熱而水寒發熱則血熱勝無汗則水氣未泄傷寒之證無汗者多惡寒則無汗之證正不得云反惡寒無汗者表實水氣遏於外脈絡張於內兩不相下故曰剛痙若發熱汗出不惡寒則表氣已疏無筋脈緊張之象故曰柔痙太陽病發熱脈沉細者名曰痙為難治此條訂正此節節末當如金匱補出為難治三字傳寫訛脫也太陽病發熱無汗者脈必浮緊有汗者脈必浮緩若一見沉脈便是痙證故同一發熱有汗之太陽證而脈反沉遲即為柔痙而於桂枝湯本方內加生津之栝蔞根以濡其筋脈然則本條之脈沉而細為標熱本寒亦宜栝蔞桂枝湯加附子以溫經而其證當愈蓋裏氣不溫則水寒不能化氣無生津之藥不能外濡筋脈若徒恃桂枝以解肌正恐津液加耗而益增強急故曰難治非謂此證之不治也太陽病發汗太多因致痙太陽之病有失表而傳陽明者亦有汗液太泄而傳陽明者傷寒如此痙證亦然惟筋脈強急則為痙證所獨異而要亦未嘗不同曾見燥實之陽明證亦有兩足拘攣不能履地者又有從髀關下經伏兔牽右膝而不伸者要之為大承氣湯證可以悟發汗致痙之大旨矣病者身熱足寒頸項強急惡寒時頭熱面赤目脈赤獨頭動搖卒口噤背反張者痙病也此節前後絶然二證不可以混治身熱足寒頸項強急惡寒為無汗之剛痙屬太陽即金匱所謂葛根湯主之者是也時頭熱至背反張腸胃及筋脈俱燥為痙病最劇之證屬陽明即金匱所謂可與承氣湯者是也中風本先發熱風從上受而不及於下故身熱而足寒頸項強急為風寒襲太陽經絡惡寒者表未解也此葛根湯方治所為寓生津於發汗之中者也若夫胃熱上薰則頭熱而面赤熱邪鬱於腦部則目脈赤血熱挾風循神經上衝顛頂則獨頭動搖牙齦筋脈以液涸而強急故卒口噤燥矢鬱於內筋脈攣於外故背反張此大承氣湯方治所為急下存陰而間不容髮者也太陽病關節疼痛而煩脈沉而細者此名濕痹濕痹之候其人小便不利大便反快但當其小便內經云濕流關節又云濕勝則濡瀉故關節疼痛而煩小便不利大便反快者名曰濕痹痹者閉塞不通之謂痹於外則毛孔塞而汗液不通譬之不毛之地蒸氣內鬱痹於內則下焦壅而小便不利譬之濁穢之淖涓滴不流表氣不達則水氣竄於節骱空隙處筋絡受其浸灌始則痠疼繼則煩熱裏氣不通則三焦水氣與膏液併居阻其腎藏輸尿之上源粘膩而不泄水乃上泛竄入回腸而大便反快脈沉而細者太陽之氣不能外內之明證也師言小便不利大便反快但當利其小便此特據濕痹下焦言之耳若但見關節疼痛而煩則濕痹在腰以上但發其汗即愈此可於風濕相摶節領悟之濕家之為病一身盡疼發熱身色如似熏黃內經云脾藏濕又云脾主肌肉一身盡疼者太陽陽氣不宣肌肉為滋膩之邪所閉塞血分熱度蘊蒸於內則發為表熱而身色如熏黃大便堅小便利者宜桂枝附子湯去桂加朮小便不利者宜麻黃加朮湯已詳陽明繫在太陰條若八九日間濈然汗出者大便必硬宜茵陳蒿湯濕家其人但頭汗出背強欲得被覆向火若下之早則噦胸滿小便不利舌上如胎者以丹田有熱胸中有寒渴欲得水而不能飲口燥煩也濕家之為病外痹於毛孔內痹於下焦前條已詳言之矣痹於毛孔故表汗不泄而但頭汗出痹於下焦積垢淤塞水道而小便不利邪入太陽經輸故背強寒水鬱於毛孔之內故欲得被覆向火此時表寒未解下之太早則太陽寒水內陷胸膈寒濕在裏故厄而胸滿太陽標陽以誤下而陷入膀胱故丹田有熱舌上如苔者以上濕下熱推之必白膩而兼有黃色也熱在下焦蒸氣上薄陽明故渴欲飲水濕在上膈故不能飲口燥而心煩潰潰無奈何之象也此證出於誤下師不立方陳修園以黃連湯補之最為近理鄙意於原方加吳茱萸以止厄似較周密蓋厄為寒厄斷非竹茹橘皮湯所能止也濕家下之額上汗出微喘小便利者死若下利不止者亦死太陰濕證本屬虛寒血分熱度最低所忌陽氣外脫陰液內亡所冀大便溏泄暢適則粘滯之腐穢當去小便一利其病當愈而非太陽將傳陽明上濕下燥者可比若一經誤下無論粘滯之穢物如膠痰粘著腸胃非芒硝大黃一過之力所能盡而下後血熱不能外達或轉致陰陽離決陽上脫則額上汗出微喘小便復利者必死其陽脫而陰復不守也陰氣脫則下利不止而亦死為其回腸旋折之處不復留頓裏陽不能運化水氣而陰氣下絶也問曰風濕相摶一身盡疼痛法當汗出而解值天陰雨不止醫云此可發汗汗之病不愈者何也答曰發其汗汗大出者但風氣去濕氣在是故不愈也若治風濕者發其汗但微微似欲汗出者風濕俱去也太陽之證身疼痛者救表皆宜麻黃湯惟濕證則非一汗所能愈以太陽與太陰同病也故治濕證但有麻黃加朮湯麻黃杏仁甘草薏苡湯表裏同治然後風濕俱去此風濕初病無汗之治法也但方治固宜抉擇寒病向愈亦貴有天陽之助師言值天陰雨不止醫發其汗汗大出風氣去濕氣在故不愈者一以見麻黃湯之不合於風濕一以見發汗之必當其時蓋陰雨不止之時地中水氣上蒸空中水氣下降人體中粘滯不化之濕方且應天時而發故有天將雨而足先癢者亦有當雨而肚腹脹滿者乃又虛其毛孔以為受濕之地開門揖盜是表裏兩受其困也即使風濕並治期病者微汗而解且猶不愈況令汗大泄乎但此特為風濕無汗者言之耳若夫汗出惡風及身體疼煩不能自轉側骨節疼煩掣痛不得屈伸近之則痛劇者金匱另有方治不在此條例濕家病身上疼痛發熱面黃而喘頭痛鼻塞而煩其脈大自能飲食腹中和無病病在頭中寒濕故鼻塞內藥鼻中則愈濕病上半身疼痛雖非一身盡疼者可比要為濕傷肌肉肌肉為絡脈所聚血熱與濕邪相抗因而發熱濕家身色本黃濕在上體故但面黃濕困肌理而傷及肺氣因而喘息頭痛鼻塞而煩腦氣為風濕所阻也脈不沉細而大則證象在表其為當發汗與否尚未可定觀其尚能飲食腹中無病但見頭痛鼻塞即可知為風中於腦吾鄉陳葆厚先生每用細辛薄荷豆蔻研末令病者吸入鼻中時有小效此亦納藥鼻中之意也然此證風中於腦濕凝而氣阻似不如用荊芥防風蔓荊子紫蘇蟬衣等煎湯薰令汗出似較納藥鼻中為勝併附存之病者一身盡疼發熱日晡所劇者此名風濕此病傷於汗出當風或久傷取冷所致也風傷皮毛寒傷肌腠乃病身疼內經所謂形寒飲冷則傷肺者此證是也蓋風寒由表入肌汗液未泄者悉凝聚而成寒濕濕傷肌肉故一身盡疼衛氣外閉營血內抗是生表熱此即前條法當汗出而解之證若疼痛甚者宜桂枝麻黃各半湯若表熱甚者宜桂枝二越婢一湯或用麻黃加朮湯隨證酌劑可也太陽中熱者暍是也其人汗出惡寒身熱而渴也近日市醫動稱伏氣此謬論也夫太陽篇中既明言太陽溫病矣此更言太陽中熱太陽中暍可見六氣外感斷無伏氣可言如內經所言病傷寒而成熱者先夏至為病溫後夏至為病暑不過謂一二日間寒病化熱非謂冬令之傷寒久伏至夏令而化熱也不然傷寒三候陽明脈大失時不治有津液枯竭而死者正恐當夏至前後而墓草荒矣故曰言伏氣者謬也暍之為義從日從渴者謂暴於日中而渴也今有暴於烈日之中燥渴不止者計惟以涼水徐與之使不傷其正氣設有醫者在旁津津而談伏氣則鄉愚皆笑之矣謂明係今日所受之病何醫生善言隔年事也夏令皮毛開泄熱邪直中肌腠肌腠受灼故汗出所以惡寒者皮毛虛而風犯之也身熱而渴汗出則津液少而血分增熱故肌肉俱熱胃汁外散故渴也此證仲景用人參白虎湯與太陽篇渴欲飲水及口燥渴心煩背微惡寒者同法可見本條之惡寒正與太陽篇之微惡寒同明者辨之太陽中暍者身熱疼重而脈微弱此以夏月傷冷水水行皮中所致也有陽熱之中暍有陰寒之中暍太陽中暍固屬熱證至於身熱疼重脈微弱便可決為濕困脾陽脾主肌肉天陽外迫故身熱寒濕壅阻肌理故疼重人身之毛孔一日不死則一日悍氣外泄不能不受水然則師云夏月傷冷水水行皮中所致其旨安在蓋畏熱之人日以涼水浸灌則皮中汗液悉化寒水可知水行皮中者為本體汗液外受涼水所化而非皮毛之可以進水也皮毛無汗陽氣不得外泄肌肉困於水濕血熱被壓故脈微弱仲師於金匱出一物瓜蒂湯歷來注家不知其效用豫治新北門永興隆板箱店顧五郎親見試之時甲子六月也豫甫臨病者臥榻病者默默不語身重不能自轉側診其脈則微弱證情略同太陽中暍獨多一嘔吐考其病因始則飲高梁大醉醉後口渴繼以井水浸香瓜五六枚卒然暈倒因念酒性外發遏以涼水浸瓜涼氣內薄濕乃併入肌腠此與傷冷水水行皮中正復相似豫乃使店友向市中取香瓜蒂四十餘枚煎湯進之入口不吐須臾盡一甌再索再進病者即沉沉睡遍身微汗逮醒而諸恙悉愈矣太陽中暍者發熱惡寒身重而疼痛其脈弦細芤遲小便已灑灑然毛聳手足逆冷小有勞身即熱口開前板齒燥若發汗則惡寒甚加溫針發熱甚數下則淋甚發熱惡寒身重而疼痛小便已灑灑然毛聳手足逆冷全似太陽表寒證所異者脈不見浮緊而見弦細芤遲耳衛虛故弦細營虛故芤遲見此脈者不當汗下全書成例具在不可誣也小有勞身即熱口開前板齒燥則陰虛之的證矣然但憑證象而論惡寒身痛似麻黃證身熱口開前板齒燥似承氣證然衛陽本虛之人發汗則其表益虛故惡寒甚以營陰本虛之人下之則重傷其陰而淋甚以陰虧之人而加溫針故發熱甚此證忌汗下被火與太陽溫病絶相類所不同者營衛兩虛耳故脈證不同如此按此亦人參白虎湯證若西瓜汁梨汁荷葉露銀花露並可用之以解渴也跋余八九歲入孰時家君即酷嗜岐黃家言間為人治病輒著奇效時年甫三十以當時肆力舉業文字未遑問世嗣後南走湖湘北游齊魯行篋中恆以方書自隨未嘗一日暫廢及自濰縣歸家居數載暇即與里中錢性芳朱翔雲馮針若諸先生互相討論以闡發經旨為要務而以劉李張朱之溺於一偏為非是里中時醫聞之多河漢其言而不之信以是不洽於衆口道尼不行歲己未懸壺於滬上以利濟世人疾若為事亦不屑屑於診金之多寡以是貧病者咸感賴之嗣是孟河丁甘先生復聘主廣益中醫專門學校講席授課益肆力於醫於傷寒金匱二書尤多所論著於經文之錯誤多所改正不取前人之望文生訓庚午年始成傷寒發微一書命男及吳縣門人陳道南分任鈔寫稿藏於家今年春始託丁君濟華擔任剞劂而校正文字之役則囑沈君石頑二君皆曾受學於家君者故尤服膺師說昔漢人治經貴重師承故兩漢經生多以經術名世若二君者其亦有漢人之遺意乎余不文樂二君之相與有成而家君之書行將傳世也爰略書數語於後以志其梗概云辛未五月端節後二日男錫嘉謹跋金匱發微藏府經絡先後病脈證第一問曰上工治未病何也師曰夫治未病者見肝之病知肝傳脾當先實脾四季脾王不受邪即勿補之中工不曉相傳見肝之病不解實脾惟治肝也夫肝之病補用酸助用焦苦益用甘味之藥以調之肝虛則用此法實則不任用之經曰無實實無虛虛補不足損有餘是其義也餘藏準此此節借肝病傳脾以明上工治未病之說也肝藏血虛則其葉燥挺而壓於脾脾氣鬱則痛延腹部遂有腹中急痛之證傷寒論云陽脈急陰脈弦腹中急痛先豫小建中湯蓋桂枝湯其味本甘加飴糖則其味益甘內經所謂肝苦急急食甘以緩之即實脾之說也脾王不必泥四季但濕土當旺之時即是長夏用小建中即病脹悶故曰勿補中工不知因肝藏血虛之故而用甘味以實脾而以小建中湯為治肝補脾不二法門則大誤矣蓋肝之本味酸而中含有膽液則苦肝與胃同居膈下而胃實為生血之原肝膽之液滲入胃中並能消食寒則吐酸肝之液也熱則吐苦膽之液也要之為胃氣不和胃氣不和則無以資肝藏之血且濕勝則肝膽不調故多嘔濕之所聚蛔病乃作然則所謂補用酸助用焦苦者以烏梅丸言之也但焦苦當言苦溫以烏梅之酸合細辛乾薑蜀椒桂枝附子之溫及黃連黃柏之苦燥而後胃溫濕化肝膽之鬱方得條達更有胃中虛寒乾嘔吐涎沫則專用苦溫之吳茱萸湯而不用酸以補之者此證寒濕初起肝藏未虛故但需助胃陽而止嘔也若夫益用甘味以調之者乃專指建中湯言之以上三法皆為肝虛而設凡病虛則生寒實則生熱故有肝乘脾肝乘肺而刺期門者亦有厥深熱深而當下者亦有肝實血熱熱利下重而用白頭翁湯者若不問虛實而概用建中湯以治肝補脾不病脹悶即病煩躁故曰不任用之無實實無虛虛補不足損有餘當是古內經文見扁鵲難經酸入肝至要妙也一段述中工謬論不著緊要特刪去之從黃坤載懸解例也夫人稟五常因風氣而生長風氣雖能生萬物亦能害萬物如水能載舟亦能覆舟若五藏元真通暢人即安和客氣邪風中人多死千般疢難不越三條一者皮膚所中經絡受邪內入藏府為外所因也二者四肢九竅血脈相傳壅塞不通為所內因也三者房室金刃蟲獸所傷以此詳之病由都盡若人能養慎不令邪風干忤經絡適中經絡未流傳府藏即醫治之四肢才覺重滯即導引吐納針灸膏摩勿令九竅閉塞更能無犯王法禽獸災傷房室勿令竭乏服食節其冷熱酸苦甘辛不遺形體有衰病則無由入其腠理腠者是三焦通會元真之處理者是皮膚藏府之文理也許半龍曰從經絡傳藏府當為外因血脈壅塞不通為內因原本倒誤今從其說校正人稟五常不過言人之稟五德耳淺注謂日在五氣之中非也玩以下方說到風氣便知所謂因風氣而生長者人得風中空氣則精神爽健然必清晨吸受方為有益故昔人多有吹卯風而得大壽者然亦不可太過過則為病譬如今人多喜吸受空氣甚至天寒地凍夜中開窗眠睡有不病傷寒者乎此即風氣生萬物亦能害萬物之說也是何異水能載舟亦能覆舟乎要惟本體強者乃能無病故藏府元氣充足呼息調暢然後眠食安而營衛和若外來之客氣邪風亦當思患預防否則中人多死假如風中皮毛肌腠則病傷寒中風風中於筋則病筋拘攣風中府藏即口噤不識人風中於頭則顛眩或疼痛或口眼不正風中於體則半身不遂是謂邪風且風為百病長合於燥則病燥合於濕則病濕合於寒則病寒合於暑則病暑是謂客氣然治之得法猶有不死者若夫疫癘之氣暴疾之風中人往往致死此節為全書大綱故特舉外因內因不外不內因三條以為之冠六氣之病起於皮毛肌腠故善治病者治皮毛其次治肌膚今以皮毛肌腠不固邪中經絡而入主藏府是為外因四肢九竅血脈相傳脾胃主四肢中陽不運風濕困於四肢則四肢為之不舉肝開竅於目而資於腎腎陰耗而膽火盛則目為之昏腎開竅於耳而資於腦腦氣虧而膽火張則耳為之聾肺開竅於鼻風邪襲肺則鼻中不聞香臭胃開竅於舌胃中宿食不化則口中不知五味胃與大小腸下竅在肛門腸胃燥則大便閉三焦下竅在膀胱濕痰阻其水道則小溲不利陽熱結於膀胱則小溲亦為之不利是謂內因若夫房室之傷則病內熱惑蠱金刃之傷緩則潰爛急則病破傷風蟲獸之傷毒血凝瘀甚則走竄周身而死金刃初傷用小薊葉打爛塗之不致出血太過毒蛇咬傷用壁蝨入麵醬內搗塗即愈瘋犬咬傷血必走竄大腸凝結成塊久則發狂宜抵當湯下之是為不內不外因即此三因推之全書大綱略盡於此凡此者惟預為防範者能免之才中皮毛肌腠即用麻黃桂枝二湯以發之然後病機不傳經絡即傳經絡未及藏府即用葛根湯以發之則外因之內陷者寡矣血脈不流通則四肢為之重滯然當甫覺重滯或用八段錦十二段錦法使筋節舒展或吸氣納於丹田而徐噓散之使周身血分水分隨之運行甚或濕壅關節時作痠痛則針灸以通陽氣膏摩以破壅滯則內因閉塞九竅者寡矣然猶必安本分以避刑辟遠山林以避蛇虎遠牀第以保精髓節衣服之寒暖節五味之過當務令營衛調適內外強固六淫之邪乃無由入其腠理則病之成於不內不外因者又寡矣所謂腠理者人身肌肉方斜長短大小不等之塊湊合而成湊合處之大隙即謂之腠肌肉并衆絲而成塊衆絲之小隙即謂之理胸中淋巴系統發出之乳糜水液出肌腠而成汗故曰通會元真元真者固有之元氣真氣血分中營陰及之水分中衛陽亦及之故曰通會文理即合併成塊之肉絲不獨肌肉有之即胃與小腸大腸並有之各具淋巴微管發出水液故仲師連類及之耳其實病氣之始入原不關乎內藏也問曰病人有氣色見於面部願聞其說師曰鼻頭色青腹中痛苦冷者死鼻頭色微黑者有水氣色黃者胸上有寒色白者亡血也設微赤非時者死其目正圓者痙不治又色青為痛色黑為勞色赤為風色黃者便難色鮮明者有留飲氣色之見於面部者無病之人亦有之借如夏令行烈日中則面赤暴受驚恐則色白此其易知者也明乎此乃可推病之人氣色曰鼻頭色青腹中痛者鼻頭鼻之上部盡頭處非鼻準之謂相家謂之印堂醫家謂之闕下小兒下利印堂多見青色腹痛不言可知下利手足逆冷為獨陰無陽故曰苦冷者死濕家身色薰黃者黃中見黑色也今印堂微見黑故知其有水氣濕病屬脾藏脾統血血中有黃色之液濕勝而血負病在營故其色黃黑相雜水氣屬三焦腎與膀胱病在衛故印堂微黑胸中為飲食入胃發生水液之處其水液由脾陽生發中醫謂之中焦西醫謂之淋巴系統胸中有寒是病留飲故萎黃見於印堂血不華色則白故亡血者色白人飲酒則面有赤色行日中及向火並同為其血熱內盛陽氣外浮也傷寒陰寒內據真陽外脫則亦面見赤色是謂戴陽此證多屬冬令故曰非時者死謂非夏令血熱張發之候也按寒飲之色黃失血之色白或全見面部戴陽之赤色或見額上及兩顴不定在鼻之上部故無鼻頭字非省文也面色既辨然又必驗之於目剛痙無汗周身筋脈緊張故目系強急而目正圓此證脈必直上下行內經所謂但弦無胃也故曰不治目色青少年婦人時有之或不必因病而見然往往有肝鬱乘脾而腹中急痛若夫色黑為勞與女勞疸額上黑同凡人目中瞳人則黑其外微黃惟女勞則瞳人外圈俱黑吾鄉錢茂材信芳診宋姓病斷其必死不三月果死豫問故錢曰女勞目之外眶盡黑法在必死蓋瞳人精散外溢如卵黃之忽散臭敗隨之矣風邪中於頭則入於目而目脈赤荊芥防風蟬衣殭蟲等味薰洗足以愈之仲師固無方治也色黃便難是謂穀疸宜茵陳蒿湯惟鮮明有留飲當指目鮮澤者及目下有臥蠶形者言之若專以目論則巧媚之婦人固自有明眸善睞者何嘗病留飲乎師曰病人語聲寂寂然喜驚呼者骨節間病語聲喑喑然不徹者心膈間病語聲啾啾然細而長者頭中痛無病之人語聲如平時雖高下疾徐不同決無特異之處寒濕在骨節間發為痠痛故怠於語言而聲寂寂轉側則劇痛故喜驚呼心膈間為肺濕痰阻肺竅故語聲喑喑然不徹頭痛者出言大則腦痛欲裂故語聲喑喑然細而長不敢高聲語也師曰息搖肩者心中堅息引胸中上氣者咳息張口短氣者肺痿吐沫此條心中堅當為心下堅之誤痰飲留於膈間則心下堅滿痰飲篇所謂雖利心下續堅滿膈間支飲其人喘滿心下痞堅寒疝篇脈緊大而弦者必心下堅則此云息搖肩心中堅者其必為心下堅之誤無疑心為君主之藏不能容納外邪惟心下為膈與胃相逼處痰濕流於膈間則氣為之阻而氣不順至於兩肩用力搖動則心下之堅滿可知矣此為濕痰凝固之證所謂宜十棗湯者也至於息引胸中上氣而咳即後文咳而上氣之證吐黃濁者宜皂莢丸有水痰者宜射於麻黃湯張口短氣者肺痿吐沫即後篇所謂肺痿之證以上三者皆出於主氣之肺辨息至為切近故類及之師曰吸而微數其病在中焦實也當下之則愈虛者不治在上焦者其吸促在下焦者其吸遠此皆難治呼吸動搖振振不治息由丹田上出肺竅是為呼由肺竅下入丹田是為吸呼吸略無阻礙乃為無病之人惟中脘宿食不化則吸入之氣至中脘而還不能下入丹田故出納轉數下之則上下通徹略無窒礙此大承氣湯所以為承接中氣之用也然有本為大承氣證始病失下病久精氣耗損腸胃枯燥而死者即有久病虛羸一下正隨邪惡盡以致虛脫而死者因此後醫失誤轉授前醫以為口實而硝黃遂成禁例然則仲師言虛者不治為法當早下言之非為見死不救之庸工言之也大下後食復同此例若夫肺虛而吸氣乏力故吸促腎虛而納氣無權故吸遠促者上焦不容遠者下焦不攝故曰難治其不曰不治而曰難治者肺癰肺痿肺脹及膈間有留飲其吸皆促為其有所阻也亡血失精其吸皆遠為其不相引也數者皆有方治而愈期正不可知故曰難治至於呼吸動搖振振其人必大肉痿陷大骨枯槁午後微熱死在旦夕雖使扁鵲復生無能為役矣師曰寸口脈動者因其王時而動四時各隨其色非其時色脈皆當病此寸口以兩手六部言之凡脈之大小視血分熱度之高下血分之熱度又以天時之寒暖為盈朒天時至春而疏達則其脈調暢夏而張發則其脈盛大秋而收束則其脈斂抑冬而閉藏則其脈沉潛所謂因王時而動也夏令天氣炎熱血分熱度既高甚有面色及掌心發紅色者亦有八九月間天氣漸寒紅色漸變為白色者此固因於血熱之高低非可以五色配四時也不然春日肝王冬日水王曾未見有春日色青冬日色黑者五色配四時之謬固已不攻自破然則四時各隨其色亦不過分赤白二色以見血熱之高低耳非其時色者皆當病直以天時溫暖血不華色營氣不充脈絡言之亦以天時苦寒血熱暴張面赤脈洪者言之然則假令肝王色青及肝色青而反白二語皆當刪去此必非仲師之言或由門人襲內經東方生木節意而附會之不可為訓問曰有未至而至有至而不至有至而不去有至而太過何謂也師曰冬至之後甲子夜半少陽起少陽之時陽始生天得溫和此為未至而至也以得甲子而天未溫和者此為至而不至也以得甲子而天大寒不解此為至而不去也以得甲子而天溫如盛夏五六月時此為至而太過也此一節論天時氣陽之愆伏愆太過也伏不足也以見病氣所由受未至而至數語當是古醫家言師特借冬至後甲子以起例古者十一月甲子朔夜半冬至為歷元則冬至後甲子當在正月曰夜半少陽起者不過略言陽氣初回內經所謂春三月發陳之期也當此期內地氣方得溫和春未至而地氣轉陽故曰未至而至皮毛早開風邪易襲多桂枝證若時令當溫不溫即為至而不至設當春令陽回之時而天氣忽然大寒春行冬令是謂至而不去皮毛未開寒邪中之多麻黃證若春氣方回忽然大熱如盛夏五六月春令夏行是謂至而太過汗液大泄津液早虧多人參白虎證四氣之轉移莫不皆然此特一隅之舉耳得甲子不過陳述故訓勿泥師曰病人脈浮者在前其病在表浮者在後其病在裏腰痛背強不能行必短氣而極也浮在前當病表實以麻桂二湯發之固已一汗而愈若浮在後則裏虛血不充脈發其汗則裏液益虛以致不能行短氣而竭其不死者幾希考其致死之原皆因醫家見其脈浮以為表實而強為發汗不知浮在後不當發汗也脈浮在前是通關前後言之是謂表實在後是指關後獨浮言之浮在關後而不及關前則脈管中血液不足可知脈浮病在表為麻黃桂枝二湯證若浮不及關以上則血分本虛而不當發汗此即淋家不可發汗失精家不可發汗之意太陽之裏屬少陰脈之浮屬太陽不見微細病固無內傳少陰之理然太陽之脈夾脊抵腰中即謂之裏可也脊為督脈經隧腰實少陰之藏腎與膀胱為表裏自腰以下有兩管注小溲於膀胱中醫謂之下焦西醫謂之輸尿管即為其病在裏亦可也陰虛之人強責其汗勢必牽涉於腎腰痠背強猶為太陽本病至於陰寒精自出脧削不能行則水之上源因發汗而竭而下流亦涸矣短氣而竭是者則以腎虛不能納氣故也況陰虛必生內熱內熱薰灼至於骨痿髓枯焉有不死者乎問曰經云厥陽獨行何謂也師曰此為有陽無陰故稱厥陽油燈將滅火必大明膏油竭於下則光氣脫於上是故虛勞不足之人日晡有微熱甚者入夜壯熱至有喉痹口燥而爛赤者此火如煤油如火酒救之以水則熛焰益張撲之以灰則息矣故昔人有甘溫清熱之法內經所謂勞者溫之也然補血養陰正不可少若油燈之添油者然但恐不能不受重劑耳倘更投以寒涼焉有不死者乎問曰寸脈沉大而滑沉則為實滑則為氣實氣相摶血氣入藏即死入府即愈此為卒厥何謂也師曰唇口青身冷為入藏即死如身和汗自出為入府即愈大氣挾血併而上逆則寸口見沉大而滑之脈但舉寸口則關後無脈可知氣血菀於上衝動腦氣一進昏暈而為暴厥血逆行而入於腦則血絡暴裂死故唇口青青者血凝而死色見也若衝激不甚血隨氣還身和汗出而愈矣須知入藏入府為假設之詞觀下文在外入裏可知不然氣血併而上逆方冀其下行為順豈有入藏即死入府即愈之理門人章次公言入藏為腦充血腦膜為熱血衝破一時血凝氣脫故唇口青身冷者死腦固藏而不瀉也入府為氣還三焦脈絡散入肌腠皮毛故身和汗出者生三焦固瀉而不藏也此與內經所謂氣與血併走於上則為大厥厥則暴死氣復還則生不還則死其義正同否則既云併走於上矣內經雖未明言腦而其旨甚明尤在涇猶強指為腔內之五藏通乎否乎章說較鄙人為詳盡故並存之問曰脈脫入藏即死入府即愈何也師曰非為一病百病皆然譬如浸淫瘡從口起流向四肢者可治從四肢流來入口者不可治病在外者可治入裏者難治上節獨言寸口則有上無下脈垂脫矣則此云脈脫當指無脈言之陳修園以為脫換之脫非也按傷寒論云利厥無脈服白通湯加豬膽汁脈微續者生暴出者死微續者胃氣尚存故曰入府即愈暴出者真藏脈見故曰入藏即死非為一病下特推廣言之譬之浸淫瘡濕熱兼毒之皮膚證也天痘潰爛入口者死廣瘡入口者死若小兒天泡瘡黃水瘡未見有從四肢流入口者蓋亦外病流脂水者通名浸淫耳病在外者可治入裏即死以傷寒病論則三陽可治三陰難治以癰疽言則腫痛色紅者可治平陷色白不甚痛者難治故師言百病皆然也問曰陽病十八何謂也師曰頭痛項腰脊臂腳掣痛陰病十八何謂也師曰咳上氣喘噦咽腸鳴脹滿心痛拘急五藏病各有十八合為九十病人又有六微微有十八病合為一百八病五勞七傷六極婦人三十六病不在其中清邪居上濁邪居下大邪惡中表小邪中裏穀飥之邪從口入者宿食也五邪中人各有法度風中於前寒中於後濕傷於下霧傷於上風令脈浮寒令脈急霧傷皮腠濕流關節食傷脾胃極寒傷經極熱傷絡治病以明理為先務設病理不明死守成方則同一病證且有宜於彼而不宜此者則陽病十八一節當是為拘守成方治病者言之然變證雖多豈可拘於十八之數陽病十八陰病十八五藏病各有十八六微復有十八病令學者於此惛無所得若涉大川不見津涯卒致臨證不敢用藥倣徨歧路不知所歸此亦仲師之過也惟善讀書者正不當以辭害意今姑就所舉之病名而釋之疑者闕焉病在外體為陽寒邪襲表體溫鬱而不達則陽熱上衝而病頭痛風中於腦鬱而不達則病頭痛腸胃不通燥氣上入於腦則病頭痛痎瘧發熱血氣上入於腦則病頭痛又有氣挾熱血菀而犯腦則亦病頭痛頭痛同而所以為頭痛者不同項為太陽經脈出腦下行之路風寒外束熱血抵抗脹脈奮興項因強痛寒凝太陽之脈發為腦疽則項亦強痛項之強痛同而所以強痛者不同腰為少陰寒水之藏下接輸尿管而輸入膀胱寒濕內阻三焦水道不通則病腰痛強力舉重氣阻脅下則病腰痛汗出著冷久為腎著則腰下冷痛腰痛同而所以為腰痛者不同太陽經絡夾脊抵腰中而脊髓則為督脈寒襲於表經絡不舒則背脊痛強力入房傷其督脈則背脊亦痛脊痛同而所以為脊痛者不同四肢者諸陽之本濕流關節則臂腳掣痛風中四末四肢不用則臂腳亦掣痛血不養筋筋絡強急則臂腳亦掣痛此外復有肢節疼痛腳腫如脫之歷節陽明燥實傷及支脈右髀牽掣膝外廉而痛寒濕流筋髀肉內痛掣痛同所以掣痛者不同復有腳氣腫痛者痛而腹中麻木屬血分宜四物加生附牛膝防己吳萸木瓜以治之腹中急痛者屬氣分宜雞鳴散以治之又有血絡不通腳攣急者宜芍藥甘草湯以治之有腸燥傷筋而腳攣急者宜大承氣以治之此又腳病之不同也然則陽病十八舉多數而言之也病在內藏為陰風傷於肺則咳膈間支飲則咳腸中燥氣犯肺則咳咳固不必同也膠痰在中脘不能一時傾吐則上氣水痰在心下陽氣欲升不得則上氣上氣固不同也寒縛表陽外不得汗則喘元氣下虛腎不納氣則喘喘固不必同也厄逆之證有屬胃氣虛寒者有屬大腸腑滯不行及膀胱小溲不利者則噦固不同也咽當為噎老年之人血氣並虧有食未入胃梗於胸膈而不下者又有噎膈之證既入於胃梗塞而不下者是噎又不同也水濕入腸下利不止則病腸鳴痰飲為病水入腸間則亦腸鳴虛勞之人亦復腸鳴是腸鳴又不同也太陰寒濕則腹中脹滿虛氣停阻則腹中脹滿水結膀胱則少腹脹滿宿食不化則腹中脹滿血結胞門則少腹脹痛是脹滿又不同也久事傴僂胸中陽氣否塞則心痛徹背陰寒凝結胸膈則亦心痛徹背背痛徹心是心痛又不同也虛勞之人輸尿管不通小便不利而腰痛者小腹為之拘急下後發汗津液虧耗則筋脈為之拘急是拘急又不同也然則陰病十八亦舉多數言之也若夫五臟之病散見內經及元化中藏經者不勝枚舉第就本書著録者言之曰肺痿曰肺癰曰肺脹曰肺中風曰肺中寒曰肺飲曰肺水此肺病之可知者也曰肝中風曰肝中寒曰肝著曰肝乘脾曰肝乘肺曰肝虛曰肝實此肝病之可知者也曰心中風曰心中寒曰心中痛曰心下痞曰心下悸曰心煩曰心傷此心病之可知者也曰脾中風曰脾約曰脾水此脾病之可知者也曰腎著曰水在腎曰奔豚此腎病之可知者也穀疸宿食嘔吐噦反胃消渴不能食食已即吐胃病也腸壅下利清穀不大便圊膿血腸病也脅下痛小便不利遺溺三焦病也寒則下重便血熱則為痔小腸病也嘔吐口苦耳聾下利純青膽病也膀胱無專病時與三焦相出入此六府病之可知者也然則五藏病各有十八合為九十微有十八病合為一百八病要不過示人病出一經寒熱虛實之不同者居其多數不當泥成法以為治耳不然病之變證多端一切以十八限之而謂絶無增減有是理乎據後文五勞七傷六極婦人三十六病不在其中便可識立言之旨在多數而不在定數自此以下略為疏析病源風露中人挾高寒之氣故清邪居上濕熱蘊蒸挾地中水氣而出故濁邪居下六氣中人起於皮毛故大邪中表氣體先虛邪乃乘之故小邪中裏漀即穀字傳寫者誤作漀耳飪尤本作飥餅也漀飥之邪從口入者為宿食胃中膽汁胰液不足消化之力薄也曰五邪中人各有法度謂邪之中人各不可變易之處風為陽邪巳至未上為陽氣方盛故風中於前寒為陰邪申至戌上為陰風始出故寒中於暮濕從地升故中於下足先受也霧散空中故中於上頭先受也風脈浮緩其表疏也寒脈浮急其表實也霧傷皮腠乃生癬疥濕流關節因病歷節食傷脾胃是病腹痛極寒傷經項背斯痛極熱傷絡不病吐衄即圊膿血可以識辨證之大綱矣問曰病有急當救裏救表者何謂也師曰病醫下之續得下利清穀不止身體疼痛者急當救裏後身疼痛清便自調者急當救表也此下二節皆以治病緩急言之治病大法固當先表後裏如傷寒論太陽未罷陽明化燥先其表後攻其裏此其常也若夫太陽失表一經誤下汗反入裏遂有水激中脘直走小腸大腸至於完穀不化者此時水寒濕陷中陽垂絶危在須臾雖有身痛當汗之太陽表證正當置為後圖而急溫其裏譬之侍疾之人忽聞爨下失火勢必坌息往救彼其心非不愛病者有急於此者也若內藏無病但有身疼痛之表證則一汗可以立愈不煩再計矣此條見傷寒論夫病痼疾加以卒病當先治其卒病後乃治其痼疾也病之暴起者易變而痼疾則無變變則加劇不變則固無害也故曰先治卒病卒病者傷寒也雖然痰飲痼疾也感於表寒而病可用小青龍湯以汗之膈間支飲痼疾也傷寒胃家實可用大陷胸湯以下之然則痼疾卒病何嘗不可同治乎善治病者可以觀其通矣師曰五藏病各有所得者愈五臟病各有所惡各隨其所不喜者為病得古作合解韻會與人契合曰相得五藏病各有所得者愈以五味為最近本篇首節舉例甚明肝虛者補用酸故厥陰病之烏梅丸以烏梅為君肝虛乘脾則腹中急痛急痛者肝葉燥而壓於脾脾氣不舒痛延腹部因用甘味之藥以實脾故小建中湯方治以飴糖為君苦入心故瀉心湯降逆方治以黃連為君辛入肺故十棗湯瀉痰泄水方治以芫花為君近人以芥菜滷治肺癰白芥子治痰飲同此例鹹入腎故小便不利之蒲灰散以蒲灰為君此即水中菖蒲燒灰近人以為蒲黃則誤茯苓戎鹽湯治小便不利亦此意也此五藏之病各有所得而愈之大略也肺惡寒而主皮毛寒由皮毛犯肺則病傷寒汗出不徹水在膈間即病喘咳脾惡濕而主肌肉外風凝沍肌腠因病中風留著不去滲入關節因病歷節濕與水氣併居留於中脘即病痰飲下陷大腸即病下利泛濫充塞即病水腫心惡燥亦惡水膽胃燥氣上薄心藏則心氣不足而病吐血衄血是為瀉心湯證水氣淩心則心下悸是為小青龍湯證肝惡燥燥則膽火盛而病消渴肝惡拂鬱有所逆則乘脾而腹中急痛肝又惡濕濕勝而血敗穢濁所聚蛔病乃作腎惡寒水寒則血敗因病下血腎又惡燥藏燥則精竭筋脈不舒因病痿躄此五藏各有所惡之大略也脾喜燥而惡濕多飲茶酒則病濕痰多臥濕地則病風痹肺喜溫而惡寒形寒飲冷則病寒飲風寒襲肺皮毛不開則病風濕腎喜溫而惡水水停脅下則小便不利不病腹滿即病腰痛肝喜涼而惡熱血虛生燥則病善怒氣上撞心心為君主之藏無所謂喜亦無所謂惡其偶亦有病亦不過他藏所牽及耳心喜靜而惡煩人人皆然但不在病情之中故不述血熱傷絡則便膿血此則五藏之氣隨其所不喜為病之大略也要而言之脾藏濕故惡濕肺藏涼故惡寒心藏熱故惡熱腎藏多水故惡水肝藏合膽火生燥故惡燥此藏氣有餘而為病者也然發汗太過脾精不濡痙病乃作腸胃燥實肺熱葉焦乃生痿躄心陽不振則脈變結代腎寒精冷令人無子肝藏血寒則病厥逆然則藏氣不足又何嘗不為病乎究之治病當求其本斷無成跡之可拘讀金匱者亦觀其通焉可耳病者素不應食而反暴思之必發熱也此三句當別為一節古本與五藏病混而為一以致不可解說陳修園以為藏氣為病氣所變直臆說耳夫曰素不應食原非素不喜食為始病本不欲食者言之耳此證或出於病後或出於病之將愈蓋病氣之吉凶原以胃氣之有無為驗病固有表裏證悉去始終不能納穀以致於死者此固有胃則生無胃則死之明證也但胃氣之轉為病者生機與脈伏之復出同脈暴出者死漸起者生故胃氣之轉亦以漸和為向愈暴發為太過夫胃主肌肉常人過時忍飢則瑟瑟惡寒至飽食之後肢體乃漸見溫和故厥陰篇有厥利欲食食以素餅而發熱者即為不死之徵但病後胃火太甚即有急欲得食食已即發壯熱而病食復者豫於家人見之亦有陽明燥熱飽食之後以致纍日不大便一發熱而手足拘攣者豫於沈松濤見之此仲師勞復篇中所以用博棋大五六枚之大黃內經治痿所以獨取陽明也夫諸病在藏此藏字當作藏匿之藏解謂病藏匿在裏也非指五藏學者其勿誤欲攻之當隨其所得而攻之如渴者與豬苓湯餘皆倣此豬苓湯方見傷寒論陽明篇又見後消渴證中以豬苓之利濕所以通其小便以阿膠之滋陰所以解其渴此豬苓湯所以為利小便而兼解其渴之神方也攻其實而補其虛惟仲師能深知其內情諸病在藏為裏證別於皮毛肌腠筋絡言之非謂五臟也此節表明因勢利導之治法特借渴者與豬苓湯以起例蓋下利則傷津液而渴加以小便不利水氣在下是當以利小便為急然又恐甚其渴與豬苓湯則既解其渴又利小便此一舉兩得之術也如傷寒轉矢氣及宿食下利脈滑可用大承氣亦此例也痙濕暍病脈證治第二太陽病發熱無汗惡寒者名曰剛痙太陽病發熱汗出而不惡寒名曰柔痙此二條說解詳傷寒發微風寒外薄血熱內張正與邪相爭故名剛痙汗出表疏正氣柔弱不與邪爭故名柔痙太陽病發熱脈沉而細者名曰痙為難治此條見傷寒論蓋痙為津液枯燥之證衛氣不和於表故發熱營氣不足於裏故脈沉細發熱為標陽脈沉細則為本寒裏氣不溫則水寒不能化氣是當用栝蔞桂枝以解表加熟附以溫裏釋詳傷寒發微茲不贅太陽病發汗太多因致痙此條見傷寒論釋解具詳傷寒發微茲不贅夫風病下之則痙復發汗必拘急風病陳修園以為發熱有汗之桂枝湯證是不然太陽病固自有先下之不愈因復發汗表裏俱虛其人因致冒終以自汗解者亦有下後氣上衝而仍宜桂枝湯者亦有誤下成痞誤下成結胸者獨發汗致痙之證為中風所希見則所謂風病者其為風溫無疑夫風溫為病其受病與中風同所以別於中風者獨在陰液之不足故脈浮自汗心煩腳攣急者不可與桂枝湯得湯便厥所以然者為其表陽外浮裏陰內虛陰不抱陽一經發汗中陽易於散亡也但此猶為證變未甚也更有脈陰陽俱浮自汗出身重息鼾言語難出之證一經誤下即見小便不利直視失溲若火劫發汗則瘈瘲如驚癇所以然者裏陰素虧誤下則在上之津液下奪目系因之不濡火劫則在裏之津液外爍筋脈因之不濡津液本自不足又從而耗損之風燥乃益無所制故上自目系下及四肢無不拘急而痙病成矣不然本篇汗出發熱不惡寒之柔痙與傷寒溫病條之不惡寒何其不謀而合乎是知中風一證津液充足者雖誤汗誤下未必成痙惟津液本虛者乃不免於痙也瘡家雖身疼痛不可發汗汗出則痙此條見傷寒太陽篇蓋人之汗液由衛氣外出者屬水分由營氣外出者屬血分身疼痛原係寒凝肌腠急當發汗以救表惟瘡家營分素虧一經發汗血液重傷至於不能養筋一身為之拘急是亦投鼠不忌器之過也夫病至無可措手要當用藥薰洗使邪從外解而不當任其疼痛如浮萍藁本荊芥薄荷防風等味俱可煎湯薰洗但使略有微汗疼痛當止語詳傷寒發微病者身熱足寒頸項強急惡寒時頭熱面赤目赤獨頭動搖卒口噤背反張者痙病也若發其汗其脈如蛇此條見傷寒論本篇而佚其後半節身熱至惡寒為葛根湯證時頭熱至背反張為大承氣湯證語詳傷寒發微惟發其汗下當有衍文痙病之未成原有屬於太陽而當發汗者惟已傳陽明燥氣用事一經發汗即當見經脈強急不當有寒濕相得其表益虛惡寒益甚之變數語似屬濕證脫文不知者誤列於此陳修園明知陽邪用事熱甚灼筋不當惡寒猶為之含混強解此亦泥古之過也愚按若發其汗其脈如蛇獨承上時頭熱面赤以下言之非承上身熱足寒證言之也內經云肝主筋肝藏血虛生燥則其脈弦急後文所謂直上下行是也發其汗其脈如蛇乃肝之真藏脈見五藏風寒積聚篇所謂肝死脈浮之弱按之如索不來或曲如蛇行者死是也蓋痙病脈本弦急重發汗則經脈益燥直上下行之弦脈一變而成屈曲難伸之狀脈固如此筋亦宜然一身之拘急可知矣黃坤載以為即直上下行非是暴腹脹大者為欲解脈如故及伏弦者痙此節承上節言之脈如故即上之其脈如蛇也夫痙脈按之緊如弦直上下行痙病之成始於太陽而傳於陽明太陽水氣受陽明燥化陰液消爍筋脈乃燥但陽明不從標本而從中氣容有一轉而入太陰者傷寒太陽篇發汗後腹脹滿厚朴生薑半夏甘草人參湯主之即此證也痙病本由血少統血之脾藏當虛而復以發汗張其虛氣病乃轉入太陰而腹部虛脹病機由表入裏筋脈不更受灼故為欲解惟下文脈如故反伏弦則殊不可通沉弦則非曲如蛇行矣何得云如故耶按此反字當為及字傳寫之誤也脈如故即上節曲如蛇行之謂沉弦即下節直上下行其所以屈曲如蛇者為其脈中營氣不足汗後陽氣暴張氣欲行而血不從也所以直上下行者為血分熱度增高脈道流行暴張而不和也夫血少則筋燥懸生物之筋於風中可證也熱血灼筋則筋亦暴縮投生物之肉於沸油中可證也故痙病之作由於筋之受灼驗之於脈無不可知血虛固傷筋血熱亦傷筋也痙病有灸瘡難治痙病為風燥傷筋之證血虛不能養筋而復加以灸瘡使其證屬中風傳來則當用栝蔞根以生津桂枝湯以發汗然又恐犯瘡家發汗之戒故云難治但裏急於外又不當先治灸瘡竊意先用芍藥甘草加生地以舒筋加黃耆防風以散風外用壙灰年久者調桐油以清熱毒而生肌其病當愈陳修園淺注謂借用風引湯去桂枝乾薑一半研末煮服往往獲效蓋此方主清熱祛風揆之於裏當自可用太陽病其證備身體強几几然脈反沉遲此為痙栝蔞桂枝湯主之栝蔞桂枝湯方栝蔞根二兩桂枝三兩芍藥三兩甘草二兩生薑三兩大棗十二枚上六味以水九升煮取三升分溫三服微汗汗不出食頃啜熱粥發之太陽病其證備則頸項強痛發熱自汗惡風之證也身體強几几背強急而不能舒展邪陷太陽經輸也自非將成痙證則有汗之中風脈宜浮緩而不宜沉遲夫痙脈伏弦沉即為伏遲為營氣不足此正與太陽篇無血尺中遲者同例血不養筋而見沉伏之痙脈故以培養津液為主而君栝蔞根仍從太陽中風之桂枝湯以宣脾陽而達營分使衛與營和汗出熱清筋得所養而柔痙可以不作矣太陽病無汗而小便反少氣上衝胸口噤不得語欲作剛痙葛根湯主之葛根湯方葛根四兩麻黃三兩去節桂枝甘草炙芍藥各二兩生薑三兩大棗十二枚上七味以水一斗先煮麻黃葛根減三升去沫內諸藥煮取三升去滓溫服一升覆取微似汗不須啜粥餘如桂枝湯法將息及禁忌太陽病無汗小便反少氣上衝此與太陽篇下後氣上衝可與桂枝湯如前法同惟筋脈強急牙關緊而見口噤風痰阻塞會厭而不得語實為剛痙見端以氣上衝而用桂枝此為太陽中風正治法惟本證為風寒兩感寒沍皮毛內阻肺氣故外見無汗內則會厭隔阻故本方於桂枝湯加麻黃期於肌表雙解太陽經輸在背邪陷經輸久鬱生燥於是有背反張臥不著席之變故於肌表雙解外復加葛根從經輸達邪外出而剛痙可以立解所謂上工治未病也按此方本為太陽標熱下陷經輸而設故加清熱潤燥上升之葛根於背強痛者宜之推原痙病所由成以外風陷入太陽為標準無論剛痙柔痙一也柔痙起於中風故用栝蔞桂枝湯栝蔞蔓生上行主清經絡之熱功用與葛根同剛痙之成起於風寒兩感故用葛根湯蓋非風不能生燥非風竄經輸必不成痙可以識立方之旨矣痙為病胸滿口噤臥不著席腳攣急必齘齒可與大承氣湯大承氣湯方大黃四兩酒洗厚朴半斤炙去皮枳實五枚炙芒硝三合上四味以水一斗先煮枳朴取五升去滓內大黃煮二升內芒硝更上微火一兩沸分溫再服得下利餘勿服風燥入陽明之府津液受灼上膈乃有濕痰痰阻胸膈則胸滿風痰塞會厭而陽熱上灼牙關之筋燥急則口噤背脊經輸乾燥則臥不著席周身筋脈液乾而縮故腳攣於下齒齘於上可與大承氣湯此亦急下存陰之義也蓋必泄其燥熱然後膈上之風痰得以下行周身筋脈亦以不受薰灼而舒矣下後棄其餘藥者正以所急在筋脈非燥矢宿食可比故不曰宜而曰可與獨怪近世兒科既不識痙病所由來而概名為驚風妄投鎮驚祛風之藥殺人無算為可恨也太陽病關節疼痛而煩脈沉而細者此名中濕亦名濕痹濕痹之候小便不利大便反快但當利其小利前篇曰濕流關節又曰濕傷於下蓋太陽病汗出不徹由腠理流入肢節空隙因病痠疼是為歷節所由起陽氣為寒濕所遏故內煩脈之沉細在痙病為寒水在下不能化氣濕病亦然濕者水及膏液合併滯而不流若痰涎然下焦垢膩故小便不利水道壅塞不通溢入回腸故大便反快大便有日三四行而飲食如故者是宜五苓散倍桂枝但得陽氣漸通而小便自暢大便之溏泄固當以不治治之餘解詳傷寒發微不贅濕家之為病一身盡疼發熱身色如薰黃也濕家之病起於太陽寒水表汗不出則鬱於肌理而血絡為之不通一身盡疼者寒濕凝沍肌腠也此證始則惡寒繼則發熱終則濕熱蘊蒸而身色晦暗如薰黃濕證小便不利大率以麻黃加朮為主方師所以不出方治者要以病變多端隨病者之體溫為進退血分溫度不足易於化寒溫度太高易於化燥未可執一論治也說解詳傷寒發微濕家其人但頭汗出背強欲得被覆向火若下之早則噦或胸滿小便不利舌上如胎者以丹田有熱胸上有寒渴欲得飲而不能飲則口燥煩也但頭汗出約有二端陽熱之證陰液內竭則但頭汗出寒濕之證毛孔閉塞則亦但頭汗出寒濕鬱於經輸故背強此與太陽病之項背強同寒沍皮毛內連肌肉惡寒甚者遂欲得被向火此與太陽傷寒同此時正宜麻黃加朮湯以發其汗使水氣外達中氣化燥不得已而後下然下之太早水氣太甚隨藥內陷與人體之膏液並居留於上膈則病寒厄胸滿陷於下焦則滋膩之濕阻於水道小便為之不利此證寒濕在上鬱熱在下故有時渴欲飲水水入口而不能不咽仲師不立方治陳修園補用黃連湯語詳傷寒發微濕家下之額上汗出微喘小便利者死若下利不止者亦死濕與水異水可從小便去而濕不可去水清而濕濁也濕與燥反燥結者易攻而濕不可攻燥易去而濕粘滯也故下之而濕流上膈故有胸滿小便不利之變但此猶易為治也至下後陽氣上脫至於額上汗出如珠微喘而氣咻咻若不續陰液下脫而小便反利或下利不止疾乃不可為矣按傷寒陽明證於下法往往慎重者亦以太陽之傳陽明下燥不勝上濕恐下後利遂不止也否則宿食下利脈滑者猶當用大承氣湯何獨於陽明證而反不輕用乎風濕相摶一身盡疼痛法當汗出而解值天陰雨不止醫云此可發其汗汗之病不愈者何也蓋發其汗汗大出者但風氣去濕氣在是故不愈也若治風濕者但微微似欲汗出者風濕俱去也太陽病發汗後或自汗風邪乘之毛孔閉塞汗液之未盡者留著肌理成濕一身肌肉盡痛是為風濕相摶此證本應發汗與太陽傷寒之體痛同後文麻黃加朮湯麻黃杏仁薏苡甘草湯其主方也以麻黃之發汗白朮薏苡之去濕本期風濕俱去然適當天時陰雨病必不去藥可與病氣相抵而地中之濕與雨中之寒決非藥力所能及故雖發汗病必不愈說解傷寒發微濕家病身上疼發熱面黃而喘頭痛鼻塞而煩其脈大自能飲食腹中和無病病在頭中寒濕故鼻塞內藥鼻中則愈濕家身上疼非一身盡疼之比風濕在皮毛故發熱濕鬱則發黃濕在上體故面黃肺氣不宣故喘頭痛鼻塞風濕入腦之明證也惟內藥鼻中則愈仲師未出方治豫每用煎藥薰腦之法傾藥於盆以布幕首薰之汗出則愈詳傷寒發微頭痛甚者加獨活濕家身煩疼可與麻黃加朮湯發其汗為宜慎不可以火攻之麻黃加朮湯方麻黃三兩去筋桂枝二兩甘草一兩白朮四兩杏仁七十個去皮尖上五味以水九升先煮麻黃減二升去上沫內諸藥煮取二升半去滓溫服八合覆取微汗太陽寒水發於外者為汗壅阻皮毛之內即成濕故太陽傷寒皮毛不開無汗惡寒發熱體痛者宜麻黃湯以汗之濕家發熱身疼者宜麻黃加朮湯以汗之加朮者所以去中焦之濕也蓋水濕凝沍肌肉血絡停阻乃病疼痛癰疽之生患處必先疼痛者血絡瘀結為之也故欲已疼痛者必先通其不通之血絡陰疽之用陽和湯亦即此意若急於求救而灼艾以灸之斷蔥以尉之或熾炭以薰之毛孔之內汗液被灼成菌汗乃愈不得出而血絡之瘀阻如故也況火劫發汗汗泄而傷血分更有發黃吐血衄血之變乎病者一身盡疼發熱日晡所劇者此名風濕此病傷於汗出當風或久傷取冷所致也可與麻黃杏仁薏苡甘草湯麻黃薏苡甘草湯方麻黃半斤杏仁十個去皮尖薏苡半兩甘草一兩炙上銼麻豆大每服四錢匕匕者茶匙也四錢匕者四茶匙也水一盞半煎八分去滓溫服有微汗避風一身盡疼為寒濕凝沍肌理血絡阻滯作痛若陰疽然前文已詳言之發熱者寒濕外閉血分之熱度以阻厄而增劇也日晡所為地中蒸氣上騰之時屬太陰濕土故陽明病欲解時從申至戌上所以解於申至戌上者為熱盛之證當遇陽衰退陰盛而差也明乎此可知申至戌上為太陰主氣濕與濕相感故風濕之證當日晡所劇究病之所由成則或由汗出當風或由久傷取冷內經云形寒飲冷則傷肺肺主皮毛務令濕邪和表熱由皮毛一泄而盡其病當愈師所以用麻黃湯去桂枝加薏苡者則以薏苡能去濕故也風濕脈浮身重汗出惡風者防己黃耆湯主之防己黃耆湯方防己一兩甘草半兩炙白朮七錢半黃耆一兩一分右銼麻豆大每抄五錢匕生薑四片大棗一枚水盞半煎八分去滓溫服喘者加麻黃半兩胃中不和者加芍藥三分氣上衝者加桂枝三分下有陳寒者加細辛三分服後當如蟲行皮中自腰下如冰後坐被上又以一被繞腰下溫令微汗差脈浮為風身重為濕汗出惡風為表氣虛而汗泄不暢此亦衛不與營和之證防己泄熱黃耆助表氣而托汗暢行白朮炙甘草補中氣以勝濕此亦桂枝湯助脾陽俾汗出肌腠之意也按本條方治下所列如蟲行皮中云云殊不可通此證本非無汗不當云服藥後令微汗差謬一本方四味俱和平之劑非發汗猛劑何以服之便如蟲行皮中且何以腰下如冰冷謬二且陽明久虛無汗方見蟲行皮中之象為其欲汗不得也何以服湯後反見此狀謬三此必淺人增注特標出之傷寒八九日風濕相摶身體疼煩不能自轉側不嘔不渴脈浮虛而澀者桂枝附子湯主之若大便堅小便自利去桂枝加白朮湯主之桂枝附子湯方桂枝四兩附子三枚炮去皮破八片生薑三兩切甘草二兩炙大棗十二枚擘上五味以水六升煮取二升去滓分溫三服白朮附子湯方白朮一兩附子一枚炮去皮甘草二兩炙生薑一兩半大棗六枚上五味以水三升煮取一升去滓分溫三服一服覺身痹半日許再服三服都盡其人如冒狀勿怪即是朮附並走皮中逐水氣未得除故耳此條見太陽篇說解詳傷寒發微於不嘔不渴及大便堅小便自利二證辨析至為明瞭茲特舉其未備者言之桂枝附子湯為陽旦湯變方而要有差別陽旦之證表陽盛而營血未為濕困故加桂以助芍藥之泄營此證脈見浮虛而澀表陽已虛營血先為濕困故但加熟附以溫裏以營虛不可泄而去疏泄營氣之芍藥陽旦所以用生附者所以助裏陽而泄在表之水氣也此用熟附三枚者所以助表陽而化其濕也彼為表實此為表虛也顧同一風濕相摶身體疼煩不能轉側不嘔不渴之證何以大便燥小便自利者便須加白朮而去桂枝加朮為去濕也大便堅小便自利似裏已無濕而反加白朮身煩疼不能自轉側似寒濕獨留於肌腠而反去解肌之桂枝此大可疑也不知不嘔不渴則大便之堅直可決為非少陽陽明燥化小便自利則以陽氣不行於表三焦水道以無所統攝而下趨也蓋此證小便色白故用附子以溫腎濕痹肌肉故加白朮以扶脾但使朮附之力從皮中運行肌表然後寒濕得從汗解津液從汗後還入胃中腸中乃漸見潤澤大便之堅固當以不治治之附服白朮附子湯後見象解商書云若藥勿瞑眩厥疾弗瘳旨哉言乎篇中大劑每分溫三服獨於白朮附子湯後詳言一服覺身痹痹者麻木之謂凡服附子後不獨身麻即口中額上俱麻否則藥未中病即為無效豫當親驗之繼之曰三服都盡其人如冒狀勿怪即朮附並走皮中水氣未得除故耳夫所謂冒者如中酒之人欲嘔狀其人頭暈眼花憒憒無可奈何良久朦朦睡去固已漬然汗出而解矣此亦余所親見獨怪今之病家一見麻木昏暈便十分悔恨質之他醫又從而痛詆之即病者已愈亦稱冒險吾不知其是何居心也風濕相摶骨節疼煩掣痛不得屈伸近之則痛劇汗出短氣小便不利惡風不欲去衣或身微腫甘草附子湯主之甘草附子湯方甘草二兩炙附子二枚炮去皮白朮二兩桂枝四兩上四味以水六升煮取三升去滓溫服一升日三服初服得微汗則解能食汗出復煩者服五合恐一升多者宜服六七合為妙此與上節並見太陽篇於傷寒發微中言之已詳茲復略而言之蓋水與濕遇寒則冰遇熱則融此理之最易明者也風濕相摶至於骨節疼煩掣痛不得屈伸近之則痛劇此可見寒濕流入關節表裏氣血隔塞不通此與瘡瘍作痛略同蓋氣血以不通而痛也不通則痛此證暴發為濕積久即成歷節汗出短氣亦與歷節同濕猶在表故惡風不欲去衣或身微腫不似歷節之純為裏證風陽引於外故小便不利惟證情與歷節同源故方治亦相為出入甘草附子湯用甘草白朮桂枝與桂枝芍藥知母同用熟附子二枚與烏頭五枚炙草三兩同惟一身微腫似當用麻黃以發汗仲師棄而不用者正以濕邪陷入關節利用緩攻也否則發其汗而大汗出風去而濕不去庸有濟乎太陽中暍發熱惡寒身重而疼痛其脈弦細芤遲小便已灑灑然毛聳手足逆冷小有勞身即熱口開前板齒燥若發其汗則惡寒甚加溫針則發熱甚數下之則淋甚中暍係在太陽則伏氣之說正當不攻自破發熱惡寒似傷寒身重疼痛似風濕小便已灑灑然毛聳手足逆冷又似表陽大虛所以有此見象者夏令天氣鬱蒸汗液大泄則其表本虛表虛故惡寒感受天陽故發熱加以土潤溽暑地中水氣上升易於受濕濕甚故身重而體痛小便已灑灑然毛聳者暑令陽氣大張毛孔不閉表虛而外風易乘也所以手足逆冷者暑濕鬱於肌肉脾陽頓滯陽氣不達於四肢也是證營衛兩虛衛虛故脈見弦細營虛故脈見芤遲小有勞身即熱口開前板齒燥此證要屬陰虛衛陽本虛之人發汗則衛陽益虛故惡寒甚陰虛之人而加溫針故發熱甚營陰本虛之人下之則重傷其陰故淋甚此證忌汗下被火與太陽溫病略同但彼為為實證故汗下被火後多見實象此為虛證故汗下溫針後多見虛象要之為人參白虎竹葉石膏諸湯證固不當以形如傷寒妄投熱藥也太陽中熱者暍是也汗出惡寒身熱而渴白虎加人參湯主之白虎加人參湯方知母六兩生石膏一斤碎綿裹甘草二兩炙粳米六合人參三兩上五味以水一斗煮米熟湯成去滓溫服一升日三服暴行烈日之中則熱邪由皮毛入犯肌腠於是有太陽中熱之病外熱與血熱併居則身熱而汗出暑氣內侵胃液旁泄為汗則胃中燥熱因病渴飲寒水沾滯衛陽不固皮毛故表虛而惡寒陳修園謂太陽以寒為本雖似相去不遠究不免失之含混此證用人參白虎湯與太陽篇口燥渴心煩微惡寒同然則本條所謂惡寒與傷寒中風之惡寒甚者固自不同也太陽中暍身熱疼重而脈微弱此以夏月傷冷水水行皮中所致也一物瓜蒂湯主之瓜蒂湯方瓜蒂二十個上銼以水一升煮取五合去滓頓服夏令地中水氣隨陽上蒸是為暑暑者濕熱相摶之動氣也此氣不著於人體則已著於人體無有不身熱疼痛者以有熱復有濕也但此證脈當浮大所以然者以血受陽熱蒸化脈道中熱度必高高者脈大有表熱而病氣在肌肉屬太陽部分之第二層與中風同其脈當浮而反見微弱之脈者是非在浚寒泉恣其盥濯或者中宵露處臥看星河皮中汗液未出者乃一時悉化涼水此即心下有水氣之水不由外入水漬皮中因病疼重暴感陽熱轉被鬱陷因病身熱瓜蒂苦泄能發表汗汗出熱泄其病當愈傷寒發微中附列治驗茲不贅述豫意浮萍煎湯薰洗亦當有效他日遇此證當試驗之百合狐惑陰陽毒病證治第三論曰百合病者百脈一宗悉致其病也意欲食復不能食常默然欲臥不能臥欲行不能行飲食或有美時或有不欲聞食臭時如寒無寒如熱無熱口苦小便赤諸藥不能治得藥則劇吐利如有神靈者身形如和其脈微數每溺時頭痛者六十日乃愈若溺時頭不痛淅淅然者四十日愈若溺快然但頭眩者二十日愈其證或未病而預見或病四五日而出或二十日或一月後見者各隨證治之百合之病余未之見然意則可知仲師以百脈一宗悉致其病為提綱即可知其病在肺蓋飲食入胃由脾陽運行上承於肺肺乃朝百脈而輸精皮毛百脈精液得以沾溉而不燥者肺為水之上源足以貫輸而不竭也故肺主一身治節而獨為五藏主肺主皮毛過於發汗則肺液由皮毛外泄而水之上源一竭肺與大腸為表裏過於攻下則太陽寒水由大腸下陷而水之上源再竭咽為食管喉為氣管並接會厭吐之太過則胃液竭而肺液亦傷而水之上源三竭三者之中苟犯其一則肺必燥肺燥則無以滋溉百脈而百脈俱病加以肺陰虛耗病延血分陰絡內傷腸中敗血瘀阻或由上源虛耗胃中生燥因病渴飲或久渴不愈如消渴狀況肺陰一虛易生內熱水澤不降虛陽外浮是生表熱病情不同皆當以補肺之百合為主治之方藥此百合病之大略可由方治而揣測者也肺陰不濡則濁氣不降清氣不升諸藏之氣悉為頓滯是故胃氣頓滯則欲食而不能食意興蕭索百事俱廢故常默然且肺陰不降膽火上逆因病煩躁故欲臥不能臥欲行不能行肺陰雖傷胃氣尚存故飲食或有美時然以筋脈懈弛不能動作中脘易於停頓故或有不欲聞食臭時肺主皮毛肺陰傷則衛陽不能衛外微覺惡風故似寒無寒津液不濡皮毛時苦乾燥故如熱無熱口苦者肺陰不能滋溉中脘而膽胃燥也小便赤者水之上源不足而下焦熱鬱也溺時頭痛者水液下泄鬱熱上衝於腦也衝激不甚則太陽穴經脈跳動而但見淅淅然似痛非痛小便暢適但有浮陽上冒而病頭弦則其病更輕若不知其肺陰之虛而誤投藥劑熱藥入口即吐為其陰虛而內熱也涼藥入胃即利為其初無實熱也所謂如有神靈者正如左氏傳所云晉候夢二豎居膏之上肓之下藥所不能攻針所不能達使良醫無能為力也但病者身形雖如微和其脈必見微數微數者肺陰虧而水之上源不足以溉五藏而濡百脈五藏熱鬱而經脈俱燥也故此證但補肺陰而諸恙不治當愈譬之發電總機一開而萬燈齊明萬機齊動所謂伏其所主也此證或未病而見者肺陰先虛也或既病而見者肺陰因病而虛也或二十日一月後見者則藥誤也所以致此病者不同故治法亦略有差別此證大抵出於失志懷憂之人平時本鬱鬱不樂以致此病一發行住坐臥飲食不能自主若有鬼物驅遺之者口中喃喃時欲速死又如前生怨鬼索命世無良醫無怪鄉愚病此召幽靈而女巫唱秋墳之鬼曲設醮壇而道士擅司令之淫威未收愈疾之功而已室如懸罄矣哀哉百合病發汗後者百合知母湯主之百合知母湯方百合七枚擘知母三兩上先以水洗百合漬一宿當白沫出去其水別以泉水二升煎取一升去滓別以泉水二升煎知母取一升後合煎一升五合分溫再服百合病下之後者百合滑石代赭湯主之百合滑石代赭湯方百合七枚擘滑石三兩碎綿裹代赭石如彈丸大一枚碎綿裹上先煎百合如前法別以泉水二升煎滑石代赭取一升去滓後合和重煎取一升五合分溫再服百合病吐之後者百合雞子湯主之百合雞子湯方百合七枚擘雞子黃一枚上先煎百合如前法內雞子黃攪勻煎五分溫服百合病不經吐下發汗病形如初者百合地黃湯主之百合地黃湯方百合七枚擘生地黃汁一升上先煎百合如前法內地黃汁煎取一升五合分溫再服中病勿更服大便當如漆太陽寒水由三焦下達膀胱為溺由腎陽蒸化膀胱外出皮毛為汗故溺與汗為一源寒水下陷輕則為蓄水重則為蓄血汗之由肺出皮毛者屬水分由脾出肌腠者屬血分故血與汗為同體營為血之精行於脈中衛為水之精行於脈外人一身之水藉血熱而化氣故肌腠孫絡溫而後皮毛固一身之血得水液而平燥故三焦水道通而後血海濡今以方治為標準可知病之輕重汗傷肺陰者治以百合知母湯但滋肺陰已足下後水液下出大腸由府病纍及藏陰濕熱逗留為病則治以百合滑石代赭湯吐後液虧陽氣上冒纍及主脈之心藏而怔忡不寧或至不能臥寐則治以百合雞子黃湯此其易知者也惟不經吐下發汗而見百脈俱病自來注家未有知其病由者陳修園知其病在太陽不能從傷寒太陽篇悟到太陽之變證黃坤載識為瘀濁在裏不能定瘀濁之名識病而不能徹底非所以教初學也豫以為此證直可決為太陽標熱內陷蒸成敗血之證故方治用百合七枚以清肺用生地黃汁一升以清血熱一升約今一大碗須鮮生地半斤許血熱得生地黃汁清潤則太陽標熱除敗血以浸潤而當下觀其分溫再服大便如漆可為明證矣按腸中本無血惟熱鬱蒸腐經絡乃有之此亦利下膿血之類觀於病蓄血者大便必黑於此證當可瞭解百合病一月不解變成渴者百合洗方主之百合洗方百合一升以水一斗漬之一宿以洗身洗已食煮餅勿以鹹豉也病至一月不解則肺陰傷於裏而皮毛不澤脾陽停於裏而津液不生內外俱燥遂病渴飲此非水氣停蓄阻隔陰液而不能上承不當用豬苓五苓之方治治之仲師主以百合洗方洗已食以不用鹹豉之蒸餅其意與服桂枝湯後之啜熱粥略同蓋食入於胃營氣方能外達與在表之衛氣相接然後在表之藥力乃得由皮毛吸入肺臟而燥熱以除所謂營衛和則愈也其不用鹹豉以百脈既病不當走血故也百合病渴不解者栝蔞牡蠣散主之栝蔞牡蠣散方栝蔞根牡蠣熬等分上為細末飲服方寸匕日三服百合洗方所以潤肺主之皮毛以肺藏張翕之氣原自與皮毛之張翕相應易於傳達譬之百川赴海一區所受萬派同歸又懼其未也更食煮餅以助脾陽使裏氣外出引藥力內漬肺藏而其為渴當差其不差者必浮陽上升肺藏之受灼特甚也栝蔞根清潤生津能除肺胃燥熱而濡筋脈觀柔痙用栝蔞桂枝湯可知牡蠣能降上出之浮陽觀傷寒柴胡龍牡救逆湯可知合二味以為方治即降浮陽又增肺液渴有不差者乎然必杵以為散者則以病久正氣不支藥當漸進也試觀久飢之人驟然飽食則死徐飲米湯則生可以知用藥之緩急矣百合病變發熱者百合滑石散主之百合滑石散方百合一兩炙滑石三兩上二味為散飲服方寸匕日三服當微利者止服熱則除人體之府藏清陽內涵則涼濁陰內蘊則熱傷寒傳陽明由於胃濁失降其明證也百合病內藏雖燥其初固無表熱變熱者久鬱而生熱也此證陽氣與陰液俱虛腸胃初無宿食欲去鬱熱三承氣湯俱非所宜白虎竹葉石膏雖能清熱而不能疏其瘀滯仲師立方用百合滑石散滑石劑量三倍於百合百合以潤燥滑石以清熱石質重滯取其引熱下行但使服後微利其熱當除所以用散者亦因病久正虛不宜湯劑也百合病見於陰者以陽法救之見於陽者以陰法救之見陽攻陰復發其汗此為逆見陰攻陽乃復下之此亦為逆見於陽者以陰法救之蓋統上七節言之水液不足衛陽大傷故曰見於陽養陰泄熱故曰以陰法救之百合病為似病非病之證所謂見於陰者以陽法救之本篇既不列病狀又無方治讀金匱者不無疑竇不知肺陰既傷陽氣外浮故用百合養其肺陰若營陰不達當以扶助脾陽主治即不當用百合且不得謂之百合病矣豈能更列於本篇乎按太陽篇云病人藏無他病時發熱自汗出而不愈者此衛氣不和也先其時發汗則愈宜桂枝湯此證衛強營弱為陰故曰見於陰桂枝湯能振脾陽故曰以陽法救之若夫陽浮於外復發汗以戕裏陰陽乃益無所制陰盛於裏復下之以傷中陽陰乃寖成寒中故皆為逆也狐惑之為病狀如傷寒默默欲眠目不得閉臥起不安蝕於喉為惑蝕於陰為狐不欲飲食惡聞食臭其面目乍赤乍黑乍白蝕於上部則聲嗄甘草瀉心湯方主之蝕於下部則咽乾苦參湯洗之蝕於肛者雄黃薰之甘草瀉心湯方甘草四兩炙黃芩乾薑人參各三兩半夏半升黃連一兩大棗十二枚上七味以水一斗煮取六升去滓再煎取三升溫服一升日三服苦參湯方苦參一升以水一斗煎取七升去滓薰洗日三雄黃薰法雄黃一味為末筒瓦二枚合之燒向肛薰之狐淫獸也詩有狐綏綏為寡婦欲嫁鰥夫而作左氏春秋秦人卜與晉戰其繇曰千乘三去三去之餘獲其雄狐占之曰夫狐蠱必其君也蓋晉惠公蒸於賈君有人欲而無天理故秦人以狐名之此可證狐為淫病矣又晉候有疾篇有晦淫惑疾之文下文申之曰夫女陽物而晦時淫則有內熱惑蠱之疾內熱為女勞疸惑蠱為二證惑即本篇蟲蝕之證蠱則聚毒蟲於甕令自相食或用蝦蟆或用蜈蚣最後存其一即為蠱相傳南方有此術婦人於其所愛者將行以蠱灰暗投飲食中約期不至即毒發而死左氏傳以三證並稱又可證惑為淫病矣以理斷之直今之梅毒耳蓋陰陽二電以磨擦生火重之以穢濁蟲生遂成腐爛蝕於喉為惑蝕於陰為狐不過強分病名而其實則一按此證先蝕於陰陰蝕已則餘毒上攻而蝕於喉並有蝕於鼻者俗謂之開天窗譬之鬱伏之火冒屋而出也鼻爛盡其人可以不死蝕於上部則聲嗄會厭穿也蝕於下部則咽乾火炎上也惟蝕於肛者甚少或者其孌童歟世所稱龍陽毒蓋即指此所以狀如傷寒者以頭痛言也毒發於宗筋則其熱上衝於腦而頭痛俗謂之楊梅風宜水磨羚羊角以抑之所以默默欲眠起則顛眩者小便數而痛劇也或用車前草汁飲之間亦有小效所以目不得閉臥起不安者晝夜劇痛欲臥而不得也所以不欲飲食惡聞食臭者小便結於前故不欲飲大便閉於後故不欲食濁陰不降中氣頓滯故惡聞食臭熱毒攻於上故面目乍赤膿血成於下故面目乍黑營氣既脫加以劇痛故面目乍白以仲師方治考之狐惑之為蟲病灼然無可疑者苦參湯洗陰蝕則以苦參味性寒兼有殺蟲功用也雄黃末薰肛蝕亦以雄黃功用去毒而兼能殺蟲也然則蝕於上者何不用殺蟲之品曰病起於下蟲即在下蝕於喉不過毒熱上攻耳此與厥陰證之口傷爛赤同故重用解毒之甘草為君半夏黃連以降之黃芩以清之恐其敗胃也乾薑以溫之人參大棗以補之其不用殺蟲之藥者口中固無蟲也陳修園不知此證之為梅毒乃至欲借用烏梅丸夫誰見烏梅丸能愈梅毒者乎亦可笑已病者脈數無熱微煩默默但欲臥汗出初得之三四日目赤如鳩眼七八日目四眥黑若能食者膿已成也赤豆當歸散主之赤豆當歸散方赤小豆三升浸令芽出曝乾當歸十兩上二味杵為散漿水服方寸匕日三服文曰脈數無熱微煩但欲臥汗出夫無熱脈數此為陽中有癰自汗出為膿未成腸癰條下已歷歷言之惟癰將成之狀瘡癰篇初無明文此云初得之三四日目赤如鳩眼內熱蘊蒸之象也又云七八日目四眥皆黑若能食者膿已成也目四眥黑為內癰已腐而敗血之色外見此當是瘡癰篇諸癰腫節後脫文傳寫者誤録於此赤豆當歸散治腸中所下之近血則此條當為腸癰正治婦人腹中痛用當歸散亦以其病在大腸而用之可見本條與狐惑篇陰陽毒絶不相干特標出之以正歷來注家之失陽毒之為病面赤斑斑如錦紋咽喉痛吐膿血五日可治七日不可治升麻鱉甲湯主之陰毒之為病面目青身痛如被杖咽喉痛五日可治七日不可治升麻鱉甲湯去雄黃蜀椒主之升麻鱉甲湯方鱉甲手指大一片炙雄黃半兩研升麻當歸甘草各二兩蜀椒炒去汁一兩上六味以水四升煮取一升頓服之老小再服取汗肘後千金方陽毒用升麻湯無鱉甲有桂陰毒用甘草湯無雄黃邪中之人血熱熾盛為陽血寒凝結為陰此不難意會者也然則陰陽毒二證雖未之見直可援證狀而決之陽毒為陽盛之證熱鬱於上故面赤斑斑如錦紋熱傷肺胃故吐膿血陰毒為凝寒之證血凝而見死血之色故面目青血凝於肌肉故身痛如被杖二證皆咽痛者陽熱薰灼固痛陰寒凝阻亦痛咽痛同而所以為咽痛者不同以方治論則陽毒有蟲陰毒無蟲譬之天時暴熱則蟄蟲咸仰天時暴寒則蟄蟲咸俯蓋不獨陽毒方治有殺蟲之川椒雄黃而陰毒無之為信而有徵也方中升麻近人多以為升提之品在本經則主解百毒甘草亦解毒則此二味實為二證主要鱉甲善攻當歸和血此與癰毒用炙甲片同一以破其血熱一以攻其死血也又按千金方陽毒升麻湯無鱉甲有桂陰毒甘草湯無雄黃以後文水四升煮取一升頓服取汗觀之似升麻鱉甲湯中原有桂枝後人傳寫訛脫耳瘧病脈證並治第四師曰瘧脈自弦弦數者多熱弦遲者多寒弦小緊者下之差弦遲者可溫之弦緊者可發汗針灸也浮大者可吐之弦數者風發也以飲食消息止之弦為少陽之脈此盡人之所知也然瘧病何以屬少陽則以手少陽三焦寒水不得暢行皮毛之故究其病由厥有數因人當暑令靜處高堂邃宇披襟當風則汗液常少水氣之留於皮毛之裏者必多秋風一起皮毛收縮汗液乃凝沍於肌理是為一因勞力之人暑汗沾漬體中陽氣暴張不勝煩熱晝則浴以涼水夜則眠當風露未經秋涼皮毛先閉而水氣留著肌理者尤多是為二因又或秋宵苦熱驟冒曉涼皮毛一閉水氣被遏是為三因三因雖有輕重之別而皮裏膜外並留水氣故其脈皆弦痰飲之脈必弦者由其有水氣故也太陽寒水痹於外一受秋涼遂生表寒營血受壓與之相抗是生表熱故有寒熱往來之變惟水氣輕者隨衛氣而動休作日早其病易愈水氣重者隨營血內伏休作日晏其病難愈血熱內張故脈弦數而多熱水寒外勝故脈弦遲而多寒長女昭華治多熱者用小柴胡湯加石膏知母治多寒者則加乾薑桂枝此本孫氏千金方每歲秋間治愈者動至數十人足補仲師方治之闕至如弦小緊者下之差或不盡然所謂小緊者或即溫瘧其脈如平之謂蓋溫瘧之為病但熱不寒即寒亦甚微渴飲惡熱不勝煩苦本屬陽明熱證用桂枝白虎湯後表雖解而腹及少腹必脹痛即不痛亦必大便不行豫嘗治斜橋一妊婦先病溫瘧繼病腹痛先用桂枝白虎湯愈後繼以腹痛下利用大承氣湯而愈後治一年近不惑之老人亦然可見下之而差為溫瘧言之辛未六月浦東門人吳雲峰患間日瘧發則手足攣急麻木口苦吐黃水午後熱盛譫語中夜手足不停脈滑數而弦用大柴胡湯下之一劑而差此可證當下之瘧脈不定為弦小緊矣遲為血寒故弦遲者可溫之弦緊為太陽傷寒之脈水氣留著皮毛故可發汗留著肌腠故可針灸浮大之脈陽氣上盛證當自吐不吐其胸必悶故可用瓜蒂赤小豆散以吐之至謂弦數者為風發證狀未明以理斷之大約風陽暴發兩手拘攣卒然嘔吐若吳生之證所謂以飲食消息止之者不過如西瓜汁蘆根湯菜豆湯之類清其暴出之浮陽然究不如大柴胡湯可以劖除病根也惟此證病後胃氣大傷飲食少進當以培養胃氣為先務此又不可不知耳病瘧結為癥瘕如其不差當云何師曰此名瘧母急治之以月一日發當十五日愈設不差當月盡解宜鱉甲煎丸鱉甲煎丸方鱉甲十二分炙烏扇三分燒即射干黃芩三分柴胡六分鼠婦三分熬乾薑大黃桂枝石葦去毛厚朴紫葳即淩霄半夏阿膠各三分芍藥牡丹去心蟅蟲葶藶人參各一分瞿麥二分蜂窠四分炙赤硝十二分蜣螂六分熬桃仁二分去皮尖研上二十三味為末取煅竈下灰一斗清酒一斛五升浸灰俟酒盡一半著鱉甲於中煮令泛濫如膠漆絞取汁內諸藥煎為丸如梧子大空心服七丸日三服千金方用鱉甲十二片又有海藻三分大戟一分無鼠婦赤硝二味病瘧之由不外寒熱早用加減小柴胡湯何至十五日一月而始愈況一月不差結為癥瘕之說尤不可信此傳寫之誤也瘧母之成多在病愈之後豈有瘧未差而成瘧母者此痞或在心下或在臍下大小不等惟鱉甲煎丸至為神妙或半月而消盡或匝月而消盡豫向治朱姓板箱學徒及沙姓小孩親驗之蓋此證以寒瘧為多胎瘧亦間有之他瘧則否北人謂瘧為脾寒南人謂無痰不成瘧二者兼有之脾為統血之藏脾寒則血寒脾為濕藏濕勝則痰多痰與血並乃成癥瘕方中用桃仁蟅蟲蜣螂鼠婦之屬以破血葶藶以滌痰君鱉甲以攻痞而又參用小柴胡湯以清少陽乾薑桂枝以溫脾阿膠芍藥以通血大黃厚朴以調胃赤硝瞿麥以利水而泄濕瘧母乃漸攻而漸消矣細玩此節文義當云病瘧結為癥瘕如其不差當云何師曰名曰瘧母當急治之以月一日發當十五日愈設不差當月盡解宜鱉甲煎丸陳修園黃坤載輩望文生訓殊缺分曉師曰陰氣孤絶陽氣獨發則熱而少氣煩冤手足熱而欲嘔名曰疸瘧若但熱不寒者邪氣內藏於心外舍分肉之間令人消爍肌肉此節為溫瘧標準陰氣孤絶或由汗出太過或由亡血失精水分不足血熱獨強溫瘧之證其脈不弦者水分虛也水分不足則亢陽無制是為厥陽獨行故此病不發則如平人一發即身熱如灼渴欲飲冷氣短胸悶其苦不可言喻手足熱者謂不似尋常瘧證手足尚見微寒也欲嘔者陽氣上亢膽胃逆行也但熱不寒故名疸瘧說文疸勞也人勞則陽氣張觀於勞力之人雖冬令多汗陽氣以用力外出之明證也邪氣內藏於心外舍於分肉之間不過形容表裏俱熱非謂心藏有熱各藏各府無熱也豫謂胃主肌肉觀下文肌肉消爍此證當屬陽明原人一身肌肉由水分與血分化合水液本自不足又經表裏俱熱亢熱薰灼血分益增枯燥則既類堯肌如臘欲求如郭重之肥見惡於季康子者不可得矣大肉痿陷大骨枯槁能久存乎溫瘧者其脈如平身無寒但熱骨節煩疼時嘔白虎加桂枝湯主之白虎加桂枝湯方知母六兩石膏一斤甘草二兩炙粳米二合桂枝三兩上五味以水一斗煮米熟湯成去滓溫服一升日三服溫瘧之為病太陽標熱併入陽明之證也太陽之氣不宣則陽明之熱不去此仲師用桂枝白虎湯之義也外無水氣壓迫故其脈不弦一身無寒但熱骨節煩疼及腰痠時嘔則諸瘧並有之不惟溫瘧為然此於診病時親見之但不如溫瘧之甚耳獨怪自來注家多稱冬不藏精水虧火盛若內經瘧論冬中風寒氣藏骨髓遇大暑而發云云尤為荒誕治貴實驗安用此浮誇之言使非陽明實熱何以溫瘧服桂枝白虎湯愈後乃又有大承氣湯證耶瘧多寒者名曰牡瘧蜀漆散主之蜀漆散方蜀漆洗去腥雲母石燒二日夜龍骨各等分上三味杵為散未發前以漿水服半錢匕瘧之所以多寒者皮毛為水氣所遏陽氣不得宣也水氣留於上膈則寖成痰涎故世俗有無痰不成瘧之說蜀漆為常山苗能去濕痰故用之以為君雲母石本經主治中風寒熱如在舟車是為止眩暈鎮風陽之品龍骨當為牡蠣之誤本經牡蠣主治咳逆並言治痰如神水歸其宅可見蜀漆散方治專為風痰眩暈而設蓋上膈之濕痰去然後陽氣得以外達益可信無痰不成瘧之說為信而有徵矣補三陰瘧方治瘧之輕者日發血分熱度漸低則間日發熱度更低則間二日發世俗謂之三陰瘧然此證仲師既無方治俗工又不能醫故常有二三年始愈者豫蚤年即好治病有鄉人以三陰瘧求診診其脈遲而弱豫決其為正氣之虛為之凝方後此鄉人愈後將此方遍傳村巷愈十餘人後於李建初書孰診其姪克仁之子脈證並同即書前方授之二劑愈名常山草果補正湯此方並治虛瘧癸酉十月初三日麥加利銀行茶役韓姓子寒熱日三四度發服此汗出而愈方用常山四錢草果四錢生潞党五錢茯苓四錢全當歸八錢生白朮四錢炙草五錢川芎三錢熟地一兩小青皮三錢知母二錢半夏三錢生薑八片紅棗九枚中風歷節病脈並治第五夫風之為病當半身不遂或但臂不遂者此為痹脈微而數中風使然不明風之為義不足以知中風之病譬之驚飆乍發林木披靡風從東受則木靡於西風從西來則木靡於東本體所以偏斜不正者風力之所著偏也故口眼喁僻半身不遂所受之風雖有輕重而一面之暴受壓迫則同然則風之著於人體者偏左病即在左血氣乃受約而併於右偏右病即在右血氣乃受約而併於左血氣不行之手足乃廢而不用故曰當半身不遂但臂不遂者此為寒濕痹於筋絡當用威靈仙獨活等合桂枝附子湯以治之不當與中風同治矣脈為血分盈虛之大驗血虛故脈微與傷寒太陽篇脈微脈澀同風為陽邪其氣善於鼓動故脈數蓋脈微者不必數虛固多寒也脈數者不必微熱固多實也今半身不遂脈微而有數象故決為中風使然然則卒然暈倒痰涎上湧兩脈但弦無胃者豈得謂之中風耶豫常治四明塢炳生右手足不用與無錫華宗海合治之診其脈微而數微為血虛其人向患咯血便血營分之虛要無可疑日常由外灘報關行夜半回福田庵路寓所風邪乘虛因而致病以傷寒之例求之則脈浮為風以雜病之例求之則數亦為風瘧脈之弦數為風發可為明證豫因用麻黃湯外加防風潞參當歸川芎熟地等味宗海針手足三里風池委中肩井合谷環跳跗陽豐隆離鈎等穴而灸之三日即能步行獨怪金元四家主痰主火主風而不辨其為虛根本先謬獨不見候氏黑散有人參芎歸以補虛風引湯重用龍骨牡蠣以鎮風陽之犯腦耶又不見防己地黃湯之重用地黃汁耶寸口脈浮而緊緊則為寒浮則為虛寒虛相摶邪在皮膚浮者血虛絡脈空虛賊邪不瀉或左或右邪氣反緩正氣即急正氣引邪喎僻不遂邪在於絡肌膚不仁邪在於經即重不勝邪入於府即不識人邪入於藏舌即難言口吐涎沫傷寒論有中風雜病論亦有中風同名而異病究竟是一是二此不可以不辨也仲師云寸口脈浮而緊緊則為寒浮則為虛寒虛相摶邪在皮膚此即太陽傷寒麻黃湯證也此時營血不虛絡脈中熱血出而相抗因病發熱表氣未泄則猶宜麻黃湯設汗液從皮毛出即當用中風之桂枝湯以助脾陽俾風邪從絡脈外泄然此為營血不虛者言之也營血不虛則所中者淺而其病為傷寒論之中風營血既虛則所中者深而其病即為雜病論之中風是故素病咯血便血之人絡脈久虛傷寒正治之法遂不可用傷寒論所以有亡血不可發汗之戒也脾為統血之藏而主四肢風中絡脈乃內應於脾而旁及手足於是或左或右而手足不舉矣故其病源與太陽篇之中風同而要有差別風著人體外薄於皮毛肌腠散在周身則氣散而緩惟偏注於一手一足則氣聚而急邪薄於左則正氣併於右薄於右則正氣併於左正氣以併居而急邪乃從之因有口眼喎斜半身不遂之變風之所著受者見斜昔之詩人有寒食東風御柳斜輕燕受風斜之句可為喎僻偏枯之明證已至如後文所列四證惟入於藏一條為半身不遂者所必有其餘不過連類及之夫所謂邪在於絡肌膚不仁者則風與寒濕相雜之證也濕凝於肌則絡為之痹故有不痛不癢麻木不仁者亦有濕勝而成頑癬者此證治之未必即愈不治亦必無死法是為最輕所謂邪在於經即重不勝者以太陰經病言也蓋風之中人皆由血虛風從肌腠而入阻厄脾陽陽氣不達於肌肉則身為之重此風濕為病脈浮身重防己黃耆湯證也所謂邪入於府即不識人者以陽明府病言也風之中入由於血虛虛則生燥如吐下後大便不解者然不識人者即陽明篇發則不識人之證蓋燥熱在下則陽氣上衝於腦而神志昏蒙下之以大承氣湯腦中陽熱下降神志即清所謂釜底抽薪也惟入藏之說向無確解陳修園主心腎黃坤載則主心腎脾謂三藏之脈俱連舌本但未見愈疾之方而空言聚訟徒貽笑柄耳世傳中風不語用黃耆防風各數兩煎湯以大盎盛之置牀下薰之冷則再煎再薰一日即能言此為黃九峰法鎮江蔣寶素用之入煎劑名黃風湯蔣為九峰門人著有醫略傳世大抵正氣引邪上行腦氣閉塞鼻竅不通喉竅獨開故口中流涎所以難言者脈為風激血菀於腦舌本之脈牽掣而愈短也黃風湯只二味一以祛風一以補正先令從鼻竅薰入於腦腦氣一疏則脈之牽掣者緩舌即能轉鼻竅開而喉竅順矣章次公以腦為藏而不瀉卒厥為血菀於腦故入腦亦名入藏今西醫亦以中風為腦充血揆之此證理解並合山川可以崩竭此議不可改也寸口脈遲而緩遲則為寒緩則為虛營緩則為亡血衛緩則為中風邪氣中經則身癢而癮疹心氣不足邪氣入中則胸滿而短氣風之中人必乘營血之虛脈之所以遲也營虛則風從衛分傳入者營血熱度不足以相閉拒風乃得乘閒而入此中風之大略也邪氣中經身癢癮疹當即世俗所謂風疹其病猶在表也豫嘗治其壽姪及上海姚金福室人並以麻黃加朮湯取效又在清和坊治愈一老年婦人亦用此方可為明證惟心營不足風邪轉而入裏夫胸為太陽出入之道路上中二焦水氣分布之總區也西醫謂之淋巴幹風從皮毛入遏其清陽之氣阻水液之散布故令胸滿而氣短仲師不出方治竊謂常用桂枝湯去芍藥加參朮防風黃耆助心陽而補脾陰使營氣略和風將自息風引湯似不合病防己地黃湯治病如狂狀妄行獨語不休無寒熱其脈浮防己甘草各一分桂枝防風各三分上四味以酒一杯漬之絞取汁生地黃二斤㕮咀蒸之如斗米飯久以銅器盛藥汁更絞地黃汁和分再服不明病理者不可與論古人之方治蓋風邪失表之證往往隨經而瘀熱於裏太陽標熱內陷因致熱傷血海太陽證所以蓄血也此節病由曰病如狂狀妄行獨語不休無寒熱其脈浮此為中風而蓄血於下與風吸百脈血竄腦部舌難言而口吐涎者正自不同熱結在裏故無表熱病在太陽之府故脈浮如狂喜妄在傷寒為蓄血之證獨語如見鬼狀為熱入血室仲師成例具在不可誣也惟傷寒之蓄血為血實故用抵當湯桃核承氣湯以下之中風則本由血虛傷寒論所謂營弱衛強虛者不可重虛故可用防己地黃湯重用地黃汁以清瘀血防己以泄濕防風以疏風甘草桂枝以扶脾而解肌此法正與百合證用地黃汁同服後中病亦當大便如漆蓄血同也方解附候氏黑散解侯氏黑散治大風四肢煩重心中惡寒不足者菊花四十分白朮防風各十分桔梗八分黃芩五分細辛乾薑人參茯苓當歸川芎牡蠣礬石桂枝各三分上十四味杵為散酒服方寸匕日一服初期服二十日溫酒調服禁一切魚肉大蒜常宜冷食六十日止即藥積腹中不下也熱食即下矣冷食自能助藥力古人所立方治一方有一方之作用作用不可知當於病理求之一方有一方之主名主名不可知當於藥味求之侯氏黑散一方主治大風四肢煩重心中惡寒不足者四肢煩重為風濕痹於外心中惡寒不足為氣血傷於裏脾陽不達於四肢故煩重血分虛而熱度不充內藏故心中惡寒此病理之易明者也桂枝為傷寒論中風主藥防風以祛風薯蕷丸用之菊花能清血分之熱合地丁草能愈疔毒黃芩能清肺熱白朮茯苓以祛濕濕勝必生痰故用桔梗以開肺細辛乾薑牡蠣以運化濕痰但濕痰之生由於氣血兩虛故用人參以補氣當歸川芎以和血此藥味之可知者也惟礬石一味不甚瞭然近代人張錫純始發明為皂礬按皂礬色黑能染黑布主通燥糞而清內藏蘊濕張三豐伐木丸用之以治黃疸俾內藏蘊濕從大便而解者正為此也然則方之所以名黑散者實以皂礬色黑名之如黑虎丹黑錫丹之例要知病屬氣血兩虛風濕痹於表裏方治實主疏通而不主固澀女勞疸腹脹治以硝石礬石散亦此意也由此觀之方後所云初服二十日溫酒調服者冀藥力之通行脈絡也禁一切魚肉大蒜者恐其更增濕熱為藥力之障礙也至如四十日常宜冷食以助藥力特以不用溫酒言之若四十日常食冷飯及粥不病宿食必病寒中風疾未除新病又作治病者固當如是乎蓋皂礬熱者速行冷即緩下所以欲藥積腹中者則以太陰蘊濕有如油垢非一過之水所能盡也喻嘉言乃謂固澀諸藥使之積留不散以漸填空竅彼既誤皂礬為明礬於立方之旨已謬豈知藥積腹中原不過欲其逾數時而後下否則積六十日之藥於腹中其人已脹悶死矣陳修園復亟稱之是何異瘖者之唱聾者之聽乎亦可笑已風引湯解風引湯治除熱癱癎大黃乾薑龍骨各四兩桂枝三兩甘草牡蠣各二兩寒水石滑石赤石脂白石脂紫石英石膏各六兩上十二味杵粗篩以韋囊盛之取三指撮井花水三升煮沸溫服一升治大人風引少小驚癎瘈瘲日數發醫所不療除熱方巢氏云腳氣宜風引湯本條云除熱癱癎方後附列服法及主治又云治大人風引小兒驚癎瘈瘲日數發醫所不療除熱方病以風引為名似當以半身不遂為主要所謂正氣引邪喎僻不遂者是也但風起於四末則為偏中風中於頭則為眩暈以方治考之治瘈瘲必有驗治偏中必無濟所云除癱癎者不定以偏中言之也血不過頭借如手上刀傷以指捺傷處按於顛頂其血自止惟風陽吸於上則一身之氣血一時併入於腦故有卒然暈倒痰涎上湧而死者熱血菀於腦而腦膜為之暴裂也西醫謂腦充血血逆行於上則百脈為之牽掣小兒所以病瘈瘲者亦由於此蓋此類病證胸中先有熱痰外風引之乃併熱血而上入於腦如風起水湧者然方中大黃用以泄熱非以通滯此與瀉心湯治吐血同所謂釜底抽薪也乾薑炮用能止腦中上溢之血向在常熟見某錢肆經理鼻衄納炮薑灰於鼻中其衄即止所謂煤油著火水潑益張灰撲立止也此味下脫注炮字所以用龍骨牡蠣者此與傷寒太陽篇誤下煩驚譫語用柴胡加龍骨牡蠣火迫劫之發為驚狂桂枝去芍藥加蜀漆牡蠣龍骨及下後燒針煩燥主桂甘龍牡湯用意略同二味鎮浮陽之衝腦而牡蠣又有達痰下行之力也所以用桂枝甘草者桂枝湯方治原所以祛邪風而於本方風引之義固未盡合蓋桂枝湯發脾陽之汗而出之肌理原為營氣不虛者而設若營氣本虛陽氣張發於上衝氣被吸引而上逆非扶中土而厚其堤防不足以制衝逆而痰與熱血將一時併入於腦此即發汗過多心下悸欲得按主以桂枝甘草湯臍下悸欲作奔豚主以苓桂甘棗湯之例欲其不能踰中脘而上冒也其餘所用寒水石滑石紫石英石膏不過清涼重鎮使諸藏百脈之氣不受外風牽引而已方中惟赤石脂白石脂二味至為夾雜不倫喻嘉言寓意草所載治寒濕下利頗著特效傷寒利在下焦之禹餘糧湯寒濕下利之桃花湯赤石脂並為要藥可見其功用全係止澀與上用大黃之意絶然相反故不用此方則已若用此方此二味究當除去否則藥不合病且更生諸藥之阻力也頭風摩散解頭風摩散大附子一枚鹽等分上二味為散沐了以方寸匕摩疾上令藥力行此方之義不可知只有近人所傳偏頭痛目赤用食鹽和水塗太陽穴半日之間其痛立止其赤立消當是此方遺意加以附子善走風陽之入腦者當更易散此與納藥鼻中同不關於內藏者也寸口脈沉而弱沉即主骨弱即主筋沉即為腎弱即為肝汗出入水中如水傷心歷節痛黃汗出故曰歷節肺主一身治節獨為五藏主故近世診病者皆取決於手太陰動脈傷寒金匱所言寸口皆統關前後言之此層本不待言因後一節有太陰脈浮而弱一條恐人不明為手太陰動脈故略言之大凡歷節之成要不外乎水寒血敗血痹於下則營氣不能上承故手太陰之動脈必弱水氣勝則陽氣不升故脈沉此證以濕留關節為大綱關節為筋與骨交會之所汗出入水不用麻黃加朮湯以發之寒濕傷筋故筋痛傷骨故骨痛肝主筋血不行故筋痹腎主骨髓日敗故骨痹而脈之沉弱應之蓋人之一身氣分多於水分則脈浮水分多於氣分則脈沉故歷節而見沉弱之脈即可決為汗出入水所致人身之汗孔隨肺氣而張發水漬於外毛孔中要有正氣抵拒涓滴不能滲入所以病此者涼者浸灌於外皮中汗液悉化寒水水寒則傷血心為主血之藏故仲景師言如水傷心如水傷心云者原不謂水氣淩心也水濕滲入關節所以歷節痛太陽標熱鬱而欲出故發黃汗黃汗在腋下著衣成黃色此為歷節之第一因趺陽脈浮而滑滑則穀氣實浮則汗自出太陰脈浮而弱弱則血不足浮則為風風血相摶即疼痛如掣盛人脈澀小短氣自汗出歷節疼不可屈伸此皆飲酒汗出當風所致此節前半節以趺陽寸口之脈求出歷節根原寸口即手太陰動脈陳修園本作少陰者誤也趺陽脈在小兒繫鞋帶處為胃脈之根趺陽脈浮而滑浮為陽氣外出滑則為穀氣實浮則汗自出按宿食篇云脈數而滑者實也此有宿食下之愈外汗出而內有宿食有似陽明府病未可定為歷節故此證當並取決於手太陰動脈太陰脈浮為風邪在太陽弱為血虛營氣不能上承與前證略同風氣著於肌理則濕邪凝沍而血為之痹然但專就寸口而觀可決為汗出當風終不能斷為酒後之汗出當風蓋飲酒汗出當風其肌肉先痹此時不用桂枝湯以發之則濕熱蒸於內而腑濁不行趺陽之脈因見浮滑脾主四肢為統血之藏濕熱壅於胃則脾陽不達於四肢於是營血內停風濕乃日流於關節手太陰動脈因見浮弱太陽病中風脈本浮緩濕痹於外血之熱度愈低乃變浮弱風束於外濕不得泄濕與血併遂成陰寒故疼痛如掣此為歷節之第二因盛壯之人多氣與血脈當浮滑而大反見澀小者濕勝而脾陽不達也短氣者酒濕傷肺也自汗者風主泄也觀中風有汗可知汗本太陽寒水隨陽而出瘀濕內停則寒濕不隨汗解未盡之魄汗一受外風遂與濕併而流入關節故手足節骱處疼痛不可屈伸此為歷節之第三因諸肢節疼痛身體尪羸腳腫如脫頭眩短氣溫溫欲吐桂枝芍藥知母湯主之桂枝芳藥知母湯方桂枝四兩芍藥三兩甘草麻黃附子各二兩炮白朮知母防風各四兩生薑五兩以上九味以水七升煮取二升溫服七合日三服歷節一證大率起於皮毛肌腠陽氣不能外達寒濕遂留於關節此即肢節疼痛所由來所謂不通則痛也身體尪羸者統血之藏久虛不能營養分肉也腳腫如脫者寒濕下注之象也頭眩為血虛西醫謂之腦貧血亦有見於歷節治愈之後者氣短為濕勝病痰飲者多喘濕勝故也獨胃中尚有浮熱故溫溫欲吐溫溫如釜中冷水被炭火下迫釜底時有一漚上浮俗名胃泛桂枝芍藥知母湯方惟知母一味主治欲吐餘則桂芍甘草生薑以通陽而解肌麻黃附子白朮以開表而祛濕防風以祛風方治之妙不可言喻豫嘗治一戴姓婦人親驗之但病因與仲師所舉大有不同乃知肢節疼痛仲師特下一諸字正以其所包者廣也蓋此婦妊娠八月為其夫病求醫抱而乘車病人身重將腹中小兒壓斃夫病愈而妻病腹痛乃求醫醫藥而墮之腐矣妊婦本屬血虛死胎既下因貧不能善後濕毒留頓腹中久乃旁溢肢節死血與寒濕併居因病歷節手足拘攣入夜手足節骱劇痛旦日較緩其為陰寒無疑蓋二年矣豫因用原方以每兩折為二錢用熟附塊四錢二劑不應二診改用生附子汗乃大出兩劑肢節便可屈伸足腫亦小獨手發出大泡有膿有水將成潰爛豫用丁甘仁法用大小薊各五錢丹皮一兩地骨皮四錢以清血熱二劑而痂成四劑而痂脫遂與未病時無異以為可無患矣忽然陰癢難忍蓋濕毒未盡而下注也豫因令其用蛇床子煎湯薰洗良瘥未幾入市購物卒然暈倒諸恙退而血虛之真象見豫乃用大熟地一兩潞黨參五錢川芎當歸各四錢龍骨牡蠣各一兩凡二十餘劑而止今已抱子矣味酸則傷筋筋傷則緩名曰泄鹹則傷骨骨傷則痿名曰枯枯泄相摶名曰斷泄營氣不通衛不獨行營衛俱微三焦無所御四屬斷絶身體羸瘦獨足腫大黃汗出脛冷假令發熱便為歷節也浪如屋巨舟覆順則利濟逆則殺人者均之水也鳥焚巢旅人號炊爨之所需熹出之可畏者均之火也故服食寒暖酸苦辛甘皆當有節於首篇已詳言之今特於歷節證之人皆知酸味之善斂而不知其性最易發酵今試以碱化水投醋其中則如湯之沸溢出盆盎和麵塗傷能去瘀血非以揮發之性力能破血耶此可知酸之所以補肝實因酸味發揚肝藏血液得遂其條達之性而無鬱塞脹痛之病也若味過於酸則血液發揮太甚久且不足以養筋而筋為之緩病在血液旁泄故名曰泄人皆知鹹味之為潤下而不知其性燥烈今試投鹽於熾炭爐中則火力加猛多食鹽而渴者非以苦燥之質足以傷津耶此可知鹹之所以補腎實因鹹味燥烈能排下焦之水而無脅下硬滿之變也若味過於鹹則津液灼爍太甚髓不足以充骨而骨為之痿病在精髓內枯故名曰枯血以發而過泄精以燥而日枯汗液乃不達肌表故曰斷泄營氣不通衛不獨行則陰弱而陽亦微腎陽不能統攝水道故三焦無所御肝陰不能養筋故四屬斷絶血虛而寒濕在下故身羸而足腫血虛而濕勝陽氣不能達表故黃汗時出腋下寒濕流注於足故脛冷以上諸證並屬陰虧濕勝若風寒乘虛鬱其表氣風濕相摶乃外熱發而內疼痛故發熱便為歷節此為歷節之第四因病歷節不可屈伸疼痛烏頭湯主之烏頭湯亦治腳氣疼痛不可屈伸麻黃芍藥黃耆甘草各三兩炙烏頭五枚㕮咀以蜜二升煎取一升即出烏頭上四味以水三升煮取一升去滓內蜜煎中更煎之服七合不知盡服之歷節一證大約寒濕痹於關節陽氣痹於肌表陰痹而陽欲外泄則熱發而黃汗出陽痹而寒濕阻於筋脈則疼痛不可屈伸此為陰寒重症非桂枝芍藥知母湯所能通治故不得已而用烏頭湯亦猶蛔厥重症烏梅丸所不能治不得已而用甘草粉蜜湯也按烏頭為附子之母若芋婆然其顆甚小一枚約有今權三錢五枚則一兩半矣然則麻黃芍藥黃耆炙草之各三兩不當如日知録折成七錢八分矣蓋以兩計可折以枚計則無可折豈古今藥劑權量初無沿革耶否則今日所用之大稱即古人藥劑之權量耶此方重用烏頭以歷節足腫脛冷確定為少陰寒濕而用之與寒疝用大烏頭煎同徐忠可乃謂膝脛不冷似可加黃柏知母夫使膝脛不冷豈可用烏頭五枚耶足見仲師既歿醫家更無通才也礬石湯治腳氣衝心礬石二兩上一味以漿水一斗五升煎三五沸浸腳良方用礬石二兩以漿水一斗五升煎三五沸浸腳良陳修園以為疼痛不可屈伸以烏頭湯主之至於衝心重證似難以外治幸功似也然近世所傳驗方白礬二兩地漿水十大碗掘地灌水和泥取出名曰地漿新杉木三四片煎六七沸用杉木桶盛之浸腳留一半徐徐添入上用衣被圍身使略有微汗洗畢飲稀粥一碗如不愈用前方加硫黃三錢無不愈矣按此方即仲師原方本書尚多脫漏特補出之蓋腳氣一證濕勝於下挾風陽而上升故其氣衝心方中所以用礬者以礬能燥濕故也所以用地漿水者錢乙所謂以土伏水水得其平風自止也所以用杉木者以杉木燥濕能治腳氣腫痛也柳子厚救死方曰得腳氣夜半痞絶脅塊如石昏困且死鄭洵美傳杉木湯食頃大下塊散而氣通用杉木節一升橘葉一升棗兒檳榔七枚打童便三升煎一服下止後服所以使其略有微汗者欲其氣之外散所以加用硫黃者則以硫雖燥熱能引大腸穢濁下行與他藥炎上者不同故衝心之腳氣亦得借引濁下行之力使不上冒也然則方用白礬不如用皂礬為勝以皂礬引濁下行之力與石硫適相等也辛未八月鄉人莊姓病此兩足腫大氣急心痛易飢此證氣分居多而寒濕不甚長女昭華投以加味雞鳴散方用吳萸五錢木瓜五錢檳榔三錢黑豆五錢桔梗三錢青陳皮各三錢蒼白朮各三錢生甘草一錢生耆五錢紫蘇六兩生薑一大塊濃煎服之一夕而足腫全消此八月十四日事也附録之以為臨證之一助又按痛者屬氣分麻木在少腹屬血分豫曾治焦店潘姓用加味四物湯取效方用川芎三錢當歸五錢白芍四錢生地一兩吳萸三錢木瓜三錢生附子二錢防己三錢牛膝一兩三劑而愈與病屬氣分者不同存以備參血痹虛勞病脈證並治第六問曰血痹之病從何得之師曰夫尊榮人骨弱肌膚盛重因疲勞汗出臥不時動搖加被微風遂得之但以脈自微澀在寸口關上小緊宜針引陽氣令脈和緊去則愈血痹初得之狀仲師初無明文但云尊榮之人骨弱肌膚盛重因疲勞汗出臥不事動搖加被微風遂得之自來注家多未明瞭豫特抉其隱情而發之大約與虛勞失精家病原相伯仲耳夫所謂尊榮之人者美人充下陳左擁而右抱臥必晏起納穀不多靜坐終日動時恆少脾陽先已不振脺肉乏吸收作用肌肉雖盛腠理實虛加以內嬖既多精氣遂削精髓空虛骨乃荏弱不受外邪固已不能任事況又入房汗出全身動搖微風襲之血受風遏陽氣不達陰血遂凝此風不受於肩井即受於風池風府以其背在上也故知其臂必麻木背必痠痛平時脈本微澀而關上獨見小緊者正以痹在上部不及中下也此病在草野之夫不足為患獨紈袴少年氣體素弱因而成痹故但需針灸所病之穴俾血從內動即風從外解而緊去脈和矣玩則愈二字此意自見丁甘仁云吾之門診所以多用輕藥者彼固未有重病也亦此意也近有富人金姓多姬侍時發病無錫華宗海一針即愈後宗海離上海求診於黨波平亦如之倘今不異於古所云耶血痹陰陽俱微寸口關上微尺中小緊外證身體不仁如風痹狀黃耆桂枝五物湯主之黃耆桂枝五物湯方黃耆三兩芍藥三兩桂枝三兩生薑六兩大棗十二枚上五味以水六升煮取二升溫服七合日三服病至氣血兩虛與上節本原柔脆正虛病輕者固自不同寸口關上脈微尺中小緊陰血不充陽氣鬱塞之脈證也氣血不通故身體不仁如風痹狀甚則兩足痿弱或更因陽氣閉塞不濡分肉麻木不知痛處此證治法以宣達脾陽俾風邪從肌肉外泄為主故用解肌去風之桂枝湯去甘草而用黃耆者正以補裏陰之虛而達之表分也夫男子平人脈大為勞脈極虛亦為勞陰虛生內熱陽氣外張故脈大陽衰生裏寒陰血不充故脈極虛脈大則發熱脈極虛則惡寒病情詳後文茲不贅男子面色薄主渴及亡血卒喘悸脈浮者裏虛也此節為望色審證及脈而知虛勞之病也面色之厚薄視其人之氣血為轉移氣血充則頰轉豐腴無論赭如渥丹為厚即膚如凝脂亦為厚氣血不充則枯白不華無論面如削瓜為薄即肥白如瓠者亦為薄為其精虧而血少也精虧則生內熱而引水自救故主渴血少則色夭不澤故主亡血此一望而可知者也腎不納氣則喘此為精竭者所必有心營虛耗則悸此為亡血所必至雖喘與悸皆有虛實之辨要惟虛勞之喘坐臥則略定稍動則肩搖而息粗是為卒然而喘與汗出飲水之喘痰飲之喘靜處不能暫停者固不同也虛勞之悸略無驚恐則坦坦如平人若據梧沉思忽聞對座高聲或凝神夜坐忽見燈旁物影不覺怦然大動是為卒然而悸與水氣淩心之悸煩熱之悸絶無間斷者又不同也至謂脈浮為裏虛則為仲師失辭原其意殆指浮取則見重按若無芤脈承上渴及亡血言之否則浮為在表浮則為風傷寒浮緊中風浮緩豈得概謂之裏虛耶男子脈虛沉弦無寒熱短氣裏急小便不利面色白時目瞑兼衄少腹滿此為勞使之然凡脈見沉弦者不主裏水即主表寒衛虛則生寒營虛則生熱故表邪見沉弦者心有寒熱今無寒熱則非表邪可知虛陽不歸其根故短氣裏急者似脹非脹似痛非痛而中氣否塞也小便不利而少腹滿者三焦水道由腎下達膀胱水道得溫則行遇寒則凍腎陽既耗水道遂瘀按此證必兼腰痛嘗見好眠睡忍小便者其腰必痛水瘀腎藏以膨急而傷也否則其膀胱必痛亦以膨急而傷也若夫腎陽以多欲而喪則水藏虛寒其氣不能上下行不上行則與水之上源隔絶而見氣短裏急不下行則下流之輸泄無力而見小便不利少腹急下文雖有小建中一方以治裏急八味腎氣丸以治小便不利自非猛自懲艾實於生命無濟倘如西廂記所云月移花影疑是玉人來雖盧扁其奈之何勞之為病其脈浮大手足煩春夏劇秋冬差陰寒精自出痠削不能行上節面色白時目瞑兼衄當在此節勞之為病下上節言腎陽之虛小便不利與少腹急為連文與下少腹拘急小便不利同面色白三語屬陰虛為此節脫簡今訂正之血虛而陽絡之末空不能上榮顏面因而色白腦為髓海髓之精則以目睛為標精竭而腦虛目睛失養不能勝陽光之逼故時目瞑陰虛而浮陽竄腦腦氣熱則顱骨之縫開故兼衄此證惟目時瞑者為豫所親見豫詩友吳葦青名希鄂者詩才高雋嘗患房勞證畏陽光雖盛暑必以黃布罨窗櫺與人對語時忽然閉目良久人皆謂目力之不濟而不知腦氣不能濡養眸子不能久耐陽光也手足煩為掌心足底皆熱脾陰虛也春夏不勝陽熱故劇秋冬陽氣伏藏故差陰虛之人相火不能蟄藏宗筋易舉易泄而膽火益弱陰頭益冷宜乎髀肉日削欲行不得而一步三折搖矣男子脈浮弱而澀為無子精氣清冷易始乾坤生生之義大矣繫辭傳曰夫乾其靜也專其動也直是以大生焉夫坤其靜也翕其動也闢是以廣生焉其所以象人體者盡人能言之人子始生則母之交骨開故謂之闢寡欲則無二偶而腎陽充故靜專而動直此即大生之義也若男子之脈以陽氣不足而浮弱以精血不足而澀則其腎藏元陽必虛而交感之時精冷而不能有子此證惟羊肉當歸湯足為療治冬令服二三劑定當黍谷回春雖婦人有痛淋者亦能生子屢試而效閲者倘能傳布功德莫大焉豫所定之方用生羊肉三斤當歸四兩生附子一枚生薑四兩附子無麻醉性羊肉不羶生薑不甚辣服此者向無流弊勿懼夫失精家少腹弦急陰頭寒目眩髮落脈極虛芤遲為清穀亡血失精脈得諸芤動微緊男子失精女子夢交桂枝龍骨牡蠣湯主之桂枝龍骨牡蠣湯方桂枝芍藥生薑各三兩甘草二兩大棗十二枚龍骨牡蠣各三兩上七味以水七升煮取三升分溫三服失精之情不同始則有夢而遺是尚有相火也至於不夢亦遺而腎陽始敗矣又其甚則醒時亦遺而腎陽益敗矣少腹弦急濁陰下注而小便不利也陰頭寒精氣虛而寒濕下注宗筋也目之瞳人視腦氣盈虛為出入腦氣以精血兩竭而虛故目眩此與痰飲之眩少陽病之眩不同此與歷節之頭眩同精神恍惚開目則諸物旋轉閉目則略定世傳防眩湯間有特效録之以為救急之助方用黨參半夏各三錢歸芍熟地白朮各一兩川芎山萸各五錢天麻三錢陳皮一錢輕者四五劑可以永久不發豫早年病此嘉定秦芍舲師曾用之惟多川芎三錢耳至今三十年無此病皆芍師之賜也髮者血之餘故少年血盛則黑老年血衰則白至於腎藏虛寒胞中血海之血乃不能合督脈上行於腦腦氣不濡而髮為之落此正如高秋風燥草木黃落者然脈失精則虛亡血則芤下利清穀則遲勞之所以失精者相火不能蟄藏也所以失血者陰氣益虛相火益熾陽根拔於下血海之血乃隨之而上脫也所以下利清穀者人體精血日損水分益寒入胃之水飲以不得溫化而下陷也膽火下竄真陰不守在男子則為失精在女子則為夢交於是脈芤而見動脈微而見緊泄之愈甚陰寒愈急若更以滋陰降火之劑投之則陽氣愈不得升陰液益無統攝故用桂枝湯以扶脾陽加牡蠣龍骨以固腎陰獨怪近世醫家專用生地石斛麥冬知母玉竹黃柏一切陰寒滋膩之品吾不知其是何居心也男子平人脈虛弱細微者喜盜汗也人體血分多於水分則熱度高而脈道利應指者條達而沖和水分多於血分則熱度低而脈道窒應指者虛弱而微細水分多則衛強血分少則營弱凡人醒時則陽氣外達寐則陽氣內守衛所以夜行於陰也衛氣內守則營氣當夜行於陽之時不能外泄故寐者無汗惟衛氣不守營氣從之乃為盜汗盜汗者衛不與營和也按傷寒之例衛不與營和先時以桂枝湯發汗則愈更加龍骨以鎮浮陽牡蠣以抑上逆之水氣則盜汗當止師雖不出方治讀者當觀其通也人年五六十其病脈大者痹俠背行若腸鳴馬刀俠癭者皆為勞得之少年氣血俱盛則脈當實大而動數老年氣血俱虛則脈當虛細而安靜此其常也至於病脈固不盡然人當用力太過陽氣外張則其脈必大此固不可以年齒論然則師言其病脈大痹俠背行者蓋謂勞力陽傷於前陽張汗泄故始病倦怠見浮大之脈毛孔不閉風寒乘之汗液未盡者乃悉化為濕背毛錮於寒濕因俠背而痹但既痹之後陽氣一虛即脈不應大此證初起當與風濕同治麻黃加朮麻黃杏仁薏苡甘草二湯皆可用之至於痹證既成則其脈當微而為黃耆五物證所以然者痹在太陽部分陽氣已為寒濕所困豈有陽氣不達而其脈反大者乎若陰寒內據孤陽外越則其脈亦大陰寒內據則水走陽間而為腸鳴此證不見下利即病腹痛宜四逆理中輩至於外證見馬刀俠癭則脈見弦大時醫以為小柴胡證其實不然馬刀之狀若長形小蚌生於腋下堅硬如石久乃成膿潰爛俠癭生於頸項連連如貫珠初起用旱煙杆中煙油塗之三日即消外科小金丹亦可用之日三服每服二粒以消為度此證雖起於失志鬱怒究與陰疽相類其中必有寒濕結毒小柴胡湯必然無濟若不早治一二年後潰爛不收未有不死者也脈沉小遲名脫氣其人疾行則喘喝手足逆寒腹滿甚則溏泄食不消化也脈沉小而遲是為水寒血敗血分熱度愈低津液不能化氣故名脫氣疾行則喘喝者腎虛不能納氣也血分之熱度弱而又弱故手足逆寒寒水下陷故腹滿而溏泄胃中無火故食不消化按此條在傷寒論中為少陰寒濕證亦當用四逆理中主治脈弦而大弦則為減大則為芤減則為寒芤則為虛虛寒相摶此名為革婦人則半産漏下男子則亡血失精脈弦為陽氣衰脈大而芤為陰氣奪陽衰則中寒陰奪則裏虛兩脈並見其名曰革浮陽不降則陽不攝陰陰不抱陽則精血寒陷此條見婦人雜病篇治婦人半産漏下則有旋覆花湯而男子亡血失精獨無方治而補陽攝陰之法要以天雄散為最勝天雄以溫下寒龍骨以鎮浮陽白朮桂枝以扶中氣而坎離交濟矣黃坤載云後世醫法不傳治此乃用清涼滋潤中氣崩敗水走火飛百不一生今之醫士不可問也諒哉斯言天雄散方天雄三兩炮白朮八兩桂枝六兩龍骨三兩上四味杵為散酒服半錢匕日三服不知稍增之虛勞裏急悸衄腹中痛夢失精四肢痠疼手足煩熱咽乾口燥小建中湯主之小建中湯方桂枝三兩甘草二兩芍藥六兩大棗十二枚生薑三兩飴糖一升上六味以水七升煮取三升去滓內膠飴更上微火消解溫服一升日三服裏急以下諸證用小建中湯此乃第一篇所謂治肝補脾之方治也厥陰含少陽膽火膽實則氣壯而強膽虛則氣餒而悸腹為足太陰部分肝膽之火逆於太陰則腹中痛厥陰之脈絡於陰器膽火下泄則夢失精陰泄於下腦應於上則為衄脾精不行於四肢故四肢痠楚而手足煩熱脾精不上承故咽乾而口燥其病在脾致病之由則為肝膽此證肝膽俱虛而不任瀉故特出建中湯以補脾使肝藏不虛則膽火潛藏豈能泄腎陰而傷脾藏故又云肝虛則用此法也虛勞裏急諸不足黃耆建中湯主之黃耆建中湯方即小建中湯內加黃耆一兩半餘依上法若氣短胸滿者加生薑腹滿者去棗加茯苓一兩半及療肺虛損不足補氣加半夏三兩虛勞一證急者緩之以甘不足者補之以溫上節小建中湯其主方也但小建中湯於陽虛為宜陰陽並虛者恐不能收其全效仲師因於本方外加黃耆以補陰液而即以黃耆建中為主名此外之加減不與焉氣短胸滿加生薑者陽氣上虛故氣短陰干陽位故胸滿因加生薑以散之腹滿所以去棗加茯苓者腹滿為太陰濕聚防其壅阻脾氣也因去大棗加茯苓以泄之濕去而脾精上行然後肺臟得滋溉之益故肺之虛損亦主之補氣所以加半夏者肺為主氣之藏水濕在膈上則氣虛而喘促故納半夏以去水水濕下降則肺氣自調其理甚明陳修園以為匪夷所思不免自矜神祕蓋彼第見俗工以補為補而不知以瀉為補故自負讀書得閒耳虛勞腰痛少腹拘急小便不利者八味腎氣丸主之八味腎氣丸見婦人雜病篇虛勞腰痛少腹拘急小便不利此腎陽不充之證也腎臟虛寒則水濕不能化氣膨急於上則腰痛膨急於下則少腹拘急此證仲師主以崔氏八味丸然豫曾用之絶然不應乃知陳修園易以天雄散為不刊之論也原腎臟所以虛寒者則以腎陽不藏之故腎陽不藏則三焦水道得溫而氣反升水欲下泄虛陽吸之此水道所以不通也方用龍骨天雄以收散亡之陽白朮補中以制逆行之水桂枝通陽以破陰霾之寒於是天晴雲散水歸其壑矣虛勞諸不足風氣百疾薯蕷丸主之薯蕷丸方薯蕷三十分人參七分白朮六分茯苓五分甘草二十八分當歸十分乾地黃十分芍藥六分芎藭六分麥冬六分阿膠七分乾薑三分大棗百枚為膏桔梗五分杏仁六分桂枝十分防風六分神麴十分豆黃卷十分柴胡五分白斂二分上二十一味末之煉蜜和丸如彈子大空腹酒服一丸一百丸為劑虛勞諸不足是為正虛風氣百疾是為邪實正虛則不勝表散邪實則不應調補此盡人之所知也若正虛而不妨達邪邪實而仍應補正則非盡人之所知也仲師虛勞篇於黃耆建中八味腎氣丸已舉其例復於氣血兩虛外感風邪者出薯蕷丸統治之方所用補虛凡十二味舍薯蕷麥冬阿膠大棗外實為後人八珍湯所自出去風氣百疾者凡九味白斂能散結氣治癰疽瘡腫斂瘡口愈凍瘡出箭鏃止痛大率能通血絡壅塞而排泄之力為多蓋風之中人肌腠外閉而脾陽內停方中用白斂所以助桂枝之解肌也風中皮毛則肺受之肺氣被阻咳嗽乃作方中用桔梗杏仁所以開肺也氣血兩虛則血分熱度愈低因生裏寒方中用乾薑所以溫裏也風氣外解必須表汗然其人血虛設用麻黃以發之必致亡陽之變故但用防風柴胡豆卷以泄之且風著肌肉脾陽內停胃中不無宿垢胃納日減不勝大黃枳實故但用神麴以導之要之補虛用重藥懼不勝邪也開表和裏用輕藥懼傷正也可以識立方之旨矣虛勞虛煩不得眠酸棗仁湯主之酸棗仁湯方酸棗仁二升甘草一兩知母茯苓各二兩芎藭一兩上五味以水八升煮酸棗仁得六升內諸藥煮取三升分溫三服酸棗仁湯之治虛煩不寐豫既屢試而親驗之矣特其所以然正未易明也胃不和者寐不安故用甘草知母以清胃熱藏血之藏不足肝陰虛而濁氣不能歸心心陽為之不斂故用酸棗仁以為君夫少年血盛則早眠而晏起老年血氣衰則晚眠而晨興酸棗仁能養肝陰即所以安魂神而使不外馳也此其易知者也惟茯苓川芎二味殊難解說蓋虛勞之證每兼失精亡血失精者留濕亡血者留瘀濕不甚故僅用茯苓茯苓無真者豫每用豬苓澤瀉以代之取其利濕也瘀不甚故僅用川芎此病後調攝之方治也五勞虛極羸瘦腹滿不能飲食食傷憂傷飲傷房室傷飢傷勞傷經絡營衛氣傷內有乾血肌膚甲錯兩目黯黑緩中補虛大黃蟅蟲丸主之大黃蟅蟲丸方大黃十分蒸黃芩二兩甘草三兩桃仁一升杏仁一升芍藥四兩乾地黃十兩乾漆一兩燒令煙盡虻蟲一升去翅足熬水蛭百枚熬蠐螬百枚熬蟅蟲半升熬上十二味末之煉蜜和丸小豆大酒服五丸日三服大黃蟅蟲丸主治為五勞虛極羸瘦腹滿不能飲食外證則因內有乾血肌膚甲錯兩目黯黑立方之意則曰緩中補虛夫桃仁芍藥乾漆所以破乾血芍藥破血人多不信試問外科用京赤芍何意加以虻蟲水蛭蠐螬蟅蟲諸物之攻瘀蟅蟲俗名地鱉蟲多生竈下垃圾中傷藥中用之以攻瘀血今藥肆所用硬殼黑蟲非是有實也大黃以瀉之有熱也杏仁黃芩以清之其中惟甘草緩中乾地黃滋養營血統計全方似攻邪者多而補正者少仲師乃曰緩中補虛是有說焉譬之強寇在境不痛加剿除則人民無安居之日設漫為招撫適足以養疽遺患是攻瘀即所以緩中緩中即所以補虛也今有患陽明實熱者用大承氣湯不死用滋陰清熱之藥者終不免於死則本方作用可以比例而得之矣肺痿肺癰咳嗽上氣病脈證治第七問曰熱在上焦者因咳為肺痿肺痿之病從何得之師曰或從汗出或從嘔吐或從消渴小便利數或從便難又被快藥下利重亡津液故得之熱在上焦二語為仲師所嘗言見下五藏風寒積聚篇茲特借此發問以研求肺痿所從來夫既稱熱在上焦便當知上焦在人體中居何部位焦字究屬何義固不當如庸工所言三焦有名而無形也蓋上焦在胸中即西醫所謂淋巴幹為發水成汗輸出毛孔作用中焦在胃底即西醫所指脺肉中醫即謂之脾陽為吸收小腸水液由上焦輸入肺臟作用散布未盡之水液乃由肺下降由腎臟注膀胱是為下焦合上中下三部觀之方顯出焦字之義譬之釜中煮飯蒸氣上浮其飯始乾蒸氣化水仍回於下釜底之飯久久而焦可見焦之為義為排泄水液之統名而排泄作用實由於少陽膽火師言熱在上焦因咳為肺痿便可知病由燥熱矣故仲師歷舉燥熱之病由以答之曰或從汗出者肺主皮毛呼吸與之相應太陽表汗由肺外出皮毛汗出太多則肺藏燥曰或從嘔吐者嘔吐為膽胃上逆膽胃氣燥則上灼肺藏肺藏之液與之俱涸曰或從消渴者消則膽火逼水液而泄出腎膀渴則胃中熱而引水自救隨消隨渴則肺藏之液以涸曰小便利數者肺為水之上源水從下焦一泄無餘則上源告竭曰或從便難又被快藥下利重亡津液者大腸與肺為表裏大腸燥則肺臟與之俱燥此其所以寖成肺痿也按以上所列病由俱出燥熱以視肺癰但有虛實之別耳故治此證者火逆之麥門冬湯肺癰之千金葦莖湯並可借用仲師固未出方治也按內經云肺熱葉焦則生痿躄蓋上源絶則下流涸津液枯燥不濡筋脈而兩足攣急此因痿成躄之證豫於沈松壽親見之蓋始則病後能食繼則便難終則腳攣急故治痿獨取陽明也章次公在紅十字會治痿證用大承氣及鮮生地玉竹知母等味重劑五劑而瘥是時襄診者為盧扶搖病者始則兩足不能移動繼則自行走去蓋步履如常矣曰寸口脈數其人咳口中反有濁唾涎沫者何師曰為肺痿之病若口中辟辟燥咳即胸中隱隱痛脈反滑數此為肺癰咳吐膿血脈數虛者為肺痿數實者為肺癰上文但舉肺痿病由然猶未詳肺藏燥熱之脈證何如也曰寸口脈數熱在肺也曰其人咳氣上逆也脈數而氣逆病當口燥乃口中反有粘膩之濁唾涎沫可見肺藏之津液被燥氣蒸逼悉化痰涎故可決為肺痿所以別於肺癰者以其津液隨熱外泄而不內閉也至於口中辟辟作聲燥咳無津每咳則胸中隱隱作痛便可決為肺癰癰者壅也蓋此證肺絡為外邪壅塞鬱而生熱熱傷血滯因而成癰風襲於肺故咳血鬱成脹故胸中隱隱作痛血絡壅則營分熱度增高故脈數肺中熱鬱血腐故咳吐膿血要之肺痿之與肺癰皆出於熱不過為虛實之辨故脈數相似浮而虛者為痿滑而實者為癰也問曰病咳逆脈之何以知其為肺癰當有膿血吐之則死其脈何類師曰寸口脈浮而數浮則為風數則為熱浮則汗出數則惡風風中於衛呼氣不入熱過於營吸而不出風傷皮毛熱傷血脈風舍於肺其人則咳口乾喘滿咽燥不渴多吐濁沫時時振寒熱之所過血為之凝滯畜結癰膿吐如米粥始萌可救膿成則死咳逆之證有痰飲有風邪有水氣所以決定為肺癰者要有特異之脈證肺癰之死證固以吐膿血為最後一步要其最初病因則甚輕揆仲師所舉脈證特為中風失治中風之證其脈浮發熱自汗惡寒此宜桂枝湯以發之者也今曰寸口脈浮而數浮則為風數則為熱浮則汗出數則惡風風中於衛呼氣不入熱過於營吸而不出其與太陽中風發熱汗出鼻鳴乾嘔者何異若早用桂枝湯以發其汗宜必無肺癰之病惟其失時不治致風熱內陷肺藏久久寖成肺癰究其所以然風傷皮毛則內舍於肺熱傷肺絡則變為咳嗽但初見口乾喘滿咽燥不渴多唾濁沫時時振寒雖非若前此之桂枝湯證苟能清燥救肺其病猶易愈也惟其熱鬱肺藏肺中血絡凝阻若瘡瘍然其始以血絡不通而痛痛之不已遂至蒸化成膿吐如米粥則內癰已成始萌尚有方治膿潰則萬無一生此肺癰之大略也上氣面浮腫肩息其脈浮大不治又加利尤甚上氣喘而躁者此為肺脹欲作風水發汗則愈腎不納氣則氣上衝肺氣壅塞則氣亦上衝但面浮腫則痿黃而不澤肩息則氣短而不伸加以浮大之脈則陽氣將從上脫故曰不治又加下利則陽脫於上陰竭於下也此上氣以肺腎兩虛而不治者也若夫喘逆而躁疾則為肺實而脹為風遏太陽寒水不能外達皮毛之證欲作風水則為風水未成蓋風水既成必至一身盡腫此證獨無故曰發其汗即愈麻黃加朮湯越婢湯小青龍湯俱可隨證酌用此上氣以肺實而易愈者也肺痿吐涎沫而不咳者其人不渴必遺尿小便數所以然者以上虛不能制下故也此為肺中冷必眩多涎唾甘草乾薑湯以溫之若服湯已渴者屬消渴甘草乾薑湯方甘草四兩炙乾薑二兩炮上二味㕮咀以水三升煮取一升五合去滓分溫再服痿之言萎若草木然烈日暴之則燥而萎水澤漬之則腐而萎本條吐涎沫而不渴之肺痿與上燥熱之肺痿要自不同所謂不渴必遺尿小便數者上無氣而不能攝水也氣有餘即是火氣不攝水則肺中無熱可知然則仲師所謂肺中冷實為肺寒眩為水氣上冒多涎唾則寒濕在上也故宜甘草乾薑湯以溫之陳修園以為冷淡之冷不可從不然服湯已而渴者何以屬燥熱之消渴耶便可知甘草乾薑方治專為寒肺痿設矣又按傷寒太陽篇乾薑甘草湯治誤用桂枝湯發汗傷其脾陽而手足見厥冷而設故作乾薑甘草湯以復其陽便當厥愈足溫但治厥倍乾薑治痿倍甘草耳此亦虛寒用溫藥之明證也此方治寒肺痿要為升發脾精上滋肺藏而設章次公云咳而上氣喉中水雞聲射干麻黃湯主之射干麻黃湯方射干三兩麻黃生薑各四兩細辛紫菀款冬花各三兩大棗七枚半夏半升五味子半升上九味以水一斗二升先煮麻黃兩沸去上沫內諸藥煮取三升分溫三服太陽水氣不能作汗外泄則留著胸膈而成寒飲飲邪上冒則為咳胸有留飲吸入之氣不順則為上氣呼吸之氣引胸膈之水痰出納喉間故喉中如水難聲格格而不能止此固當以溫藥和之者也故射干麻黃湯方治麻黃細辛半夏五味子並同小青龍湯惟降逆之射干利水之紫菀本草匯云能通小便散寒之生薑止咳之款冬和中之大棗則與小青龍湯異究其所以然咳而上氣之證究為新病不似痰飲之為痼疾及時降氣泄水開肺散寒尚不至寖成痰飲外此若細辛之治咳五味之治氣衝生麻黃之散寒生半夏之去水不惟與小青龍湯同並與苓甘五味薑辛半夏湯同可以識立方之旨矣咳逆上氣時時吐濁但坐不得眠皂莢丸主之皂莢丸方皂莢八兩刮去皮酥炙蜜丸梧子大以棗膏和湯服三丸日三夜一服上節云咳而上氣是不咳之時其氣未必上衝也若夫咳逆上氣則喘息而不可止矣此證惟背擁疊被六七層尚能垂頭而睡倘疊被較少則終夜嗆咳所吐之痰黃濁膠粘此證豫於宣統二年侍先妣邢太安人病親見之先妣平時喜食厚味又有煙癖厚味被火氣熏灼因變濁痰氣吸於上大小便不通豫不得已自製皂莢丸進之長女昭華煎棗膏湯如法晝夜四服以其不易下咽也改丸如菉豆大每服九丸凡四服浹晨而大小便通可以去被安睡矣後一年聞晉鄉城北朱姓老婦以此證坐一月而死可惜也咳而脈浮者厚朴麻黃湯主之咳而脈沉者澤漆湯主之厚朴麻黃湯方厚朴五兩麻黃四兩石膏如雞子大杏仁半升半夏半升乾薑細辛各二兩小麥一升五味子半升上九味以水一斗二升先煮小麥熟去滓納諸藥煮取三升溫服一升日三服澤漆湯方半夏半升紫參一本作紫菀生薑白前各五兩甘草黃芩人參桂枝各三兩澤漆三升以東流水五斗煮取一斗五升澤漆即大戟苗性味功用與大戟相同今滬上藥肆無此藥即用大戟可也上九味㕮咀內澤漆湯中煮取五升溫服五合至夜盡咳而脈浮水氣在胸膈間病情與痰飲同咳而脈沉水氣在脅下病情與痰飲異惟病原等於痰飲故厚朴麻黃湯方治略同小青龍湯所以去桂枝芍藥甘草者桂芍甘草為桂枝湯方治在傷寒論中原所以扶脾陽而泄肌腠中醫所謂脾即西醫所謂脺在胃底為吸收小腸水氣發舒津液作用屬中焦此證咳而脈浮水氣留於胸膈胸中行氣發水作用西醫謂之淋巴幹中含乳糜屬上焦去桂芍甘草加厚朴者正以厚朴去濕寬胸能疏達上焦太多之乳糜故也人體之中胃本燥熱加以胸膈留飲遏而愈熾所以加石膏者清中脘之熱則肺氣之下行者順也所以加小麥者咳則傷肺飲食入胃由脾津上輸於肺小麥之益脾精正所以滋肺陰也婦人藏燥悲傷欲哭用甘麥大棗悲傷欲哭屬肺虛三味皆補脾之藥可為明證也此厚朴麻黃湯大旨以開表蠲飲為主治者也惟病原異於痰飲故澤漆湯方治君行水之澤漆本草利大小腸治大腹水腫而去水之生半夏利水之紫菀佐之原作紫參非咳在上則肺熱不降故用黃芩以清之白前以降之水在下則脾藏有寒故用生薑以散之桂枝以達之水氣在下則胃氣不濡故用人參甘草以益之此澤漆湯大旨以去水肅肺和胃為主治者也火逆上氣咽喉不利止逆下氣麥門冬湯主之麥門冬湯方麥門冬七升半夏一升人參甘草各二兩粳米三合大棗十二枚上六味以水一斗二升煮取六升溫服一升日三夜一服火逆一證為陽盛劫陰太陽篇所謂誤下燒針因致煩燥之證也蓋此證胃中津液先虧燥氣上逆傷及肺藏因見火逆上氣胃中液虧則咽中燥肺藏陰傷則喉中梗塞咽喉所以不利也麥門冬湯麥冬半夏以潤肺而降逆人參甘草粳米大棗以和胃而增液而火逆可愈喻嘉言不知肺胃同治之法漫增清燥救肺湯則不讀書之過也肺癰喘不得臥葶藶大棗瀉肺湯主之葶藶大棗瀉肺湯方葶藶熬令黃色搗丸如彈子大大棗十二枚上先以水三升煮棗取二升去棗內葶藶煮取一升頓服咳而胸滿振寒脈數咽乾不渴時出濁唾腥臭久久吐膿如米粥者為肺癰桔梗湯主之桔梗湯方桔梗一兩甘草二兩上以水三升煮取一升分溫再服則吐膿血也肺為主氣之藏風熱壅阻肺竅吸氣不納呼氣不出則喘喘急則欲臥不得疊被而倚息證情與但坐不得眠之咳逆上氣者相近但不吐濁耳癰膿未成但見脹滿故氣機內閉而不順此證與支飲不得息者同為肺滿氣閉故宜葶藶大棗瀉肺湯直破肺藏之鬱結用大棗者恐葶藶猛峻傷及脾胃也此與皂莢丸用棗膏湯同法至如咳而胸滿蓋即喘不得臥之證見於內藏者熱鬱於肺皮毛開而惡風故振寒血熱內熾故脈數肺液被風熱灼爍故咽乾口多涎沫故不渴要其始萌胸中便隱隱作痛時出濁唾腥臭至於失時不治吐膿如米粥則肺癰已成桔梗湯方治桔梗開泄肺氣兼具滑澤之鹼性以去滋垢倍甘草以消毒使膿易吐出而癰自愈矣排膿湯之用桔梗亦即此意劇者赤小豆此即雜糧市中赤豆當歸散亦可用之熱重者千金葦莖湯亦可用之葦莖即蘆根瓜瓣不知何物許半龍章次公俱以冬瓜仁代之亦通蓋冬瓜仁在腸癰大黃牡丹湯方治中為保肺泄腸之品也惟犀黃丸一方最為消毒上品初起時服之一料無不愈者方用犀黃五分元寸五分淨乳香沒藥各二兩先將乳沒研細然後和入犀黃元寸加糯米粉五錢搗和為丸如秫米大每服三錢又有俗傳單方用隔年鹹芥滷每日半杯和豆腐漿飲之胸中梗塞頃之吐出膿血日進一服吐至無膿為度而癰即愈矣此皆補經方所未備俾濟世者資采擇焉辛未七月望後豫治浦東陳姓一證胸中痛咯痰腥臭如米粒初診用桔梗一兩甘草五錢五劑而胸痛止二診用葶藶五錢黑棗十二枚五劑而如米粒之膿盡三診用千金葦莖湯五劑而腥臭盡豈知病根未拔九月初十日復來咯痰腥臭如昔但不似米粥耳豫仍用桔梗湯加冬瓜仁昆布海澡大小薊以消餘毒另授以犀黃丸九錢令其日進一服病者遂不復至蓋已愈矣考肺癰初起腳骨必痛或舌下腫起一粒以刀針破之膿已成者其血紫黑未成者淡紅服犀黃丸百不一失醫者審之己巳三月長女昭華治愈王姓肺癰亦用犀黃丸取效附録之以告同志咳而上氣此為肺脹其人喘目如脫狀脈浮大者越婢加半夏湯主之越婢加半夏湯方麻黃六兩石膏半斤生薑三兩大棗十五枚甘草二兩半夏半升上六味以水六升先煮麻黃去上沫內諸藥煮取三升分溫三服肺脹咳而上氣煩躁而喘脈浮者心下有水小青龍加石膏湯主之小青龍加石膏湯方麻黃芍藥桂枝細辛乾薑甘草各三兩五味子半夏各半升石膏二兩上九味以水一斗先煮麻黃去上沫內諸藥煮取三升強人服一升羸者減之日三服小兒服四合咳而上氣為心下有水為咳嗽吸引而上衝不咳之時則其氣如平與咳逆上氣之全係燥熱不同前條已詳辨之惟水氣所從來則起於太陽失表汗液留積胸膈間暴感則為肺脹寖久即成痰飲使其內藏無熱則雖不免於咳必兼見惡寒之象惟其裏熱與水氣相摶乃有喘咳目如脫狀或喘而並見煩躁要之脈浮者當以汗解浮而大則裏熱甚於水氣故用越婢加半夏湯重用石膏以清裏而定喘脈但浮則水氣甚於裏熱故用蠲飲之小青龍湯加石膏以定喘重用麻桂薑辛以開表溫裏而石膏之劑量獨輕觀麻杏石甘之定喘當可悟二方之旨矣奔豚氣病脈證第八師曰病有奔豚有吐膿有驚怖有火邪此四部病皆從驚發得之此一節因奔豚起於驚發而連類以及他證吐膿為肺癰桔梗甘草湯證也見上篇誤列百合狐惑篇之赤小豆當歸散腸癰方治亦可用之火邪有太陽陽熱以火薰下陷胞中圊膿血者仲師未出方治竊意當用桃核承氣湯以下之亦有太陽寒水因灸而陷下焦邪無從出腰以下重而痹者俟其陽氣漸復乃能汗出而解並見太陽篇獨驚怖一證未見太陽病加溫針必驚火劫亡陽則為驚狂此本桂枝去芍藥加蜀漆龍骨牡蠣證豫謂暴感非常而病驚怖者病情正與此同所以然者以二證竝有熱痰上竄腦部故也特無太陽表證者但用蜀漆龍骨牡蠣已足仲師以其與奔豚同出一原故類舉之耳師曰奔豚病從少腹上衝咽喉發作欲死復還止皆從驚恐得之奔豚氣上衝胸腹痛往來寒熱奔豚湯主之奔豚湯方甘草芎藭當歸黃芩芍藥各二兩半夏生薑各四兩生葛五兩甘李根白皮一升上九味以水二斗煮取五升溫服一升日三夜一服奔豚之病少腹有塊墳起發作從下上衝或一塊或二三塊大小不等或併而為一方其上衝氣促而痛及其下行其塊仍留少腹氣平而痛亦定但仲師言從驚恐得之最為精確與難經所云從季冬壬癸日得之者奚啻鄭昭宋聾之別豫嘗治平姓婦其人新産會有仇家到門尋釁毀物漫罵惡聲達戶外婦大驚怖嗣是少腹即有一塊數日後大小二塊時上時下腹中劇痛不可忍日暮即有寒熱豫初投以炮薑熟附當歸川芎白芍二劑稍愈後投以奔豚湯二劑而消惟李根白皮為藥肆所無其人於謝姓園中得之竟得痊可蓋亦有天幸焉發汗後燒針令其汗針處被寒核起而赤者必發奔豚氣從少腹上至心炙其核上各一壯與桂枝加桂湯主之桂枝加桂湯方桂枝五兩芍藥生薑各三兩甘草二兩炙大棗十二枚上五味以水七升微火煮取三升去滓服一升傷寒論此節發端無發汗後三字蓋衍文也燒針令發汗本桂枝湯證先服桂枝湯不解刺風池風府却與桂枝湯則愈之證乃針後不用桂枝湯風邪未能外泄寒氣乘虛而閉針孔夫風池本少陽之穴風府以督脈之穴而屬少陰二穴為寒邪所遏則少陽抗熱挾少陰衝氣一時暴奔而上此所以針處核起而赤必發奔豚也故仲師救逆之法先灸核上與桂枝加桂湯此即先刺風池風府却與桂枝湯之成例所以汗而泄之不令氣機閉塞吸而上衝也餘詳傷寒發微太陽篇茲不贅發汗後臍下悸者欲作奔豚茯苓桂枝甘草大棗湯主之茯苓桂枝甘草大棗湯方茯苓半斤甘草二兩大棗十五枚桂枝四兩上四味以甘瀾水一斗先煮茯苓減二升內諸藥煮取三升去滓溫服一升日三服甘瀾水法取水二斗置大盆內以杓揚之上有珠子五六千顆相逐取用之也發汗則傷陽陽虛而水氣上淩則臍下悸欲作奔豚者不過水氣為浮陽吸引而非實有癥瘕也故仲師苓桂甘棗湯方治用茯苓以抑水桂枝以通陽甘草大棗培中氣而厚堤防使水邪不得上僭復煎以甘瀾水揚之至輕使不助水邪之上僭臍下之悸平奔豚可以不作矣餘詳傷寒太陽篇茲不贅胸痹心痛短氣病脈證治第九師曰夫脈當取太過不及陽微陰弦即胸痹而痛所以然者責其極虛也今陽虛知在上焦所以胸痹心痛者以其陰弦故也診病者之脈陽有餘陰不足則為發熱自汗之中風以陽有餘而陰不足也故其脈右浮而左弱陽不足陰有餘則為胸膈引痛之胸痹故其脈右微而左弦營弱而衛強故脈有太過不及陽虛而陰盛故脈亦有太過不及胸痹之證陽氣虛於上而陰寒乘之之證也陽氣主上陽脈微故知在上焦上焦在胸中西醫謂之淋巴幹為發抒水液之總機微管中並有乳糜乳糜停阻則凝結而痛心之部位在胸中故曰胸痹心痛與心中堅痞在心中俱為仲師失辭脈弦為有水為陰寒水氣與寒並結胸中故痛是可於左脈沉弦決之平人無寒熱短氣不足以息者實也其人素無他病忽然肺竅氣短而呼吸不順非留飲阻於膈上即宿食留於中脘與胸痹之陰寒上僭者不同法當蠲飲導滯仲師以其與胸痹相似而舉之使人知虛實之辨也胸痹之病喘息咳唾胸背痛短氣寸口脈沉而遲關上小緊數栝蔞薤白白酒湯主之栝蔞薤白白酒湯方栝蔞實一枚搗薤白半升白酒七升上三味同煮取二升分溫再服凡人勞力則傷陽耐夜則寒襲然而採芙蓉膏澤一榻明燈冒城郭星霜五更寒柝卒不病此者蓋以臥者陽不散行者陽獨張也惟勞力傴僂之人往往病此豫向者在同仁輔元堂親見之病者但言胸背痛脈之沉而澀尺至關上緊雖無喘息咳吐其為胸痹則確然無疑問其業則為縫工問其病因則為寒夜傴僂製裘裘成稍覺胸悶久乃作痛豫即書栝蔞薤白白酒湯授之方用瓜蔞五錢薤白三錢高梁酒一小杯二劑而痛止翌日復有胸痛者求診右脈沉遲左脈弦急氣短問其業則亦縫工其業同其病同脈則大同而小異豫授以前方亦二劑而瘥蓋傴僂則胸膈氣凝用力則背毛汗泄陽氣虛而陰氣從之也惟本條所舉喘息咳唾所見二證皆無之當移後節不得臥上為其兼有痰飲也胸痹不得臥心痛徹背者栝蔞薤白半夏湯主之栝蔞薤白半夏湯方栝蔞實一枚搗薤白三兩半夏半升白酒一斗上四味同煮取四升溫服一升日三服咳而上氣時吐濁但從不得眠與此證不得臥相似惟不見黃厚膠痰則非皂莢丸證可知咳逆倚息不得臥為風寒外阻吸起痰飲與此證不得臥同而心痛徹背為獨異則非小青龍湯證可知夫肺與皮毛束於表寒則寖成留飲甚至倚息不得臥惟胸背痛為胸痹的證固當從本證論治特於前方加生半夏以蠲飲所以別於前證也胸痹心中痞氣氣結在胸胸滿脅下逆搶心枳實薤白桂枝湯主之人參湯亦主之枳實薤白桂枝湯方枳實四枚薤白半斤桂枝一兩厚朴四兩栝蔞實一枚搗上五味以水五升先煮枳實厚朴取二升去滓內諸藥煮數沸分溫三服人參湯方人參甘草乾薑白朮各三兩上四味以水八升煮取三升溫服一升日三服寒縛於表而肺氣內停清陽之位固已為陰霾所據日久遂變痰涎痰積於上故胸中痞氣留積不散胸中為上焦發水行氣之道路下焦水道由腎下接膀胱腎膀並在脅下胸中阻塞脅下水氣為陰霾所吸乃從脅下逆行衝迫心下嘗見土潤溽暑之時雲陰晝晦地中水氣為在上蒸氣吸引暴奔於上俗名掛龍自非雷以動之風以散之雨以降之安在於頃刻之間俾天光下濟枳實栝蔞實達痰下行譬之雨薤白通陽譬之雷厚朴燥濕譬之風而胸中陰霾之氣乃一泄無餘矣上無所引則下無所吸但得胸滿一去而脅下之逆搶自定至於人參湯一方乃服湯後調攝之方而非胸痹正治明者辨之胸痹胸中氣塞短氣茯苓杏仁甘草湯主之橘枳生薑湯亦主之茯苓杏仁甘草湯方茯苓三兩杏仁五十個甘草一兩上三味以水一斗煮取五升溫服一升日三服不差更服橘枳生薑湯方橘皮一斤枳實三兩生薑半斤上三味以水五升煮取二升分溫再服胸中氣塞其源有二一由水停傷氣一由濕痰阻氣水停傷氣以利水為主而用茯苓為君佐杏仁以開肺甘草以和中而氣自順濕痰阻氣以疏氣為主而君橘皮枳實以去痰生薑以散寒而氣自暢證固尋常方亦平近初無深意者也胸痹緩急者薏苡附子散主之薏苡附子散方薏苡仁十五兩大附子十枚炮上二味杵為散服方寸匕日三服胸痹緩急仲師以薏苡附子散為主治之方薏苡去濕附子散寒此固盡人能言之但緩急二字畢竟當作何解病狀未知而妄議方治恐亦誤人不淺也蓋胸為太陽出入之道路濕痹則痛平時痛緩遇寒則痛急故謂之緩急方用薏苡以去濕大附子以散寒欲藥力之厚故散而服之病不可以急攻故緩而進之方中薏苡用至十五兩大附子十枚以今權量計大附子每枚當得一兩半則十枚亦得十五兩矣誰謂古今權量之不同耶心中痞諸逆心懸痛桂枝生薑枳實湯主之桂枝生薑枳實湯方桂枝生薑各三兩枳實五兩上三味以水六升煮取三升分溫三服濕痰阻於膈上則心陽以不達而痞心陽不達則胸中之陽氣虛陽虛於上腎邪淩之衝氣逆之而心為之懸痛治之者當伏其所主扶心陽破濕痰則痞去而痛止矣此用桂枝枳實生薑之意也心痛徹背背痛徹心烏頭赤石脂丸主之烏頭赤石脂丸方烏頭一分炮蜀椒乾薑各一兩附子半兩赤石脂一兩上五味末之蜜丸如桐子大先食服一丸日三服不知稍加服前證心痛徹背既出栝蔞薤白半夏湯方治矣此並見背痛徹心之證其不當以前方混治固不待言按五藏風寒積聚篇云心中寒者其人苦病心如噉蒜狀劇者心痛徹背背痛徹心譬如蟲注脈浮者自吐乃愈然心何以中寒何以如噉蒜狀痛何以如蟲注何以自吐乃愈與烏頭赤石脂丸證是一是二是皆不可知也蓋此證與胸痹同陽微於上陰乘於下也如噉蒜者形容無可奈何之狀諺所謂猢猻吃辣胡椒也注之言竄背方痛而已竄於心心方痛而又竄於背一似蟲之竄於前後故如蟲注心陽衰微陰寒乘之自生濕痰自吐乃愈者吐其濕痰心陽始不受困也蓋此即烏頭赤石脂丸證以腎邪之淩心也故用烏頭附子以其如蟲注也故用蜀椒濕痰有蟲蜀椒有殺蟲之功而並溫化濕痰以其寒也故用乾薑以水邪之上僭也故用止澀之赤石脂觀桃花湯及赤石脂禹餘糧湯可見止水功用方中烏頭炮用附子生用一以固表陽一以去腎寒其中皆有深意獨怪近日藥肆至於不備生附子有書於方箋者反以為怪則庸工之教也脈浮者能吐故無方治此證脈必沉緊故別出方治如此腹滿寒疝宿食病脈證治第十趺陽脈微弦法當腹滿不滿者必便難兩胠疼痛此虛寒從下上也當以溫藥服之趺陽脈在足背為胃脈之根其脈當滑大而和今以微弦之脈見於趺陽是謂陰加於陽陰邪上逆是生脹悶譬之甕水堅冰沃以沸湯猶恐不濟稍事遲疑則砉然崩裂矣所以然者寒之力百倍於熱也是故寒入太陰則腹滿不滿亦必痰涎壅阻浸成痼瘕而大便不通寒水上逆則水道不行而兩胠疼痛兩胠為下焦水道從出之路寒水膨則腰中痛引兩胠所謂虛寒從下上者為水邪將上干陽位也仲師但言溫藥服之而未出方治竊意當用大黃附細辛湯所以然者以腹滿兼有寒痰故也門人俞哲生言腹滿脈弦者無宿食宜附子粳米湯便難者有宿食故宜溫下亦通病者腹滿按之不痛為虛痛者為實可下之舌黃未下者下之黃自去同一腹滿要有陰寒宿食之辨宿食則按之而痛不按亦痛陰寒亦有時而痛按則痛止然證情時有變遷不當有先入之見豫曾與丁濟華治肉鋪范姓一證始病喜按既服四逆湯而愈矣翌日劇痛按之益甚濟華決為大承氣證書方授之明日問其姪愈矣又與陳中權黃彝鼎診葉姓女孩始病腹滿不食渴飲不寐既下而愈矣翌日病者熱甚豫乘夜往診脈虛弦而面載陽乃用附子理中湯一劑而瘥可見腹滿一證固有始病虛寒得溫藥而轉實者亦有本為實證下後陰寒乘虛而上僭者倘執而不化正恐誤人不淺也至於舌苔黃厚或焦黑大承氣一下即愈此庸工能知之不具論腹滿時減復如故此為寒當與溫藥腹滿不減減不足言仲師既出大承氣方治矣此却以時減時滿為寒知虛實之辨即在減與不減矣蓋宿食有形陰寒無形有形者不能減無形者能減此人之所易知也嘗視同鄉章向青腹滿證病經半載馬澤人投以熟附子則稍減豫改用生附子三錢佐以乾薑白朮五六劑減其太半六月中至上海以方示惲鐵樵以為不必再服由惲處方服之無效後赴丹陽訪賀醫乃用海參腸韭菜子等味曰及此濕令治愈乃不復發回江陰後服至十餘劑病乃大痊乃知去病方治不可太過也病者痿黃燥而不渴胸中寒實而利不止者死病者痿黃寒濕之象也燥而不渴寒濕隔於中脘胃中無熱而津不上輸也胸中寒實而利下不止是為上下俱寒生陽俱絶故仲師以為必死然用大劑朮附以回陽用去濕之赤石脂禹餘糧以止澀下焦或亦當挽救一二也寸口脈弦者即脅下拘急而痛其人嗇嗇惡寒也寸口脈弦者即太陽病浮緊之脈太陽之脈出腦下項夾脊抵腰中太陽本寒入裏故脅下拘急而痛嗇嗇惡寒病在皮毛此當用葛根湯使下陷之寒邪循經上出而外達皮毛便當一汗而愈蓋脅下之拘急原等於項背強也夫中寒家喜缺其人清涕出發熱色和者善嚏中寒其人下利以裏虛也欲嚏不能此人肚中寒寒有微甚不同輕者在肺是為表寒重者在肚是為裏寒不曰在胃而曰在肚者以太陽寒水與太陰濕土混雜病在脾而不在胃也胃氣鬱而欲伸故喜缺肺竅之氣經寒化水故清涕出善嚏者清寒入肺竅肺中熱氣與之相衝激也體中之血與寒相抗故發熱寒不入營故色和此證俗名傷風以荊防薑蘇煎薰頭面而即愈者也但失此不治寒水陷入太陰即病下利寒入於裏不得外泄故欲嚏不得此時惟有重用五苓散使水氣從小便出庶為近之所謂因勢利導也夫瘦人繞臍痛必有風冷穀氣不行而反下之其氣必衝不衝者心下則痞風邪挾寒由肌腠入則脾陽為之不運故表受風寒者多不欲食此穀氣所由停也穀氣停則濁不行故繞臍痛此寒積也治此者即宜四逆理中否則亦當溫下若誤用寒涼則氣必上衝所以然者宿食去而風寒不去也按太陽篇下之後氣上衝者可與桂枝湯不上衝者不得與之所以然者氣上衝則風邪不因下而陷故仍宜桂枝湯若不上衝而心下痞便當斟酌虛實而用瀉心湯矣病腹滿發熱十日脈浮而數飲食如故厚朴七物湯主之厚朴七物湯方厚朴半斤甘草大黃各三兩大棗十枚枳實五枚桂枝二兩生薑五兩上七味以水一斗煮取四升溫服八合日三服嘔者加半夏五合下利去大黃寒多者加生薑至半斤解外與攻裏同治此俗醫所訶懸為厲禁者也病見腹滿發熱是為表裏同病十日脈浮數飲食如故則裏實未甚而表邪未去表邪為風故用中風證之桂枝湯而去芍藥裏實為大便硬故用和燥氣之小承氣湯此仲師參變方治不從先表後裏之例者也辛未秋七月豫治虹廟弄吳姓小兒曾用此方下後熱退腹減擬用補脾溫中法病家不信後仍見虛腫延至八月而死可惜也下後脾虛則氣易脹虛而寒氣乘之則寒亦能脹腹中寒氣雷鳴切痛胸脅逆滿嘔吐附子粳米湯主之附子粳米湯方附子一枚炮半夏粳米各半升甘草一兩大棗十枚上五味以水八升煮米熟湯成去滓溫服一升日三服此中陽將敗水寒上逆之證也寒乘中氣之虛故曰寒氣水走腸間故雷鳴寒氣結於太陰部分故切痛切痛者沉著而不浮也胸脅逆滿而嘔吐者陽虛於上而腎藏虛寒乘中陽之虛而上僭也附子粳米湯用炮附子一枚以回腎陽用粳米甘草大棗以扶中氣復加半夏以降衝逆腎陽復則虛寒之上逆者息矣中氣實則雷鳴切痛止矣衝逆降則胸脅逆滿嘔吐平矣或謂腹中雷鳴為有水故納生半夏以去水寒氣在腹故切痛故用附子以定痛說殊有理並存之痛而閉者厚朴三物湯主之厚朴三物湯方厚朴八兩大黃四兩枳實五枚上三味以水一斗二升先煮二味取五升內大黃煮取三升溫服一升以利為度病腹滿發熱為表裏同病故參用桂枝湯以解外若但見腹痛便閉而不發熱厚朴三物湯已足通大便之閉一下而腹痛自止矣按此方即小承氣湯惟厚朴較重耳按之心下滿痛者此為實也當下之宜大柴胡湯大柴胡湯方柴胡半斤黃芩芍藥各三兩半夏半斤枳實四枚大黃二兩大棗十二枚生薑五兩上八味以水一斗二升煮取六升去滓再煎溫服一升日三服今日之醫家莫不知大柴胡湯為少陽陽明合病方治而仲師乃以治心下滿痛心下當胃之上口滿痛為胃家實非必盡關少陽此大可疑也不知小柴胡湯本屬太陽標陽下陷方治按傷寒之例太陽病汗下利小便亡其津液則轉屬陽明汗出不徹者亦轉屬陽明一為寒水發泄太盡一為標熱下陷故心下支結外證未去者柴胡桂枝湯主之發熱汗出心下痞硬嘔吐下利者大柴胡湯主之可見太陽將傳陽明其病心見於心下矣此心下滿痛所以宜大柴胡湯亦猶心下痞硬嘔吐下利者之宜大柴胡湯皆為標熱下陷而設初不關於少陽也腹滿不減減不足言當下之宜大承氣湯大承氣湯方見傷寒陽明篇又見痙病說詳腹滿時減條並見傷寒陽明篇心胸中大寒痛嘔不能飲食腹中滿上衝皮起出見有頭足上下痛而不可觸近者大建中湯主之大建中湯方蜀椒二合炒去汁乾薑四兩人參一兩上三味以水四升煮取二升去滓內膠飴一升微火煎取二升分溫再服如一炊頃可飲粥二升後更服當一日食糜粥溫覆之陽氣痹於上則陰寒乘於下心胸本清陽之位陽氣衰而寒氣從之因而作痛寒入於胃則嘔而不能飲食寒入太陰則腹中滿寒氣結於少腹一似天寒瓶水凍而欲裂於是上衝皮起見有頭足上下俱痛而不可觸近此病於脾胃特重故用大建中湯乾薑以溫脾人參以滋胃加飴糖以緩痛飲熱粥以和中特君蜀椒以消下寒不待附子烏頭便已如東風解凍矣脅下偏痛發熱其脈緊弦此寒也以溫藥下之宜大黃附子湯大黃附子湯方大黃三兩附子三枚細辛二兩上三味以水五升煮取二升分溫三服若強人煮取二升半分溫三服服後如人行四五里進一服弦為陰脈主腎虛而寒動於中寒水上逆則為水氣為飲邪陽虛於上陰乘於下則為胸痹為腹滿寒疝本條云脅下偏痛發熱其脈緊弦此寒也以溫藥下之宜大黃附子湯夫脅下偏痛何以知為寒水凝結發熱似有表證何以知其當下診病者要不可無定識也脅下為腎屬中下二焦水道之關鍵由中焦而上出胸中上接肺陰出皮毛為汗肺氣下行津液還入胃中滋溉大腸餘則由脅下腎藏走下焦輸泄膀胱為溺水道阻於關鍵故脅下痛傷寒誤下成痞足為旁證臥者平時偏著之處即為痛處所以然者著則氣凝也陰寒內據則浮陽外越陰寒不破則孤陽無歸且其脈緊弦發熱則見數用大黃附子湯者後文所謂脈弦數者當下其寒也方中附子細辛以去寒而降逆行水而止痛更得大黃以利之則寒之凝瘀者破而脅下水道通矣內經云痛則不通亶其然乎寒氣厥逆赤丸主之赤丸方烏頭二兩炮茯苓四兩細辛一兩半夏四兩上四味末之內真朱為色煉蜜為丸如麻子大先食飲酒下三丸日再夜一服不知稍增之以知為度寒氣厥逆此四逆湯證也然則仲師何以不用四逆湯而用赤丸知此意者方可與論赤丸功用蓋湯劑過而不留可治新病不可以治痼疾且同一厥逆四逆湯證脈必微細赤丸證脈必沉弦所以然者傷寒太陰少陰不必有水氣而寒氣厥逆即從水氣得之腎虛於下寒水迫於上因病腹滿陽氣不達四肢乃一變而為厥逆方用炮烏頭二兩茯苓四兩茯苓無真者惟浙苓為野山所産但不出省雲南産更少細辛一兩生半夏四兩朱砂為色取其多煉蜜成丸取其不滑腸無分量者但取其足用也方治重在利水降逆便可知厥逆由於水寒即烏頭細辛有回陽功用實亦足以行水而下痰朱砂含有鐵質足以補血鎮心使水氣不得上僭丸之分量不可知如麻子大則甚小每服三丸日再服夜一服者欲其緩以留中使得漸拔病根也此則用丸之旨也腹滿脈弦而緊弦則衛氣不行即惡寒緊則不欲食邪正相摶即為寒疝寒疝繞臍痛若發則白津出手足厥冷其脈沉緊者大烏頭煎主之大烏頭煎方烏頭大者五枚熬去皮不必咀上以水三升煮取一升去滓內蜜二升煎令水氣盡取二升強人服七合弱人五合不差明日更服不可一日更服今人用附子熟者能用一錢已為彼善於此至於生附用至三錢已令人咋舌況在烏頭脫遇重證有坐視其死耳又其甚者己不能用而又禁病者之服非惟寡識抑又不仁豫讀金匱至大烏頭煎及烏頭桂枝湯為之廢書三歎烏頭藥力大於附子乾者小於附子一枚合今權三錢有奇五枚當得今權一兩半以水三升煮取一升去滓納蜜二升煎令水氣盡取二升烏頭之膏液固已盡入於蜜強人服七合則為三之一弱人五合則為四之一不差者明日更服何嘗不慎之又慎仲師卒毅然用此者正以危急之證非此不能救死也夫寒疝所由成大率表陽不達而陰寒內乘陽衰於外故惡寒而脈弦陰乘於內故不欲食而脈緊表寒與裏寒併居然後繞臍急痛發為寒疝陰寒內迫至於白津下泄剝之上九幾不得碩果之孤懸設非大破陰寒此證將成不救此豫所以苦口相告願天下有心人奉仲師為瓣香者也寒疝腹中痛及脅痛裏急者當歸生薑羊肉湯主之當歸生薑羊肉湯方當歸三兩生薑五兩羊肉一斤上三味以水八升煮取三升溫服七合日三服若寒多加生薑成一斤痛多而而嘔者加橘皮二兩白朮一兩加生薑者亦加水五升煮取三升二合服之人體血分多則生熱水分多則生寒腹為足太陰部分脾為統血之藏水勝血寒則腹痛脅下足少陰部分腎為寒水之藏水氣太盛則脅痛而裏急當歸生薑羊肉湯當歸羊肉以補血生薑以散寒而其痛自止虛寒甚者可於本方加生附子一枚不但如仲師方後所載痛多而嘔者加橘皮白朮已也此為婦科溫經補血良劑另詳寒疝腹中痛逆冷手足不仁若身疼痛灸刺諸藥不能治抵當烏頭桂枝湯主之烏頭桂枝湯方烏頭五枚上一味以蜜二升煎減半去滓以桂枝湯五合解之令得一升後初服五合不知即服三合又不知復加至五合其知者如醉狀得吐者為中病腹痛逆冷手足不仁身疼痛視大烏頭煎一證似為稍緩按傷寒論凡身疼痛而無裏證者用麻黃湯以解表兼裏證而欲使之外達者則用桂枝湯以解肌烏頭桂枝湯用烏頭煎以回裏陽復加桂枝湯以救表陽以蜜二升煎減半者煎去蜜之半而止復減其半而取桂枝湯之半數相加合得一升而又僅服五合不知更服三合又不知更服五合豈不慎之又慎最後却云其知者如醉狀得吐者為中病此非親驗者不能言蓋烏頭性同附子麻醉甚於附子服後遍身麻木欲言不得欲坐不得欲臥不得胸中跳蕩不寧神智沉冥如中酒狀頃之寒痰從口一湧而出胸膈便舒手足溫而身痛止矣服生附子者往往有此見象豫與長女昭華俱以親試而識之但昭華因痰飲服之則嘔痰而愈豫以寒利服之則大泄而愈要其為麻醉則一也其脈數而緊乃弦狀如弓弦按之不移脈數弦者當下其寒脈緊大而遲者必心下堅脈大而緊著陽中有陰可下之脈數為陽熱為氣緊弦則為陰寒為水惟其獨陰無陽故脈如弓弦按之不移者言其緊張搏指蓋雖有歧出之脈要當以弦脈為準此正如航海南針隨所往而不迷所向故無論脈弦而數脈緊大而遲脈大而緊皆當以溫藥下之而浮陽之數與大俱可不問矣仲師但言當下其寒心中堅陽中有陰未出方治陳修園以為即大黃附子湯殆不誣也問曰人病有宿食何以別之師曰寸口脈浮而大按之反澀尺中亦微而澀故知有宿食大承氣湯主之脈數而滑者實也此有宿食下之愈宜大承氣湯下利不欲食者此有宿食當下之宜大承氣湯大承氣湯方見傷寒陽明篇又見痙病豫每見脈滑數及下利不欲食者既莫不以大承氣湯為主治之方矣此脈證之易知也凡人胸腹上下有凝滯之處其脈必滑是故濕痰多者其脈滑妊娠者其脈滑中有所阻而氣反有餘也下利不欲食其人必有渴飲闕上痛不寐或心痞悶及腹痛拒按諸證惟寸口浮大按之反澀尺中微而澀者最為難辨蓋濁陰不降陽氣不宣故脈澀寸口脈大者肺與大腸為表裏腑氣不通肺中吸入之氣格而不受故寸口獨大此可見吸氣必促澀者凝滯之象按之反澀即可見腑滯不行合之尺中之微而澀益可決為當下之證矣按傷寒陽明篇有譫語潮熱脈滑疾服小承氣湯不轉矢氣脈反微澀者為難治彼惟不見浮大而但見微澀故為裏虛此則寸口浮大氣不下達故知為宿食也宿食在上脘當吐之宜瓜蒂散瓜蒂散方瓜蒂一分熬黃赤小豆二分煮上二味杵為散以香豉七合煮取汁和散一錢匕溫服之不吐者少加之以快吐為度而止宿食在上脘其氣痞悶而不通下不入於小腸留積中脘梗塞而不能下非引而越之使之傾吐而出則胃氣不降而新穀不納故宜瓜蒂散以吐之蓋此證必有寒痰故傷寒論謂之胸有寒可見宿食所以留積上脘者為濕痰所格故也脈緊如轉索無常者宿食也脈緊頭痛風寒腹中有宿食不化也宿食而見澀脈已不易辨至於緊脈則尤在疑似之間緊為表寒惟表寒之緊按之益緊惟宿食之脈則如轉索無常忽鬆忽緊亦有因外感風寒而停食者其脈亦緊其頭必痛此頭痛為矢氣上衝一經下後當得微汗頭痛止而風寒亦散矣此豫在蘇垣親驗之五藏風寒積聚病脈證並治第十一肺中風者口燥而喘身運而重冒而腫脹內經言肺風之狀有三一曰多汗惡風即太陽中風證象雜病亦有之蓋即痙濕暍篇所謂脈浮身重汗出惡風之防己黃耆湯證汗欲泄而風從毛孔相薄故惡風風中於毛濕留於肌故身重在表故脈浮可見內經言汗出惡風即本篇身運而重之證身運者風動於外頭目眩轉坐立不定之象也二曰時咳此即咳嗽上氣篇所謂風舍於肺其人則咳上氣喘而燥欲作風水發其汗即愈之證也可見內經所謂時咳即本篇口燥而喘之證風薄於外故燥濕藏於內故喘也三曰晝瘥暮甚此即身疼發熱日晡所劇之麻黃杏仁薏苡甘草湯證也失此不治表陽日痹寒水陷於皮中乃變為一身悉腫之風水而為越婢湯證甚則為久咳苦冒之支飲證可見內經言晝瘥暮甚為本篇冒而腫脹之積漸水氣停蓄故腫脹衝氣上逆故冒也合參之而其義始備也肺中寒吐濁涕寒從皮毛入即內應於肺太陽寒水為之不行氣閉熱鬱乃吐濁涕表寒不散即裏熱不清發其汗即愈若不知病源而漫為清燥失之遠矣肺死脈浮之虛按之弱如蔥葉下無根者死脈舊訛藏今訂正肺脈之絶也內經謂之但毛無胃此云浮之虛按之弱如蔥葉下無根者死蓋浮按即輕如風絮軟若遊絲稍重似有沉取則無之脈也得此脈者其氣不續故主死按肺死藏之藏字當為脈字之誤諸家解為真藏脈文義不通特更正之肝中風者頭目瞤兩脅痛行常傴兩臂不舉舌本燥善太息令人嗜甘此條兩臂不舉三句舊訛在後條今訂正之肝為藏血之藏而主一身之筋節所謂中風者亦血虛生風之類非比肺藏外應皮毛真有外風襲之也肝藏血虛則風動於上而頭目瞤此證仲師無方治當用熟地以補血潞參以補氣重用龍骨牡蠣以鎮之其效至速萬不可疏風破氣瞤甚者目中房舍林木旋轉不已往往途中顛仆至於兩脅痛行常傴則血弱氣盡邪正相摶結於脅下之小柴胡湯證也肝藏血足則柔風勝則燥燥氣薄於脾藏則腹痛食甘稍緩故令人嗜甘此先豫小建中湯不差者與小柴胡湯之證也按後節兩臂不舉三語亦為肝中風列於肝中寒下實為傳寫之誤風燥而血不養筋故兩臂不舉血虛於下風勝於上故舌本燥內經肝中於風嗌乾風勝而氣鬱故善太息此理甚明特訂正之肝中寒者胸中痛不得轉側食則吐而汗出也肝中寒之證有三曰胸中痛曰不得轉側曰食則吐而汗出胸中痛有二證一為水寒血腐蛔蟲滋生固當有蛔上入膈之烏梅丸證謂之蛔厥亦有如後文所云胸常氣痞按之小愈之旋覆花湯證謂之肝著肝膽之氣主疏泄營衛二氣太陽寒水與太陰寒濕併居則肝膽不得疏泄故凝滯胸膈作痛不得轉側亦有二一為寒阻胸膈陽氣不通水道阻於下焦痛連脅下不得轉側則為胸脅苦滿往來寒熱或脅下痞鞭之小柴胡湯證亦有脾藏蘊濕寒濕凝閉肌腠者則為一身盡重不可轉側之柴胡加龍骨牡蠣湯證肝膽與胃同部胃底原有消食之膽汁肝中寒則胃中亦寒故食即吐酸而汗出此即嘔而胸滿之吳茱萸湯證陽明病之不能食為胃中虛冷亦正以肝藏困於寒濕消食之膽汁少也肝死脈浮之弱按之如索不來或曲如蛇行者死肝脈之絶也內經但言但弦無胃此云浮之弱謂浮取之無力也重按之則如繩索之弦急忽然中止則弦而見代脈矣曲如蛇行即痙證發其汗其脈如蛇之證蓋筋脈以燥而強急也肝著其人常欲蹈其胸上先未苦時但欲飲熱旋覆花湯主之旋覆花湯方旋覆花三兩即金沸草蔥十四莖新絳少許上三味以水三升煮取一升頓服肝著之病胸中氣機阻塞以手按其胸則稍舒此肝乘肺之證也胸中陽氣不舒故未病時當引熱以自救旋覆花湯方用蔥十四莖以通陽而和肝旋覆花三兩以助肺新絳以通絡而肝著愈矣心中風者翕翕發熱不能起心中飢食即嘔吐風邪入藏舌即難言口吐涎中風篇既言之矣乃又有翕翕發熱不能起心中飢食即嘔吐之證與前證是一是二前人未有言及此者此大可疑也按此為風邪襲肺吸動心陽之證心陽隨衛氣外泄故翕翕發熱熱傷氣故無氣以動而臥不能起心營虛故嘈雜似飢胃底膽汁為風陽吸而上逆故食入即嘔吐風一日不去則心陽一日不定胃氣一日不和是當用黃耆防風以泄風甘草大黃以降逆不必治風而風自愈若漫用羚羊以熄風犀角以涼心則失之矣心中寒者其人苦病心如噉蒜狀劇者心痛徹背背痛徹心譬如蟲注其脈浮者自吐乃愈此烏頭赤石脂丸證說詳胸痹篇不贅心傷者其人勞倦即頭面赤而下重心中痛而自煩發熱當臍跳其脈弦此為心藏傷所致也此營虛證也營虛則虛陽浮於上而頭面赤濁陰滯於下浮陽吸之則為下重下重者大便欲行而氣滯也此證當便膿血但證由勞倦而見即屬虛寒當用桃花湯以溫中去濕或用四逆理中而非實熱之白頭翁湯證陽氣浮於上則心中熱痛自煩發熱浮陽吸腎邪上僭則當臍跳動此與發汗後欲作奔豚同脈弦者陰寒上僭之脈也此蓋心陽虛而衝氣上冒之證故曰為心藏所傷法當用桂枝以扶心陽甘草大棗以培中氣桂枝加桂湯茯苓桂枝甘草大棗湯正不妨隨證酌用也心死脈浮之實如麻豆按之益躁疾者死心脈之絶內經云但鉤無胃謂如帶鉤之堅實數急而不見柔和也此云浮之實如麻豆即以堅實言之按之益躁疾即以數急而不見柔和言之也邪哭使魂魄不安者血氣少也血氣少者屬於心心氣虛者其人則畏合目欲眠夢遠行而精神離散魂魄妄行陰氣衰者為顛陽氣衰者為狂邪哭當從黃坤載作邪入陳修園謂如邪所憑而哭此望文生訓之過也表邪乘裏必從其虛氣少則衛虛血少則營虛營衛兩虛則外邪從皮毛肌腠而入曰使人魂魄不安者不過言夢寐之不安原不指肝肺二藏言之心為主血之藏而主脈營氣之環周應之故血氣少者屬於心心氣虛則中餒故善畏神魂不寧故合目即夢遠行而精神離散魂魄妄行譬之釜下薪火將滅煙騰而熛飛將一散而不可收也此證正虛為重外邪為輕治此者朱砂以鎮之棗仁以斂之熟地潞參當歸以補之而又加遠志以化痰半夏以降逆秫米以和胃或者十活四五否則積之既久雖不即死為癲為狂將成痼疾矣太陰無陽氣則脾藏聚濕成疾痰蒙心竅是為癲陽明無陰氣則腸胃積燥生熱熱犯心包是為狂脾中風翕翕發熱形如醉人腹中煩重皮目瞤瞤而短氣脾藏主濕風中肌肉內應於脾留著不去即為風濕原其始病蓋即傷寒太陽篇繫在太陰之證也翕翕發熱形如醉人此即太陽篇翕翕發熱鼻鳴乾嘔之桂枝湯證腹為足太陰部分風中脾藏裏濕應之風濕相摶故腹中煩重風淫於上吸水濕上行肺氣為之阻塞故皮目瞤瞤而短氣此證濕邪不流關節而入於裏輕則為風濕重則為風水風邪吸於上則濕邪壅於腹部而不行非去其上之所吸則下部之壅濕不去竊意越婢加朮湯亦可用也脾死脈浮之大堅按之如覆杯潔潔狀如搖者死脾脈之絶內經言但代無胃而不舉其形狀此言浮之堅按之如覆杯潔潔即但代無胃之的解也浮取似實重按絶無或如杯中酒空覆之絶無涓滴或忽然上出魚際忽然下入尺部初如搖蕩不寧繼乃卒然中絶後人所謂雀啄脈也趺陽脈浮而澀浮則胃氣強澀則小便數浮澀相摶大便則堅其脾為約麻仁丸主之麻仁丸方麻仁二升芍藥半斤大黃去皮一斤枳實半斤厚朴一斤去皮杏仁一升去皮尖熬別作脂上六味末之煉蜜和丸桐子大飲服十丸日三服漸加以知為度此條見傷寒陽明篇趺陽脈在足背為胃脈之根浮則胃氣上盛澀則陰液下消胃熱盛而小便數乃見浮澀相摶之脈摶之為言合也摶合也義如摶沙為人之摶言合兩為一也今本皆誤搏搏之為言擊也義如搏而躍之之搏按之文義殊不可通今訂正之胃液日涸遂成脾約此脾約麻仁丸方治所以為陽明證也腎著之病其人身體重腰中冷如坐水中形如水狀反不渴小便自利飲食如故病屬下焦身勞汗出衣裏冷濕久久得之腰以下冷痛腹重如帶五千錢甘薑苓朮湯主之甘草乾薑茯苓白朮湯方一名腎著湯甘草白朮各二兩乾薑茯苓各四兩上四味以水五升煮取三升分溫三服腰中即溫由腎達膀胱為水道所自出古人謂之下焦西醫謂之輸尿管故有謂三焦有名無形者不特與內經不符求之仲師意旨亦然未合此可見漢以後醫家無通才也即以腎著一證言之仲師言其人身體重腰中冷如坐水中反不渴小便利飲食如故病屬下焦身體重為水濕泛濫滲入肌肉肌肉著濕故體重腰中冷如坐水中形如水狀則寒濕壅阻寒水之藏也水氣阻於腰以下則津不上承而當渴小便當不利而反見口中不渴小便自利裏藏無陽熱則小便色白不言可知曰飲食如故病在下焦者明其病在水道也原其得病之始則以身勞汗出裏衣冷濕久久得之蓋上焦在胸中西醫謂之淋巴幹為發抒氣水作汗之樞機汗出而裏衣沾漬則毛孔閉塞而水氣內積下注寒水之藏則腰以下冷痛水道雖通於下而水之上源不能化氣外出則積日並趨於下輸尿管不能相容水乃溢入腹部與濕並居故黏滯不下利而腹重如帶五千錢師主以甘草乾薑茯苓白朮湯者作用只在溫脾去濕蓋以腹為足太陰部分腹部之寒濕去不待生附走水而腰部當溫也腎死脈浮之堅按之亂如轉丸益下入尺中者死腎脈之絶內經云但石無胃此云浮之堅堅者實也曰按之亂如轉丸益下入尺中是躁疾堅硬動至尺後而無柔和之象也問曰上焦寒善噫何謂也師曰上焦受中焦氣未和不能消穀故能噫耳下焦寒即遺溺失便其氣不和不能自禁制不須治久則愈此節發端原有三焦竭部四字當是編書舊標目傳鈔者誤入正文耳但竭字亦不可解上焦在胸中為發抒水氣之總樞上焦竭則淋巴幹乳糜不足胸中當熱不當云善噫下焦水道涸則大便當硬不當云遺溺失便以下節三焦熱觀之竭字當為寒字之誤蓋寒入胸中胃底脺藏吸收小腸水液為上焦寒氣所壓不能發抒而留於中脘胃寒不能消穀故善噫噫者氣從咽中出啞啞有聲有時兼有食臭之謂下焦合腎與膀胱下焦水寒即遺溺失便不能自禁此證正需四逆理中然則仲師所謂不須治久則愈者亦謂不須治上下二焦非謂不治中焦也善讀者當自悟之師曰熱在上焦者因咳為肺痿熱在中焦者則為堅熱在下焦者則尿血亦令淋閟不通大腸有寒者多騖溏有熱者便腸垢小腸有寒者其人下重便血有熱者必痔胸中發抒水液之樞不能自行發熱所謂上焦熱者要為大腸燥實而移熱於肺此所以因咳為肺痿也故治痿獨取陽明熱在中焦中焦為脾與脺吸收水液之處水液為胃熱所奪自汗過多則胃以燥而便艱下焦由腎接膀胱膀胱兩旁為血海熱入胞中則尿血熱留精管敗精阻之則淋閟不通大腸寒則便溏熱傷血絡則便膿血然亦有水寒血敗而便膿血者桃核承氣湯證正不當與桃花湯證同治也小腸之端為十二指腸膽汁入焉膽汁最燥膽汁不足則小腸寒而下重便血先言下重後言便血此即先便後血之黃土湯證也小腸有熱則濕熱注於大腸壅阻肛門乃病痔瘡此證唯枯痔散最神效方用白砒煅盡白烟研末一錢枯礬二錢烏梅炭研末一錢朱砂三分和研手指蘸藥敷痔頭撚之一日二次五六日出臭水水盡痔枯重者不過半月可以全愈問曰病者積有聚有穀氣何謂也師曰積者藏病也終不移聚者腑病也發作有時展轉痛移為可治穀氣者脅下痛按之則愈復發為穀氣腹中阻滯之病大概有三積為藏病云者心積伏梁腎積奔豚肝積肥氣肺積息賁脾積痞氣是也然師以為終不移似不可以概奔豚奔豚之病有痞塊從少腹上衝心下但痛定後仍在少腹是終不移也然奔豚一證得自驚恐要為肝腎兩經病正不當以腎積名之心下之伏梁為豫所親見至如中脘之痞氣左脅之肥氣右脅之息賁皆未寓目大抵久留不去之病必非可以急攻者加味平胃散至為平穩蒼朮陳皮厚朴甘草扁蓄瞿麥炒大麥芽川芎各五錢沉香木香各一錢大黃二兩每服藥末三錢薑湯送下須於黃昏時不進晚餐服之明早大便必見惡物一月可愈一切加減法在陳修園時方妙用中聚有血有痰有氣有水一時凝閉不通則聚而為痞發則輾轉痛移痰則痛在心下血則痛達少腹隨其實而瀉之則其病易愈故曰可治䅽氣為食滯食滯者當在臍下此云脅下痛者誤也按之則小愈更發則仍痛此證服飯灰即愈陳修園不知䅽為穀字之誤乃以為馨香之馨亦可笑已諸積大法脈來細而附骨者乃積也寸口積在胸中微出寸口積在喉中關上積在臍旁上關上積在心下微下關積在少腹尺中積在氣衝脈出左積在左脈出右積在右脈兩出積在中央各以其部處之積為陰寒之證故脈細而沉曰在寸口積在胸中者則寸口脈沉遲之胸痹證也曰微出寸口積在喉中者則婦人咽中如炙臠之半夏厚朴湯證也曰關上積在臍旁者則繞臍痛脈沉緊之寒疝證也曰上關上積在心下者則心積伏梁之證也曰微下關積在少腹者自非腎積奔豚證即瘀血在少腹不去也曰尺中積在氣衝者則婦人經候不勻氣衝急痛之證也曰脈出左積在左脈出右積在右脈兩出積在中央者謂所病部分不同而脈之部分應之即內經上附上中附中下附下之義也痰飲咳嗽病脈證治第十二問曰夫飲有四何謂也師曰有痰飲有懸飲有溢飲有支飲問曰四飲何以為異師曰其人素盛今瘦水走腸間瀝瀝有聲謂之痰飲飲後水流在脅下咳唾引痛謂之懸飲飲水流行歸於四肢當汗出而不汗出身體重謂之溢飲咳逆倚息不得臥其形如腫謂之支飲首節先辨四飲之名次節進求四飲之義水與津液併居則為痰飲痰粘胸膈水濕流入痰囊倒懸腸間則為懸飲水溢四肢則為溢飲水痰為衝氣上激支撐胸膈則為支飲是為四飲定名夫所謂痰飲者太陽寒水失於開泄外不達於皮毛內不行於下焦於是留積成痰人體水分與血分平均則盛水氣不達於皮毛肌腠血肉中水分不充則瘦故病痰飲者往往素盛而今瘦水痰下注大腸則漉漉有聲此肺病延入大腸之證也所謂懸飲者水至中焦陽氣不足不能直達下焦於是結於脅下而病支滿咳則痛引胸脅此下焦不通之證也所謂溢飲者表汗不泄與太陰之濕混雜即身體為之疼重疼重者脾陽不運肌肉為水氣所痹也水流四肢則四肢腫謂水從中道外溢也所謂支飲者衝氣從下上逆支撐無已故咳逆倚息不得臥表裏水氣壅塞故形如腫此則四飲之義也水在心心下堅築短氣惡水不欲飲水在肺吐涎沫欲飲水水在脾少氣身重水在肝脅下支滿嚏而痛水在腎心下悸心為君主之官居清陽之位諸藏可以有水而心藏不當有水所謂水在心者直以水氣淩心言之水氣不能作汗外泄內陷中脘則心下堅硬而短氣惡水不欲飲者心陽被遏而中氣寒也肺主皮毛衛氣充則太陽寒水外泄皮毛而為汗衛氣虛則太陽之氣留於胸中為水胸中陽氣蒸化乃一變而成似痰非痰之涎沫吐之不已津液日耗乃欲飲水水入不化涎沫益多脾主一身肌肉而為濕藏水濕混雜傷及中氣肌肉不稟中氣故少氣而身重肝脈布脅肋水在脅下故曰水在肝太陽之脈夾脊抵腰中與三焦水道並行中焦水道瘀積則脅下支滿脅下為寒水之藏水道痞結故嚏而痛其實病不在肝也腎水上泛水氣淩心故心下悸是謂五藏飲夫心下有留飲其人背寒冷如掌大留飲者脅下痛引缺盆咳嗽則輒已胸中留飲其人短氣而渴四肢歷節痛脈沉者有留飲留飲之來源不同證情則往往相類陽氣痹於外則水邪停於裏此其握要之區不可不察也大抵病之所由成莫不起於形寒飲冷形寒者當發汗汗出太過內藏燥實是病陽明汗出不徹即為留飲飲冷者中氣先病水陷於胃與大腸轉為濡瀉是病太陰水氣停蓄上膈亦為留飲以手入冷水浣濯亦多病此為其陽氣痹也以上二端病根皆中於太陽太陽陽氣微則汗溺俱少始則水停心下心下當胃之上口久留不去寒氣遏其心陽甚則為心痛徹背背痛徹心之烏頭赤石脂丸證輕則背冷如掌大而為小青龍湯證夫飲入於胃之水液由脾陽從小腸吸收此脾藏西醫謂之脺胰液所出上輸胸中是為中焦由胸中散布皮毛是為上焦二焦皆上行散布不盡之水液還入內藏傷寒所謂津液還入胃中由腎走膀胱是為下焦下焦不通則留積脅下水停腰部而痛引缺盆缺盆俗名琵琶骨在肩內齊頸處咳嗽則痛不可忍故欲咳而輒已已者中止之謂輒原作撤音近之誤此為支飲之十棗湯證胸膈陽微不能作汗則水留膈上阻塞肺藏出納之氣因病短氣水在胸中津液不得上承故渴必喜熱飲水不循三焦故道下行乃流溢四肢而歷節痛此為當發汗之溢飲證於麻黃加朮為宜水寒不得陽熱之化則其脈沉弦故曰脈沉者有留飲若脈不見沉而浮則猶為風濕證耳膈上病痰滿喘咳吐發則寒熱背痛腰疼目泣自出其人振振身瞤劇必有伏飲伏飲之證以痰滿喘咳為見端一觸外寒即突然嘔吐涎沫寒熱交作背痛腰疼嘔吐劇時目淚迸出全身瞤動所以見寒熱者伏飲本起於太陽加以新寒則太陽標本同病太陽之脈在背夾脊抵腰以嘔吐牽動經脈故疼痛氣迸於頭故目泣自出陽衰氣弱故全身振振動今之醫家動以瞤動為肝風殆不然也按此證仲師不出方治似宜真武湯加五味乾薑細辛未知然否夫病人飲水多必暴喘滿凡食少飲多水停心下甚者則悸微者短氣脈雙弦者寒也皆大下後裏虛脈偏弦者飲也此節為病痰飲者推原所從來病者液虧精耗勢必引水以自救但中陽本虛飲水過多未易消解於是停積心下卒然而病喘滿此不惟病人為然凡胃氣素虛者皆是水在心下甚則目眩而心悸譬之履危崖而俯百尺之深淵即懍然而怵惕其或未甚肺中吸入之氣亦必因有所格而見促譬之當炎暑而處無風之密室必鬱然而不怡惟見象如此尤當辨之於脈脈雙弦為寒即為大下後裏虛附子理中湯證偏弦為飲為小青龍及苓甘五味薑辛半夏湯證但此節特舉崖略言之嘗見納穀少而飲酒多者往往病此蓋酒標熱而本寒酒性一過悉成寒水故病停飲又有身弱多眠者亦往往病此蓋臥者陽氣停太陽之氣內伏必聚而為濕久久成痰亦病停飲固知治病者當觀其通幸無泥仲師之言而不為隅反也肺飲不弦但苦喘短氣支飲亦喘而不能臥加短氣其脈平也肺飲支飲一在胸中一在膈間心下留飲在胸未及中下二焦故曰肺飲上有濕痰之凝沍下有太陽標熱之支撐故曰支飲惟仲師俱謂其脈不弦所以不弦之故前人未有議及之者陳修園黃坤載並謂金能制木此術家之言非必為仲師意也蓋肺為水之上源水氣積而不降但見吸入氣短寒濕猶未甚也腎藏虛寒寒水上逆乃見弦脈肺飲在上而不在下故其脈不弦此苓桂朮甘湯及腎氣丸之證但利小便而即愈者也而支飲胸脅支滿視此矣凡支飲眩冒之宜澤瀉湯嘔吐不渴之宜小半夏湯卒嘔吐膈間有水眩悸者宜小半夏加茯苓湯一切導水下行者視此矣蓋二證初起皆在陽位未涉陰寒故其脈不弦者特為始病而言未可據為成例若執此而求之則後文咳家脈弦為有水十棗湯主之設支飲不弦咳煩胸中痛不卒死之支飲不當更云宜十棗湯矣設謂支飲不涉陰寒則後文之咳而胸滿者與冒而嘔者不當用苓甘五味薑辛湯及苓甘五味薑辛半夏湯矣要知凡飲皆始於肺以失治而寖成支飲支飲失治由胸下脅轉為懸飲脅下固厥陰脈絡所在而實為少陰之藏水道出焉水結脅下腎藏乃寒下焦寒甚生附子亦當加入然後歎仲師溫藥和之之訓為大有深意也獨怪今日市醫遇當用薑辛之證不過五六分而止曾亦念燒蕭條之無以禦水而宣防之功不立乎病痰飲者當以溫藥和之近日市醫動以不涼不熱為溫藥是不然仲師云病痰飲者當以溫藥和之究為何等藥味此不可不辨也據本篇云加乾薑細辛以治咳滿又云細辛乾薑為熱藥服之當遂渴渴反止者支飲也可知此節所謂溫藥即後文所謂熱藥又按太陽篇真武湯後所列加減法咳者加五味細辛乾薑益可信溫藥之為細辛乾薑矣心下有痰飲胸脅支滿目眩苓桂朮甘湯主之苓桂朮甘湯方茯苓桂枝白朮各三兩甘草二兩上四味以水六升煮取三升分溫三服小便則利夫短氣有微飲當從小便去之苓桂朮甘湯主之腎氣丸亦主之腎氣丸方見婦人雜病此二節為支飲脈平肺飲不弦者出其方治也夫胸脅支滿屬手少陽三焦三焦水道不通乃病支飲目眩者水飲上冒而眩暈不定也起於心下由胸連脅衝氣上逆喘不能臥故曰支飲下焦水道不通肺藏吸入之氣不能順受而痛短氣故曰肺飲仲師所出方治皆用苓桂朮甘湯者則以飲邪初起水氣僅在三焦而不及內藏故但扶脾藏以通陽氣使上焦氣散無吸水之力而水道自通水道通而飲邪去矣但苦短氣之肺飲亦主以腎氣丸者或病在寒水之藏不能納氣如婦人雜病篇不得臥而反倚息之證故同一利小便而方治固自不同也按此二方但可治痰飲之初病若飲邪既盛往往失效病者脈伏其人欲自利利反快雖利心下續堅滿此為留飲欲去故也甘遂半夏湯主之甘遂半夏湯方甘遂大者三枚半夏十二枚以水一升煮取半升去滓芍藥五枚甘草如指大一枚炙上四味以水二升煮取半升去滓以蜜半升和藥汁煎取八合頓服之卒病宿疾之不同一辨於脈一辨於證如本條所云其人欲自利利反快此為留飲欲去其與繫在太陰之暴煩下利日十餘行脾家實腐積當去者何異然何以下利之太陰證不治而自止此何以雖利而心下續堅滿且太陰自利之證其脈浮緩此證何以脈伏要不可不辨也蓋濕本黏滯之物太陽寒水與太陰寒濕併居雖為痰飲所同而太陽傷寒內傳太陰為日未久其病根淺故脈見浮緩痰飲之病以積日而後成其病根深故其脈見伏伏之言沉也病根淺者但見下利水濕已併入大腸故不治而自愈病根深者當下利而水濕之留於膈上者復趨心下故心下續見堅滿而必待甘遂半夏湯以因勢而利導之方中甘遂三枚半夏十二枚所以去水芍藥五枚炙甘草一枚所以疏通血絡而起沉伏之脈蓋脈伏者水勝而血負也藥去滓而和蜜者欲其緩以留中使藥力無微不達並取其潤下之性使內藏積垢易去也此甘遂半夏湯之義也陳修園謂甘遂與甘草相反所以同用者欲其交戰於胃中使病根劖除未確脈浮而細滑傷飲脈弦數有寒飲冬夏難治脈沉而弦者懸飲內痛病懸飲者十棗湯主之十棗湯方芫花熬甘遂大戟各等分上三味搗篩以水一升五合先煮肥大棗十枚取八合去滓納藥末強人服一錢匕羸人服半錢匕平旦溫服之不下者明日更加半錢匕得快利後糜粥自養此節發明懸飲之積漸欲學者明辨而施治也其始由太陽傳入太陰故脈浮而並見細滑滑者濕象也太陽失表汗液不泄水氣乃內陷胸膈與濕並居即為傷飲水邪不去由胸及脅乃見弦脈是為寒飲飲邪內陷陽氣鬱伏脈轉弦數寒飲則須溫藥伏熱尤須涼劑二者不可兼顧故冬夏難治若夫脈沉而弦沉則為水弦則為痛故懸飲而內痛懸飲者痰囊繫於內藏水飲蓄焉故非破囊抉水病必不愈此芫花甘遂大戟所以為救死之方治也病溢飲者當發其汗大青龍湯主之小青龍湯亦主之大青龍湯方麻黃六兩桂枝甘草各二兩生薑三兩杏仁四十個大棗十二枚石膏如雞子大一枚上七味以水九升先煮麻黃減二升去上沫內諸藥煮取三升去滓溫服一升取微似汗汗多者溫粉撲之小青龍湯方麻黃去節芍藥乾薑甘草炙細辛桂枝各三兩五味子半夏各半升上八味以水一斗先煮麻黃減二升去上沫內諸藥煮取三升去滓溫服一升溢飲一證以水氣旁溢四肢而作識其病之所從來便可知病之所由去所謂解鈴須問繫鈴人也蓋肺主皮毛肺藏呼吸即周身毛孔為之張弛殆有登高一呼群山皆應之意皮毛閉塞於外即內藏之呼吸不靈發為喘咳皮毛一日不從汗解即咳逆一日不平水氣流溢於四肢者一日不去此病溢飲者所以宜大小青龍湯也但大青龍湯方治為表汗裏熱而設即麻杏石甘湯加桂枝薑棗耳溢飲發汗用此方或用小青龍湯其旨安在蓋脾主四肢胃亦主四肢中脘有熱逼內藏之水旁溢四肢者故主以大青龍湯水飲太甚內藏不能相容自行流溢四肢者故主以小青龍湯要其為發汗則一也膈間支飲其人喘滿心下痞堅面色黧黑其脈沉緊得之數十日醫吐下之不愈木防己湯主之虛者即愈實者三日復發復與不愈者宜木防己湯去石膏加茯苓芒硝湯主之木防己湯木防己桂枝各三兩人參四兩石膏如雞子大二枚一本十二枚上四味以水六升煮取二升分溫再服木防己去石膏加茯苓芒硝湯方木防己桂枝各三兩茯苓四兩人參四兩芒硝三合上五味以水六升煮取二升去滓內芒硝再微煎分溫再服微利則愈飲邪留於膈間支撐無已肺氣傷於水太陽陽氣不得外達則喘胸中陽痹水液內停則滿由胸及於心下則心下痞堅寒濕在上阻遏三陽之絡血色不榮於面故其色黧黑此與濕家身色如薰黃同水盛於上血分熱度愈低故其脈沉緊得之數十日病根漸深醫以為水在上也而用瓜蒂散以吐之吐之不愈又以心下痞堅而用瀉心湯以下之若仍不愈醫者之術窮矣不知寒濕久鬱則生裏熱胃熱合膽火上抗因病喘逆飲邪留積不去則上滿而下痞堅故宜苦寒之防己以泄下焦甘寒體重之石膏以清胃熱又以心陽之不達也用桂枝以通之以津液之傷於吐下也用人參以益之此仲師用木防己湯意也但此證胃中無宿垢但有胃熱上衝阻水飲下行之路而喘滿痞堅者為虛故但於方劑中用石膏以清胃熱中脘已無阻礙蓋即陽明虛熱用白虎湯之義也若胃中有宿垢雖經石膏清熱上衝之氣稍平但一經復發此方即無效力故必去清虛熱之石膏加茯苓以利水道芒硝以通腑滯膈間支飲乃得由胃中下走小腸大腸而一泄無餘蓋陽明實熱用大承氣湯之義也此虛實之辨也心下有支飲其人苦冒眩澤瀉湯主之澤瀉湯方澤瀉五兩白朮二兩上二味以水二升煮取一升分溫再服支飲胸滿者厚朴大黃湯主之厚朴大黃湯方厚朴一只大黃六兩枳實四枚上三味以水五升煮取二升分溫再服此承上加茯苓芒硝而別出其方治也水在心下靜則為心悸動則為冒眩欲遏水邪之上泛為木防己湯加茯苓所不能治仲師因別出澤瀉湯所以抉泛濫之水而厚其堤防也胃中燥熱逼水上逆則病胸滿木防己湯加芒硝所不能治仲師因別出厚朴大黃湯方所以破中脘之阻隔開水飲下行之路也支飲不得息葶藶大棗瀉肺湯主之葶藶大棗瀉肺湯方見肺癰肺為主氣之藏為全身呼吸出入之門戶凡肺藏有所壅阻而全體能張而不能弛也是故風熱傷其血絡則肺藏壅塞而氣閉濕痰阻其空竅則肺藏亦壅寒而氣閉是非立破其壅塞則呼吸不調蓋無論肺癰之喘不得臥及本條支飲不得息莫不以葶藶大棗瀉肺湯主之要其作用只在抉去所壅令肺氣能張能弛初無分於血分水分也嘔家本渴渴者為欲解今反不渴心下有支飲故也小半夏湯主之小半夏湯方半夏一升一本五錢生薑半斤一本四錢上二味以水七升煮取一升半分溫再服本書之例嘔而不吐者為乾嘔凡言嘔皆兼吐言之故吐水及痰涎皆謂之嘔胃底膽汁不能容水膽汁苦燥與膈上水氣相拒則為嘔吐少陽所以善嘔也但既嘔之後胃中轉燥因而病渴渴則水邪已去故為欲解今反不渴則以心下支飲方盛胃底膽火不煬故以生半夏以去水生薑以散寒而心下之支飲當去此證水停心下阻其胃之上口勢必不能納穀嘔吐噦下利篇云諸嘔吐穀不得下者小半夏湯主之即此證也腹滿口舌乾燥此腸間有水氣己椒藶黃丸主之己椒藶黃丸方防己椒目葶藶大黃各一兩上四味末之蜜丸如梧子大先食飲服一丸日三服稍增口中有津液渴者加芒硝半兩腹滿一證以時減為太陰虛寒不減為陽明實熱虛寒當溫實熱當瀉此其易知者也若繞臍劇痛之寒疝當用大烏頭煎者已易與大實滿之大承氣證淆混若夫水在腸間之腹滿抑又難為辨別師但言腹滿口舌乾燥又不言脈之何似幾令人疑為陽明燥實要知太陽水氣不能由肺外出皮毛留於膈間心下久乃與太陰之濕混雜濕本粘膩與水相雜遂變水痰肺與大腸為表裏由表入裏水痰並走腸間因病腹滿且腹未滿之時腸中先漉漉有聲權其巔末即可知口舌乾燥為裏寒不能化氣與液其脈必見沉弦仲師以已椒藶黃丸者防己椒目以行水葶藶大黃兼泄肺與大腸也所以先食飯而服者則以水邪在下部故也卒嘔吐心下痞膈間有水眩悸者小半夏加茯苓湯主之小半夏加茯苓湯方半夏一升生薑半升茯苓四兩上三味以水七升煮取一升五合分溫再服假令瘦人臍下有悸吐涎沫而顛眩此水也五苓散主之五苓散方澤瀉一兩六銖豬苓茯苓白朮各十八銖桂枝半兩上五味為末白飲服方寸匕日三服多服漿水汗出愈痰飲之未成者始於水水因寒而停則為飲水與膏液混雜則為痰水盛則痰浮而上阻胸膈膽胃被鬱與水衝激則卒然嘔吐痰在膈間則心下痞痛水氣衝腦則眩水氣淩心則悸生半夏能去至高之水生薑能散膈上之寒加茯苓能決排水道此可知仲師出小半夏加茯苓方治正所以抑在上之水以逆而折之也茯苓和麵僞造雲産固不易得浙産亦不出省似不如改用豬苓語云肥人多痰瘦人似不當有痰為其肌肉皮毛中所含水分少也水分多者心下有水則心下悸水分少者水在臍下則臍下亦悸水氣微薄雖不至卒然嘔吐然引動上焦亦必吐涎沫而頭目眩暈此可見仲師出五苓散方治正所以泄在下之水以順而導之也此上下之辨也同一心下悸而發汗後之欲得按者但用桂枝甘草湯而不更用去水之生半夏同一臍下悸而發汗後之欲作奔豚惟桂枝茯苓同五苓散而重用大棗甘草以實脾皆為正虛邪輕而設故病同而方異也咳家其脈弦為有水十棗湯主之十棗湯方見傷寒論太陽篇又見本篇水力至強體柔而性剛滴石則石穿衝堤則堤壞故病水者其脈多弦弦者沉緊而搏指也水勝則血負血分熱度日減則蒸化力弱而衛陽虛微故仲師以弦為減謂陽氣減也但水勢下趨似不應上逆為咳不知痰濕粘滯下游水道不通則高原泛濫日甚是非破東南之壅塞則西北之洚洞無歸此十棗湯一方所以盡抉排疏瀹之能也豫每見病痰飲者大小便往往不通此即下游壅塞之明證所以用十棗者一因藥力猛峻恐傷脾胃一因痰涎未易浣濯用甘味之十棗以緩芫花大戟甘遂之力使如碱皂之去油垢在漸漬不在衝激也夫有支飲家咳煩胸中痛者不卒死至一百日或一歲宜以十棗湯水氣支撐胸膈故名支飲此證大便不通上濕下燥腸胃之熱上攻則咳而心煩痰積胸中故胸中痛不卒死者謂不猝然而死也然死機已伏故有百日而死者有經一載而死者嘗見大小便不通氣喘不得臥臥即咳逆不得息疊被而倚之此一月十五日而死者也亦有大小便時通發時則三五日不通咳則目睛突出氣出不續過即如故但膈間留飲愈積愈厚則愈發愈勤此一歲而死者也知死之所由去即知生之所從來蓋非猛峻之十棗湯驅水入大腸以抉蕩腸中燥氣病不必治豫先慈邢太安人病支飲有年矣丙寅春忽然昏迷若癲狀延醫診治皆曰危在旦夕豫不得已製十棗湯進之夜半而利下痰無算明旦清醒如平人矣後至上海惲禹九家其孫祥官同鄉張爾常門人也本無病爾常以其纍逃孰使豫診之豫診其脈左脈弦問所苦則曰胸中痛豫曰真病也以十棗湯方付之明旦大下痰涎冷甚以為愈矣翌日來診脈弦如故仍令服前方下痰更多繼以薑辛五味而愈不更病矣丙辰冬無錫強鴻培病此人開飯作人皆目為肺勞咳而上氣胸中滿痛無大小便疊被而倚息喘聲達戶外豫診其脈沉伏而弦急因令服十棗湯每服六分日一服每進一服其痛漸移而下服至四劑始下衝氣乃平又能治小兒痰飲俗稱馬脾風七日見血即死豫嘗治其壽姪時方三歲又治潘姓小兒名阿煦者皆以瀉痰得愈沈石頑自治痰飲每服藥末一錢半兩服而瘥可見猛峻之藥益人甚於參苓也久咳數歲其脈弱者可治實大數者死其虛者必苦冒其人本有支飲在胸中故也治屬飲家痰飲為病有咳煩胸中痛或百日或一歲而死者此期日之至促者也至於久咳數歲庶幾恆不死之貞疾矣然水性至剛病之進退皆當決之於脈脈弱不弦則內藏水氣未甚故其病可治實大而數則水邪充於內藏故其病當死至如脈由弱而虛則水氣當微然久咳不已引動衝氣必苦鬱冒所以然者則以病人久咳胸中原有支飲也按此證脈虛不弦既非十棗湯證脈不沉緊又非木防己湯證方治之中惟澤瀉湯為近之蓋澤瀉蠲飲而白朮補虛也咳逆倚息不得臥小青龍湯主之小青龍湯方見傷寒論太陽篇又見本篇咳逆則氣出不續倚息不得臥則終夜疊被而倚之不得平臥也寒氣鬱於表飲邪被遏則激而上衝固應解表溫裏俾外寒與裏水雙解此小青龍湯方治所以為蠲飲之主方也青龍湯下已多唾口燥寸脈沉尺脈微手足厥逆氣從小腹上衝胸咽手足痹其面翕熱如醉狀因復下流陰股小便難時復冒者與茯苓桂枝五味甘草湯治其氣衝苓桂五味甘草湯方桂枝茯苓各四兩五味半升甘草三兩炙上四味以水八升煮取三升去滓分溫三服陽氣張於上則衝氣動於下小青龍湯發其陽氣太甚則口多濁唾而燥寸脈沉為有水尺脈微為陰虛手足厥逆者中陽痹也氣從小腹上衝胸咽者以麻黃細辛之開泄太甚少陰水氣被吸而上僭也中陽既痹故手足不仁虛陽上浮故其面翕熱如醉狀且浮陽之上冒者復下流陰股而吸其水道致小水不利陽不歸根故時上冒顛頂方用苓桂五味甘草湯與傷寒太陽篇發汗後欲作奔豚之苓桂大棗甘草湯略同但彼為脾陽因汗後而虛不能厚中道之堤防故用大棗此為腎氣被熱藥牽引不能攝下焦之浮陽故用五味要其為降衝逆則一也衝氣即低而反更咳胸滿者用桂苓五味甘草湯去桂加乾薑細辛以治其咳滿苓甘五味薑辛湯方茯苓四兩甘草乾薑三兩細辛三兩五味子半升上五味以水八升煮取三升去滓溫服半升日三服降衝氣而衝氣低則上冒之浮陽當息而咳逆可止矣而反更咳胸滿似前方失之太輕是不然蓋前用小青龍湯麻黃開泄太甚迫其汗液而陽氣暴張小腹之客氣因而上逆中陽既痹始則手足厥逆繼而手足痹甚至上下顛倒浮陽竄亂一似電光石火閃爍無定此時若以溫藥化飲不免助浮陽外抗於是不得已用苓桂五味甘草湯以收散亡之陽蓋必衝氣漸低然後可進溫藥師於是有苓甘五味薑辛湯方治以發抒胸中陽氣而除其咳滿此先標後本之治也咳滿即止而衝氣復發者以細辛乾薑為熱藥也服之當遂渴而渴反止者為支飲也支飲者法當冒冒者必嘔嘔者復內半夏以去其水苓甘五味薑辛半夏湯方茯苓四兩甘草二兩細辛二兩乾薑二兩半夏半升五味半升上六味以水八升煮取三升去滓溫服半升日三服此節更復渴三字為衍文以細辛乾薑為熱藥句為假設之詞當屬下讀非承上衝氣復發言之若承上言似但指衝氣一層服之當遂渴句轉類節外生枝若原有更復渴三字則下文當遂渴反不渴俱不可通矣此節大旨謂咳滿止後上膈氣機已疏當不復病然亦有咳滿方止衝氣復發者倘因乾薑細辛為熱藥而發其衝氣服後當立見燥渴乃本病燥渴服乾薑細辛而渴反止則前此之渴實為支飲隔塞在胸津液不得上承喉舌而初非真燥此證豫寓小北門時治宋姓婦人親見之病者平時常患口燥所服方劑大率不外生地石斛麥冬玉竹知母花粉西洋參之類豫見其咳吐涎沫脈弦而體肥決為痰飲授以此方服後終日不曾飲水略無所苦乃知仲師渴反止為支飲之說信而有徵也此證後以咳逆不得臥乳中脹痛用十棗湯加王不留行大下水痰而愈但支飲在胸膈間中脘陽氣被遏必見鬱冒冒者胃底膽汁不能容水衝激而上逆也故仲師言冒家必嘔蓋中陽與支飲相拒輕則虛陽上浮甚則卒然嘔吐清水痰涎可知熱藥實為對病故治法特於前方中加生半夏以去水不更忌細辛乾薑也水去嘔止其人形腫者加杏仁主之其證應內麻黃以其人遂痹故不內之若逆而內之者必厥所以然者以其人血虛麻黃發其陽故也苓甘五味加薑辛半夏杏仁湯方茯苓四兩甘草乾薑細辛各三兩五味半夏杏仁各半升上七味以水一斗煮取三升去滓溫服半升日三服前方內半夏以去水則心下之水氣當去水邪去則膽胃之火不復上衝而嘔亦當止但水方止貯中脘氣不外散一旦決而去之未盡之水氣不能從表汗外泄或轉留皮毛之裏變為形腫按水氣病一身面目黃腫者則越婢加朮湯主之一身悉腫則越婢湯主之此水氣甚而形腫藥劑中應納麻黃之證也但此證業經半夏去水水氣不甚則形腫當屬虛脹水氣篇又云虛脹者為氣水發其汗即已脈沉者宜麻黃附子甘草湯此又水氣不甚而形腫藥劑中應納麻黃之證也故仲師既於前方中加杏仁以利肺氣而泄皮毛復申之曰其證應內麻黃以其人遂痹故不內之若逆而內之必厥所以然者以其人血虛麻黃發其陽故也夫此證之應內麻黃仲師既言之矣但何以見此證血虛何以見形腫之為痹何以見麻黃發汗之必厥歷來注釋家固未有能言其意者蓋水盛則血寒血中熱度既低則吸收力薄精液不能貫輸脈道而絡脈益虛水病所以血虛也痹之言閉血分熱度不足則水氣之在表者不能蒸化成汗故毛孔閉塞而形腫若用麻黃強責其汗太陽陽氣一時張發於外則裏氣益寒而手足見厥此即衄家不可發汗瘡家不可發汗失精家不可發汗之例也若面熱如醉此為胃熱上衝熏其面加大黃以利之苓甘五味加薑辛夏杏大黃湯方茯苓四兩甘草二兩乾薑細辛各三兩五味半夏杏仁各半升大黃三兩上八味以水一斗煮取三升去滓溫服一升日三服水去嘔止有未盡之水氣因水方外散痹於表分而形腫者亦有水分已盡胃中燥熱上冒頭面者於是有面熱如醉之形態蓋纍進溫中泄水之劑證情決非戴陽故於前方加杏仁外更加大黃以利之所以然者則以水邪去路不出於肺必出大腸也先渴後嘔為水停心下此屬飲家小半夏加茯苓湯主之小半夏加茯苓湯方見上心下有水脾精不得挾胃中穀氣上溉肺藏而潤喉舌因而渴飲但胃底含有苦燥之膽汁胃中熱如熾炭不能容水水在胃之上口胃熱出而相抗乃病嘔吐此其所以先渴後嘔也按此節合上嘔家本渴節並見下嘔吐噦下利篇以其治屬飲家故本條獨出方治也消渴小便不利淋病脈證治第十三厥陰之為病消渴氣上衝心心中疼熱飢而不欲食食則吐下之不肯止此與傷寒厥陰篇同豫向以為非一時並見之證此特為厥陰本病言之耳至於消渴是殊不然消渴所以起於厥陰者始於肝藏血虛血虛則內風生膽寄肝葉之內賴肝液為滋養肝燥而膽不濡則浮火易動風與火相摶於是肺液耗損引水自救水能勝有形之火不能勝無形之風燥於是飲者自飲渴者自渴此消渴所以起於厥陰也風陽上薄故氣上撞心熱鬱心房故心中疼熱風陽上逆故飢不欲食風陽吸於上胃氣逆行故食即吐若疑為宿食而誤下之風性疏泄脾濕隨之下陷乃至一下而不肯止氣上衝則肺燥屢吐則胃燥下之不止則腸亦燥此為消渴所由成推本窮原則但清肝熱滋營血而陽自息此證似宜黃連阿膠湯合百合地黃湯陳修園謂當於烏梅丸諸方按證求之未的寸口脈浮而遲浮即為虛遲即為勞虛則衛氣不足勞則營氣竭趺陽脈浮而數浮即為氣數即消穀而大堅氣盛則溲數溲數則堅堅數相摶即為消渴男子消渴小便反多以飲一斗小便亦一斗腎氣丸主之腎氣丸方見婦人雜病今之議病者皆以寸口脈數浮為上消趺陽脈浮為中消男子消渴即為下消此不知本之言也惟黃坤載以陽明篇為消渴之原最得主要素問別論云二陽結謂之消黃氏引而申之曰二陽者陽明也手陽明主燥化燥在大腸則消水而便堅足陽明亦從燥化燥在胃則消穀而溲數太陰行氣於三陰脈候於寸口陽明行氣於三陽脈候於趺陽太陰主升陰中之陽升於脈絡則經氣盛陽明主降陽中之陰降於腸胃則腑氣和太陰虛而經氣衰故寸口浮而遲陽明盛而府氣旺故趺陽浮而數虛勞傷其營衛為發熱作渴之原燥熱耗其精液為消穀引飲之漸胃熱滲於大腸故大便堅水飲併入三焦故小便多經氣虛而腑氣實所謂壯火食氣也此黃坤載本內經以釋仲師之旨精義不可磨滅者也北齊道興造象記附方有頓服烏麻油一升神驗當即此證豫按黃氏此說言陽明之燥關於上渴下消則甚當矣特以上節厥陰為病核之上下幾成兩橛爰本黃說合上節而申言之蓋胃與肝同棣中部肝居胃右而斜覆其半體膽寄肝葉資血液而後充脾藏之胰液合膽汁滲入胃中為消穀之助肝藏血液不足胃底獨存苦燥之膽汁而消食之力更猛故營衛以虛勞而損胃中之燥熱益增膽管之下注十二指腸者亦愈熱因是上下俱燥大便堅而小便更數少陰病自利清血色純青之大承氣證亦即膽胃同病此上渴下消之由雖在胃與大腸之燥實出肝陰虛而膽汁生燥也然則首條言飢不欲食食即吐此云消穀又將何說以處之不知首節以病之發端言之營衛虛於上是病風燥膽胃上逆是病嘔吐仲師雖未明言而其味必苦肝陰愈虧胃底膽火愈熾乃一變而為消穀腸胃既燥大便盡堅水氣乃獨行於腎膀而飲一溲一之證具矣按此證仲師方治主以腎氣丸在婦人雜病篇為利小便之藥此證小溲甚數更服利水之藥小溲毋乃太多曰否此方原為調攝腎氣而設腎為水道關鍵腎寒水不化氣則水勢下趨而小溲數腎陽不運則氣閉氣閉則小溲不通故病以相反而同治蓋消渴一證原為肝脾陰虛而膽胃生燥因致消穀便堅不比陽明燥實故用乾地黃山藥山茱萸以滋養肝脾而膽胃燥氣自平又懼其助濕也故用澤瀉丹皮茯苓以泄之方中惟桂枝附子二味最為主要桂枝以通脾陽胸中淋巴幹受之所以疏上焦之水氣附子以通腎陽輸尿管受之所以溫下焦之水使得化氣而潤燥所以然者則以小溲之多實由水寒無氣故也脈浮小便不利微熱消渴宜利小便發汗五苓散主之五苓散方見傷寒論太陽篇又見痰飲此條見太陽篇發汗後條下蓋因大汗之後浮陽在表吸下焦水氣不得輸泄於膀胱但用五苓散發汗利小水俾水道下通津液上承而消渴自止此與真消渴不同因其相似而類及之欲發汗服散後多飲暖水見傷寒論渴欲飲水水入則吐者名曰水逆五苓散主之此條見太陽篇中風發熱條下夫渴欲飲水固有陽明實熱少少與之而愈者乃入口而即吐則是水停心下津液不生而渴飲初非燥熱故名水逆為下流之壅塞此與宿食未消不能納穀者同故必濬其下流津液乃得上承於喉舌要非人參白虎竹葉石膏諸方治所當混投也渴欲飲水不止者文蛤散主之文蛤散方文蛤五兩上一味杵為散以沸湯五合和服方寸匕此條見太陽篇病在陽節下而微有不同彼以太陽標熱及水氣為冷水所遏太陽寒水與標熱停頓心下意欲飲水而反不渴者出其方治特用鹹寒之文蛤標本同治使熱隨水泄而渴當止此為渴欲飲水水入渴不止者言之蓋以水能去陽明實熱不能去太陽標熱加以屢渴屢飲其水必停標熱薰灼蘊成濕痰水更粘滯文蛤散用蛤殼杵細開水和服若今日砂漏然隔其渣滓使水清易利又不獨鹹寒清熱已也淋之為病小便如粟狀小腹弦急痛引臍中仲師於淋證未出方治但以病情而論則此證實為虛寒發端便曰小便如粟狀如粟狀者陽氣不達於宗筋而精道塞也肝腎因虛生寒則少腹為之弦急腎虛而寒氣上乘故痛引臍中雖以外證驗之未嘗非濕熱之交阻然有服龍膽草而加劇者亦有服木通纍斤而痿頓不起者則以裏陽不達濕熱無自而化也吾謂治淋之法病之初起以疏達瘀滯為急是猶濕熱下利中有宿食而宜大承氣者也病之既久宜溫中通陽佐以泄水是猶下利虛寒而宜四逆理中者也獨怪近世庸工一遇淋證務清肝熱而敗脾陽吾見其冥路之日近矣趺陽脈數胃中有熱即消穀引飲大便必堅小便則數淋之為病或小溲腫痛或敗精瘀塞變為癃閉病此者多懊憹欲死坐立不安要未見消穀引飲大便堅而小便數者仲師於此節既不言淋證而其義則與趺陽脈浮而數大致略同故豫決其為衍文若夫大腸燥小溲赤痛迫精外泄者陽明證間亦有之非淋病也淋家不可發汗發汗則便血此條見太陽篇與衄家不可發汗同血與汗為同體衄家發其汗則陽氣張於上而目直視淋家發其汗則陰液損於下而便血其不從小溲出者以津道本塞欲出不得故也小便不利者有水氣其人若渴栝蔞瞿麥丸主之栝蔞瞿麥丸方薯蕷三兩茯苓三兩栝蔞根二兩附子一枚炮瞿麥一兩上五味末之煉蜜丸如梧子大飲服二丸日三服不知增至七八丸以小便利腹中溫為知天時陽熱則生濕土膏發於地雲氣上於天然後雷雨作而溝渠通陰寒則生燥風霜日緊潦水不降於是蒸氣消而溪澗塞人但知苦熱易於生燥而不知苦寒之尤易生燥也知此意者然後可與論栝蔞瞿麥丸方治證曰小便不利有水氣而渴此水勝血負水寒不能化氣之證也三焦水道以腎為關鍵腎寒則水停蓄於下而陽氣不升陽氣不升則肺陰虧於上而津液不降方用栝蔞根以潤肺而止渴瞿麥以導膀胱而利小便薯蕷茯苓以扶脾陽而抑心下水氣要惟以炮附子一枚為方中主要觀小便利腹中溫為知八字其義自見蓋未服藥時腹中必然冷痛也小便不利蒲灰散主之滑石白魚散茯苓戎鹽湯並主之蒲灰散方蒲灰半分滑石三分上二味杵為散飲服方寸匕日三服滑石白魚散方滑石亂髮燒白魚各二分上三味杵為散飲服方寸匕日三服茯苓戎鹽湯方茯苓半斤白朮三兩戎鹽彈丸一枚上三味先將茯苓白朮煎成入戎鹽再煎分溫三服小便不利證情不同治法亦異所謂蒲灰散主之者濕勝熱鬱之證也腎藏當寒水下行之衝水勝則腎陽被遏由輸尿管下結膀胱而小便不利用鹹寒泄水之蒲灰合淡滲清熱之滑石則水去而熱亦除矣所謂滑石白魚散茯苓戎鹽湯並主之者滑石白魚散為水與血並結膀胱之方治也水以寒而易泄故稱太陽寒水水蓄於下與胞中血海混雜乃生裏熱熱鬱則水道不通故滲之以滑石佐以善導血淋之髮灰白魚俗名蠹魚喜蝕書藉竄伏破書中不見陽光雖性味不可知大約與土鱉子鼠婦相等善於攻瘀而行血者蓋瘀與熱俱去而小便自通矣茯苓戎鹽湯為膏淋血淋阻塞水道通治之方也茯苓白朮以補中而抑水戎鹽以平血熱泄瘀濁而小便乃無所窒凝矣此又小便不利兼有淋證之治也渴欲飲水口乾燥者白虎加人參湯主之白虎加人參湯方見傷寒論陽明篇又見暍病脈浮發熱渴欲飲水小便不利豬苓湯主之豬苓湯方豬苓去皮茯苓阿膠滑石澤瀉各一兩上五味以水四升先煮四味取二升去滓內膠煬消溫服七合日三服此二條並見傷寒陽明篇為汗下溫針救逆之方治陽不外越津液內傷因病口乾舌燥浮熱在表水濕內蘊因病渴欲飲水小便不利津液傷則以清熱生津主治方治宜白虎加人參者為其熱傷氣血也裏水鬱故以導水邪清血熱主治方治宜豬苓湯用阿膠者為其濕傷血分也此衛與營之辨也水氣病脈證並治第十四師曰病有風水有皮水有正水有石水有黃汗風水其脈自浮外證骨節疼痛惡風皮水其脈亦浮外證跗腫按之沒指不惡風其腹如鼓不渴當發其汗正水其脈沉遲外證自喘石水其脈自沉外證腹滿不喘黃汗其脈沉遲身發熱胸滿四肢頭面腫久不愈必致癰膿水與氣相為消長水溫則氣生水寒則氣奪氣奪則衛陽痹於外營陰痹於裏水即頓滯而不行其病凡四有風水皮水正水石水之別黃汗則似水非水風水之病起於中風中風不愈汗液凝於肌理乃病風濕風濕不愈水氣因寒凝聚乃病風水故脈浮惡風與中風同外證骨節疼痛與風濕同蓋濕不甚者為濕濕勝者即為水表陽一日不達即裏氣一日不和此水氣之病由於脾陽頓滯者也皮水之病或起於中暍痙濕暍篇所謂身熱疼重夏月傷冷水水行皮中所致者是也或起於傷寒痙濕暍篇所謂傷寒八九日風濕相摶身體疼煩不能自轉側大便堅小便自利者服桂枝附子湯去桂加朮盡三服如冒狀朮附並走皮中逐水氣未得除者是也蓋人身生氣一日不絶外來之水斷不能漬入毛孔惟水飲入胃挾胸中陽氣外泄之汗液外著冷水及寒氣乃留滯於皮中病起於太陽故脈浮太陽之府為膀胱部位最下膀胱不行水從旁溢故其病為跗腫皮毛外閉故不惡風水濕在皮裏而不入大腸故其腹如鼓而無洞泄下利之變水不在中脘不能隔絶上承之液故不渴病在表分故當開皮毛而發汗此水氣之病由於衛陽被遏而肺陰不達者也正水之病起於寒水之府藏其證為下焦虛寒寒水停蓄水氣勝而血熱微也水氣勝故脈沉血熱微故脈遲腎寒不能納氣故喘此水氣之病關於本藏而絶無外因者也石水之病亦出於腎寒其脈沉絶石謂如石之沉於水底非如他物之足以上泛似石水之名特以陰寒凝固不可動搖之又按淋濁一證有砂淋石淋謂水與膏液凝結堅硬而不可攻也不知石水一證亦當有膏液凝結如石在回腸之外無礙於呼吸故腹滿不喘此水氣之病異於正水而攻之不動溫之不化者也陳修園乃以後文屬少陰者當之豈正水不屬少陰乎近人有治石淋方用鹹寒軟堅之銀硝合利水之滑石調服似可借用黃汗之病鬱於營分久而後發此與水氣之鬱在衛分者不同沉遲似正水脈則其病不在皮毛蓋邪在衛主皮毛而惡寒邪在營即主肌肉而發熱水寒而血熱也胸為陽位四肢為諸陽本三陽之絡皆上頭面胸滿而四肢頭面腫則濕勝而陽痹所以久不愈必致癰膿者營鬱而生熱也此水氣黃汗之別也脈浮而洪浮則為風洪則為氣風氣相摶風強則為癮疹身體為癢癢者為泄風久為痂癩氣強則為水難以俯仰風氣相繫身體洪腫汗出乃愈惡風則虛此為風水不惡風者小便通利上焦有寒其口多涎此為黃汗水氣一證惟風水為輕大要為外風束縛而汗出不徹輕則為風濕重即為風水覆杯水於坳堂但覺其沾漬耳纍進而增益之則泛而溢矣病屬太陽之表故脈浮骨節痠痛惡風與風濕略相似此即積濕成水之明證蓋氣與水相為變化汗與濕相為虛實水液由脾陽運輸為胸中陽熱蒸化當由皮毛外泄成汗故水之未成者為氣一受外邪毛孔閉塞其氣即停阻不行故氣之漸寒者為水但此證初起水氣未甚風薄於外氣抗於裏脈乃浮洪風淫於外毛孔之汗不泄則結於皮外而成癮診於是遍體癢不能忍則搔以泄之久而不愈遂成痂癩與疥相類此風甚濕輕之證亦衛氣微弱不能作水之證也夫衛氣微弱中含水分不足遇風氣奪則為濕衛氣強盛中含水分過多遇風氣奪則為水濕則僅留表分為疹為癢水則流注皮中內及胸腹腫脹喘滿難以俯仰風邪一日不解則水氣一日不去故曰汗出乃愈但仲師所言汗出乃愈者合前證言之非專指已成水病者言之也雖然風水之體腫實與黃汗相似風水屬衛宜解表固當用麻黃以發汗黃汗屬營宜解肌即不當用麻黃辨此者要以惡風不惡風為標準風水起於外感病原與中風同故惡風黃汗不由外感病原與中風異故不惡風加以小便通利上焦有寒其口多涎所以小便利者外無風邪以吸之內無粘滯之濕以阻之也所以上焦有寒其口多涎者黃汗始病營熱為寒水所鬱胸膈無陽熱之化也此黃汗別風水之大略也寸口脈沉滑者中有水氣面目腫大有熱名曰風水視人之目窠上微腫如蠶新臥起狀其頸脈動時時咳按其手足上陷而不起者風水風水之證起於太陽故其脈浮洪為多浮者風脈也但風水所由成積漸於太陰之濕終成於少陰之寒故其脈亦有時而沉滑沉即為水滑即為濕水氣留著皮毛之裏面目獨見腫大者風中於頭也所以有表熱者以病原之同於中風也此證或目下有臥蠶形鮮明光澤氣衝咽喉頸脈動而微咳易與正水淆混但其手足俱腫按之下陷不起者乃為風水確證所以然者蓋以風之中人肌腠先受而脾為之應故傷寒論太陽陽明二篇並謂之繫在太陰不獨太陰本篇為然所以載於太陽篇者以風之中人先痹肌腠言也故桂枝湯之作用曰解肌所以載於陽明篇者以太陽寒水不得外泄流入腸胃言之也所以棣於太陽本篇者則以病起於風成於水水氣不得外泄合脾藏之濕下陷將成寒濕之證也脾主四肢故風水必流溢四肢是以痎瘧由於脾寒者手足先冷外風繫在太陰者手足自溫發汗亡其中陽手足見厥者服乾薑甘草湯而其厥當還病理固無不同也太陽病脈浮而緊法當骨節疼痛反不疼身體反重而痠其人不渴汗出即愈此為風水惡寒者此為極虛發汗得之渴而不惡寒者此為皮水身腫而冷狀如周痹胸中窒不能食反聚痛暮躁不得眠此為黃汗痛在骨節咳而喘不渴者此為肺脹其狀如腫發汗則愈然諸病此者渴而下利小便數者皆不可發汗此一節舉相類之證出陰虛不可發汗之例欲處方者知所擇也風寒為病起於太陽故其脈當浮但緩則為氣緊則為寒為水由風濕寖成風水外證當見骨節疼痛今不疼而反見體腫而痠者蓋濕將成水則痛濕已成水即重而痠此濕流關節水傷肌肉之辨也水氣尚在肌肉不在心下不能阻隔中脘陽氣故不渴此風水之宜於發汗者也又有本太陽病因發汗而惡寒者此為表陽虛太陽篇所謂發汗病不解反惡寒者芍藥甘草附子湯主之即此證也此同一太陽病而不宜更發汗者也前云皮水脈浮跗腫不惡風不渴者當發其汗此云渴而不惡寒此為皮水按寒字當為風字之誤為其異於風水也夫四肢腫水在皮膚中為皮水甚則肢冷故後文又有厥而皮水方治此可見皮水為裏寒水聚之證何以前條言皮水不渴當發其汗本條反以渴而不惡風為皮水幾令辨證者茫無定據不知當發其汗特為不渴者言之耳皮水之證要以渴為標準水氣入裏腫見於外水寒不能化氣滋溉不及咽喉乃引溫水以自救皮水不渴不由燥而由濕灼然無可疑者水不去則腫不消寒不去則渴不止此當利小便之治異於始病之可以發汗者也皮毛外閉故不惡風惟下文身腫而冷二句當屬黃汗言陳修園指為皮水者誤也蓋黃汗之始病四肢頭目皆腫故曰如周痹謂一身之陽氣痹也營熱為水邪所鬱故身腫而冷惟其濕勝陽痹故胸中窒此與胸痹相類胸中淋巴幹不能發水液與氣故氣不通濕停中脘容積不多故不能食水寒營鬱絡脈不通故反聚痛營氣夜行於陽故血分溫度特高不惟煩躁抑當熱發汗出所以然者營氣晝鬱暮則反抗也此黃汗病在肌腠鬱熱異於皮毛之寒當解肌以發汗者也太陽寒水為表寒所遏則一身盡疼脈見浮緊此太陽傷寒之所同皮毛不開肺氣內閉裏熱與水氣相摶因喘咳而病肺脹所以不渴者水氣未入中脘不能阻陽氣之上承也所以其狀如腫者水氣鬱於皮毛也證屬暴感宜越婢加半夏湯以開表清理而其喘自定所謂發汗即愈也但病在皮毛者可以發汗若水滲腸胃而下利水入下焦而小便數陽虛於上濕流於下必見燥渴若發其汗非惟重傷陰液抑且不能愈病所以然者為水氣不在腰以上也裏水者一身面目黃腫其脈沉小便不利故令病水假令小便自利此亡津液故令渴越婢加朮湯主之方見中風黃汗之始病四肢面目皆腫而其脈沉遲裏水則四肢面目黃腫而其脈亦沉所以別於黃汗者特暮夜無盜汗耳夫水氣外泄為汗下行為小便今外既無汗小便復不利水乃鬱於皮毛之裏而病黃腫若小便自利黃腫當減乃黃腫如故而反見渴者以水濕隔塞於上胃中津液不得上承也此證胃中必有鬱熱觀外證之黃腫自見不見夫造醬麵者乎乘熱而覆蓋之水濕與熱合併蘊蒸不三日而發黃矣仲師用越婢加朮湯解表與清裏同治使水濕與熱悉從汗解則腫退而渴止矣趺陽脈當伏今反緊本自有寒疝瘕腹中痛醫反下之即胸滿短氣趺陽脈當伏今反數本自有熱消穀小便數今反不利此欲作水此節向無的解陳修園以為水病人別有宿疾當從趺陽脈與其舊疾而兼顧之不可見腫治腫黃坤載則謂脈伏有寒熱不同寒伏當脈緊此當有寒疝瘕腹痛醫下之即胸滿短氣熱伏則脈數此當有積熱消水穀而小便數今反不利此水穀不消內原無熱欲作水也二說俱非蓋水之將成必有其因水病多由腎陽虛寒其脈本當沉伏反見緊者則以向有疝瘕腹痛諸證醫反用寒下法使外寒乘虛而入腎氣從之因見胸滿氣短之象此即後文以為留飲而大下之又與葶藶丸下水之變也趺陽之脈本因水病而沉伏今反見數設病者本自有熱當得消穀而小便數今反不利便可知客熱不消水穀熱結膀胱而蓄水也此節後文數脈即止之義也數為熱結止即水停蓄寸口脈浮而遲浮脈則熱遲脈則潛熱潛相摶名曰沉趺陽脈浮而數浮脈即熱數脈即止熱止相摶名曰伏沉伏相摶名曰水沉則絡脈虛伏則小便難虛難相摶水走皮膚即為水矣風水皮水皆由肺氣不達皮毛所致故其診多在手太陰動脈而不及趺陽惟正水則上下並見而根原獨成於下故必兼診趺陽方能核實但寸口脈明係浮遲仲師乃名之曰沉趺陽明係浮數仲師反名之曰伏後學殊難索解雖徐忠可說理至為詳盡然可與中人以上言之淺學者不能無疑也吾直以為浮遲浮數主脈象言沉與伏主病情言兩者不當朦混沉伏相摶名曰水此即專指病情之顯著也浮遲在寸口則營氣下寒而不上應營氣下寒則水不化氣水就下故名曰沉浮數在趺陽則衛氣下阻而不上行衛氣下阻則水道反為所吸而不得流通故名曰伏然則仲師言浮脈則熱遲脈則潛熱潛相摶者以水氣上閉血寒不能蒸化為汗言之也言浮脈則熱數脈則止熱止相摶者以熱結膀胱小溲不利言之也營氣不上應因見絡脈之虛絡脈虛則身冷無汗衛氣不上行因見小便之難小便難則瘀熱苦水於是一身上下陽氣不通乃逆走皮膚而成水矣此證仲師未有方治陳修園消水聖愈湯尚有古意附存之大烏頭牡桂細辛淨麻黃炙甘草知母防己生薑大棗日夜三服當汗出如蟲行皮中即愈寸口脈弦緊弦則衛氣不行即惡寒水不沾流走於腸間少陰脈緊而沉緊則為痛沉則為水小便即難正水前後脈證不同仲師雖不出方治原其脈證所以不同者而治法已存乎其中矣正水已成則水寒積於下虛陽浮於上故寸口脈浮而遲方在將成則陰寒錮其表陽氣停於內故寸口弦而緊正水已成則水寒無氣陽鬱不通故趺陽脈浮而數方在初成陰寒內薄氣化不行故寸口關後之脈沉而緊水寒血凝故痛衛氣束於寒不能作汗外散則水不沾漬下走腸間原作沾流誤也蓋水化氣成汗故沾漬水寒重墜故下陷也營熱息於內則腎陽不通而小便不利此時寒水暴遏表裏陽氣絶然消歇故但見弦緊沉緊之脈豫謂此直麻黃細辛附子湯證麻黃以達表寒附子以溫裏寒細辛由裏達表從下而上扶腎陽而疏表鬱則大氣運行汗液泄而小便亦通矣近人漫用五苓五皮以治水舍此別無良法抑獨何歟脈得諸沉當責有水身體腫重水病脈出者死水病脈當沉沉非重按始得之謂乃脈道不利而寸口浮遲也水氣沉於下清陽不能化氣上行絡脈不得滋溉因病空虛絡脈虛故寸口應之而遲沉者必伏伏者水氣在下足背趺陽之脈反見浮數水氣不得由膀胱下泄故脈沉者小便必難表裏上下不得氣化故水留於肌肉而身體腫重若浮遲之寸口反見洪大而數少陰趺陽之脈反見微弱則是陰盛於下陽脫於上謂之脈出譬之油燈垂涸忽然大明其能久而不滅乎夫水病人目下有臥蠶面目鮮澤脈伏其人消渴病水腹大小便不利其脈沉絶者有水可下之內經云諸有水氣者微腫先見於目下豫診痰飲病亦往往見之蓋水與飲固同源而異病也水困脾陽必見於所主之部分目胞及腹皆足太陰所主故目下有臥蠶而腹大目鮮澤者水之標小便不利者水之本消渴者水外浮而內竭且水寒不能化氣故也脈沉固當有水至於沉絶則腎中陽氣將亡便當急下以存陽譬猶傷寒少陰證之急下存陰仲師於此條不出方治豫意當與大黃附子細辛湯是即寒疝之脈狀如弓弦之不移陽中有陰可下之例也若陳修園所云用真武湯加木通防己椒目以溫腎陽而利小便雖亦言之成理不知水氣清者外可以發汗內可以利小便若水與痰涎糞穢膠結成瘀則舍溫下更無良法也奈何利小便乎問曰病下利後渴飲水小便不利腹滿因腫者何也答曰時法當病水若小便自利及汗出者自當愈下利之後陰陽並虛陰虛則渴陽虛則水飲不消小便不利腹因腫滿此為暴蓄之水初無膠固不解之痰濁與之混合故但得汗出小便利即當自愈惟下後裏陰先傷陽氣復頓雖腹滿而腫不當徒利小便當用婦人轉胞腎氣丸方治陰陽兩補而水道自通或用渴欲飲水之文蛤散蓋蛤殼鹹寒上能止渴下通小便杵為細者譬之濾水之砂漏格其渣滓水道以澄清而易通也心水者其身重而少氣不得臥煩而燥其人陰腫肝水者其腹大不能自轉側脅下腹痛時時津液微生小便續通肺水者其身腫小便難腫時鴨溏脾水者其腹大四肢苦重津液不生但苦少氣小便難腎水者其腹大臍腫腰痛不得溺陰下濕如牛鼻上汗其足逆冷面反瘦水道行於三焦而出於膀胱故六府有水五藏不當有水以五藏為真有水者妄也然則仲師何以言五藏水曰此以部分言之以藏氣之受病言之也水氣淩心則心陽受困脾肺不能承受心陽故身重而少氣心氣不能降故心腎不交而不得臥寐心火鬱於上則煩而躁陽不下達水氣獨留故陰腫此心水不關本藏者也水勝則肝膽被鬱不得疏泄肝病傳脾故腹大不能轉側厥陰脈絡結於脅下故脅下痛但肝膽雖鬱亦有時而疏泄故津液微生而小便續通此肝水不關本藏者也肺主清降肺氣為水邪所沮則水邪不降而身為之腫肺氣不達皮毛太陽標熱下陷膀胱熱結小便困難肺與大腸為表裏肺病延至大腸故時鴨溏此肺水不關本藏者也脾在中脘部分在腹而外主四肢脾為水困故腹大而四肢苦重脾寒不能化生津液故津液與氣俱少脾為濕藏水濕相摶則濁痰粘滯水道不清故小便難此脾水不關本藏者也若夫腎則本為寒水之藏上承中焦下及膀胱以全其為決瀆之官腎寒則決瀆失司濫於腹則腹大而臍腫壅阻中下之關鍵則腰痛而不得溺寒水浸灌於下故陰下濕如牛鼻上汗腎陽不行陰寒隨少陰之脈下注故其足逆冷頭為諸陽之會水氣作於少陰陰不過陽故腫不及面部而反瘦此腎水雖關本藏而腎藏要無蓄水之餘地也師曰諸有水者腰以下腫當利小便腰以上腫當發汗乃愈利小便人但知為五苓散發汗人但知為麻黃湯此泥於成方不知水病者也利小便之劑詳消渴篇發汗之劑詳痰飲風濕二證學者酌劑輕重而用之皆當應手奏效然亦有當利小便之證必先行發汗而小便始通者蓋大氣不運則裏氣不疏肺氣不開則腎氣不降故常有屢進利水之藥小便終不利者職是故也並有當發汗之證必兼利小便而始愈者蓋發汗則表疏在裏之水氣不能盡去勢必由下焦決瀆運輸而始暢非因勢利導則餘邪不清也變而通之存乎其人嘗記吳縣門人陳道南於戊辰八月偕閘北賈姓小兒來診手足並腫腹大如鼓豫用麻黃五錢熟附子五錢細辛三錢小便微通而脹如故道南用麻黃六錢原方中加杏仁桔梗一夕而小便大行明旦腫已全消周身微汗而病愈矣可見開肺表疏則一身之水不為大氣所吸不待豬苓澤瀉自能順其就下之性也若夫仲師所言要為示初學辨證用藥法程蓋腰以上有脺與脾能吸收小腸水氣津液由胸中發抒水氣之總機關以散出皮毛為汗腰以下由兩腎泄水輸入下焦直達膀胱為小便一部分有一部分之作用則固不當混同也師曰寸口脈沉而遲沉則為水遲則為寒寒水相摶趺陽脈伏水穀不化脾氣衰則鶩溏胃氣衰則身腫少陽脈卑少陰脈細男子則小便不利婦人則經水不通經為血血不利則為水名曰血分水病所由成起於陽衰陰盛此固盡人知之矣然不明水氣消長之原與水道通行之處則仲師此節意旨正未易明也內經云上焦如霧中焦如漚下焦如瀆所謂上焦如霧者肺為主氣之藏水穀入胃化蒸氣而上達於肺肺竅吸入之天氣較涼與蒸氣相觸乃化為水則肺為發水之原可知飲入於胃胃中至熱不能容涓滴之水西人暴牛烈日中飲以盆水殺而驗之胃中固無水也可見中焦如漚正以所納之水悉受陽明燥化散成水面細泡上出則脾胃為行氣之本可知若肺藏化水下行由腎藏出下焦直達膀胱為小便可見足少陰寒水之藏為泄水之器寸口為手太陰動脈仲師言寸口沉而遲寒水相摶者謂肺寒而氣不行於太陽之表太陽寒水相併而下陷也言趺陽脈伏水穀不化者為胃中原有之熱為寒水所奪而水將泛濫也言少陽脈卑少陰脈細男子則小便不利婦人則經水不通者謂手少陽三焦水道與腎藏俱寒水氣遏於膀胱胞中血海在少腹兩角乃併為寒水所困血凝成瘀水道愈塞故有水腫之病無論何種利水猛藥水終不行者職是故也然則桃核承氣抵當湯丸大黃蟅蟲丸為萬不可少矣蟅蟲即地鱉蟲今藥肆所用硬殼黑蟲非是丸亦無效但病機所在起於肺藏之寒而太陽寒水不行於表裏繼乃延至中脘而陽明燥化無權終乃寒水阻於腎膀纍及胞中血海自非大溫大泄並行不背恐徒事攻瘀瘀卒不行則麻黃附子細辛合乾薑甘草參用抵當丸尚矣或曰此證陽虛血寒正恐不勝重藥故但用澤蘭茺蔚已足若施之後一證猶為近是陳修園治蔡本謙水腫垂死用澤蘭取效其明驗也若此證陰寒太甚概欲以輕劑取效得乎師曰寸口脈沉而數數則為出沉則為入出則為陽實入則為陰結趺陽脈微而弦微則無胃氣弦則不得息少陰脈沉而滑沉則在裏滑則為實沉滑相摶血結胞門其瘕不瀉經絡不通名曰血分上節言寸口脈沉而遲此節言沉而數脈得諸沉當責有水仲師則既言之矣然何以有遲數之別蓋寸口為肺脈太陽虛寒肺氣不能外達脈即見遲太陽標陽外浮吸水不得下行故脈見數數則為出者為標陽外浮言之也沉則為入者為本寒下陷言之也陽實者標陽外實也陰結者裏陰凝結也外有所吸裏有所凝則寒傷衛而更傷營矣上節言趺陽脈伏此節言微而弦夫水氣為病趺陽脈當伏仲師又明言之矣若微而弦則胃氣虛寒虛則納減寒則少氣蓋即上文當伏反緊之脈此正與血分虛寒先見瘕疝腹痛誤下成水胸滿短氣者略相似也尺部脈微固屬水勝血寒當從少陽傷寒脈微細之例若少陰沉滑沉即為水滑即為血叔和脈經言滑為血有餘觀妊娠停經之脈每見滑象足為旁證此即血結胞中之大驗治法當以去瘕為急瘕不去則水不利然則寸口脈沉而數太陽標熱既吸於外而水不下行趺陽脈微而弦又於無陽之脈隱然見瘕疝之象參之少陰之沉滑水寒血凝之象益復顯然近人但見水治水見寒治寒於血分每多疏忽此不讀經方之過也問曰病有血分水分何也師曰經水前斷後病水名曰血分此病難治先病水後經水斷名曰水分此病易治何以故去水其經自下仲師言經水前斷後病水名曰血分此病難治先病水後經水斷名曰水分此病易治究其所以然蓋謂經水之斷或由肝鬱或由血虧大抵虛寒為多雖亦有出於二陽燥熱者此證必不病水因水停經病正在水血分之病不過因水氣太甚阻其徑隧虛者難攻實者易攻妊娠有水氣用冬葵子茯苓散亦易治之明證也設本非妊娠則但去水而經自通矣問曰病者苦水面目身體四肢皆腫小便不利脈之不言水反言胸中痛氣上衝咽狀如炙肉當微咳喘審如師言其脈何類師曰寸口脈沉而緊沉為水緊為寒沉緊相摶結在關元始時尚微年盛不覺陽衰之後營衛相干陽損陰盛結寒微動腎氣上衝咽喉塞噎脅下急痛醫以為留飲而大下之氣繫不去其病不除復重吐之胃家虛煩咽燥欲飲水小便不利水穀不化面目手足浮腫又與葶藶丸下水當時如小差食飲過度腫復如前胸脅苦痛象若奔豚其水揚溢則咳喘逆當先攻擊衝氣令止乃治咳咳止其喘自差先治新病病當在後治病之法當辨虛實緩急始之不慎乃有誤治之變救逆之法則當從先治客病後治本病之例學者不可不知也即如病者苦水面目身體四肢皆腫小便不利此水氣泛濫乃本證也然病人不言苦水而反苦胸中痛及氣上衝咽狀如炙臠微喘咳似非水氣本病而與痰飲之衝氣上逆者略相似仲師所謂脈沉而緊者蓋此證本屬虛寒蓄水沉緊為在裏之象故本病結在關元關元者少陰妊脈之穴在臍下一三寸年盛不覺逮陽衰陰盛水氣漫延先病衛分而後及於營分寒氣溜於腎則腎氣上衝咽喉而脅下急痛脅下本腎藏所居為水道下通之門戶懸飲內痛正在脅下故醫者誤以為留飲用十棗湯大下之水去而寒氣獨留脅下之痛如故又疑痰阻上膈用瓜蒂散吐之於是胃中虛熱上浮而咽燥渴飲矣渴飲無度腎寒不能制水小便不利矣脾陽吐後益虛而水穀不化矣寒水泛濫逆行而面目手足浮腫矣醫者至此尚不覺悟泥於葶藶止脹之說更用葶藶丸以下水非不小差也食飲過度腫復如前所以然者胃陽虛而不能消穀腎陽虛而不能消水也所以胸脅苦痛狀若奔豚者胸為上焦所自起西醫謂之淋巴幹脅為中下二焦水道所從出水道由腎走膀胱屢經誤治陽氣益虛陰寒乃乘虛而上僭水氣衝激於肺肺不能受故咳而喘逆然則治之之法奈何曰此當先治衝氣喘咳為誤治後之新病痰飲篇治衝氣之桂苓五味甘草湯當可借用衝氣既低而咳如故又當用苓甘五味薑辛湯以治咳而喘自止由是治其本病而防己茯苓湯麻黃附子甘草湯栝蔞瞿麥湯茯苓戎鹽湯滑石白魚散俱可隨證酌用矣風水脈浮身重汗出惡風者防己黃耆湯主之腹痛者加芍藥防己黃耆湯方見濕病按此條與風濕同脈浮為風身重為濕濕甚即為水汗出惡風表虛而汗泄不暢也按此亦衛不與營和之證防己以利水黃耆固表而托汗外出白朮炙甘草補中以抑水而風水可愈矣所以腹痛加芍藥者芍藥味甘微苦其性疏泄能通血分之瘀傷寒桂枝湯用之以發脾藏之汗而達肌理者也脾為統血之藏腹為足太陰部分腹痛則其氣鬱於脾之大絡故加芍藥以泄之婦人腹痛用當歸芍藥散亦正以血分凝瘀而取其疏泄若以為酸寒斂陰則大誤矣風水惡風一身悉腫脈浮不渴續自汗出無大熱越婢湯主之越婢湯方麻黃六兩石膏半斤生薑三兩甘草二兩大棗十二枚上五味以水六升先煮麻黃去上沫內諸藥煮取三升分溫三服惡風加附子一枚風水加朮四兩猶是風水之證惡風脈浮與前證同惟身重則病在肌肉一身悉腫則病在皮毛不渴則胃中無熱續自汗出者風主疏泄故也但風為陽邪當得發熱觀中風證便知今病者無大熱而但有微熱則皮毛不開陽氣不得發越之象故用越婢湯內扶脾陽外開皮毛肌腠使風隨汗液外解而其腫自消所謂因勢利導也皮水為病四肢腫水氣在皮膚中四肢聶聶動者防己茯苓湯主之防己茯苓湯方防己黃耆桂枝各三兩茯苓六兩甘草二兩上五味以水六升煮取二升分溫三服肺主皮毛皮水之為肺病此固不言可知按本篇提綱曰其脈亦浮外證跗腫按之沒指不惡風其腹如鼓不渴當發其汗其為越婢加朮湯證無可疑者然何以有防己茯苓湯證曰此為渴者言之也寒水在下不受陽熱之化則津液不得上承而咽喉為燥自非利小便以排水則渴將不止防己茯苓湯此固利小便之方治也太陽水氣本當作汗外泄為表寒所遏則皮毛之氣悉化為水而水氣在皮膚中所以在皮膚中者由皮毛而漸漬肌肉也水漬肌肉則脾陽不達四肢而四肢腫腫之不已陽氣被鬱因見筋脈跳蕩肌肉寒顫如風前木葉聶聶動搖故方中用黃耆以達皮毛桂枝以解肌肉使皮毛肌肉疏暢不至吸下行之水更加甘草以和脾合桂枝之溫使脾陽得旁達四肢但得脾精稍舒而肢腫當消所以用黃耆不用麻黃者此亦痰飲病形腫以其人遂痹故不內之之例也裏水越婢加朮湯主之甘草麻黃湯亦主之越婢加朮湯方見上甘草麻黃湯方甘草二兩麻黃四兩上二味以水五升先煮麻黃去上沫內甘草煮取三升溫服一升重覆汗出不汗再服慎風寒裏水一證用越婢加朮使水濕與裏熱悉從汗解前文已詳言之矣此節特補出甘草麻黃湯方治用麻黃湯之半以發表汗為急務蓋專為無裏熱者設也水之為病其脈沉小屬少陰浮者為風無水虛脹者為氣水發其汗即已脈沉者宜麻黃附子湯浮者宜杏子湯麻黃附子湯方麻黃三兩附子一枚甘草二兩上三味以水七升先煮麻黃去上沫內諸藥煮取二升半溫服八合日三服杏子湯方闕陳修園曰恐是麻黃杏仁甘草石膏湯水病始於太陽而終於少陰太陽當得浮脈少陰即見沉脈按太陽傷寒未經發汗水氣由三焦下注寒之藏即為少陰始病少陰為病其脈當沉為其在裏也小即微細之漸傷寒少陰篇所謂脈微細者指陰寒太甚者言之也此時水邪未經泛濫溢入回腸而下利故見脈小而不見微細水邪雖陷與表氣未曾隔絶寒水下陷要為中陽之虛方治特於麻黃附子湯內加炙甘草以益中氣使中氣略舒便當外達皮毛肌腠變為汗液而水病自除若夫脈浮為風與太陽中風之脈浮同此證尚屬風濕而未成為水水氣壅在皮毛而發為虛脹故曰氣水氣水者汗液欲出不出表氣不能開泄之謂發其汗則水還化氣成汗故其脹即消杏子湯方闕竊意可用風濕證之麻杏甘薏湯要以發汗為一定之標準也厥而皮水者蒲灰散主之蒲灰散方見消渴蒲灰散一方今人不用久矣世皆論蒲灰為蒲黃其實不然即錢太醫以厥而皮水之厥為皮水潰爛以水傷陽氣而厥冷尤為背謬此厥字即上文身腫而冷之冷傷寒金匱中從未有以厥為潰爛者此陳修園之盲從不可為訓者也蒲灰即溪澗中大葉菖蒲味鹹能降味辛能開王一仁在廣益醫院治病有錢姓男子腹如鼓股大如五斗甕臂如車軸之心頭面皆腫遍體如冰氣咻咻若不續見者皆曰必死一仁商於劉仲華取藥房中乾菖蒲一巨捆熾炭焚之得灰半斤隨用滑石和研用麻油調塗遍體以開水調服一錢日三服明日腫減大半一仁見有效益厚塗之改服二錢日三服三日而腫全消飲食談笑如常人乃知經方之妙不可思議也前數年豫在家鄉治謝姓小兒莖及皋丸明若水碧令製而服之一夕得小便甚多其腫即消惟腹滿不減繼以薑辛朮附後以急於赴滬不復知其究竟甲戌十一月聞此兒已十四歲矣庚午秋治海潮寺路宋姓小兒水腫亦用之但其人手足不冷小便清內服麻黃附子細辛湯佐以五苓冬葵子車前子外敷蒲灰散早夜調服一錢五日而腫全消每一日夜小溲十七八次云問曰黃汗之為病身體腫發熱汗出而渴狀如風水汗沾衣色正黃如柏汁脈自沉何從得之師曰以汗出入水中浴水從汗孔入得之宜耆芍桂酒湯主之黃耆芍藥桂枝苦酒湯方黃耆五兩芍藥桂枝各三兩上三味以苦酒一升水七升相合煮取三升溫服一升當心煩服至六七日乃解若心煩不止者以苦酒阻故也黃汗之為病鬱於營分日久而後發此與水氣鬱在衛分者不同方其鬱伏未久營熱不甚故身腫而冷狀如周痹至於身體腫發熱汗出而渴營熱始熾矣汗沾衣上色黃如柏汁者血中之液以熱鬱而外泄也今試以針刺手其初必有鮮血一點血過乃出黃水即此而推之便可知黃汗之由實起於營分鬱熱所以如柏汁者以營熱所蒸益加濃厚非如黃疸之黃由胃底膽汁而成也然不辨明致此之由則治法何從下手將清營熱乎何以處在表之濕將疏表氣乎何以處營之熱仲師申明汗出而浴水入汗孔得之而治法乃定矣以表虛也故君黃耆以營鬱之當宣也故用芍藥桂枝又懼藥力之不勝病氣也故煎以具揮發性通調血分之苦酒而營分之鬱熱始解今人用醋和麵塗傷能去瘀血其明證也婦人肝鬱不調內痛用醋炒柴胡醋磨青皮白芍其痛立解當亦以其能達血鬱之故則苦酒之作用可知矣庸工動稱能斂肝陰豈仲師用苦酒之旨乎所以六七日乃解者以久鬱之邪未易戰勝也所以心煩者營分久鬱而主血之藏虛一時不勝藥力也黃汗之病兩脛自冷假令發熱此屬歷節食已汗出又身常暮盜汗出者此營氣也若汗出已反發熱者久久其身必甲錯發熱不止者必生惡瘡若身重汗出已輒輕者久久必身瞤瞤即胸中痛又從腰以上汗出下無汗腰寬弛痛如有物在皮中狀劇者不能食疼重煩躁小便不利此為黃汗桂枝加黃耆湯主之桂枝加黃耆湯方桂枝芍藥各三兩甘草黃耆各二兩生薑三兩大棗十二枚上六味以水八升煮取三升溫服一升須臾啜熱稀粥一升餘以助藥力溫覆取微汗若不汗更服中風之證受病於肌腠內困於脾陽則用桂枝湯助脾陽以解肌使汗從腠理外泄脾統血而主肌肉為血絡凝聚之處故風鬱肌理者宜桂枝湯所以達營鬱也風從皮毛入邪薄肌肉遏其營分是生表熱惟黃汗一證所以異於中風者足脛必冷所以然者陽鬱於上而不下通也中風證有汗黃汗證亦有汗或食已汗出或暮夜盜汗皆為營熱外達或汗出不解反至發熱則營分熱度更高久必皮膚甲錯而生惡瘡試觀癰瘍外證先病熱與腫為血鬱增熱繼則劇痛為熱甚血敗敗即膿成待醫者決去其膿其痛始定此即營分鬱熱必致癰膿之明證也或身重而汗已輒輕者濕將與汗俱去也然汗出陽傷久必身瞤瞤者如目光之旋轉閃爍不定彼此互相跳動也浮陽張於外牽掣胸中胸中陰液已虧不能外應故瞤見於外而痛應於裏若腰以上汗出而不及腰以下則汗濕在下而腰髖弛痛少陽三焦道路由腎而下屬膀胱陽不下通故腰以下多所牽掣如有物在皮中狀又其甚者胸中發抒水氣之樞機一時停頓脾陽不能作汗外泄故濕阻胃之上口而不能食濕在肌肉故身疼重心陽被鬱故煩燥陽氣在上吸水不得下行故小便不利究其所以然實由水濕鬱其營血所致要知黃汗一證肌表以久汗而虛不同中風之為卒病此桂枝湯所以加固表之黃耆也師曰寸口脈遲而澀遲則為寒澀則為血不足趺陽脈微而遲微則為氣遲則為寒寒氣不足即手足逆冷手足逆冷則營衛不利營衛不利則腹滿脅鳴相逐氣轉膀胱營衛俱勞陽氣不通即身冷陰氣不通即骨疼陽前通則惡寒陰前通則痹不仁陰陽相得其氣乃行大氣一轉其氣乃散實則矢氣虛則遺溺名曰氣分氣分心下堅大如盤邊如旋盤桂甘薑棗麻辛附子湯主之桂甘薑棗麻辛附子湯方桂枝生薑各三兩細辛甘草麻黃各二兩附子一枚炮大棗十二枚上七味以水七升先煮麻黃去上沫內諸藥煮取二升分溫三服當汗出如蟲行皮中即愈仲師既明水氣證治而終以血分既明黃汗證治而終以氣分欲人於同中求異而明治法也蓋水之甚者為水水不甚即為黃汗氣之外泄而遇寒為水水氣之在裏不遇寒則仍為氣水可攻而氣不可攻要其證則為表裏上下俱寒如冬令雨雪堅冰陽氣鬱伏不動不似春夏之易散故仲師舉寸口之脈遲而澀便可知外不達於皮毛而太陽之陽氣先虛舉趺陽之脈微而遲便可知裏氣虛寒四肢不得稟中陽之氣中脘虛寒不能發抒營衛二氣於是太陰之腹部厥陰少陰之脅下悉為客寒所據而太陽水氣不行於膀胱中脘脾陽不通於肌腠因而身冷裏陰不濡於骨髓因而骨痛由是太陽之氣通於前而腎陽不與俱行則小便已而嗇嗇惡寒少陽之氣通於前而三焦之火不與俱至則少腹滿而外證不仁故必先去其固陰沍寒使血海之營氣得溫而上行肺藏之衛氣清寒而下降然後鬱伏之氣從而消釋大氣者陽氣也陽氣轉則陰寒散矣由是寒氣之乘裏虛者以遺溺解而腹滿脅鳴止表裏和而手足不復逆冷矣此桂甘薑棗麻辛附子湯所以治心下堅大如盤邊如旋杯凝固不解之陰寒而效如桴鼓也心下堅大如盤邊如旋盤水飲所作枳朮湯主之枳朮湯方枳實七枚白朮二兩上二味以水五升煮取三升分溫三服腹中軟即當散也診病之法惟外證同而虛實異治者為不易辨也同一心下堅大如盤邊如旋杯之證旋杯按之硬若杯之旋轉而高出何以一則宜上下表裏通行溫散汗出如蟲行皮中而愈一則用攻堅燥濕三服後腹中軟而愈蓋氣分之脈必兼遲澀水飲之脈必見沉弦此脈之易辨者也氣分則見窒塞水飲必將內痛此證情之易辨者也氣為寒約則溫以散之寒因水實則攻而和之此仲師所以稱醫聖也黃疸病證並治第十五寸口脈浮而緩浮則為風緩則為痹痹非中風四肢苦煩脾色必黃瘀熱以行趺陽脈緊而數數則為熱熱則消穀緊則為寒食即為滿尺脈浮為傷腎趺陽脈緊為傷脾風寒相摶食穀即眩穀氣不消胃中苦濁濁氣下流小便不通陰被其寒熱流膀胱身體盡黃名曰穀疸濕與熱併乃生黃色苴菜在甕醬麴在盦其明證也故論黃疸所由成必先論脾藏之濕脾主肌肉而汗泄於肌理氣達於四肢則濕無停阻之患惟風中肌肉則脾陽必頓頓則腠理閉塞而肌肉為痹四肢為脾所主濕熱留於脾藏故四肢苦煩風脈本浮濕痹肌肉則緩寸口見浮緩之脈脾中瘀熱行於周身而面目爪甲俱黃矣此一因也一係胃中之熱胃熱固能消穀而肌肉外受風寒內困脾陽即宿食為之停阻水穀停於中脘濕熱以日久而增故趺陽見緊數之脈便可決為發黃之漸此二因也一係風邪由肌腠入裏循三焦而下及於腎腎為寒水之藏下有二管直接膀胱為水道所從出風陽吸於腎則水道不行寒邪由肌腠犯脾藏則脾以虛寒而留濕食穀即眩者濕與熱淆雜而濁氣上冒於顛也寒入足太陰脾不能為胃輸津液作汗濕熱反致內陷小便不通胃中濁熱無外出之路乃由腎而流入膀胱故於尺部少陰脈浮見腎水不流足背趺陽脈緊見脾陽不運皆足蘊蒸發黃此三因也名曰穀疸額上黑微汗出手足中熱薄暮即發膀胱急小便自利名曰女勞疸腹如水狀不治女勞疸證狀有六一曰額上黑額上為顱骨覆腦處腎虛者腦氣必虧故精氣不榮於額上而見晦滯之色陳修園以額上為心部腎邪重而水色見於火部直瞽說耳二曰微汗出微汗出似不足為病而女勞疸獨否蓋用力入房皮毛開而汗液屢泄泄之不已皮毛從此不收津液即隨時漏泄三曰手足中熱則由以欲竭精之時手足用力太猛少陽膽火乃乘少陰之虛流溢於勞宮湧泉二穴四曰薄暮即發薄暮陽衰之候寒濕下動乃反迫真陽而外出五曰膀胱急寡欲者腎陽充充則下焦水道布氣於少腹膀胱以溫和而緩多欲者腎陽虛虛則陽氣不及州都膀胱以虛寒而急此證與脈緊為寒同義可見陳修園謂腎虛纍及外府猶為未達一間也六曰小便自利自利者不自知而利也腎關不固則小溲不禁黃坤載謂火敗水寒蟄藏失政蓋略近之若夫脾腎兩敗腹如水狀即為不治之證蓋腹為足太陰部分腎即在腹之兩旁腎藏無火不能蒸化脾陽由是脾藏虛寒濕邪凝沍從而腹滿然苟用四逆加茵陳蒿以治之何嘗不可挽救一二昔金子久患此證自服茵陳蒿湯不愈乃就診於丁君甘仁授以附子湯加茵陳但熟附子僅用錢半服二劑不效乃仍用茵陳蒿湯以致脾氣虛寒大便色白而死為可惜也但金本時醫即授以大劑四逆湯彼亦終不敢服則是有方與無方同有藥與無藥同經方見畏於世若此可慨夫心中懊憹而熱不能食時欲吐名曰酒疸酒者水與穀蘊蒸而後成隨體氣強弱以為量體氣強則從三焦水道下走膀胱體氣弱則留於中脘而成濕熱之媒介胃絡上通於心胃中酒氣上薰於心故心中懊憹而熱酒氣鬱而成熱胃氣大傷故不能食酒性上泛故時欲吐得甘味則益劇此酒疸之漸也陽明病脈遲食難用飽飽則發煩頭眩小便必難此欲作穀疸雖下之腹滿如故所以然者脈遲故也陽明病胃病也脈遲胃寒也寒則不能消穀故飽食即發煩所以發煩者蘊積不消而生熱也胃中生熱必衝腦部故頭眩闕上痛目中不了了者亦即胃中熱邪上衝腦部之明證也但彼為實熱實熱則生燥此為虛熱虛熱則生濕濕邪垢膩流入三焦故小便必難胃中穀食不消濕熱相摶於是欲作穀疸且陽明實熱下之則腹滿除陽明虛熱雖下之而腹滿如故所以然者則以胃虛脈遲中陽不運非如滑大之脈便於峻攻也餘詳傷寒發微陽明篇不贅夫病酒黃疸必小便不利其後心中熱足下熱是其證也酒黃疸者或無熱靖言了了腹滿欲吐鼻燥其脈浮者先吐之沉弦者先下之酒疸心中熱欲吐者吐之愈酒疸下之久久為黑疸目青面黑心中如噉蒜虀狀大便正黑皮膚爪之不仁其脈浮弱雖黑微黃故知之酒疸之病有相因而洊至者體虛之人不勝酒力故濕熱滲下焦而小便不利不惟酒氣上薰而心中熱且酒氣下移而足下熱此為酒疸之垂成亦有酒氣不冒於心而肺獨受其薰灼者則心不熱心不熱故神色安靖出言了了而鼻中燥熱者亦為將成之酒疸此時病在心肺或為心中熱或為鼻中燥以及胃氣上泛欲吐者皆可用瓜蒂散吐之濕熱泄於上酒疸可以不作若小便不利足下熱即為濕熱下注但需茵陳梔子大黃湯下之以泄其熱酒疸亦可以不作然必審其脈浮而後可吐倘屬沉弦即當先下此即在高者引而越之在下者引而竭之之例也若心中熱而誤下之則在上之熱未除在下之陰先竭積久遂成黑疸傷其血分故目青跌打損傷肌膚見青色者傷血故也濕熱不除面色薰黃此與濕家身色如薰黃同但彼為黃中見黑此為黑中見黃為小異耳心熱仍在懊憹欲死故如瞰蒜狀猶謬所謂猢猻吃辣胡椒也酒少飲則能生血多飲反能傷血熱瘀在下薰灼胞中血海熱血上行則瘀積腸中故大便色黑血不榮於肌表故皮膚爬搔而不知痛癢酒氣在上故脈仍見浮特因誤下而見弱耳面色黑而微黃故知非女勞之比竊意此證黃連阿膠湯或可療治或借用百合病之百合地黃湯以清血熱而滋肺陰附存管見俟海內明眼人研核之師曰病黃疸發熱煩渴胸滿口燥者以病發時火劫其汗兩熱相得然黃家所得從濕得之一身盡發熱而黃肚熱熱在裏當下之黃疸所由成胃熱與脾濕相參雜者為多獨有發熱煩渴胸滿口燥之證為亢熱而無濕推原其故則以方遘他病時證屬陽熱復以火劫發汗兩熱相得便與濕熱參雜之證判若天淵概云從濕得之可乎一身盡發熱面黃肚熱仲師既明示人以瘀熱在裏直可決為獨陽無陰之大黃硝石湯證傷寒陽明病之但惡熱不惡寒宜大承氣湯者即其例也請更據傷寒發黃證而推求之太陽魄汗未盡瘀濕生熱亦必發黃此時濕尚未去要不在當下之例故有陽明病無汗小便不利心中懊憹者身必發黃陽明病被火額上微汗出小便不利者必發黃但頭汗出劑頸而還小便不利渴飲水漿者此為瘀熱在裏身必發黃茵陳蒿湯主之何以同一陽明病仲師於前二證不出方治非以其從濕得之濕未盡者不當下乎本條熱在裏與傷寒之瘀熱在裏同法在可下況本條一身盡發熱而黃肚熱陽明府實顯然豫故曰宜大黃硝石湯也脈沉渴欲飲水小便不利者皆發黃腹滿舌痿黃躁不得睡屬黃家黃疸將成起於蘊濕生熱此固盡人知之矣然其所以致此之由則由於辨之不早即如仲師所述脈沉渴欲飲水小便不利者皆發黃夫消渴小便不利脈浮者宜利小便發汗則仲師方治明有五苓散矣小便不利而渴果為腎寒不能化氣行水則用栝蔞瞿麥丸亦足矣何必待發黃而始治又如腹滿舌痿黃躁不得睡屬黃家夫腹為足太陰部分舌苔黃膩屬濕則濕在脾藏可知陽明病多不寐證緣胃中燥實不和也此云躁不得睡其為胃熱無疑此證治濕則增燥潤燥則滋濕如欲兩全但用白虎湯加蒼朮可矣果其胃中有燥矢用茵陳蒿湯亦足矣曲突徙薪此為上策何必焦頭爛額乃為上客乎黃疸之病當以十八日為期治之十日以上瘥反劇為難治病氣之衰不踰三候傷寒太陽證發於陰者以七日為一候仲師言黃家從濕得之濕鬱生熱乃傳陽明發於陽者以六日為一候傷寒論發於陰七日愈發於陽六日愈之文謂一候也玩太陽病七日以上自愈之條足為明證陽明篇云傷寒三日陽明脈大謂本太陽之病過三候而反劇也然則黃疸以十八日為期即屬陽明篇三日之例陰以七為候則傷寒三日為二十一日陽以六為候故黃疸三候為十八日所以然者始病十八日內可發汗及利小便可清熱而去濕正猶太陽傷寒一汗病已更無餘病若過十八日濕盡化熱欲攻不得故仲師言反劇為難治也疸而渴者其疸難治疸而不渴者其疸可治發於陰部其人必嘔陽部其人振寒而發熱也非渴之難渴而飲水之難黃疸之病既從濕得之則腸胃之中必多粘滯宿垢妨其水道小便不利濕乃日增則其證益劇此其所以難治也若夫不渴之證脾陽猶能化氣輸津即不治亦當漸愈此其所以可治也但同一黃疸不惟渴與不渴之異即所發之部分要自不同故有脾陽不振濕留中脘胃底膽汁不容勢必亢而上逆故嘔下文云諸黃腹痛而嘔者宜柴胡湯即此證也發於太陰故稱陰部太陽寒水不行於膀胱即出於皮毛表虛不達加以外寒水氣遇寒即病振栗營熱內抗即生表熱後文所云諸病黃家當利小便脈浮者當以汗解桂枝加黃耆湯主之即此證也發於太陽故稱陽部陽部以太陽寒水言之陰部以太陰濕土言之要知黃疸病源以水與濕為主要而成於膽汁之摻雜膽火炎上不能容水與濕乃合併而溢出皮外此為黃疸所由成膽汁色黃故其汁亦如柏汁之染物可見太陽病由汗出不徹而有發黃之變者皆膽汁與濕熱混雜為之也穀疸之病寒熱不食食即頭眩心胸不安久久發黃為穀疸茵陳蒿湯主之茵陳蒿湯方茵陳蒿六兩梔子十四枚大黃二兩上三味以水一斗先煮茵陳減六升納二味煮取三升去滓分溫三服小便當利尿如皂角汁狀色正赤一宿腹減黃從小便去也穀疸之病起於太陰之濕成於陽明之熱太陰寒濕與陽明之熱交爭則生寒熱寒熱作時胃中飽悶不食有時思食穀氣引動胃熱上衝腦部即病頭眩心胸不安者胃熱合膽汁上攻胸中之濕鬱而生熱也濕熱與膽汁混合上於頭目則頭目黃發於皮外則一身之皮膚黃於是遂成穀疸所以用茵陳蒿湯者用苦平之茵陳以去濕苦寒清熱之梔子以降肺胃之濁製大黃走前陰疏穀氣之瘀俾濕熱從小溲下泄則腹脹平而黃自去矣按此節後仲師言分溫三服小便當利尿如皂角汁狀鄙意大黃當走大腸惟製大黃走小便服製大黃者小便多黃而其色極深以意會之當是脫去製字然既成穀疸大便必少或大便行後繼以黃濁之小便亦未可知也黃家日晡所發熱而反惡寒此為女勞得之膀胱急少腹滿身盡黃額上黑足下熱因作黑疸其腹脹如水狀大便必黑時溏此女勞之病非水病也腹滿者難治硝石礬石散主之硝石礬石散方硝石熬黃礬石燒等分上二味為散大麥粥汁和服方寸匕日三服病隨大小便去小便正黃大便正黑是其候也硝石即芒硝之成塊者礬石即皂礬能化糞為水女勞用此方治此亦急下存陰之義為上文腹如水狀言之也皮水其腹如鼓外浮而中空日晡所發熱證情以屬陽明陽明當不惡寒而反惡寒者則以腎陰虧則陽明更燥觀少陰三急下證可知相火敗也則表陽更虛也觀虛勞證手足逆寒可知燥則發熱虛則惡寒仲師所謂女勞得之者為其陰虛而陽越也膀胱不得溫和之氣故急虛氣膨於少腹故滿腎虧則腦虛故腦氣不榮額上而見黧色膽胃之火下陷湧泉故足下熱傷寒論所謂穀氣下流也傷及血海故便血大便色黑者瘀血之象也脾腎俱虛故濕陷大腸而時溏方用硝石以去垢礬石以化燥屎和以大麥粥汁以調胃而疏肝使病從大小便去此亦在下者引而竭之之例也酒疸心中懊憹或熱痛梔子大黃湯主之梔子大黃湯方梔子十四枚大黃三兩枳實五枚豉一升上四味以水六升煮取二升分溫三服酒氣留於心下上逆心藏則心氣亢而不下往往有虛煩失眠之證於是心陽不斂轉為懊憹酒之標氣為熱從胃系上迫於心故熱痛方用梔豉與傷寒太陽篇治心中懊憹同加枳實則與梔子厚朴湯同而必用大黃者以酒疸胃熱獨甚也但使胃熱一去則黃從大便去心下諸病將不治自愈矣諸病黃家但利其小便假令脈浮當以汗解之宜桂枝加黃耆湯主之桂枝加黃耆湯方見水氣黃疸之病起於濕成於水利小便發汗仲師既出茵陳五苓散及桂枝加黃耆湯方治矣食古而不化此笨材也徐忠可言嘗治一垂死之證令服鮮射干至數斤而愈又有偏於陰者令服鮮益母草至數斤而愈由前之說則鼻燥頭眩心中熱痛懊憹欲死之證也由後之說則大便必黑之證也其有不係酒疸穀疸女勞疸者但以小便不利濕鬱發黃服鮮車前根葉自然汁當無不效此又易利小便之變法也諸黃豬膏髮煎主之豬膏髮煎方豬膏半斤亂髮如雞子大三枚上二味和膏中煎之髮消藥成分再服病從小便出方用豬油半斤熬去滓加亂髮如雞子大三團入煎髮消藥成分三服病從小便出仲師方治如此然但言諸黃而不言所治何證豫謂此酒疸穀疸女勞疸通治之方也按婦人雜病篇云胃氣下泄陰吹而正喧此穀氣之實也豬膏髮煎主之穀氣實非穀疸之漸乎校千金云太醫校尉史脫家婢黃病服此下燥糞而瘥神驗徐忠可治駱天游黃疸用豬膏四兩髮灰四兩煎服一劑而瘥皆其明證至如女勞一證相火熏灼血分必燥酒氣傷血血分亦燥故二證大便皆黑豬膏以潤燥髮灰為血餘取其入血分而和血凡大便色黑肌膚甲錯者皆宜之故不指定為何證也黃疸病茵陳五苓散主之茵陳五苓散方茵陳十分末五苓散五分上二味和先食飲服方寸匕日三服黃疸從濕得之此固盡人知之治濕不利小便非其治此亦盡人知之五苓散可利尋常之濕不能治濕熱交阻之黃疸倍茵陳則濕熱俱去矣先食飲服者恐藥力為食飲所阻故也黃疸腹滿小便不利而赤自汗出此為表和裏實當下之宜大黃硝石湯大黃硝石湯方大黃黃柏硝石各四兩梔子十五枚上四味以水六升煮取二升去滓內硝更煮取一升頓服凡熱邪內壅陽明小便必短赤甚而宗筋內痛時出白物又甚則筋牽右髀而痛此固審為大承氣證矣腹滿小便不利而赤雖證屬黃疸其為陽明裏實則固同於傷寒自汗出則為表和病氣不涉太陽故宜大黃硝石湯以攻下為主疸病多由胃熱上薰故用苦降之梔子此味宜生用濕熱阻塞腎膀故加苦寒之黃柏或云梔子黃柏染布皆作黃色仲師用此欲其以黃治黃是說也豫未之信黃疸病小便色不變欲自利腹滿而喘不可除熱熱除必噦噦者小半夏湯主之小半夏湯方見痰飲小半夏湯一方以生半夏合生薑為寒濕上逆者用之也豈可以治黃疸故陳修園於本條下極稱理中湯加茵陳之妙然玩仲師本文特為誤下成噦者言之非以治疸也小便色不變則腎膀無熱欲自利則腸中無熱腹滿而喘便可決為太陰虛寒若再事攻下則熱除而轉噦噦者虛寒上逆之變證與欲嘔之病正同用特借之以救逆蓋此證當不能食不能食則胃中本自虛冷客熱不能消穀傷寒陽明篇云陽明病不能食攻其熱必噦所以然者胃中虛冷故也然則此證不經誤治原宜四逆理中豫故謂用小半夏湯為誤治成噦言之也諸黃腫痛而嘔者宜柴胡湯柴胡湯方即小柴胡湯見傷寒太陽篇又見嘔吐按本方加減法腹痛去黃芩加芍藥黃疸之病始於濕中於水成於燥豫讀雜病論至痛而嘔者宜柴胡湯恍然於膽火之為病也夫濕勝則腹滿水勝則小便不利燥勝則胃熱上攻而心中熱疼或上薰於肺而鼻燥或食入胃熱上浮而頭眩原其所以病黃疸之由則由胃底原有之膽汁不能容水與濕水濕混入於胃膽汁出而相抗乃隨水濕溢出皮毛手足頭目而成黃色腹為足太陰部分膽邪乘脾乃病腹痛傷寒太陽篇云脈弦緊者腹中劇痛先與小建中湯不差與小柴胡湯此即膽邪乘脾之治也嘔固少陽本病此可證柴胡湯統治諸黃之旨矣男子黃小便自利當與虛勞小建中湯此亦肝膽乘脾之方治也首篇云知肝傳脾必先實脾男子黃小便自利則脾藏之濕欲去而本藏先虛脾虛而膽邪乘之必有前條腹痛而嘔之變用甘味之小建中湯此正因脾藏之虛而先行實脾歷來注家不知仲師立方之意專為胃底膽汁發燥內乘脾藏而設故所言多如夢囈也驚悸吐衄下血胸滿瘀血病脈證第十六寸口脈動而弱動即為驚弱則為悸此寸口當以手太陰之第一部言非以全部分言也寸口之脈世稱左心而右肺其實心寄肺藏之內原不必強分左右也寸口之脈暴按則動細按則弱蓋倉卒之間暴受驚怖則心為之跳蕩不寧而寸口之動應之故動則為驚既受驚怖氣餒而惕息寸口之弱應之故弱則為悸此證不得臥寐才合目則驚叫又復多疑豫嘗治趙姓婦人一證頗類此中夜比鄰王姓失火夢中驚覺人聲鼎沸急從樓梯奔下未及地而仆雖未波及而心中常震蕩不寧豫用炙甘草湯加棗仁辰砂五劑而臥寐漸安不復叫呼矣師曰尺脈浮目睛暈黃衄未止暈黃去目睛慧了知衄今止大凡人體中濁陰下墜則動急之脈上出魚際婦人臨産脈出指端婦人經來脈浮魚際此血下出而脈形變於上也浮陽上衝則尺部浮動而數急虛勞吐血則尺脈浮大陽熱上冒鼻中衄血則尺部亦浮大此血上逆而脈形見於下也本條以尺部脈浮而知衄血然必合目睛暈黃始可定為衄血所以然者衄為浮陽上衝腦部之證蓋目系內接腦部無論陽明實熱太陽標熱一犯腦部則顱骨縫開血從額上下走鼻孔衄血多日則溢入目睛而見黃色此與太陽溫病津液素虧誤發汗而微見黃色者同例皆為血色發黃之明證故醫者診脈辨色既於尺部得浮脈更據目睛之黃與不黃便可決衄之止與不止也又曰從冬至春衄者太陽從夏至秋衄者陽明原本誤今校正太陽表實無汗之證血熱內抗外不得泄則上衝於腦而為衄陽明裏熱不得大便則亦上衝於腦而為衄此太陽陽明之脈因於證不因於時也然則仲師何以言從春至夏衄者太陽從秋至冬衄者陽明曰此傳寫之誤也太陽傷寒見於冬令為多太陽中風見於春令為多則原文當云從冬至春衄者太陽自夏徂秋天氣炎熱腸胃易於化燥陽明內實為多則原文當云從夏至秋衄者陽明陳修園亦知其說不可據不敢訂正其失而謂四時當活看猶為未達一間衄家不可汗汗出必顴上陷脈緊急直視不能眴不得眠此條見傷寒論前釋額上陷既訂正為額旁陷矣然猶未甚精確也人之頭顱惟兩太陽穴最為空虛液少則瘦而下陷部位在顴以上則本條當云顴上陷所以然者衄家陽熱衝腦更復發汗則陽熱益張陰液枯燥顴上太陽穴因瘦而陷脈緊急目直視不能眴不得眠皆陽熱外張陰液內竭之象也餘詳傷寒發微不贅病人面無色無寒熱脈沉弦者衄脈浮弱手按之絶者下血煩咳者必吐血文曰病人面無色初未明言何病然面無色則氣弱血虛之象也虛勞篇男子面色薄為亡血加以外無寒熱則病不在表而在裏脈見沉弦者水勝血負陰寒內據而陽上亢也陽氣衝腦則顱骨縫開血從腦出而為衄此證既無寒熱即為裏虛與上脈浮之衄不同脈浮而弱弱為血虛浮即為陰不抱陽若手按之而不能應指則陽上浮而氣下脫矣在男子為便血在婦人為崩漏至於浮弱之脈加之以煩咳則血被衝激而上出於口三證不同而血分之熱度皆低若誤浮陽為實熱投以寒涼必致上冒之浮陽益急而見發熱病乃不可治矣夫吐血咳逆上氣其脈數而間有熱不得臥者死吐血咳逆上氣此即上煩咳吐血之證但脈本浮弱何以反數本無寒熱何以間有表熱則涼藥誤之也嘗見丹徒趙朴庵在四明醫院吐血表有微熱既返丹徒醫家投以涼藥數十劑表熱日甚一日至於纍夜失眠以至於死可哀也已此證誤於涼藥壓之不平發之益熾至於血熱消亡而其人已死矣夫酒客咳者必致吐血此因極飲過度所致也酒標熱而本寒標熱傷肺因病咳嗽本寒傷脾因病多痰痰不盡則咳不止肺絡激破因病吐血此非外感皆貪杯者所自取仲師雖不出方治當清濕熱要無可疑陳修園謂五苓去桂加知母石膏竹茹多效蓋近之矣寸口脈弦而大弦則為減大則為芤減則為寒芤則為虛虛寒相摶此名為革婦人則半産漏下男子則亡血失精此節互見虛勞篇說解已詳茲不贅亡血不可發其表汗出即寒栗而振亡血一證血分之熱度本低發其表則熱度益低血熱損於前表陽虛於後有不病寒栗而振乎亡友丁甘仁嘗言豫治失血證驗其血熱虧耗者每以附子理中取效真至言也說解詳傷寒太陽篇並補方治病人胸滿唇痿舌青口燥但欲漱水不欲咽無寒熱脈微大來遲腹不滿其人言我滿為有瘀血病人胸滿為氣滯不通其為有濕痰與否尚未可定血之色見於唇亡血者唇白血熱重則唇黑至於唇乾黑而痿其為瘀血無疑舌青者死血之色見於上也血乾則口燥然燥而渴飲猶恐為陽明之熱若但欲漱水不欲咽則燥氣不在腸胃可知無寒熱則決非表病脈微大來遲血停於下而脈不應也腹不滿無宿食也病者自言滿其為蓄血無疑輕則桃核承氣重則抵當湯丸視病之輕重而酌劑可也病者如有熱狀煩滿口乾燥而渴其脈反無熱此為陰伏是瘀血也當下之病者如有熱狀於何見之一見於心煩胸滿一見於口乾燥而渴蓋蓄血一證原自有合陽明燥實者內經二陽之病發心脾女子不月是也然按其脈有時與證情不同此又何說蓋陰血內伏則脈不奮興是當以桃核承氣合抵當湯下之瘀血行則煩滿燥渴止矣火邪者桂枝去芍藥加蜀漆牡蠣龍骨救逆湯主之桂枝去芍藥加蜀漆牡蠣龍骨救逆湯方桂枝三兩去皮甘草二兩炙龍骨四兩牡蠣五兩生薑三兩大棗十二枚蜀漆三兩洗去腥上為末以水一斗二升先煮蜀漆減二升納諸藥煮取三升去滓溫服一升此條大旨與火劫發汗同火劫發汗或為驚狂或圊血吐血要以驚狂為最劇故傷寒太陽篇於火劫亡陽一證出救逆湯方治方用龍牡以收上浮之陽加蜀漆以去痰按火邪之為病因火薰灼毛孔汗液外泄衛氣太強肌肉之營氣不與衛和故用桂枝薑棗扶脾陽外達使與在表之衛氣融洽一片外浮之陽氣乃與裏氣相接所以去芍藥者不欲過泄其營氣故也心下悸者半夏麻黃丸主之半夏麻黃丸方半夏麻黃各等分上二味末之煉蜜和丸小豆大飲服三丸日三服太陽寒水內陷水氣淩心則心下悸此非可漫以鎮心之治治也皮毛不開則水氣之在表者不去濁陰失降則水氣之在裏者不除半夏麻黃丸用生半夏以去水生麻黃以發汗不治悸而悸當自定所以用丸者欲其緩以攻之蓋因水氣日久化為粘滯之濕痰非如暴感之證水氣尚清易於達毛孔而為汗也吐血不止者柏葉湯主之柏葉湯方柏葉乾薑各三兩艾三把上三味以水五升取馬通汁一升合煮取一升分溫再服千金加阿膠三兩亦佳吐血無止法強止之則積為瘀血而病變不測嘗見四明某患吐血西醫用止血針止之遂至瘀結大腸大便不通後用豬膽汁導下其燥糞投之水中化為血色又有用鮮生地地骨皮止之者其人腹中常痛故雖吐而不止斷無強止之理柏葉湯方治用苦澀微寒清血分之側柏葉以除肺藏之熱又恐其血之凝滯也用溫脾之乾薑以和之更用逐寒濕理氣血之艾葉以調之惟馬通汁不易製陳修園謂無馬通汁可用童便代之引上逆之血而導之下行則不止血而血自止矣下血先便後血此遠血也黃土湯主之黃土湯方亦主吐衄甘草乾地黃白朮附子各三兩炮阿膠三兩黃芩三兩竈中黃土半斤上七味以水八升煮取三升分溫三服脾寒不能統血則下陷而便血尤在涇謂脾去肛門遠故曰遠血是也黃土湯方治溫涼並進以血之下泄久久必生燥熱也故用地黃黃芩阿膠以潤而清之以脾藏之虛寒下陷也故用甘草白朮以補虛炮附子以散寒更用竈中黃土以去濕而其血當止辛未八月曾治強姓飯作同事下利證所下之血如水晝夜不食幾死矣方用竈中黃土四兩炮附子五錢乾薑四錢五劑後利止能食蓋即黃土湯之意也下血先血後便此近血也赤豆當歸散主之赤豆當歸散方見狐惑篇先血後便此即西醫所謂腸出血之證也按本書百合狐惑篇病者脈數節實為腸癰證欲知有膿節脫文而赤小豆當歸散要為腸癰正治語詳本條下茲不贅述赤小豆以去濕當歸以和血欲使膿去而新血不傷也由此觀之本條之近血證情必與腸癰為近故方治同也心氣不足吐血衄血瀉心湯主之瀉心湯方大黃二兩黃連黃芩各一兩上三味以水三升煮取一升頓服之太陽標陽下陷則心氣以下不足而虛氣結成痞與陽明燥氣相合則大便不行燥氣上迫於心則心氣愈形不足燥熱上衝於腦則病衄血大腸燥熱挾血海之血上出於口則病吐血方用芩連大黃引熱下泄則心藏以不受薰灼而自舒矣嘗見同鄉韓筠谷治紅木作吐血證用此方一下而吐血立止蓋亦釜底抽薪之旨也嘔吐噦下利病脈證治第十七夫嘔家有癰膿不可治嘔膿盡自愈此為熱鬱傷絡之證與尋常嘔吐不同師但言嘔家有癰膿正不知其在肺在胃傷寒太陽篇云凡服桂枝湯吐者其後必吐膿血也按肺癰之為病始萌可救膿成則死則此節所謂不可治嘔膿盡自愈者必非肺癰可知竊意凡遇此證可竟用外科犀黃丸以止痛而消毒千金葦莖湯桔梗甘草湯並可用之當歸赤小豆散排膿散尤為主要蓋血腐成膿利用抉排若外體之潰瘍然毒未盡者不當急於生肌也此條見傷寒厥陰篇先嘔却渴者此為欲解先渴却嘔者為水停心下此屬飲家嘔家本渴今不渴者心下有支飲故也此屬支飲水氣濕痰阻於上膈膽胃上逆則一時傾吐而出及水氣濕痰既盡獨存膽胃之火乃一轉而為燥渴此即欲飲水者少少與之即愈之證也故渴為欲解若水停心下津液不能上潤喉舌而渴及胃邪充溢滲入胃之上口渴底膽火不能相容乃至衝激而嘔此飲家所以先渴却嘔也若夫嘔而不渴則心下支飲方盛胃中膽火不煬此在痰飲篇為小半夏湯證說詳嘔家本渴條下不贅問曰病人脈數數為熱當消穀引飲而反吐者何也師曰以發其汗令陽微膈氣虛脈乃數數為胃熱不能消穀胃中虛冷故也脈弦者虛也胃氣無餘朝食暮吐變為胃反寒在於上醫反下之令脈反弦故名曰虛此經醫者誤治傷及中氣之病脈證也風寒襲表皮毛間水氣凝沍則病形寒中陽不振不能旁達四肢則亦病形寒忍飢之人多瑟縮畏寒可為明證惡寒同而所以惡寒者不同設於中陽不振之惡寒誤認為麻黃湯證而遽發其汗則胃中陽氣益虛而脈反見數脈數者汗後陽氣挾營陰而外張內藏之陽氣將一泄無餘蓋其脈雖數要與脈遲不勝穀食者同為胃中虛冷故飲食入胃而反吐為其一去不還故為客熱膈氣因寒而虛故其氣上逆吸入胃之飲食傾吐而出也此胃氣因誤汗而虛冷者也此條見太陽篇陽熱之證腸胃燥實則病不能食寒濕阻滯胃氣不降則亦病不能食不能食同所以不能食者不同設於寒濕阻滯之不能食誤認為大承氣湯證而遽下之則膈上之寒濕併入胃中而消化之力益微脈乃轉弦弦為陰脈故痰飲水氣瘧證多有之水飲入胃胃底膽汁不能相容則病嘔逆痰飲瘧證多嘔皆有濕痰而其脈俱弦可知弦為胃中濕痰所致蓋胃中胰液饞涎皆能消食自誤下之後膈上寒痰入胃與胃中原有之津液化而為一中氣既寒消化之力愈薄故食入停貯胃中歷一周時胃中膽汁抗行因至朝食暮吐所以變為胃反者胃中陽氣既虛他種津液與膽汁不和故也此胃氣因誤下而虛冷者也寸口脈微微則無氣無氣則營虛營虛則血不足血不足則胸中冷玩此節原文首句言寸口脈微而數後文但言脈微則而數二字當為衍文蓋人一身之血熱度合華氏寒暑表九十五度為血之中數其應於動脈者即為平脈若熱度漸低營氣不能上應則其脈當遲當弱至於兩手動脈見微則營氣不足以上應而脈管血少心藏主脈與血部位正在胸中血不足而脈道微故胸中冷營虛而血少則太陽寒水不得陽熱蒸化而衛陽不達於皮毛脾陽不達於四肢少陰病脈必微細者水勝而血負也水寒則胃敗故趺陽負少陰為不順近人以嘔吐清水為胃寒其說要非無據尤在涇乃謂胸中冷非真冷不可以熱治之然則少陰病之脈微細何以用四逆湯耶要知用藥之法無問寒熱補瀉只在以偏救偏但中病即止而不當太過耳尤在涇持論如此無怪其偏信丹溪不能入仲景之室也趺陽脈浮而澀浮則為虛澀則傷脾脾傷則不磨朝食暮吐暮食朝吐宿穀不化名曰胃反脈緊而澀其病難治趺陽脈為胃脈之根當以沖和為正脈若輕取見浮重按見澀則胃氣不降宿食不下小腸脾陽不升不能吸收小腸津液上承心肺而為血蓋食入於胃食氣與脾氣化合上下相引乃掣製胃之全體磨擦新食成漿然後下滲十二指腸無病之人所以知飢也若脾陽頓滯不能牽掣胃之全體上下磨擦則胃中所受之穀食不能消融成糜以下滲十二指腸胃底膽汁上抗遂至朝食暮吐暮食朝吐病名胃反方治在後條蓋此證水飲入口即上泛穀食入胃又以消化力薄始則停蓄繼即傾吐大腸宿垢積缺不行一似陰乾者然大腸乾澀不通則胃濁愈加上泛故脈緊而澀急則治標要惟有於他方治中加大黃利之之法較為近似否則胃濁不降加以腸中否塞其病乃益不可治也半硫丸似亦可用病人欲吐者不可下之濕痰阻於胸膈則上泛而欲吐考太陽將傳陽明則上濕下燥固有當用瓜蒂散吐之者蓋濕邪粘滯非一下所能盡或恐留滯腸胃轉為他病為其病在上膈也嘗見病嘔逆之人自用吳茱萸以止之者腹中脹滿欲死寖成裏熱以致匝月昏憒幾於不救由此觀之病人欲吐者不惟不可下併不可止為胸中自有濕痰也內經不云在高者引而越之乎噦而腹滿視其前後知何部不利利之愈寒熱二氣相衝激則病噦逆若陰陽電相觸者然故噦有寒熱之別濕痰留於上膈真陽被鬱有時衝激而上不能相勝則為寒噦鬱熱在下鼻中吸入之清氣與之衝激則為熱噦然則噦而腹滿者究為何病蓋熱結膀胱三焦水道不通則由蓄水而腫滿是為五苓散證熱結大腸腑氣不通則由燥屎而腹滿是為大承氣證所謂知其何部不利利之而愈也釋義詳傷寒發微厥陰篇茲不贅按此證大便不行者下後厄止則愈厄不止則死豫親見之嘔而胸滿者吳茱萸湯主之吳茱萸湯方吳茱萸一升人參三兩生薑六兩大棗十二枚上四味以水五升煮取三升溫服七合日三服胃濁不降脾陽不升則氣機否塞嘔而胸滿者脾虛生濕中氣寒而胃濁上泛也蓋脾藏吸收小腸津液上出胸中胸中陽氣充足則清者散為汗液膏者上達心肺二藏化而為血西醫謂之淋巴幹胸中陽氣不足則津液停蓄悉化為濕胸中為宗氣所居氣為濕阻至不得噫噯則脹滿欲死此其所以嘔而胸滿也濕痰在胸膽胃鬱而不舒則激而上泛此其所以嘔而胸滿也吳茱萸湯吳茱萸以降逆散寒人參薑棗以和胃扶脾但使膈間陽氣漸舒咽中時得噫噯或呵缺或吐出痰涎則胸滿去而嘔逆亦止蓋仲師雖言嘔而胸滿其實由胸滿而嘔也乾嘔吐涎沫頭痛者吳茱萸湯主之脾虛則生濕胃寒則易泛胃中無宿食則為乾嘔胃中饞涎與胃底膽汁化合並能助消化之力膽汁太多熱乃上泛而吐苦水饞涎太多寒乃上泛而吐涎沫乾嘔不已胃中濁氣上衝因病頭痛故仲師但用吳茱萸湯與上節嘔而胸滿同法但使濁陰下降頭即不痛此亦不治之治也此條見傷寒論厥陰篇嘔而腸鳴心下痞者半夏瀉心湯主之半夏瀉心湯方半夏半升洗黃芩乾薑人參甘草各三兩炙黃連一兩大棗十二枚上七味以水一斗煮取六升去滓再煮取三升溫服一升日三服上膈寒濕下陷於胃胃底膽汁不能相容則病嘔逆此屬寒宜用吳茱萸者也胃中濁熱合膽火上奔則亦病嘔逆此屬熱宜用黃連者也二證寒熱不同故降逆之藥品亦因之而異近人不辨寒熱合萸連用之模棱之見耳此節證象為嘔而腸鳴為心下痞鬱熱在上寒水在下與傷寒胸中有熱胃中有邪腹中痛欲嘔吐之黃連湯證略同故半夏瀉心湯方治所用半夏乾薑甘草人參黃連大棗皆與黃連湯同惟彼以寒鬱太陰而腹痛用桂枝以達鬱此為氣痞在心下熱邪傷及肺陰兼用黃芩以清水之上源為不同耳又按傷寒太陽篇云但滿而不痛者此為痞柴胡湯不中與之宜半夏瀉心湯知此方原為治痞主方所以不與腹中雷鳴下利之證同用生薑瀉心湯者亦以水氣不甚不用生薑以散寒也乾嘔而利者黃芩加半夏生薑湯主之黃芩加半夏生薑湯方黃芩生薑各三兩甘草二兩芍藥一兩半夏半升大棗十二枚上六味以水一斗煮取三升去滓溫服一升日再夜一服太陽寒水內薄胃底膽汁不能相容則為乾嘔寒水太多脾不能勝協標熱下趨即為自利二者均為脾胃不和方用黃芩湯以治協熱利其功用在清膽火而兼能扶脾合小半夏湯以止嘔其功用不惟降胃逆而並能去水此二方合用之大旨也方及證治並見傷寒論太陽篇諸嘔吐穀不得下者小半夏湯主之小半夏湯方見痰飲嘔吐而不能食為胃中虛寒是宜吳茱萸湯者也仲師乃曰諸嘔吐穀不得下者小半夏湯主之然豫嘗如法用之往往失效豈仲師之誤耶是不然古人用半夏多用生者但洗去泥耳近來藥肆所用先以水浸七日去膏液而留渣滓去水之本性全失再用生薑汁拌炒半熟欲其立止嘔吐豈可得哉按嘔吐一證心下水氣不甚胃中虛寒者則宜吳茱萸湯水氣太甚時時泛濫而嘔吐清水者則宜生半夏生薑湯仲師所謂納半夏以去其水也嘔吐而病在膈上後思水者解急與之思水者豬苓散主之豬苓散方豬苓茯苓白朮各等分上三味杵為散飲服方寸匕日三服水氣在心下則甚在膈上則微嘔吐而病在膈上則傾吐易盡設渴而思飲則水氣已盡其病當解急與水以滋其燥而此外更無餘病傷寒論所謂少少與之愈也若水氣在心下而嘔吐思水者則當通下焦特於五苓散中去桂枝澤瀉以利小便使下焦通而在上之水氣得以下行上承之津液乃不為所阻而渴飲自止矣此亦傷寒太陽篇渴者宜五苓散之意也嘔而脈弱小便復利身有微熱見厥者難治四逆湯主之四逆湯方附子一枚生用乾薑一兩半甘草二兩炙上三味以水三升煮取一升二合去滓分溫再服強人可大附子一枚乾薑三兩嘔而脈弱水勝而血負也惟其水勝則下焦必寒故小便復利按此證小便必色白不黃浮陽外出而中無實熱故身熱微手足見厥者中陽虛而不達四肢也此證純陰無陽自半夏瀉心湯以下諸方俱不合用故曰難治難治非不治也蓋舍四逆湯大溫中下之劑病必不愈觀方後所列強人可大附子一枚乾薑三兩可以識難治之旨矣嘔而發熱者小柴胡湯主之小柴胡湯方柴胡半斤半夏半升黃芩人參甘草生薑各三兩大棗十二枚上七味以水一斗煮取六升去滓再煎取三升溫服一升日三服凡瘧病多嘔其脈必弦所以多嘔者膽胃之氣上逆也故瘧病用小柴胡湯往往取效然則嘔而發熱者仲師雖不言脈竊意脈亦見弦故亦宜小柴胡湯柴胡以發汗黃芩以清膽參草薑棗以和胃汗出而外解則表熱不吸引膽火中氣不至上逆而無嘔吐之弊此嘔而發熱所以與瘧同法也胃反嘔吐者大半夏湯主之大半夏湯方半夏二升人參三兩白蜜一升上三味以水一斗二升和蜜揚之二百四十遍煮藥取二升半溫服一升餘分再服反胃之證大便如羊矢艱澀而不下不類陽明燥矢可用大承氣湯以下之況水氣太甚滲入於胃胃底膽汁不受因而嘔吐嘔吐傷及胃陰時時上泛胃因不和水氣所以不降者又因大腸乾涸之故胃中穀食久不下十二指腸腸中糞穢一似陰乾者然故大半夏湯方治生半夏以去水人參以益胃汁白蜜以潤腸使渣滓下通水乃得降而胃反之病愈矣按世俗相傳朝食暮吐暮食朝吐方治為熟地二兩山萸肉三兩牡桂一錢又有脾胃虛弱食不消化方為秫米粉作湯圓子每服煮食七粒加醋吞服一重用山萸肉一用醋皆能令乾涸之糞發酵易化附存之癸酉閏五月十四日裴德炎妻病此豫用薑半夏四錢潞薰參一兩白蜜四兩三劑即便通能食嘔止食已即吐者大黃甘草湯主之大黃甘草湯方大黃二兩甘草一兩上二味以水三升煮取一升分溫再服食已即吐所吐者為穀食非飲水即吐之比胃底膽汁不能合胰液而消穀反逆行而衝激於上故食已即吐但吐之太暴雖由膽火上逆要亦因大腸之壅塞故方用甘草以和胃大黃以通腸腸胃通而膽火降穀食乃得以順受焉此大黃甘草湯之旨也胃反吐而渴欲飲水者茯苓澤瀉湯主之茯苓澤瀉湯方茯苓半斤澤瀉四兩甘草桂枝各二兩白朮三兩生薑四兩上六味以水一斗煮取三升內澤瀉再煮取二升半溫服八合日三服此證與病在膈上節略同方治以利水為主亦與思水之豬苓散相似茯苓澤瀉方治於五苓中去豬苓以泄水可知渴欲飲水為水氣阻於心下津液不能上達喉舌而初非真渴所以加生薑甘草者亦以水邪出於胃之上口辛甘發散以調之也所以後納澤瀉者亦以其氣味俱薄不任多煎也吐後渴欲得水而貪飲者文蛤湯主之兼主微風脈緊頭痛文蛤湯方麻黃三兩杏仁五十枚大棗十二枚甘草石膏文蛤各五兩生薑三兩上七味以水六升煮取二升溫服一升汗出即愈吐後渴欲得水而貪飲似與前證吐而渴欲飲水者無別何以前證用茯苓澤瀉湯此證獨宜文蛤湯此不可以不辨也蓋吐而渴欲飲水為隨吐隨渴隨飲隨吐水氣溜胃之上口而裏無熱之證吐後渴欲得水而貪飲為吐後之渴水氣出上膈而裏有熱之證惟其無裏熱故但疏陽氣通小便使水熱自下焦泄之惟其有裏熱故上發汗而下泄熱使水氣從上下二焦分泄之夫各有所當也乾嘔吐逆吐涎沫半夏乾薑散主之半夏乾薑散方半夏乾薑各等分上二味杵為散取方寸匕漿水一升半煮取七合頓服之始而乾嘔俗名胃泛繼而吐逆俗名胃寒所吐清水是水氣從胃之上口滲入胃不納而上泛之證也加之以吐涎沫心下必有微飲其所以異於頭痛一證者彼但為胃中濁氣上泛初無水氣故但用吳茱萸湯以降逆此證吐逆為膈上有水氣為胃中有寒故用半夏乾薑散以降逆而溫中徐忠可反以頭痛者為重此證為輕殆不然也病人胸中似喘不喘似嘔不嘔似噦不噦徹心中憒憒無奈者生薑半夏湯主之生薑半夏湯方半夏半升生薑汁一升上二味以水三升煮半夏取二升內生薑汁煮取一升半小冷分四服日三夜一嘔止停後服胸中為上焦升發水液之區西醫謂之淋巴幹氣與水由細管中散出胸中之氣乃得舒暢否則乳糜頓滯即化為濕痰阻其上出之氣肺氣欲納而不能受胃氣欲抗而不能伸於是似喘不喘似嘔不嘔似噦不噦肺氣不達胃氣不通上不得為噫噯下不能轉矢氣以致徹心中憒憒無奈究其所以致此者為其濕痰阻塞膈上陽氣被遏而不宣也方用生薑汁以宣陽氣鬱用生半夏以祛水氣之停但使陽氣通於上濕痰降於下胸中氣機乃通達無所窒礙而諸恙自愈矣乾嘔噦若手足厥者橘皮湯主之橘皮湯方橘皮四兩生薑半斤上二味以水七升煮取三升溫服一升下咽即愈乾嘔及厄皆出於胃氣不和但病之來源不同故治法亦異胃主四肢胃氣阻塞不能旁達四肢故手足厥要其所以致此者不可以不辨也水勝血寒陽氣不達四肢者手足必厥但必有兼證或為吐利交作或為下利其脈必細弱無力此宜四逆理中者也或濕痰與宿食交阻中脘陽氣不達於四肢則手足亦厥其人或咳或悸或小便不利或腹中痛而泄利下重此宜四逆散者也若但見乾嘔厄之證其脈必不微細亦必無泄利下重之變胃中陽氣所以不達四肢者要不過氣機阻塞耳故但用生薑以散上膈之鬱橘皮以發胃氣之閉溫服一升而下咽即愈矣噦逆者橘皮竹茹湯主之橘皮竹茹湯方橘皮二斤竹茹二升大棗三十枚生薑半斤甘草五兩人參三兩上六味以水一斗煮取三升溫服一升日三服噦有寒熱之別噦而腹滿條及前條已詳言之矣若但噦逆而別無兼證在上無乾嘔手足厥之變在下無腹滿之變則但為中氣之虛而微見膽火上逆中氣虛則陽氣不能外散而阻於膈上兼之膽火內鬱於是吸入之清氣與之相觸遂病厄逆方以橘皮竹茹為名者橘皮以疏膈上停阻之氣竹茹以疏久鬱之膽火而厄逆可止矣然厄逆之由起於上膈不散之氣膽火之上衝亦為此不散之氣所鬱而氣之所以不得外散者實因中氣之虛故知此方橘皮竹茹為治標大棗生薑甘草人參為治本不然但用橘皮竹茹亦足治厄矣既愈之後能保其不復噦耶夫六腑氣絶於外者手足寒上氣腳縮五藏氣絶於內者利不禁下甚者手足不仁氣之行於六府者水分之寒得血分之溫蒸化外出者為衛血分溫度不高則水分不能化氣達於皮毛之外而手足寒水氣留著上膈裏氣阻而不出外氣吸而不納則為上氣病屬太陽腸胃燥熱大便不通薰灼陽明支脈股下牽掣右膝外廉屈而不伸病屬陽明脾濕下陷腎陽虛而不能泄水溢入回腸則利不禁是為陰氣內絶脾主四肢脾濕下陷陽氣不達故手足不仁甚則逆冷仲師不言者蓋即在不仁之內也病屬三陰沈自南說不精以腳縮為陽虛生寒尤謬下利脈沉弦者下重脈大者為未止脈微弱數者為欲自止雖發熱不死脈沉弦為有水此傷寒金匱之通例也水與濕併乃病下利水流動而濕粘滯故利而下重此為四逆湯證為其寒濕下陷也豫治此證見膿血者或用附子理中湯加柴胡升麻所以疏鬱而消毒也痛甚則加乳香沒藥所以止痛也此厥陰下利雖下重而不宜涼劑者也若夫寒盡陽回則陽明脈大是其始病寒濕而利不止繼乃寒濕變為燥熱而利仍未止是即後文下乃愈之證宜用大承氣湯者也惟邪盡正虛脈乃微弱邪盡則利欲自止陰盡陽回脈乃微弱而兼數則尤可決其利將自止也此證雖脈數而渴甚至發熱圊膿血但用清熱去濕之白頭翁湯一二劑可愈故曰雖發熱不死不似肢冷脈伏治以溫藥而厥不還者為必無生理也此條見傷寒論厥陰篇下利手足厥冷無脈者灸之不溫若脈不還反微喘者死脾主四肢脾藏虛寒則手足厥冷心主脈與血心房血虛則無脈欲溫脾藏莫如乾薑甘草欲強心房莫如附子則四逆湯其主方也此為有脈者言之也若血分中熱度消歇以至脈伏不鼓則非藥力所及是當通灸三陰諸穴使陽氣四達而手足當溫脈伏當出若既灸之後手足依然逆冷脈之伏者依然不還而反見微喘則是血虛於裏氣脫於外危在旦夕矣少陰負趺陽者為順也此句與上不接當為另一條蓋少陰為病每患寒濕下陷但得寒盡陽回即是生機少陰病雖三急下證及時而治皆可不死為其以少陰而兼陽明也故謂之順下利有微熱而渴脈弱者令自愈下利脈緩有微熱汗出令自愈設脈緊為未解下利一證起於脾陽不升而寒濕下陷其脈當見沉緊身冷無汗不言可知蓋陽氣外散則脈見浮緩太陽中風發熱有汗者脈必浮緩其明證也陰寒內據則脈見沉緊厥陰下利脈沉弦為下重其明證也是故下利一證以出陽為順以入陰為逆微熱而渴者水濕下盡而陽明之氣當復也微熱汗出者裏水外泄而太陽之氣當復也故皆令自愈而沉緊有力不見緩弱之脈則為未解緩字舊訛作數陳修園不知此證為寒盡回陽望文生訓反以為熱利夫熱利為白頭翁湯證豈不藥自愈之證耶下利脈數而渴者令自愈設不差必圊膿血以有熱故也人體之強弱視血熱之存亡為進退血熱之存亡不可知要當驗之於脈下利見陰脈則難愈見陽脈則易愈其大較也是故下利脈沉弦則病下重由血熱為水氣所壓相抗於下部也此為初病者言之也病者脈微而厥則為下利清穀由血中溫度消亡而水氣獨勝也此為病甚者言也按其外證為惡寒為肢冷其裏證為不渴飲小便色白莫不以陽氣退為病進至如下利脈數則血熱漸高加之以渴則水氣漸減此即死陰盡去生陽來復之佳兆固當不藥自愈間亦有不即差者則一變而圊膿血此為陽回太暴然究非死證白頭翁湯桃核承氣湯俱可隨證酌用要不當泥於始病之陰寒而漫用桃花湯也下利脈反弦發熱身汗者愈下利一證其脈始於沉弦由沉弦而沉遲由沉遲而沉微其人固已垂死矣若遲微之脈一變而為浮弦則太陽寒水之氣已受血熱蒸化將從皮毛外泄仲師所謂反弦者反之言轉弦之言緊謂沉微之脈一轉而成太陽浮緊之脈也由浮緊而發熱由發熱而汗出則內陷之寒濕已從太陽外解病有不愈者乎下利氣者當利其小便下利一證決無小便此盡人之所知也但仲師所謂下利氣者當利其小便究屬何因其與後文氣利用訶黎勒散止澀者究竟是一是二此不可以不辨也蓋本節所謂下利氣者為方在下利肛門辟辟作聲一似轉矢氣者氣與腹中殊不相接此利實關下焦太陽篇理中者理中焦此利在下焦可與赤石脂禹餘糧湯不差當利其小便即此證下焦陽氣不通水道閉塞氣乃併注於肛門於五苓散中重桂枝以達陽合四苓以泄水但令水泄於前即氣還其故而利自愈矣若夫氣利用止澀之訶黎散者實因久利而氣虛下陷意與近人治晨泄用四神丸略同豫昔寓白克路治鄉人陶姓曾用之所用為訶子殼取其味澀能止彼以藥末味澀不能下咽和入粥中強吞之日進一服三日而止與當利小便之證病原固自不同也下利寸脈反浮數尺中自澀者必圊膿血下利一證其脈多見沉遲而不應反見浮數為其寒濕下陷也若見浮數即為寒盡陽回而利將自止但不應獨見於寸口而尺中自澀澀者凝定不流之象蓋胞中血海凝澀不通氣機不達於衝任是為瘀血此證必見腹痛下連少腹熱在上瘀在下故必圊膿血也此證不必治膿血血盡下利自止當從嘔癰膿者膿盡自愈之例說解詳傷寒論厥陰篇如病者必欲服藥略用丹皮桃仁地鱉蟲等味均可下利清穀不可攻其表汗出必脹滿下利清穀為太陽寒水不能作汗下併太陰寒濕衝激腸胃之證太陽為寒水之府少陰為寒水之藏故在傷寒論中太陽少陰二篇並見之皆為四逆湯證此證表熱裏寒本太陽證而內陷太陰故有不可攻表之戒按脹滿原屬太陰寒證下利清穀中陽垂絶若更誤汗致一線微陽外散陰寒乃獨據中宮譬之一甕寒水冬令堅冰勢將暴裂設遇此變惟大劑生附子以回陽或當挽救一二慎勿誤認肝鬱也近代醫家多有此失下利脈沉而遲其人面少赤身有微熱必鬱冒汗出而解下利清穀者其人必微厥所以然者下虛故也下利一證原屬寒濕下陷而血熱不能上抗脈之所以沉遲也若其面戴陽而身有微熱即可知血分熱度漸高為寒盡陽回之漸陽熱內蘊乃見鬱冒鬱者身熱而汗不遽泄冒者氣上衝而欲嘔之象也此時心中極為懊憹逮肺與皮毛中含之水氣為陽熱蒸逼乃濈然汗出而愈矣若夫下利清穀一證其人必脈微肢厥腸胃中陽氣垂絶所謂下虛者久利而虛寒也此為四逆湯證學者不可不知下利後脈絶手足厥冷晬時脈還手足溫者生脈不還者死心主脈下利脈絶則心房血寒脾主四肢下利手足厥冷則脾陽已絶欲強心房莫如生附子欲溫脾陽莫如乾薑甘草則四逆湯其主方也假令服湯後一周時心房得溫而脈還脾陽得溫而手足熱則其病可以不死蓋此證不惟手足厥冷而肢體常有冷汗粘膩如膏油所下之物白如豬膏又似冬月之肉凍病者自覺腦中轟轟有聲久則魂飛帳頂身搖搖如墜萬丈之深潭背有所著則忽然驚覺日數次直待陽回之後膏汗始斂神魂始定蓋去死不遠矣豫十五歲時侍先嚴秉生公疾親見之蓋始服高康泉芩連湯而加劇繼服陳子雍外祖芩芍湯而病益不支厥後延趙雲泉先生方用製附子五錢吳萸三錢乾薑四錢炙甘草三錢五味子三錢公丁香三錢吉林參三錢二劑後手足始溫若服藥後脈絶不還則一身精血俱寒雖有盧扁無能為役矣敬告同人倪涵初瘧利三方慎毋輕用而殺人也下利後腹脹滿身體疼痛者先溫其裏乃攻其表溫裏宜四逆湯攻表宜麻黃湯下利而腹脹滿為太陰寒濕內據前於不可攻表條下已詳言之身體疼痛則由太陽寒水為表寒所鬱不能化汗液而出皮毛先溫其裏後救其表此為傷寒通例溫裏固宜四逆救表實用麻黃傷寒論中太陽厥陰二條與本條並訛桂枝不可盲從下利三部脈皆平按之心下堅者急下之宜大承氣湯今之論治者遇脈證不符之證或從證不從脈或從脈不從證此意實本仲師即如本節下利三部脈皆平而無滑大堅實之象但不在急下之例然按之而心下堅心下當胃之上口今按之而堅胃中必有宿食梗塞致上下之氣不通設在上之梗塞一日不去則下利一日不止此其所以法在急下而不當從脈者也下利脈遲而滑者實也利未欲止急下之宜大承氣湯下利脈遲為寒濕在裏血分不敵水分之證蓋胃為生血之原胃所以能生血者實關於胃底消食之膽汁膽火盛而納穀多則富其生血之原而脈數膽火虛而納穀少生血之原不足故脈遲按傷寒陽明篇云脈遲食難用飽飽則微煩頭眩必小便難此欲作穀疸雖下之腹滿如故所以然者脈遲故也此寒濕阻於太陰不當攻下之明證也又云陽明病脈遲雖汗出不惡寒其身必重短氣腹滿而喘有潮熱者此外已解可攻裏也若汗多微發熱惡寒者外未解也其熱不潮未可與承氣湯此太陰陽明同病濕留肌腠表氣不達不當攻下之明證也若脈遲而兼滑則為內實陽明篇又云譫語發潮熱脈滑而疾者小承氣湯主之此即脈滑當下之例蓋病者內藏有所停蓄則其脈滑是故上膈有濕痰者滑婦人妊娠者滑腸胃宿食不去則亦滑按此證必兼腹痛故必通腸胃窒塞然後痛定利止此所以當急下也下利脈反滑者當有所去下乃愈宜大承氣湯下利之脈多沉遲為其寒濕下陷也若沉遲之脈轉為滑疾則陰脈轉陽其病必腹痛拒按反之言轉也謂脈之本不如是也病固有前一日甫用附子理中湯後一日即當用大承氣湯者豫昔年治江陰街肉店范姓男子親見之蓋濕以下利而日消寒以溫藥而頓盡胃中宿食不能與之俱去故前此之緩痛喜按者一變而為急痛拒按則舍大承氣湯外豈復有愈疾之方治乎下利已瘥至其年月日時復發者以病不盡故也當下之宜大承氣湯大承氣湯方見傷寒論陽明篇又見痙病血熱盛壯之人遇天氣酷蒸往往以多汗而胃中化燥始則大便不行繼則口燥飲冷夏令伏陰之體飲冷太暴或且轉為下利究之利者自利胃中燥實依然不去故仍宜用大承氣湯以下之豫子湘人辛未六月在紅十字會治一山東人親見之一劑後不再來診蓋已瘥矣壬申六月復見此人來診診其脈洪大而滑疾已疏大承氣湯方治矣其人曰去歲之病承先生用大黃而愈湘人告以亦用大黃其人欣然持方去不復來蓋又瘥矣又江陰街烟紙店主嚴姓男子每年七月上旬大便閉而腹痛豫每用調胃承氣湯無不應手奏效殆亦血熱太高暑汗經其排泄胃中易於化燥可見此證不忌冷飲則濕流太陰部分而兼下利不敢飲冷則但病大實滿痛要之為承氣湯證若仲師所云下利已瘥至其年月日復發為病不盡世豈有病根不拔能安然眠食待來歲今日而復發者乎故知病不盡為仲師失辭不可為訓下利譫語者有燥屎也小承氣湯主之小承氣湯方大黃四兩枳實三枚厚朴三兩炙上三味以水四升煮取一升二合去滓分溫二服得利則止大便燥結之證當有譫語為腸胃濁熱上蒙腦氣心神為之恍惚也若夫下利一證正復不當譫語仲師主以小承氣湯而決其有燥屎按此即世俗所謂熱結旁流張隱庵注傷寒論以此證為必無特未觀其通耳說解詳傷寒論厥陰篇不贅下利便膿血者桃花湯主之桃花湯方赤石脂一斤一半全用一半研末乾薑二兩粳米一升上三味以水七升煮米熟去滓溫服七合納赤石脂末方寸匕日三服若一服愈餘勿服下利便膿血為少陰寒濕沉浸血絡腐敗之證陳修園以為由寒鬱轉為濕熱因而動血此真大誤水分多於血分不及注腎膀為溺乃溢入回腸而下利水寒血凝若凍家然凍家既潰即有膿血下利便膿血者正復如是非溫化其寒而填止其濕不惟下利不止膿血又將加劇此固寒水凝瘀血絡積久潰敗之證非寒鬱轉為濕熱然後動血也蓋寒濕下注為第一病因故桃花湯方治以止澀之赤石脂為君由寒濕浸灌致內藏血絡腐敗為第二病因故乾薑次之由下利而脾精耗損為第三病因故粳米又次之假令當小便不利腹痛之時早用四逆理中或不至下利而便膿血也餘詳傷寒論少陰篇不贅熱利下重者白頭翁湯主之白頭翁湯方白頭翁二兩黃連黃柏秦皮各三兩上四味以水七升煮取三升去滓溫服一升不愈更服熱利之別於寒利者熱利之證臭穢逼人往往不可嚮邇而寒證無之熱利之證身熱而氣粗面垢而色浮而寒證無之熱利有滑大動數之脈而寒證無之兼此數者乃能如航海南針不迷所向究其所以下重者則以濕熱併居阻塞氣分穢物不得宣泄也白頭翁湯方治用白頭翁秦皮以清涼破血分之熱黃連黃柏以苦燥而兼涼性者除下焦之濕於是濕熱竝去氣無所阻而利自止矣所以不用氣分藥者濕熱去而氣自通也若後人所用香連丸即治此證而識解已落後一層矣按此與前一條對文使人知寒熱之辨下利後更煩按之心下濡者為虛煩也梔子豉湯主之梔子豉湯方梔子十四枚擘香豉四合綿裏上二味以水四升先煮梔子得二升半納豉煮取一升半去滓分二服溫進一服得吐則愈按方後末八字宜從張氏刪之心下當胃之上口胃中燥熱則薰灼心下而煩固自有陽明燥證雖經下後心中懊憹而煩者則下利後之更煩安知非胃中有燥屎宜大承氣湯之證但有燥屎者心下必硬今按之而濡可見煩為虛煩蓋下利後津液消耗陰不抱陽由是在表則浮陽不收在裏則餘熱不去鬱結而生虛煩甚有反覆顛倒胸中窒塞及心中熱痛者然究為病後餘邪故但用豆豉以發表汗生山梔以降裏熱而虛煩可解所謂在表者散而去之在高者引而下之也梔子生用下走大腸傷寒太陽篇病人舊微溏者不可與之其明證也下利清穀裏寒外熱脈微欲絶汗出而厥通脈四逆湯主之通脈四逆湯方附子一枚生用乾薑三兩強人可四兩甘草二兩炙上三味以水三升煮取一升二合去滓分溫再服下利清穀為完穀不化胃中陽氣消亡之證也胃底消食之膽汁日見薄弱不能消入胃之水飲乃挾未化之穀食直下小腸大腸是為裏寒寒據中宮逼真陽外浮是病外熱外熱則汗出裏寒則手足厥逆以病情論裏寒為真外熱為假裏寒外熱下原脫脈微欲絶四字說詳傷寒發微中蓋陽亡於外而脈微欲絶故方治為通脈四逆湯用生附子一枚以強心房而脈之伏者起以心主脈故也乾薑四兩炙甘草三兩以助脾陽而手足之厥逆者溫以脾主四肢故也裏寒外熱真陽外浮外內不通故加蔥九莖以通之寒凝血瘀腹中必痛故加芍藥以疏之此仲師用通脈四逆之旨也下利肺痛紫參湯主之紫參湯方紫參半斤甘草三兩上二味以水五升先煮紫參取二升內甘草煮取一升半分溫三服下利一證未聞有肺痛者且肺痛當是何病所痛之處究係何部分究竟是寒是熱歷來注家絶無分曉此所當研核者也按內經云一陽為病善咳善泄蓋少陽之火下注則為泄利上注於肺則為咳燥火上迫肺有所壅乃至咳而肺痛則此證為熱而非寒也然則痛在何部分曰其痛當在胸中豫嘗見病肺癰之人胸中當隱隱作痛此即痛在胸中之明證考本書肺癰方治為桔梗甘草湯蓋桔梗以泄壅甘草以除毒而肺痛可止陳修園疑紫參為桔梗之誤理或然也氣利訶黎勒散主之訶黎勒散方訶黎勒十枚煨上一味為散粥飲和頓服說解詳上下利氣者節茲不贅訶黎勒今名訶子味澀而苦煨不透則研不細入咽梗塞前於同鄉陶姓親驗之瘡癰腸癰浸淫病脈證治第十八諸浮數脈應當發熱而反灑淅惡寒若有痛處當發其癰凡外證初起必先惡寒此其大較也蓋癰之所由成血絡閉於寒濕而營氣不通營鬱生熱脈乃浮數血以凝澀而內停則陽氣不能獨行於表分此所以當發熱而反灑淅惡寒也遇此脈證雖形似傷寒而實為癰疽始則惡寒繼則發熱寒熱日作若瘧發然三數日後瘀血蘊蒸化熱始知痛處此與將潰之凍瘃正復相似無論在何部分皆當以藥發之大約人體外證之屬寒者除流注外發背腦疽最為重大惟世傳陽和湯一方與仲師當發其癰之旨最合若誤投寒涼敗毒之品十不活一所以然者為血絡凝於寒濕非疔毒流火屬於陽證者比也附陽和湯方麻黃三錢去根節炮薑三錢熟地黃一兩鹿角膠三錢肉桂一錢寒重加附子師曰諸癰腫欲知有膿無膿以手掩腫上熱者為有膿不熱者為無膿癰毒初起以腫大見紅色為順而皮色不變平塌不起者為逆大率由寒而熱由熱而腫由腫而痛痛劇則瘀血蒸化為膿痛減則膿已成身亦漸涼抉而去之瘡口掩以拔毒生肌藥其證立愈此因痛減而知有膿之說也仲師驗膿之法則以腫處熱不熱為驗此又以熱而知有膿之說也豫按癰疽大證必有極大之膿頭堅硬不化瘡上極熱灼手處即為膿頭所在以刀抉之百不失一仲師之言則固信而有徵也復有體虛未易腫大者或婦人病在下體未便開刀者仙方活命飲成效卓著當附存之附仙方活命飲方乳香沒藥各二錢炙甲片五錢皂角刺三錢防風一錢大貝四錢生甘草二錢歸尾二錢生黃耆三錢赤芍四錢銀花三錢排膿加白芷上藥水煎服即日止痛膿成自潰未成即消腸癰之為病其身甲錯腹皮急如腫狀按之濡此下與後條錯簡今校正時時發熱熱汗出反惡寒其脈遲緊者膿未成可下之大黃牡丹湯主之脈洪數者膿已成不可下也三句舊誤在上今校正大黃牡丹湯方大黃四兩牡丹一兩桃仁五十個冬瓜仁半升芒硝三合上五味以水六升煮取一升去滓內芒硝頓服之有膿當下如無膿當下血腸癰一證由於血凝氣滯陰絡內阻營氣乾澀不能外潤膚表則肌膚為之甲錯甲錯者血枯之象也在裏之氣血不通乃成內癰此證始以水寒而血凝繼以血凝而腐爛若凍瘃然日久化熱即成潰瘍矣血阻於內氣膨於外故腹皮之急如鼓但有氣而無水故按之濡時發熱自汗出復惡寒者肺與大腸為表裏皮毛為肺所主腸內病癰邪熱外薄皮毛故時發熱熱勝而皮毛開故自汗汗後毛孔不閉風乘其虛故復惡寒脈遲而緊則裏熱未盛毒血尚凝聚未散不難一下而盡所謂曲突徙新也以其大腸壅阻也用大黃芒硝以通之以其身甲錯知其內有乾血也用桃仁丹皮以攻之以發熱自汗復惡寒知大腸移熱於肺肺主之皮毛張於標熱而不收也用瀉肺除熱之冬瓜仁以清之此大黃牡丹湯之義也若夫裏熱既盛膿成血潰至於兩脈洪數則非一下所能盡仲師不曰膿已成赤豆當歸散主之乎方見百合狐惑篇中究其所以不可下者譬之流寇潰散則難為攻不如方聚之易為殲也嘗記癸丑十一月若華之母病此腰腹俱腫有時發熱自汗有時不甚發熱痛不可忍按之稍定於冬至前二日用大黃五錢丹皮一兩桃仁五十粒冬瓜子八十粒芒硝三錢服後腹中大痛午後下血半淨桶而腹平痛止不啻平人矣辛未四月強鴻培嗣子福全病此既就寶隆醫院矣西醫指為盲腸炎並言三日後大開刀福全不解私問看護以破腹告福全懼棄其衣物而遁翌日抵豫小西門寓所以腹中劇痛求診按其脈緊而數發熱有汗但不惡寒豫即疏方與之明日復診蓋下經三次而腹痛止矣又壬申年治大自鳴鐘慎大衣莊裘姓少年亦如之癸酉年治陸姓少女腹右旁痛痛經四月身體瘦弱西醫不敢開刀由同鄉高長佑推薦豫以此方減輕授之當夕下泥黑糞痛未止稍稍加重遂大下黑糞如河泥其痛乃定調理一月方能出險蓋亦危矣乙亥八月四明史惠甫病此已由姜佐景用前方下過未能拔除病根豫用生大黃五錢冬瓜仁一兩桃仁八十粒丹皮一兩芒硝三錢外加當歸赤豆二診加赤芍五錢敗醬草五錢所下黑糞並如污泥狀病乃出險併附記之腫癰者少腹腫痞按之即痛如淋小便自調腹無積聚身無熱脈數此為內有癰膿內字上舊有腸字誤薏苡附子敗醬散主之腹無積聚下舊訛在上節今校正薏苡附子敗醬散方薏苡仁十分附子二分敗醬五分上三味杵為散取方寸匕以水二升煎減半頓服小便當下腫見於外謂之腫癰不類病在大腸氣膨腹皮但見腫狀也按此節所列病狀曰少腹腫痞按之即痛如淋小便自調顯系少腹疽傷寒太陽篇少腹硬滿小便自利者下血乃愈又云少腹硬小便不利者為無血也小便自利其人如狂者血證諦也此可見病在血分者水分必無阻礙今少腹腫痞按之即痛如淋小便自調與少腹硬而小便自利有何差別病當在胞中血海豈得更謂之腸癰且以證情論小便自調下當與上節腹無積聚連屬為薏苡附子敗醬散證觀於方治後小便當下字但可決為少腹腫痞證方治斷非其身甲錯之方治矣腫痞在少腹上不及臍故知腹無積聚病根即在少腹不似標陽內陷故身無熱但據少腹腫痞按之即痛如淋之病狀加之以脈數便可知血已成膿然則腸內有癰膿實為內有癰膿之誤要知證雖化熱病原實起於腎寒血海遇寒而凝凝則痛久而化熱血之凝者腐矣故方治十倍利濕開壅之薏苡而破血熱排膿之敗醬草半之略用生附子以解凝而止痛數不及敗醬之半然後少腹之膿乃得從小便中出豫直決其為少腹疽王鴻緒以為患在少腹之內為小腸疽陳修園又以為小腸癰俱謬誤不然少腹承下焦水道由腎藏出與小腸之下自接大腸者何嘗有絲毫干涉耶嘗記辛未正月豫子婦之妹嫁江陰北門外程姓者病此晝夜劇痛不能安睡小便時時出粘膩白物有時微帶紅色所出不過一滴出之先痛不可忍赴醫院求診西醫飲以藥水七日不減其夫以病狀來告豫用重劑仙方活命飲加當歸四兩向雜量肆買赤豆一升先煎後入他藥陰以茶銚攜入醫院僞言開水服之半小時即能安睡明日用原方二劑腫消月餘生一子蓋此證多出妊娠之婦諒由氣血凝聚化熱傷及血海所致學者幸致意焉問曰寸口脈浮微而澀法當亡血若汗出設不汗出者云何曰若身有瘡被刀斧所傷亡血故也人之一身皮毛之內盡含水分水分所以能化氣外泄者全恃周身之血熱血熱之盈虧不可知以寸口脈為之驗脈微而澀是為陰虛陰虛之人或吐血或盜汗是為虛勞本證今見此極虛之脈既不吐血又無盜汗病既不屬虛勞則其人必有夙疾或身有瘡瘍而膿血之抉去者過多或向受刀創而鮮血之流溢者加劇雖境過情遷而營氣既衰斷不能復充脈道蓋脈之虛正不係乎新病也病金瘡王不留行散主之王不留行散方王不留行十分八月八日采蒴藋細葉十分七月七日采桑東南根白皮十分三月三日采甘草十八分黃芩二分川椒三分厚朴二分乾薑二分芍藥二分上九味前三味燒灰存性各別杵篩合為散服方寸匕小瘡即粉之大瘡但服之産後亦可服此方有桑皮之潤厚朴之燥黃芩之寒椒薑之熱大致金創流血創口乾燥增痛故宜潤血去既多濕寒停阻脾陽故宜燥血虛則生內熱故宜涼血分熱度以亡血而低中陽失運故宜溫而終以通利血脈止金創血為要故以王不留行蒴藋細葉為方中主藥而芍藥佐之又復倍用甘草以和諸藥使得通行表裏此王不留行散之大旨也排膿散方枳實十六枚芍藥六分桔梗二分上三味杵為散取雞子黃一枚以藥散與雞黃相等飲和服之日一服豫按此方之上脫去病證以方治重用枳實當為胃癰排膿湯方甘草二兩桔梗三兩生薑一兩大棗十枚上四味以水三升煮取一升服五合日再服按此為肺癰方治故與桔梗湯同浸淫瘡從口起流向四肢者可治從四肢流來入口者不可治浸淫瘡黃連粉主之方闕浸淫瘡為脂水流溢之通稱說詳藏府經絡篇黃連苦寒能清大毒許半龍治疔毒重用之往往取效而其性尤燥能去濕熱濕熱既去瘡中脂水乃不至蔓延流溢也然則黃連粉方雖闕其意則大可知也趺蹶手指臂腫轉筋狐疝蛔蟲病脈證治第十九師曰病趺蹶其人但能前不能卻刺腨入二寸此太陽經傷也此濕從下受之證也趺蹶為足背經脈轉戾其人能前不能却要為寒濕傷筋之證昔大禹因治水久居濕地病濕至於兩足不相過後世巫者效之謂之禹步可為明證仲師所云刺腨二寸斷為太陽經傷者蓋太陽之經入膕中貫腨內出外踝之後至小指外側寒濕傷其經脈血瘀不通故強直而不能却刺腨二寸正所以瀉其瘀也惟近世內科能用針者少豫嘗患右臂痠痛自肩至於尺澤長女昭華用毛薑四兩川烏三兩草烏五兩紅花二兩良薑一兩每夜濃煎薰洗月餘竟愈則寒濕傷經似亦不妨用之也病人常以手指臂腫動此人身體瞤瞤者藜蘆甘草湯主之方闕內經云風勝則動濕勝則腫仲師言手臂腫動身體瞤瞤此可知為風濕痰涎走竄指臂延及周身之證與風癇證略同特風癇無此表證耳按子和儒門事親云一婦病風癇其始一二年發後即日發甚至一日數發求死不得值凶歲采野草充糧見草若蔥狀采蒸飽食胸膈間脹悶頃之湧吐膠痰數日約一二斗甚昏困後遂輕健如平人以所食蔥訪人即藜蘆也蓋風痰內壅積久旁竄積者為本竄者為標用藜蘆者湧吐而抉其壅也所以用甘草者恐藜蘆苦寒敗胃甘味以調之也近癇證有日服控延丹一錢久而自愈者亦所以去痰涎也轉筋之為病其人臂腳直脈上下行微弦轉筋入腹者雞矢白散主之雞矢白散方雞矢白為末取方寸匕以水六合和溫服轉筋入腹之病豫未之見原其病情則與痙證之宜大承氣湯者略同痙證云痙脈按之緊如弦直上下行與此證脈上下行微弦何異痙證云腳攣急與此證臂腳直又何異痙證燥熱陰液垂絶故急下以救之所以除裏熱也此證用下氣破積通利大小便之雞矢白散亦所以除裏熱也所以然者裏熱不除則筋脈受灼而不得柔和故必通其大腸使陽明燥氣內熄而筋脈乃和考葛仙方中風頭足往後扯動彎曲不伸其形如弓用雞矢白三錢酒五杯用竹箸攪千遍日服二次豫按此即痙病之臥不著席證痙病自中風傳來易於化燥內藏燥而筋脈受灼以致全身強急故借內經治臌脹之雞矢醴以下之蓋亦金匱用大承氣湯之義也然則轉筋用雞矢白散亦何獨不然乎陰狐疝氣者偏有小大時時上下蜘蛛散主之蜘蛛散方蜘蛛十四枚熬桂枝半兩上二味為散取八分一匕飲和服日再服蜜丸亦可此寒邪並少陽濕熱併注皋丸之證也濕熱偏注皋丸一脹一否則偏有小大發時脹而偏墜不發則如平人故時時上下以其病在下體與蝕下為狐同例故謂之陰狐疝蜘蛛破瘀消腫晝隱夜出為陰類之蟲取其下入陰部桂枝通陽宣鬱能達肝膽淪陷之氣破瘀則寒濕不凝通陽則鬱熱外散而偏墜可愈矣豫昔在同仁輔元堂改散為煎治愈二人用桂枝三錢蜘蛛一枚炙存性一人二劑愈一人一劑愈章次公王慎軒皆親見之今則相隔久遠併病者姓與居址而忘之矣乙亥重九日有倪姓來診其證時發時止今以遇寒而發偏墜微痛夜有寒熱睡醒汗出兩脈遲滑方用大蜘蛛一枚炙過川桂枝四錢一劑即愈此為前病腸癰之史惠甫介紹併附記之問曰病腹痛有蟲其脈何以別之師曰腹中痛其脈當沉若弦反洪大故有蛔蟲此從脈象之異決其為有蟲之痛也凡腹痛脈沉為寒濕下陷直四逆湯證耳脈弦為肝邪乘脾直小建中湯證耳若不沉不弦而腹痛則既非寒濕內停又非肝膽鬱陷故可決為蟲痛然洪大二字亦為仲師失詞脈不足據當以病狀參驗之不然豈大實滿之陽明證其脈獨不洪大耶蛔蟲之為病令人吐涎心痛發作有時毒藥不止者甘草粉蜜湯主之甘草粉蜜湯方甘草二兩白粉二兩即鉛粉白蜜四兩上三味以水三升先煮甘草取二升去滓內粉蜜攪令和煮如薄粥溫服一升差即止蛔蟲之為病常起於脾藏寒濕由寒濕積為水痰少陽之氣不達於三焦水痰感少陽生氣乃生蛔蟲蛔託生於痰涎故其腹多涎蛔飢吐涎胃不能容隨即傾吐而出此所以令人吐涎也心痛者心下竄痛蛔上入膈故痛非真心痛也蛔安靜則如平人竄動則痛欲死故發作有時此蛔病之大概也然竟有毒藥不能奏效者則以病者曾用殺蟲猛藥劑量太少蛔蟲醉而不死後遂狡避不食也故不能猛攻莫如誘劫不得已而用甘草粉蜜使蟲貪蜜之甘而不知鉛粉之毒此亦陳人畏宋萬多力使婦人飲之酒醉而執之之計也用甘草者欲病人不受鉛粉之毒也先母侍婢曾患此始病吐蛔一二日後暴厥若死治以烏梅丸入口即吐豫用甘草五錢先煎去滓以鉛粉二錢白蜜一兩調飲之半日許下蛔蟲如拇指大者九條其病乃愈然時醫輒非笑之夏蟲不可語冰亶其然乎蛔厥者其人當吐蛔今病者靜而復時煩此為藏寒蛔上入膈故煩須臾復止得食而嘔又煩者蛔聞食臭出其人當自吐蛔蛔厥者烏梅丸主之烏梅丸方烏梅三百個細辛六兩乾薑十兩黃連一斤當歸川椒各四兩附子桂枝人參黃柏各六兩上十味異搗篩合治之以苦酒漬烏梅一宿去核蒸之五升米上飯熟搗成泥和藥令相得內臼中與蜜杵二千下丸如梧子大先食飲服十丸日三服稍增至二十丸禁生冷滑臭等食蛔厥非手足逆冷乃心下暴痛病者目珠上出瞑然若死之謂間亦有痛極而手足冷者要其立名之義正不在此也按此證丸藥不效不妨改丸為湯曾記無錫強福全未病腸癰時先病腹痛痛無定時忽作忽止知為蟲已服丸半斤矣痛如故後即改丸為湯二劑而差說解詳傷寒論茲不贅婦人妊娠病脈證治第二十師曰婦人得平脈陰脈小弱其人渴不能食無寒熱名妊娠桂枝湯主之於法六十日當有此證設有醫治逆者卻一月加吐下則絶之妊娠之脈關後有餘尺跳動右甚為女左甚為男此歷試不爽者也今師云婦人得平脈陰脈小弱何乃適得其反蓋妊娠停經之初本無他病故脈如平人血凝子宮胎氣尚微故陰脈小弱非如四五月後胎氣壯盛之比月事既停統血之脾藏頓滯脾精之上輸者少故渴脾陽失運消穀之力微故不能食更有濕痰停阻胸中時欲嘔者俗稱惡阻仲師不言者蓋已統於不能食中非脫漏也凡見此證脈平而表無寒熱即可斷為妊娠主以桂枝湯者所以助脾陽而疏胸中水氣也方解詳傷寒發微太陽篇所以六十日方見此證者為始停經時中氣尚疏上中二焦未有所覺也此證不當治渴及嘔治之為逆設治渴而誤用清燥滋陰之品胃中必寒設治不能食而誤投下藥脾濕又將下陷治不得法後一月必加吐下中氣敗也絶其藥併斥其醫庶幾勿藥有喜乎婦人宿有癥病經水斷未及三月而得漏下不止胎動在臍上者此為癥痼害妊娠六月動者前三月經水利時胎也下血者後斷三月衃也所以不止者其癥不去故也當下其癥桂枝茯苓丸主之桂枝茯苓丸方桂枝茯苓丹皮桃仁去皮尖熬芍藥各等分上五味末之煉蜜丸如兔屎大每日食前服一丸不知加至三丸欲安良民必除盜賊欲養良苗必除荑稗此盡人之所知也然則欲孕婦之安胎不去其宿疾可乎設宿癥不去或經斷未及三月即有漏下之變所以然者養胎之血不能凝聚子宮反為宿癥所阻從旁溢出胎失所養則動在臍上其實胎元無損癥痼害之也然亦有三月後而胎動下血者其證亦為癥仲師言六月動者賅四月至六月言之耳前三月經水通調忽然中止當可決其為胎若經斷三月之後忽然下血其為衃血橫梗不能融洽何疑新血與衃血不和因有滲漏之隙不下其癥胎必因失養而不安仲師設立桂枝茯苓丸以緩而下之蓋癥之所由成起於寒濕故用桂枝以通陽茯苓以泄濕丹皮桃仁赤芍則攻瘀而疏達之固未可以虛寒漏下之治治也間亦有寒濕固瘕之證阻隔腹中不下血而胎元不足者曾記丁卯新秋無錫華宗海之母經停十月而腹不甚大始由丁醫用疏氣行血藥即不覺脹滿飲食如常人經西醫考驗則謂腹中有胎為腐敗之物壓住不得長大欲攻而去之勢必傷胎宗海邀豫赴錫診之脈澀不滑不類妊娠當晚與丁醫商進桃核承氣湯晨起下白物如膠痰更進抵當湯下白物更多脹滿悉除而腹忽大月餘生一女母子俱安孫子云置之死地而後生亶其然乎婦人懷妊六七月脈弦發熱其胎愈脹腹痛惡寒少腹如扇平聲所以然者子藏開故也當以附子湯溫其藏附子湯方見傷寒懷妊六七月胎已長成血凝於下熱度不高太陽寒水化氣者少脾藏乃氣虛生濕寒濕內壅故胎脹流入足太陰部分故腹痛脾陽不能外達故發熱而惡寒弦脈為寒水濕凝固此傷寒金匱之通例以為肝病者謬也間有肝邪乘脾脈弦腹痛者要由脾虛濕勝肝膽鬱陷之氣暴乘其虛故先用小建中湯以實脾凡脈見弦急俱為水勝血寒胎氣張於內少腹膨急而子藏開風寒襲之故少腹如扇如扇云者謂逐陳冷氣相逼也附子湯方用附子以溫腎腎下水道接膀胱故溫腎而少腹自暖茯苓白朮人參以泄水而扶脾濕邪去則寒熱止而胎脹平芍藥能調陰絡阻滯故治腹痛傷寒論所謂腹痛加芍藥也師曰婦人有漏下者有半産後因續下血不絶者有妊娠下血者假令妊娠腹中痛為胞阻膠艾湯主之膠艾湯方乾地黃六兩川芎阿膠甘草各二兩艾葉當歸各三兩芍藥四兩上七味以水五升清酒三升合煎取三升去滓內膠令消盡溫服三升日三服不差更作婦人妊娠有宿癥不去致經血妄行者前既出桂枝茯苓丸方治矣但經血妄行不能一致有下少數之血相續不絶者有因半産氣虛不能攝血續下不止者有衝激大下者設妊娠見此證但腹中痛臍上不見跳動者即為內無宿癥宿癥利用攻無癥則利用補胞中之血不得上行衝任二脈阻塞下陷故名胞阻膠艾湯方地黃阿膠以養血川芎艾葉以升陷而溫寒炙草以扶統血之脾歸芍以行瘀而止痛而下血腹痛愈矣嘗記丁巳年治潘姓漏下證用仲師方治改兩為錢服後腹中脹甚二日而漏下止二十日後生一男今十七歲矣婦人懷孕腹中㽲痛當歸芍藥散主之當歸芍藥散方當歸芎藭各三兩芍藥一斤茯苓白朮各四兩澤瀉半斤上六味杵為散取方寸匕酒和日二服婦人懷孕全恃養胎之血因懷孕之故周身氣血環轉較遲水濕不能隨之運化乃停阻下焦而延及腹部此即腹中㽲痛所由來方用芎歸芍以和血並用茯苓澤瀉白朮以泄水而去濕但令水濕去而血分調㽲痛自止蓋治病必伏其所主宿食腹痛則治以承氣得下即痛止寒利腹痛則治以四逆理中寒去則痛止肝乘脾腹痛則治以小建中脾安則痛止蛔蟲腹痛則治以烏梅丸蟲下則痛止皆不泛用止痛之藥當歸芍藥散之治孕婦㽲痛亦猶是耳自世多不識病原之醫士乃有通治之套方而古法寖荒矣妊娠嘔吐不止乾薑人參半夏丸主之乾薑人參半夏丸方乾薑人參各一兩半夏二兩上三味末之以生薑汁糊為丸梧子大飲服十丸日三服妊娠之婦經血下停上膈當然濕阻故六十日後當見乾嘔不能食之證惟濕困脾陽不妨竟用桂枝湯但得脾陽略振胃氣自和若夫濕積成水停蓄心下滲入於胃胃中虛寒遂有嘔吐不止之變法當去水溫中仲師因立乾薑人參半夏丸方但令心下之水與胃中之寒並去嘔吐自定但半夏一味決宜生用並不可浸去麻性以半數之乾薑攙雜又加薑汁為丸入口必然不麻此則棄精華而用渣滓以之泄水恐無濟也妊娠小便難當歸貝母苦參丸主之當歸貝母苦參丸方當歸貝母苦參各四兩上三味末之煉蜜丸如小豆大飲服三丸加至十丸小便難而上焦無熱則下焦水道不利不由浮陽吸引可知飲食如故則心下又無水氣嘗見婦人淋帶多者濕痰必少一見濕痰上泛淋帶即少則此證要由血虛生熱濕痰下注成淋阻塞水道所致貝母本去痰之品亦主淋瀝此即濕痰與淋帶隨發異名之確證方用當歸貝母苦參丸當歸補血苦參泄熱此為妊娠大法而主要則全在貝母一味為其去淋瀝之瘀塞而小便始通也所以用丸不用湯者則以濕濁粘滯非一過之水所能排決也妊娠有水氣身重小便不利灑淅惡寒起即頭眩葵子茯苓散主之葵子茯苓散方葵子一升茯苓三兩上二味杵為散飲服方寸匕日二服小便利則愈妊娠之婦血凝氣弱入胃水飲運化較難故有水氣留積心下上泛而嘔吐者亦有阻於膀胱淋瀝不清而小便難者若夫水不化氣濕留肌肉則病身重三焦氣阻則小便不利由肌及表陽氣不通則灑淅惡寒水氣上乘不淩心而犯頭目則心下不悸而起即頭眩葵子茯苓散專以滑竅利水為主其病當愈葵子滑胎而不忌者所謂有故無隕亦無隕也婦人妊娠宜常服當歸散當歸散方當歸黃芩芍藥芎藭各一斤白朮半斤上五味杵為散酒服方寸匕日再服妊娠常服即易産胎無所苦産後百病悉主之妊娠之婦血凝而氣聚血凝則易生熱氣聚則易生濕濕熱相摶則病腹痛當歸散所以為常服之品也歸芍川芎以和血黃芩以清熱白朮以燥濕但令濕熱清而血脈和其胎即安後世醫家有胎前宜涼之說由此方用黃芩始也妊娠養胎白朮散主之白朮散方白朮川芎蜀椒去汗牡蠣各三分上四味杵為散酒服一錢匕日三服夜一服但苦痛加芍藥心下毒痛倍加川芎心煩吐痛不能食飲加細辛一兩半夏大者二十枚服之後更以醋漿水服之若嘔以醋漿水服之復不解者小麥汁服之已後渴者大麥粥服之病雖愈服之勿置人體有強弱強者血分多於水分而熱度常高弱者水分多於血分而寒濕為勝觀當歸散與白朮散之異知胎前宜涼之說不可為訓也寒水太勝則血熱被壓下陷而不能升白朮散方白朮以燥濕牡蠣以泄水川芎以升陷蜀椒以散寒但令寒水下泄血溫上升其胎即安況水盛血虛之人養胎尤為不易故仲師於當歸散後別無增益之藥獨於本方之後辨證加藥併出善後方治何其鄭重分明乎此無他水微而血盛不過熱鬱生燥不似水勝血寒者必有墜胎之變也血瘀則腹痛故加芍藥以通絡水停心下心藏血鬱故加升陷之川芎水泛淩心寒漬入胃以至心煩吐痛此痛與懸飲內痛同不能食飲故加細辛半夏以去水而蠲飲服以醋漿者所以平膽胃而止嘔也不解以小麥汁服之者以小麥養心除煩兼能利水故也若夫病已而渴常服大麥粥者以病原起於血虛胃為生血之原和胃降逆俾能食飲正所以補虛也婦人傷胎懷身腹滿不得小便從腰以下重如有水狀懷身七月太陰當養不養此心氣實當刺瀉勞宮及關元小便微利則愈此承上養胎旁及失養之證也蓋胎得養則安失養則傷但胎氣營養不惟外借藥力抑更視其本體初受胎二月肝液養之胎氣安靜三四月膽火養之胎至是而始動五六月脾精養之脾藏多濕腹至是而始大七八月肺陰養之肺主氣故氣充而液下濟九十月腎陰養之腎主水故腹以多水而益大設令肺陰養胎之期為濕邪凝阻不能下濟濕之所聚太陰氣化不宣因病腹滿氣閉於上水吸於下故不得小便第觀其腰以下重如有水氣狀便可知病在下焦矣水氣篇云腫在腰以下當利小便非其明證歟但膈上氣疏利用從治膈上氣閉便當曲治所以然者不宣上氣無論五苓散豬苓湯百無一效正恐愈利而愈塞也濕停於中心氣不得下交則鬱而上逆心氣實者非心氣自實以有所阻隔而然也脈中營氣不動脈外之衛氣不得獨行心氣閉於上則腎氣窒於下故瀉掌心之勞宮臍下之關元上下兩泄令小便微利即愈譬之今人開煤油鐵箱上下各開一釘眼以器下承之油自從釘眼出若但有下眼便涓滴不出矣附難産方法婦人臨産有先下水一日而小兒不下者有氣血兩虛小兒欲出不出者長女昭華製方活人甚多壬申冬十一月長子湘人之室亦以下水一日用之附録之以告存心濟世者蓋一舉而救人二命也方用生潞黨二兩當歸三兩牛膝四兩上三味濃煎頓服食頃即産蓋取其氣血兩補並利用牛膝之墜胎也氣分充滿者去黨參加牛膝一兩婦人産後病脈證治第二十一問曰新産婦人有三病一者病痙二者病鬱冒三者大便難何謂也師曰新産血虛多汗出喜中風故令病痙亡血復汗寒多故令鬱冒亡津液胃燥故大便難婦人懷孕周身血及水液盡資養胎之用至於臨産養胎之血及水液載胎以出譬之順水行舟水隨舟下産後血液虛耗正不待言陰亡於內則陽張於外陰耗陽張故令腸胃內燥肌腠外疏營魄弱而汗液泄風乘其虛始則中風風燥傷筋因轉為痙此即栝蔞桂枝湯證也脾為統血之藏血虛則脾精不行腸胃燥而大便難此即脾約麻仁丸證也血分與陽氣合則溫與陽氣離則寒西醫謂血中無氣者妄也但內含而不外散耳血中無氣安有熱度産後亡血而陽浮於上陽浮則表虛而汗出陰寒襲虛內藏微陽益不能支因致鬱而上冒若暴厥狀此桂枝去芍藥加龍骨牡蠣湯證也以上三證並為亡陽傷津要其為大便之難則一設不大便無所苦不妨徐俟津液之復大便自通雖不治亦可也産後鬱冒其脈微弱嘔不能食大便反堅但頭汗出所以然者血虛而厥厥而必冒冒家欲解必大汗出以血虛下厥孤陽上出故頭汗出所以産婦喜汗出者亡陰血虛陽氣獨盛故當汗出陰陽乃復大便堅嘔不能食小柴胡湯主之此申上節鬱冒大便難而發明其病理非謂小柴胡湯可通治鬱冒大便難也仲師所以不出方治者正以證有輕重劑量可隨時增減也至不明病理而妄治之則殆矣證情由於血虛自當以養血為主是故産後血虛不惟桂枝去芍藥加龍骨牡蠣為治標之法而初非正治即仲師小柴胡湯亦為大便堅嘔不能食而設亦非通治鬱冒鬱冒之脈所以微弱者亦由血虛血虛則肝陰虧而膽液生燥少陽之氣上逆則嘔不能食嘔則胃燥津液不能下溉大腸而大便堅故治此者但需小柴胡湯以平膽胃之逆使膈上津液足以下潤大腸諸恙可愈若夫虛陽上浮則但頭汗出陰虛陽越則衛不與營和但令助營氣之弱使與衛氣相接其病自愈曰冒家欲解必大汗出乃愈者此即藏無他病先其時發汗則愈宜桂枝湯之例也如營氣過弱異於血實不行即當去芍藥陽氣上盛吸水不降即當加龍骨牡蠣可以片言決也陳修園乃謂小柴胡湯通治鬱冒及便難有是理乎豫嘗治湖南曹姓婦産後冒風惡寒泄瀉之證經前醫兩進小柴胡湯泄瀉雖止而壯熱頭暈多汗而喘一身盡疼惡露不行豫謂産後百脈空虛風寒易入此即惡寒泄瀉所由來此時不用溫中補虛反用解外之小柴胡湯張發其陽氣因有發熱頭暈之變瘀血為陽氣吸引不得下行故身痛陽氣鬱冒於上故多汗而喘豫即認定虛寒用潞參三錢炙黃耆三錢熟地黃二兩歸身五錢附子三錢麥冬四錢外加薑棗一劑而浮陽減繼以膠艾湯而惡露通夫小柴胡湯能致鬱冒豈有本鬱冒而反用小柴胡湯之理足見仲師此方專為大便堅嘔不能食而設蓋以止少陽之嘔逆留胃液而潤腸燥並欲下行之腑氣不為浮陽吸引也仲師恐人誤認為鬱冒方治故於節末另提大便堅嘔不能食兩層二者之中又以嘔不能食為主然非好學深思心知其意固未易為淺見寡聞道也病解能食七八日更發熱者此為胃實宜大承氣湯主之病解能食則膽胃氣平而嘔吐止胃中津液得以下潤大腸矣小柴胡湯重用黃芩令人大便泄屢驗乃至七八日更發熱者此必非陰虛生熱可知也但按其脈而滑大便當乘胃氣之強用大承氣湯以攻之所謂曲突徙薪也獨怪近世醫家遇虛羸之體雖大實之證不敢竟用攻劑不知胃實不去熱勢日增及其危篤而始議攻下有惜其見幾不早耳産後腹中㽲痛當歸生薑羊肉湯主之並治腹中寒疝虛勞不足㽲音絞急也陳修園以為緩痛殊謬誤産後下血過多其人水分不足則因虛生燥而大便難水分過多則因虛生寒而腹中㽲痛當歸生薑羊肉湯當歸以補血生薑以散寒羊肉以補虛而㽲痛可止惟治腹中寒疝虛勞不足宜於本方中加生附子一枚非惟去病兼能令人有子豫於趙振聲妻張氏親驗之蓋前此所以不孕者以其有痛淋也每痛必下白物一滴服此方而痛淋止矣産後腹痛煩滿不得臥枳實芍藥散主之枳實芍藥散方枳實燒令黑勿太過芍藥各等分上二味杵為散服方寸匕日三服併主癰膿大麥粥下之産後腹痛有三一為虛寒之痛上節所謂㽲痛是也一為蓄血之痛後節枳實芍藥散治之有愈者是也一為胃實血不流行之證即此煩滿不得臥者是也血少而不能交會於心則煩胃氣頓滯則滿胃不和則脹悶而不得臥方用芍藥以通血分之瘀枳實以導胃實之滯併用大麥粥以調養肝脾但使血分通調中氣疏暢煩滿自止煩滿止然後營衛調適臥寐坦然矣師曰産婦腹痛法當以枳實芍藥散假令不愈者此為腹中有瘀血著臍下宜下瘀血湯主之亦主經水不利下瘀血湯方大黃一兩桃仁三十個蟅蟲二十枚去足熬按此即地鱉蟲上三味末之煉蜜和為四丸以酒一升煮丸取八合頓服之新血下如豚肝前證為血少不能流通兼胃濁失降之故故其腹痛雖與虛寒有別要猶未為實證也惟用前方不效者乃可決為産後瘀血而利用急攻胞中之血由衝任吸引而上者以臍下為衝要故血瘀必著臍下按下瘀血湯方治大黃桃仁與抵當同惟用蟅蟲而不用虻蟲水蛭則與抵當異此二方所以不同者要不可以不辨也産後血去既多不同經閉之證故不用吮血之蟲類恐兼傷及新血也蟅蟲生於塵穢之中善於攻竄而又不傷新血故於産後為宜雖亦主經水不利氣體虛羸者或宜之要未可去堅癖之乾血也産後七八日無太陽證少腹堅痛此惡露不盡熱在裏結在膀胱也二句舊訛為節末今校正不大便煩躁發熱切脈微實日晡時更倍煩躁發熱此句舊訛在日晡句上無理今校正不食食則譫語至夜即愈宜大承氣湯主之産後七八日無太陽證則不病痙及鬱冒可知若少腹堅痛則為産後惡露不盡外雖無熱正以熱結在裏而血瘀胞中此節蓋借熱入血室引起陽明實證故熱在裏二語當在惡露不盡下今在節末則傳寫之誤也設證情為熱入血室則營氣夜行於陽當得夜分譫語設但見不大便煩躁發熱猶難斷為陽明實證惟切其脈滑大而實乃可斷為胃家實加以日晡所太陰濕土當王陽氣衰而地中水氣上行此時不能稍抑其陽氣反見心中煩亂而手足無所措熱勢倍於日中即可斷為陽明亢熱且不食則已食即譫語至夜中陰盛之時譫語反止其不為熱入血室而為陽明實證明矣仲師言宜大承氣湯者恐人誤認為桃核承氣證也曾記戊辰年高長順女病此二十餘日已更數醫矣其證能食日晡所必發壯熱脈大而實豫用生大黃四錢厚朴二錢枳實四錢芒硝三錢一劑熱除即係此證愚按更倍發熱四字當在日晡時煩躁下傷寒論以日晡所發熱屬陽明可為明證反在日晡句上亦誤特訂正之産後風續續數十日不解頭微疼惡寒時時有熱心下悶乾嘔汗出雖久陽旦證續在者可與陽旦湯陽旦湯方桂枝三兩去皮芍藥三兩甘草二兩炙生薑三兩切大棗十二枚劈附子一枚牡桂四兩産後之證肌表空虛中風較易續續云者以其虛而易受故時乘而續受也續而復續因致數十日不解頭微痛惡寒時時有熱此皆太陽中風桂枝湯的證太陽中風肌腠閉而皮毛開故汗出濕痹肌肉內困脾陽故心下悶傷寒論所謂繫在太陰也濕在心下胃不能受則為乾嘔皮毛之浮汗但泄水氣而肌理之營氣不行故雖至數十日陽旦證依然不減仍當用桂枝加桂並加炮附子一枚之陽旦湯以助裏陽而發肌理之汗其病方愈所以加牡桂附子者桂枝湯治其本病病久而裏陽虛非加桂附以助之肌理之汗不出也産後中風發熱面正赤喘而頭痛竹葉湯主之竹葉湯方竹葉一把葛根三兩防風桔梗桂枝人參甘草各一兩附子一枚炮生薑五兩大棗十五枚上十味以水一斗煮取二升半分溫三服覆使汗出頸項強用大附子一枚破之如豆大前藥揚去沫嘔者加半夏半升洗産後中風發熱起於血去過多而營氣虛寒風本陽邪易於發熱不似寒邪外薄皮毛之內水氣生寒必待營熱內抗然後發熱也但發熱而面色赤則陽鬱於上與惡寒時時有熱者異喘而頭痛則與頭微疼者亦異夫面正赤為胃熱上薰痰飲篇可證也然産後體虛豈宜於胃家未實加大黃以利之此一難也中風表證未罷固不應急攻其裏但在表之浮陽吸陽明浮熱上升於清熱一層豈宜置之不論而本體又甚虛寒此二難也惟喘而頭痛究為風熱相摶竹葉湯方治竹葉葛根以清胃熱防風桔梗以散風而定喘餘則仍從陽旦湯意去芍藥而加人參所以去芍藥加人參者則以陰虛不任苦泄而急於營養之故傷寒少陰下利真武湯去芍藥吐下後液虧桂枝白虎二湯加人參此其例也豫早年聞北京産婦三日後即服吉林參湯一月後産婦氣體如未産時此其明證又按本方清太陽陽明風熱溫脾藏之虛寒與桂枝加葛根湯栝蔞桂枝湯用意略同不使陽邪內陷經輸發為柔痙倘亦上工治未病之旨乎婦人乳中虛煩亂嘔逆安中益氣竹皮大丸主之竹皮大丸方生竹茹石膏各二分桂枝白薇各一分甘草七分上五味末之棗肉和丸彈子大飲服一丸日三夜二服有熱倍白薇煩喘者加枳實一分婦人乳汁為精血所化常見乳子之婦終年月事不行可為明證乳中虛者或産婦體本虛羸納穀減少或因小兒吮乳過多乳少不能為繼於是營陰不足心中煩亂胃納既少生血之原本自不足加以無饜之吸吮引動膽胃之火發為嘔逆仲師出竹皮大丸方治竹茹石膏以清膽胃之逆三倍甘草以和中氣減半桂枝白薇以略扶中陽而清裏熱更用棗和丸以扶脾而建中但令胃熱除而穀食增則生血之原既富膽胃之上逆自平矣産後下利虛極白頭翁加甘草阿膠湯主之白頭翁加甘草阿膠湯方白頭翁甘草阿膠各二兩秦皮黃連柏皮各三兩上六味以水七升煮取二升半內膠令消盡分溫三服産後下利寒熱不同今但云下利虛極白頭翁加甘草阿膠湯主之此仲師之失辭不可為訓者也夫熱利下重則為白頭翁湯證加甘草以補中阿膠以養血亦第為熱利虛極而設夫産後血瘀不行腐敗而下利為熱血去過多因虛受涼而下利為寒豫嘗於丙午六月治梁姓婦人因産後納涼下利腹痛豫用附桂炮薑略加白頭翁秦皮一劑而利止所以用白頭翁秦皮者以新産不無血熱也所以去黃連柏皮者以暴受新涼不勝苦寒也若必執成方以治病與鄉愚用單方何以異哉婦人雜病脈證治第二十二婦人中風七八日續來寒熱發作有時經水適斷者此為熱入血室其血必結故使如瘧狀發作有時小柴胡湯主之婦人中風延至七八日適當經水初斷熱除身涼既而續發寒熱發作有時不似病中風時晝夜無間雖在中工亦當知其非桂枝湯證究其所以然則以經水初斷標陽乘虛而陷血室因是血結胞中乘營氣夜行於陽發為寒熱旦即明了一如瘧之休作有時但熱邪甫陷胞中定無乾血故但需小柴胡湯使標陽之陷而入者升發而出之其病當愈更不須桃核承氣也此虛實之辨也婦人傷寒發熱經水適來晝日明了暮則譫語如見鬼狀者此為熱入血室治之無犯胃氣及上二焦必自愈傷寒始病有已發熱未發熱之別婦人當傷寒發熱之期經水適來則胞中之血未虛發熱則周身血分熱度高以至高之血熱合始行之經血熱乃併入血室衛氣晝行於陽水分無熱故明了營氣夜行於陽血分有熱故暮即譫語如見鬼狀俗稱熱昏此證血熱在下但需攻瘀其病當已所謂血自結下之愈也斷不可因譫語而妄用承氣湯傷及胃氣亦不可發太陽之汗損上中二焦水液致血熱益無控制桃核承氣湯抵當湯丸下瘀血湯皆足以治之陳修園乃以為無方之治深於治蓋未識仲師之旨也婦人中風發熱惡寒經水適來得之七八日熱除脈遲身涼和胸脅滿如結胸狀譫語者此為熱入血室也當刺期門隨其實而取之中風當翕翕發熱之候仍不免嗇嗇惡寒此時病氣全在肌表在婦人雖經水適來決無裏證乃得病七八日脈遲身涼則肌表邪熱已解似可無餘病矣乃一變為胸脅下滿如結胸狀設為太陽標熱並水氣結於胸脅要惟有硬滿而痛不當譫語譫語為陽明實證所常有但此譫語當如上節之發於暮夜不在旦晝以七八日經水適來推之便可知標陽內陷血室所以然者經後血室空虛邪熱易為入也熱陷在經後必無乾血為患故但刺乳旁一寸之期門以瀉肝膽之熱諸恙自平蓋胸脅主上中二焦腎下至膀胱屬下焦並為少陽部分熱鬱胸脅則猶未及下焦隨少陽之熱結於上中二焦者先刺期門以瀉之不使下陷胞中久成乾血所謂曲突徙薪也陽明病下血譫語者此為熱入血室但頭汗出當刺期門隨其實而瀉之濈然汗出者愈陽明為病往往血熱熾盛迫水液而外泄血熱熾而腸燥故譫語水液涸於自汗故闕上痛斯二證雖不下血亦在所必有若婦人病此但頭汗出而一身無汗似不當見譫語則譫語固不由腸燥也非大承氣證太陽陽熱隨三焦而陷胞中則為蓄血蓄血者不下血今乃熱血妄行則此證又不同血結也非抵當證蓋水液不外泄與熱併居若沸湯然隨三焦而下陷胸中血海之血乃被灼而橫溢故惟瀉期門以泄肝膽之鬱使血分之熱得以外達表分俾皮毛水分受血熱而蒸化成汗則熱退而病解矣婦人咽中如有炙臠半夏厚朴湯主之半夏厚朴湯方半夏一升厚朴三兩茯苓四兩生薑五兩蘇葉二兩上五味以水一斗煮取四升分溫四服日三夜一服濕痰阻滯咽中氣機不利如有物梗塞吐之不出咽之不下仲師於無可形容中名之曰如有炙臠即俗所稱梅核氣也方用薑夏以去痰厚朴以寬胸膈蘇葉以開肺茯苓以泄濕務令上膈氣寬濕濁下降則咽中出納無阻矣此方癸酉二月於四明劉姓男子親試之良驗惟不用人造之茯苓改用有鹼性泄粘痰之桔梗為小異耳又按近世效方有用半青半黃梅子以食鹽醃一晝夜取出晒乾再醃再晒以鹽水乾為度每用青銅錢二枚夾二梅子麻扎入磁瓶封固埋地下百日取出每用梅子一枚含口中半刻咽中梗塞即消當附存之曾記早年居鄉時見城隍廟道土宋左丞治咽喉痛脹閉塞用青梅破開去核中包明礬燒灰研末和皂角末少許吹入吐出痰涎無算咽喉即通足見酸味之青梅當別具揮發性不當如舊說之收斂矣婦人藏燥悲傷欲哭象如神靈所作數缺喜伸甘麥大棗湯主之甘麥大棗湯方甘草三兩小麥一升大棗十枚上三味以水六升煮取三升分溫三服亦補脾氣師但言婦人藏燥而不言何藏然病情方治可知也肺主悲亦主哭悲傷欲哭病當在肺凡人倦則缺伸精神強固則否所以數缺伸者脾陽不振而中氣怠也凡人飲食入胃由脾氣散津上輸於肺脾精不能運輸則肺藏燥肺陰虛則主氣之藏窒塞故悲傷欲哭方後別出亦補脾氣四字可知病機專屬肺藏矣方用甘麥大棗專取甘味之藥俾脾精上輸於肺肺陰既充則下足以貫注百脈外足以輸精皮毛內外調達氣機舒暢略無抑鬱不和之氣悲傷欲哭之證乃可不作曰如有神靈者甚言不能自主也婦人吐涎沫醫反下之心下即痞當先治其吐涎沫小青龍湯主之涎沫止乃治痞瀉心湯主之膈間有寒飲乃吐涎沫此宜溫藥和之者也乃不用溫藥而反下之上膈水痰斷不能一下而盡加以衛氣不行水氣鬱於皮毛之裏一經誤下在表水液乘虛入裏乃留積心下而成痞故治此者當用小青龍湯俾飲邪從汗解然後用大黃黃連瀉心湯以瀉心下之痞否則飲邪方盤據陽位急於攻痞正恐反被吸引不得下達蓋先解表而後攻裏此固傷寒金匱之通例也婦人之病因虛積冷結氣為諸經水斷絶至有歷年血寒積結胞門寒傷經絡凝堅在上嘔吐涎唾久成肺痿舊訛作癰今校正形體損分在中盤結繞臍寒疝或兩脅疼痛與藏相連或結熱中痛在關元脈數無瘡肌若魚鱗時著男子非止女身在下來多來舊訛作未今校正經候不勻令陰掣痛少腹惡寒或引腰脊下根氣街氣衝急痛膝脛疼煩奄忽眩冒狀如厥顛舊訛巔今校正或有憂慘悲傷多嗔此皆帶下非有鬼神久則羸瘦脈虛多寒三十六病千變萬端審脈陰陽虛實緊弦行其針藥治危得安其雖同病脈各異源子當辨記勿謂不然此統述婦人經水之病也人之一身水分與血分平均乃無有餘不足之弊若血分不足水分不受血熱蒸化則寒凝氣結而月事不行血凝氣結則痛不及此時用附子湯以溫之至有歷年寒傷胞門癥瘕凝痼而堅癖雖用抵當湯合桂枝茯苓丸下之猶恐其無濟也大抵水寒血鬱之證久必生熱若凍瘃然始則寒凝而痛久乃熱鬱而潰故有寒在上焦者始則嘔吐涎唾久鬱則成肺痿肺痿肺癰篇云肺痿或從嘔吐亡其津液與此嘔吐涎唾久成肺痿正同蓋液傷而燥病在外不比血熱壅阻病在肺藏之裏外燥為痿裏實為癰故肺癰但有辟辟燥咳必無嘔吐此云癰者誤也內經云肺熱葉焦乃生痿躄上痿下躄故曰形體損分或寒濕據於中部由胃入腸繞臍而痛是名寒疝此證脈必弦緊寒在外則惡寒在裏則不欲食發即白津出手足厥冷此大烏頭煎證也其痛連兩脅牽掣腎藏甚則痛及少腹此血虛水寒之當歸羊肉湯證也所謂熱結於中者亦緣水寒血凝積久生熱所致始則痛痛久則腐爛瘀血生熱則脈數外無瘡瘍而血瘀在裏血不行於肌表故肌若魚鱗此虛勞大黃蟅蟲丸證也此證下後血必純黑下之不早必至虛極而死癸酉正月豫於四明陳姓少年見之其證肌膚甲錯腹部外皮焦黑按之刺手渴飲徹夜不寐大便纍日不行豫因其內有乾血也用百合地黃合桃核承氣輕劑當晚下黑血無算下後覺惡寒甚天明肢厥脈伏病家大驚乃就近延四明某醫士投以炮薑附子脈出身和後豫以附子理中繼之已得安睡並能食病家以為無患矣後聞於六七日後病者一寐不醒蓋乾血雖去而正氣不支矣然後歎時著男子非止女身之說信而有徵也在下未多於義未通當係來字之誤溫經湯方後月水來過多當即此證否則上既有血結胞門一證此更別出經候不勻一證豈得謂之未多耶蓋在下來多即下經候不勻之說或一月一中經來二次或月信過多間月再來或經行多日以致前後參差不一皆得以來多名之厥陰之絡入於陰中血虧而絡燥故令陰掣痛血海在少腹左右血海不溫故少腹惡寒腰為水藏後通督脈水濕壅滯陽氣不通則本藏及背脊痠疼氣街為足陽明動脈在腿腹之交亦名氣衝此脈由髀關抵伏兔下膝臏循脛外廉下至足跗寒濕上阻陽氣被壓故氣衝急痛膝脛疼煩此脈水藏不足則燥而掣痛為陽明之大承氣證水濕太過陽氣內陷乃見此證腎藏寒水一日不泄陽氣一日不通桂枝芍藥知母湯麻黃附子細辛湯俱可參酌用之血虛之人往往猝然眩暈顛仆道左狀如厥顛者謂如暴厥而顛仆也此證西醫謂之腦貧血治此者宜大補氣血近代所傳防眩湯大有成效此證氣血兩虛氣虛則多悲血虛則善怒忽然顛仆忽然悲哭忽然嗔怒狀若神靈所作其實非有鬼神昔人謂之帶下病凡血虛陰虧癥瘕蓄血之類皆是不專指淋澀始病不覺久乃羸瘦此證多由血虛生寒故但曰脈虛多寒而無脈實多熱之證婦人有十二瘕九痛七害五傷三因共三十六病變端百出皆當決之於脈脈左為陰屬精與血右為陽屬氣與水或水盛而血寒或液枯而血燥而論脈終以緊弦者緊則以始病氣結於外在內之血熱猶足與之相抗至於沉弦則水寒而血熱消沮矣治此者或針瀉期門或針引陽氣血結者氣實藥以瀉之水寒者陽虛藥以溫之所以針藥異用者謂驗其脈而知病源不同也此節或仲師自述師承或門人述仲師之訓與全書文體不類或亦因論列婦人雜病而附存之歟問曰婦人年五十所病下利數十日不止暮即發熱少腹裏急腹滿手掌煩熱唇口乾燥何也師曰此病屬帶下何以故曾經半産瘀血在少腹不去何以知之其證唇口乾燥故知之當以溫經湯主之溫經湯方吳茱萸三兩當歸芎藭芍藥人參桂枝阿膠丹皮生薑甘草各二兩半夏半升麥冬一升上十二味以水一斗煮取三升分溫二服亦主婦人少腹寒久不受胎兼治崩中去血或月水來過多及至期不來據內經女子七七四十九而天癸絶則婦人年五十所而病下利數十日不止似與月事無關但營氣夜行於陽今病者暮即發熱病在血分可知加以少腹裏急則瘀當在膀胱血海腹滿為脾濕下陷手掌煩熱唇口乾燥脾精不得上行之象也以病源論當用大黃蟅蟲丸以現狀論當用附子理中丸然則師何以指為帶下證所用者乃為溫經湯治遠因而不據近因不可不求其故也蓋帶下之證寒濕下注而浮陽上升下寒故少腹急上燥故唇口乾蓋此婦舊有淋濁少腹常急唇口常燥究其遠因則以曾經半産少腹留積敗血久而腐化乃下白物寒濕從之歷年不愈津液下滲故唇口燥積瘀不盡故少腹急此二證為未經下利時所恆有今淋澀中止而病下利知其血寒濕勝陷入大腸瘀血業經腐爛故不用大黃蟅蟲丸病不在中而在下故不用附子理中湯用溫經湯者推其原以為治也方中芎歸芍膠丹皮以和血而通瘀桂枝以達鬱而通陽生薑半夏以去水麥冬人參甘草以滋液而潤上燥吳茱萸疏肝燥脾溫中除濕故不治利而利可止也豫按此為調經統治之方凡久不受胎經來先期後期或經行腹痛或見紫黑或淡如黃濁之水施治無不愈者曾記寓華慶坊時治浦東十餘年不孕之婦服此得子者六七家江陰街四明范姓婦亦然此其成效也帶下經水不利少腹滿痛經一月再見者土瓜根散主之土瓜根散方土瓜根芍藥桂枝蟅蟲各三分上四味杵為散酒服方寸匕日三服帶下經水不利少腹滿痛其為胞中蓄血可知血瘀則生熱血分有熱故經一月而再見且行經之期既以有所阻礙不得暢遂餘血停頓遂與後月正期經水合併充牣不及期而先事排泄滿者必溢理固然也土瓜即王瓜味苦性寒能驅熱行瘀黃疸變黑醫所不能治用根搗汁平旦溫服午刻黃從小便出即愈此可證通瘀泄熱之作用芍藥能通凝閉之血絡故瘍科方書常用京赤芍蟅蟲即地鱉蟲生竈下亂柴塵土中善攻積穢不穴堅土故大黃蟅蟲丸下瘀血湯用之傷科亦用之取其不傷新血也用桂枝者所以調達肝脾變凝結為疏泄也此土瓜根散之旨也寸口脈弦而大弦則為減大則為芤減則為寒芤則為虛寒虛相摶此名曰革婦人則半産漏下男子則亡血失精原本無末句當係淺人刪去特補出之並刪旋覆花湯主之及方治此節一見於虛勞一見於吐衄下血二篇皆無方治多男子則亡血失精七字蓋節末但有婦人句語意正未畢也不知何時淺人將末句刪去又將肝著方治旋覆花湯闌入藥不對病此又何足致辨若錢乙所謂半産漏下氣已下陷焉有用旋覆花下氣之理特為中下人說法耳妊娠篇不云婦人漏下及半産後下血不絶膠艾湯主之乎然則無乾薑者為膠艾湯加乾薑即為膠薑湯方治即在後一節本條特為後一節補出脈象原本固無方治也說解詳前婦人陷經漏下黑不解膠薑湯主之膠薑湯方即膠艾湯加乾薑見千金方此承上節虛寒相摶言之以虛寒之故因病漏下病由出於寒濕下陷故名陷經因寒濕下陷而瘀血色黑者日出不已則法當溫化吾友丁甘仁云凡吐血下血見黑色者皆當用附子理中湯以溫運脾陽服涼藥者多死數十年來不爽則陷經黑不解之當用溫藥要可類推膠薑湯方治雖闕其必為膠艾湯加乾薑無疑也方解詳膠艾湯下茲不贅婦人少腹如敦狀小便微難而不渴生後者此為水與血俱結在血室也大黃甘遂湯主之敦音對古禮器體圓而膨其外旁有兩環俗音如得有瓦敦錫敦諸器形略同古器大黃甘遂湯方大黃四兩甘遂阿膠各二兩上三味以水三升煮取一升頓服其血當下少腹滿如敦狀謂如敦之膨其外也少腹為血室所寄膨在少腹則胞中有蓄血可知設令小便自利直抵當湯證耳乃小便微難而不渴水液略無虧損此即為産後水與血俱結胞門之確證未産時水與血俱供養胎産後排泄未盡乃見此證而為平人之所無蓋養胎之血及水混合不別臨産則送小兒及胞衣出産門一時不能暢泄餘者遂積胞中治此者便當水血同治大黃甘遂湯甘遂以泄水阿膠入血分以生新血而去瘀大黃入大腸令水與血俱從大便出少腹之滿可以立除此與桃核承氣湯抵當湯下瘀血湯之用大黃同意蓋取後陰容積較寬瘀血之排泄易盡也婦人經水不利下抵當湯主之抵當湯方水蛭虻蟲各三十個熬桃仁三十枚大黃三兩酒浸上四味為末水五升煮取三升溫服一升婦人經水不利有虛實寒熱之分虛者宜溫經湯兼有濕熱則宜土瓜根散産後水與血俱結胞中則宜大黃甘遂湯前數條已詳言之矣然則此條何以但言不利下而主治乃為抵當湯蓋此條不舉病狀者為其於傷寒太陽篇已備言之也太陽篇云熱在下焦少腹當硬滿小便不利者下血乃愈抵當湯主之又云脈沉結少腹硬小便自利其人如狂者血證諦也抵當湯主之其明證也按此證少腹必結痛大便必黑要以小便利為不易之標準使但用尋常通經之藥豈有濟乎豫昔在同仁輔元堂治周姓十七歲少女時經停五月矣以善堂忌用猛藥每日令服大黃蟅蟲丸不應送診期後病者至江陰街寓所求診月事不行已抵七月豫用蟅蟲水蛭各一錢大黃五錢桃仁五十粒下之下後以四物加參耆善後凡二劑十年來於江陰街遇之始知其嫁於小西門朱姓已生有二子矣婦人經水閉不利藏堅癖不止中有乾血下白物礬石丸主之礬石丸方礬石三分燒杏仁一分上二味末之蜜丸棗核大納藏中劇者再納之婦人經閉纍月不至猶未知其何證也若子藏堅癖少腹硬滿不消乾血久停因濕熱而腐爛時下白物俗名白帶其病固顯然矣蓋始則因熱結而成乾血其繼因濁痰下注而留濕濕熱蒸化乾血乃成白帶嘗見婦人有痰病者痰多則無淋淋多即無痰可為明證故外治之法要以去濕為主而三倍礬石佐杏仁以破下陷之濕痰而濕濁可去矣婦人六十二種風腹中血氣刺痛紅藍花酒主之紅藍花酒方紅藍花二兩上一味酒一大升煎減半頓服一半未止再服此節張隱庵注甚有意味茲特引申之以博其趣張云紅花色赤多汁生血行血之品也陶隱居主治胎産血暈惡血不盡絞痛絞本書作㽲胎死腹中此可知紅花作用專主調適血分矣又云治風先治血血行風自滅此又可知紅花雖行血之品其作用實能治風矣但血虛生風有從內發者有從外受者從內發者忽然頭目眩轉令人傾仆此宜氣血兩補重用參朮歸芍地黃者也從外受者皮毛開泄感受陽邪此宜桂枝湯者也紅藍花酒究治何風然觀於方治用酒可知其專主外風矣靈樞云飲酒者衛氣先行於皮膚衝任之絡散於皮膚肌腠間肌表血虛易受外風故以生血行血之紅花主治而以酒助其藥力使得行於肌表以拒外風之侵入婦人月事時下衝任之血不足故治風以此方為宜要之為外皮膚及筋骨痠疼之病與中風正自不同近世驗方有用延胡索當歸牡桂等分研末以酒調服治周身痛不可忍者意與此同曰六十二種風不過言通治之總方舉多數也血行則腹中刺痛止故亦兼治之固不在六十二種之內也婦人腹中諸疾痛當歸芍藥散主之婦人腹中疾痛大要由於水濕太甚血菀不通前於妊娠篇婦人懷孕節言之已詳但懷孕之人水血俱停人盡知之不知雜病亦有相類者蓋婦人經水按月而行故血常不足血不足而水濕有餘乃鬱結於太陰部而為痛此方泄濕行血故可通治要不惟為妊娠設也婦人腹中痛小建中湯主之此證俗名下肝氣婦人胸襟為處境所限因而狹小稍有怫逆則氣下沉而入腹立見脹痛所謂肝乘脾也傷寒太陽篇云陽脈急陰脈弦法當腹中急痛宜小建中湯主之重用甘味之藥者內經所謂肝苦急食甘以緩之也問曰婦人病飲食如故煩熱不得臥而反倚息者何也師曰此名轉胞不得溺也以胞系了戾故致此病但當利小便則愈腎氣丸主之腎氣丸方乾地黃八兩山藥山茱萸各四兩澤瀉丹皮茯苓各三兩桂枝一兩附子一枚炮上八味末之煉蜜和丸梧子大酒下十五丸加至二十丸日再服飲食如故則脾胃無病可知煩熱不得臥又似陽明熱證若果陽明生燥上膈決無水氣濕痰豈有反倚息如病痰飲咳逆之理此甚可疑也然究其所以倚息之故則以小便不通之故蓋下流不通則上源壅塞其所以不通者則以轉胞了戾之故通其小便則上膈水氣下行而倚息自平所以煩熱不得臥者則以下焦閉結而少陽之熱上薰也泄其水則邪熱之上薰者息矣然則何以不用泄水之五苓散曰此陰陽兩虛之證恐其愈泄而愈不通也嘗見有氣閉而小便不通者以木通車前豬苓等藥治之百無一效或用白歸身一兩川芎五錢佐以柴胡升麻一服即通可見地黃山萸山藥之補陰桂附之扶陽為至不可少必非專用茯苓澤瀉同等之藥所能奏功也用丹皮者所以通壅塞也腸癰篇有大黃牡丹湯可為明證婦人陰寒字當作癢溫陰中坐藥蛇牀子散主之蛇床子散方蛇床子上一味末之以白粉少許和合相得如棗大綿裹內之自然溫當云不癢婦人寒濕下注陰中或為白帶或為敗血久久化熱皆足生蟲蟲多而竄動則癢不可忍以川椒百部洗之往往不效惟蛇床子散足治之昔年豫治一婦人歷節風愈後自言陰癢不可忍自用明礬泡水洗之洗時稍定少頃癢如故豫以此方授之二日而瘥詳歷節篇蓋以蛇床子之燥烈合鉛粉之殺蟲濕去蟲死其癢乃止但豫實變法用之使之煎湯坐盆中洗之然後撲以鉛粉此可知仲師立方之旨在燥濕殺蟲而不在祛寒矣陳修園乃謂遙承上節令陰掣痛少腹惡寒證出其方治豈其然乎又按陰寒不孕另是一證仲師當別有方治近世所傳吳茱萸蜀椒各八兩為末煉蜜為丸彈丸大綿裹內陰中日夜一換一月後子宮溫和即孕用法與此方相似或即仲師之遺方歟否則本條所列病證與方治固了了不合也少陰脈滑而數者陰中即生瘡陰中蝕瘡爛者狼牙湯洗之狼牙湯方狼牙三兩上一味以水四升煮取半升以綿纏筋如繭浸湯瀝陰中日四遍少陰脈手太陰動脈之尺部也屬下焦脈滑而數屬下焦濕熱濕熱注於下焦或為淋帶或為太陽蓄血猶未可定為陰蝕也惟陰中癢痛腐爛乃可決為陰中生瘡狼牙草近今所無陳修園以為可用狼毒代之未知驗否但此證有蟲與毒即世俗所謂楊梅瘡似不如蝦蟆散為宜方用硫磺三錢胡椒二錢研末納蝦蟆口中用線扎住外用黃泥和水厚塗入炭火燒之俟泥團紅透取出候冷去泥細研忌用鐵器用時以小磨麻油調以雞毛蘸塗患處去其毒水數日毒盡雖肉爛盡亦愈此葛仙肘後方也自來注釋家徒事說理不求實用豈仲師著書之旨歟胃氣下泄陰吹而正喧此穀氣之實也膏髮煎主之膏髮煎方豬膏半斤亂髮如雞子大三枚上二味和膏中煎之髮消藥成病從大舊誤作小便出凡大便燥實之證由回腸灼爛前陰者則小便已而陰中疼熱其有不兼陽明實熱而燥實者在婦人則有陰吹此非可以大承氣湯治之也陰吹如轉矢氣聲實由大便不通矢氣無從下泄轉從間道出此證但苦腸中燥矢與陰絡固結故但用膏髮煎以和血滑腸則大便通而陰吹止矣校千金云太醫史脫家婢黃病服此燥糞下便差神驗乃知方後從小便出為傳寫之誤黃坤載泄濕通膀胱之解為大不通也又按門人吳炳南之妻每患腸燥納穀不多豫授以大半夏湯服之甚效間一二日不服燥結如故吳私念此胃實腸燥之證乃自製豬膏髮煎服之一劑而瘥乃知仲師穀氣之實四字早有明示人以通治他證之路不專為陰吹設也跋戊辰之冬家君注金匱發微成託人抄寫不意為其友人借閲稿多散佚乃於辛未之春整理殘稿續加注釋由家君及湘人抄録一通於是復成完書稿藏於家今年正月及門諸子以家君行年六十有九藉祝嘏稱觴謀刊刻行世僉曰可乃由裴君德炎與錢君頌霞商定託醫學書局代售預約次第校印裝訂成書其校字之役乃歸黃君漢棟與湘人分任之湘人雖學識膚淺於醫學未能深造而觀家君數十年殫精極神之作今且風行海內傳之永久深喜私願之克成也敬述數語以志緣起丙子閏三月上浣男湘人謹跋重刊傷寒金匱發微跋余髫齡多病及冠荏弱如故因有志學醫冀一以健身一以救人吾父知而善之遂負笈滬上學岐黃術於丁師福保仲祜之門丁師謂中醫之道深邃難明不若西醫之易於入門即授以生理病理解剖藥物諸書分門指示前後三年丁師見余時時涉獵中醫乃曰汝既喜國醫獨學無師焉能入室吾摯友江陰曹穎甫先生文章道德著於當代餘力治醫卓然成家今中醫之馳名海上者多出其門余為汝介紹余大喜執贄請見曹師為人和諧可親當時即授以所著傷寒發微一書並為講述麻黃湯之義理滔滔不倦餘頃耳神會不覺飢渴之皆忘也丙子歲師年六十有九及門諸子祝嘏稱觴僉謂師之傷寒發微久已刊行而金匱發微一書稿成已久尚未付梓及宜壽之梨棗以成全璧衆議既協囑余主其事書成委肆經售不脛而走未及期年傷寒金匱二書竟罄無存書八一三之變曹師遇難傷寒金匱二書紙版原存醫學書局亦以書肆易主竟不知去向書盡版毀求書者以無書為苦今年春千頃堂書局謀為重印以余為金匱發微之發行人馳書計議余惟曹師是書久為醫界所推祟但前此發行為數不多知者憾之今再版刊行不特名著能廣為傳播對於今日研究祖國醫學遺産亦大有幫助協為籌劃排印既成附記數語於末公元一九五五年八月下浣日門人無錫錢頌霞謹識
