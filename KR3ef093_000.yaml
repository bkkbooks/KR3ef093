  text: 秦伯未序當我從丁師甘仁臨診實習之前先入上海中醫專門學校念書一九一九二三年那時候曹師拙巢以詞章家兼通岐黃術擔任講席為了我愛好文學便跟曹師論醫餘事學詩畢業後還是和同學許半龍嚴蒼山章次公兄等常到曹師寓所虛心的學習和反復問難這已是三十年前的事了但在這過程中給豫我深刻的印象保留到現在還沒有消失曹師是經方派的典型處方用藥都依照傷寒論和金匱要略的規律強調仲景後的方書微不足道我的看法呢張仲景辨證求因分經定方規矩嚴謹在臨床上自有一定的價值但受了歷史條件的限制範圍不免狹隘不同意把後代許多經驗良方無形放棄為了這不同的意見我們有時引起辨論在辨論時曹師看到我們不能瞭解他的用意往往捨醫談詩拈題分韻各自沉思覓句把緊張的情緒很自然的緩和下來我記得一九二四年的冬天討論芍藥的酸斂和苦泄問題沽酒烹茶一燈相對不知不覺的雞聲唱曉最後還畫了一幅墨梅送我題句中有微雪消時說與君便指此事可謂風趣極了其實曹師明知同門賞用經方而且也很願我們從經方去旁求時方得到更豐富的知識相對地曹師也常用補中益氣六味地黃和逍遙丸以及牛蒡前胡一類仲景書中不見的藥根本沒有抹煞時方次公曾對我這樣說曹師善用麻黃桂枝深惡痛絶的是桑葉菊花所以經方和時方的爭執在曹師心目中就只有麻桂和桑菊的區分曹師也認識辛溫解表不適用於某些症狀所以他看到黃坤載用紫背浮萍就把浮萍當作溫病發汗的主藥次公的體會顯然比我深入曹師並非泥古不化也在次公的語意中可以體會得到了一般熟悉經方是一切方劑的基本後世方劑大部分跟經方發展起來譬如一株樹罷有了根才有枝葉花果我們不能孤單的欣賞一枝一葉一花一果而忽略了它的根子同時我們也不能見到一樹一木就認做是一座森林曹師的極端主張研究經方而不堅持反對時方便是這個道理他充分的指出了研究中醫應該從源尋流不應當捨本逐末給豫後學一個明確的方向所以曹師的論詩推祟王漁洋教導我們又鼓勵多讀漢魏樂府曾經特地寫了一本古樂府評注可說是同一意義的曹師具有淵博的學問可是業務並不太好甚至異常清淡那時我的先伯父鄉諡恭惠先生主持上海慈善團體同仁輔元堂每年端午及中秋節例有施醫給藥就診的都是勞動人民丁師就委託我推薦曹師參加這治療工作大約前後有三年金匱發微的內容便是此時的治案少數是另外的金匱發微僅僅是曹師的著述之一最可寶貴的不同於過去注家的尋章摘句鑽到牛角尖裏也不牽強附會自作聰明他把親身實驗到的老老實實地寫出沒有經驗的寧缺毋濫絶對不妄加批判這種知之為知之不知為不知的精神是曹師平生治學的特點也就是金匱發微的實質據我所知曹師舉孝廉的房師是嘉定秦芍舲先生也明醫理後入南菁書院肆業山長黃以周先生是著名的漢學大師兼精醫學那麼曹師的醫學知識師承有自可以概見了因此曹師在實事求是診斷下有覆杯而愈的也有一劑知二劑已的聲譽漸著很快的轉變了一部分同道輕描淡寫的作風不可否認是曹師推動的力量日寇侵略江南曹師的故鄉江陰淪陷曹師激於愛國義憤不屈殉難在明年才得到消息我曾撰詩追掉之一九三八年在傷寒發微金匱發微再版的今天更使我回想到曹師誨人不倦的精神和正確的教學方針他留給我們的著作正是發掘整理祖國醫學的寶貴材料當然我們並不以此為滿足我們需要全盤接受祖國民族文化遺産我們要從經方到時方湯液到單味取長捨短消滅宗派主義發揮中醫藥更大的效用然而這本冊子從中醫臨診來說定然是值得重視的末了我要說的過去仲景學醫與同郡張伯祖時人以為識用精微過其師但是我在中醫方面除掉業務之外雖然也做了一些事自己覺得沒有很好地繼承衣鉢而且仍有不同的意見經常會暴露出來對於曹師的表揚更是談不到了偶然和次公談及他也認為有同樣的感慨這是我們非常慚愧的秦伯末一九五五年十一月寫於上海市立第十一人民醫院丁仲英序江陰曹穎甫先生余先嚴甘仁公之道義交也精邃國學詩名尤著以遜清光緒之季登賢書嘗以選班赴山左無所合困而歸爰整岐黃之術以拯生民有所感概則託之於山水草木蟲魚鳥獸之詞故大江南北莫不知有曹詩人而不知先生之又工於醫也先生之於學上自經史下至諸子百家均有精深之研究至仲景之學則尤別具心得嘗謂其門弟子曰醫雖小道生死之所出入苟不悉心研究焉能生死人而肉白骨今之所謂宗仲景者名而已矣實則因陋就簡膽識不足以知病毅力不足以處方真能宗仲景之說用仲景之方者曾幾人哉且仲景原書經王叔和收拾於荒殘散亂之餘字句不無缺失任意增補已不能吻合原著加以數千年來傳寫之訛謬箋注者非惟不敢置議抑且於不可解者而強解之甚至救表之當用麻黃者不能正桂枝之失汗家重發汗至於液虛生燥當下以大承氣者不能正禹餘糧丸之失去仲景著書本旨蓋益遠矣今歲春先生所著傷寒發微將以付梓余信先生之書經艱苦卓絶而後成為歷來注傷寒史上可放一異彩而永傳勿替是為序辛未孟夏元彥丁仲英識沈石頑序仲師原序自述作傷寒雜病論之經過曰余宗族素多向餘二百建安年以來猶未十稔其死亡者三分之二傷寒十居其七感往昔之淪喪傷橫夭之莫救乃勤求古訓博採群方撰用素問九卷八十一難陰陽大論胎臚藥緑並平脈辨證為傷寒雜病論十六卷云云書經五胡十六國之亂已不無散佚復經叔和之編次林億等之校刻改竄損益參以己意至成無己注解傷寒論時已久非最初之完書矣且歷代之注傷寒者不下百數十家大率皆妄易次序顛倒經義攻訐聚訟支離破碎蒙蒙昧昧莫宗一是致後學者傍徨歧途無所適從吾師拙巢夫子為遜清大儒文聲醫譽傳聞海內念仲師作傷寒雜病論之本旨原為教民治病用藥之道有所標準不意傳至今日真義晦寒沉淪惜效方之反足以殺人使排斥仲景學說者得乘隙而橫行一世故忿然而起行道三十餘年研究經驗之心得注釋傷寒金匱垂示後來一洗空泛之浮論專務實學考據精詳凡無字之處必反覆探討一再解說而仲景之不出方治者綜核尤為周密此豈常人所能望其項背者哉歷三年書始脫稿意欲付梓商諸章君次公次公無以應延及年許今春乃由丁君濟華概然助之遂得殺青印至二卷適值丁君嘉禮之期後二卷乃由石頑校訂完成仲師之學醫家之布帛菽粟不可一日離所以師表萬世而吾師此書以經解經獨得仲師之奧更足以光大仲師之學其功豈小也哉刊印將成爰謹志顛末以志景行辛未端陽門下士石頑沈松年拜序自序拙巢子少治舉業常以文學談醫理空明研悟自謂今古無雙者殆不減乎玉楸夫人之一身水寒而血熱液清而氣濁然陽谷溫泉嚴冬無冰蕭邪寒焰盛夏不熱陰陽相抱內藏乃和長夏土濕潦水不澄秋高氣寒白露始下升降輕重損益懸殊固當躊躇滿志以為足治仲景書矣不意開卷以來輒生艱阻九折之肱中截十仞之淵無梁則又為之傍徨瞻顧慨焉興歎故不為之開山鑿石則夷庚不通不為之伐木成橋則彼岸不達昔張隱庵集注既成自序云經寒暑歷歲月廢寢食絶交遊諒哉斯言豫研核傷寒論起於丁卯之秋每當不可解說之處往往沉冥終日死灰不暘槁木無春靈機乍發乃覺天光迸露春紅結繁夏緑垂陰又如幽蘭始芳野水凝碧神怡心曠難以言喻匝月之中屢躓屢興不可數計書於庚午季夏告成蓋三年於茲矣嗟乎神禹畏龍門之峻則北條洪河不奠鬻熊憚蓽路之勞則南荒山林不啓仲景之學湮晦者幾何年矣自張隱庵出始能辨傳寫倒誤而尚多沿襲自黃坤載出始能言三陰生死而狃於五行然則豫之為此正欲繼兩家心苦以復舊觀云爾若徒以改竄經文為罪責則是惜山澤而不焚縱其龍蛇禽獸憚荊棘而不翦養其狐狸豺狼此真莊生所謂哀莫大於心死者也世有達人豫將拭目俟之辛未端陽後三日江陰曹家達仲景原序余每覽越人入虢之診望齊候之色未嘗不慨然歎其才秀也怪當今居世之士曾不留神醫藥精究方術上以療君親之疾下以救貧賤之厄中以保身長全以養其生但競逐榮勢企踵權豪孜孜汲汲惟名利是務祟飾其末忽棄其本華其外而悴其內皮之不存毛將安附焉卒然遭邪風之氣嬰非常之疾患及禍至而方震栗降志屈節欽望巫祝告窮歸天束手受敗賫百年之壽命持至貴之重器委付凡醫恣其所措咄嗟烏呼厥身已斃神明消滅變為異物幽潛重泉徒為啼泣痛夫舉世昏迷莫能覺悟不惜其命若是輕生彼何榮勢之云哉而進不能愛人知人退不能愛身知已遇災值禍身居厄地蒙蒙昧昧蠢若遊魂哀乎趨世之士馳競浮華不固根本忘軀狥物危若冰谷至於是也余宗族素多向餘二百建安紀年以來猶未十稔其死亡者三分之二傷寒十居其七感往昔之淪喪傷橫夭之莫救乃勤求古訓博采衆方撰用素問九卷八十一難陰陽大論胎臚藥緑並平脈辨證為傷寒雜病論合十六卷雖未能盡愈諸病庶可以見病知源若能尋余所集思過半矣夫天布五行以運萬類人稟五常以有五藏經絡府俞陰陽會通玄冥幽微變化難極自非才高識妙豈能探其理致哉上古有神農黃帝岐伯伯高雷公少俞少師仲文中世有長桑扁鵲漢有公乘陽慶及倉公下此以往未之聞也觀今之醫不念思求經旨以演其所知各承家技終始順舊省疾問病務在口給相對斯須便處湯藥按寸不及尺握手不及足人迎趺陽三部不參動數發息不滿五十短期未知決診九候曾無髣佛明堂闕庭盡不見察所謂營窺而已夫欲視死別生實為難矣孔子云生而知之者上學而亞之多聞博識知之次也余宿尚方術請事斯語漢長沙太守南陽張機撰陸淵雷序曩常遇已故某偉人與餘杭章太炎先生相繼演說某偉人陳義膚薄吐辭淺易而聽者傾耳屏息摩肩重足講舍不能容章先生繼之引據翔實言辭雅訓三數語後聽者稍稍引去此講畢全舍僅存十許人有假寐者此無他其曲彌高其和彌寡故也江陰曹拙巢先生精選學詩文書畫俱推絶詣以其餘緒治醫專宗長沙視晉唐以後蔑如無論金元與故名醫丁君甘仁友善討論醫學互相推重丁君精詣祕術門人子弟所或未知者先生無不知之二君既年相若道相似然婦人孺子皆知有丁君而丈夫治醫者或未知有曹先生焉此無他先生拙於言辭不善修飾上海浮誇之地人多皮相故也丁君既沒後生小子轉相依附竊取勦襲躋於著作人或亦相購取風行一時先生出其心得治驗著傷寒發微僕得而先讀之以經解經精湛允當以為自來注大論者未能或先而世人顧不甚重視焉嗟乎末世耳食顛倒是非有如是者僕因章君次公獲交先生久已心儀其人而憤世人之無目今先生將續刻金匱發微走書責序且囑揄揚以速其書之行僕謂先生書風行與否不足為先生重輕不行適足以見先生耳因書其所以知先生之始末以告天下後世之具正法眼藏者丙子三月後學陸彭年淵雷拜序許半龍序歷來治古書者造端於善信而成功於善疑不善信則涉獵而不專不善疑則茫昧而失實考仲景之傷寒雜病論自王叔和編次以來已非仲景之舊其中論傷寒者十卷論雜病者六卷至梁七緑及唐書藝文志所載乃獨存論傷寒之十卷而論雜病之六卷不與焉惟宋時有一本將全書十六卷刪節為三卷者名金匱玉函要略尚存館閣中其書上卷論傷寒中卷雜病下載其方並療婦人王洙於蠹簡中得之以其論傷寒者文多簡略但取雜病以下至服食禁忌二十五篇二百六十五方而仍其舊名林億等校理又取此二卷分為三卷以符原定之數改顏曰金匱方論即今之金匱要略是也曹師穎甫寢饋於仲景之學者凡四十年行醫海上以敢用藥聞不屑軟熟阿媕取媚於世所著傷寒發微既已刊行於世騰譽醫林復有金匱發微之輯夫金匱一書治者視傷寒為少宋元人皆無注釋明初趙以德始有衍義之作厥後較夥就半龍所覯僅五十餘家若黃坤載程雲來魏念庭輩所箋見仁見智都有獨到處而尤在涇之金匱心典允稱精粹師於諸家外能獨樹一幟不為前賢學說所囿於原文又多刪訂計藏府經絡篇一條痙濕暍篇一條百合狐惑篇一條瘧病篇一條五藏風寒積聚篇七條痰飲篇一條驚悸吐衄篇二條瘡癰腸癰篇二條婦人産後篇二條婦人雜病篇四條凡二十二條其他說解特異之處尤不勝枚舉所為勞神苦形於百疑求一信者蓋類如此矣顧師特隱於醫耳師工詩古文辭善墨梅酒酣耳熱紅牙一曲又復側豔動人半龍於壬戌之秋始獲侍於左右今歲春師年七十矣同門等環請將所著金匱發微壽諸梨棗師笑頷之而命半龍為之序語云上醫醫國其次醫人其所為壽者大矣固非鋪張揚厲如習俗之徒為焜耀者所得同日語師其掀髯而進一觴乎丙子清明門人吳江許半龍謹序章次公序昔先兄病陽明大實證不滿十日竟死先君極堂先生西河抱痛乃命成之讀成無己所注傷寒論逐日講授必成誦而後已曰明乎此則醫學根本已立後此之紛紜聚訟胥不能搖奪之矣成之謹受教及卒讀三陽三陰證狀治法已粗得梗概方期博覽旁稽以求深造又不幸失怙受遺命遊學上海中醫專校時江陰曹穎甫先生任講席成之親炙議論知其寢饋於仲景遺書者垂四十年不尚空談惟憑實驗每於修業之暇執經問難商榷疑義反覆不厭先生亦許其可造謂他日傳吾衣鉢者當在此子固知獎借之語不無溢美然竊喜庭訓師承之有合也戊辰年先生成金匱發微先生之年已六十有一成之出重資覓工書者鈔碌甫及半後半部草稿為其同居者借閲零星散佚僅存十之四五付梓之願格而不行及庚午年成傷寒發微既於辛未歲刊行傳世成之乃命門人謝誦穆郭鴻傑等收拾叢殘鈔成三數卷還之先生先生隨命長君湘人録之先生復勞神殫精補注瘡癰以下五篇而金匱發微始有完書即今之續付手民者是也竊惟先生之學提要鉤玄詮解精當固不待言而其尤卓異者凡經文之錯簡必校訂之前人注解之謬誤必糾正之復取平日經驗方案附於經文之下以明仲聖方治效如桴鼓使後之學者循是以求不難入仲景堂奧為其信而有徵也成之從先生游於今垂十七年平日臨證處方粗解經方門徑胥出先生之賜而此書尤屬先生畢生積驗所匯視前賢注釋金匱若干家偏重理論者相去不可以道里計今值此書刊成行世不揣搗昧聊書受學始末於專丙子三月二十八日門人丹徒章成之拜撰
